.set-info{color:#4ecca3;font-size:.85em;margin-bottom:6px}

<script>
const WORDS=[
{n:2001,w:'oppose',m:'v. ① ~에 반대하다, ~에 이의를 제기하다; 대항하다; 적대하다 ② ~에 대비[대조]시키다; 대립시키다[to, against]',s:'resist, against',r:'라틴어 ob-(대항하여) + ponere(놓다) → 상대의 의견이나 움직임에 대항하여 맞은편에 단호히 놓다 → 반대하다, 이의를 제기하다'},
{n:2002,w:'avid',m:'a. ① 몹시 탐내는, 탐욕스러운 ② 열심인, 열렬한, 열광적인',s:'covetous, greedy, insatiable, voracious, ardent, eager, enthusiastic, fervent',r:'라틴어 avere(갈망하다) + -id(형용사 접미사) → 눈앞의 이익이나 성취를 향해 몹시 원하고 탐내는 → 탐욕스러운, 열심인'},
{n:2003,w:'plum',m:'n. ① 서양자두 ② 근사한 것, 요직, 횡재 / a. 아주 근사한, 알짜의, 대우가 좋은',s:'choice, first-class',r:'고대 영어 plume(자두) → 달콤한 서양자두처럼 누구나 탐낼 만큼 대우가 좋고 근사한 일자리나 몫 → 아주 근사한, 알짜의, 요직'},
{n:2004,w:'stampede',m:'n. ① (가축 등이) 놀라서 우르르 달아남; (군중 등이) 앞을 다투어 달아남, 제주(奔走) ② 쇄도, 집결 / v. ① 우르르 몰리다; 우르르 몰리게 하다 ② 재촉하다, 몰아붙이다',s:'',r:'스페인어 estampida(쾅 소리, 짓밟음) → 총소리에 놀란 소 떼나 군중이 이성을 잃고 우르르 맹렬히 달아나는 현상 → 놀라서 달아남, 쇄도'},
{n:2005,w:'hilarious',m:'a. 명랑한, 즐거운; 웃음을 자아내는, 재미있는',s:'amusing, entertaining, funny',r:'그리스어 hilaros(명랑한, 기쁜) → 재미있는 상황이나 농담 때문에 참을 수 없이 폭소가 터지고 유쾌한 → 명랑한, 웃음을 자아내는'},
{n:2006,w:'epithet',m:'n. ① 별명, 별칭, 통칭 ② (사람·사물의 특성을 나타내는) 형용사구',s:'alias, nickname, sobriquet',r:'그리스어 epi-(위에) + tithenai(놓다) → 사람이나 사물의 특징을 잘 나타내기 위해 원래 이름 위에 덧붙여 놓은 말 → 별명, 별칭'},
{n:2007,w:'babble',m:'v. (어린이 등이) 더듬거리며 말하다; 중얼중얼 지껄이다',s:'gibber, chatter, prate',r:'의성어(어린아이가 입술을 부딪치며 내는 소리) → 아직 말을 못 하는 아기처럼 뜻을 알 수 없는 말로 쉴 새 없이 지껄이다 → 더듬거리며 말하다'},
{n:2008,w:'community',m:'n. ① (지역) 사회, (지역) 공동체; 지역 공동체에 사는 주민 ② 공동, 공유 ③ 공통, 공통성; 유사성',s:'share, commonness, likeness, similarity',r:'라틴어 communis(공동의, 공통의) + -ity → 특정 지역을 공유하며 가치관과 자원을 공통으로 나누며 살아가는 집단 → 지역 사회, 공동체'},
{n:2009,w:'slough',m:'n. ① 진창, 진구렁, 수렁, 늪, 습지 ② (뱀 등의) 허물; 썩은 살, 딱지 / v. ① (습지 등에) 빠지다, 탈피하다; 허물',s:'mire, mud, quagmire, sludge, cast-off skin, scab',r:'고대 영어 sloh(진창) / 중세 영어 slouh(뱀의 껍질) → 발이 푹푹 빠지는 더러운 진흙구렁 / 뱀이 허물을 벗다 → 진창, 허물, 탈피하다'},
{n:2010,w:'indubitable',m:'a. 의심의 여지가 없는, 확실[명백]한',s:'certain, evident, sure, unquestionable',r:'라틴어 in-(not) + dubitare(의심하다) + -able → 증거나 사실이 너무 명백하여 티끌만 한 의심조차 끼어들 여지가 없는 → 의심의 여지가 없는, 확실한'},
{n:2011,w:'divest',m:'vt. ① (옷을) 벗기다[of] ② 빼앗다, 박탈하다[of]',s:'strip, unclothe, undress, deprive, despoil, dispossess, rob',r:'라틴어 dis-(분리) + vestire(옷을 입히다) → 몸에 입고 있던 옷을 거칠게 벗기거나, 쥐고 있던 권력과 재산을 강제로 빼앗다 → 옷을 벗기다, 박탈하다'},
{n:2012,w:'carping',m:'a. 흠잡는, 잔소리하는',s:'captious, fault-finding',r:'라틴어 carpere(따다, 비방하다) → 과일을 따듯 남의 사소한 잘못만 꼬치꼬치 짚어내어 트집을 잡고 불평하는 → 흠잡는, 잔소리하는'},
{n:2013,w:'seam',m:'n. ① (천 등의) 솔기; (판자 등의) 이음매, 접합선 ② <해부> 봉합선; (얼굴의) 주름살 / v. 이어[꿰매어] 맞추다; ~에 솔기를 대다',s:'suture, wrinkle',r:'고대 영어 seam(바느질) → 천과 천을 실로 꿰매어 이었을 때 생기는 뚜렷한 접합선이나 얼굴의 깊게 팬 주름살 → 솔기, 이음매, 주름살'},
{n:2014,w:'portentous',m:'a. 전조(前兆)의; 불길한, 흉조의',s:'ominous, sinister',r:'라틴어 pro-(앞으로) + tendere(뻗다) → 무섭고 불길한 일이 일어날 것을 경고하며 미래를 향해 어둡게 뻗어 있는 기운 → 전조의, 불길한'},
{n:2015,w:'revenge',m:'n. 보복, 복수, 앙갚음; 원한, 복수심 / v. (재귀용법 또는 수동태) ~에게 원수를 갚다, 앙갚음[복수]하다',s:'reprisal, retaliation, vengeance, avenge, retaliate',r:'고대 프랑스어 revengier(보복하다) → 자신이 억울하게 입은 피해와 고통을 마음속에 담아두었다가 적에게 똑같이 갚아주다 → 보복, 복수하다'},
{n:2016,w:'extinction',m:'n. ① (생물 등의) 멸종, 사멸; (정열·권리 등의) 소멸, 소실 ② (불 등의) 끄기, 소화(消化), 소등(消燈)',s:'annihilation, extinguishing',r:'라틴어 ex-(완전히) + stinguere(불을 끄다) → 타오르던 생명의 불꽃이나 맹렬하던 불길에 물을 부어 완전히 꺼버림 → 멸종, 사멸, 소화(消火)'},
{n:2017,w:'fringe',m:'n. ① 가장자리, 변두리, 주변 ② (경제·사회·정치 등의) 비주류, 주류(主流)에서의 이탈자 / a. 부수적인; (중요성 따위가) 2차적인',s:'border, edge, margin, outskirts, verge, collateral, incidental, subsidiary',r:'라틴어 fimbria(술장식, 가장자리) → 옷감의 가장자리 테두리처럼 중심에서 밀려나 있는 사회의 비주류나 덜 중요한 것 → 가장자리, 비주류, 부수적인'},
{n:2018,w:'bespoke',m:'a. 개인 주문에 따라 맞춘; 맞춤 생산을 하는',s:'custom-made, tailor-made',r:'영어 bespeak(미리 주문하다)의 과거분사 → 대량 기성품이 아니라 고객이 자기 취향을 미리 말해서(주문해서) 특별히 만든 → 맞춤 생산을 하는'},
{n:2019,w:'misnomer',m:'n. 잘못된 명칭, 오칭(誤稱)',s:'',r:'고대 프랑스어 mes-(잘못된) + nomer(이름 짓다) → 사물이나 사람의 본질과 전혀 맞지 않게 엉뚱하고 잘못 붙여진 이름 → 잘못된 명칭, 오칭'},
{n:2020,w:'graze',m:'v. ① (소나 양이) 풀을 뜯어먹다; 방목하다 ② 가벼운 식사를 하다, 간식을 먹다',s:'pasture, snack',r:'고대 영어 grasian(풀을 먹다) → 소나 양 떼가 널따란 들판을 돌아다니며 풀을 뜯어 먹거나, 사람이 가볍게 간식을 주워 먹다 → 풀을 뜯어먹다, 간식을 먹다'},
{n:2021,w:'tithe',m:'n. ① (종종 pl.) (교회의) 십일조(十一租) (헌금); 10분의 1세(稅) ② 10분의 1; <부정문에서> 조금도 ~않는',s:'',r:'고대 영어 teotha(열 번째) → 고대부터 사람들이 신이나 교회를 위해 자기 소득의 정확히 10분의 1을 떼어 바치던 종교적 헌금 → 십일조, 10분의 1'},
{n:2022,w:'intertwine',m:'v. ① 뒤얽히다, 엮다, 엮이다, 얽어 짜다 ② 밀접하게 관련지우다',s:'entwine, interlace, interweave, interrelate',r:'라틴어 inter-(서로) + 영어 twine(꼬다) → 여러 가닥의 실이나 사람들의 운명이 떼어낼 수 없을 정도로 복잡하게 얽히고설키다 → 얽히다, 밀접하게 관련지우다'},
{n:2023,w:'compunction',m:'n. 양심의 가책; 뉘우침, 후회',s:'penitence, qualm, regret, remorse, repentance',r:'라틴어 com-(강조) + pungere(찌르다) → 자신이 저지른 잘못 때문에 양심이 날카로운 바늘에 찔린 듯이 몹시 아프고 괴로운 상태 → 양심의 가책, 뉘우침'},
{n:2024,w:'delirious',m:'a. ① 의식이 혼미한, 헛소리하는, (일시적) 정신착란의 ② 좋아서 어쩔 줄 모르는, 기뻐 날뛰는',s:'crazy, demented, insane, ecstatic, rapt',r:'라틴어 de-(벗어난) + lira(고랑) → 농부가 밭고랑을 이탈하듯 정신이 궤도를 벗어나 헛소리를 하거나 미친 듯이 기뻐 날뛰는 → 의식이 혼미한, 기뻐 날뛰는'},
{n:2025,w:'vicissitude',m:'n. ① 변화, 변천 ② (pl.) (인생·운명·처지 등의) 흥망, 성쇠, 부침(浮沈), 우여곡절',s:'change, mutation',r:'라틴어 vicissis(변화, 교대) → 인간의 삶이나 제국의 운명이 파도처럼 교대하며 끊임없이 오르락내리락 흥하고 망하는 과정 → 변화, 흥망, 부침'},
{n:2026,w:'jeremiad',m:'n. (장황한) 넋두리, 푸념, 한탄, 비탄',s:'lamentation, whine',r:'구약성서 선지자 예레미야(Jeremiah) → 예루살렘의 멸망을 보며 눈물로 슬퍼한 선지자 예레미야의 긴 애가와 한탄 → 장황한 넋두리, 푸념'},
{n:2027,w:'curse',m:'v. ① 저주하다 ② 욕설을 퍼붓다, 악담[모독]하다 / n. ① 저주; 악담, 욕설; 저주의 말 ② 천벌, 벌; 재해, 화(禍), 불행',s:'anathematize, damn, execrate, imprecate, abuse, blaspheme, cuss, revile, swear, malediction, oath, affliction, bane, plague, scourge',r:'고대 영어 cursian(저주하다) → 신에게 남이 불행해지길 빌거나 끔찍한 악담을 퍼붓는 행위, 혹은 그로 인해 내리는 재앙과 천벌 → 저주하다, 욕설, 악담'},
{n:2028,w:'orotund',m:'a. ① 성량이 풍부한, 낭랑하게 울리는 ② (문체·말투가) 뽐내는, 과장된',s:'resonant, resounding, sonorous, bombastic, ostentatious, pompous',r:'라틴어 os(입) + rotundus(둥근) → 입을 크고 둥글게 벌려 낭랑하고 풍부한 소리를 내거나, 글의 표현을 지나치게 뽐내며 과장한 → 성량이 풍부한, 과장된'},
{n:2029,w:'lagoon',m:'n. 석호, lagoon; (강·호수와 이어지는) 작은 늪, 석호(潟湖)',s:'bog, marsh, swamp, tideland',r:'라틴어 lacuna(웅덩이, 빈 곳) → 바다나 강과 모래톱으로 분리되어 물이 잔잔하게 고여 있는 얕고 아름다운 짠물 호수나 늪 → 석호'},
{n:2030,w:'outstrip',m:'vt. ① (크기·중요성 등에서 ~을) 앞지르다 ② (경쟁 상대를) 능가하다[앞서다] ③ (경주에서 남을) 앞지르다',s:'exceed, excel, outdo, surpass',r:'영어 out-(넘어서) + strip(빠르게 움직이다) → 달리기 경주나 경쟁에서 남들보다 훨씬 빨리 달려 경쟁자를 완전히 따돌리고 앞서다 → 앞지르다, 능가하다'},
{n:2031,w:'isotope',m:'n. <화학> 동위 원소, 동위체',s:'',r:'그리스어 isos(같은) + topos(장소) → 원소 주기율표에서 위치(장소)는 똑같이 차지하지만 원자량이 서로 다른 화학 원소 → 동위 원소'},
{n:2032,w:'dwarf',m:'n. ① 난쟁이 ② <천문학> 왜성(矮星) / a. 왜소한; 소형의',s:'homunculus, Lilliputian, midget, pygmy, diminutive, miniature, small, tiny',r:'고대 영어 dweorg(난쟁이) → 전설 속의 키 작은 요정처럼 사람이나 천체의 크기가 비정상적으로 작게 자란 → 난쟁이, 왜성, 왜소한'},
{n:2033,w:'transitory',m:'a. 일시적인, 덧없는, 무상한',s:'fleeting, momentary, transient',r:'라틴어 trans-(가로질러) + ire(가다) → 한곳에 영원히 머물지 않고 눈앞을 휙 가로질러 지나가 버려 무상한 → 일시적인, 덧없는'},
{n:2034,w:'spine',m:'n. ① 척추, 등뼈 ② 가골, 근성',s:'backbone, vertebra, fortitude, perseverance, tenacity',r:'라틴어 spina(가시, 등뼈) → 몸의 뼈대를 꼿꼿이 지탱하는 뾰족한 척추, 또는 어떤 위기 앞에서도 꺾이지 않는 강한 끈기 → 척추, 등뼈, 근성'},
{n:2035,w:'expropriate',m:'vt. ① (사유재산을 공공용으로) 수용(收用)하다, 강제로 사들이다 ② (남으로부터 물건의) 소유권을 빼앗다, 몰수하다',s:'appropriate, commandeer, confiscate, dispossess, seize',r:'라틴어 ex-(밖으로) + proprius(자신의 것) → 개인이 소유하고 있던 재산이나 땅을 국가가 공공 목적으로 강제로 빼앗다 → 수용하다, 몰수하다'},
{n:2036,w:'aliment',m:'n. ① 자양물, 영양물; 음식물 ② 부조(扶助); 지재[지지] / vt. 자양물을 주다; 지재[지원]하다',s:'nourishment, nutriment, food, victuals, sustain, support',r:'라틴어 alere(기르다, 영양을 주다) → 생명체가 몸을 기르고 튼튼히 유지하는 데 필수적인 음식물이나 정서적 지원 → 자양물, 영양물, 지지하다'},
{n:2037,w:'grouch',m:'n. ① 불평이 많은 사람; 불평분자 ② (하찮은 것에 대한) 불평',s:'complainer, malcontent, complaint, gripe, grouse, grumbling',r:'고대 프랑스어 grouchier(투덜거리다) → 매사에 불만이 가득 차서 사소한 일에도 인상을 찌푸리며 쉴 새 없이 툴툴대는 사람 → 불평이 많은 사람, 불평'},
{n:2038,w:'foretell',m:'v. ① 예언하다; 예고하다 ② 예시하다; ~의 전조(前兆)가 되다',s:'predict, prophesy, portend, signify',r:'영어 fore-(미리) + tell(말하다) → 미래에 닥칠 중대한 사건이나 조짐을 사람들에게 남보다 한발 앞서 말하여 알려주다 → 예언하다, 예고하다'},
{n:2039,w:'brethren',m:'n. (pl.) (종교상의) 형제, 같은 신자; 조합원, 동업자; 동포',s:'',r:'brother의 고어 복수형(brothren)의 변형 → 한 핏줄을 나눈 형제뿐만 아니라 종교나 조합 안에서 형제처럼 끈끈하게 엮인 동지들 → 형제, 같은 신자, 동포'},
{n:2040,w:'disable',m:'vt. ① (신체에) 장애를 입히다, 장애자로 만들다 ② 무능력하게 하다, ~을 ...하지 못하게 하다',s:'cripple, impair, incapacitate',r:'영어 dis-(not) + able(할 수 있는) → 끔찍한 사고나 병으로 인해 신체나 기계의 정상적인 기능을 완전히 못하게 만들어버리다 → 장애를 입히다, 무능력하게 하다'},
{n:2041,w:'wry',m:'a. ① 비뚤어진, 뒤틀린 ② (얼굴 등이) 찌푸린, 찡그린 ③ 심술궂은, 심보가 사나운',s:'distorted, frowning, screwed-up, ill-natured',r:'고대 영어 wrigian(구부러지다) → 기분이 나빠 얼굴 근육을 심하게 비틀며 찡그리거나, 마음씨가 곧지 못하고 삐딱하게 고약한 → 비뚤어진, 찡그린, 심술궂은'},
{n:2042,w:'chafe',m:'v. ① 몸을 비비다, 쓸리다 ② 신경질 나다, 안달하다 ③ (손 따위를) 비비다, 비벼서 따뜻하게 하다',s:'abrade, rub, irritate',r:'고대 프랑스어 chaufer(데우다) → 추울 때 손을 비벼 열을 내거나, 거친 천이 살갗에 계속 쓸려 신경질 나고 초조하게 만들다 → 쓸리다, 비비다, 안달하다'},
{n:2043,w:'rape',m:'n. ① 강간 ② 강탈, 약탈; (자연의) 파괴 / vt. 강간하다',s:'assault, violation, depredation, despoliation, pillage, rapine, outrage, ravish, violate',r:'라틴어 rapere(강제로 낚아채다) → 무자비한 폭력으로 여성을 제압해 순결을 빼앗거나 재산을 잔인하게 파괴하고 털어가는 짓 → 강간, 약탈'},
{n:2044,w:'matriarch',m:'n. ① 여가장(女家長), 여족장; 가장의 아내 ② (단체 등의) 여성 창설자; 위엄 있는 노부인',s:'matron',r:'라틴어 mater(어머니) + 그리스어 arkhein(지배하다) → 지혜롭고 권위 있는 여성이 집안이나 부족의 중심에 서서 가부장 대신 다스리는 자 → 여가장, 여성 창설자'},
{n:2045,w:'surreptitious',m:'a. 내밀한, 비밀의, 은밀한',s:'clandestine, covert',r:'라틴어 sub-(아래에서) + rapere(훔치다) → 남들의 시선을 피해 어두운 탁자 밑에서 몰래 무언가를 가로채거나 비밀스럽게 벌이는 일 → 내밀한, 은밀한'},
{n:2046,w:'adulterate',m:'v. ① (음식이나 음료에) 불순물을 섞다, 석을질하다 ② (나쁜 것을 섞어) 품질을 떨어뜨리다 / a. ① 섞음질한, 불순물을 섞은 ② 불륜의, 간통의',s:'debase, degrade, deteriorate, adulterous, unfaithful',r:'라틴어 ad-(~로) + alter(다른) → 순수하고 질 좋은 것에 불순한 다른 것을 몰래 섞어 가치를 떨어뜨리거나 결혼의 순결을 더럽히는 → 불순물을 섞다, 불륜의'},
{n:2047,w:'varnish',m:'n. ① 니스; 유약(釉藥) ② 겉치레, 겉꾸미기, 허식, 눈가림 / vt. ① ~에 니스를 칠하다; ~의 윤[광택]을 내다 ② ~에 겉을 꾸미다, 눈가림하다',s:'gloss, luster, glaze, polish, embellish, gild, gloss, lacquer',r:'중세 라틴어 veronix(향기로운 수지) → 가구나 그림 표면에 발라 반짝이는 광택을 내며, 비유적으로 썩은 속을 감추려 겉을 번지르르하게 꾸밈 → 니스, 겉치레, 눈가림하다'},
{n:2048,w:'connubial',m:'a. 결혼(생활)의, 부부의',s:'conjugal, marital, matrimonial, nuptial',r:'라틴어 con-(함께) + nubere(결혼하다, 베일을 쓰다) → 신부가 베일을 쓰고 식을 올린 후 평생을 함께하기로 서약한 부부 관계에 속하는 → 결혼의, 부부의'},
{n:2049,w:'prognosticate',m:'v. ① (전조에 의해) 예지하다, 예언[예측]하다 ② ~의 징후를 보이다',s:'forecast, foretell, predict, forebode, foreshadow, indicate, presage',r:'그리스어 pro-(미리) + gignoskein(알다) → 현재 나타난 징후나 데이터를 분석하여 앞으로 다가올 질병의 경과나 미래의 결과를 알아내다 → 예지하다, 징후를 보이다'},
{n:2050,w:'ethereal',m:'a. ① 공기 같은; 가벼운 ② 천상의, 하늘의 ③ 아주 우아한, 절묘[영묘]한 ④ 무형의',s:'aerial, airy, celestial, heavenly, supernal, delicate, exquisite, insubstantial, intangible',r:'그리스어 aither(상층의 맑은 공기) → 무거운 흙먼지가 아닌 하늘 높이 떠 있는 가벼운 공기처럼 섬세하고 천상의 우아함을 지닌 → 공기 같은, 천상의, 우아한'},
{n:2051,w:'considerate',m:'a. 동정심 많은, 인정이 있는, 사려 깊은',s:'attentive, prudent, sympathetic, thoughtful',r:'라틴어 considerare(깊이 살피다) → 자신의 행동이 상대에게 미칠 영향을 깊이 숙고하고 타인의 아픔에 세심히 배려하며 마음을 쓰는 → 사려 깊은, 동정심 많은'},
{n:2052,w:'hone',m:'vt. (기술 등을) 갈다, 연마하다; 날카롭게 갈다',s:'grind, polish, sharpen, whet',r:'고대 영어 han(숫돌) → 무뎌진 칼날을 거친 숫돌에 대고 슥슥 갈아 아주 날카롭게 벼리듯 사람의 기술이나 능력을 완벽하게 다듬다 → 갈다, 연마하다'},
{n:2053,w:'interregnum',m:'n. ① (국왕·원수 등의) 궐위(闕位) 기간, 군주 부재 기간, 정치 공백 기간 ② (일반적으로) (연속성의) 단절[공백](기간)',s:'hiatus',r:'라틴어 inter-(사이에) + regnum(왕권, 통치) → 전임 군주가 죽고 다음 군주가 왕관을 쓸 때까지 최고 권력자가 비어 있는 위험한 공백 기간 → 군주 부재 기간, 공백'},
{n:2054,w:'substantiate',m:'vt. 실체화[구체화]하다; 확증[입증]하다',s:'affirm, confirm, corroborate, verify',r:'라틴어 substantia(실체, 본질) + -ate(동사) → 구름 잡는 소리 같은 막연한 주장에 확실한 증거와 뼈대를 입혀 눈에 보이는 진짜 실체로 입증해 내다 → 실체화하다, 확증하다'},
{n:2055,w:'binding',m:'a. 속박[구속]하는; 구속력 있는, 의무를 지우는',s:'compulsory, mandatory, obligatory',r:'영어 bind(묶다) + -ing(형용사) → 밧줄로 꽁꽁 묶은 것처럼, 법률이나 계약이 사람의 행동을 옴짝달싹 못 하게 강력한 의무로 묶어놓은 → 구속력 있는, 의무를 지우는'},
{n:2056,w:'duly',m:'ad. ① 정식으로, 정당하게, 적절한 절차에 따라 ② 제시간에, 때에 알맞게; 기일[시간]대로',s:'properly, punctually',r:'프랑스어 deu(지불해야 할, 마땅한) + -ly(부사) → 법이나 절차가 요구하는 마땅하고 적절한 과정을 거치거나 약속된 시간에 한 치의 오차도 없이 맞추어 → 정식으로, 기일대로'},
{n:2057,w:'communism',m:'n. 공산주의',s:'',r:'라틴어 communis(공동의, 공통의) + -ism(주의) → 모든 재산과 생산 수단을 개인이 갖지 않고 사회 전체가 공동으로 소유하고 나누어 쓰자는 거대한 사상 → 공산주의'},
{n:2058,w:'inveterate',m:'a. ① (나쁜 감정·습관이) 뿌리 깊은 ② (사람이) 상습적인, 버릇이 된',s:'deep-rooted, deep-seated, ingrained, chronic, compulsive, habitual, hardened',r:'라틴어 in-(안으로) + vetus(오래된) → 나쁜 감정이나 못된 버릇이 마음과 몸 안으로 깊숙이 뿌리를 내려 고칠 수 없게 굳어버린 → 뿌리 깊은, 상습적인'},
{n:2059,w:'platitudinous',m:'a. 시시한 말을 하는, 평범한, 진부한',s:'banal, commonplace, mediocre',r:'프랑스어 platitude(평범, 밋밋함) + -ous → 톡톡 튀는 신선함이라고는 전혀 없이 누구나 다 아는 납작하고 지루한 소리만 늘어놓아 하품이 나오는 → 진부한, 시시한 말을 하는'},
{n:2060,w:'revision',m:'n. ① 개정, 수정 ② 검토; 변경',s:'amendment, correction, modification, re-examination, alteration',r:'라틴어 re-(다시) + visere(보다) → 이미 쓰인 글이나 정해진 법안을 다시 눈을 크게 뜨고 꼼꼼히 살펴서 잘못된 부분을 고쳐 쓰는 작업 → 개정, 수정, 검토'},
{n:2061,w:'extricate',m:'vt. (위험·곤경에서) 구출하다, 탈출시키다, 해방시키다',s:'free, liberate, rescue',r:'라틴어 ex-(밖으로) + tricae(복잡한 방해물) → 사람의 발목을 꽉 잡고 있는 덫이나 끔찍한 곤경의 그물에서 안전하게 빼내어 자유롭게 풀어주다 → 구출하다, 해방시키다'},
{n:2062,w:'mettle',m:'n. 기개, 용기, 열의, 패기',s:'courage, grit, spirit',r:'영어 metal(금속)의 철자 변형 → 불 속에서 벼려진 금속처럼 어떤 고난과 위기 앞에서도 절대 꺾이거나 굽히지 않는 마음속의 굳센 기개와 용기 → 기개, 용기, 패기'},
{n:2063,w:'firm',m:'a. ① 굳은, 단단한, 튼튼한, 견고한 ② (장소에) 고정된, 흔들리지 않는 ③ (신념·주의 등이) 변치 않는, 확고한, 단호한 / n. 상사(商社), 상회, 회사',s:'hard, solid, fixed, secure, strong, adamant, determined, resolute, business, company',r:'라틴어 firmus(튼튼한, 굳은) → 바위처럼 흔들림 없이 굳게 고정된 신념이거나, 신용을 바탕으로 탄탄하게 세워진 상업적 조직 → 굳은, 확고한, 회사'},
{n:2064,w:'tract',m:'n. ① 지역, 지대 ② 소책자, 소논문 ③ (생물의) 관(管), ~계(系)',s:'area, district, booklet, essay, treatise',r:'라틴어 tractus(끌어당김, 뻗음) → 넓게 한없이 뻗어 있는 커다란 땅이나 몸속에서 소화물이 지나가는 관, 혹은 특정 주제를 다룬 종교 소책자 → 지역, 관, 소책자'},
{n:2065,w:'browbeat',m:'vt. 위협하다, 협박하다; 위협하여 ~하게 하다',s:'intimidate, menace, threaten',r:'영어 brow(눈썹) + beat(때리다) → 눈썹을 무섭게 치켜올리고 험악한 표정으로 당장이라도 때릴 듯이 강압적으로 윽박질러 상대방을 덜덜 떨게 만들다 → 위협하다, 협박하다'},
{n:2066,w:'ensign',m:'n. ① (선박·비행기의 국적을 나타내는) 기; 국기 ② 기장; 상징, 표장',s:'banner, colors, flag, standard, badge, emblem, insignia, symbol',r:'라틴어 in-(안에) + signum(표시) → 배나 비행기가 어느 나라나 부대에 속해 있는지 멀리서도 알 수 있게 깃발 안에 선명하게 그려 넣은 마크 → 기(국기), 상징, 표장'},
{n:2067,w:'swallow',m:'v. ① (음식 등을) 삼키다, (목구멍으로) 넘기다 ② (사실로) 받아들이다, 믿다 / n. ① 제비 ② 한 모금, 한 입',s:'gulp, ingest, swig, accept, adopt, believe, embrace',r:'고대 영어 swelgan(삼키다) → 입안의 음식물을 목구멍 밑으로 꿀꺽 넘기거나, 터무니없는 거짓말조차도 묻지 않고 사실인 양 속아 넘어가 주다 → 삼키다, 받아들이다, 제비'},
{n:2068,w:'grimace',m:'n. 찌푸린 얼굴[표정], 우거지상 / vi. 얼굴을 찡그리다',s:'frown, scowl',r:'프랑스어 grimace(우스꽝스러운 표정) → 심한 고통이나 불쾌한 기분 때문에 자신도 모르게 얼굴 근육을 심하게 일그러뜨려 잔뜩 찡그린 모습 → 찌푸린 얼굴, 찡그리다'},
{n:2069,w:'array',m:'vt. ① 정렬시키다, 배열[배치]하다 ② 치장하다, 차려 입히다 / n. 배열; 열거, 줄 지어 있는 것들; 치장',s:'arrange, dispose, line up, range, attire, dress',r:'고대 프랑스어 areer(정돈하다, 준비하다) → 군대를 전투 상황에 맞게 쫙 줄지어 배치하거나, 사람의 몸에 화려하고 아름다운 옷을 정성껏 차려 입히다 → 정렬시키다, 치장하다'},
{n:2070,w:'unremitting',m:'a. (노력 등이) 끊임없는, 부단한, 그칠 사이 없는',s:'ceaseless, constant, continual, incessant',r:'라틴어 un-(not) + re-(뒤로) + mittere(보내다, 늦추다) → 긴장이나 땀 흘리는 노력을 단 1초도 늦추지 않고 뒤로 물러서지 않으며 끈질기게 계속 밀어붙이는 → 끊임없는, 부단한'},
{n:2071,w:'puncture',m:'n. 타이어에 난 펑크, (뾰족한 것에 찔려서 생긴) 구멍[상처] / v. ① 펑크[구멍]를 내다; 펑크[구멍]가 나다 ② (자신감 등을) 상하게 하다',s:'bore, pierce, prick, dash, deflate, discourage',r:'라틴어 punctura(찌름) → 날카로운 못이 찔러서 타이어에 구멍을 내거나, 빵빵하게 부풀어 올랐던 남의 자만심을 푹 찔러 상처 입히고 바람을 빼버리다 → 펑크, 구멍을 내다'},
{n:2072,w:'attainment',m:'n. ① 달성, 도달 ② (보통 pl.) 위업, 공적 ③ 학식, 재능',s:'accomplishment, achievement, fulfillment',r:'라틴어 ad-(~에) + tangere(닿다) → 수많은 역경 끝에 원하던 높은 목표점에 마침내 도달하여 손으로 거머쥔 위대한 성과나 뛰어난 지식 → 달성, 위업, 학식'},
{n:2073,w:'rabid',m:'a. ① 과격한, 난폭한, 맹렬한 ② 광견병에 걸린',s:'fanatical, frenzied, furious',r:'라틴어 rabere(미치다, 날뛰다) → 광견병 바이러스에 걸린 개처럼 거품을 물고 통제 불능으로 맹렬히 날뛰거나, 특정 사상에 이성을 잃고 맹목적으로 집착하는 → 과격한, 광견병에 걸린'},
{n:2074,w:'probity',m:'n. 정직, 성실',s:'honesty, morality, rectitude',r:'라틴어 probus(올바른, 좋은) + -ity → 뇌물이나 어떠한 치명적인 유혹 앞에서도 조금도 흔들림 없이 바르고 깨끗하게 양심을 지키는 훌륭한 성품 → 정직, 성실'},
{n:2075,w:'itch',m:'n. ① 가려움 ② 참을 수 없는 욕망, 갈망; 정욕, 색욕 / v. ① 가렵다[가립게 하다] ② ~하고 싶어서 몸이 쑤시다, 근질거리다',s:'itchiness, pruritus, craving, desire, longing, lust',r:'고대 영어 giccan(가렵다) → 피부가 견딜 수 없이 가려워 긁고 싶거나, 무언가를 간절하게 손에 넣고 싶어서 마음속 욕망이 근질거리며 솟구치는 상태 → 가려움, 갈망, 근질거리다'},
{n:2076,w:'census',m:'n. (통계) 조사; 인구조사, 국제조사',s:'',r:'라틴어 censere(평가하다, 등록하다) → 고대 로마 시대부터 국가가 세금과 군대를 위해 백성들의 머릿수와 재산 규모를 철저히 조사하고 명부에 올리던 행사 → 통계 조사, 인구조사'},
{n:2077,w:'wily',m:'a. 교활한, 약삭빠른, 술책[농간]을 부리는',s:'crafty, cunning, shrewd, sly',r:'영어 wile(속임수) + -y(형용사) → 자신이 원하는 것을 얻으려고 뱀처럼 머리를 교묘하게 굴려 남을 함정에 빠뜨리거나 등쳐먹는 능란한 속임수를 쓰는 → 교활한, 약삭빠른'},
{n:2078,w:'accolade',m:'n. ① 칭찬, 포상; 영예 ② 나이트(knight) 작위 수여(식)',s:'applause, compliment, honor, kudos, laurels',r:'프랑스어 ad-(~에) + collum(목) → 중세 시대 기사 작위를 내릴 때 왕이 기사의 목을 껴안고 어깨를 칼등으로 가볍게 치며 축하하던 최고의 영예 → 칭찬, 나이트 작위 수여'},
{n:2079,w:'depress',m:'vt. ① 우울하게 하다, 낙담시키다 ② 불경기로 만들다; (시세 등을) 하락시키다',s:'deject, discourage, dispirit, sadden, depreciate, diminish, lower',r:'라틴어 de-(아래로) + premere(누르다) → 무거운 쇳덩이가 사람의 기분을 바닥으로 짓눌러 끝 모를 우울감에 빠뜨리거나 활기차던 물가 시세를 폭락시키다 → 우울하게 하다, 하락시키다'},
{n:2080,w:'xenophobia',m:'n. 외국인 혐오증, 외국 혐오',s:'',r:'그리스어 xenos(이방인) + phobia(공포증) → 자기 나라 사람이 아닌 낯선 외국 사람이나 이국 문화에 대해 뚜렷한 이유 없이 극도로 느끼는 병적인 혐오감 → 외국인 혐오증'},
{n:2081,w:'virile',m:'a. 남자다운, 남성적인, 강건한, 씩씩한',s:'manly, masculine, robust',r:'라틴어 vir(남자) + -ile(형용사 접미사) → 어리고 나약한 소년이 아니라 건장한 뼈대와 억센 근육을 가지고 생명력이 펄펄 넘쳐나는 성인 남성 특유의 기운 → 남자다운, 씩씩한'},
{n:2082,w:'proceeds',m:'n. (거래·투자 등에 의한) 수입, 수익',s:'income, profit, revenue, yield',r:'라틴어 pro-(앞으로) + cedere(가다) → 사업이나 힘든 거래가 앞으로 계속 진행된 결과로서 마침내 자기 수중에 차곡차곡 떨어져 들어오는 돈이나 이익 → 수입, 수익'},
{n:2083,w:'chasten',m:'vt. ① 징계하다, (산역경이 인간을) 단련시키다 ② (열정 따위를) 억제하다, 누그러뜨리다',s:'discipline, subdue',r:'라틴어 castigare(순수하게 만들다) → 잘못을 저지른 사람에게 엄한 벌과 시련을 주어 마음의 불순물을 빼고 단련시키거나, 거친 열정을 꾹 눌러 가라앉히다 → 징계하다, 단련시키다'},
{n:2084,w:'stricture',m:'n. ① (주로 pl.) (특히 남의 행동에 대한) 심한 비난[혹평] ② (행동에 대한) 제한[구속, 제약]',s:'censure, restriction',r:'라틴어 stringere(단단히 묶다) → 잘못된 행동을 밧줄로 꽁꽁 묶어 숨통을 조이듯 혹독하게 꼬집어 비난하거나, 법의 테두리로 옴짝달싹 못 하게 가하는 제약 → 심한 비난, 제한'},
{n:2085,w:'coalition',m:'n. ① 합동, 연합 ② (정치적인) 제휴, 연립',s:'alliance, bloc, union',r:'라틴어 co-(함께) + alescere(자라다) → 이익과 목적을 위해 서로 다투던 여러 정치 정당이나 세력이 덩치를 키우려고 하나로 합쳐 거대하게 뭉친 연합체 → 합동, 연립'},
{n:2086,w:'routine',m:'n. ① 판에 박힌 일, 일상의 과정[일] ② 기계적인 순서[일, 습관] / a. 판에 박힌, 일상적인',s:'habitual, ordinary, regular, usual',r:'프랑스어 route(길) + -ine(명사 접미사) → 매일 아침 눈 떠서 나 있는 뻔한 길을 기계처럼 똑같이 밟고 지나가는 특별할 것 없는 지루한 일상의 과정 → 판에 박힌 일, 일상적인'},
{n:2087,w:'mold',m:'n. ① 형(型), 모형, 금형, 주형(주형), 틀, 거푸집 ② 곰팡이 / v. 틀에 넣어 만들다, 주조하다',s:'fungus, mildew, must, coin, found, mint',r:'라틴어 modulus(작은 척도) / 노르드어 mugga(안개) → 뜨거운 쇳물이나 부드러운 흙을 부어 물건의 모양을 찍어내는 틀이나 오래 방치된 음식에 피어나는 곰팡이 → 형(틀), 곰팡이'},
{n:2088,w:'dissection',m:'n. ① 해체, 해부 ② 정밀한 분석[조사]',s:'anatomy, autopsy, necropsy, postmortem, analysis, examination, inspection, scrutiny',r:'라틴어 dis-(따로따로) + secare(자르다) → 동물의 사체를 해부대 위에 놓고 메스로 각 부위를 세밀하게 잘라내어 그 내부 구조를 아주 정밀하고 체계적으로 파헤치는 일 → 해체, 정밀한 분석'},
{n:2089,w:'evangelical',m:'a. 복음의, 복음 전도의',s:'',r:'그리스어 eu-(좋은) + angelion(소식) → 기독교에서 예수의 구원이라는 기쁘고 좋은 소식(복음)을 마음속 깊이 믿고 이를 세상 사람들에게 열정적으로 전파하려는 → 복음의, 복음 전도의'},
{n:2090,w:'lyric',m:'n. ① 서정시 ② (pl.) (노래나 뮤지컬의) 가사',s:'open, libretto, words',r:'그리스어 lyrikos(리라를 위한) → 고대 그리스 시대에 하프를 닮은 수금(리라)을 퉁기며 개인의 슬픔이나 사랑 같은 절절한 감정을 곡조에 맞춰 노래하듯 읊었던 시 → 서정시, 가사'},
{n:2091,w:'outlaw',m:'vt. ① 불법화하다, 금지하다 ② 사회에서 매장[추방]하다 / n. 무법자, 상습범; 사회에서 버림받은 사람',s:'ban, criminalize, forbid, illegalize, prohibit, banish, ostracize, bandit, criminal',r:'고대 영어 ut-(밖으로) + lagu(법) → 살인 같은 끔찍한 죄를 지어 국가의 법적 보호망 바깥으로 쫓겨나 함부로 해쳐도 죄가 되지 않게 된 흉악한 범죄자 → 무법자, 불법화하다'},
{n:2092,w:'brook',m:'n. 개울, 시내 / vt. (주로 부정문) 참다, 견디다',s:'creek, rivulet, stream, bear, endure, tolerate',r:'고대 영어 broc(작은 냇물) / brucan(사용하다, 견디다) → 깊은 산속에서 졸졸 맑게 흐르는 시냇물이거나, 굴욕적이고 힘든 상황을 속으로 꾹꾹 억누르며 참고 견뎌내는 것 → 개울, 참다'},
{n:2093,w:'noted',m:'a. 저명한, 유명한',s:'celebrated, distinguished, famous, eminent, prominent',r:'라틴어 notare(표시하다) → 평범한 사람들과 달리 뛰어난 업적이나 비상한 재능 덕분에 사람들의 기억 속에 특별하게 별표가 쳐져 있어 누구나 이름만 대면 다 아는 → 저명한, 유명한'},
{n:2094,w:'coterie',m:'n. ① (공통의 목적·취미를 갖는) 동료, 친구; (문에 등의) 동인(동인) ② (예술가 등의) 서클, 동아리, 그룹, 집단',s:'circle, group, set',r:'프랑스어 coterie(소작농 조합) → 영지를 함께 빌려 농사짓던 무리에서 유래하여, 비슷한 예술적 취향이나 목적을 가진 사람들이 똘똘 뭉쳐 배타적으로 교류하는 모임 → 동료, 동아리'},
{n:2095,w:'solvent',m:'a. ① 자불능력이 있는, 상환능력이 있는 ② 녹이는, 용해력이 있는, 용해되는 / n. ① 용제, 용액 ② 해답, 해결책',s:'dissolvent, resolvent, soluble, remedy, solution',r:'라틴어 solvere(풀다, 녹이다) → 나를 짓누르던 산더미 같은 부채를 깨끗하게 다 갚아버릴 돈이 있거나, 굳은 고체 물질을 물처럼 스르르 녹여버릴 수 있는 화학 액체 → 지불 능력이 있는, 용제'},
{n:2096,w:'thirst',m:'n. ① 갈증, 목마름 ② 갈망, 열망 / vi. 갈망[열망]하다[for, after]',s:'dipsesis, drought, craving, desire, longing, yearning, crave, long, yearn',r:'고대 영어 thurst(목마름) → 뙤약볕의 사막에서 물을 애타게 찾듯 입술이 바짝바짝 마르거나, 부와 권력을 쟁취하기 위해 가슴속에서 타는 듯이 열렬하게 바라는 마음 → 갈증, 갈망'},
{n:2097,w:'ordain',m:'vt. ① (산·운명 등이) 정하다; (법규 따위가) 규정하다 ② (성직자로) 임명하다',s:'order, rule',r:'라틴어 ordinare(순서를 정하다) → 신이나 절대 권력자가 세상의 질서나 사람의 운명을 거스를 수 없게 엄숙히 정해놓거나 교회가 특정한 사람을 사제로 공식 임명하다 → 정하다, 임명하다'},
{n:2098,w:'flagship',m:'a. 가장 중요한 / n. 기함(기함); 주력 제품; 가장 중요한 것; 본점, 본사',s:'chief, main',r:'영어 flag(깃발) + ship(배) → 함대를 지휘하는 사령관이 탑승하여 대장 깃발을 꽂아둔 가장 멋진 배나 회사의 명운을 걸고 시장에 내놓은 최고의 핵심 간판 상품 → 기함, 주력 제품'},
{n:2099,w:'gut',m:'n. ① 창자, 장(장); (pl.) 내장 ② (pl.) (책 등의) 내용; 실질, 핵심 ③ (pl.) 기운, 용기, 배짱, 끈기, 지구력',s:'bowels, entrails, intestines, contents, essential, fundamental, audacity, backbone, courage, nerve',r:'고대 영어 guttas(창자) → 동물의 배를 가르면 쏟아져 나오는 내장 덩어리이자 절대 피할 수 없는 절망적인 위기 속에서도 뱃속 가장 깊은 곳에서 끌어올리는 흔들리지 않는 뚝심과 배짱 → 창자, 핵심, 배짱'},
{n:2100,w:'desecrate',m:'vt. (신성한 것을) 훼손하다, 더럽히다, 모독하다',s:'blaspheme, defile, profane',r:'라틴어 de-(반대) + sacrare(신성하게 하다) → 마땅히 존경받아야 할 성스러운 묘지나 제단에 함부로 손을 대거나 더러운 오물을 던져 그 신성함을 비열하게 짓밟고 완전히 깨뜨리다 → 훼손하다, 모독하다'},
{n:2101,w:'outburst',m:'n. ① (감정의) 폭발, 분출 ② (특정 활동·태도의) 급격한 증가',s:'attack, eruption, fit, flare-up, explosion, outbreak, surge',r:'영어 out(밖으로) + burst(터지다) → 억눌려 있던 감정이나 화산, 전염병 등이 밖으로 한꺼번에 터져 나오다 → 폭발, 분출'},
{n:2102,w:'devious',m:'a. ① 정직하지 못한, 기만적인 ② 우회하는, 에두르는',s:'bent, deceitful, dirty, insincere, underhand, circumambient, indirect, roundabout',r:'라틴어 de-(벗어난) + via(길) + -ous → 올바른 길에서 벗어나 빙빙 돌아가거나 정직하지 못하게 목적을 달성하려는 → 기만적인, 우회하는'},
{n:2103,w:'adjoin',m:'v. 인접하다',s:'abut, border, butt, neighbor, verge',r:'라틴어 ad-(~에) + jungere(결합하다) → 두 개의 땅이나 건물이 서로 딱 달라붙어 결합해 있는 상태 → 인접하다'},
{n:2104,w:'profuse',m:'a. ① 아낌없는, 마음이 후한 ② 많은, 풍부한',s:'generous, liberal, ample, plentiful',r:'라틴어 pro-(앞으로) + fundere(붓다) → 아까워하지 않고 앞으로 물을 콸콸 쏟아붓듯이 풍성하게 주는 → 아낌없는, 풍부한'},
{n:2105,w:'infiltrate',m:'v. 침투하다[침투시키다], 잠입하다[잠입시키다], 스며들게 하다, 스며들다',s:'',r:'라틴어 in-(안으로) + 영어 filter(여과기) + -ate(동사) → 물이 여과기를 통과해 스며들듯 사람이나 사상이 몰래 안으로 들어오다 → 침투하다, 잠입하다'},
{n:2106,w:'celerity',m:'n. ① (행동의) 날램, 민첩함, 기민함, 신속함 ② 속력, 속도',s:'swiftness, speed, velocity',r:'라틴어 celer(빠른) + -ity(명사) → 동작이나 반응이 날쌔고 빨라서 지체 없이 신속하게 이루어지는 성질 → 날램, 신속함'},
{n:2107,w:'forge',m:'v. ① (화폐·문서 등을) 위조하다, (거짓말을) 꾸며내다 ② (친교·관계 등을) 맺다, 구축하다 ③ (쇠를) 불리다; 단조(단조)하다 / n. ① 용광로 = furnace ② 제철소; 대장간',s:'counterfeit, fake, build, construct, form, ironworks, smithery, smithy',r:'라틴어 fabrica(작업장) → 불에 달군 쇠를 두드려 물건을 만들거나, 가짜 문서나 화폐를 진짜처럼 똑같이 뚝딱 꾸며내다 → 위조하다, (친교를) 맺다'},
{n:2108,w:'pretense',m:'n. ① 겉치레, 가식(가식), 가면, 위장, 허위 ② 구실, 핑계',s:'pretext',r:'라틴어 prae-(앞에) + tendere(뻗다) → 자신의 진짜 의도는 숨긴 채 가짜 이유를 앞세워 뻗어 놓고 핑계를 대다 → 겉치레, 핑계'},
{n:2109,w:'extramural',m:'a. ① 교외의, 구역 밖의 ② 대학 외부로부터의; 학교 대항의',s:'',r:'라틴어 extra-(밖의) + murus(벽) + -al → 학교의 담장(벽) 바깥에서 이루어지는 활동이나 다른 학교 사람들과 겨루는 → 교외의, 학교 대항의'},
{n:2110,w:'swerve',m:'v. ① 빗나가다, (~에서) 벗어나다, (운동 도중에) 갑자기 방향을 바꾸다 ② 정도를 벗어나다, 일탈하다',s:'digress, turn, veer, depart, deviate',r:'고대 영어 sweorfan(문지르다, 돌다) → 똑바로 가던 도중에 장애물을 피하려고 갑자기 방향을 휙 틀어 빗나가다 → 빗나가다, 방향을 바꾸다'},
{n:2111,w:'dolmen',m:'n. 고인돌',s:'cromlech',r:'브르타뉴어 taol(탁자) + men(돌) → 커다란 넙적돌을 탁자 모양으로 세워 만든 선사시대의 무덤 → 고인돌'},
{n:2112,w:'contravene',m:'vt. ① (법률·규정 등을) 위반[위배]하다 ② (진술·원칙 등을) 부정[반박]하다',s:'disobey, infringe, transgress, violate, contradict, disprove, oppose, refute',r:'라틴어 contra-(반대로) + venire(오다) → 법이나 규칙이 정해놓은 방향과 반대로 와서 위반하거나 남의 말에 반박하다 → 위반하다, 반박하다'},
{n:2113,w:'agitation',m:'n. ① (인심·마음의) 동요, 불안 ② (사회적인) 소동; 선동; 시위',s:'nervousness, unrest, commotion, disturbance, turmoil, upheaval',r:'라틴어 agere(움직이다) + -ation(명사) → 인심이나 마음이 심하게 흔들려 동요하거나 대중을 움직이게 선동하는 행위 → 동요, 소동, 선동'},
{n:2114,w:'lofty',m:'a. ① 아주 높은, 우뚝 솟은 ② 고상한, 고결한',s:'towering, elevated, grand, noble',r:'고대 노르드어 lopt(하늘, 공기) + -y → 하늘 높이 우뚝 솟아 있거나 사람의 성품이 속물적이지 않고 매우 고결한 → 우뚝 솟은, 고상한'},
{n:2115,w:'metallurgy',m:'n. 야금학(야금학), 야금술(야금술), 금속공학',s:'',r:'그리스어 metallon(금속) + ergon(일) + -y → 금속을 광석에서 빼내고 가공하여 일상생활에 쓸 수 있게 다루는 학문 → 야금학'},
{n:2116,w:'replenish',m:'vt. 다시 채우다, 보충하다[with]',s:'refill, restock',r:'라틴어 re-(다시) + plenus(가득 찬) + -ish → 다 써서 비어버린 곳에 원래대로 다시 가득 채워 넣다 → 다시 채우다, 보충하다'},
{n:2117,w:'conflagration',m:'n. 큰 불, 대화재',s:'great fire',r:'라틴어 con-(함께) + flagrare(타오르다) + -tion → 넓은 지역에서 여러 채의 집이 한꺼번에 맹렬히 타오르는 무서운 재난 → 큰 불, 대화재'},
{n:2118,w:'sullen',m:'a. ① 부루퉁한, 시무룩한, 뚱한, 기분이 언좨은 ② 음산한, 음울한, 밝지 못한',s:'dour, morose, surly',r:'라틴어 solus(혼자인) → 혼자 고립된 상태처럼 남과 어울리기 싫어하여 불만에 차서 시무룩하고 뚱한 → 시무룩한, 음울한'},
{n:2119,w:'bandit',m:'n. 산적, 노상강도, 도둑; 악당',s:'brigand, plunderer, robber, outlaw',r:'이탈리아어 bandito(추방된 자) → 국가의 법망에서 추방되어 산속이나 길거리에 숨어 살며 지나가는 사람을 터는 강도 → 산적, 악당'},
{n:2120,w:'flimsy',m:'a. ① 무른, 취약한 ② (근거·논리가) 박약한, 얄팍한 ③ 하찮은, 보잘 것 없는',s:'fragile, weak, unconvincing, insignificant, paltry',r:'어원 불명(film 얇은 막에서 유래 추정) → 얇고 흐물거려서 금방 찢어질 듯 약하거나 남을 설득하기에 논리가 너무 빈약한 → 무른, 얄팍한'},
{n:2121,w:'grip',m:'n. ① 꽉 쥠[잡음]; 통제, 지배; 통제력, 지배력 ② 파악력, 이해력, 터득 / v. ① 꽉 쥐다, 꼭 잡다 ② ~의 마음을 사로잡다; (주의·흥미를) 끌다 ③ 이해하다',s:'clutch, grasp, control, mastery, understanding, arrest, comprehend, understand',r:'고대 영어 gripan(잡다) → 손이나 이빨로 놓치지 않고 단단히 쥐는 행위나 사람의 마음을 꽉 잡아끄는 힘 → 꽉 쥠, 통제력'},
{n:2122,w:'parenthesis',m:'n. ① (보통 pl.) (둥근) 괄호 ② (문장 속의) 삽입어구 ③ 막간극; 막간, 휴게시간',s:'bracket',r:'그리스어 para-(옆에) + en-(안에) + thesis(놓음) → 문장의 흐름 옆에 둥근 괄호를 치고 덧붙여 넣은 말이나 막간극 → 괄호, 삽입어구'},
{n:2123,w:'anticlimax',m:'n. ① 급락; 큰 기대 뒤의 실망, 용두사미 ② <수사학> 점강법(점강법)',s:'bathos',r:'그리스어 anti-(반대로) + klimax(사다리) → 잔뜩 기대하게 만들었다가 갑자기 시시하게 툭 떨어져 실망을 주는 용두사미 → 급락, 점강법'},
{n:2124,w:'intestine',m:'n. (보통 pl.) 창자, 장(장) / a. 내부의; 국내의',s:'bowels, gut, internal, domestic',r:'라틴어 intus(안에) + -ine(접미사) → 사람이나 동물의 몸통 가장 안쪽 깊숙한 곳에 구불구불하게 들어있는 장기 → 창자, 내부의'},
{n:2125,w:'befuddle',m:'vt. 어리둥절하게 하다, 당황하게 하다',s:'baffle, confuse, puzzle',r:'영어 be-(만들다) + fuddle(술에 취하게 하다) → 술을 잔뜩 먹여 정신을 잃게 하듯 혼란스럽고 어리둥절하게 만들다 → 어리둥절하게 하다'},
{n:2126,w:'enormity',m:'n. ① (상황·사건 등의) 심각함, (범죄의) 무모함; 막대함, 엄청남 ② (pl.) 잔학무도한 행위; 흉악 범죄',s:'immensity, atrocity, depravity, turpitude, villainy',r:'라틴어 ex-(밖으로) + norma(규범) + -ity → 정상적인 인간의 규범이나 도덕의 범위를 밖으로 완전히 벗어난 흉악함 → 심각함, 잔학무도한 행위'},
{n:2127,w:'cadaver',m:'n. 시체',s:'corpse',r:'라틴어 cadere(떨어지다, 쓰러지다) → 싸움이나 병으로 인해 쓰러져 생명을 다한 사람의 몸뚱이 → 시체'},
{n:2128,w:'kleptomania',m:'n. (병적인) 도벽, 절도광',s:'',r:'그리스어 kleptein(훔치다) + mania(광기) → 물건이 필요해서가 아니라 그저 훔치고 싶은 충동을 참지 못하는 정신적 병 → 도벽, 절도광'},
{n:2129,w:'factious',m:'a 당파적인; 당쟁을 일삼는, 당파심이 강한',s:'partisan',r:'라틴어 facere(만들다) + -ious → 자신들의 이익만을 위해 무리를 지어 파벌을 만들고 치열하게 다투기를 좋아하는 → 당파적인'},
{n:2130,w:'trite',m:'a. 진부한, 흔해빠진, 케케묵은',s:'banal, commonplace, hackneyed',r:'라틴어 terere(문지르다) → 너무 오랫동안 여기저기 쓰이고 문질러져서 닳고 닳아 신선함이 전혀 없는 → 진부한, 케케묵은'},
{n:2131,w:'bypass',m:'n. 우회도로 / vt. 우회하다; (문제·질문 등을) 회피하다, 무시하다',s:'detour, relief road, avoid, circumvent, sidestep',r:'영어 by(옆에) + pass(길) → 꽉 막힌 길이나 피하고 싶은 문제를 정면으로 가지 않고 옆으로 돌아가는 길 → 우회도로, 회피하다'},
{n:2132,w:'over-the-counter',m:'a. ① (약이) 의사의 처방 없이 살 수 있는, 일반 판매약의 ② (주식이) 비상장(非上場)의; 장외(場外) 거래의, 점두(店頭) 매매의',s:'',r:'영어 over(위로) + the + counter(계산대) → 병원의 처방전 없이 약국 계산대 위로 돈만 내고 바로 살 수 있는 약 → 일반 판매약의, 장외 거래의'},
{n:2133,w:'anoint',m:'vt. ① (상처 따위에) 기름을[연고를] 바르다 ② (사람의 머리에) 기름을 부어 신성하게 하다',s:'consecrate, hallow, sanctify',r:'라틴어 in-(안에) + ungere(기름 바르다) → 왕이나 사제가 될 사람의 머리에 신성한 기름을 발라 특별히 성별하다 → 기름을 바르다, 신성하게 하다'},
{n:2134,w:'connection',m:'n. ① 관계, 관련성; 교섭, 교제 ② 연락, 연결, 결합 ③ (보통 pl.) 연고, 연줄',s:'association, link, relation, relationship, junction, liaison, nexus, contact',r:'라틴어 con-(함께) + nectere(묶다) + -tion → 둘 이상의 사물이나 사람이 서로 끈으로 묶인 것처럼 밀접하게 닿아 있음 → 관계, 연락, 연줄'},
{n:2135,w:'vacuate',m:'v. ① 대피시키다, 소개(疏開)시키다 ② 떠나다, 피난하다',s:'clear, remove, withdraw, depart, leave',r:'라틴어 vacuus(비어있는) + -ate(동사) → 위험이 닥친 장소를 텅 비게 만들려고 사람들을 다른 곳으로 피난시키다 → 대피시키다, 피난하다'},
{n:2136,w:'irreversible',m:'a. (이전 상태로) 되돌릴 수 없는, 철회할 수 없는, 취소할 수 없는',s:'irrevocable',r:'라틴어 in-(not) + re-(뒤로) + vertere(돌리다) + -ible → 이미 물질이나 상황이 엎질러져서 원래 상태로 되돌릴 수 없는 → 되돌릴 수 없는'},
{n:2137,w:'saliva',m:'n. 침, 타액(唾液)',s:'spit',r:'라틴어 saliva(침) → 입안에서 음식을 소화시키거나 적시기 위해 자연스럽게 분비되는 액체 → 침, 타액'},
{n:2138,w:'nitty-gritty',m:'n. (the ~) (사물의) 핵심, 요체 / a. 가장 요긴한, 본질적인',s:'essence, gist, kernel',r:'어원 불명(머릿니를 잡듯 아주 세세한 것까지 살피는 데서 유래 추정) → 겉으로 보이지 않는 사물이나 문제의 가장 요긴하고 핵심적인 부분 → 핵심, 본질적인'},
{n:2139,w:'hedge',m:'n. ① 산울타리 ② 장벽, 장애 ③ (손실·위험 등에 대한) 방지책[against]',s:'quickset, barrier, obstacle, guard, protection, safeguard',r:'고대 영어 hecg(울타리) → 남의 침입을 막기 위해 쳐놓은 산울타리나 경제적 손실을 막기 위해 미리 쳐두는 방지책 → 산울타리, 방지책'},
{n:2140,w:'winnow',m:'v. ① (곡물 겨 등을) 까부르다, 키질하다 ② 가려내다, 선별하다; (쓸모없는 것을) 제거하다 ③ 분석하다, 검토하다',s:'fan, distinguish, sift, analyze',r:'고대 영어 windwian(바람 불게 하다) → 곡식을 높이 던져 바람에 껍질을 날려 보내고 알맹이만 골라내듯 분석하다 → 키질하다, 가려내다'},
{n:2141,w:'serene',m:'a. ① 고요한, 잔잔한 ② (사람·표정·기질 등이) 침착한, 차분한; 평화로운, 평온한 ③ 화창한, 맑게 갠',s:'quiet, tranquil, composed, halcyon, peaceful, placid, clear, fair',r:'라틴어 serenus(맑은, 고요한) → 구름 한 점 없이 화창한 하늘처럼 마음이나 바다가 잔잔하고 평화로운 상태 → 고요한, 침착한'},
{n:2142,w:'revulsion',m:'n. (강한) 혐오, 반감, 불쾌감',s:'the_strong_disgust, abhorrence, aversion, disgust, nausea',r:'라틴어 re-(뒤로) + vellere(당기다) + -sion → 너무 징그럽거나 끔찍한 것을 보고 구역질이 나 몸을 뒤로 홱 빼게 되는 감정 → 혐오, 반감'},
{n:2143,w:'reliant',m:'a. 의지하는, 의존하는, 신뢰하는[on, upon]',s:'dependent, relying',r:'라틴어 re-(뒤로) + ligare(묶다) + -ant → 혼자 힘으로 서지 못하고 남에게 기대어 의존하는 → 의지하는, 신뢰하는'},
{n:2144,w:'thermometer',m:'n. 온도계; 체온계',s:'',r:'그리스어 therme(열) + metron(측정기) → 사람의 체온이나 주변의 기온을 수치로 정확하게 재어 나타내는 기구 → 온도계, 체온계'},
{n:2145,w:'divert',m:'vt. ① 방향을 전환하다, 우회시키다 ② (주의·관심을) 딴 데로 돌리다 ③ (자금을) 전용[유용]하다 ④ 기분을 전환시키다, 즐겁게 하다',s:'redirect, shift, detract, distract, appropriate, misappropriate, amuse, entertain',r:'라틴어 di-(따로) + vertere(돌리다) → 가던 길을 딴 곳으로 돌리거나 사람의 주의를 다른 곳으로 끌어 즐겁게 하다 → 방향을 전환하다, 유용하다, 즐겁게 하다'},
{n:2146,w:'modish',m:'a. 유행의, 유행을 따르는',s:'fashionable, stylish',r:'프랑스어 mode(유행) + -ish(형용사) → 지금 당장 사람들이 열광하며 가장 많이 따르는 세련되고 트렌디한 방식의 → 유행의'},
{n:2147,w:'purge',m:'v. ① (몸·마음을) 깨끗이 하다, 정화하다 ② 내쫓다, 추방하다',s:'cleanse, clear, purify, banish, eject, expel, oust',r:'라틴어 purgare(깨끗이 하다) → 더러운 물질이나 마음에 안 드는 정치적 반대파를 씻어내어 밖으로 몰아내다 → 정화하다, 추방하다'},
{n:2148,w:'villain',m:'n. ① 악당, 악한 ② (연극·소설 등의) 악역',s:'evildoer, knave, miscreant, scoundrel, baddie',r:'라틴어 villa(농장) + -ain(사람) → 고대 로마 농장의 천한 일꾼에서 의미가 변해 소설이나 영화 속의 나쁜 악당 → 악당, 악역'},
{n:2149,w:'cognate',m:'a. ① 조상이 같은, 동족의 ② 같은 기원의; 같은 성질의, 동종의; 어원이 같은',s:'akin, consanguineous, kindred, related',r:'라틴어 co-(함께) + nasci(태어나다) → 같은 조상으로부터 함께 피를 이어받아 태어났거나 단어의 뿌리가 같은 → 동족의, 어원이 같은'},
{n:2150,w:'gimmick',m:'n. 속임수 장치; (관심을 끌기 위한) 술책[장치]',s:'artifice, scheme, trick',r:'어원 불명(마술사들이 쓰는 장치 gimac의 변형 추정) → 사람의 관심을 끌거나 물건을 팔기 위해 교묘하게 꾸며낸 속임수 장치 → 속임수 장치, 술책'},
{n:2151,w:'exterminate',m:'vt. 몰살시키다, 모조리 없애버리다, 근절하다',s:'annihilate, eradicate, extirpate',r:'라틴어 ex-(밖으로) + terminus(경계) + -ate → 무리나 해충을 경계 밖으로 완전히 몰아내어 단 한 마리도 남기지 않고 죽이다 → 몰살시키다, 근절하다'},
{n:2152,w:'verge',m:'n. 가장자리; (the ~) 경계, 한계',s:'brink, edge',r:'라틴어 virga(막대기) → 영토를 재던 막대기에서 끝부분이라는 뜻이 되어 어떤 한계나 극단적 상황의 가장자리 → 가장자리, 경계'},
{n:2153,w:'resplendent',m:'a. 반짝반짝 빛나는, 눈부신',s:'brilliant, dazzling, glittering',r:'라틴어 re-(강조) + splendere(빛나다) + -ent → 어둠 속에서도 눈을 뜰 수 없을 정도로 화려하고 반짝반짝 찬란하게 빛나는 → 반짝반짝 빛나는, 눈부신'},
{n:2154,w:'spellbind',m:'vt. ① 주문으로 얽매다, 마법을 걸다 ② 매혹하다, 황홀하게 하다',s:'bewitch, conjure, spell, witch, charm, enthrall, entrance, fascinate',r:'영어 spell(주문) + bind(묶다) → 꼼짝 못 하게 마법의 주문을 걸어 옴짝달싹 못 하게 하거나 마음을 완전히 홀려버리다 → 마법을 걸다, 매혹하다'},
{n:2155,w:'content',m:'a. ① (~에) 만족하는[with] ② 기꺼이 ~하는[to do] / vt. 만족시키다 / n. ① (용기 속의) 내용, 내용물 ② (pl.) (서적 등의) 목차, 목록, 내용 ③ 함유량, 산출량; 용량, 크기',s:'gratified, satisfied, willing, gratify, satisfy, constituent, element, material, substance, size, volume',r:'라틴어 con-(함께) + tenere(잡다) → 그릇 안에 담겨진 내용물이거나, 마음속 욕구가 채워져 기꺼이 만족하는 상태 → 만족하는, 내용물'},
{n:2156,w:'amity',m:'n. 우호, 친선, 친목',s:'amicability, friendliness, friendship, goodwill',r:'라틴어 amicus(친구) + -ity(명사) → 나라와 나라, 또는 사람 사이에 친구처럼 서로 사이좋게 잘 지내는 우호적인 관계 → 우호, 친선'},
{n:2157,w:'peculate',m:'v. (공금·위탁금 등을) 횡령하다, 유용하다',s:'embezzle, misappropriate',r:'라틴어 peculium(개인 재산) + -ate(동사) → 남이나 국가가 맡겨둔 공금을 자기 개인의 재산인 양 몰래 빼돌려 쓰다 → 횡령하다, 유용하다'},
{n:2158,w:'insignia',m:'n. (계급·소속 등을 나타내는) 휘장[배지], 훈장',s:'badge, decoration, order',r:'라틴어 in-(안에) + signum(표시) → 옷 안에 그 사람이 속한 계급이나 특별한 소속을 훈장처럼 화려하게 표시해둔 것 → 휘장, 훈장'},
{n:2159,w:'spoil',m:'v. ① 망치다, 상하게 하다, 못 쓰게 만들다; (음식물을) 썩히다 ② (남의) 성격[성질]을 버리다; 응석 받아주다 / n. ① (pl.) 전리품, 약탈품 ② (노력의) 성과',s:'damage, ruin, booty, pillage, plunder, attainment',r:'라틴어 spolium(가죽을 벗기다) → 적을 죽이고 물건을 약탈하거나 음식이나 남의 좋은 성격을 망치고 썩게 만들다 → 망치다, 전리품'},
{n:2160,w:'credential',m:'n. ① (대사·공사·사절 등의) 신임장 ② 자격증명서, 자격 인정서 ③ 성적증명서',s:'certificate, warrant, grade_transcript, transcript',r:'라틴어 credere(믿다) + -ial(형용사/명사) → 이 사람이 일을 할 자격이 있고 확실히 믿을 수 있음을 증명하는 서류나 증명서 → 자격증명서, 신임장'},
{n:2161,w:'dog-in-the-manger',m:'a. 심술쟁이 같은, 심술궂은',s:'bloody-minded, ill-natured, mean',r:'이솝 우화의 구유(manger) 속 개(dog) → 자기는 소의 여물을 먹지도 못하면서 소가 못 먹게 구유를 차지하고 으르렁대는 → 심술궂은'},
{n:2162,w:'forbear',m:'v. 억제하다, 삼가다, 참다, 관용하다',s:'abstain, refrain, withhold',r:'고대 영어 for-(완전히) + beran(참다) → 화가 나거나 당장 하고 싶은 충동을 속으로 꽉 누르며 행동으로 옮기지 않고 참다 → 억제하다, 삼가다'},
{n:2163,w:'progenitor',m:'n. ① 조상, 선조 ② 창시자, 선구자',s:'ancestor, forebear, originator, predecessor',r:'라틴어 pro-(앞으로) + gignere(낳다) + -or(사람) → 자신보다 앞선 시대에 피를 물려주고 자손을 낳아 지금의 가문을 이룬 사람 → 조상, 창시자'},
{n:2164,w:'bootleg',m:'a. 밀매[밀조, 밀수]된; (제작·판매가) 불법의, 해적판의 / v. (술 등을) 밀매밀조, 밀수하다',s:'smuggled, illegal, illicit, pirated, smuggle',r:'영어 boot(장화) + leg(다리) → 금주법 시대에 밀수꾼들이 술병을 긴 장화의 다리 부분에 몰래 숨겨서 팔던 데서 유래 → 불법의, 밀매하다'},
{n:2165,w:'citadel',m:'n. (도시·주민을 보호하는) 성채, 요새; 아성; 최후의 거점',s:'bastion, bulwark, fortification, fortress, stronghold',r:'이탈리아어 cittadella(작은 도시) → 적이 쳐들어왔을 때 도시의 주민들이 마지막으로 피신하여 목숨을 걸고 방어하는 튼튼한 성 → 성채, 요새'},
{n:2166,w:'typical',m:'a. ① 전형적인, 대표적인 ② 보통의, 일반적인',s:'classic, common',r:'그리스어 typos(타격, 인상, 모델) + -ical → 도장으로 꾹 찍어낸 것처럼 같은 집단이나 종류를 아주 잘 대표하는 → 전형적인, 보통의'},
{n:2167,w:'rectitude',m:'n. ① 정직, 청렴, 강직 ② (판단방법의) 올바름, 정확',s:'integrity, probity, righteousness, uprightness, accuracy, correctness, precision',r:'라틴어 rectus(곧은, 올바른) + -tude(명사) → 어떤 유혹이나 부정도 저지르지 않고 성품이 꼿꼿하고 맑고 청렴한 상태 → 정직, 청렴, 정확'},
{n:2168,w:'elope',m:'vi. (남녀가) 눈이 맞아 함께 달아나다, 가출하다[with]; 도망가다',s:'abscond, escape, flee',r:'앵글로-노르만어 aloper(훔치다, 뛰다) → 남몰래 집을 빠져나가 사랑하는 사람과 훌쩍 눈이 맞아 비밀리에 먼 곳으로 도망치다 → 함께 달아나다'},
{n:2169,w:'prone',m:'a. ① 수그린, 납작 엎드린 ② ~하기 쉬운, ~의 경향을 갖게 되는; ~에 걸리기 쉬운[to]',s:'face_down, flat, lying_down, liable, subject, susceptible',r:'라틴어 pronus(앞으로 굽은) → 몸을 바닥에 납작하게 엎드린 상태이거나, 질병이나 특정 습관에 쉽게 굽혀져 걸리기 쉬운 → 납작 엎드린, ~하기 쉬운'},
{n:2170,w:'huddle',m:'v. ① 붐비다, 밀치락달치락하다, 모이다 ② 뒤죽박죽 쌓아 올리다 / n. ① 옹기종기 모여 서 있는 것 ② 혼잡, 난잡',s:'cluster, crowd, flock',r:'독일어 hoedelen(군중) → 추위나 두려움 때문에 여럿이 몸을 둥글게 말고 밀치락달치락하며 뒤죽박죽 모여 있는 모습 → 붐비다, 혼잡'},
{n:2171,w:'motion',m:'n. ① 운동, 활동 ② 동작, 몸짓 ③ 발의(發議), 제의, 제안',s:'action, activity, mobility, movement, gesticulation, gesture, sign, signal, proposal, proposition',r:'라틴어 movere(움직이다) + -tion → 몸이나 사물이 한자리에서 다른 자리로 움직이는 동작이나 회의에서 손을 들어 의견을 내는 것 → 운동, 동작, 제안'},
{n:2172,w:'grandiose',m:'a. ① 웅장한, 숭고한, 장엄한 ② (너무) 거창한, (실속 없이) 거창하기만 한',s:'grand, magnificent',r:'라틴어 grandis(큰) + -ose(가득한) → 겉보기에 아주 웅장하고 장엄하지만, 때로는 실속 없이 지나치게 거창하기만 한 → 웅장한, 거창한'},
{n:2173,w:'stratagem',m:'n. 전략; 계략, 책략, 술수',s:'maneuver, ruse, strategy, tactic, trick',r:'그리스어 stratos(군대) + agein(이끌다) → 전쟁터에서 군대를 이끌고 적을 속이기 위해 머리를 써서 짜낸 교묘한 계획이나 꾀 → 전략, 책략'},
{n:2174,w:'deprecate',m:'vt. ① (강력히) 비난하다 ② (강력히) 반대하다, 불찬성을 주장하다',s:'condemn, disapprove, oppugn, vilify, counter, oppose, oppugn',r:'라틴어 de-(강조, 반대) + precari(기도하다) → 신에게 재앙을 피하게 해달라고 기도하거나 다른 사람의 행동을 몹시 나쁘다고 비난하다 → 비난하다, 반대하다'},
{n:2175,w:'flotsam',m:'n. ① (조난선의) 표류 화물, 잡동사니 ② 부량자, 깡패, 인간쓰레기',s:'flotage, jetsam, scum',r:'고대 프랑스어 floter(뜨다) → 폭풍에 배가 부서져 바다 위에 둥둥 떠다니는 화물 찌꺼기나 사회에서 버림받은 쓰레기 같은 자들 → 표류 화물, 부랑자'},
{n:2176,w:'incense',m:'v. ① 향을 피우다, 분향하다 ② 몹시 화나게 하다, 격노[격분]시키다 / n. 향, 향료',s:'cense, enrage, infuriate',r:'라틴어 in-(안에) + candere(타오르다) → 불을 붙여 향기로운 연기를 피우거나, 사람의 마음속에 분노의 불길을 지펴 몹시 화나게 하다 → 향을 피우다, 격노시키다'},
{n:2177,w:'obligation',m:'n. ① 의무, 책임 ② 채무, 채권[채무] 관계; 채권, 증권',s:'duty, liability, responsibility, debt, bond',r:'라틴어 ob-(~을 향해) + ligare(묶다) → 법률이나 도덕이 사람을 단단히 묶어 책임지고 마땅히 하게 만드는 의무나 빚 → 의무, 채무'},
{n:2178,w:'unruly',m:'a. 다루기 힘든, 제멋대로 구는, 감당할 수 없는',s:'disobedient, fractious, restive',r:'영어 un-(not) + rule(규칙) + -y → 아무런 규칙도 따르지 않고 마치 야생마처럼 제멋대로 굴어 통제하고 다루기 힘든 → 다루기 힘든'},
{n:2179,w:'burnish',m:'v. (금속에) 광을 내다, 윤을 내다',s:'glaze, gloss, luster, polish, shine',r:'고대 프랑스어 burnir(갈색으로 만들다, 빛내다) → 금속이나 나무 표면을 매끄러운 것으로 계속 문질러 반짝반짝 광택이 나게 윤을 내다 → 광을 내다'},
{n:2180,w:'expulsion',m:'n. ① (조직에서의) 제명, 제적, 추방 ② 배출, 방출',s:'dismissal, ejection, exclusion, purge',r:'라틴어 ex-(밖으로) + pellere(밀다) + -sion → 조직의 규칙을 어긴 사람을 강제로 밖으로 밀어내거나 불필요한 공기를 밖으로 뿜어내는 것 → 제명, 방출'},
{n:2181,w:'logical',m:'a. ① 논리의, 논리학의, 논리상의; 논리적인 ② (행동 등이) 사리에 맞는, 이치에 맞는',s:'reasonable',r:'그리스어 logos(말, 이성) + -ical → 사물의 이치에 맞게 생각이 앞뒤가 모순 없이 체계적으로 잘 이어지는 → 논리적인, 사리에 맞는'},
{n:2182,w:'clot',m:'v. 덩어리지다; 응고하다, 굳히다 / n. 떼, (엉긴) 덩어리; <속어> 바보, 멍청이',s:'coagulate, congeal',r:'고대 영어 clott(덩어리) → 상처가 났을 때 흐르던 피가 굳어지거나 유제품 등이 한데 엉겨 붙어 생긴 덩어리 → 덩어리지다, 엉긴 덩어리'},
{n:2183,w:'nutrition',m:'n. ① 영양; 영양 공급[섭취] ② 자양물, 음식물, 영양소',s:'nourishment, nutriment, sustenance',r:'라틴어 nutrire(기르다, 먹이다) + -tion → 생명체가 자라기 위해 음식을 먹고 몸의 에너지를 유지하는 과정이나 그 음식물 → 영양, 자양물'},
{n:2184,w:'abscond',m:'vi. 무단이탈하다, 종적[자취]을 감추다, 도주[도망]하다',s:'decamp, escape, flee',r:'라틴어 ab-(멀리) + condere(숨기다) → 지은 죄를 피하려고 남들 몰래 빠져나가 자신의 종적을 아주 멀리 감추고 도망치다 → 무단이탈하다, 도주하다'},
{n:2185,w:'pollen',m:'n. 꽃가루',s:'anther_dust, farina',r:'라틴어 pollen(고운 가루) → 꽃의 수술에서 만들어져 곤충의 몸에 묻거나 바람에 날려 암술로 옮겨지는 고운 가루 → 꽃가루'},
{n:2186,w:'defect',m:'n. ① 결점, 결함; 단점, 약점 ② 결여, 결핍, 부족 / vi. (국가·주의 등을) 버리다, 도망[탈주]하다, 변절하다',s:'blemish, flaw, drawback, shortcoming, deficiency, lack, shortage, desert, escape, flee',r:'라틴어 de-(부족한) + facere(만들다) → 원래 있어야 할 부분이 빠져 만들어진 결함이거나 자신의 나라를 버리고 도망침 → 결점, 망명하다'},
{n:2187,w:'talisman',m:'n. ① (행운을 가져다준다고 여겨지는) 부적 ② 불가사의한 힘이 있는 것',s:'amulet, charm, periapt',r:'그리스어 telesma(종교적 의식, 완성) → 불가사의한 마법의 힘이 담겨 있어 악을 막아주고 행운을 불러온다고 믿는 작은 물건 → 부적'},
{n:2188,w:'musty',m:'a. ① 곰팡이 슨, 곰팡내 나는 ② 케케묵은, 시대에 뒤진, 진부한',s:'frowzy, fusty, moldy, mucid, antiquated, stale, time-worn',r:'영어 must(포도즙, 곰팡내) + -y → 오랫동안 햇빛을 보지 못해 퀴퀴한 곰팡내를 풍기거나 시대에 몹시 뒤떨어져 낡은 → 곰팡이 슨, 진부한'},
{n:2189,w:'egress',m:'n. ① 밖으로 나감; (우주선에서의) 탈출 ② 출구, 배출구 / vi. 밖으로 나가다',s:'emergence, escape, exit, outlet, vent',r:'라틴어 e-(밖으로) + gradi(가다) + -ss → 건물이나 위험한 장소에서 밖으로 빠져나가기 위해 나 있는 문이나 탈출구 → 밖으로 나감, 출구'},
{n:2190,w:'amortize',m:'vt. ① (부채를) 분할 상환하다 ② (부동산을) 법인에게 양도하다',s:'',r:'라틴어 ad-(~로) + mors(죽음) + -ize → 빌린 돈(부채)을 이자와 함께 조금씩 갚아나가 마침내 빚을 완전히 죽여 없애다 → 분할 상환하다'},
{n:2191,w:'brevity',m:'n. ① (지속 시간이) 짧음, 덧없음 ② 간결성, (문장 따위의) 간결함',s:'ephemerality, evanescence, transience, briefness, conciseness',r:'라틴어 brevis(짧은) + -ity → 연설이나 문장의 내용이 쓸데없는 말이 없이 핵심만 담아 아주 간결하고 짧은 성질 → 짧음, 간결함'},
{n:2192,w:'compound',m:'v. ① 혼합하다, 합성하다 ② 악화시키다, 더 심각하게 만들다 / n. 혼합[복합, 합성]물 / a. 합성[복합]의',s:'blend, combine, mix, aggravate, exacerbate, worsen, composite, mixture, complex, composite, synthetic',r:'라틴어 com-(함께) + ponere(놓다) → 서로 다른 두 가지 이상의 물질이나 요소를 한데 뒤섞어 새로운 형태나 문제로 만들다 → 혼합하다, 악화시키다'},
{n:2193,w:'frost',m:'n. ① 서리, 서릿발; 성에 ② 결빙; 추운 날씨; (태도 등의) 쌀쌀함 / v. 서리로 덮다; 된서리로 죽게 하다',s:'',r:'고대 영어 forst(얼다) → 차가운 날씨에 수증기가 얼어붙어 유리창이나 나뭇잎에 하얗게 끼는 얼음 결정체 → 서리, 결빙'},
{n:2194,w:'asunder',m:'ad. a. 산산이 흩어져[흩어진], 따로따로 떨어져[떨어진]',s:'apart',r:'고대 영어 on(~에) + sundran(분리되어) → 단단히 붙어 있던 물건이 강한 힘을 받아 산산조각이 나거나 두 사람이 따로따로 떨어져 → 산산이 흩어져'},
{n:2195,w:'genuflect',m:'vi. ① 정중히 무릎 꿇다[예배를 드리기 위해] ② 비굴한 태도를 보이다, 비굴하게 추종하다',s:'bow, kneel, kowtow, grovel',r:'라틴어 genu(무릎) + flectere(굽히다) → 신이나 권력자 앞에서 존경을 표하기 위해 몸을 낮춰 정중히 무릎을 굽히고 꿇다 → 정중히 무릎 꿇다'},
{n:2196,w:'retrospect',m:'n. 회상, 회고, 추억 / v. 회고[추억]하다; 회상에 잠기다[on]',s:'recollection, reminiscence',r:'라틴어 retro-(뒤로) + specere(보다) → 이미 지나가 버린 과거의 소중한 시간이나 사건들을 기억 속에서 다시 돌아보고 생각하다 → 회상, 추억'},
{n:2197,w:'jaded',m:'a. 몹시 지친; 물린, 싫증난',s:'exhausted, tired, weary',r:'영어 jade(늙고 지친 말) + -ed → 너무 많은 일이나 자극에 시달려 늙은 말처럼 기운이 쏙 빠지고 지루해져 물린 상태 → 몹시 지친, 싫증난'},
{n:2198,w:'lust',m:'n. ① (강한) 성욕, 육욕 ② (아주 강한) 욕망, 갈망',s:'carnality, concupiscence, libido, avidity, craving, desire',r:'고대 영어 lust(즐거움, 식욕) → 단순히 좋아하는 것을 넘어 육체적인 쾌락이나 권력을 참지 못하고 강렬하게 원하는 마음 → 성욕, 갈망'},
{n:2199,w:'stultify',m:'vt. ① ~을 바보처럼 보이게 하다, 우롱하다 ② ~을 쓸모없게[헛되게] 만들다, 무효로 만들다',s:'',r:'라틴어 stultus(어리석은) + facere(만들다) → 남을 속여 바보처럼 보이게 웃음거리로 만들거나 애쓴 일을 완전히 헛수고로 돌리다 → 바보처럼 보이게 하다, 무효로 만들다'},
{n:2200,w:'invulnerable',m:'a. ① 손상되지 않는, 불사의, 무적의 ② 공격할 수 없는, 처부술[논파할] 수 없는',s:'indomitable, invincible, unbeatable, impregnable, inexpugnable',r:'라틴어 in-(not) + vulnerare(상처 입히다) + -able → 아무리 강한 공격을 받아도 결코 상처 입지 않고 절대 쓰러지지 않는 무적의 → 불사의, 무적의'},
{n:2201,w:'juvenile',m:'a. ① 젊은, 어린, 청소년의 ② 어린애 같은, 유치한, 미숙한 / n. 청소년, 아동',s:'adolescent, young, childish, immature, infantile, puerile, child, youth',r:'라틴어 juvenis(젊은) + -ile(형용사 접미사) → 아직 어른이 되지 않은 청소년이나 어린아이처럼 미숙하고 철이 없는 → 청소년의, 유치한'},
{n:2202,w:'expertise',m:'n. 전문가적 의견, 전문 지식[기술]',s:'know-how',r:'라틴어 expertus(경험이 있는) + -ise(명사) → 오랜 경험과 훈련을 통해 쌓아 올린 특정 분야의 뛰어난 전문 지식이나 기술 → 전문가적 의견, 전문 지식'},
{n:2203,w:'surly',m:'a. ① 무뚝뚝한, 퉁명스러운, 뚱한, 불친절한 ② (날씨가) 고약한, 험악한',s:'dour, sullen, testy, nasty, rough, stormy, wretched',r:'고대 영어 sur(신맛) + -ly → 신 음식을 먹었을 때처럼 얼굴을 찌푸리며 남에게 퉁명스럽고 고약하게 대하는 → 무뚝뚝한, 불친절한'},
{n:2204,w:'pry',m:'v. ① (남의 사생활을) 캐다, 파고들다, 캐묻다 ② 엿보다, 엿보고 다니다',s:'grill, inquire, interrogate, peek, peep, snoop',r:'어원 불명(prien 자세히 보다 추정) → 남이 보여주고 싶지 않은 사생활이나 비밀을 호기심에 가득 차서 꼬치꼬치 캐묻고 엿보다 → 파고들다, 엿보다'},
{n:2205,w:'acquisitive',m:'a. (지식·부·권력 등을) 원하는; 욕심이 많은, 탐욕스러운',s:'avaricious, covetous, greedy',r:'라틴어 ad-(~에) + quaerere(구하다) + -ive → 남의 지식이나 부, 권력을 끝없이 자기 것으로 만들어 가지려고 탐욕스럽게 바라는 → 욕심이 많은'},
{n:2206,w:'detach',m:'vt. ① 떼어내다, 분리하다 ② (군대 등을) 파견[분견]하다',s:'disconnect, segregate, separate, dispatch',r:'프랑스어 des-(반대) + attacher(붙이다) → 단단히 붙어 있던 물건이나 관계를 떼어내어 따로 분리시키거나 군대를 떼어 파견하다 → 분리하다, 파견하다'},
{n:2207,w:'cane',m:'n. ① 지팡이, 단장; 매, 회초리 ② (마디가 있는 식물의) 줄기',s:'rod, walking_stick, stalk, stem',r:'라틴어 canna(갈대) → 대나무나 갈대처럼 마디가 있고 길쭉한 식물의 줄기, 또는 노인이 짚고 다니는 지팡이 → 지팡이, 줄기'},
{n:2208,w:'insouciant',m:'a. 무관심한, 태평한',s:'carefree, indifferent, nonchalant, pococurante',r:'프랑스어 in-(not) + soucier(걱정하다) + -ant → 앞으로 닥칠 문제나 세상사에 대해 아무런 걱정도 없이 느긋하고 태평한 → 무관심한, 태평한'},
{n:2209,w:'scoop',m:'n. ① 국자; 주겁, 큰 숟가락 ② 최신 정보, (신문의) 특종 / v. ① 푸다, 뜨다, 퍼올리다 ② (특종을) 입수하다',s:'ladle, exclusive, dig',r:'중세 네덜란드어 schope(통, 삽) → 둥근 국자로 물건을 한 움큼 퍼 올리거나 기자가 특종 뉴스를 남보다 먼저 재빨리 퍼서 가져오는 것 → 큰 숟가락, 퍼올리다, 특종'},
{n:2210,w:'apprentice',m:'n. 견습생, 도제; 초심자',s:'cub, learner, probationer, pupil, trainee',r:'라틴어 ad-(~에) + prehendere(잡다, 이해하다) → 훌륭한 장인 밑에 들어가 처음부터 기술을 잡고(배우고) 익히는 어린 초보자 → 견습생, 초심자'},
{n:2211,w:'revert',m:'v. ① (본래 상태·습관·신앙으로) 되돌아가다[to] ② (처음 이야기·생각으로) 되돌아가다[to]',s:'retrovert, turn_back',r:'라틴어 re-(뒤로) + vertere(돌다) → 앞으로 가던 것을 멈추고 예전의 본래 상태나 습관, 생각했던 원래의 주제로 뒤돌아가다 → 되돌아가다'},
{n:2212,w:'brash',m:'a. ① 경솔한, 무모한 ② 버릇없는, 무례한, 건방진',s:'foolhardy, madcap, reckless, arrogant, bumptious, presumptuous',r:'어원 불명(break 부수다 + rash 무모한 혼성 추정) → 앞뒤를 가리지 않고 생각 없이 성급하게 덤비거나 남에게 매우 건방진 → 경솔한, 건방진'},
{n:2213,w:'genealogy',m:'n. 가계(家系), 혈통; 계통, 계보',s:'ancestry, descent, lineage, pedigree',r:'그리스어 genea(가족, 혈통) + logia(학문) → 할아버지의 할아버지까지 뿌리를 거슬러 올라가며 연구하는 한 집안의 족보 → 가계, 혈통'},
{n:2214,w:'pressing',m:'a. ① 긴급한, 절박한 ② 간청하는, 귀찮게 조르는',s:'imperative, urgent',r:'라틴어 premere(누르다) + -ing(형용사) → 숨 돌릴 틈도 없이 당장 처리하라고 마음을 꽉꽉 누르며 조르는 → 긴급한, 간청하는'},
{n:2215,w:'forage',m:'v. ① (식량 등을) 찾아다니다, 마구 뒤적여 찾다 ② 침입하다, 침략하다 / n. ① 꼴, 마초(馬草), 말이나 소의 먹이 ② 침입, 습격',s:'ransack, rummage, scrounge, search_for',r:'고대 프랑스어 forrage(마초) → 겨울을 나기 위해 소나 말의 먹이를 이리저리 뒤져 구하거나 남의 땅에 쳐들어가 약탈하다 → 찾아다니다, 꼴'},
{n:2216,w:'slit',m:'n. ① 길게 베어진 상처[자국] ② 갈라진 틈, 틈새 / v. 세로로 베다[자르다], 패다, 찢다',s:'crack, cut, gash, incision, rip, slash',r:'고대 영어 slitan(자르다) → 날카로운 칼로 길고 가늘게 베어서 틈새를 만들거나 그런 모양으로 찢어진 자국 → 길게 베어진 상처, 세로로 자르다'},
{n:2217,w:'rove',m:'v. (정처 없이) 헤매다, 배회[유랑]하다',s:'ramble, roam, wander',r:'영어 rove(방랑하다) → 뚜렷하게 갈 곳을 정하지 않고 이리저리 발길 닿는 대로 유유히 떠돌아다니며 헤매다 → 헤매다, 유랑하다'},
{n:2218,w:'whopping',m:'a. 엄청나게 큰, 터무니없이 큰, 굉장히 큰 / n. ① 태형(笞刑), 매질, 매로 다스리기 ② 대패(大敗), 참패',s:'enormous, gigantic, huge, massive, flogging, gauntlet, defeat, thrashing',r:'영어 whop(크게 치다) + -ing → 한 대 맞으면 쓰러질 만큼 상상을 초월하게 엄청난 크기이거나 시합에서 철저히 박살 난 패배 → 엄청나게 큰, 대패'},
{n:2219,w:'congratulation',m:'n. 축하, 경축; (pl.) 축사',s:'celebration, felicitation',r:'라틴어 con-(함께) + gratulari(기뻐하다) + -tion → 누군가 이룬 기쁜 성취나 기념일에 다 함께 모여 축하와 기쁨의 인사를 건넴 → 축하, 경축'},
{n:2220,w:'viscous',m:'a. (액체가) 끈적거리는, 점성이 있는',s:'gluey, glutinous, gooey, sticky',r:'라틴어 viscum(겨우살이 열매의 점액) + -ous → 꿀이나 엿기름처럼 액체가 물처럼 흐르지 않고 진득하게 끈적거리는 성질의 → 끈적거리는'},
{n:2221,w:'axis',m:'n. 굴대, 축(軸)',s:'axle, pivot, shaft, spindle',r:'라틴어 axis(축) → 자동차 바퀴의 가운데를 관통하거나 지구가 도는 중심이 되는 튼튼한 중심 쇠막대기 → 축, 굴대'},
{n:2222,w:'infuse',m:'v. (신념·사상, 활력 등을) 불어넣다, 주입하다',s:'inspire, instill',r:'라틴어 in-(안으로) + fundere(붓다) → 주전자의 물을 컵에 붓듯 사람의 마음에 뜨거운 열정이나 새로운 사상을 가득 불어넣다 → 불어넣다'},
{n:2223,w:'choleric',m:'a. 성마른, 화를 잘 내는',s:'irascible, irritable, peevish, testy, touchy',r:'그리스어 kholera(담즙, 분노) + -ic → 고대 의학에서 쓸개즙이 많으면 화를 잘 낸다는 고대 의학에서 유래하여 걸핏하면 불같이 성질을 내는 → 성마른'},
{n:2224,w:'troop',m:'n. ① 대(隊), 떼, 무리 ② (pl.) 군대, 병력 / vi. 떼 지어 모이다[up, together]; 떼를 지어 걸어가다[오다]',s:'band, company, crowd, pack, team, army, military, flock, swarm, throng',r:'프랑스어 troupe(무리) → 한 명 한 명이 아니라 지휘관의 명령에 따라 거대하게 무리 지어 함께 이동하고 움직이는 군대의 병력 → 대, 떼, 군대'},
{n:2225,w:'feral',m:'a. ① (동식물이) 야생의; 야생으로 돌아간 ② (person) 야만적인, 흉포한',s:'wild, brutal',r:'라틴어 ferus(야생의, 거친) + -al → 인간의 손길을 거치지 않은 거친 들판의 동물처럼 통제되지 않고 야만적이고 흉포한 → 야생의, 야만적인'},
{n:2226,w:'duplicity',m:'n. 표리부동, 불성실; 이중성',s:'double-dealing',r:'라틴어 duo(둘) + plicare(접다) + -ity → 마음을 두 겹으로 접어 겉으로는 웃으면서 속으로는 다른 음흉한 꿍꿍이를 품은 이중성 → 표리부동'},
{n:2227,w:'stump',m:'n. ① (나무의) 그루터기 ② (연필·양초 등의) 쓰다 남은 동강 ③ (선거 등) 연설의 연단 / v. ① 쩔쩔매게 하다, 당황하게 하다 ② (선거) 유세를 하다',s:'snag, stub, butt, remainder, remnant, dais, platform, podium, rostrum, baffle, bewilder, confound, flummox, barnstorm, campaign, canvass, electioneer',r:'중세 저지 독일어 stumpe(나무 밑동) → 베어내고 남은 나무 밑동이나 남을 쩔쩔매게 만들다, 또는 선거 때 유세하러 돌아다니다 → 그루터기, 당황하게 하다'},
{n:2228,w:'evince',m:'vt. (감정·특질을) 분명히 밝히다[피력하다], 명시하다, 드러내다',s:'demonstrate, evidence, manifest',r:'라틴어 e-(밖으로) + vincere(이기다, 증명하다) → 마음속에 품고 있던 감정이나 사실을 증명하여 밖으로 분명히 드러내 보여주다 → 명시하다, 드러내다'},
{n:2229,w:'orgy',m:'n. ① 진탕 먹고 마시며 난잡하게 노는 잔치, 주지육림; 유흥, 방탕 ② (지나치게) 열중함, 탐닉',s:'debauch, revel, indulgence, spree',r:'그리스어 orgia(비밀 종교 의식) → 고대 술의 신 디오니소스 제전에서 유래하여 진탕 먹고 마시며 방탕하게 노는 난잡한 파티 → 유흥, 방탕'},
{n:2230,w:'gaunt',m:'a. ① 수척한, 몹시 여윈 ② 황량한, 쓸쓸한',s:'bony, skinny, thin, barren, bleak',r:'어원 불명(노르웨이어 gandr 가느다란 막대기 추정) → 밥을 굶거나 병에 걸려 얼굴에 뼈가 앙상하게 드러난 몹시 수척한 모습 → 몹시 여윈'},
{n:2231,w:'slime',m:'n. ① 차진 흙; 끈끈한 물질; 점액(粘液), (달팽이·물고기 등의) 진액 ② 악취가 나는 것',s:'sludge, mucus, filth, muck',r:'고대 영어 slim(점액) → 비 온 뒤의 질퍽한 흙이나 달팽이가 지나가며 남긴 끈적끈적하고 불쾌한 액체 → 차진 흙, 점액'},
{n:2232,w:'queue',m:'n. (차례를 기다리는 사람들·자동차 등의) 줄, 열 / v. 줄을 서다',s:'line, row, line_up',r:'라틴어 cauda(꼬리) → 프랑스어 queue(꼬리) → 사람들이나 차들이 꼬리에 꼬리를 물고 자기 차례를 기다리며 길게 늘어선 줄 → 줄, 줄을 서다'},
{n:2233,w:'rudiment',m:'n. ① (pl.) 기본, 기초 (원리); 초보 ② (pl.) (발전의) 조짐, 싹수',s:'basics, foundation, fundamentals',r:'라틴어 rudis(미숙한, 거친) + -ment → 고도의 학문이나 기술로 발전하기 전의 가장 기초가 되는 뼈대나 어린 조짐 → 기본, 조짐'},
{n:2234,w:'clapped-out',m:'a. 낡아빠진; 지친, 녹초가 된',s:'worn-out, exhausted',r:'영어 clap(치다) + out → 박수를 칠 기운조차 다 빠져버릴 만큼 기계가 낡아빠지거나 사람이 완전히 녹초가 된 → 낡아빠진, 지친'},
{n:2235,w:'affix',m:'vt. 첨부하다, 붙이다 / n. ① 부착물 ② 접사(접두사·접미사 등)',s:'attach, paste, supplement',r:'라틴어 ad-(~에) + figere(고정하다) → 우표나 도장을 편지 위에 풀로 꽉 붙이거나 단어의 끝에 덧붙이는 접사 → 첨부하다, 접사'},
{n:2236,w:'panoply',m:'n. ① 장대한 진열[배열, 장관] ② (한 벌의) 갑옷과 투구; 완전한 장비; (도구의) 한 벌 ③ 덮개, 방어물; 정장; 훌륭한 장식[꾸밈]',s:'array, range, armaments, adornment, trappings',r:'그리스어 pan-(모든) + hopla(무기) → 머리부터 발끝까지 화려하게 차려입은 기사의 갑옷 세트나 그토록 멋지게 진열된 훌륭한 장관 → 훌륭한 장식, 갑옷'},
{n:2237,w:'dissipate',m:'v. ① (안개·구름 따위를) 흩뜨리다; (군중 따위를) 쫓아 흩어버리다; (열 따위를) 방산하다 ② (의심·공포 따위를) 일소하다 ③ 사라지다, 흩어져 없어져 버리다 ④ (시간·돈 등을) 하루루 쓰다, 낭비하다',s:'dispel, dissolve, prodigalize, squander, waste',r:'라틴어 dis-(멀리) + supare(던지다) → 안개나 공포를 멀리 던져 흩어버리거나 모아둔 돈을 아무 생각 없이 펑펑 던져 낭비하다 → 흩뜨리다, 낭비하다'},
{n:2238,w:'bipolar',m:'a. ① 상반되는, 양극단의 ② 조울증의, 조울증을 앓는',s:'antithetical, conflicting, contrary',r:'라틴어 bi-(둘) + polus(극) + -ar → 지구의 남극과 북극처럼 정반대의 끝에 서 있거나, 조증과 울증 사이를 극단적으로 오가는 → 상반되는, 조울증의'},
{n:2239,w:'lampoon',m:'n. 풍자; 풍자문, 풍자문학 / vt. 풍자하다, 빈정거리다, 놀리다',s:'burlesque, caricature, satire, mimic, mock, parody, satirize',r:'프랑스어 lampons(마시자) → 술집에서 마시자고 외치며 부르던 노래에서 유래하여 남을 우스꽝스럽게 흉내 내어 비꼬는 글 → 풍자문, 풍자하다'},
{n:2240,w:'hostage',m:'n. ① 볼모(의 처지); 인질 ② 저당물; 담보',s:'captive, prisoner, pledge, security',r:'고대 프랑스어 ostage(담보물) → 나라 간의 약속을 지키기 위한 담보나 협박을 위해 강제로 잡아둔 불쌍한 처지의 사람 → 인질, 담보'},
{n:2241,w:'filch',m:'vt. 훔치다, 좀도둑질[슬쩍]하다',s:'steal, thieve',r:'중세 영어 filchen(훔치다) → 남의 눈을 피해 주머니나 가방 속의 작고 하찮은 물건을 재빠른 손놀림으로 슬쩍 훔쳐 달아나다 → 훔치다, 좀도둑질하다'},
{n:2242,w:'mine',m:'n. 광산; 광상(鑛床); 지뢰; 갱도',s:'',r:'고대 프랑스어 mine(광맥) → 땅속 깊은 곳에 묻혀 있는 귀중한 금속을 캐내기 위해 파 들어간 갱도나 그 속에 묻어둔 폭탄 → 광산, 지뢰'},
{n:2243,w:'ejaculate',m:'v. ① (갑자기) 소리치다, 외치다 ② (액체를) 내뿜다; (정액을) 사정하다',s:'exclaim, scream, shout, yell, discharge, eject',r:'라틴어 e-(밖으로) + jaculari(던지다) → 가슴속의 말이나 몸속의 액체를 밖으로 향해 갑자기 소리치듯 강하게 던져 내뿜다 → 소리치다, 사정하다'},
{n:2244,w:'installment',m:'n. ① 할부; 분할불의 1회분, 할부금 ② (전집·연속물 등의) 1회분',s:'easy_terms, monthly_payment, episode',r:'고대 프랑스어 estaler(배치하다) → 큰돈을 한 번에 내기 어려워 여러 달로 나누어 배치하여 갚거나 긴 연재물의 한 회차 → 할부, (연속물의) 1회분'},
{n:2245,w:'nominal',m:'a. ① 이름뿐인, 명목상의 ② (가격 등이) 아주 적은',s:'titular, token, insignificant',r:'라틴어 nomen(이름) + -al(형용사) → 실질적인 권력이나 가치는 전혀 없고 문서에 그저 이름만 올려놓은 허울뿐인 → 이름뿐인, 아주 적은'},
{n:2246,w:'belch',m:'v. ① 트림하다 ② (폭언·욕설 등을) 내뱉다[forth]; (가스·연기 등을) 내뿜다, 분출하다[out, forth]',s:'burp, emit, gush, puff',r:'고대 영어 bealcan(내뿜다) → 배 속에 가득 찬 가스나 기계를 태운 시커먼 연기를 밖으로 폭발하듯 강하게 뿜어내다 → 트림하다, 내뿜다'},
{n:2247,w:'terminology',m:'n. (전문) 용어',s:'jargon, lingo, term',r:'라틴어 terminus(한계) + logia(학문) → 특정한 학문이나 전문 분야 안에서만 뜻이 통하도록 한계를 정해놓은 특별한 단어들 → 전문 용어'},
{n:2248,w:'converse',m:'vi. 담화하다, 이야기를 나누다 / a. 역(逆)의, 거꾸로의 / n. 역(逆), 반대',s:'speak, talk, contrary, opposite, reverse',r:'라틴어 con-(함께) + vertere(돌다) → 여러 사람이 둥글게 모여 앉아 서로 이야기를 나누거나 앞뒤의 순서가 완전히 거꾸로 뒤집힌 → 담화하다, 반대'},
{n:2249,w:'subject',m:'n. ① (논의 등의) 주제; 당면과제, 문제, 사안 ② (학교의) 학과, (시험) 과목; <문법> 주어, 주부 ③ (행위의) 대상, 소재; 실험대상, 피험자; 국민, 피지배자 / a. ① 지배를 받는; 복종하는; 종속하는 ② 걸리기 쉬운, 당하기 쉬운; (승인 따위를) 받아야 하는 / vt. (~을) 지배하에 두다, 종속시키다',s:'matter, theme, subordinate',r:'라틴어 sub-(아래에) + jacere(던지다) → 왕의 아래에 던져진 백성이거나 토론의 중심에 놓여 다루어지는 중요한 과제 → 피지배자, 주제'},
{n:2250,w:'ornithology',m:'n. 조류학',s:'',r:'그리스어 ornis(새) + logia(학문) → 하늘을 나는 다양한 새들의 종류, 생태, 행동을 전문적으로 연구하고 분류하는 학문 → 조류학'},
{n:2251,w:'hereditary',m:'a. ① 유전하는, 유전성의, 유전적인 ② 상속권에 의한, 세습의, 세습되는',s:'genetic, inheritable',r:'라틴어 heres(상속인) + -ary → 부모나 조상이 가진 재산의 권리나 몸의 유전적 특성이 자식 세대까지 대대로 이어지는 → 유전하는, 세습의'},
{n:2252,w:'clemency',m:'n. ① (성격·성질의) 온화, 온순; 관대, 자비 ② (처벌·대상에 대한) 관용, 관대한 처분 ③ (날씨의) 온화함, 따뜻함',s:'charity, gentleness, leniency, mercy',r:'라틴어 clemens(부드러운, 관대한) + -cy → 죄인에게 내리는 처벌을 부드럽게 깎아주는 자비로움이나 매서운 추위가 풀린 따뜻한 날씨 → 관대, (날씨의) 온화함'},
{n:2253,w:'impinge',m:'vi. 침범[침해]하다; ~에 영향[지장]을 주다; 부딪히다, 충돌하다',s:'',r:'라틴어 in-(~에 대항하여) + pangere(부딪히다) → 남이 차지한 구역이나 권리의 선을 뚫고 들어가 부딪히며 해를 끼치다 → 침범하다, 부딪히다'},
{n:2254,w:'example',m:'n. ① 예, 보기, 실례; 전례 ② 본보기, 모범, 본; (벌로서의) 교훈, 경고',s:'instance, precedent, model, lesson',r:'라틴어 ex-(밖으로) + emere(가져오다) → 수많은 무리 중에서 대표로 밖으로 뽑아내어 남들이 보고 배울 만한 모범으로 삼는 것 → 예, 본보기'},
{n:2255,w:'dim',m:'a. ① (빛·장소가) 어둑한, 어스레한 ② (형체가) 잘 안 보이는, 흐릿한; (기억이) 희미한, 어렴풋한',s:'dull, dusky, gloomy, murky, bleary, blurred, faint, hazy',r:'고대 영어 dimm(어두운) → 방 안에 빛이 모자라 컴컴하거나 나이가 들어 기억과 눈앞의 형체가 안개 낀 듯 흐릿하게 보이는 → 어둑한, 흐릿한'},
{n:2256,w:'buffoonery',m:'n. ① 광대짓, 익살, 해학 ② 저속한 농담',s:'clownery, drollery, jest, jocularity, joke, raillery',r:'이탈리아어 buffone(광대) + -ery → 사람들을 웃기기 위해 궁정의 광대들이 얼굴을 찌푸리며 보여주던 우스꽝스럽고 다소 저속한 장난 → 광대짓, 저속한 농담'},
{n:2257,w:'corrode',m:'v. 부식시키다, 좀먹다; 부식하다',s:'erode, rot, rust',r:'라틴어 con-(강조) + rodere(갉아먹다) → 비나 산소 때문에 쇠붙이에 녹이 슬어 마치 쥐가 갉아먹은 것처럼 표면이 점점 파괴되는 현상 → 부식시키다'},
{n:2258,w:'ado',m:'n. ① 야단법석, 소동 ② 노고, 고생, 고심',s:'commotion, fuss, to-do, uproar, toil, travail',r:'영어 at(~에) + do(하다) → 어떤 일을 하느라 사람들이 이리저리 뛰며 만들어내는 시끄러운 난리나 쓸데없는 소동 → 야단법석, 노고'},
{n:2259,w:'stringent',m:'a. ① (법률·규칙·규정 등이) 엄중한, 엄격한 ② (자금이나 재정적 조건이) 긴박한, 절박한',s:'rigorous',r:'라틴어 stringere(단단히 묶다) + -ent → 법이나 돈의 융통이 밧줄로 꽁꽁 묶인 것처럼 한 치의 틈도 없이 아주 빡빡하고 엄격한 → 엄중한, 긴박한'},
{n:2260,w:'glacier',m:'n. 빙하',s:'',r:'라틴어 glacies(얼음) + -er → 수만 년 동안 쌓인 거대한 얼음덩어리가 녹지 않고 계곡을 따라 아주 천천히 흘러내리는 얼음강 → 빙하'},
{n:2261,w:'prevaricate',m:'vi. 얼버무리다, 발뺌하다; 속이다, 거짓말하다',s:'dodge, equivocate, evade, lie',r:'라틴어 prae-(미리) + varicare(어긋나다) → 사실을 묻는 질문에 곧바로 답하지 않고 진실에서 어긋나게 빙빙 돌려 거짓으로 발뺌하다 → 얼버무리다, 발뺌하다'},
{n:2262,w:'revolution',m:'n. ① 혁명; 변혁 ② 회전(운동); 선회; 공전(公轉)',s:'coup, revolt,荒, rotation, turn',r:'라틴어 re-(뒤로) + volvere(구르다) + -tion → 바퀴가 빙그르르 한 바퀴 도는 현상이거나 낡은 사회 체제를 거꾸로 엎어버리는 거대한 역사적 변혁 → 회전, 혁명'},
{n:2263,w:'exalt',m:'vt. ① (지위·명예 등을) 높이다, 승격시키다 ② 칭찬하다, 찬양하다',s:'elevate, promote, extol, glorify, laud',r:'라틴어 ex-(밖으로, 위로) + altus(높은) → 뛰어난 사람의 지위나 영예를 보통 사람의 눈높이보다 훨씬 위로 들어 올려 찬양하다 → 높이다, 찬양하다'},
{n:2264,w:'libretto',m:'n. (오페라·음악극 등의) 가사, 대본',s:'',r:'이탈리아어 libro(책) + -etto(작은) → 오페라나 뮤지컬 공연을 볼 때 관객들이 가사를 따라 읽을 수 있도록 만든 조그마한 대본 책자 → 가사, 대본'},
{n:2265,w:'murky',m:'a. ① 매우 어두운, 깜깜한; 어둑어둑한 ② 아주 음산한 ③ (표현 등이) 애매한, 이해하기 어려운',s:'dark, dim, lightless, dismal, dreary, gloomy, obscure, unperceivable',r:'고대 영어 myrce(어두운) + -y → 짙은 안개나 진흙 때문에 한 치 앞도 안 보일 만큼 깜깜하고 분위기가 무섭도록 음산한 → 어두운, 음산한, 애매한'},
{n:2266,w:'wilt',m:'v. ① (화초 등이) 시들다[시들게 하다] ② (사람이) 지치다, 풀이 죽다, 약해지다',s:'shrivel, wither, wizen, droop, languish, sag',r:'방언 welk(시들다)의 변형 → 싱싱했던 화초가 물이 부족해 고개를 푹 숙이거나 사람이 더위에 지쳐 풀이 꺾여 축 처지다 → 시들다, 지치다'},
{n:2267,w:'edict',m:'n. 칙령, 포고; 명령',s:'decree, mandate, ordinance, proclamation',r:'라틴어 e-(밖으로) + dicere(말하다) → 옛날 왕이나 국가 최고 기관이 백성들이 지키도록 밖으로 크게 소리 내어 알린 공식적인 명령 → 칙령, 명령'},
{n:2268,w:'overlap',m:'v. ① 부분적으로 덮다; 부분적으로 ~위에 겹치다, 마주 겹치다 ② 일부분이 일치하다; (시간 등이) 중복되다',s:'overlay, superimpose',r:'영어 over(위에) + lap(접히다) → 종이나 시간표가 서로 끝부분을 덮으며 접히듯 한 장소나 시간에 두 가지가 포개어 일치하다 → 겹치다, 중복되다'},
{n:2269,w:'contentious',m:'a. ① 논쟁[싸움]을 좋아하는 ② 논쟁적인, 논쟁을 불러일으키는',s:'argumentative, quarrelsome, controversial, disputable',r:'라틴어 con-(함께) + tendere(뻗다, 다투다) + -ious → 서로 자기 주장이 맞다며 줄다리기하듯 팽팽하게 맞서 싸움을 계속하려 드는 → 논쟁을 좋아하는'},
{n:2270,w:'boulevard',m:'n. 넓은 가로수 길; 큰길, 대로',s:'avenue, thoroughfare',r:'네덜란드어 bolwerc(요새) → 옛날 도시의 성벽을 허물고 그 자리에 나무를 심어 넓고 시원하게 뚫어놓은 가로수 산책길 → 가로수 길, 대로'},
{n:2271,w:'roil',m:'v. ① (액체를) 휘젓다, 흐리게 하다 ② 요동치다, 요동치게 만들다 ③ 화나게 만들다, 발끈하게 하다',s:'agitate, beat, churn, stir, whip, whisk, jolt, plunge, shake, thrash, irritate, miff, offend, peeve, vex',r:'고대 프랑스어 rouiller(휘젓다) → 맑은 연못의 진흙을 나뭇가지로 마구 휘저어 흐리게 하거나 남의 마음을 요동치게 쑤셔 화나게 하다 → 휘젓다, 화나게 하다'},
{n:2272,w:'impostor',m:'n. 사기꾼, 협잡꾼; (성명·신분 등을) 사칭하는 사람',s:'charlatan, mountebank',r:'라틴어 in-(안으로) + ponere(놓다) + -or → 속임수를 사람들 사이에 그럴싸하게 놓아두고 자신의 신분이나 지위를 가짜로 사칭하는 사기꾼 → 사기꾼, 협잡꾼'},
{n:2273,w:'slink',m:'vi. 살금살금[가만히] 걷다, 살며시 도망치다; (여자가) 간통들을 걷다 / n. 좀도둑',s:'creep, sneak',r:'고대 영어 slincan(기어가다) → 고양이나 쥐가 바닥을 기다시피 하며 남의 눈을 피해 소리 없이 몰래 살금살금 걷거나 도망가다 → 살금살금 걷다'},
{n:2274,w:'niggardly',m:'a. ① 인색한, 인색하게 구는 ② (액수·분량이) 아주 적은, 빈약한, 근소한',s:'miserly, parsimonious, stingy',r:'북유럽어 hniggaw(인색한) + -ly → 돈 한 푼 쓰는 것도 아까워 부들부들 떨며 지나치게 아끼거나 사람에게 내어주는 분량이 아주 보잘것없는 → 인색한'},
{n:2275,w:'chimney',m:'n. (잡기·기관차·선공장 등의) 굴뚝',s:'funnel, smokestack, stack',r:'프랑스어 cheminee(난로) → 방 안 난로에서 활활 타오른 불의 연기를 지붕 위로 뽑아내어 공기 중으로 날려 보내는 긴 통로 → 굴뚝'},
{n:2276,w:'deviate',m:'v. (상도·원칙 따위에서) 벗어나다, 빗나가다',s:'depart, stray, swerve',r:'라틴어 de-(벗어나) + via(길) + -ate → 기차가 정해진 선로를 벗어나거나 사람이 원래 지켜야 할 올바른 원칙의 길에서 빗나가버리다 → 벗어나다, 빗나가다'},
{n:2277,w:'alma mater',m:'n. 모교(母校), 출신교',s:'',r:'라틴어 alma(자양분을 주는) + mater(어머니) → 자식에게 젖을 물려 지식을 키워준 어머니 같은 학교라는 뜻으로 자신이 다녔던 모교 → 모교, 출신교'},
{n:2278,w:'friction',m:'n. ① (두 물체의) 마찰 ② 알력(軋轢), 불화, 갈등',s:'abrasion, rubbing, conflict, hostility, opposition',r:'라틴어 fricare(문지르다) + -tion → 두 개의 거친 표면이 맞닿아 뻑뻑하게 비벼지는 물리적 현상이나 사람들 사이의 껄끄러운 감정적 충돌 → 마찰, 갈등'},
{n:2279,w:'sultry',m:'a. 무더운, 찌는 듯이 더운, 후덥지근한',s:'muggy, sweltering',r:'영어 swelter(더위 먹다)의 변형 + -y → 바람 한 점 없는 한여름에 온몸에 땀이 줄줄 흐를 만큼 숨이 턱턱 막히고 찌는 듯이 무더운 → 무더운, 후덥지근한'},
{n:2280,w:'tome',m:'n. 큰 책, 학술서적',s:'',r:'그리스어 tomos(자른 조각, 책 한 권) → 고대 도서관에서 두루마리를 여러 개로 잘라 묶어놓은 엄청나게 두껍고 무거운 학술 서적이나 큰 책 → 큰 책, 학술서적'},
{n:2281,w:'expatriate',m:'n. (고국이 아닌) 국외 거주자, 해외 근무[주재]자 / v. 국외로 추방하다',s:'banish, deport, exile, expel',r:'라틴어 ex-(밖으로) + patria(조국) + -ate → 자신의 소중한 고국 땅에서 강제로 쫓겨나 먼 외국으로 가거나 회사의 명령으로 해외에 머무는 사람 → 국외 거주자, 추방하다'},
{n:2282,w:'promiscuous',m:'a. ① (성생활이) 난잡한[문란한] ② 난잡한, 뒤범벅의; 엉망인',s:'disorderly, indiscriminate',r:'라틴어 pro-(앞으로) + miscere(섞다) + -ous → 이것저것 종류를 가리지 않고 마구잡이로 앞으로 튀어나와 뒤섞여버려 성적으로나 정리 정돈이 난잡한 → 난잡한'},
{n:2283,w:'virtue',m:'n. ① 미덕, 덕, 선; 선행, 덕행 ② 장점, 가치',s:'goodness, integrity, morality, advantage, merit',r:'라틴어 virtus(남자다움, 도덕성) → 사람으로서 마땅히 지켜야 할 선하고 아름다운 도덕적 품성이나 사물의 뛰어난 장점 → 미덕, 장점'},
{n:2284,w:'gloss',m:'v. ① 광택을 내다 ② 겉치레를 하다; 그럴듯하게 얼버무리다, 속이다[over] / n. ① 광택, 윤 ② 허식, 겉치레',s:'polish, shine, luster, sheen, varnish, veneer',r:'스칸디나비아어(빛나다) → 가구에 왁스를 발라 눈이 부시게 윤을 내거나, 자신의 초라한 진짜 모습을 숨기기 위해 겉을 번드르르하게 포장하는 허식 → 광택을 내다, 겉치레'},
{n:2285,w:'cipher',m:'n. ① (숫자의) 영(零) ② 암호, 암호문 ③ 하찮은 사람[것]',s:'naught, nil, zero, code, cryptogram, nobody, nonentity, nullity',r:'아랍어 sifr(비어있는 것) → 숫자 0을 뜻하는 아라비아 수학 용어에서 유래하여, 아무리 더해도 가치가 없는 0이나 뜻을 숨긴 암호문 → 영(0), 암호문'},
{n:2286,w:'doggerel',m:'a. (시가) 우스꽝스러운; 조잡한, 졸렬한 / n. 엉터리 시; 광시(狂詩)',s:'awkward, bungling, clumsy, unskillful',r:'어원 불명(영어 dog 개에서 유래 추정) → 개가 짖는 소리처럼 박자도 안 맞고 내용도 우스꽝스럽고 거칠게 쓰인 엉터리 시 → 우스꽝스러운, 엉터리 시'},
{n:2287,w:'clique',m:'n. (배타적인) 소집단, 파벌, 패거리, 도당',s:'coterie, faction, posse',r:'고대 프랑스어 clique(자물쇠) → 찰칵하고 닫힌 자물쇠 안쪽의 사람들처럼 외부인을 들이지 않고 자기들끼리만 끼리끼리 몰려다니는 배타적 집단 → 소집단, 파벌'},
{n:2288,w:'twilight',m:'n. ① (해진 뒤·해뜨기 전의) 어스름, 해질녘, 황혼 ② (the ~) (전성기·성공 뒤에 오는) 쇠퇴기',s:'dusk, sunset, decline, ebb',r:'영어 twi-(둘, 사이) + light(빛) → 태양이 막 넘어갔을 때 낮도 밤도 아닌 희미한 빛이 머무는 시간이나 인생의 전성기가 지나간 쇠퇴기 → 황혼, 쇠퇴기'},
{n:2289,w:'barter',m:'v. 물물교환하다, 교역하다',s:'exchange, swap, trade',r:'고대 프랑스어 barater(속이다, 거래하다) → 돈이 없던 시절 상인들이 속임수를 써가며 물건과 물건을 직접 서로 맞바꾸며 장사하던 행위 → 물물교환하다'},
{n:2290,w:'anesthetic',m:'n. 마취제, 마취약 / a. ① 마취의 ② (몸이) 무감각한, 마비 상태인',s:'narcotic, stupefacient, narcose, paralytic, paralyzed',r:'그리스어 an-(없는) + aisthesis(감각) + -ic → 수술할 때 고통을 느끼지 못하도록 환자의 신경 감각을 완전히 마취시켜 버리는 약 → 마취제, 무감각한'},

{n:2292,w:'florid',m:'a. ① (안색이) 불그레한, 혈색이 좋은 ② 화려한, 현란한, 장식이 많은',s:'reddish, rubicund, ruddy, flamboyant, ornate',r:'라틴어 flos(꽃) + -id → 화려한 붉은 꽃이 활짝 핀 것처럼 피부에 건강한 혈색이 도는, 또는 장식과 무늬를 지나치게 많이 써서 현란한 → 불그레한, 화려한'},

{n:2295,w:'articulate',m:'a. ① (발음이) 또렷한, 분명한 ② (생각·느낌을) 분명하게 표현하는 / v. ① 또렷하게 발음하다 ② (생각·감정을) 분명히 표현하다, 조리 있게 설명하다',s:'clear, clear-cut, precise, coherent, eloquent, expressive, fluent, enunciate, pronounce, explain, express',r:'라틴어 articulus(관절, 마디) + -ate → 몸의 뼈마디가 매끄럽게 연결되듯, 여러 생각과 단어를 또렷하고 조리 있게 연결해 명확하게 발음하고 설명하는 → (발음이) 또렷한, 조리 있게 설명하다'},

{n:2298,w:'upholstery',m:'n. 가구; 실내 장식품(커튼·쿠션·융단 등)',s:'',r:'영어 up(위로) + hold(잡다) + -stery → 나무 의자 위에 푹신한 천이나 솜을 올려 잡아 고정하여 아름답고 편안하게 꾸며놓은 천 장식 → 실내 장식품'},

{n:2300,w:'quiescent',m:'a. ① 조용한, 잠잠한; 정지한, 움직이지 않는 ② (병 등이 특히 잠정적으로) 진행이 중단된 ③ (글자가) 발음되지 않는, 묵음의',s:'calm, stationary, dormant, silent',r:'라틴어 quiescere(쉬다) + -ent → 바람이나 소리 하나 없이 조용히 잠잠하거나 질병이 무서운 이빨을 감추고 잠시 활동을 멈추고 쉬고 있는 → 잠잠한, 묵음의'},

{n:2307,w:'adultery',m:'n. 간통, 불의(不義)',s:'affair, infidelity, liaison',r:'라틴어 adulterare(섞어 더럽히다) → 혼인을 더럽히는 간통'},

{n:2309,w:'cutthroat',m:'a. ① 살인의, 잔인한, 흉악한 ② (경쟁 등이) 치열한, 먹느냐 먹히느냐의 / n. 살인자',s:'cruel, ferocious, murderous, ruthless, vicious / dog-eat-dog, fierce, intense',r:'영어 cut(자르다) + throat(목구멍) → 목구멍을 자르는 잔인한'},
