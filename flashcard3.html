{n:2392,w:'expurgate',m:'vt. (책이나 기록에서 부적당한 부분을) 삭제하다',s:'bowdlerize, censor, redact',r:'라틴어 ex-(완전히) + purgare(청소하다) → 완전히 청소하여 삭제하다'},
{n:2393,w:'crass',m:'a. ① 우둔한, 어리석은, 무신경한 ② 심한, 지독한',s:'insensitive, stupid / nasty',r:'라틴어 crassus(두꺼운) → 두껍게 무신경하고 우둔한'},
{n:2394,w:'idolatry',m:'n. ① 우상숭배 ② 맹목적 숭배, 심취',s:'the idol worshipping / adoration, apotheosis, worship',r:'그리스어 eidolon(우상) → 우상을 숭배하는 것'},
{n:2395,w:'uxorious',m:'a. 아내에게 무른, 애처가인',s:'',r:'라틴어 uxor(아내) → 아내에게 지나치게 헌신하는'},
{n:2396,w:'bungle',m:'v. ~을 엉망으로 하다; 망치다, 실수하다 / n. 실수',s:'blunder, botch, flub / blunder, mistake, muff',r:'고대 영어 bungel(서투른 솜씨) → 서툰 솜씨로 망치다'},
{n:2397,w:'refection',m:'n. ① 기분 전환, 위안, 휴양; 원기 회복 ② (간단한) 식사, 간식',s:'recreation; refreshment / light meal, nosh, snack',r:'라틴어 re-(다시) + facere(만들다) → 다시 만들어 원기를 회복하는 간식'},
{n:2398,w:'denigrate',m:'vt. ① 명예를 훼손하다 ② 경시하다, 폄하하다, 깎아내리다',s:'defame, libel, slander / belittle, derogate, disparage',r:'라틴어 de-(완전히) + niger(검은) → 검게 만들어 명예를 훼손하다'},
{n:2399,w:'sympathy',m:'n. ① 동정, 연민 ② 호의, 찬성, 동조, 지지, 동의 ③ 문상, 위문',s:'commiseration, pity / agreement, endorsement, favor, support / condolence',r:'그리스어 sym-(함께) + pathos(감정) → 함께 감정을 느끼는 동정'},
{n:2400,w:'telltale',m:'n. ① 고자질쟁이, 밀고자 ② (비밀·속사정 등을) 폭로하는 것; 표시, 증거 / a. 숨길 수 없는, 비밀을 폭로하는, 고자질하는',s:'blabbermouth, sneak, squealer / evidence, indication / revealing',r:'영어 tell(말하다) + tale(이야기) → 비밀 이야기를 말하는 밀고자'},
{n:2401,w:'frail',m:'a. ① 연약한, 허약한 ② 깨지기 쉬운, 부서지기 쉬운',s:'delicate, feeble, tender, vulnerable / breakable, brittle, crump, fragile',r:'라틴어 fragilis(깨지기 쉬운) → 고대 프랑스어 fraile → 작은 충격에도 쉽게 부서지고 연약한 → 연약한, 깨지기 쉬운'},
{n:2402,w:'soporific',m:'a. 최면성의; 졸리게 하는, 잠이 오는 / n. 수면제, 마취제',s:'hypnagogic, drowsy, somniferous / hypnotic',r:'라틴어 sopor(깊은 잠) + facere(만들다) + -ic → 먹으면 깊은 잠을 유도해 내는 약물이나 성질 → 최면성의, 졸리게 하는'},
{n:2403,w:'ethics',m:'n. ① (단수취급) 윤리학 ② 도의, 도덕, 윤리',s:'morals / morality, principles',r:'그리스어 ethos(관습, 성품) + -ics(학문) → 사람이 지켜야 할 올바른 성품과 관습에 대해 연구하는 학문 → 윤리학, 도덕'},
{n:2404,w:'defalcate',m:'vi. (공금·위탁 재산 등을) 부정하게 사용하다, 부당 유용하다, 횡령하다',s:'appropriate, embezzle, misappropriate, peculate',r:'라틴어 de-(아래로) + falx(낫) + -ate → 낫으로 작물을 베어내듯 위탁받은 공금을 몰래 잘라내어 빼돌리다 → 부정하게 사용하다, 횡령하다'},
{n:2405,w:'hyperbole',m:'n. 과장(법); 과장 표현, 과장 어구',s:'exaggeration, overstatement, rhetoric',r:'그리스어 hyper-(넘어서) + ballein(던지다) → 진실의 테두리를 아득히 넘어서 과장되게 던지는 말 → 과장법, 과장 표현'},
{n:2406,w:'confess',m:'v. (과실·죄를) 고백하다, 자백하다, 토로하다; 인정하다',s:'confide, profess / acknowledge, admit',r:'라틴어 con-(완전히) + fateri(인정하다) → 자신이 지은 죄나 잘못을 숨기지 않고 밖으로 드러내어 온전히 인정하다 → 고백하다, 자백하다'},
{n:2407,w:'indenture',m:'n. 계약서, 약정서; (보통 pl.) 도제(徒弟)살이 계약서, 노예계약서 / vt. 도제살이 계약서로 고용하다',s:'',r:'라틴어 in-(안으로) + dens(이빨) + -ure → 위조를 막으려 계약서의 가장자리를 이빨 자국처럼 톱니 모양으로 자르던 관습 → 계약서, 도제살이 계약서'},
{n:2408,w:'strut',m:'n. ① 지주, 버팀목 ② 점잔뺀 걸음걸이, 활보; 과시, 자만 / v. 뽐내며 걷다, 과시하다',s:'brace, prop / prance, stalk, swagger',r:'고대 영어 strutian(뻣뻣하게 서다) → 나무 기둥이 뻣뻣하게 서서 지탱하거나 사람이 고개를 빳빳이 들고 뽐내며 걷다 → 지주, 뽐내며 걷다'},
{n:2409,w:'reverse',m:'v. ① 거꾸로 하다, 반대로 하다; 뒤집다, 뒤엎다 ② 바꾸어 놓다, 교환하다, 전환하다 ③ (주와·결정 등을) 뒤집다, 번복하다 / a. 반대의, 거꾸로의; 역(逆)의 / n. 역(逆), 반대',s:'overthrow, overturn / change, shift, switch / annul, cancel, repeal, revoke / contrary, converse, opposite',r:'라틴어 re-(뒤로) + vertere(돌리다) → 가던 방향이나 결정된 순서를 거꾸로 완전히 뒤집어버리다 → 거꾸로 하다, 반대'},
{n:2410,w:'plank',m:'n. ① 널빤지, 두꺼운 판자 ② 정당 강령의 항목[조항]',s:'board / platform',r:'라틴어 planca(넓고 얇은 판) → 통나무를 얇고 넓게 켠 두꺼운 널빤지나, 정당의 기본 정책을 떠받치는 강령 조항 → 널빤지, 정당 강령의 항목'},
{n:2411,w:'dialectic',m:'n. 변증법(문답에 의해 진리에 도달하는 방법) / a. 변증법적인, 문답식의',s:'',r:'그리스어 dia-(가로질러) + legein(말하다) → 서로 의견을 가로지르며 묻고 답하는 토론을 통해 진리에 도달하는 방법 → 변증법'},
{n:2412,w:'alimony',m:'n. (보통 남편이 아내에게 주는) 별거[이혼] 수당, 위자료',s:'separation allowance, maintenance',r:'라틴어 alere(영양을 주다) + -mony(상태, 결과) → 이혼 후에도 살아갈 수 있도록 생계와 영양을 유지하게 돕는 돈 → 별거 수당, 위자료'},
{n:2413,w:'bustle',m:'v. 분주히 돌아다니다, 서두르다 / n. 야단법석, 혼잡, 붐빔',s:'fuss, hurry, rush / ado, fuss, hustle-bustle, stir, tumult',r:'고대 노르드어 bustla(서두르다) → 수많은 사람들이 바쁘게 이리저리 돌아다니며 서두르고 시끌벅적한 상태 → 분주히 돌아다니다, 야단법석'},
{n:2414,w:'structure',m:'n. ① 구조, 체제, 짜임새 ② 구조물, 건축물 / vt. 조직하다, 구조화하다',s:'construction, design, fabric, organization / building, construction, edifice, fabrication / form, orchestrate, organize',r:'라틴어 struere(짓다, 세우다) + -ure → 여러 재료나 요소들을 얽어 짜서 하나로 튼튼하게 지어 올린 뼈대 → 구조, 건축물'},
{n:2415,w:'protean',m:'a. ① 변화무쌍한, 갖가지로 변하는 ② (배우가) 여러 가지 역할을 소화하는',s:'ever-changing, kaleidoscopic',r:'그리스 신화 Proteus(모습을 마음대로 바꾸는 바다의 신) + -an → 프로테우스처럼 상황에 따라 끝없이 형태를 바꾸는 → 변화무쌍한'},
{n:2416,w:'latch',m:'n. (문이나 대문의) 걸쇠, 빗장 / v. ~에 걸쇠를 걸다; 걸쇠가 걸리다',s:'bar, bolt, clasp, fastening / fasten, lock, secure',r:'고대 영어 læccan(붙잡다) → 문이 열리지 않게 문설주에 걸어 꽉 붙잡아두는 쇳조각이나 장치 → 걸쇠, 빗장'},
{n:2417,w:'myopic',m:'a. 근사(안)의, 근시안적인',s:'nearsighted, shortsighted',r:'그리스어 myein(감다) + ops(눈) + -ic → 먼 곳을 보려고 눈을 가늘게 뜨고 찡그리는 근시의 특성 → 근시안적인'},
{n:2418,w:'gauntlet',m:'n. ① (갑옷의) 손가락개; (승마·펜싱 등에 쓰는) 긴 장갑 ② 태형 ③ 시련(試鍊)',s:'flogging / test, trial',r:'고대 프랑스어 gant(장갑) + -let(작은) → 기사들이 결투를 신청할 때 던지던 쇠사슬 장갑이나, 그 장갑으로 맞는 시련 → 장갑, 시련'},
{n:2419,w:'shred',m:'n. ① 조각, 파편 ② 약간, 소량, 극히 조금',s:'fragment, particle / bit, scrap',r:'고대 영어 screade(조각) → 종이나 천을 아주 가늘고 작게 찢어낸 조각이나 부스러기 → 조각, 파편'},
{n:2420,w:'capitulate',m:'vi. (오랫동안 거부하던 것에) 굴복하다, 항복하다',s:'succumb, surrender, yield',r:'라틴어 caput(머리) + -ulate → 조약의 여러 머리말(조항)에 합의하고 결국 적에게 머리를 숙여 항복하다 → 굴복하다, 항복하다'},
{n:2421,w:'treason',m:'n. ① 반역, 반역죄, 모반 ② 배신, 배반, 불충, 불성실',s:'rebellion, revolt, sedition, treachery / betrayal, disloyalty, perfidy',r:'라틴어 tradere(넘겨주다) → 굳은 믿음을 배반하고 조국이나 군주를 적의 손에 홀랑 넘겨버리는 대역죄 → 반역, 배신'},
{n:2422,w:'buzzword',m:'n. (사업가·정치과학자 등이 쓰는) 전문 용어; (언론 등에서 많이 사용되는) 유행어',s:'',r:'영어 buzz(윙윙거리는 소리) + word(단어) → 벌 떼처럼 사람들 입에 윙윙 오르내리며 언론에서 널리 쓰이는 유행어 → 전문 용어, 유행어'},
{n:2423,w:'nubile',m:'a. ① (여성이) 결혼 적령기의, 요령의, 시집갈 나이의 ② (젊은 여자가) 성적 매력이 있는',s:'marriageable / desirable, foxy, sexy',r:'라틴어 nubere(결혼하다, 베일을 쓰다) + -ile(할 수 있는) → 신부가 베일을 쓸 만큼 성숙하여 시집가기에 딱 알맞은 나이가 된 → 결혼 적령기의'},
{n:2424,w:'criterion',m:'n. (판단·평가를 위한) 표준, 기준 (pl. criteria)',s:'gauge, norm, standard, touchstone, yardstick',r:'그리스어 krites(재판관) + -ion(도구) → 재판관이 어떤 대상을 공정하게 판단하고 평가하기 위해 들이대는 잣대 → 표준, 기준'},
{n:2425,w:'scour',m:'v. ① 문질러 닦다, 윤내다 ② 비벼 빨다, 세탁하다 ③ (~을 구해서) 찾아다니다, 찾아 헤매다[after, for]',s:'polish, scrub / clean, wash / comb, forage, ransack, search',r:'라틴어 ex-(완전히) + curare(돌보다, 씻다) → 때를 벗기려고 벅벅 문지르거나 범인을 잡으려 온 동네를 샅샅이 뒤지다 → 문질러 닦다, 찾아 헤매다'},
{n:2426,w:'fever',m:'n. ① (병으로 인한) 열, 발열; 열병 ② 열중, 열광, 흥분',s:'',r:'라틴어 febris(열) → 질병에 걸려 몸에서 펄펄 끓어오르는 뜨거운 열이나 사람들이 특정 대상에 미친 듯이 빠져드는 열광 → 발열, 열광'},
{n:2427,w:'armchair',m:'a. ① 이론뿐인, 탁상공론의 ② (책 등을 통해) 간접적으로 아는, 간접 경험의',s:'academic, impractical / indirect',r:'영어 arm(팔) + chair(의자) → 현장에 가지 않고 팔걸이의자에 편히 앉아 책으로만 간접적으로 지식을 얻는 → 탁상공론의, 간접 경험의'},
{n:2428,w:'cosmetic',m:'n. ① (보통 pl.) 화장품 ② (비유) 결점을 감추는 것 / a. ① 화장용의 ② 겉치레의, 표면적인',s:'makeup, toiletries / ostensible, perfunctory, superficial',r:'그리스어 kosmos(질서, 우주) + -etic → 혼란을 질서 있게 가꾸듯 피부나 결점을 아름답게 꾸미거나 겉만 그럴싸하게 포장하는 → 화장품, 겉치레의'},
{n:2429,w:'grouse',m:'vi. 불평하다, 투덜대다[about]',s:'complain, grumble, moan, mutter',r:'어원 불명(노르만어 groucer 불평하다 추정) → 마음에 들지 않아 속으로 끙끙 앓으며 불만을 품고 투덜투덜 끊임없이 짜증을 내다 → 불평하다'},
{n:2430,w:'knot',m:'n. ① 매듭; (줄기의) 마디, 옹이, 혹 ② 분규, 곤란, 혼란, 어려운 일, 난제 ③ (부부 등의) 인연, 연분, 유대',s:'gnarl / complication, difficulty, tangle / bond, connection, relation, ties',r:'고대 영어 cnotta(매듭) → 줄을 꼬아 단단하게 묶은 매듭이나 풀기 힘들게 얽히고설킨 곤란한 문제 → 매듭, 곤란'},
{n:2431,w:'riveting',m:'a. 관심을 사로잡는, 황홀케 하는, 매혹적인',s:'captivating, engrossing, enthralling, fascinating',r:'고대 프랑스어 river(고정하다) + -ing → 쇠못을 박아 단단히 고정하듯 사람의 시선이나 관심을 한곳에 꼼짝 못 하게 묶어버리는 → 황홀케 하는, 매혹적인'},
{n:2432,w:'chill',m:'n. ① 냉기, 한기; 오한 ② 냉담, 냉명함; 오싹함 / a. ① 차가운, 냉랭한; 오싹함 ② 냉담한, 쌀쌀한 / v. ① 식히다, 냉각하다 ② 춥게 하다, 오싹하게 하다 ③ (계획·사람에게) 냉담하게 되다; 열의가 식다; 냉정해지다',s:'chilly, cold, frigid, wintry / cool, refrigerate / appall, horrify, thrill',r:'고대 영어 ciele(추위) → 살을 에는 듯한 차가운 냉기나 두려움으로 등골이 오싹해져서 뜨겁던 열의가 차갑게 식어버리다 → 냉기, 오싹함, 식히다'},
{n:2433,w:'pulverize',m:'v. 가루로 만들다, 빻다',s:'crush, grind, mill, pound',r:'라틴어 pulvis(먼지, 가루) + -ize(만들다) → 단단한 바위나 곡식을 맷돌로 갈아 형체도 없이 고운 가루나 먼지로 빻아버리다 → 가루로 만들다'},
{n:2434,w:'altercation',m:'n. 언쟁, 논쟁',s:'argument, bicker, dispute, quarrel, wrangle',r:'라틴어 altercari(논쟁하다) + -tion → 다른 의견을 가진 사람들이 서로 목소리를 높여 험악하고 시끄럽게 말싸움을 벌이는 것 → 언쟁, 논쟁'},
{n:2435,w:'exude',m:'v. (액체·냄새·느낌 등을) 흘리다[스며나오다]',s:'emanate, emit, ooze, radiate',r:'라틴어 ex-(밖으로) + sudare(땀 흘리다) → 몸 안의 땀이나 액체, 혹은 어떤 느낌이 피부나 겉으로 스멀스멀 배어 나오다 → 흘리다, 스며나오다'},
{n:2436,w:'veterinarian',m:'n. 수의사',s:'',r:'라틴어 veterinus(짐을 끄는 짐승의) → 소나 말 같은 짐승이나 동물의 질병을 전문적으로 치료하고 돌보는 의사 → 수의사'},
{n:2437,w:'obsequious',m:'a. 아첨하는, 아부하는; 비굴한',s:'flattering, servile, submissive',r:'라틴어 ob-(~를 향하여) + sequi(따르다) + -ous → 윗사람의 꽁무니를 바짝 쫓아다니며 맹목적으로 알랑거리고 굽실대는 → 아첨하는, 비굴한'},
{n:2438,w:'mass',m:'n. ① 다량, 다수, 많음; (the ~) 대부분, 태반 ② 덩어리 ③ 부피, 크기; <물리학> 질량 ④ 일반 대중 ⑤ (흔히 M~) (가톨릭) 미사; 미사의식; 미사곡',s:'',r:'라틴어 massa(반죽 덩어리) → 수많은 물질이나 사람들이 한데 뭉쳐 커다란 부피를 이룬 덩어리나 사회의 대부분을 차지하는 군중 → 덩어리, 다수, 대중'},
{n:2439,w:'sweeping',m:'a. ① 광범위한, 포괄적인, 전면적인 ② 압도적인',s:'broad, comprehensive, extensive, overall / inundant, knockdown, landslide, overwhelming',r:'영어 sweep(쓸다) + -ing → 빗자루로 먼지를 넓게 확 쓸어버리듯 아주 광범위하게 적용되거나 전면적으로 압도하는 → 광범위한, 압도적인'},
{n:2440,w:'wean',m:'vt. ① 젖을 떼다, 이유시키다 ② (나쁜 버릇 따위를) 버리게 하다, 단념시키다',s:'ablactate / discourage',r:'고대 영어 wenian(익숙하게 하다) → 젖을 먹던 아기를 어른 음식에 익숙해지도록 길들여 젖이나 나쁜 버릇을 떼게 만들다 → 젖을 떼다, 단념시키다'},
{n:2441,w:'bandage',m:'n. 붕대; 안대(眼帶), 눈가림개',s:'dressing, blindfold',r:'라틴어 bandum(띠) + -age → 상처 부위를 보호하고 피를 멎게 하려고 띠 모양의 천으로 둘둘 감아매는 의료용 물건 → 붕대'},
{n:2442,w:'turbulent',m:'a. (날씨 등이) 사나운, 거친, 요동치는; 소란스러운',s:'rough, stormy, uproarious',r:'라틴어 turba(혼란, 군중) + -ulent → 거센 폭풍우나 성난 군중처럼 통제할 수 없이 거칠게 날뛰고 사납게 요동치는 → 사나운, 소란스러운'},
{n:2443,w:'overture',m:'n. ① 신청, 제안; 예비교섭 ② <음악> 서곡, 전주곡',s:'proposal, suggestion / prelude',r:'고대 프랑스어 overture(열기) → 닫힌 문을 열고 교섭을 시작하기 위해 던지는 첫 제안이나 오페라의 막을 올리기 전 연주하는 음악 → 제안, 서곡'},
{n:2444,w:'putrid',m:'a. (동식물이) 썩은, 부패한; (썩으면서) 악취가 나는',s:'decayed, rotten, foul, malodorous',r:'라틴어 putrere(썩다) + -id → 죽은 동식물이 썩어 문드러져서 코를 찌를 듯이 구역질 나는 역겨운 악취를 풍기는 → 썩은, 악취가 나는'},
{n:2445,w:'drain',m:'v. ① ~에서 배수하다, ~의 물을 빼다[빠지다] ② (힘·돈 등을) 빼내 가다, 소모시키다; (인재를) 유출시키다 / n. ① 배수, 방수; 유출, 배수관 ② 고갈, 낭비, 소모; (많은 시간·돈 등을) 고갈시키는[잡아먹는] 것',s:'the dewater / deplete, exhaust',r:'고대 영어 dreahnian(걸러내다) → 하수구로 물을 쫙 빼내거나 사람의 기운과 돈을 바닥까지 남김없이 빨아들여 고갈시키다 → 배수하다, 고갈시키다'},
{n:2446,w:'accost',m:'vt. 다가가서 말을 걸다',s:'',r:'라틴어 ad-(~로) + costa(옆구리, 갈비뼈) → 모르는 사람의 옆으로 바짝 다가가서 불쑥 말을 붙이거나 강제적으로 접근하다 → 다가가서 말을 걸다'},
{n:2447,w:'ecumenic',m:'a. ① 전반적인, 보편적인, 세계적인 ② 전 기독교(회)의, 세계 교회 운동의',s:'general, universal',r:'그리스어 oikoumene(사람이 사는 온 세상) + -ic → 한 지역을 넘어 전 세계 기독교 교회가 하나로 뭉치고 보편적으로 적용되는 → 보편적인, 전 기독교의'},
{n:2448,w:'freak',m:'n. ① 변덕, 일시적 기분 ② 기형, 변종; 괴짜 ③ 열광자, ~광(狂) / v. ① 흥분하다[시키다], 기겁을 하다[하게 만들다] ② 얼룩지게 하다',s:'caprice, whim / eccentric, weirdo / enthusiast, fan / stain',r:'어원 불명(기이한 행동) → 갑자기 튀어나오는 변덕이나 자연의 법칙을 어기고 태어난 기형, 또는 한 가지에 미친 듯이 열광하는 괴짜 → 변덕, 괴짜, 열광자'},
{n:2449,w:'purvey',m:'v. (식료품 등을) 공급하다, 조달하다, 납품하다[for, to]',s:'provide, sell, supply',r:'라틴어 pro-(미리) + videre(보다) → 군대나 대형 행사를 위해 필요한 식료품을 미리 내다보고 조달하여 납품하다 → 공급하다, 조달하다'},
{n:2450,w:'circumlocution',m:'n. 에두른[완곡한] 표현',s:'euphemism, periphrasis',r:'라틴어 circum-(주위를) + loqui(말하다) + -tion → 핵심을 직접 찌르지 못하고 주변만 빙빙 돌면서 핑계 대듯 길게 에둘러 하는 말 → 에두른 표현'},
{n:2451,w:'zenith',m:'n. ① 천정(天頂) ② 정점, 절정, 전성기',s:'vertex / acme, apex, heyday, peak, prime, summit',r:'아랍어 samt(길, 머리 위의 길) → 천문학에서 관측자의 머리 꼭대기 위 하늘을 뜻하며, 인생에서 가장 높게 도달한 눈부신 황금기 → 천정, 절정, 정점'},
{n:2452,w:'exemplary',m:'a. ① 모범적인, 모범이 되는, 훌륭한 ② (처벌이) 본보기를 보이기 위한, 경고가 되는',s:'excellent, ideal, model, perfect / cautionary, warning',r:'라틴어 exemplum(견본) + -ary → 남들에게 본보기로 삼아 보여줄 만큼 아주 훌륭하거나 반대로 엄중한 경고의 표본이 될 만한 → 모범적인, 경고가 되는'},
{n:2453,w:'declaim',m:'v. ① 열변을 토하다 ② 맹렬히 비난[규탄]하다[against]',s:'harangue, orate, perorate, rant / arraign, censure, denounce, inveigh',r:'라틴어 de-(강조) + clamare(외치다) → 대중을 향해 거침없이 열변을 토하거나 누군가의 잘못을 큰 소리로 맹렬하게 깎아내리며 비난하다 → 열변을 토하다, 비난하다'},
{n:2454,w:'armament',m:'n. ① (군대·군함·비행기 등을 포함한) 장비, 무기, 병기 ② (한 나라의) 군사력, 군비',s:'the ammunition, arms',r:'라틴어 armare(무장하다) + -ment → 군인이나 군함이 전투에 나설 때 갖추고 있는 파괴적인 장비와 국가가 보유한 전체적인 군사력 → 장비, 무기, 군비'},
{n:2455,w:'intangible',m:'a. ① 손으로 만질 수 없는, 만질 수 없는; 실체가 없는, 무형의 ② 파악할 수 없는, 막연한, 불가해한',s:'impalpable, corporeal, insubstantial',r:'라틴어 in-(not) + tangere(만지다) + -ible → 물리적인 실체가 없어 손을 뻗어 만질 수 없거나 마음으로 확실히 파악하기 어려운 → 만질 수 없는, 무형의'},
{n:2456,w:'shoddy',m:'a. ① 가짜의, 겉만 그럴듯한, 싸구려의 ② (재료나 만들어진 것이) 조잡한 / n. 가짜, 위조품, 모조품',s:'',r:'어원 불명(19세기 싸구려 재생 실) → 질 좋은 새 재료가 아니라 싸구려 낡은 실로 대충 기워 만들어 품질이 형편없이 조잡한 → 가짜의, 조잡한'},
{n:2457,w:'progeny',m:'n. ① (사람·동식물의) 자손; 후계자 ② 결과, 소산',s:'child, descendant, offspring / consequence, outcome, result',r:'라틴어 pro-(앞으로) + gignere(낳다) → 부모가 앞으로 계속해서 낳아 대를 이어나가는 생명체나 그 행동이 낳은 최종 결과물 → 자손, 결과'},
{n:2458,w:'rejoice',m:'v. 기뻐하다, 좋아하다, 축하하다[at, in, over, on]',s:'delight, exult, glory, revel',r:'라틴어 re-(강조) + gaudere(기뻐하다) → 슬픔을 날려버리고 가슴속 깊은 곳에서 우러나오는 엄청난 환희와 기쁨에 소리치며 즐거워하다 → 기뻐하다'},
{n:2459,w:'cornucopia',m:'n. 풍요, 풍부',s:'abundance, affluence, exuberance, opulence',r:'라틴어 cornu(뿔) + copia(풍요) → 그리스 신화에서 무엇이든 쏟아져 나오는 마법의 뿔처럼 한없이 넘쳐나는 재물과 넉넉함 → 풍요, 풍부'},
{n:2460,w:'outmoded',m:'a. 유행에 뒤떨어진, 구식의',s:'ancient, antique, old-fashioned, outdated',r:'영어 out-(벗어난) + mode(유행) + -ed → 한때는 세련된 방식이었으나 시간이 훌쩍 지나버려 이제는 트렌드에서 빗겨난 구식의 → 구식의'},
{n:2461,w:'barb',m:'n. ① (화살촉·낚싯가시·가시철사의) 미늘; 갈고리, 가시 ② 날카로운 비판, 가시 돋친 말 / vt. ~에 미늘[갈고리, 가시]을 달다',s:'flue, fluke / acerbity, shaft, stinger',r:'라틴어 barba(수염) → 낚싯바늘이나 화살촉에 달려 한 번 박히면 안 빠지는 미늘이나 남의 가슴을 후벼파는 날카로운 비판 → 미늘, 가시 돋친 말'},
{n:2462,w:'exchequer',m:'n. ① 국고(國庫) ② (개인·회사 등의) 재원, 재력, 재정 (상태), 재정 형편 ③ (영) (the E~) 재무부',s:'national treasury / coffers, funds / the Finance Ministry, the Ministry of Finance',r:'고대 프랑스어 eschequier(체스판) → 중세 영국에서 국가 세금을 계산할 때 체스판 모양의 탁자를 쓰던 것에서 유래한 국가의 금고 → 국고, 재무부'},
{n:2463,w:'consign',m:'vt. ① 맡기다, 위탁하다, 위임하다 ② (상품을) 위탁(판매)하다; (위탁 판매를 위해) 발송하다, 부치다 ③ (좋지 않은 상황에) 처하게 만들다, ~을 (나쁜 상태 등에) 몰아넣다',s:'commit',r:'라틴어 con-(함께) + signare(서명하다) → 서류에 함께 사인하고 책임을 남에게 완전히 넘기며 물건을 위탁 판매용으로 탁송하다 → 맡기다, 위탁하다'},
{n:2464,w:'invincible',m:'a. 천하무적의, 아무도 꺾을 수 없는',s:'impregnable, unbeatable, unconquerable',r:'라틴어 in-(not) + vincere(이기다) + -ible → 아무리 무서운 적이나 시련이 닥쳐도 결코 져서 꺾이지 않을 만큼 끄떡없는 천하무적의 → 천하무적의'},
{n:2465,w:'dawdle',m:'v. 꾸물거리다, 빈둥빈둥 시간을 보내다',s:'the idle, loiter, procrastinate, tarry',r:'어원 불명(daddle 비틀거리다 변형) → 할 일이 태산인데도 제자리걸음을 하며 시간을 갉아먹고 게으름을 피우며 꾸물거리다 → 꾸물거리다, 빈둥거리다'},
{n:2466,w:'swashbuckle',m:'v. 허세부리다, 젠체하다',s:'',r:'영어 swash(칼을 내리치다) + buckler(작은 방패) → 칼로 방패를 요란하게 쾅쾅 치며 자기가 최고로 강한 척 으스대고 허세를 부리다 → 허세부리다'},
{n:2467,w:'compass',m:'n. ① 나침반; (보통 pl.) (제도용) 컴퍼스 ② (비유) 한계, 범위, 주위',s:'boundary, extent, limit, range, area',r:'라틴어 com-(함께) + passus(걸음) → 두 다리로 나란히 걸어 빙 둘러싼 한계선이나 원을 그리는 도구, 방향을 잡는 나침반 → 나침반, 한계'},
{n:2468,w:'naughty',m:'a. ① (어린이가) 말을 듣지 않는, 장난꾸러기인, 버릇없는 ② (행위 등이) 음탕한, 외설적인',s:'disobedient, impish, mischievous / bawdy, improper, lewd, obscene',r:'영어 naught(가치 없음) + -y → 도덕적으로 아무 가치가 없어 부모 말을 안 듣고 제멋대로 구는 장난꾸러기이거나 음탕한 행동을 하는 → 버릇없는, 음탕한'},
{n:2469,w:'modicum',m:'n. 소량, 근소, 약간',s:'bit, drop, little',r:'라틴어 modus(측정, 한도) → 손바닥 위에 살짝 올려놓을 수 있을 만큼 간에 기별도 안 가는 아주 적고 근소한 분량 → 소량, 약간'},
{n:2470,w:'grumble',m:'v. 불평하다, 투덜거리다, 푸념하다, 중얼거리다[at, about] / n. 투덜대는 소리, 불만, 불평, 푸념',s:'complain, moan / complaint, protest',r:'어원 불명(투덜대는 소리의 의성어) → 대놓고 큰 소리 치지는 못하고 입속으로 우물우물 짜증을 내며 투덜거리는 소리 → 불평하다, 투덜거리다'},
{n:2471,w:'tergiversation',m:'n. ① 핑계, 구실, 변명 ② 변절',s:'excuse, pretext / betrayal, defection, treachery',r:'라틴어 tergum(등) + vertere(돌리다) → 믿던 신념을 배신하고 등을 확 돌리거나 진실을 감추려고 이리저리 둘러대는 핑계 → 변절, 핑계'},
{n:2472,w:'bosom',m:'n. ① 가슴, 흉부; 여성의 유방 ② 가슴 속의 생각, 속마음; 친애의 정, 애정 / a. 친한; 비밀을 털어놓을 수 있는, 심복의',s:'breast, bust, chest / close, confidential, intimate',r:'고대 영어 bosm(가슴) → 아이를 안아주는 어머니의 따뜻한 가슴이자 남에게 절대 꺼내놓지 않는 비밀스럽고 친근한 속마음 → 가슴, 속마음, 친한'},
{n:2473,w:'coeval',m:'a. 같은 나이[연대, 시기]의 / n. 동시대[동연대]의 사람[것]',s:'coetaneous, contemporary',r:'라틴어 co-(함께) + aevum(시대) + -al → 같은 시간의 수레바퀴를 타고 굴러가 똑같은 나이나 연대를 겪어낸 사람이나 사물 → 같은 나이의, 동시대의'},
{n:2474,w:'fret',m:'v. ① 초조해 하다, 안달하다, 애태우다 ② (산·녹 때문에) 부식하다, 침식하다',s:'chafe, fuss, jitter, worry / corrode, erode',r:'고대 영어 fretan(갉아먹다) → 녹이 쇠를 야금야금 갉아먹듯 초조함과 안달이 사람의 속마음을 태우며 갉아먹다 → 부식하다, 안달하다'},
{n:2475,w:'radiation',m:'n. ① (빛·열 등의) 방사, 복사 ② 방사선, 복사 에너지; 방사선',s:'emanation, emission',r:'라틴어 radiare(빛을 내다) + -tion → 태양이나 전구에서 뿜어져 나온 눈부신 빛이나 열이 사방으로 방사상으로 뻗어 나가는 현상 → 방사, 복사 에너지'},
{n:2476,w:'educe',m:'v. ① (잠재적 능력 등을) 끌어내다 ② (자료에서 결론을) 추론(推論)하다, 연역(演繹)하다 ③ (화합물에서) ~을 추출하다',s:'draw, elicit / deduce, infer / extract',r:'라틴어 e-(밖으로) + ducere(이끌다) → 깊이 잠들어 있던 잠재력을 밖으로 끌어내거나 복잡한 사실들 속에서 논리적 결론을 뽑아내다 → 끌어내다, 추론하다'},
{n:2477,w:'unison',m:'n. 일치, 조화, 화합',s:'the accord, harmony',r:'라틴어 unus(하나) + sonus(소리) → 여러 개의 악기나 사람의 목소리가 한 치의 어긋남 없이 완벽하게 하나로 어우러져 내는 화음 → 일치, 조화'},
{n:2478,w:'putative',m:'a. 추정되는, 소문에 들리는',s:'alleged, conjectural, supposed, suppositional',r:'라틴어 putare(생각하다) + -ive → 완벽한 증거는 없지만 대다수의 사람들이 그럴 것이라고 짐작하여 소문으로 기정사실처럼 받아들이는 → 추정되는, 소문에 들리는'},
{n:2479,w:'ingratiate',m:'vt. 환심을 사다, 비위를 맞추다, 마음에 들게 하다, 영합하다',s:'curry favor with, flatter, make one\'s marbles good',r:'라틴어 in-(안으로) + gratia(은총) + -ate → 상대방의 은총과 호의를 얻어 그 마음속으로 들어가기 위해 영합하며 굽실거리고 비위를 맞추다 → 환심을 사다'},
{n:2480,w:'puppet',m:'n. ① 작은 인형 ② 꼭두각시 ③ 괴뢰, 앞잡이',s:'the marionette / minion, pawn, tool',r:'라틴어 pupa(인형) + -et(작은) → 실로 묶여 남의 손짓에 따라 춤추는 작은 꼭두각시 인형이거나 권력자의 앞잡이 노릇을 하는 괴뢰 → 꼭두각시, 앞잡이'},
{n:2481,w:'volant',m:'a. ① 나는, 날 수 있는 ② 날쌔고, 기민한, 민첩한, 몸이 가벼운',s:'flying, volitant, agile, birdlike, nimble, nippy',r:'라틴어 volare(날다) + -ant → 새처럼 날개를 펴고 하늘을 날 수 있거나 움직임이 믿기지 않게 가볍고 민첩하게 날쌘 → 나는, 민첩한'},
{n:2482,w:'crusade',m:'n. ① 십자군 ② (종교상의) 성전(聖戰); 개혁 운동',s:'campaign, drive, movement',r:'라틴어 crux(십자가) → 중세 십자가를 달고 출정한 십자군 원정에서 유래하여 그릇된 것을 바로잡으려는 열정적인 종교적, 사회적 운동 → 십자군, 개혁 운동'},
{n:2483,w:'leapfrog',m:'v. (더 높은 위치·등급으로) 뛰어넘다, 앞서다, 앞지르다',s:'bounce, leap, outdo, surpass',r:'영어 leap(뛰다) + frog(개구리) → 개구리 뜀뛰기 놀이에서 앞 사람의 등을 훌쩍 넘듯, 남을 단숨에 뛰어넘고 앞지르다 → 뛰어넘다, 앞서다'},
{n:2484,w:'hive',m:'n. ① 벌통, 벌집 ② 바쁜 사람들이 붐비는 곳, (활동 등의) 중심지',s:'beehive, center, hub',r:'고대 영어 hyf(벌집) → 꿀벌들이 육각형 방에 빽빽하게 모여 일하듯, 수많은 사람이 몰려들어 북적거리는 몹시 바쁜 장소 → 벌통, 활동의 중심지'},
{n:2485,w:'engulf',m:'vt. ① (불·늘·파도 등이) 집어삼키다, 휩쓸리게 하다 ② (강한 감정 등이) 사로잡다, 압도하다',s:'immerse, inundate, submerge, swamp, overcome, overwhelm',r:'고대 프랑스어 en-(안으로) + golfe(만, 소용돌이) → 거대한 파도나 타오르는 화염이 무언가를 집어삼켜 소용돌이 속으로 완전히 압도해버리다 → 집어삼키다, 압도하다'},
{n:2486,w:'benison',m:'n. 축복',s:'benediction, blessing',r:'라틴어 bene(좋게) + dicere(말하다) → 예배나 의식이 끝날 때 신이 사람들에게 무한한 은혜를 내려주시기를 바라는 거룩한 기도 → 축복'},
{n:2487,w:'overcast',m:'a. 구름이 뒤덮인, 흐린, 우중충한; 음울한, 우울한 / v. (구름이) ~을 덮다, 흐리게 하다, 어둡게 하다; (슬픔 등으로) 음울하게 만들다',s:'',r:'영어 over-(위로) + cast(던지다) → 파란 하늘 위로 잿빛 구름이 잔뜩 덮이면서 날씨가 우중충하게 흐려지거나 마음이 침울해지는 상태 → 구름이 뒤덮인, 어둡게 하다'},
{n:2488,w:'blockade',m:'n. (항구·해안 등의) 봉쇄; (진행·교통의) 장애(물)',s:'block, barrier, obstacle',r:'영어 block(막다) + -ade(명사) → 전쟁 시 적군의 항구나 해안선에 군함을 배치해 물자와 사람이 전혀 오가지 못하게 꽁꽁 막아버림 → 봉쇄, 장애(물)'},
{n:2489,w:'rugged',m:'a. ① 울퉁불퉁한, 고저(高低)가 있는 ② 소박한, 조야한',s:'bumpy, rough, uneven, rude',r:'중세 스칸디나비아어 rugga(거칠게 다루다) → 험준한 산비탈처럼 바위가 삐죽삐죽 솟아있거나, 사람의 인상이나 태도가 투박하고 거친 → 울퉁불퉁한, 조야한'},
{n:2490,w:'ledge',m:'n. ① (특히 창문 아래 벽에 붙인) 선반 ② 절벽에서 (선반처럼) 튀어나온 바위, 돌출부',s:'shelf, jut, projection',r:'중세 영어 leggen(놓다) → 둥지를 틀거나 짐을 올려놓기 딱 좋게 깎아지른 절벽의 면에 선반처럼 튀어나온 평평하고 좁은 바위 → 선반, 돌출부'},
{n:2491,w:'transplant',m:'n. ① 이식 ② 이식된 갯기관, 식물 / v. 이식하다, 옮겨 심다',s:'graft',r:'라틴어 trans-(이동하여) + plantare(심다) → 화분의 식물을 파내어 다른 곳에 옮겨 심거나, 아픈 환자의 몸속에 건강한 장기를 수술로 이식하다 → 이식, 이식하다'},
{n:2492,w:'forte',m:'n. 장점; 특기, 장기',s:'specialty, strength, talent',r:'프랑스어 fort(강한) → 칼싸움을 할 때 칼의 가장 두껍고 힘이 강하게 들어가는 부분에서 유래하여, 남들보다 유독 자신이 뛰어난 장기 → 장점, 특기'},
{n:2493,w:'dilated',m:'a. (집 따위가) 기울어진, (가구 따위가) 낡아빠진; (복장이) 남루한',s:'ramshackle, run-down, tumble-down',r:'라틴어 de-(아래로) + labi(미끄러지다) → 제대로 관리가 안 돼 건물이 밑으로 무너져 내리며 낡아빠지거나 사람이 입은 옷이 형편없이 헐어버린 → 기울어진, 낡아빠진'},
{n:2494,w:'stipend',m:'n. 급료, 수당, 봉급; 연금; 장학금',s:'allowance, pension, grant',r:'라틴어 stips(동전) + pendere(달아주다) → 성직자나 학생이 생활을 이어갈 수 있도록 일정한 시기마다 동전을 달아 지급하는 돈 → 급료, 연금, 장학금'},
{n:2495,w:'minister',m:'n. ① 성직자, 목사 ② 장관, 대신, 각료 / v. ① (식·예배 등을) 거행하다, 집행하다 ② 섬기다, 봉사하다; 보살펴 주다[to]',s:'clergyman, divine, pastor, preacher, priest, secretary, care for, look after, take care of',r:'라틴어 minus(더 작은) + -ter → 윗분 아래에서 몸을 낮춰 섬기는 자에서 유래하여, 국가의 살림을 맡은 장관이나 교회의 신도를 보살피는 목사 → 성직자, 장관, 보살펴 주다'},
{n:2496,w:'pellucid',m:'a. ① 투명한, 맑은 ② (말·뜻·표현·문체가) 명료한, 명백한 ③ (머리가) 명석한',s:'diaphanous, transparent, clear, lucid, plain, bright, brilliant, clever',r:'라틴어 per-(완전히) + lucidus(빛나는, 맑은) → 오염물질 없이 물이 수정처럼 투명하거나, 쓴 글의 논리가 머릿속에 한 번에 쏙쏙 들어올 만큼 맑은 → 투명한, 명료한'},
{n:2497,w:'constituency',m:'n. ① (국회의원을 선출하는) 선거구 ② (특정 지역의) 선거구민, 유권자들 ③ (특정 인물·상품 등의) 지지층, 후원단체, 고객층, 구독자층',s:'precinct, balloter, elector, electorate, voter',r:'라틴어 con-(함께) + statuere(세우다) → 대표를 국회로 뽑아 보내 함께 나라를 세우기 위해 선거구 안에 살고 있는 유권자들과 열렬한 지지층 → 선거구, 유권자들'},
{n:2498,w:'twig',m:'n. ① 잔가지 ② <해부학> (혈관·신경의) 지맥(支脈) / v. (불현듯) 깨닫다, 이해하다',s:'small branch, spray, sprig',r:'고대 영어 twig(어린 가지) → 큰 나뭇가지 끝에서 새로 파릇하게 돋아난 가느다란 잔가지이거나, 어떤 사실을 머릿속에서 불현듯 깨닫다 → 잔가지, 깨닫다'},
{n:2499,w:'anneal',m:'vt. (강철·유리 등을) 달구어 서서히 식히다; 벼리다; (의지·정신들을) 단단[강화]하다',s:'harden, strengthen, temper, toughen',r:'고대 영어 on(~에) + ælan(불태우다) → 유리를 뜨겁게 달군 후 서서히 식혀 단단하게 만들듯, 가혹한 시련을 거쳐 사람의 의지를 강철처럼 벼리다 → 서서히 식히다, 단단하게 하다'},
{n:2500,w:'infatuation',m:'n. ① 정신을 잃게[열중하게] 함[됨]; 홀림; 심취, 사랑의 열병 ② 열중[심취]하게 하는 사람[것]',s:'absorption',r:'라틴어 in-(안으로) + fatuus(어리석은) + -ation → 맹목적인 사랑의 열병에 푹 빠져버려 이성적인 판단을 완전히 잃고 바보처럼 심취하게 된 상태 → 심취, 사랑의 열병'},
{n:2501,w:'blatant',m:'a. ① 뻔뻔스러운; 속이 들여다보이는, 노골적인; 야한 ② 떠들썩한, 시끄러운',s:'obtrusive, obvious, noisy',r:'스코틀랜드어 blatand(시끄러운) → 눈치 보지 않고 시끄럽게 떠들거나 속이 뻔히 보일 정도로 노골적인 → 뻔뻔스러운, 노골적인'},
{n:2502,w:'primordial',m:'a. ① 태고의, 원시시대의, 원시 시대부터 존재하는 ② 원초적인, 근원적인, 근본적인 / n. 기본 원리',s:'primeval, primitive, basic, fundamental, primal, primary, basics, elements, fundamentals',r:'라틴어 primus(처음의) + ordiri(시작하다) + -al → 우주나 생명의 역사가 맨 처음 시작되던 태고 때부터 근본적으로 존재해 온 → 태고의, 원초적인'},
{n:2503,w:'explicate',m:'vt. (어떤 사상·문학 작품들을) 설명[해석]하다',s:'clarify, elucidate, explain, expound',r:'라틴어 ex-(밖으로) + plicare(접다) + -ate → 복잡하게 접혀 있는 사상이나 문학 작품의 숨은 뜻을 밖으로 펼쳐서 알기 쉽게 풀이하다 → 설명하다, 해석하다'},
{n:2504,w:'coronation',m:'n. (국왕·대관식 등의) 대관식, 즉위식; 대관, 즉위',s:'enthronement',r:'라틴어 corona(왕관) + -tion → 새로운 국왕이 제단에 올라 머리에 화려한 왕관을 쓰는 엄숙하고 역사적인 의식 → 대관식, 즉위식'},
{n:2505,w:'roar',m:'v. ① (짐승 등이) 으르렁거리다, 포효하다 ② 고함치다, 소리 지르다 / n. 으르렁거리는 소리, 고함소리; 노호, 굉음',s:'bay, growl, howl, snarl, bawl, cry, shout, yell, bellow, outcry',r:'고대 영어 rarian(사자가 울다) → 사자나 호랑이 같은 맹수가 크게 으르렁거리거나 군중이 화가 나서 지르는 무시무시한 고함 소리 → 으르렁거리다, 고함치다'},
{n:2506,w:'humility',m:'n. 겸손, 비하; (pl.) 겸손한 행위',s:'humbleness, modesty',r:'라틴어 humilis(땅에 닿은, 낮은) + -ity → 자신의 잘남을 내세우지 않고 마음을 땅처럼 낮게 깔고 상대를 존중하는 태도 → 겸손, 비하'},
{n:2507,w:'stack',m:'n. ① 무더기, 더미 ② (a ~ 또는 pl.) 다량, 많음 / v. 산더미처럼 쌓다, 쌓아올리다',s:'bundle, heap, pile, load, stockpile',r:'고대 노르드어 stakkr(건초 더미) → 마른풀이나 장작, 물건들을 차곡차곡 위로 무더기가 되도록 산더미처럼 쌓아 올리다 → 무더기, 쌓아올리다'},
{n:2508,w:'mollusk',m:'n. 연체동물',s:'',r:'라틴어 mollis(부드러운) → 딱딱한 뼈 없이 부드러운 살덩이로만 이루어진 조개나 오징어 같은 동물들 → 연체동물'},
{n:2509,w:'outlandish',m:'a. ① 이국풍의 ② 이상스런 ③ 외진, 벽촌의',s:'exotic, foreign, bizarre, odd, strange, outlying, remote',r:'영어 outland(먼 외딴곳) + -ish → 도심에서 뚝 떨어진 벽촌이나 외국에서 온 것처럼 생김새나 풍습이 매우 낯설고 기이한 → 이국풍의, 이상스런'},
{n:2510,w:'sedition',m:'n. (반정부적인) 선동; 치안 방해, 폭동 교사; 반란, 폭동',s:'mutiny, rebellion',r:'라틴어 se-(떨어져) + ire(가다) + -tion → 합법적인 권력에서 떨어져 나가 무리를 모아 국가에 반항하고 치안을 어지럽히는 행위 → 선동, 폭동'},
{n:2511,w:'construe',m:'v. 해석하다, 번역하다',s:'interpret, render, translate',r:'라틴어 con-(함께) + struere(쌓다) → 여러 단어와 문맥을 함께 짜 맞춰 그 속에 담긴 진짜 의미를 이리저리 풀이하고 번역하다 → 해석하다, 번역하다'},
{n:2512,w:'introspective',m:'a. ① 내성적인 ② 자기성찰적인, 자기반성의',s:'diffident, introvert, introverted, mousy, inward-looking, meditative, reflective',r:'라틴어 intro-(안으로) + specere(보다) + -ive → 외부로 시선을 돌리지 않고 자기 마음속 깊은 곳을 가만히 들여다보며 스스로를 살피는 → 내성적인, 자기성찰적인'},
{n:2513,w:'psalm',m:'n. ① (성경에 나오는) 성가, 찬송가 ② (the P~s) (구약 성서의) 시편(詩篇) / v. 찬송가로 축하하다, 성가를 불러 찬미하다',s:'anthem, canticle, carol, hymn',r:'그리스어 psalmos(현악기에 맞춰 부르는 노래) → 구약 성경에서 하프를 뜯으며 신을 찬미하고 기도하며 불렀던 성스러운 시와 노래 → 찬송가, 성가'},
{n:2514,w:'den',m:'n. ① (야수의) 잠자리, 굴, 동굴 ② (부정한 행위를 하기 위한) 소굴 ③ (집 안에서 조용히 일할 수 있는) 서재[작업실]',s:'antre, cave, cavern, lair, cesspit, hangout, hotbed, ken, nest, atelier, studio, study',r:'고대 영어 denn(야생동물의 굴) → 짐승이 숨어 사는 동굴이나 도둑들의 소굴, 혹은 집안에서 혼자 조용히 박혀 일하는 서재 → 굴, 소굴, 서재'},
{n:2515,w:'twinkle',m:'v. 반짝거리다, 반짝반짝 빛나는 / n. ① (눈이 행복감·흥분으로) 반짝거림, 빛남 ② 눈 깜박할 사이, 순간',s:'glitter, sparkle, blink',r:'고대 영어 twinclian(반짝이다) → 밤하늘의 작은 별들이나 기쁨에 찬 사람의 눈망울이 눈을 깜빡이듯 가볍고 밝게 빛나는 모양 → 반짝거리다, 눈 깜박할 사이'},
{n:2516,w:'cryptic',m:'a. ① 숨은, 비밀의, 뜻을 헤아리기 어려운 ② (색깔 등이) 몸을 숨기기에 알맞은, 의태의',s:'mysterious',r:'그리스어 kryptos(숨겨진) + -ic → 비밀을 간직한 채 꽁꽁 숨겨져 있어서 보통 사람은 그 뜻을 헤아리기가 몹시 까다롭고 어려운 → 숨은, 뜻을 헤아리기 어려운'},
{n:2517,w:'macrocosm',m:'n. ① 대우주 ② 전체, 총체, 복합체; 확대모형',s:'',r:'그리스어 makros(큰) + kosmos(우주) → 인간이라는 소우주에 대비되어 이 세상 전체를 포괄하는 거대한 우주나 총체적인 복합체 → 대우주, 총체'},
{n:2518,w:'insolent',m:'a. 거만한, 버릇없는, 무례한',s:'arrogant, impertinent, impudent, rude',r:'라틴어 in-(not) + solere(익숙하다) + -ent → 정상적인 사회의 예의에 전혀 익숙하지 않아 어른 앞에서도 거만하고 건방지게 구는 → 거만한, 무례한'},
{n:2519,w:'fulminate',m:'v. 맹렬히 비난하다',s:'censure, denounce, execrate',r:'라틴어 fulmen(번개) + -ate → 상대방을 향해 벼락을 내리치듯이 맹렬한 기세로 호통을 치고 가차 없이 비난을 퍼붓다 → 맹렬히 비난하다'},
{n:2520,w:'subservient',m:'a. ① 복종하는, 종속하는; 비굴한 ② 도움이 되는, 유용함[to] ③ (~보다) 부차적인[덜 중요한]',s:'menial, servile, submissive, conducive, implemental, instrumental, secondary',r:'라틴어 sub-(아래에서) + servire(섬기다) + -ent → 주인의 발밑에 납작 엎드려 노예처럼 굽실대거나, 목적 달성에 필요한 도구가 되는 → 비굴한, 부수적인'},
{n:2521,w:'court',m:'n. ① 법정, 법원; [집합적] 법관 ② 궁전, 왕실 / v. ① ~의 환심을 사다 ② 구애하다; (칭찬 등을) 얻어려고 애쓰다',s:'palace, woo, solicit',r:'라틴어 cohors(둘러싸인 마당) → 성벽으로 둘러싸인 왕궁의 뜰에서 왕의 재판이 열렸던 곳이거나 남의 환심을 사려고 아부하는 행위 → 법정, 구애하다'},
{n:2522,w:'plenitude',m:'n. ① 충분, 풍부; 완전 ② (위(胃) 등의) 포만(飽滿)',s:'abundance, opulence, profusion, completeness, repletion, satiety',r:'라틴어 plenus(가득 찬) + -tude → 창고에 곡식이 넘쳐나거나 배가 터질 듯이 부른 것처럼 부족함 없이 꽉 차서 완전한 상태 → 충분, 풍부, 포만'},
{n:2523,w:'tug',m:'v. 당기다, (세게) 잡아당기다 / n. ① (갑자기 세게) 잡아당김 ② 예인선',s:'drag, haul, pull, jerk, yank, tugboat',r:'고대 영어 teon(끌다) → 팽팽한 밧줄을 갑자기 아주 센 힘을 주어 잡아당기거나 큰 배를 끄는 작은 예인선 → 세게 잡아당기다, 예인선'},
{n:2524,w:'venial',m:'a. (좌과실 등이) 용서할 수 있는, 가벼운',s:'excusable, pardonable',r:'라틴어 venia(용서, 은혜) + -al → 죽을죄가 아니라 상황을 참작하여 은혜롭게 눈감아주고 용서해 줄 수 있을 만큼 가벼운 잘못의 → 용서할 수 있는, 가벼운'},
{n:2525,w:'sterling',m:'n. 순은, 순은 제품; 영국 파운드화 / a. 훌륭한; 진짜의; 신뢰할만한',s:'excellent, genuine, trustworthy',r:'영어 star(별) + -ling(작은) → 영국 은화에 찍혀 있던 작은 별 모양에서 유래하여 영국의 파운드화나 진짜 순수한 은처럼 훌륭한 → 순은, 훌륭한'},
{n:2526,w:'greed',m:'n. 탐욕, 욕심',s:'avarice, covetousness, cupidity, rapacity',r:'고대 영어 grædig(배고픈) → 배가 부른데도 음식을 더 원하거나 돈과 권력을 채워도 끝없이 집착하며 바라는 마음 → 탐욕, 욕심'},
{n:2527,w:'besmirch',m:'vt. 더럽히다; (명예·인격 등을) 손상시키다',s:'defile, soil, stain, sully, taint',r:'영어 be-(강조) + smirch(더럽히다) → 진흙이나 오물을 묻혀 깨끗한 옷을 더럽히거나 헛소문을 퍼뜨려 남의 명예에 먹칠을 하다 → 더럽히다, 손상시키다'},
{n:2528,w:'apothegm',m:'n. 격언, 경구',s:'adage, aphorism, dictum, maxim, proverb, saying',r:'그리스어 apo-(~로부터) + phthengesthai(말하다) → 옛 성현들의 입에서 나와 널리 퍼진 짧지만 뼈가 있고 삶의 지혜가 담긴 문구 → 격언, 경구'},
{n:2529,w:'livid',m:'a. ① 몹시 화가 난, 격노한 ② 납빛의, 검푸른, 창백한',s:'enraged, furious, outraged, ashy, pale, pallid, wan',r:'라틴어 lividus(납빛의, 멍든) → 화가 머리끝까지 나서 피가 거꾸로 솟아 얼굴이 멍든 것처럼 검푸르게 질리거나 창백해진 → 몹시 화가 난, 창백한'},
{n:2530,w:'irrupt',m:'vi. ① 침입[난입]하다[into] ② 거친[난폭한] 행동을 하다, 거친 감정을 나타내다',s:'break in, burst in on, invade, rush in',r:'라틴어 in-(안으로) + rumpere(부수다) → 닫힌 문을 폭력적으로 부수고 갑자기 쳐들어오거나 격한 감정을 쏟아내다 → 침입하다, 거친 행동을 하다'},
{n:2531,w:'peroration',m:'n. ① (연설 등의) 마무리 부분, 결론 부분, 끝맺는 말 ② 장황한[열변적인] 연설',s:'conclusion, epilogue, harangue, screed, sermon, tirade',r:'라틴어 per-(끝까지) + orare(말하다) + -tion → 기나긴 연설의 끝에 도달하여 대중을 향해 마지막으로 목소리를 높여 강렬하게 끝맺는 말 → 결론 부분, 장황한 연설'},
{n:2532,w:'oath',m:'n. ① 맹세, 서약; (법정의) 선서 ② (화·놀람 등을 나타내는) 저주, 악담, 욕설',s:'bond, pledge, promise, vow, curse, imprecation, malediction',r:'고대 영어 ath(진실) → 신 앞에서 두 손을 모으고 진실만을 말하겠다고 엄숙히 약속하거나 화가 나서 신의 이름을 걸고 내뱉는 욕설 → 맹세, 욕설'},
{n:2533,w:'gossamer',m:'a. 가볍고 얇은; 섬세한 / n. ① (공중에 떠돌거나 풀 같은 데 걸려 있는) 섬세한 거미줄[집] ② 섬세한 것, 가냘픈 것; 뜻없는 것',s:'delicate',r:'영어 goose(거위) + summer(여름) → 거위를 먹던 늦가을 무렵 허공에 날아다니던 거미줄처럼 입김에도 날아갈 듯 얇고 연약한 → 섬세한 거미줄, 얇은'},
{n:2534,w:'duck',m:'v. ① (책임·위험 등을) 피하다 ② (머리나 몸을) 쑥 수그리다[숙이다] / n. 오리, 집오리; 암오리',s:'avoid, dodge, elude, evade, shun, bend, bow, incline, stoop',r:'고대 영어 duce(잠수하는 새) → 물속으로 휙 잠수하는 오리처럼 날아오는 물건이나 귀찮은 책임을 피하려고 재빨리 고개를 쑥 숙이다 → 수그리다, 피하다'},
{n:2535,w:'frontier',m:'n. ① 국경, 국경 지방 ② 변경(邊境) ③ (지식·학문 등의) 미개척 영역',s:'border, borderland',r:'고대 프랑스어 frontiere(앞쪽) → 문명과 야만이 만나는 국가의 가장 바깥쪽 끝 영토이거나 아직 아무도 정복하지 못한 미개척지 → 국경, 미개척 영역'},
{n:2536,w:'monstrous',m:'a. ① 괴물 같은, 기괴한; 무시무시한; 극악무도한 ② 엄청난',s:'evil, horrifying, outrageous, colossal, huge, massive',r:'라틴어 monstrum(흉조, 괴물) + -ous → 끔찍한 괴물처럼 잔인하고 흉악하며 상상을 초월할 정도로 엄청나게 거대한 → 괴물 같은, 엄청난'},
{n:2537,w:'bayonet',m:'n. 총검; (the ~) 무력; (pl.) 보병',s:'',r:'프랑스 도시 Bayonne(바욘) + -et → 프랑스의 바욘 지역에서 처음 만들어 총구 끝에 꽂아 찌르는 무기로 쓰인 단검 → 총검'},
{n:2538,w:'piscatorial',m:'a. 어부[어업]의; 낚시의, 낚시를 좋아하는; 어업에 종사하는',s:'',r:'라틴어 piscari(물고기를 잡다) + -al → 바다나 강에서 그물과 낚시로 물고기를 낚아 올리는 어부들의 고단한 삶과 기술에 관련된 → 어부의, 낚시의'},
{n:2539,w:'aver',m:'vt. 단언하다, 주장하다, 확인하다',s:'affirm, assert',r:'라틴어 ad-(~에) + verus(진실) → 자신이 아는 것이 추측이 아니라 틀림없는 진짜 사실이라고 확신에 차서 강하게 주장하다 → 단언하다, 주장하다'},
{n:2540,w:'evident',m:'a. 분명한, 명백한, 뚜렷한',s:'apparent, conspicuous, manifest, obvious',r:'라틴어 e-(밖으로) + videre(보다) + -ent → 감춰져 있던 증거가 밖으로 훤히 드러나 보여서 누가 봐도 한눈에 알아볼 수 있게 뚜렷한 → 분명한, 명백한'},
{n:2541,w:'snub',m:'vt. ① 모욕하다, 무시하다 ② (참석·수락을) 거부하다',s:'front, humiliate, ignore, insult, deny, rebuff, refuse, reject',r:'고대 노르드어 snubba(꾸짖다) → 상대방의 콧대를 꺾고 쌀쌀맞게 면박을 주어 무안하게 하거나 제안을 매몰차게 거부하다 → 모욕하다, 무시하다'},
{n:2542,w:'pavilion',m:'n. ① (전시장 등으로 쓰는) 가설[특설] 건축물; 대형 천막; 정자 ② 선수 대기실, 임시 관람석',s:'',r:'라틴어 papilio(나비, 텐트) → 나비가 날개를 펼친 모양처럼 야외에 임시로 멋지게 지어놓은 대형 관람석이나 정자 → 가설 건축물, 정자'},
{n:2543,w:'catapult',m:'n. ① (Y자 모양의) 새총 ② 투석기 / v. ① ~을 세게 내던지다, 발사하다 ② 갑자기 (어떤 상태에) 이르게 하다',s:'slingshot, onager, fling, hurl, hurtle, launch, project',r:'그리스어 kata-(아래로) + pallein(던지다) → 고대 전쟁에서 거대한 돌덩이를 적을 향해 멀리 날려 보내던 무기처럼 갑자기 쏘아 올리다 → 투석기, 세게 내던지다'},
{n:2544,w:'affliction',m:'n. 고통, 고뇌, 고난, 불행',s:'misery, suffering, torment',r:'라틴어 ad-(~에) + fligere(치다) + -tion → 무거운 채찍이 내리치듯 인간의 몸과 마음을 짓눌러 지독한 괴로움에 빠뜨리는 질병이나 불행 → 고통, 고난'},
{n:2545,w:'jostle',m:'v. ① 난폭하게 밀다, 밀치다, 밀어 제치다 ② (이익·지위를 놓고) ~와 겨루다, 경합하다',s:'hustle, push, shove',r:'고대 프랑스어 jouster(마상 창시합을 하다) → 좁고 혼잡한 곳에서 자기 길을 가려고 남의 어깨를 팔꿈치로 난폭하게 밀어 제치며 나아가다 → 밀치다, 겨루다'},
{n:2546,w:'willful',m:'a. ① 계획[의도]적인, 고의의 ② 고집 센, 외고집의, 완고한',s:'delicate, intentional, headstrong, obstinate, stubborn, wayward',r:'영어 will(의지) + -ful(가득한) → 자기 고집과 의지대로만 밀어붙이려 하여 남의 말을 듣지 않고 계획적으로 엇나가는 행동을 하는 → 고의의, 고집 센'},
{n:2547,w:'retract',m:'v. ① (앞서 한 말·약속·명령·합의 등을) 철회[취소]하다 ② (몸통·껍질 등의 속으로) 들어가다[움츠리다]; 집어넣다',s:'recant, revoke',r:'라틴어 re-(뒤로) + trahere(끌다) → 한 번 뱉었던 약속이나 명령을 거두어 취소하거나, 달팽이가 몸을 껍질 속으로 쏙 집어넣다 → 철회하다, 움츠리다'},
{n:2548,w:'votary',m:'n. ① (특정 종교의) 신봉자, 신자 ② (사상·주의 등의) 지지자; 애호가',s:'devotee, enthusiast',r:'라틴어 votum(서원, 맹세) + -ary(사람) → 신에게 자신의 일생을 바치겠다고 맹세한 종교인이나, 어떤 사상을 광적으로 지지하는 자 → 신봉자, 지지자'},
{n:2549,w:'encroach',m:'vi. ① (남의 나라·땅 등을) 잠식(蠶食)하다, 침략하다, 침입하다[on, upon] ② (남의 권리 등을) 침해하다[on, upon] ③ (바다가) 침식하다',s:'intrude, trespass, infringe, violate, erode',r:'고대 프랑스어 encrochier(갈고리로 잡다) → 남의 땅이나 권리 안으로 갈고리를 던져 몰래 선을 넘어가 갉아먹고 침입하다 → 잠식하다, 침해하다'},
{n:2550,w:'disheveled',m:'a. ① (머리카락 등이) 흐트러진, 엉클어진 ② (옷차림 등이) 단정치 못한, 난잡한',s:'uncombed, messy, unkempt, untidy',r:'고대 프랑스어 des-(반대, 분리) + chevel(머리카락) → 빗질을 안 해서 머리카락이 새집처럼 엉클어지고 옷차림이 엉망인 → 엉클어진, 단정치 못한'},
{n:2551,w:'explicit',m:'a. 명백한, 명확한; 노골적인',s:'clear, clear-cut, definite, flagrant, unequivocal',r:'라틴어 ex-(밖으로) + plicare(접다) → 구겨져 숨겨진 뜻을 밖으로 활짝 펼쳐놓아 숨김없이 직설적이고 누구나 알기 쉬운 → 명백한, 노골적인'},
{n:2552,w:'subjugate',m:'vt. 정복하다, 지배[통제]하에 두다, 종속시키다',s:'conquer, dominate',r:'라틴어 sub-(아래에) + jugum(멍에) + -ate → 전쟁에 패한 적군들의 목에 무거운 소의 멍에를 씌워 발밑에 완벽하게 굴복시키다 → 정복하다, 종속시키다'},
{n:2553,w:'corollary',m:'n. 추론; 필연적인[당연한] 결과',s:'conclusion, consequence, outcome, result',r:'라틴어 corolla(작은 화환) → 어떤 명제가 증명되었을 때 부상으로 주는 화환에서 유래하여, 당연하고 필연적으로 뒤따라오는 결과 → 추론, 필연적인 결과'},
{n:2554,w:'prim',m:'a. ① 까다로운, 지나치게 꼼꼼한; (여자가) 새침한 ② (복장·정원 등이) 단정한, 깔끔한',s:'old-maidish, precise, prudish, neat, trim',r:'어원 불명(고대 프랑스어 prim 훌륭한 첫째 추정) → 흠잡을 데 없이 매사에 너무 깐깐하게 굴어 새침해 보이거나 먼지 하나 없이 깔끔한 → 까다로운, 단정한'},
{n:2555,w:'blandish',m:'v. 달콤한 말로 구슬리다, 구슬려서 ~를 시키다, 구워삶다',s:'cajole, coax, wheedle',r:'라틴어 blandus(부드러운) + -ish → 듣기 좋은 매끄럽고 달콤한 말로 귀를 간지럽히며 남을 살살 구슬려 원하는 것을 얻어내다 → 달콤한 말로 구슬리다'},
{n:2556,w:'diatribe',m:'n. 통렬한 비난, 비방, 혹평',s:'denunciation, harangue, tirade, vituperation',r:'그리스어 dia-(가로질러) + tribein(문지르다, 시간을 보내다) → 시간을 들여 길게 연설하며 상대를 잔인하게 깎아내리고 맹렬히 물어뜯는 말 → 통렬한 비난, 혹평'},
{n:2557,w:'horrible',m:'a. 무서운, 끔찍한; 소름 끼치도록 싫은; 지독한',s:'awful, dreadful, terrible',r:'라틴어 horrere(머리털이 곤두서다) + -ible → 눈앞에 펼쳐진 참상이 너무나 끔찍해서 소름이 끼치고 온몸이 덜덜 떨릴 정도로 무서운 → 무서운, 끔찍한'},
{n:2558,w:'protégé',m:'n. ① 피보호자, 피후견인 ② 후배[제자]',s:'ward, pupil',r:'프랑스어 proteger(보호하다)의 과거분사 → 실력 있는 스승이나 든든한 후원자의 따뜻한 보호막 아래에서 가르침을 받으며 자라나는 제자 → 피보호자, 후배'},
{n:2559,w:'repress',m:'vt. ① (감정을) 억누르다, 억제하다 ② 진압하다, 억압하다',s:'control, hold back, suppress, crush, subdue',r:'라틴어 re-(뒤로) + primere(누르다) → 터져 나오는 눈물이나 감정을 꾹 눌러 억제하거나, 반란군의 무리를 강한 힘으로 짓눌러 꺾어버리다 → 억누르다, 진압하다'},
{n:2560,w:'skirmish',m:'n. ① 전초전(前哨戰), (우발적인) 작은 전투, 소규모 충돌 ② 작은 충돌, 작은 논쟁',s:'battle, fight, argument, conflict, dispute',r:'고대 프랑스어 eskirmir(칼싸움하다) → 본격적인 전면전이 벌어지기 전에 소규모 부대끼리 잠깐 부딪쳐 칼을 맞대는 우발적인 작은 전투 → 전초전, 소규모 충돌'},
{n:2561,w:'adventitious',m:'a. ① 우연히 얻은, 우연의, 우발의 ② 부수적인 ③ 외래의',s:'inadvertent, incidental, occurrent, collateral, subordinate, subsidiary, adscititious, foreign, heterogenous',r:'라틴어 ad-(~로) + venire(오다) + -itious → 사물의 본질이 아니라 밖에서 우연한 기회에 흘러 들어와 겉에 살짝 더해진 부수적인 → 우연의, 부수적인, 외래의'},
{n:2562,w:'contour',m:'n. ① 윤곽, 외형; 윤곽선; 등고선 ② 형세, 정세, 상황',s:'outline, profile, shape, conditions, situation, state',r:'이탈리아어 contorno(스케치 선) → 사물의 바깥쪽을 빙 둘러서 그린 선이나 지도의 등고선, 혹은 어떤 사건이 처해 있는 전체적인 상황 → 윤곽, 등고선, 형세'},
{n:2563,w:'stodgy',m:'a. ① (음식이) 소화가 잘 안 되는, 더부룩한 느낌을 주는 ② 따분한, 지루한',s:'boring, dull, tedious, tiresome',r:'어원 불명(stodge 가득 채우다 추정) + -y → 무거운 빵을 잔뜩 먹어 위가 꽉 차서 더부룩하거나, 이야기나 사람이 꽉 막히고 융통성 없어 지루한 → 소화가 안 되는, 지루한'},
{n:2564,w:'demarcate',m:'vt. 경계를 정하다; 한정[구분]하다',s:'define, differentiate, separate',r:'스페인어 de-(완전히) + marcar(표시하다) + -ate → 국경이나 영토의 한계를 명확히 긋기 위해 말뚝을 박아 영역을 분명하게 나누고 구분하다 → 경계를 정하다, 구분하다'},
{n:2565,w:'mirage',m:'n. 신기루, 환상',s:'delusion, fantasy, hallucination, illusion',r:'라틴어 mirari(놀라다) → 사막에서 목마른 여행자의 눈앞에 없는 오아시스가 진짜인 듯 나타나 놀라게 하는 헛된 환영 → 신기루, 환상'},
{n:2566,w:'chaste',m:'a. ① (육체적으로) 순결한; (여자가) 정숙한 ② (사람·행위가) 조심스러운, 품위 있는',s:'pure, virginal, decent, elegant, modest, refined',r:'라틴어 castus(순수한) → 육체적으로 순결하거나 사람의 행동이나 취향이 천박하지 않고 우아하고 조심스러운 → 순결한, 조심스러운'},
{n:2567,w:'imbibe',m:'v. ① (술 등을) 마시다 ② (사상·정보 등을) 받아들이다, 흡수하다',s:'absorb, assimilate',r:'라틴어 in-(안으로) + bibere(마시다) → 바싹 마른 스펀지가 물을 쫙 빨아들이듯 시원한 술을 벌컥벌컥 마시거나 새로운 지식을 쏙쏙 흡수하다 → 마시다, 흡수하다'},
{n:2568,w:'consanguinity',m:'n. ① 혈족 (관계), 동족, 친족 (관계) ② 밀접한 관계',s:'blood-relationship, kin, kinship, affinity, twinship',r:'라틴어 con-(함께) + sanguis(피) + -ity → 같은 부모나 조상의 핏줄을 함께 타고나서 나누는 끈끈한 친척 관계나 둘 사이의 밀접한 연관성 → 혈족 관계, 밀접한 관계'},
{n:2569,w:'emeritus',m:'a. 명예퇴직의; 전관 예우의 / n. 명예교수; 전관 대우자',s:'',r:'라틴어 e-(밖으로) + merere(돈을 벌다) + -itus → 군대나 학교에서 맡은 직무를 훌륭히 마치고 명예롭게 은퇴하여 존경받는 교수나 직위 → 명예퇴직의, 명예교수'},
{n:2570,w:'anguish',m:'n. (극심한) 괴로움, 고통, 고뇌',s:'agony, grief, pain, torment',r:'라틴어 angustia(비좁음) → 목이 조여오는 것처럼 피할 길 없이 겪어야 하는 극심한 슬픔과 육체적, 정신적인 끔찍한 고통 → 괴로움, 고통, 고뇌'},
{n:2571,w:'outshine',m:'v. ~보다 밝게 빛나다, ~보다 뛰어나다, 무색하게 하다',s:'eclipse, outdo, surpass',r:'영어 out-(넘어서) + shine(빛나다) → 재능이나 미모가 옆에 있는 사람을 초라하게 만들 정도로 훨씬 더 밝게 빛나고 능가하다 → ~보다 밝게 빛나다, 무색하게 하다'},
{n:2572,w:'clip',m:'v. ① 자르다, 베다, 가위질하다, 깎다 ② (기간 등을) 단축하다; (경비 등을) 삭감하다 / n. 동영상',s:'cut, prune, shave, shear, trim, curtail, pare, reduce, shorten',r:'고대 노르드어 klippa(자르다) → 가위로 양털이나 종이의 가장자리를 깔끔하게 오려내거나, 쓸데없는 예산을 짧게 잘라내어 줄이다 → 가위질하다, 단축하다, 동영상'},
{n:2573,w:'defray',m:'vt. (비용을) 지불하다, 부담하다, 지출하다',s:'disburse, pay',r:'고대 프랑스어 de-(아래로) + fraier(비용) → 식사비나 여비 같은 큰 비용을 자신의 지갑에서 꺼내어 대신 치러주거나 지출하다 → 지불하다, 부담하다'},
{n:2574,w:'ragged',m:'a. ① 누더기를 걸친; (옷이) 해진, 너덜너덜[누덕누덕]한',s:'shabby, tattered, torn, worn',r:'고대 노르드어 rogg(뭉치) + -ed → 너무 오래 입고 기워 입어 천 조각이 너덜너덜하게 해지고 가장자리가 톱니처럼 거칠게 찢어진 → 누더기를 걸친, 해진'},
{n:2575,w:'non sequitur',m:'n. ① (전제와 아무런 연결이 안 되는) 불합리한 추론[결론] ② (이제까지의 화제와는) 무관한 이야기',s:'',r:'라틴어 non(not) + sequitur(따르다) → 전제와 아무런 연결이 안 되는 불합리한 추론이나 대화의 맥락을 끊는 뜬금없는 이야기 → 불합리한 추론, 무관한 이야기'},
{n:2576,w:'tricky',m:'a. ① (다루기) 힘든[까다로운], 곤란한 ② 교활한, 교묘한',s:'complicated, difficult, crafty, cunning, guileful, sly',r:'영어 trick(속임수) + -y → 해결하기에 이리저리 꼬여 있어서 다루기 몹시 까다롭고, 사람을 감쪽같이 속이는 교묘함이 있는 → 다루기 힘든, 교활한'},
{n:2577,w:'melee',m:'n. ① 치고받기, 난투, 혼전 ② 혼란, 소동, 아수라장',s:'brawl, fight, fracas, fray, tussle, confusion, disturbance, fuss, perturbation',r:'프랑스어 meler(섞다) → 시위 현장이나 길거리에서 여러 사람이 이리저리 뒤엉켜 주먹을 휘두르며 난장판으로 싸우는 대혼란의 아수라장 → 난투, 혼전, 혼란'},
{n:2578,w:'enthrone',m:'vt. ① 왕좌[왕위]에 앉히다, 즉위시키다 ② 떠받들다, 깊이 존경[경배]하다',s:'crown, scepter, respect, revere',r:'영어 en-(올려놓다) + throne(왕좌) → 화려한 대관식을 거쳐 왕을 가장 높은 왕좌에 앉혀 권력을 쥐여주거나 신처럼 떠받들다 → 왕위에 앉히다, 떠받들다'},
{n:2579,w:'unrest',m:'n. (사회적인) 불안, 불만; 걱정; 동요',s:'insecurity, dissatisfaction, anxiety, disturbance',r:'영어 un-(not) + rest(휴식) → 정치나 경제 상황이 나빠져 시민들의 마음에 평화와 휴식이 사라지고 폭동 직전까지 불안하게 동요하는 것 → 불안, 동요'},
{n:2580,w:'bulwark',m:'n. ① 성채, 보루 ② 방호물, 방벽',s:'bastion, citadel, fortress, rampart, barrier, dike',r:'네덜란드어 bolwerc(요새) → 적의 맹렬한 대포나 총알을 막아내기 위해 흙과 돌을 높이 쌓아 올린 견고한 성벽이나 든든한 방어막 → 성채, 보루, 방벽'},
{n:2581,w:'graft',m:'n. ① 접목, 접붙이기; (피부·뼈 등의) 이식 ② (특히 정치 관계의) 부정 이득, 수뢰(收賂) / v. 접목하다; (피부·뼈 등을) 이식하다',s:'transplant, bribery',r:'그리스어 grapheion(철필) → 식물의 눈을 다른 나무에 접붙여 이식하거나, 공직자가 남몰래 받아 챙기는 부정한 뇌물 → 접목, 이식, 뇌물'},
{n:2582,w:'diurnal',m:'a. ① 낮 동안의, 주간의 ② (동물이) 주행성(晝行性)의, 낮에 활동하는',s:'daytime',r:'라틴어 dies(하루) + -urnal(시간의) → 박쥐나 올빼미 같은 야행성 동물이 아니라 햇빛이 환하게 비추는 한낮 동안만 깨어 움직이는 → 낮 동안의, 주행성의'},
{n:2583,w:'verse',m:'n. 운문, 시(詩) / vt. ~에 정통[숙달]하다[in]',s:'poem, poetry, be conversant with, be familiar with, be well acquainted with',r:'라틴어 vertere(돌다) → 밭갈이할 때 쟁기가 끝에서 도는 것처럼 한 줄씩 끝을 맺는 시의 행과, 어떤 지식의 길을 끝까지 돌아 깊이 숙달한 상태 → 운문, 시, 정통하다'},
{n:2584,w:'knowingly',m:'ad. ① (사정 등을) 알고도, 고의로 ② (비밀로 되어 있는 일을) 다 알고 있다는 듯이',s:'deliberately, intentionally, wittingly',r:'영어 know(알다) + -ing(형용사) + -ly(부사) → 자신이 무슨 일을 저지르고 있는지 그 결과를 뻔히 알면서도 일부러 고의로 행동하거나 윙크하는 모습 → 고의로, 알고 있다는 듯이'},
{n:2585,w:'textile',m:'n. 직물, 옷감; 직물의 원료',s:'cloth, fabric, material',r:'라틴어 texere(짜다, 엮다) + -ile(명사) → 물레나 기계로 명주실이나 면실을 가로세로 정교하게 엮어서 짜낸 부드러운 옷감이나 원료 → 직물, 옷감'},
{n:2586,w:'syllogism',m:'n. 삼단논법; 연역적 추리',s:'',r:'그리스어 syn-(함께) + logizesthai(생각하다) → 대전제와 소전제를 결합하여 논리적으로 결론을 이끌어내는 추리 → 삼단논법'},
{n:2587,w:'banal',m:'a. 평범한, 진부한',s:'commonplace, hackneyed, trite',r:'프랑스어 ban(마을 전체의) + -al → 중세 시대 마을 사람들이 함께 쓰던 낡은 오븐처럼 아무나 써서 새로울 것 하나 없이 뻔하고 흔해빠진 → 평범한, 진부한'},
{n:2588,w:'alight',m:'vi. ① (탈것에서) 내리다, 하차하다 ② (새·곤충이) ~에 내려앉다 / a. ① 불붙은, 불타는 ② (기쁨·흥분으로 눈이) 빛나는',s:'descend, land, perch, aflame, burning, flaming, bright, gleaming, radiant, refulgent',r:'고대 영어 a-(~에서) + lihtan(가벼워지다) → 무거운 짐을 진 사람이 말에서 내려 몸을 가볍게 하거나, 불이 붙어 화려하게 환히 타오르는 → 내리다, 불타는'},
{n:2589,w:'foil',m:'vt. (계획 등을) 좌절시키다, 저지하다, 미연에 방지하다',s:'frustrate, thwart',r:'고대 프랑스어 fouler(짓밟다) → 남이 정성껏 짜놓은 완벽한 음모나 계획의 단서를 알아내어 실행하기 전에 발로 짓밟아 완전히 망쳐놓다 → 좌절시키다, 미연에 방지하다'},
{n:2590,w:'gene',m:'n. 유전자, 유전 인자',s:'',r:'그리스어 genea(혈통, 기원) → 부모가 자식에게 머리색이나 키 같은 생물학적 특징을 그대로 물려주는 몸속의 유전 정보 단위 → 유전자, 유전 인자'},
{n:2591,w:'cull',m:'vt. 고르다, 추려내다, 선택하다 / n. 선별; 채집',s:'pick, select',r:'라틴어 colligere(모으다) → 수많은 꽃이나 과일 무더기 속에서 상태가 좋고 쓸 만한 것들만 손으로 조심스럽게 골라내고 추려내다 → 고르다, 선별'},
{n:2592,w:'would-be',m:'a. (장차) ~이 되려고 하는, ~지망의; 자칭 ~의',s:'prospective, self-styled',r:'영어 would(할 것이다) + be(되다) → 아직은 아니지만 앞으로 그 직업이나 위치가 간절히 되고 싶어 하거나, 혹은 자기 혼자 착각하여 자칭하는 → ~이 되려고 하는, 자칭 ~의'},
{n:2593,w:'limbo',m:'n. ① 망각의 구렁; 지옥의 변방; 중간 지역; 불확실한[어중간한] 상태 ② 구치소, 교도소',s:'jail, prison',r:'라틴어 limbus(가장자리) → 가톨릭에서 지옥의 변방에 있는 구역이거나, 앞으로 어찌 될지 몰라 구치소에서 기약 없이 갇혀 있는 막막한 상태 → 지옥의 변방, 불확실한 상태'},
{n:2594,w:'page',m:'n. (호텔 등의) 급사; 시종(侍從) / v. 이름을 불러 (~를) 찾다; ~에게 휴대용 무선 호출기로 연락하다',s:'attendant, errand boy, varlet, beep, call',r:'이탈리아어 paggio(어린 소년) → 큰 호텔이나 귀족의 집에서 잔심부름을 하던 어린 시종이나, 호텔 방송으로 사람의 이름을 불러 찾다 → 급사, 시종, 이름을 불러 찾다'},
{n:2595,w:'stunt',m:'vt. 성장[발달]을 방해하다, 저해하다, 저지하다 / n. 발육 저해; 성장을 방해하는 것',s:'hamper, hinder, retard',r:'고대 영어 stunt(어리석은) → 정상적으로 커야 할 식물이나 동물의 성장이 병이나 영양 부족으로 꽉 막혀 더 이상 크지 못하게 억누르다 → 성장을 방해하다, 발육 저해'},
{n:2596,w:'roster',m:'n. 근무자 명단, 근무 당번표, 직원[선수] 명단, 명부',s:'list, register, roll',r:'네덜란드어 rooster(줄 긋는 도구) → 줄이 그어진 종이 위에 회사 직원들의 근무 교대 시간이나 군인, 스포츠 선수의 이름을 쫙 적어놓은 명부 → 근무 당번표, 명단'},
{n:2597,w:'forthright',m:'a. ① 기탄없이 말하는, 솔직한 ② 직진하는, 똑바른 / ad. 똑바로; 솔직히',s:'candid, frank, outspoken, straightforward, direct, straight',r:'영어 forth(앞으로) + right(똑바른) → 남의 눈치나 체면을 보지 않고 속마음을 돌리지 않은 채 입 밖으로 직설적이고 똑바르게 쏟아내는 → 기탄없이 말하는, 직진하는'},
{n:2598,w:'ignition',m:'n. 점화, 발화, 인화(引火); 연소; (내연 기관의) 점화 장치',s:'combustion',r:'라틴어 ignis(불) + -tion → 자동차의 엔진이나 화약에 불꽃을 탁 튀겨서 거대한 연소 폭발을 일으키게 만드는 불붙이기나 그 장치 → 점화, 연소'},
{n:2599,w:'presage',m:'n. 전조, 조짐, 예감, 육감[of] / v. 전조가 되다, 예언하다, 예감하다',s:'omen, portent, prognostic, augur, auspicate, bode',r:'라틴어 prae-(미리) + sagire(느끼다) → 검은 고양이나 까마귀처럼 다가올 불길한 사건의 그림자를 감각적으로 미리 알고 점치며 예감하는 것 → 전조, 조짐, 예언하다'},
{n:2600,w:'iniquitous',m:'a. 부정한, 불법의; 간악한',s:'unjust, vicious, wicked',r:'라틴어 in-(not) + aequus(공평한) + -itous → 세상의 바른 법칙과 평등함을 짓밟고 법을 어기면서까지 악독하고 부정한 짓을 거침없이 저지르는 → 부정한, 사악한'},
{n:2601,w:'judicious',m:'a. 현명한, 분별력 있는, 사려 깊은',s:'reasonable, sagacious, sensible, wise',r:'라틴어 judicium(판단) + -ous → 올바른 판단을 내리는'},
{n:2602,w:'chicanery',m:'n. 교묘한 속임수, 책략',s:'deceit, deception, subterfuge, trickery',r:'프랑스어 chicaner(트집 잡다, 속이다) + -ery → 말장난으로 억지를 부려 교묘히 속이는 짓'},
{n:2603,w:'siphon',m:'v. ① 사이펀으로 빨아들이다; (수입·세금 등을) 빨아들이다, 흡수하다 ② (이익 등을) 빼돌리다, (부정하게) 유용하다[off, from]',s:'divert, pocket',r:'그리스어 siphon(관, 파이프) → 굽은 관을 통해 액체를 빨아올리듯 부당하게 자금을 빼돌리다'},
{n:2604,w:'preemptive',m:'a. 선제적인, 선수를 치는, 예방의',s:'anticipative',r:'라틴어 prae(미리) + empt(사다, 취하다) + -ive → 남보다 먼저 행동을 취하여 선수를 치는'},
{n:2605,w:'behead',m:'vt. (형벌로) 목을 베다, 참수하다, 참수형에 처하다',s:'decapitate',r:'고대 영어 be-(완전히, 분리) + head(머리) → 머리를 몸에서 완전히 잘라내어 분리하다'},
{n:2606,w:'spree',m:'n. ① 흥청거리기, 법석댐; 술잔치',s:'bender, binge, carousal, orgy, revel ② (범행을) 한바탕 저지르기',r:'스코틀랜드어 spreath(가축 약탈) → 제어하지 않고 흥청망청 한바탕 거칠게 노는 것'},
{n:2607,w:'efficacy',m:'n. (약 등의) 효험, 효능; 유효성',s:'effectiveness, potency, virtue',r:'라틴어 ex-(밖으로) + facere(만들다) + -acy → 의도한 결과를 밖으로 제대로 만들어 내는 힘'},
{n:2608,w:'diaphanous',m:'a. (천이) 아주 얇은, 내비치는, 투명한',s:'gossamer, pellucid, sheer, transparent',r:'그리스어 dia-(통과하여) + phainein(보이다) + -ous → 빛이 통과하여 속이 환히 비치는'},
{n:2609,w:'contort',m:'v. 비틀다, 일그러뜨리다; (의미 등을) 왜곡[곡해]하다',s:'twist, distort',r:'라틴어 con-(완전히) + torquere(비틀다) → 강하게 비틀어 본래 모양이나 의미를 흉하게 일그러뜨리다'},
{n:2610,w:'subsidiary',m:'a. ① 부수적인; 보조의',s:'secondary, subordinate ② 보조금의, 보조금에 의한 n. ① 보조물, 부가물, additament, appendage ② 자회사, affiliate, branch, division',r:'라틴어 sub-(아래에) + sedere(앉다) + -ary → 중심 아래에 앉아 보조하는'},
{n:2611,w:'invidious',m:'a. ① 비위에 거슬리는, 불쾌한, 기분 나쁘게 만드는',s:'offensive, unpleasant ② 불공평한, 부당한, unfair, unjust',r:'라틴어 in-(안으로) + videre(보다) + -ous → 시기심을 가지고 노려보아 불쾌하게 만드는'},
{n:2612,w:'promontory',m:'n. 곶(바다 혹은 강물의 융기지형), 갑(岬)',s:'cape, foreland, headland',r:'라틴어 pro-(앞으로) + mons(산) + -ory → 바다 쪽으로 툭 튀어나온 높은 육지'},
{n:2613,w:'belittle',m:'vt. 얕잡아보다, 깔보다, 비하하다',s:'disparage, downplay, underestimate',r:'영어 be-(만들다) + little(작은) → 남의 가치나 성과를 작고 하찮은 것으로 깎아내리다'},
{n:2614,w:'sonorous',m:'a. (소리가) 울리는, 울려 퍼지는, 낭랑한',s:'orotund, resonant, vibrant',r:'라틴어 sonor(소리) + -ous → 깊고 풍부한 소리가 공간에 웅장하게 울려 퍼지는'},
{n:2615,w:'repartee',m:'n. 재치 있는 즉답, 환담; 재치 있는 말재주',s:'riposte, witticism, wordplay',r:'프랑스어 re-(다시) + partir(출발하다) → 상대의 말에 즉각적이고 재치 있게 맞받아치는 대답'},
{n:2616,w:'glutton',m:'n. 대식가, 탐식가',s:'gourmand',r:'라틴어 gluttire(삼키다) → 씹지도 않고 꿀꺽꿀꺽 탐욕스럽게 삼키며 먹는 사람'},
{n:2617,w:'assay',m:'v. 시험하다; 분석[시금]하다; 평가하다',s:'examine, analyze, evaluate',r:'라틴어 ex-(밖으로) + agere(무게 달다) → 금속이나 광석을 밖으로 꺼내어 저울에 달아 정밀하게 분석하다'},
{n:2618,w:'complimentary',m:'a. ① 무료의',s:'buckshee, gratis, gratuitous ② 칭찬하는, commendatory, eulogistic, laudatory, panegyric',r:'라틴어 complere(채우다) → 상대의 마음을 칭찬으로 꽉 채우거나 호의로 거저 주는'},
{n:2619,w:'murmur',m:'n. (불평·불만의) 중얼거림, 투덜거림',s:'grouse, grumble, moan v. 중얼거리다; 불평하다, 투덜대다, complain, grumble',r:'의성어(웅얼거리는 소리) → 입을 다물고 낮게 웅얼거리며 불만을 표하는 소리'},
{n:2620,w:'fetid',m:'a. 악취를 내뿜는, 고약한 냄새가 나는',s:'foul, rank, stinking',r:'라틴어 fetere(악취가 나다) + -id → 구역질이 날 정도로 역겨운 냄새가 진동하는'},
{n:2621,w:'aggregate',m:'a. 집합한; 합계[총계]의',s:'gross, overall, total, whole n. 합계, 총액, total v. 모으다, 집합하다; 총계 ~이 되다, amount to',r:'라틴어 ad-(~로) + grex(무리) → 흩어진 양 떼를 한 곳으로 몰아 모으다'},
{n:2622,w:'crumble',m:'v. ① (빵 등을) 부스러뜨리다, 가루로 만들다; 산산조각 나다, 부서지다',s:'pulverize ② (건물이나 땅이) 허물어지다, 무너지다, collapse, founder, shatter',r:'고대 영어 cruma(빵 부스러기) + -le(반복) → 작게 부서지며 가루가 되어 무너지다'},
{n:2623,w:'stagger',m:'v. ① 비틀거리다, 비틀거리며 걷다',s:'stumble, totter ② 큰 충격을 주다, 깜짝 놀라게 하다',r:'고대 노르드어 stakra(밀다) → 누군가에게 강하게 밀려 중심을 잃고 휘청거리다'},
{n:2624,w:'inflection',m:'n. ① 굴절, 굴곡, 만곡 ② 억양, 어조',s:'cadence, intonation, modulation, tone ③ (단어·어미의) 굴절, 어형 변화',r:'라틴어 in-(안으로) + flectere(굽히다) → 말할 때 목소리의 톤이 꺾이고 구부러짐'},
{n:2625,w:'combustible',m:'a. ① 가연성인, 불붙기 쉬운',s:'flammable, inflammable ② 흥분하기 쉬운, excitable, hotheaded',r:'라틴어 com-(완전히) + burere(타다) + -ible → 조그만 불씨에도 순식간에 불타오르거나 쉽게 흥분하는'},
{n:2626,w:'avalanche',m:'n. ① 눈사태',s:'landslide, landslip, snowslide ② (질문·편지 등의) 쇄도, barrage, deluge, torrent',r:'프랑스어 avalanche(눈사태) → 산 위에서 눈과 얼음이 한꺼번에 와르르 쏟아져 내림'},

{n:2631,w:'bountiful',m:'a. ① (물건이) 많은, 풍부한',s:'abundant, ample, bounteous, plentiful ② (사람이) 아낌없이 주는, 통이 큰, generous, liberal, munificent',r:'라틴어 bonus(좋은) → 훌륭하고 좋은 축복과 선물을 넉넉하고 관대하게 베푸는'},

{n:2646,w:'provision',m:'n. ① 예비, 준비, 설비[for, against]',s:'arrangements, plan, preparation ② 공급, 지급; (pl.) 양식, 식량, supplying ③ 규정, 조항, clause, condition, term',r:'라틴어 pro-(미리) + videre(보다) → 장래를 미리 내다보고 필요한 물자나 규칙을 챙겨두다'},

{n:2655,w:'convulsion',m:'n. ① 경련, 경기',s:'cramp, crick, fit, spasm, tic, twitch ② (사회·정치 등의) 격변, 동란, 동요, disturbance, turbulence, upheaval',r:'라틴어 con-(함께) + vellere(잡아당기다) → 근육이 한꺼번에 강하게 당겨져 발작하거나 사회가 요동침'},

{n:2657,w:'equestrian',m:'a. 승마의, 마술(馬術)의 n. 승마자, 기수(騎手)',s:'horseman, jockey',r:'라틴어 equus(말) + -ian → 훌륭한 말을 타고 다루는 기병이나 기술과 관련된'},

{n:2663,w:'rattle',m:'v. ① 덜걱덜걱[우르르] 소리나다; (차 등이) 덜거덕거리며 달리다',s:'clatter, jangle, jolt ② 재잘거리다, 나불나불 지껄이다, chatter, gabble, prattle',r:'의성어(딱딱한 것이 부딪치는 소리) → 장난감이나 창문이 흔들리며 내는 시끄러운 소리'},
{n:2664,w:'preamble',m:'n. (법률·조약 등의) 전문(前文); 서문, 머리말',s:'foreword, introduction, preface, prelude',r:'라틴어 prae-(미리) + ambulare(걷다) → 본론이 본격적으로 시작되기 전에 맨 앞장서서 걸어 나오는 글'},

{n:2666,w:'meteor',m:'n. ① 유성(流星), 별똥별, 운석 ② 일시적으로 화려한 것, 일시적으로 반짝하는 사람',s:'',r:'그리스어 meta-(위로) + aeirein(들어올리다) → 대기권 높이 떠올라 불타며 떨어지는 우주의 암석 조각'},

{n:2668,w:'snob',m:'n. ① 속물(지위나 재산이 있는 자에게 아첨하고 남을 얕보는 사람)',s:'philistine, vulgarian ② 학자인 체하는 사람, 사이비 학자, highbrow, wiseacre',r:'영국 방언(신분이 낮은 사람) → 지위가 낮으면서도 마치 상류층인 척 허세를 부리며 남을 얕보는 사람'},

{n:2670,w:'expedient',m:'a. ① (목적에) 맞는, 쓸모 있는, 편리한',s:'advantageous, convenient, useful ② 편의주의적인; (사람이) 이기적인, opportunistic, politic, selfish n. (임시 방편적인) 조치, 수단, 방편, 응급조치, makeshift',r:'라틴어 ex-(밖으로) + pes(발) + -ent → 족쇄에서 발을 빼내어 상황을 빠르고 유리하게 해결하는 임시방편'},
{n:2671,w:'apparition',m:'n. ① 유령, 망령, 허깨비',s:'ghost, phantom, specter, spook, wraith ② (갑작스러운) 출현, advent, appearance, emergence',r:'라틴어 ad-(~로) + parere(나타나다) + -tion → 어둠 속에서 갑자기 눈앞에 기이하게 휙 나타난 초자연적인 형태'},
{n:2672,w:'unravel',m:'v. ① (얽힌 실·끈 등을) 풀다',s:'disentangle ② 해명하다; 해결하다, solve ③ (시스템·계획·관계 등이) 흐트러지기 시작하다',r:'영어 un-(반대, 풀다) + ravel(얽히다) → 복잡하게 꼬이고 엉킨 실타래나 알 수 없는 미스터리를 명쾌하게 풀어내다'},
{n:2673,w:'tier',m:'n. ① (층이 진) 열, 단, 층',s:'layer, line, range, row ② 단계; (사회) 계층, class, grade, level, order, rank',r:'프랑스어 tire(줄, 열) → 극장의 좌석이나 사회의 신분처럼 위아래로 차곡차곡 나뉜 층이나 계급'},
{n:2674,w:'crush',m:'v. ① (물건을) 눌러 부수다, 으깨다',s:'break, pound, squash, trample ② (폭력으로) 진압하다, 탄압하다, quash, quell, subdue, suppress n. (보통 연상의 대상에 대한) 강렬한 사랑, 홀딱 반함, infatuation',r:'고대 프랑스어 croissir(부수다) → 무거운 것으로 짓눌러 형체를 박살 내거나 반란을 무자비하게 짓밟다'},
{n:2675,w:'flare',m:'v. ① (불꽃·불길이) 확 타오르다',s:'blaze, flame, flash ② (분노·반란 등이) 솟구치다, 갑자기 일어나다, erupt, explode n. 불길; 섬광',r:'어원 불명(흔들리며 타는 불꽃) → 갑자기 밝게 치솟는 불꽃이나 감정이 걷잡을 수 없이 터지는 현상'},
{n:2676,w:'hang-up',m:'n. 심리적 장애, 고민, 곤란, 문제, 콤플렉스',s:'',r:'영어 hang(~에 매달다) + up(위로) → 마음속 어딘가에 걸려 풀리지 않고 사람을 계속 괴롭히는 무의식적인 불안이나 집착'},
{n:2677,w:'mutilate',m:'vt. (수족 등을) 절단하다, 불구로 만들다',s:'cripple, maim',r:'라틴어 mutilus(불구의) + -ate → 사람이나 사물의 중요한 부분을 심하게 훼손하여 쓸모없게 만들다'},
{n:2678,w:'ambulatory',m:'a. 보행의, 이동하는, 이동성의, 돌아다니는',s:'movable, shifting, vagabond; (의학) 외래의, 통원의',r:'라틴어 ambulare(걷다) + -ory → 침대에 누워있지 않고 두 발로 걸어 다닐 수 있는 상태의'},
{n:2679,w:'wholesale',m:'n. 도매 a. 도매의; 대량의, 다수의, 대규모의 ad. 도매로; 대량으로, 다수로, 대규모로',s:'',r:'영어 whole(전체) + sale(판매) → 낱개가 아니라 전체를 한꺼번에 묶어서 대량으로 물건을 파는 방식'},
{n:2680,w:'epicenter',m:'n. ① (지진의) 진원지, 진앙(震央)',s:'epicentre ② (활동·문제의) 중심점, 핵심, center, centre, core',r:'그리스어 epi-(위에) + center(중심) → 지진이 시작된 지하 깊은 곳의 바로 위 지표면 지점이나 사건의 중심'},
{n:2681,w:'bereave',m:'vt. ① (가족·근친 등을) 앗아가다 ② (희망·기쁨 등을) 빼앗다',s:'deprive, dispossess, rob, strip',r:'영어 be-(강조) + reave(빼앗다) → 죽음이나 끔찍한 사고가 사랑하는 가족을 잔인하게 빼앗아 가다'},
{n:2682,w:'gallows',m:'n. ① 교수대',s:'scaffold ② (the ~) 교수형, hanging',r:'고대 영어 galga(막대기) → 죄수의 목을 밧줄로 매달아 죽이기 위해 광장에 세운 무시무시한 나무 구조물'},
{n:2683,w:'luminous',m:'a. ① 어둠에서 빛나는, 야광의, 형광의',s:'fluorescent, glow-in-the-dark ② 이해하기 쉬운, 명료한, 명쾌한, accessible, clear, explicit, lucid ③ 지적으로 뛰어난, 총명한; 계몽적인, intelligent, enlightening',r:'라틴어 lumen(빛) + -ous → 어둠 속에서도 스스로 밝은 빛을 내뿜거나 지혜가 환하게 빛나는'},
{n:2684,w:'infancy',m:'n. ① 유년기, 유아기',s:'babyhood, early childhood ② 초기, 초창기, 요람기, 미발달기, beginnings, cradle, dawn, inception',r:'라틴어 in-(not) + fari(말하다) + -cy → 아직 말을 하지 못하는 아주 어린 시기나 사물의 맨 처음 단계'},
{n:2685,w:'crotchety',m:'a. 변덕스러운, 까다로운',s:'bad-tempered, cranky, eccentric, petulant',r:'프랑스어 croc(갈고리) → 마음에 갈고리가 걸린 듯 사소한 일에 자꾸 꼬투리를 잡고 짜증을 내는'},
{n:2686,w:'engrave',m:'vt. ① (금속·나무·돌 등에) 새기다, 조각하다[on, with]',s:'carve, etch, inscribe ② (마음·기억 등에) 명심하다, 새겨두다, embed, imprint',r:'영어 en-(안에) + grave(새기다) → 딱딱한 표면이나 마음속 깊은 곳에 글자를 파서 영원히 남기다'},
{n:2687,w:'prudish',m:'a. (섹스와 관련하여) 얌전한[고상한] 체하는, 내숭떠는',s:'demure, genteel',r:'프랑스어 prude(정숙한) + -ish → 성적인 것에 대해 지나치게 엄격하고 깐깐하게 고상한 척하는'},

{n:2689,w:'chasm',m:'n. ① (땅·바위·얼음 속 등에 난) 아주 깊은 틈[구멍]',s:'crevice, fissure ② (사람·집단 사이의) 큰 차이[골], gap',r:'그리스어 khasma(하품하는 듯 쩍 벌어진 입) → 땅이나 사람들 사이에 입을 크게 벌린 것처럼 아득하게 벌어진 틈새나 차이'},
{n:2690,w:'debauch',m:'v. ① 타락시키다; (여자를) 유혹하다',s:'corrupt, demoralize, deprave; seduce ② ~을 더럽히다, 손상시키다 ③ 주색에 빠지다, 방탕하다 n. 방탕, 난봉; 폭음, 폭식',r:'고대 프랑스어 des-(벗어난) + bauch(일터) → 건전한 일터를 떠나 쾌락과 술에 빠져 타락하고 방탕해지다'},
{n:2691,w:'gruesome',m:'a. 무시무시한, 소름끼치는, 섬뜩한',s:'awful, ghastly, grisly, horrible, macabre',r:'스코틀랜드어 grue(전율, 떨림) + -some → 피투성이 시체처럼 너무나 끔찍해서 온몸에 전율이 일고 소름 돋는'},

{n:2693,w:'badger',m:'vt. (질문 등으로) 괴롭히다[with]; (물건을) 갖고 싶다고 조르다; (~해 달라고) 졸라대다[to do]',s:'annoy, bother, harass, nag, pester, tease n. (동물) 오소리',r:'동물 오소리(badger) 사냥에서 유래 → 사냥개가 오소리를 집요하게 물고 늘어지듯 끈질기게 사람을 귀찮게 하다'},
{n:2694,w:'sophistry',m:'n. 궤변, 제멋대로의 이유',s:'casuistry, fallacy, quibble, sophism',r:'그리스어 sophistes(지혜로운 자) + -ry → 고대 그리스 소피스트들이 논리로 말장난을 치며 억지를 부리던 솜씨'},
