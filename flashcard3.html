{n:2805,w:'all-out',m:'a. 총력을 기울인, 전면적인',s:'full-out, full-scale, overall, total',r:'all (전부) + out (다 쏟아) → 모든 것을 다 쏟아내는 → 총력을 기울인·전면적인으로 고착 > 모든 자원을 투입한 총공격의 장면이 원형'},
{n:2806,w:'promenade',m:'n. ① 산책, 산보',s:'stroll, walk ② (말·수레를 탄) 행렬, 행진, parade ③ 산책길, 산책하는 곳, walkway v. ① 슬슬 거닐다, 산책하다; (아무를) 산책시키다, stroll, walk ② 뽐내며 걷다, 행진하다, parade, strut',r:'프랑스어 promener (take for a walk, 산책시키다) → 천천히 걸으며 산책하다 → 산책·산보로 고착 > 해안가 넓은 길을 여유롭게 걷는 장면이 원형'},
{n:2807,w:'stoke',m:'v. ① (연료를) 보급하다',s:'fuel ② (감정을) 부추기다, 불러일으키다[up], stir',r:'고대 영어 stocian (poke, 쑤시다) → 불에 연료를 집어넣어 불길을 살리다 → 연료를 보급하다·격려하다로 고착 > 화부가 용광로에 석탄을 삽으로 퍼 넣는 장면이 원형'},
{n:2808,w:'cocoon',m:'n. (곤충의) 고치; 보호막 v. ~을 보호하다',s:'',r:'프랑스어 cocon (shell, 껍데기) → 번데기가 실로 감싸 만든 보호막 → 고치·보호막으로 고착 > 애벌레가 자신을 실로 감싸 고치를 만드는 장면이 원형'},
{n:2809,w:'risque',m:'a. 음란한, 외설스러운',s:'bawdy, lewd, obscene, salacious, scabrous',r:'프랑스어 risqué (risky, 위험한) → 도덕적으로 경계를 넘는 위험한 → 음란한·외설스러운으로 고착 > 도덕 경계를 살짝 넘는 선정적인 장면이 원형'},
{n:2810,w:'provident',m:'a. ① 선견지명이 있는; (특히 돈을 저축하면서) 장래를 준비하는[of] ② 절약하는, 검소한',s:'economical, thrifty ③ 조심성 있는, 신중한, careful, precautious, prudent',r:'라틴어 providere (foresee, 미리 보다) + -ent → 미래를 미리 보는 → 선견지명이 있는·검소한으로 고착 > 겨울을 대비해 미리 식량을 비축하는 장면이 원형'},
{n:2811,w:'immure',m:'vt. ① 감금하다, 투옥하다, 가두다',s:'imprison, incarcerate, jail ② (어떤 범위에) 한정[제한]하다[in], confine, restrict',r:'라틴어 im (in) + mur (wall, 벽) → 벽 안에 가두다 → 감금하다·투옥하다로 고착 > 두꺼운 벽으로 된 방에 가둬버리는 장면이 원형'},
{n:2812,w:'suspense',m:'n. ① 미결정인 상태, 불안정, 어중간함',s:'insecurity, obscurity ② (소설·영화 등의) 지속적 긴장감, 서스펜스 ③ 걱정, 근심, 불안, anxiety, apprehension, uneasiness, worry',r:'라틴어 suspendere (hang, 매달다) → 결론을 매달아두고 불안정한 상태 → 미결정 상태·불안정으로 고착 > 결말을 알 수 없어 조마조마한 장면이 원형'},
{n:2813,w:'animus',m:'n. ① 적의, 원한, 적개심, 증오',s:'animosity, antagonism, enmity, hostility ② 의도, 의사, 의향, intention',r:'라틴어 animus (spirit, 정신) → 내면의 적개심 → 적의·원한·적개심으로 고착 > 오랫동안 쌓인 원한이 내면에 가득한 장면이 원형'},
{n:2814,w:'clinch',m:'v. ① (사건·토론 등의) 결말을 짓다, 매듭짓다',s:'conclude, settle ② 성사시키다, 이뤄내다',r:'중세 영어 clenchen (fasten, 고정하다) → 단단히 잡아 결론을 내다 → 결말을 짓다·맞붙다로 고착 > 마지막 악수로 거래를 확정 짓는 장면이 원형'},
{n:2815,w:'resolution',m:'n. ① 다짐, 결심; 결의안; 결단력; 확고부동 ② (문제·불화 등의) 해결',s:'settlement, solution ③ (컴퓨터 화면·TV 등의) 해상도',r:'라틴어 resolvere (loosen, 풀다) + -tion → 문제를 풀어 결론을 내다 → 결심·해결·결의안으로 고착 > 새해 결심을 종이에 써서 벽에 붙이는 장면이 원형'},
{n:2816,w:'grope',m:'v. ① 손으로 더듬다, 더듬어 찾다[for, after]',s:'fumble ② (암중) 모색하다, 찾다[for, after], explore ③ 여성의 몸을 더듬다, 애무하다[for, after]',r:'고대 영어 grapian (grasp, 잡다) → 어둠 속에서 손으로 더듬어 찾다 → 손으로 더듬다로 고착 > 깜깜한 방에서 벽을 더듬어 전등 스위치를 찾는 장면이 원형'},
{n:2817,w:'crib',m:'n. ① 구유, 여물통',s:'manger ② (난간이 달린) 어린이 침대, 요람, bassinet, cradle ③ (흔히 시험 때 이용하는) 커닝 쪽지, 커닝 페이퍼, cheat sheet v. 도용하다, 표절하다, 커닝하다',r:'고대 영어 cribb (manger, 구유) → 가축의 여물통처럼 아기를 담는 것 → 구유·아기 침대·베끼다로 고착 > 건초가 담긴 나무 여물통의 장면이 원형'},
{n:2818,w:'smug',m:'a. ① 자만심이 강한, 자기만족의; 잘난 체하는',s:'complacent, self-satisfied ② 말끔한, 산뜻한, 말쑥한, neat, spruce, trim n. (사교나 운동은 하지 않고) 공부만 하는 학생, dig, grind, swot',r:'중세 영어 smug (neat, 단정한) → 자신의 단정함에 만족한 → 자만심이 강한·잘난 체하는으로 고착 > 모두가 알 수 있도록 자기만족의 미소를 짓는 장면이 원형'},
{n:2819,w:'annals',m:'n. 연대기, 연표; 역사적 기록',s:'chronicle',r:'라틴어 annales (yearly records, 연간 기록) → 해마다 기록한 역사 → 연대기·역사적 기록으로 고착 > 매년의 사건을 기록한 두꺼운 역사책의 장면이 원형'},
{n:2820,w:'momentum',m:'n. ① (일의 진행에 있어서의) 탄력, 기세, 힘, 여세',s:'force, impetus, power ② 가속도, acceleration',r:'라틴어 movere (move, 움직이다) → 움직임에서 생기는 힘 → 탄력·기세로 고착 > 공이 굴러가며 점점 빨라지는 장면이 원형'},
{n:2821,w:'implacable',m:'a. ① 달랠[누그러뜨릴] 수 없는, 화해하기 어려운, 앙심 깊은 ② 용서 없는, 무자비한',s:'merciless, relentless, ruthless',r:'im (not) + plac (appease, 달래다) + -able → 달랠 수 없는 → 화해하기 어려운·무자비한으로 고착 > 어떤 사과도 통하지 않는 냉혹한 장면이 원형'},
{n:2822,w:'excise',m:'vt. ① (어구·문장 등을) 삭제하다',s:'delete, erase, expunge ② (종기 등을) 잘라내다, 절제하다, extract, remove ③ 물품세[소비세]를 부과하다, impose, levy n. (술·담배 등에 대한) 물품세, (국내) 소비세, commodity tax',r:'라틴어 excidere (cut out, 잘라내다) → 잘라내다 → 삭제하다·소비세로 고착 > 원고에서 불필요한 부분을 가위로 잘라내는 장면이 원형'},
{n:2823,w:'refulgent',m:'a. 빛나는, 찬란한',s:'brilliant, radiant, shining',r:'라틴어 refulgere (shine back, 되반사하다) + -ent → 빛을 되반사하며 빛나는 → 빛나는·찬란한으로 고착 > 보석이 빛을 받아 사방으로 반짝이는 장면이 원형'},
{n:2824,w:'countenance',m:'n. (얼굴의) 표정, 안색; 얼굴, 용모',s:'face, phiz, visage vt. 지지하다, 동의하다, agree, approve, concur, consent, subscribe, support',r:'고대 프랑스어 contenance (bearing, 태도) → 얼굴에 나타나는 태도 → 얼굴 표정·지지하다로 고착 > 얼굴 표정으로 감정을 드러내는 장면이 원형'},
{n:2825,w:'jolly',m:'a. 명랑한, 즐거운, 유쾌한',s:'cheerful, gay, jocund, jovial, mirthful',r:'고대 프랑스어 jolif (merry, 명랑한) → 밝고 유쾌한 → 명랑한·유쾌한으로 고착 > 소리 내어 웃으며 분위기를 밝게 하는 장면이 원형'},
{n:2826,w:'trinket',m:'n. 자질구레한 장신구',s:'doodad, knickknack, ornament',r:'16세기 영어 trinket (small item, 작은 물건) → 작고 값싼 장신구 → 자질구레한 장신구로 고착 > 노점에서 파는 싸구려 장신구들의 장면이 원형'},
{n:2827,w:'debonair',m:'a. ① (보통 남자가) 멋지고 당당한, 세련된',s:'refined, urbane ② 사근사근한, 공손한; 명랑한, 쾌활한, affable, courteous; cheerful',r:'고대 프랑스어 de bon aire (of good bearing, 좋은 태도의) → 태도가 좋고 세련된 → 멋지고 당당한·세련된으로 고착 > 완벽한 옷차림으로 여유롭게 걷는 장면이 원형'},
{n:2828,w:'originate',m:'v. ① 비롯하다, 일어나다, 생기다, 시작하다[from, in, with]',s:'begin, start ② 시작하다, 일으키다; 발명하다, 고안하다, cause; invent',r:'라틴어 origo (origin, 기원) + -ate → 기원에서 시작하다 → 비롯하다·시작하다로 고착 > 작은 샘에서 강물이 시작되는 장면이 원형'},
{n:2829,w:'mealy-mouthed',m:'a. 완곡하게 말하는, 에둘러 말하는, 말을 솔직하게 하지 않는',s:'euphemistic, indirect',r:'mealy (가루 같은) + mouthed (말하는) → 가루를 씹듯 말을 부드럽게 얼버무리는 → 에둘러 말하는으로 고착 > 직접 말하지 못하고 빙빙 돌려 말하는 장면이 원형'},
{n:2830,w:'swagger',m:'v. ① 뽐내며 걷다, 거드름피우며 활보하다',s:'parade, prance, stride, strut ② 허풍을 떨다, 뻐기다, boast, brag, vaunt ③ ~을 위협하여 ~을 시키다[하지 못하게 하다], blackmail, bully, intimidate, threaten',r:'중세 영어 swaggeren (bluster, 허세 부리다) → 으스대며 거들먹거리며 걷다 → 뽐내며 걷다로 고착 > 가슴을 내밀고 어깨를 흔들며 당당히 걷는 장면이 원형'},
{n:2831,w:'artisan',m:'n. 장인, 기능공',s:'artificer, craftsman',r:'이탈리아어 artigiano (craftsman, 장인) → 손으로 기술을 발휘하는 사람 → 장인·기능공으로 고착 > 수십 년의 기술로 정교한 작품을 만드는 장인의 장면이 원형'},
{n:2832,w:'lagniappe',m:'n. (물건을 산 고객에게 주는) 덤, 경품; 팁',s:'bonus, gift, gratuity, largess',r:'프랑스어 la ñapa (the gift, 선물) → 구매에 덧붙여 주는 선물 → 덤·경품으로 고착 > 물건을 사면 사은품을 하나 더 얹어 주는 장면이 원형'},
{n:2833,w:'yield',m:'v. ① (수익·결과·농작물 등을) 내다, 산출하다, 생산하다',s:'generate, produce ② 양도하다, 넘겨주다, cede, devolve, relinquish ③ 항복[굴복]하다[to], capitulate, succumb, surrender n. 산출[수확]물; 산출[수확]량, crop, harvest, output',r:'고대 영어 gieldan (pay, 지불하다) → 열매를 내주다 → 산출하다·양보하다로 고착 > 농작물이 수확량을 내주는 장면이 원형'},
{n:2834,w:'exuberant',m:'a. ① 열광적인, 활기가 넘치는',s:'ebullient, enthusiastic, passionate ② 무성한, 우거진, lush, luxuriant ③ (부·상상력·재능 등이) 풍부한; (문체가) 화려한',r:'라틴어 exuberare (be abundant, 풍부하다) + -ant → 넘치도록 풍부한 → 열광적인·활기가 넘치는으로 고착 > 기쁨을 이기지 못해 팔짝팔짝 뛰는 장면이 원형'},
{n:2835,w:'prelude',m:'n. ① (사건 등의) 전조, 서곡[to]; 준비 행위, 서두[to] ② (음악) 전주곡, 서곡; 서문, 서론',s:'overture, preamble, preface',r:'라틴어 prae (before) + lud (play, 연주하다) → 연주 전에 먼저 하는 것 → 전조·서곡·전주곡으로 고착 > 오케스트라가 본 공연 전 짧은 전주곡을 연주하는 장면이 원형'},
{n:2836,w:'disarm',m:'v. ① 무기를 빼앗다, 무장 해제하다; 군비를 축소하다',s:'demilitarize, unarm ② 진정시키다, (노여움을) 가라앉히다; (적의를) 없애다, appease, mollify, subdue',r:'dis (undo) + arm (무장하다) → 무장을 해제하다 → 무기를 빼앗다·무장 해제하다로 고착 > 항복한 군인에게서 무기를 거두는 장면이 원형'},
{n:2837,w:'notch',m:'n. ① (질·성취 정도를 나타내는) 급수, 단계, 정도, 계급',s:'degree, grade, step ② (기록 등을 위해 막대기 등에 새겨 놓은 V자) 표시, 새김눈, indentation, mark, nick',r:'중세 영어 noche (nick, 흠집) → V자로 파인 흠집 → 급수·단계·새기다로 고착 > 나무에 칼로 V자 홈을 파 표시하는 장면이 원형'},
{n:2838,w:'whet',m:'vt. ① (칼 등을) 갈다, 갈아서 날카롭게 하다',s:'sharpen ② (식욕·욕구·흥미를) 자극하다, 돋우다, stimulate n. ① 벼리기, 갈기, 연마 ② 자극(물); 식욕을 돋우는 것; 한 잔의 술',r:'고대 영어 hwettan (sharpen, 날카롭게 하다) → 칼을 갈아 날카롭게 하다 → 날카롭게 하다·식욕을 돋우다로 고착 > 숫돌에 칼날을 갈아 날을 세우는 장면이 원형'},
{n:2839,w:'vein',m:'n. ① 정맥; (넓은 뜻으로) 혈관',s:'blood vessel ② 기질, 성질; (일시적인) 기분, temper; mood',r:'라틴어 vena (vein, 정맥) → 피가 흐르는 관 → 정맥·혈관·광맥으로 고착 > 피부 아래 파란 정맥이 보이는 장면이 원형'},
{n:2840,w:'grill',m:'v. ① 그릴[석쇠]에 굽다, (야외에서) 불에 굽다',s:'barbecue, broil, roast ② (경찰 등이) 엄하게 심문하다, 다그치다, interrogate, question, quiz n. (고기 따위를 굽는) 석쇠, grid, gridiron',r:'고대 프랑스어 grille (gridiron, 석쇠) → 석쇠에 굽다·닦달하다 → 석쇠에 굽다·심문하다로 고착 > 불 위 석쇠에서 고기가 익는 장면이 원형'},
{n:2841,w:'fragment',m:'n. 파편, 조각, 단편',s:'bit, fraction, particle, piece v. 산산이 부수다, 해체하다, disintegrate, shatter',r:'라틴어 frangere (break, 깨다) → 깨져 나온 조각 → 파편·조각·단편으로 고착 > 항아리가 깨져 조각이 바닥에 흩어지는 장면이 원형'},
{n:2842,w:'enshrine',m:'vt. ① (신전·묘당 등에) 안치하다, 모시다 ② (신성한 것으로서) 소중히 하다, (마음속에) 간직하다',s:'cherish, treasure',r:'en (in) + shrine (성소) → 성소 안에 모시다 → 안치하다·소중히 간직하다로 고착 > 귀한 유물을 성소에 정성스럽게 모시는 장면이 원형'},
{n:2843,w:'prig',m:'n. ① 박식한 척 하는 사람 ② 깐깐한 사람, 잔소리꾼',s:'',r:'17세기 영어 prig (tinker, 행상인) → 자신의 지식·도덕을 뽐내는 사람 → 박식한 척하는 사람·깐깐한 사람으로 고착 > 사소한 실수에도 잔소리를 늘어놓는 장면이 원형'},
{n:2844,w:'baleful',m:'a. 악의적인, 해로운, 재앙의',s:'evil, harmful',r:'고대 영어 balu (harm, 해) + -ful → 해가 가득한 → 악의적인·해로운으로 고착 > 독을 품은 눈빛으로 상대를 바라보는 장면이 원형'},
{n:2845,w:'cadet',m:'n. ① (경찰·군대의) 사관후보생, 사관학교 생도 ② 차남 이하의 아들, 막내아들; 동생',s:'',r:'프랑스어 cadet (younger son, 막내 아들) → 가문의 막내에서 군 사관후보생으로 → 사관후보생으로 고착 > 군복을 입고 사관학교에서 훈련받는 장면이 원형'},
{n:2846,w:'accrete',m:'v. ① 부착하다, 하나로 합치다',s:'adhere, attach, cleave, stick ② ~을 증대시키다, 보태다, augment, expand, increase',r:'라틴어 accrescere (grow together, 함께 자라다) → 달라붙어 함께 자라다 → 부착하다·합치다로 고착 > 산호가 조금씩 달라붙어 커지는 장면이 원형'},
{n:2847,w:'rouse',m:'vt. ① 깨우다, 일으키다; ~의 의식을 회복시키다',s:'awaken, wake up ② 분발하게 하다; (감정을) 돋우다, 선동하다; 성나게 하다, arouse, provoke, stimulate, stir n. 각성; 분기(奮起), arousal, awakening',r:'고대 영어 ahrisan (stir up, 일으키다) → 잠에서 깨우다 → 깨우다·의식을 회복시키다·분발시키다로 고착 > 곤히 자는 사람을 흔들어 깨우는 장면이 원형'},
{n:2848,w:'supple',m:'a. ① 나긋나긋한, 유연한',s:'elastic, flexible, resilient ② (머리·정신 등이) 유연성 있는, 순응성 있는, adaptable, flexible ③ (사람이) 유순한, 순종적인; (태도 따위가) 비위 맞추는, 알랑대는',r:'라틴어 supplex (bending low, 낮게 굽히는) → 쉽게 구부러지는 → 나긋나긋한·유연한으로 고착 > 유연하게 몸을 뒤로 젖히는 장면이 원형'},
{n:2849,w:'troupe',m:'n. (가수·배우 등의) 공연단, 극단; 일단, 한패',s:'band, company, group',r:'프랑스어 troupe (troop, 무리) → 함께 공연하는 무리 → 공연단·극단으로 고착 > 함께 무대에 오르는 배우들의 장면이 원형'},
{n:2850,w:'interdict',m:'vt. 금지하다, 금하다',s:'ban, forbid, injunct, outlaw, prohibit, proscribe n. (법원·행정관의) 금지명령, 금지령, ban, prohibition',r:'inter (between) + dict (say, 말하다) → 사이에 끼어 금지를 말하다 → 금지하다·금하다로 고착 > 법원이 특정 행위를 공식 금지하는 장면이 원형'},
{n:2851,w:'propitiate',m:'vt. 달래다; 비위를 맞추다; 화해시키다',s:'appease, comfort, conciliate, mollify, placate, soothe',r:'라틴어 propitiare (appease, 달래다) → 신이나 상대를 달래다 → 달래다·비위를 맞추다로 고착 > 화가 난 신에게 제물을 바쳐 달래는 장면이 원형'},
{n:2852,w:'evanescent',m:'a. 쉬이 사라지는, 덧없는, 무상한',s:'ephemeral, fleeting, transient',r:'라틴어 evanescere (vanish, 사라지다) + -ent → 사라지는 중인 → 쉬이 사라지는·덧없는으로 고착 > 아침 이슬이 햇살에 금방 증발하는 장면이 원형'},
{n:2853,w:'squabble',m:'vi. (사소한 일로) 말다툼하다[about, over]',s:'argue, quarrel, wrangle n. 시시한 언쟁, 입씨름, argument, dispute, quarrel',r:'스칸디나비아어 skvabbel (quarrel, 다툼) → 사소한 일로 시끄럽게 다투다 → 말다툼하다로 고착 > 작은 오해로 두 사람이 티격태격하는 장면이 원형'},
{n:2854,w:'beleaguer',m:'vt. ① 포위(공격)하다, 에워싸다',s:'beset, besiege ② 괴롭히다, ~에 끈덕지게 붙어 다니다',r:'네덜란드어 belegeren (besiege, 포위하다) → 사방을 에워싸다 → 포위하다·괴롭히다로 고착 > 적군이 성을 사방에서 에워싸는 장면이 원형'},
{n:2855,w:'coward',m:'n. 겁쟁이, 비겁자',s:'craven, dastard, poltroon, wimp',r:'라틴어 cauda (tail, 꼬리) → 꼬리를 내리고 도망치는 → 겁쟁이·비겁자로 고착 > 위험 앞에서 꼬리를 내리고 달아나는 장면이 원형'},
{n:2856,w:'swarthy',m:'a. (피부 등이) 거무스름한, 가무잡잡한',s:'dark-skinned, dusky, somber, sooty',r:'고대 영어 sweart (black, 검은) → 피부가 거무스름한 → 거무스름한·가무잡잡한으로 고착 > 햇빛에 그을려 가무잡잡해진 피부의 장면이 원형'},
{n:2857,w:'dovetail',m:'v. (사실·지식 등을) 긴밀히 연관시키다; 꼭 들어맞다',s:'link; coincide, correspond, fit together',r:'dove (비둘기) + tail (꼬리) → 비둘기 꼬리 모양의 홈이 딱 맞게 물리다 → 긴밀히 연관시키다·꼭 들어맞다로 고착 > 퍼즐 조각이 빈틈없이 맞아 들어가는 장면이 원형'},
{n:2858,w:'amenity',m:'n. ① (pl.) 기분 좋은 응대[태도]; 예의',s:'civility, courtesy ② (pl.) 생활 편의 시설, conveniences, facilities ③ (장소·기후 등의) 쾌적함, (성질·태도 등의) 상냥함, agreeableness',r:'라틴어 amoenitas (pleasantness, 쾌적함) → 쾌적하게 해주는 것 → 기분 좋은 응대·편의 시설로 고착 > 고급 호텔의 편리한 편의 시설의 장면이 원형'},
{n:2859,w:'trifle',m:'n. ① 하찮은 것[일]',s:'bagatelle, bauble, triviality ② 소량, 약간; 푼돈, bit, little, pittance v. ① 가볍게[소홀히] 다루다, 우습게 보다[with], look down on, make light of ② 시간을 헛되이 보내다, 빈둥거리다, dawdle, idle, loaf, squander',r:'고대 프랑스어 trufle (mockery, 조롱) → 조롱거리처럼 하찮은 것 → 하찮은 것·가지고 놀다로 고착 > 작은 것에 지나치게 신경 쓰는 장면이 원형'},
{n:2860,w:'provenance',m:'n. 기원, 출처, 유래',s:'origin, quarry, source',r:'프랑스어 provenir (come from, ~에서 오다) → 어디서 왔는가 → 기원·출처·유래로 고착 > 미술품의 원래 소유자 이력을 추적하는 장면이 원형'},
{n:2861,w:'choke',m:'v. ① 질식시키다, 숨막히게 하다; 숨이 막히다',s:'smother, stifle, strangle, suffocate ② (성장·행동 등을) 저지[억제]하다, block, obstruct ③ (감정·눈물을) 억누르다, restrain, suppress',r:'고대 영어 aceocian (choke, 막히다) → 목이 막혀 숨을 못 쉬다 → 질식시키다·숨막히게 하다로 고착 > 목에 무언가 걸려 숨이 막히는 장면이 원형'},
{n:2862,w:'austere',m:'a. ① (태도 등이) 엄격한, 엄한',s:'rigorous, severe, stern, strict ② (문체·건물 등이) 꾸밈없는, 간결한, plain, simple, unadorned ③ (생활 등이) 검소한, 절약하는; 금욕적인, economical, frugal, thrifty',r:'그리스어 austeros (harsh, 가혹한) → 불필요한 것을 모두 제거한 엄격함 → 엄격한·소박한으로 고착 > 아무 장식도 없이 텅 빈 수도사의 방의 장면이 원형'},
{n:2863,w:'restraint',m:'n. 억제, 규제, 제지; 구속, 속박; 자제',s:'constraint; control; moderation',r:'re (back) + strain (bind, 묶다) → 뒤로 묶어 억제하다 → 억제·자제·구속으로 고착 > 충동을 꾹 눌러 자제하는 장면이 원형'},
{n:2864,w:'intercept',m:'vt. ① 가로막다, 가로채다',s:'block, hijack, interrupt, seize ② (적기·미사일을) 요격하다 n. ① 방해, 저지, deterrence, obstruction ② 요격',r:'inter (between) + cept (take, 잡다) → 사이에서 잡다 → 가로막다·가로채다로 고착 > 전달 도중 메시지를 중간에 가로채는 장면이 원형'},
{n:2865,w:'lugubrious',m:'a. 침울한, 우울한, 애처로운, 가련한',s:'dismal, gloomy, sad',r:'라틴어 lugere (mourn, 슬퍼하다) + -ious → 슬퍼하는 성질 → 침울한·우울한으로 고착 > 장례식에서 구슬픈 표정으로 앉아있는 장면이 원형'},
{n:2866,w:'febrifuge',m:'a. 해열성의 n. 해열제; 청량음료',s:'',r:'라틴어 febris (fever, 열) + fug (drive away, 몰아내다) → 열을 몰아내는 것 → 해열제·해열성의로 고착 > 고열이 있는 아이에게 해열제를 먹이는 장면이 원형'},
{n:2867,w:'glare',m:'n. 번쩍이는(눈부신) 빛, 섬광',s:'blaze, brilliance v. ① 번쩍번쩍 빛나다, 눈부시게 빛나다, dazzle, flare, shine ② 노려보다, glower, scowl',r:'중세 영어 glaren (stare, 응시하다) → 눈부시게 번쩍이는 빛 → 번쩍이는 빛·노려보다로 고착 > 태양이 거울 표면에 반사되어 눈을 멀게 하는 장면이 원형'},
{n:2868,w:'strip',m:'v. ① 옷을 벗다[벗기다]',s:'disrobe, unclothe, undress ② (막·껍질 등을) 벗기다, peel, scale, scrape, skin ③ (처벌로서 재산·명예를) 박탈하다, 빼앗다, deprive, dispossess, rob',r:'고대 영어 stripan (strip, 벗기다) → 표면을 벗겨내다 → 벗다·벗기다·좁은 띠로 고착 > 페인트를 긁어 벗겨내는 장면이 원형'},
{n:2869,w:'contraception',m:'n. 피임, 피임법',s:'birth control',r:'contra (against) + concept (임신) → 임신에 반하는 것 → 피임·피임법으로 고착 > 임신을 막기 위해 피임법을 사용하는 장면이 원형'},
{n:2870,w:'disown',m:'vt. ① (자식 등과) 인연을 끊다, 의절하다',s:'renounce, repudiate ② (저작물 등을) 자기 것이 아니라고 말하다; ~와의 관계를 부인하다',r:'dis (undo) + own (소유하다) → 소유 관계를 부정하다 → 인연을 끊다·의절하다로 고착 > 부모가 자녀와의 관계를 끊겠다고 선언하는 장면이 원형'},
{n:2871,w:'rife',m:'a. ① (병·소문 등이) 유행하는, 널리 퍼져 있는',s:'prevailing, prevalent, rampant ② (나쁜 것으로) 가득 찬, 풍부한[with], abundant, plentiful, replete, rich',r:'고대 영어 rife (prevalent, 만연한) → 어디서나 퍼져 있는 → 유행하는·널리 퍼진으로 고착 > 도시 전체에 소문이 퍼져나가는 장면이 원형'},
{n:2872,w:'nonentity',m:'n. ① 별 볼일 없는 사람, 하찮은 사람',s:'cipher, lightweight ② 실재하지 않는 것, 상상의 것, imaginings, unreality',r:'non (not) + entity (존재) → 존재라 할 수 없는 것 → 별 볼일 없는 사람으로 고착 > 누구도 주목하지 않는 투명인간 같은 존재의 장면이 원형'},
{n:2873,w:'de facto',m:'a. (법적으로는 받아들여지지 않더라도) 사실상의, 실질적인',s:'actual, effective, real',r:'라틴어 de facto (from the fact, 사실로부터) → 법적 인정이 없더라도 사실상인 → 사실상의·실질적인으로 고착 > 공식 직책은 없지만 실제로 결정을 내리는 장면이 원형'},
{n:2874,w:'appurtenance',m:'n. ① (보통 pl.) 부속물, 부속품',s:'accessory, adjunct, appendage, appendix ② 장치, 기계, device',r:'고대 프랑스어 apertenance (appendage, 부속물) → 주된 것에 딸린 부속물 → 부속물·부속품으로 고착 > 집에 딸린 창고와 차고의 장면이 원형'},
{n:2875,w:'extemporize',m:'v. (연설·연주 등을) 즉석에서 만들다, 즉흥적으로 하다',s:'ad-lib, improvise',r:'라틴어 ex tempore (out of time, 순간에서) → 준비 없이 순간에서 만들어내다 → 즉흥적으로 하다로 고착 > 악보 없이 즉석에서 연주하는 장면이 원형'},
{n:2876,w:'impunity',m:'n. 처벌을 받지 않음, 무사',s:'exemption',r:'im (not) + punit (punish, 벌주다) + -y → 벌받지 않는 것 → 처벌을 받지 않음으로 고착 > 잘못을 저질러도 아무 처벌 없이 넘어가는 장면이 원형'},
{n:2877,w:'mellifluous',m:'a. (음악이나 사람의 목소리가) 달콤한, 감미로운',s:'dulcet, euphonious, mellow',r:'라틴어 mel (honey, 꿀) + flu (flow, 흐르다) → 꿀처럼 흘러나오는 → 달콤한·감미로운으로 고착 > 꿀처럼 부드럽고 달콤한 목소리의 장면이 원형'},
{n:2878,w:'comity',m:'n. 예의, 예절; 예양(禮讓)',s:'courtesy',r:'라틴어 comitas (courtesy, 예의) → 상호 예의와 배려 → 예의·예절로 고착 > 국가 간에 서로의 법과 관습을 존중하는 장면이 원형'},
{n:2879,w:'hoist',m:'vt. (돛·깃발 등을) 내걸다; (무거운 것을) 천천히 들어올리다, 들어서 올리다',s:'elevate, erect, heave, lift',r:'중세 영어 hyssen (lift, 올리다) → 도르래나 기계로 들어올리다 → 들어올리다·게양하다로 고착 > 깃발을 줄로 당겨 깃대 위로 올리는 장면이 원형'},
{n:2880,w:'iffy',m:'a. 조건부의; 불확실한, 의문점이 많은, 모호한',s:'',r:'if (만약) + -y → \'만약\'이 많은 → 조건부의·불확실한으로 고착 > 이것저것 조건이 많아 결과를 예측하기 어려운 장면이 원형'},
{n:2881,w:'upstart',m:'n. 벼락출세한 사람, 벼락부자',s:'parvenu, nouveau riche, arriviste a. 벼락출세한',r:'up (위로) + start (출발하다) → 갑자기 위로 뛰어오른 → 벼락출세한 사람으로 고착 > 하루아침에 갑자기 성공해 주목받는 장면이 원형'},
{n:2882,w:'muse',m:'v. 명상하다, 깊이 생각하다',s:'contemplate, meditate, ponder, reflect n. 시적 영감, (작가·화가 등에게 영감을 주는) 뮤즈',r:'그리스 신화 Muse (뮤즈, 예술의 여신) → 예술의 여신처럼 깊이 생각하다 → 명상하다·깊이 생각하다로 고착 > 눈을 감고 깊은 생각에 잠기는 장면이 원형'},
{n:2883,w:'ergonomics',m:'n. 인간공학; 생물공학',s:'human engineering; biotechnology',r:'그리스어 ergon (work, 일) + nomos (law, 법칙) + -ics → 일의 법칙을 연구하는 학문 → 인간공학으로 고착 > 사람의 몸에 맞게 작업 환경을 설계하는 장면이 원형'},
{n:2884,w:'reprobate',m:'n. 부도덕한 사람, 방탕아, 무뢰한',s:'profligate, rogue, scamp, scoundrel a. 사악한, 타락한, 불량한, corrupt, degenerate, depraved, wicked vt. 책망하다, 비난하다, condemn, denounce, reprehend, reproach, reprove',r:'라틴어 reprobare (reject, 거부하다) → 도덕적으로 거부된 자 → 부도덕한 사람·방탕아로 고착 > 도덕이라곤 없는 방탕한 생활을 하는 장면이 원형'},
{n:2885,w:'viand',m:'n. 식품; (pl.) 음식, 양식; 고급 요리',s:'comestibles, edibles, provisions, victuals',r:'고대 프랑스어 viande (food, 음식) → 먹기 위한 것 → 식품·고급 요리로 고착 > 은제 식기에 고급스럽게 차린 음식의 장면이 원형'},
{n:2886,w:'disgruntle',m:'vt. 기분 상하게 하다, ~에게 불만을 품게 하다',s:'annoy, discontent, irritate',r:'dis (undo) + gruntled (satisfied, 만족한) → 만족을 없애다 → 기분 상하게 하다·불만을 품게 하다로 고착 > 기대가 어긋나 불만스럽게 구는 장면이 원형'},
{n:2887,w:'greasy',m:'a. ① 기름투성이의, 기름기 있는; (음식이) 기름기 많은',s:'fatty ② 아첨하는; 미덥지 못한, unreliable',r:'grease (기름) + -y → 기름이 가득한 → 기름기 있는으로 고착 > 손에 기름이 끈적하게 묻은 장면이 원형'},
{n:2888,w:'primogeniture',m:'n. 장자의 신분; 장자 상속제, 장자 상속권',s:'',r:'라틴어 primus (first, 첫째) + genitura (birth, 출생) → 첫째로 태어남 → 장자 상속제로 고착 > 재산이 장남에게만 상속되는 장면이 원형'},
{n:2889,w:'consummate',m:'vt. ① 성취[완성]하다, 절정에 달하게 하다',s:'accomplish, achieve, finish, fulfill ② (결혼식 후) 첫날밤을 치르다[부부관계를 맺다] a. ① 완성된, 완전한, complete, perfect ② 숙련된, 유능한, gifted, skilled',r:'라틴어 consummare (sum up, 합산하다) → 모든 것을 합산해 완성하다 → 성취하다·완성하다로 고착 > 마지막 퍼즐 조각이 맞춰져 완성되는 장면이 원형'},
{n:2890,w:'tirade',m:'n. 긴 연설, (비난·공격 등의) 장광설, 격론',s:'diatribe',r:'프랑스어 tirer (draw out, 끌어내다) → 길게 끌어내는 비난 연설 → 장광설·격론으로 고착 > 마이크를 잡고 길게 쏟아내는 비난 연설의 장면이 원형'},
{n:2891,w:'oust',m:'vt. 내쫓다, 몰아내다, 축출하다',s:'depose, dislodge, expel',r:'앵글로 프랑스어 ouster (remove, 제거하다) → 자리에서 강제로 내쫓다 → 내쫓다·축출하다로 고착 > 쿠데타로 지도자를 자리에서 몰아내는 장면이 원형'},
{n:2892,w:'apotheosis',m:'n. ① 신격화',s:'deification, divinization, glorification ② (누구의 인생이나 사회생활에서) 절정기, heyday, prime',r:'그리스어 apo (away) + theos (god, 신) + -sis → 신의 경지로 올라가는 것 → 신격화·절정으로 고착 > 영웅이 죽어 신의 반열에 오르는 장면이 원형'},
{n:2893,w:'branch',m:'n. ① 가지 ② 지부, 지국, 지점, 출장소',s:'bureau, subsidiary ③ 분과(分科), 부문, department, section',r:'라틴어 branca (paw, 발톱) → 발톱처럼 뻗어 나온 가지 → 가지·지부로 고착 > 나무에서 굵은 줄기가 여러 가지로 뻗어나가는 장면이 원형'},
{n:2894,w:'superimpose',m:'vt. ① 겹쳐 놓다, 포개놓다',s:'cross, heap, overlap, stack, superpose ② (어떤 요소·특징을) 덧붙이다, 첨가하다, add, append, superinduce',r:'super (over, 위에) + impose (놓다) → 위에 겹쳐 놓다 → 겹쳐 놓다·포개놓다로 고착 > 두 이미지를 겹쳐 하나로 만드는 장면이 원형'},
{n:2895,w:'polyglot',m:'n. 여러 언어에 통하는 사람; 여러 개의 국어로 쓴 책 a. 여러 개의 국어에 통하는; 여러 개의 국어로 쓴',s:'',r:'그리스어 poly (many, 많은) + glot (tongue, 언어) → 여러 언어를 가진 → 여러 언어에 통하는 사람으로 고착 > 대화 상대에 따라 언어를 바꿔 말하는 장면이 원형'},
{n:2896,w:'enjoin',m:'vt. ① 명령하다, 요구하다, 강요하다',s:'command, direct, instruct, order ② 금지하다, 못하게 하다[from], ban, bar, forbid, prohibit',r:'en (upon) + join (연결하다) → 위에서 연결하여 명령하다 → 명령하다·강요하다로 고착 > 법원이 특정 행위를 하도록 명령하는 장면이 원형'},
{n:2897,w:'yummy',m:'a. 아주 맛있는',s:'delicious, luscious, tasty, toothsome',r:'yum (맛있는 소리) + -y → 맛있어서 나는 감탄사 → 아주 맛있는으로 고착 > 맛있는 음식을 먹고 눈을 감으며 감탄하는 장면이 원형'},
{n:2898,w:'astringent',m:'a. ① 수렴성의, 수축시키는 ② (표현 등이) 통렬한, 신랄한; (성격·태도 등이) 엄한, 엄격한',s:'bitter, harsh, severe, sharp ③ (맛이) 떫은, acerbic',r:'라틴어 astringere (bind fast, 단단히 묶다) + -ent → 단단히 조여 수축시키는 → 수렴성의·신랄한으로 고착 > 수렴제가 피부 모공을 조여드는 장면이 원형'},
{n:2899,w:'spasm',m:'n. ① 경련, 쥐',s:'convulsion, throe, twitch ② 발작(돌발적인 활동·감정 등), burst, fit, outburst, paroxysm, seizure',r:'그리스어 spasmos (convulsion, 경련) → 갑자기 수축하는 경련 → 경련·쥐로 고착 > 근육이 갑자기 쥐어짜듯 수축하는 장면이 원형'},
{n:2900,w:'corral',m:'vt. ① 울타리 안으로 몰아넣다, 가두다',s:'cage, confine, coop ② (사람들을 한 곳으로) 모으다 n. 울타리; 가축우리, 축사, pen',r:'스페인어 corral (yard, 마당) → 울타리로 둘러싼 가축 마당 → 울타리 안으로 몰아넣다로 고착 > 목동이 소를 울타리 안으로 몰아넣는 장면이 원형'},
{n:2901,w:'outstanding',m:'a. ① 두드러진, 현저한; 뛰어난, 걸출한',s:'distinguished, eminent, excellent, prominent, superior ② (부채·문제 등이) 미결정의, 미해결의, 미불의, pending, unpaid, unsettled, unsolved',r:'out (밖으로) + stand (서다) → 남들 위로 밖으로 우뚝 서는 → 두드러진·뛰어난으로 고착 > 군중 속에서 혼자 우뚝 서는 장면이 원형'},
{n:2902,w:'espouse',m:'vt. (주의·학설 등을) 신봉[지지, 옹호]하다',s:'advocate, defend, support, uphold',r:'라틴어 sponsare (betroth, 약혼하다) → 배우자처럼 받아들여 지지하다 → 신봉하다·지지하다로 고착 > 어떤 주의를 자신의 것으로 받아들이는 장면이 원형'},
{n:2903,w:'atrocity',m:'n. (특히 전쟁 때의) 잔혹 행위',s:'barbarity, brutality, cruelty, savagery',r:'라틴어 atrox (cruel, 잔인한) + -ity → 잔인함의 극치 → 잔혹 행위로 고착 > 전쟁 중 무고한 사람들에게 저지른 끔찍한 행위의 장면이 원형'},
{n:2904,w:'vernacular',m:'n. (특정 지역·집단이 쓰는) 말, 지방어, 사투리, 방언; 자국어, 제 나라 말',s:'dialect, patois, provincialism',r:'라틴어 vernaculus (native, 토착의) → 그 지역 토착민의 말 → 지방어·방언·자국어로 고착 > 표준어가 아닌 그 지역만의 사투리로 말하는 장면이 원형'},
{n:2905,w:'sumptuary',m:'a. 비용 절감의, 절약의; 사치 금제[단속]의',s:'cost-cutting, frugal, thrifty',r:'라틴어 sumptus (expense, 비용) + -ary → 비용에 관한 → 사치 금제의·비용 절감의로 고착 > 귀족들의 사치를 법으로 규제하는 장면이 원형'},
{n:2906,w:'lance',m:'n. (옛날에 말을 탄 무사들이 쓰던) 긴 창; 작살',s:'javelin, spear',r:'라틴어 lancea (spear, 창) → 말 위에서 쓰는 긴 창 → 긴 창으로 고착 > 기사가 말을 달리며 긴 창으로 적을 겨누는 장면이 원형'},
{n:2907,w:'recompense',m:'n. ① 보수; 보답',s:'requital, reward ② 보상, 배상, compensation vt. ① 보답하다, 배상하다, reimburse ② 보상하다, 배상하다, indemnify, requite',r:'re (back) + compens (weigh together, 함께 달다) → 저울을 되돌려 균형을 맞추다 → 보수·보답으로 고착 > 노동에 대한 대가를 주어 균형을 맞추는 장면이 원형'},
{n:2908,w:'excrescence',m:'n. ① (군살·사마귀 등의) 이상 생성물 ② 방해물, 무용지물',s:'',r:'ex (out) + cresc (grow, 자라다) + -ence → 밖으로 비정상적으로 자란 것 → 이상 생성물·방해물로 고착 > 피부 밖으로 불쑥 자라난 군살의 장면이 원형'},
{n:2909,w:'decrepit',m:'a. 노쇠한, 노후한, 늙어빠진',s:'dilapidated, feeble, infirm',r:'라틴어 decrepitus (very old, 매우 늙은) → 소리 없이 다 닳아버린 → 노쇠한·노후한으로 고착 > 삐걱거리고 부서질 것 같은 낡은 건물의 장면이 원형'},
{n:2910,w:'tycoon',m:'n. (실업계·정계의) 거물',s:'bigwig, magnate, mogul',r:'일본어 taikun (great lord, 대군) → 큰 권력을 가진 지도자 → 거물로 고착 > 거대 기업을 손에 쥔 재벌의 장면이 원형'},
{n:2911,w:'ball-park',m:'a. (견적·추정이) 대강의, 대략적인',s:'approximate, rough',r:'야구 구장(ball park)에서 대략적인 수치를 어림잡는 것 → 대강의·대략적인으로 고착 > 계산기 없이 어림잡아 수치를 추정하는 장면이 원형'},
{n:2912,w:'aspersion',m:'n. 비난, 비방, 중상',s:'calumny, defamation, detraction, slander',r:'라틴어 aspergere (sprinkle, 뿌리다) → 물을 뿌리듯 비난을 퍼붓다 → 비난·비방·중상으로 고착 > 남의 명성에 흙탕물을 뿌리는 장면이 원형'},
{n:2913,w:'fast',m:'v. 단식[절식]하다, 정진(精進)하다',s:'abstain from food, starve n. (특히 종교상의) 단식; 금식; 단식 기간',r:'고대 영어 faestan (abstain, 삼가다) → 음식을 삼가다 → 단식하다·절식하다로 고착 > 종교적 이유로 하루 종일 아무것도 먹지 않는 장면이 원형'},
{n:2914,w:'spoliation',m:'n. ① (특히 중립국에 대한) 강탈, 약탈, 파괴',s:'despoliation, extortion, plunder ② (서류·유서 등의) 문서 변조[파기]',r:'라틴어 spoliare (despoil, 약탈하다) → 사정없이 약탈하다 → 강탈·약탈·파괴로 고착 > 전쟁에서 적군이 마을을 약탈하는 장면이 원형'},
{n:2915,w:'immanent',m:'a. 내재(內在)하는, 내재적인',s:'inherent, intrinsic',r:'라틴어 immanere (remain in, 안에 머물다) → 안에 머물며 내재하는 → 내재하는으로 고착 > 사물 안에 이미 본질이 깃들어 있는 장면이 원형'},
{n:2916,w:'protrude',m:'vi. 튀어나오다, 돌출하다; 내밀다',s:'jut, overhang, project',r:'pro (forward) + trud (push, 밀다) → 앞으로 밀려 튀어나오다 → 튀어나오다·돌출하다로 고착 > 벽에서 못이 튀어나온 장면이 원형'},
{n:2917,w:'crabbed',m:'a. ① (성격이) 심술궂은, 괴팍한',s:'ill-natured, perverse ② (문제·작품 등이) 이해하기 어려운, 난해한, abstruse, intricate, unintelligible ③ (필적이) 해독하기 어려운, hieroglyphic, illegible, indecipherable, unreadable',r:'crab (게) + -ed → 게처럼 옆으로 기고 집게발을 들어 심술을 부리는 → 심술궂은·괴팍한으로 고착 > 조금만 건드려도 집게발을 치켜드는 게의 장면이 원형'},
{n:2918,w:'muddle',m:'v. 뒤죽박죽으로 만들다, 혼란시키다; 혼동하다',s:'confuse, embarrass, jumble, perplex n. 혼란, 난잡; 혼란 상태, confusion, disorder, mess',r:'중세 영어 muddlen (confuse, 혼란시키다) → 진흙처럼 뒤섞어 혼란스럽게 만들다 → 뒤죽박죽으로 만들다·혼동하다로 고착 > 정돈된 것을 마구 뒤섞어 놓은 장면이 원형'},
{n:2919,w:'gargantuan',m:'a. 거대한, 엄청나게 큰',s:'enormous, gigantic, huge, immense',r:'라블레 소설 Gargantua (엄청나게 큰 거인) → 거인처럼 엄청나게 큰 → 거대한·엄청나게 큰으로 고착 > 상상을 초월하는 크기의 거대한 것의 장면이 원형'},
{n:2920,w:'rustle',m:'v. (나뭇잎·비단옷 등이) 와삭거리다, 바스락거리다',s:'swish, whisper n. 살랑살랑[바스락바스락]하는 소리, whispering',r:'고대 영어 hrystle (make a soft noise, 부드러운 소리를 내다) → 마른 잎이 스치며 바스락거리다 → 와삭거리다·바스락거리다로 고착 > 바람에 나뭇잎이 와삭와삭 소리를 내는 장면이 원형'},
{n:2921,w:'baptism',m:'n. 세례(식), 침례, 영세(領洗)',s:'christening',r:'그리스어 baptizein (immerse, 담그다) → 물에 담가 정화하는 종교 의식 → 세례식·침례로 고착 > 성직자가 이마에 물을 부으며 세례를 주는 장면이 원형'},
{n:2922,w:'dissemble',m:'v. ① (감정·사상·목적 등을) 숨기다, 속이다',s:'conceal, dissimulate, hide, mask ② 가장하다, ~인 체하다, affect, disguise, feign, pretend',r:'dis (away) + semble (seem, 보이다) → 실제와 다르게 보이게 하다 → 숨기다·속이다로 고착 > 슬프면서도 웃는 얼굴로 감정을 감추는 장면이 원형'},
{n:2923,w:'ablution',m:'n. (주로 pl.) 몸[손]을 씻음, 목욕재계; 목욕',s:'cleansing, lavation, purification',r:'라틴어 abluere (wash away, 씻어내다) → 씻어내는 의식 → 몸을 씻음·목욕재계로 고착 > 기도 전에 손과 얼굴을 정갈히 씻는 장면이 원형'},
{n:2924,w:'curmudgeon',m:'n. 심술궂은 구두쇠, 노랭이',s:'cheapskate, miser, tightwad',r:'16세기 영어 curmudgeon (어원 불명, 인색한 노인) → 돈도 쓰기 싫고 남도 돕기 싫은 → 심술궂은 구두쇠로 고착 > 한 푼도 내놓기 싫어 꽉 쥔 주먹의 장면이 원형'},
{n:2925,w:'elegant',m:'a. (인물 등이) 기품 있는; (문체 등이) 우아한, 세련된',s:'graceful, refined',r:'라틴어 elegans (choosing carefully, 신중하게 선택하는) → 세심하게 골라 품위 있게 꾸민 → 기품 있는·우아한으로 고착 > 흠잡을 데 없이 세련된 차림새의 장면이 원형'},
{n:2926,w:'innuendo',m:'n. 풍자, 비꼼, 빗대어 빈정거림',s:'allusion, insinuation',r:'라틴어 innuere (nod at, 끄덕이다) → 직접 말하지 않고 슬쩍 눈짓하다 → 풍자·빗대어 빈정거림으로 고착 > 직접 이름을 대지 않고 빗대어 비꼬는 장면이 원형'},
{n:2927,w:'suavity',m:'n. ① 온화, 온화, 상냥함',s:'amiability, benignity, kindliness, placidity ② 온화한 태도, 정중한 태도, 예의, civility, courteousness, courtesy',r:'라틴어 suavis (sweet, 달콤한) + -ity → 달콤하고 온화한 성질 → 온화·상냥함으로 고착 > 부드러운 미소로 누구에게나 친절하게 대하는 장면이 원형'},
{n:2928,w:'humdrum',m:'a. 단조로운, 평범한, 지루한',s:'drab, monotonous, tedious',r:'hum (웅웅 소리) + drum (드럼) → 같은 소리가 반복되는 지루함 → 단조로운·지루한으로 고착 > 매일 같은 일을 반복하는 단조로운 생활의 장면이 원형'},
{n:2929,w:'confectionery',m:'n. 과자류; 과자 제조(법); 제과점',s:'',r:'라틴어 conficere (make up, 만들다) + -ery → 달콤한 것을 만드는 곳 → 과자류·제과점으로 고착 > 유리 진열장에 알록달록한 과자들이 가득한 장면이 원형'},
{n:2930,w:'apocalypse',m:'n. ① 계시, 묵시; 예언',s:'revelation; prognostication, prophecy ② 세계의 종말[파멸]; 전무후무[대재앙]의 날, doom, downfall; doomsday ③ (사회의) 대참사, 대재난, 대재앙, calamity, cataclysm, catastrophe',r:'그리스어 apokalypsis (revelation, 계시) → 가려진 것을 벗겨 드러내다 → 계시·묵시·예언으로 고착 > 신이 천사를 통해 종말의 비밀을 드러내는 장면이 원형'},
{n:2931,w:'proclivity',m:'n. (흔히 좋지 못한) 경향, 성벽, 기질',s:'disposition, penchant, predisposition',r:'라틴어 proclivitas (slope, 경사) → 비탈처럼 자연스럽게 기우는 경향 → 경향·성벽·기질로 고착 > 경사면에서 구슬이 저절로 내려가는 장면이 원형'},
{n:2932,w:'yelp',m:'v. ① (개·여우 등이) 날카롭게 짖어대다',s:'bark, howl, yap, yip ② 날카로운 소리로 외치다, 비명을 지르다, scream, screech, shriek, yell n. (날카롭게) 짖는 소리, 외치는 소리, 비명, cry, scream, screech, shriek',r:'고대 영어 gielpan (boast, 자랑하다) → 날카롭고 짧은 비명 → 날카롭게 짖어대다로 고착 > 밟힌 강아지가 날카롭게 깽 소리를 내는 장면이 원형'},
{n:2933,w:'crook',m:'n. ① 갈고리; 갈고리 모양의 것; 손잡이가 구부러진 지팡이 ② 사기꾼',s:'con man, fraud, fraudster, mountebank, swindler, trickster v. ① (팔·손가락 등을) 구부리다, bend, curve ② (물건을) 훔치다, 사취하다, cheat, defraud, ramp, steal, swindle',r:'고대 노르드어 krokr (hook, 갈고리) → 갈고리처럼 구부러진 → 갈고리·사기꾼으로 고착 > 양치기의 구부러진 지팡이의 장면이 원형'},
{n:2934,w:'manure',m:'n. (동물의 배설물로 만든) 거름, 천연 비료',s:'compost, fertilizer, ordure',r:'고대 프랑스어 manouvrer (work with the hands, 손으로 일하다) → 손으로 땅에 비료를 넣다 → 천연 비료로 고착 > 밭에 동물 배설물로 만든 거름을 뿌리는 장면이 원형'},
{n:2935,w:'fortitude',m:'n. (곤란·역경·위험·유혹에 직면한) 꿋꿋함, 불요불굴, 불굴의 정신',s:'bravery, courage, perseverance, resolution',r:'라틴어 fortis (strong, 강한) + -tude → 강함의 성질 → 꿋꿋함·불굴의 정신으로 고착 > 어떤 역경에도 굴하지 않고 버티는 장면이 원형'},
{n:2936,w:'nook',m:'n. ① 방 등의 아늑하고 조용한 구석, 모퉁이',s:'alcove, corner, niche, recess ② 외진 곳, 벽지(僻地), backwater, backwoods, boondocks',r:'중세 영어 nok (corner, 모퉁이) → 아늑한 구석 자리 → 아늑하고 조용한 구석으로 고착 > 창가 아늑한 구석에서 책을 읽는 장면이 원형'},
{n:2937,w:'quotidian',m:'a. ① 매일의, 매일같이 일어나는',s:'daily, diurnal ② 흔해빠진, 평범한, 시시한, commonplace, everyday, ordinary, trivial',r:'라틴어 quotidianus (daily, 매일의) → 매일 반복되는 → 매일의로 고착 > 아침마다 반복되는 일상의 장면이 원형'},
{n:2938,w:'consecrate',m:'vt. ① 신성하게 하다, 성화(聖化)하다',s:'bless, hallow, sacralize, sanctify ② (주교 등) 성직에 임명하다, institute, ordain ③ 생애 등을 어떤 목적·용도에 바치다, dedicate, devote',r:'con (completely) + sacr (sacred, 신성한) + -ate → 완전히 신성하게 만들다 → 신성하게 하다·성화하다로 고착 > 성직자가 교회를 봉헌하는 의식의 장면이 원형'},
{n:2939,w:'incinerate',m:'v. ① 태워서 재로 만들다, 태워 없애다, 소각하다',s:'burn up, char, flame, ignite ② (시체를) 화장하다, cremate',r:'라틴어 in (into) + ciner (ashes, 재) + -ate → 재로 만들다 → 태워서 재로 만들다·소각하다로 고착 > 소각로에서 쓰레기가 활활 타서 재가 되는 장면이 원형'},
{n:2940,w:'adipose',m:'a. 지방(질)의, 지방이 많은',s:'fatty, sebaceous',r:'라틴어 adeps (fat, 지방) + -ose → 지방이 가득한 → 지방질의·지방이 많은으로 고착 > 체지방 측정 시 지방 조직이 확인되는 장면이 원형'},
{n:2941,w:'strangle',m:'vt. ① 목 졸라 죽이다, 질식사시키다',s:'asphyxiate, choke, smother, suffocate, throttle ② (활동·비판 등을) 억누르다, 억압하다, inhibit, repress, subdue, suppress',r:'고대 프랑스어 estrangler (choke, 목 조르다) → 목을 졸라 숨을 막다 → 목 졸라 죽이다·질식사시키다로 고착 > 두 손으로 목을 조르는 장면이 원형'},
{n:2942,w:'guise',m:'n. ① 외관, 모습',s:'appearance, aspect, semblance ② 가장, 변장, 구실, disguise, dressing-up, pretense',r:'고대 프랑스어 guise (manner, 방식) → 겉으로 보이는 방식·모습 → 외관·모습으로 고착 > 전혀 다른 사람인 척 변장한 장면이 원형'},
{n:2943,w:'douse',m:'v. ① (물에) 처넣다; (물을) 끼얹다, 흠뻑 적시다',s:'drench, drown, saturate, soak ② (불·전등 따위를) 끄다, extinguish, quench, smother',r:'중세 영어 dousen (push into water, 물에 밀어 넣다) → 물에 처박거나 흠뻑 적시다 → 물을 끼얹다·적시다로 고착 > 불을 끄기 위해 물을 확 끼얹는 장면이 원형'},
{n:2944,w:'suture',m:'n. (의학) 봉합용 실, (꿰맬 때 쓰는) 실, 봉합선(縫合線) vt. (상처 따위를) 봉합하다, 꿰매다',s:'seam, sew, stitch',r:'라틴어 sutura (seam, 솔기) → 상처를 꿰맨 솔기 → 봉합선·봉합하다로 고착 > 의사가 수술 상처를 실로 꿰매는 장면이 원형'},
{n:2945,w:'repulsive',m:'a. ① 역겨운, 혐오스러운',s:'disgusting, foul, offensive, repugnant ② 매정한, 쌀쌀한, 냉담한, chilly, cold, frigid, wintry',r:'re (back) + puls (drive, 밀다) + -ive → 밀어 되돌리는 성질 → 역겨운·혐오스러운으로 고착 > 냄새가 너무 역겨워 얼굴을 돌리는 장면이 원형'},
{n:2946,w:'trek',m:'n. (특히 힘든) 여행 v. 길고 힘든 여행을 하다; 집단 이동하다',s:'',r:'네덜란드어 trekken (draw, 끌다) → 짐을 끌며 힘든 여행을 하다 → 힘든 여행으로 고착 > 무거운 배낭을 지고 험한 산길을 오르는 장면이 원형'},
{n:2947,w:'slate',m:'vt. ① 예정하다, 계획하다',s:'plan, schedule ② (책 등을) 혹평하다; (무대 등을) 호되게 꾸짖다, criticize, pan, slam n. 슬레이트, 석판',r:'중세 영어 slate (flat stone, 납작한 돌) → 납판처럼 계획을 써놓다 → 예정하다·계획하다로 고착 > 일정표에 행사를 적어 넣는 장면이 원형'},
{n:2948,w:'phantom',m:'n. ① 환영(幻影), 유령',s:'apparition, ghost, spirit ② 환각, 착각, 망상, hallucination, illusion, vision a. ① 환상의, 상상의; 유령의, fictitious, imaginary ② 실체가 없는, 겉뿐인',r:'그리스어 phantasma (apparition, 환영) → 실체 없이 나타나는 환영 → 유령으로 고착 > 어두운 곳에서 반투명한 형체가 나타나는 장면이 원형'},
{n:2949,w:'execrable',m:'a. 혐오[증오]할, 저주할; 몹시 서투른[형편없는]',s:'abominable, detestable, horrible',r:'라틴어 execrari (curse, 저주하다) + -able → 저주를 받아 마땅한 → 혐오할·형편없는으로 고착 > 너무나 끔찍해 저주를 퍼붓고 싶은 장면이 원형'},
{n:2950,w:'bristle',m:'v. ① (털·깃털 등이) 곤두서다',s:'prickle ② 화내다, (화가 나서) 발끈하다, 초조해하다, irritate, rage n. 뻣뻣한 털',r:'고대 영어 byrst (hair, 털) → 털이 곤두서다 → 털이 곤두서다·분개하다로 고착 > 위협을 느낀 고슴도치의 가시가 곤두서는 장면이 원형'},
{n:2951,w:'exacerbate',m:'vt. ① (고통·병·노여움 따위를) 악화시키다',s:'aggravate, worsen ② (감정 따위를) 격분시키다; 화나게[짜증나게] 하다',r:'라틴어 exacerbare (embitter, 악화시키다) → 더 쓰디쓰게 만들다 → 악화시키다로 고착 > 이미 나쁜 상황에 기름을 붓는 장면이 원형'},
{n:2952,w:'resurgence',m:'n. (활동의) 재기, 부활',s:'rebirth, renewal, resurrection',r:'re (again) + surg (rise, 일어나다) + -ence → 다시 일어나는 것 → 재기·부활로 고착 > 쓰러졌다 다시 일어서는 장면이 원형'},
{n:2953,w:'ultimatum',m:'n. 최종 제안, 최후통첩',s:'',r:'라틴어 ultimatum (final, 최종의) → 더 이상 협상 없는 최종 제안 → 최후통첩으로 고착 > 협상 기한을 정해 마지막 경고를 보내는 장면이 원형'},
{n:2954,w:'maraud',m:'v. 약탈하다, 습격하다[on, upon]',s:'despoil, loot, pillage, plunder, raid, ransack',r:'프랑스어 maraud (rogue, 악당) → 약탈을 위해 돌아다니다 → 약탈하다·습격하다로 고착 > 먹이를 찾아 마을을 습격하는 장면이 원형'},
{n:2955,w:'prank',m:'n. 농담, 못된 장난',s:'joke, trick',r:'중세 영어 pranken (show off, 뽐내다) → 관심을 끌기 위한 장난 → 못된 장난으로 고착 > 몰래 의자를 빼고 앉으면 쓰러지게 하는 장면이 원형'},
{n:2956,w:'daredevil',m:'a., n. 무모한, 물불을 가리지 않는, 저돌적인 (사람)',s:'madcap, risk-taker',r:'dare (감히 하다) + devil (악마) → 악마처럼 무모하게 뛰어드는 → 무모한·저돌적인으로 고착 > 아찔한 오토바이 묘기를 두려움 없이 하는 장면이 원형'},
{n:2957,w:'steppingstone',m:'n. 디딤돌; 수단, 발판',s:'foothold, means',r:'stepping (디딤) + stone (돌) → 물을 건너기 위해 밟는 디딤돌 → 디딤돌·발판으로 고착 > 시냇물을 건너기 위해 하나씩 밟아가는 장면이 원형'},
{n:2958,w:'beneficent',m:'a. 자선을 베푸는; 친절한, 인정 많은',s:'benevolent, charitable, generous',r:'라틴어 bene (well) + fic (do, 하다) + -ent → 좋은 것을 행하는 → 자선을 베푸는·인정 많은으로 고착 > 가난한 이웃에게 기꺼이 도움을 베푸는 장면이 원형'},
{n:2959,w:'alacrity',m:'n. 민첩, 기민함',s:'agility, alertness, nimbleness, promptitude',r:'라틴어 alacer (brisk, 활발한) + -ity → 활발함의 상태 → 민첩·기민함으로 고착 > 지시가 떨어지자마자 즉시 활기차게 움직이는 장면이 원형'},
{n:2960,w:'rebel',m:'n. 반역자, 모반자',s:'insurgent, mutineer a. 모반한, 반역의; 반항적인, insurrectionary, mutinous vi. 반역하다, 반란[모반]을 일으키다; 반항하다[against], mutiny, resist, revolt',r:'라틴어 re (again) + bell (war, 전쟁) → 다시 전쟁을 일으키는 → 반역자·모반자로 고착 > 권위에 맞서 저항하는 장면이 원형'},
{n:2961,w:'pungent',m:'a. ① (맛·냄새가) 톡 쏘는 듯한[몹시 자극적인]',s:'acrid, piquant ② (말 등이) 날카로운, 신랄한, acid, biting, caustic, incisive, pointed',r:'라틴어 pungere (sting, 찌르다) + -ent → 코를 찌르는 듯한 → 톡 쏘는·자극적인으로 고착 > 강한 향신료 냄새에 눈물이 나는 장면이 원형'},
{n:2962,w:'crumb',m:'n. ① (보통 pl.) 작은 조각, 빵부스러기',s:'fragment, particle, scrap, shred ② (비유) 소량, 약간[of], bit, grain, jot, morsel',r:'고대 영어 cruma (crumb, 부스러기) → 빵을 자를 때 떨어지는 작은 조각 → 빵부스러기로 고착 > 빵을 자를 때 바닥에 떨어지는 조각의 장면이 원형'},
{n:2963,w:'salve',m:'n. ① (상처 등에 바르는) 연고',s:'ointment, unction, unguent ② (괴로움 등을) 달래주는 것, (~에 대한) 위안, 위로, solace vt. ① (자존심·양심 따위를) 달래다, solace, soothe ② (불화·죄책 등을) 적당히 처리하다, 미봉하다, 얼버무리다',r:'고대 영어 sealf (ointment, 연고) → 상처를 낫게 하는 연고 → 연고·달래다로 고착 > 상처에 연고를 발라 통증을 달래는 장면이 원형'},
{n:2964,w:'ineffable',m:'a. 말로 표현할 수 없는, 이루 말할 수 없는, 형언할 수 없는',s:'indescribable',r:'in (not) + effable (utterable, 말할 수 있는) → 말로 할 수 없는 → 형언할 수 없는으로 고착 > 너무 아름다워 어떤 말로도 표현이 안 되는 장면이 원형'},
{n:2965,w:'breed',m:'v. ① 새끼를 낳다, 알을 까다 ② 번식시키다; 사육하다; (품종을) 개량하다',s:'multiply, reproduce ③ 일으키다, 야기하다, cause, create, produce ④ 기르다, 양육하다, nurture, raise, rear n. 종류; 유형; 품종; 종족; 혈통',r:'고대 영어 bredan (nurture, 기르다) → 낳고 기르다 → 새끼를 낳다·사육하다로 고착 > 농장에서 동물을 번식시키는 장면이 원형'},
{n:2966,w:'compendium',m:'n. ① 개설, 개론',s:'introduction, outline, survey ② 적요, 요약, abridgment, abstract, digest, epitome, summary',r:'라틴어 compendere (weigh together, 함께 달다) → 요약해 한곳에 모은 것 → 개설·개론으로 고착 > 방대한 지식을 한 권에 압축한 요약서의 장면이 원형'},
{n:2967,w:'gung-ho',m:'a. ① 충성을 다하는; (미국·속어) 바보처럼[무턱대고] 열심인, 열광적인',s:'ardent, enthusiastic, zealous ② (미국·속어) 세련되지 않은, 감정적인',r:'중국어 gōnghé (work together, 함께 일하다) → 함께 열심히 일하려는 의지 → 열광적인·무턱대고 열심인으로 고착 > 명령도 없이 앞장서서 뛰어드는 장면이 원형'},
{n:2968,w:'fusion',m:'n. ① 용해, 융해; 용해[융해]물',s:'dissolution, liquefaction, melting ② (정당·정파 등의) 합동, 합병; 연합체, alliance, coalition',r:'라틴어 fundere (pour, 붓다) → 함께 부어 녹여 합치다 → 용해·융합으로 고착 > 두 금속이 고열에 녹아 하나로 합쳐지는 장면이 원형'},
{n:2969,w:'summon',m:'vt. ① 소환하다, 호출하다; 소집하다',s:'call, convene, subpoena ② (용기 등을) 불러일으키다, 환기하다[up]',r:'라틴어 sub (secretly) + monere (warn, 경고하다) → 비밀리에 불러내다 → 소환하다·소집하다로 고착 > 왕이 신하를 긴급히 불러들이는 장면이 원형'},
{n:2970,w:'prescience',m:'n. 예지, 선견, 혜안, 통찰',s:'foresight, precognition, presage',r:'라틴어 prae (before) + sci (know, 알다) + -ence → 미리 아는 것 → 예지·선견으로 고착 > 일이 일어나기 전에 미리 알아채는 장면이 원형'},
{n:2971,w:'lucubrate',m:'vi. (밤늦게까지) 열심히 공부하다[일하다]',s:'cram, moil, toil',r:'라틴어 lucubrare (work by lamplight, 등불 아래 일하다) → 밤에 등불 아래서 열심히 일하다 → 밤늦게까지 열심히 공부하다로 고착 > 밤늦게까지 책상의 불을 끄지 않는 장면이 원형'},
{n:2972,w:'hydrophobia',m:'n. 공수병(恐水病), 광견병',s:'rabies',r:'그리스어 hydro (water, 물) + phobia (fear, 공포) → 물에 대한 공포증 → 공수병·광견병으로 고착 > 광견병에 걸려 물을 무서워하는 장면이 원형'},
{n:2973,w:'ostentatious',m:'a. 과시하는, 허세부리는',s:'flaunting, pretentious, showy',r:'라틴어 ostentare (show off, 과시하다) + -ious → 과시하는 성질 → 과시하는·허세부리는으로 고착 > 금으로 도배된 물건을 모두에게 자랑하는 장면이 원형'},
{n:2974,w:'atrophy',m:'n. 위축; 퇴화, 쇠퇴',s:'shrinkage; degeneracy, degeneration, deterioration v. 위축시키다, 위축되다; 퇴화[쇠퇴]시키다, shrink; degenerate, deteriorate',r:'그리스어 a (not) + trophe (nourishment, 영양) → 영양을 받지 못해 줄어드는 것 → 위축·퇴화·쇠퇴로 고착 > 사용하지 않은 근육이 점점 줄어드는 장면이 원형'},
{n:2975,w:'dingy',m:'a. ① 거무스름한; 더러운',s:'dirty, grimy ② 음침한, 칙칙한, dreary, somber',r:'중세 영어 dung (dung, 거름) → 거름처럼 더럽고 칙칙한 → 거무스름한·더러운으로 고착 > 한 번도 청소하지 않은 듯 지저분한 방의 장면이 원형'},
{n:2976,w:'turpitude',m:'n. 대단히 부도덕한 행위, 타락한 행위',s:'depravity, immorality, wickedness',r:'라틴어 turpis (base, 저열한) + -tude → 저열함의 성질 → 부도덕한 행위·타락으로 고착 > 기본적인 도덕마저 저버린 행동의 장면이 원형'},
{n:2977,w:'moribund',m:'a. 빈사 상태의, 죽어가는, 소멸[절멸] 직전의',s:'dying',r:'라틴어 mori (die, 죽다) + -bund → 죽어가는 중인 → 빈사 상태의·소멸 직전의로 고착 > 마지막 숨을 몰아쉬는 장면이 원형'},
{n:2978,w:'splice',m:'vt. ① (필름·밧줄·테이프의 두 끝을) 잇다',s:'connect, join, knit, unite ② 결혼시키다, marry, wed',r:'중세 네덜란드어 splissen (splice, 잇다) → 두 끝을 풀어 꼬아 이어 붙이다 → 두 끝을 잇다로 고착 > 끊어진 밧줄 두 끝을 꼬아서 잇는 장면이 원형'},

let currentSet=[],idx=0,isFlipped=false;
function loadSet(setNum){
  setNum=parseInt(setNum);
  const s=(setNum-1)*25;
  currentSet=WORDS.slice(s,s+25);
  idx=0;isFlipped=false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('setInfo').textContent='세트 '+setNum+' — '+currentSet[0].n+'번~'+currentSet[currentSet.length-1].n+'번';
  render();
}
function shuffle(){currentSet=currentSet.sort(()=>Math.random()-.5);idx=0;isFlipped=false;document.getElementById('card').classList.remove('flipped');render();}
function resetSet(){loadSet(document.getElementById('setSelect').value);}
function render(){
  const w=currentSet[idx];
  document.getElementById('num').textContent='#'+w.n;
  document.getElementById('num2').textContent='#'+w.n;
  document.getElementById('word').textContent=w.w;
  document.getElementById('meaning').textContent=w.m||'(뜻 없음)';
  const synEl=document.getElementById('syn');
  const rootEl=document.getElementById('root');
  if(w.s){synEl.textContent=w.s;synEl.style.display='block';}else{synEl.style.display='none';}
  if(w.r){rootEl.textContent=w.r;rootEl.style.display='block';}else{rootEl.style.display='none';}
  document.getElementById('cnt').textContent=(idx+1)+' / '+currentSet.length;
  document.getElementById('progress').textContent='진행: '+(idx+1)+'/'+currentSet.length+' ('+Math.round((idx+1)/currentSet.length*100)+'%)';
  isFlipped=false;document.getElementById('card').classList.remove('flipped');
}
function flipCard(){isFlipped=!isFlipped;document.getElementById('card').classList.toggle('flipped');}
function next(){if(idx<currentSet.length-1){idx++;render();}}
function prev(){if(idx>0){idx--;render();}}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight')next();
  else if(e.key==='ArrowLeft')prev();
  else if(e.key===' '){e.preventDefault();flipCard();}
});
loadSet(1);
</script>
