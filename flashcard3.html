{n:2696,w:'full-fledged',m:'a. 깃털이 다 난; 제몫을 하게 된, 자격이 충분한; 어엿한',s:'mature, qualified',r:'영어 full(가득한) + fledge(깃털이 나다) + -ed → 어린 새가 깃털이 풍성하게 다 자라 마침내 혼자 날아오를 준비를 완벽히 마친'},
{n:2697,w:'curator',m:'n. (박물관·도서관 등의) 큐레이터, 관리인, 관장',s:'conservator, custodian, keeper',r:'라틴어 curare(돌보다, 관리하다) + -or → 박물관의 귀중한 유물이나 예술 작품들을 책임지고 정성껏 돌보고 관리하는 사람'},
{n:2698,w:'rummage',m:'v. 샅샅이 뒤지다[찾다], 샅샅이 조사하다',s:'forage, ransack, search n. ① 샅샅이 뒤지기, 수색, search ② 잡동사니, 폐물',r:'프랑스어 arrumage(뱃짐 싣기) → 배의 창고 깊숙한 곳까지 물건을 싣거나 찾기 위해 마구잡이로 온통 뒤적거리는 것'},
{n:2699,w:'plumb',m:'a. ① 똑바른, 곧은; 수직[연직]의',s:'erect, upright; vertical ② 정확한; 순전한, 완전한, exact, precise v. ① 수직이 되게 하다 ② (물 깊이 등을) 재다, 측량하다, measure ③ ~에 배관(配管)하다, ~의 배관 수리 공사를 하다',r:'라틴어 plumbum(납) → 무거운 납덩어리를 줄 끝에 매달아 바다의 깊이를 재거나 벽이 수직인지 똑바르게 확인하다'},
{n:2700,w:'voyeur',m:'n. (성적으로) 엿보는[훔쳐보는] 취미를 가진 사람',s:'peeper, peeping Tom, snooper',r:'프랑스어 voir(보다) + -eur(사람) → 남의 사생활이나 은밀한 모습을 몰래 훔쳐보며 쾌감을 느끼는 사람'},
{n:2701,w:'oscillate',m:'v. ① (진자(振子)와 같이) 진동하다, 흔들리다',s:'vibrate ② (마음·의견 따위가) 동요하다, 흔들리다, 갈피를 못 잡다, vacillate, waver',r:'라틴어 oscillum(그네, 흔들리는 얼굴상) + -ate → 시계추가 양옆으로 휙휙 흔들리듯 마음이 이랬다저랬다 왔다 갔다 하다'},
{n:2702,w:'mischance',m:'n. 불운, 불행, 재난',s:'calamity, disaster, misfortune, mishap',r:'고대 프랑스어 mes-(나쁜) + chance(운) → 예기치 않게 갑자기 툭 떨어지는 아주 나쁘고 불행한 일'},
{n:2703,w:'superannuated',m:'a. ① 노령[병약]으로 퇴직한, 연금을 받고 퇴직한',s:'pensioned off, retired ② (사람·사물이) 너무 노쇠한, 노후화된, 시대에 뒤진',r:'라틴어 super-(넘어서) + annus(해, 년) + -ed → 일할 수 있는 나이(햇수)를 한참 넘겨버려 너무 늙고 낡아빠진'},
{n:2704,w:'affinity',m:'n. ① (~에 대한) 애호, 좋아함; 친근감, 공감, 호감',s:'fondness ② 유사성; 관련성, 밀접한 관계, resemblance, similarity ③ 맞는 성질',r:'라틴어 ad-(~로) + finis(경계) + -ity → 남과 나의 경계가 맞닿아 피가 섞인 것처럼 강하게 끌리고 친밀한 느낌'},
{n:2705,w:'rusty',m:'a. ① 녹슨, 녹이 난',s:'corroded, rusted ② 색이 바랜; 낡은, 구식의, faded; antiquated, old-fashioned ③ (쓰지 않아) 무디어져, 솜씨가 떨어진, 서투른, out of practice',r:'고대 영어 rust(녹) + -y → 오랫동안 안 써서 철에 벌건 녹이 슬어버렸거나 사람의 실력이 굳고 무뎌진'},
{n:2706,w:'inveigh',m:'vi. 통렬히 비난[항의]하다, 호되게 매도하다[against]',s:'berate, blame, censure, condemn, denounce, reproach',r:'라틴어 in-(안으로, 대항하여) + vehere(나르다, 가다) → 적을 향해 말이나 마차를 몰고 돌진하듯 격렬하게 비난을 쏟아내다'},
{n:2707,w:'contumacious',m:'a. 아무리 해도 말을 듣지 않는, 반항적인, 오만한',s:'defiant, mutinous, rebellious',r:'라틴어 con-(강조) + tumere(부풀어 오르다) + -ous → 자만심으로 꽉 차 건방지게 부풀어 올라 권위자에게 끝까지 반항하는'},
{n:2708,w:'squint',m:'n. ① 사시, 사팔뜨기',s:'cockeye, cross-eye ② 잠깐 봄, 흘낏 보기, glance, glimpse, peep v. ① 눈을 가늘게 뜨고 보다, 찡그리고 보다 ② (눈이) 사시이다',r:'영어 asquint(곁눈질로)에서 유래 → 빛이 부시거나 잘 안 보여서 눈을 찡그려 가늘게 뜨거나 눈동자가 몰린 모습'},
{n:2709,w:'precedent',m:'n. 선례, 전례, 판례',s:'antecedent',r:'라틴어 prae-(미리) + cedere(가다) + -ent → 과거에 시간상 먼저 앞서 걸어가서 현재의 모범이나 기준이 되는 사건'},
{n:2710,w:'awry',m:'ad., a. ① (계획 등이) 빗나간, 잘못되어',s:'wrong ② 구부러져, 비틀어져, 비스듬히, askance, askew',r:'영어 a-(~의 상태로) + wry(비틀린) → 목표를 향해 똑바로 가지 못하고 길에서 완전히 비뚤어지고 어긋나버린'},
{n:2711,w:'extort',m:'v. ① 억지로 빼앗다, 갈취하다',s:'blackmail, exact, squeeze, wrest, wring ② (약속·자백 등을) 강요하다, coerce, force',r:'라틴어 ex-(밖으로) + torquere(비틀다) → 사람의 팔을 비틀고 쥐어짜서 돈이나 약속을 억지로 밖으로 빼앗아내다'},
{n:2712,w:'fugacious',m:'a. ① (꽃이) 빨리 지는, 시드는',s:'evanescent ② 덧없는, 순식간의, ephemeral, evanescent, fleeting, transitory',r:'라틴어 fugere(도망치다) + -ous → 아름다운 꽃이나 시간이 도망치듯 한순간에 휙 지나가 버려 몹시 허무한'},
{n:2713,w:'consort',m:'n. ① (특히 국왕·여왕 등의) 배우자',s:'spouse ② 일치, 조화, harmony v. ① (나쁜 사람과) 교제하다, 사귀다[with], associate with ② 일치[조화]하다, agree, harmonize',r:'라틴어 con-(함께) + sors(운명) → 평생 운명을 함께 나누는 왕의 짝이거나, 안 좋은 무리와 끼리끼리 어울려 다니다'},
{n:2714,w:'prehensile',m:'a. ① (동물) 쥐기에 적당한, (발·꼬리 등이) 잡는 힘이 있는',s:'grabby, grasping ② 이해력[지각력]이 있는',r:'라틴어 prehendere(잡다) + -sile(할 수 있는) → 원숭이 꼬리나 코끼리 코처럼 나뭇가지를 단단히 감아쥐고 매달릴 수 있게 발달한'},
{n:2715,w:'subterfuge',m:'n. ① 핑계, 구실',s:'pretext ② 속임수, deception, trick, trickery',r:'라틴어 subter-(아래로, 몰래) + fugere(도망치다) → 곤란한 상황을 몰래 피해서 달아나려고 교묘하게 꾸며낸 핑계나 속임수'},
{n:2716,w:'dumbfound',m:'vt. ~을 어이가 없어 말도 하지 못하도록 하다, 아연실색케 하다',s:'amaze, astound, flabbergast, startle, stun',r:'영어 dumb(말 못 하는) + confound(당황하게 하다) → 너무나도 엄청난 충격에 휩싸여 당황한 나머지 꿀 먹은 벙어리가 되게 하다'},
{n:2717,w:'wound',m:'n. ① 부상, 상처',s:'cut, hurt, injury, lesion ② (정신적) 상처, 고통, pain, trauma v. ① 상처를 입히다, hurt, injure ② (감정을) 해치다, offend, pique',r:'고대 영어 wund(상처) → 날카로운 무기에 찔려 피가 나는 끔찍한 몸의 상처나 가슴 깊이 남은 정신적 고통'},
{n:2718,w:'practitioner',m:'n. ① (전문직·기술 등에) 개업자, (특히) 개업 의사, 변호사',s:'professional ② (특정 생활·종교 양식 등을) 실천하는 사람',r:'영어 practice(실천, 개업) + -ion + -er → 이론만 아는 것이 아니라 병원이나 법률 사무소를 차려 실제로 배운 기술을 써먹는 사람'},
{n:2719,w:'careen',m:'v. ① (배가) 한쪽으로 기울다, (배를) 기울이다',s:'heel, incline, lean, tilt ② (자동차 등이) 흔들리며 위태롭게 질주하다',r:'라틴어 carina(배의 용골) → 배의 밑바닥을 수리하려고 배를 한쪽으로 눕히거나 통제력을 잃고 기우뚱거리며 달리다'},
{n:2720,w:'treacherous',m:'a. ① 배반하는, 반역하는; (사람·언행이) 불성실한, 기대에 어긋나는 ② (기후·기억 등이) 믿을 수 없는, 의지가 안 되는 ③ (발판 따위가) 불안정한, 무너질 것 같은; 위험한',s:'',r:'고대 프랑스어 trechier(속이다) + -ous → 겉보기에는 안전해 보이지만 언제 사람의 목숨을 앗아갈지 모를 만큼 몹시 위험하고 기만적인'},
{n:2721,w:'internment',m:'n. (포로 등의) 억류, 감금',s:'confinement, detainment, detention',r:'라틴어 in-(안에) + terminus(경계) + -ment → 전쟁 시 적국 사람이나 포로를 정해진 수용소 구역 안에 가두어 밖으로 못 나가게 함'},
{n:2722,w:'gush',m:'v. ① (액체가) 쏟아져 나오다, 분출하다',s:'flow, pour, spurt, stream ② (감정적으로·과장하여) 지껄여대다, 마구 쏟아 내다, rave, spout n. (액체 등의) 쏟아짐, 분출; (감정·말 등의) 분출, 격발, spate, torrent',r:'중세 영어 guschen(물이 콸콸 쏟아지는 소리) → 땅속에서 물이 터져 솟구치듯 엄청난 양의 물이나 참았던 말들이 밖으로 왈칵 터져 나옴'},
{n:2723,w:'euphemism',m:'n. 완곡어법; 완곡 어구[표현]',s:'circumlocution',r:'그리스어 eu-(좋게) + phanai(말하다) + -ism → \'죽다\'를 \'돌아가시다\'라고 하듯 끔찍하고 듣기 싫은 말을 부드럽고 듣기 좋게 포장해서 하는 말'},
{n:2724,w:'doctor',m:'v. ① 치료하다',s:'medicate, treat ② (문서·증거 따위를) 조작하다, 변조하다, fabricate, fake, manipulate',r:'라틴어 docere(가르치다) + -or → 환자를 치료하는 훌륭한 의사, 혹은 병을 고치듯 서류나 장부에 교묘하게 손을 대어 가짜로 꾸미다'},
{n:2725,w:'contraband',m:'n. ① 밀수품, 금제품',s:'smuggled goods ② 밀수, 밀매매, 불법 거래, illicit traffic, smuggling',r:'이탈리아어 contra-(반대하여) + bando(법령) → 국가가 정한 금지 법령을 어기고 국경을 넘어 몰래 들여오는 불법 물건'},
{n:2726,w:'stab',m:'v. (칼같이 뾰족한 것으로) 찌르다',s:'spear, stick, thrust n. ① 찔린 상처, 자상(刺傷), prick, wound ② 찌르는 듯한 통증, 쑤시는 느낌, ache, pang',r:'스코틀랜드어 stob(말뚝) → 날카로운 칼이나 송곳으로 사람의 몸을 푹 찌르거나 가슴이 아찔할 만큼 훅 들어오는 끔찍한 고통'},
{n:2727,w:'benevolent',m:'a. ① 자비심이 많은, 인정 많은, 친절한',s:'benign, charitable, generous ② 자선의, charitable',r:'라틴어 bene(좋게) + velle(바라다) + -ent → 남이 불행을 벗고 잘되기를 진심으로 바라는 천사같이 착하고 따뜻한 마음'},
{n:2728,w:'vertigo',m:'n. 어지러움, 현기증',s:'dizziness, giddiness',r:'라틴어 vertere(돌다) + -igo(상태) → 높은 곳에 올라갔을 때 주변 세상이 빙빙 도는 것처럼 느껴져 정신을 못 차리는 증상'},
{n:2729,w:'holistic',m:'a. 전체론의, 전체론적인',s:'',r:'그리스어 holos(전체의) + -istic → 부분만 따로 떼어 보지 않고 세상 만물을 하나로 촘촘히 연결된 커다란 전체 덩어리로 파악하는'},
{n:2730,w:'quell',m:'vt. ① (반란·소요 등을) 진압[평정]하다',s:'put down, subdue, suppress ② (당황하거나 불쾌한 감정을) 가라앉히다[누그러뜨리다], suppress',r:'고대 영어 cwellan(죽이다) → 거칠게 일어난 반란의 불길을 군대로 밟아 끄거나 마음속의 분노를 확 억눌러 죽여버리다'},
{n:2731,w:'statute',m:'n. 법규, 법령; 규칙, 학칙, 정관',s:'',r:'라틴어 statuere(세우다) + -ute → 국가나 기관이 흔들림 없이 확고하게 제정하여 세워놓은 공식적인 성문 법률'},
{n:2732,w:'thoroughfare',m:'n. ① (도시의) 주요[간선] 도로, 큰 거리',s:'road, street, way ② 통행, 통항, 통과, passage, transit',r:'영어 thorough(관통하여) + fare(가다) → 한쪽 끝에서 다른 쪽 끝으로 막힘없이 시원하게 뻥 뚫려 누구나 다니는 큰길'},
{n:2733,w:'mordant',m:'a. 신랄한, 독설적인, 통렬한',s:'acerbic, biting, caustic, scathing',r:'라틴어 mordere(물어뜯다) + -ant → 날카로운 이빨로 살점을 뜯어내듯 남의 가슴을 피가 나도록 꽉 물어뜯는 잔인한 비판'},
{n:2734,w:'rendition',m:'n. ① 번역; 해석',s:'interpretation ② (연극·음악의) 연출, 연주, 공연, performance',r:'고대 프랑스어 rendre(주다, 번역하다) → 예술가가 대본이나 악보를 자기만의 방식으로 해석하여 관객에게 무대 위로 내놓는 것'},
{n:2735,w:'lumber',m:'n. ① 목재, 제재목(통나무·들보·판자 등)',s:'timber ② 잡동사니 v. 재목을 베어내다; 육중하게 움직이다',r:'어원 불명 → 전당포에 널브러진 무거운 잡동사니처럼 볼품없이 무겁게 쿵쿵거리며 걷거나 베어낸 무거운 통나무'},
{n:2736,w:'aperture',m:'n. 구멍, 틈, 균열',s:'gap, hole, interstice, orifice',r:'라틴어 aperire(열다) + -ure → 카메라 렌즈의 조리개나 꽉 막힌 벽에 빛이 들어오도록 살짝 열어놓은 작은 틈새'},
{n:2737,w:'blurt',m:'vt. 불쑥 말하다, 무심코 말하다, 누설하다[out]',s:'betray, burst out, disclose',r:'의성어(말이 튀어나오는 소리) → 마음속에 감춰두어야 할 비밀이나 생각을 생각할 겨를도 없이 입 밖으로 터뜨리며 내뱉다'},
{n:2738,w:'inextricable',m:'a. ① 빠져나올[탈출할] 수 없는 ② (매듭이) 풀리지 않는',s:'tangled ③ 불가분한, 떼려야 뗄 수 없는, involved',r:'라틴어 in-(not) + ex-(밖으로) + tricae(장애물) + -able → 그물이나 미로에 꽉 엉켜 있어서 도저히 밖으로 빼내거나 풀 수 없는'},
{n:2739,w:'arraign',m:'vt. ① (피고를) 법정에 소환하다; 죄상의 진위 여부를 묻다; 기소 인정 여부 절차를 밟다',s:'charge, indict, prosecute ② 규탄하다, 책망하다, censure, denounce, impeach, reproach',r:'라틴어 ad-(~로) + ratio(이성, 계산) → 피고인을 재판장 앞으로 불러내어 네가 지은 죄를 이성적으로 계산하여 따져 묻다'},
{n:2740,w:'deranged',m:'a. (특히 정신병으로 인해 행동과 사고가) 정상이 아닌, 미친',s:'crazy, insane, mad',r:'프랑스어 des-(벗어난) + ranger(배열하다) + -ed → 뇌의 생각 회로가 엉망으로 꼬여 정상적인 인간의 질서 밖으로 완전히 벗어난 상태의'},
{n:2741,w:'fail-safe',m:'a. 전혀 문제가 없는, 절대 안전한',s:'foolproof, infallible, sound',r:'영어 fail(실패하다) + safe(안전한) → 기계가 고장 나거나 시스템이 실패(fail)하더라도 사람을 안전하게(safe) 지켜주도록 설계된'},
{n:2742,w:'gouge',m:'vt. ① 둥근 끌로 파다, (눈알 따위를) 도려내다[out]',s:'hollow, scoop, scrape ② 바가지를 씌우다; 값을 부당하게 올리다',r:'고대 프랑스어 gouge(둥근 끌) → 둥근 칼이나 손가락으로 눈알을 잔인하게 푹 파내거나 남의 지갑에서 터무니없는 바가지를 씌워 돈을 파내다'},
{n:2743,w:'overbearing',m:'a. 거만한, 오만한; 고압적인',s:'arrogant, domineering, haughty; high-handed',r:'영어 over(위에서) + bear(누르다) + -ing → 덩치나 권력으로 상대방을 위에서 짓눌러 압도하며 매우 거만하게 구는'},
{n:2744,w:'beat',m:'v. ① (연속적으로) 두드리다, 때리다; (장단을) 맞추다; (심장이) 고동치다, 뛰다 ② (상대방을) 이기다, 패배시키다; 능가하다',s:'defeat; outdo ③ (힘든 문제 등을) 억제하다, 통제하다, control n. 박자, 비트, time',r:'고대 영어 beatan(때리다) → 북이나 적을 몽둥이로 퍽퍽 때리거나 심장이 쿵쿵 리듬을 맞추어 뛰는 행위'},
{n:2745,w:'prurient',m:'a. 색을 밝히는, 음란한, 외설적인',s:'lascivious, libidinous, lustful, salacious',r:'라틴어 prurire(가렵다) + -ent → 채워지지 않는 성적인 욕망 때문에 몸과 마음이 근질근질 가려워서 참지 못하고 색을 밝히는'},
{n:2746,w:'clan',m:'n. ① 씨족(氏族), 문중, 일족',s:'family, tribe ② 당파, 도당; 파벌, band, clique, faction',r:'켈트어 clann(가족) → 공통된 조상을 둔 스코틀랜드 산악 지방의 핏줄로 뭉친 끈끈한 친척 무리나 배타적인 집단'},
{n:2747,w:'swoon',m:'vi. ① 기절하다, 졸도하다, 까무러치다',s:'conk, faint, keel ② 황홀경에 빠지다 ③ (소리 따위가) 약해지다, 차츰 사라져 가다 n. 기절, 졸도, asphyxiation, fainting',r:'고대 영어 swogan(숨이 막히다) → 너무 놀라거나 숨이 막혀 픽 쓰러지거나, 기가 막히게 멋진 대상에 넋을 잃고 기절할 듯한'},
{n:2748,w:'emollient',m:'a. (마음·상황·피부 등을) 진정시키는, 부드럽게 하는',s:'assuaging, mitigative, mollifying',r:'라틴어 e-(밖으로) + mollis(부드러운) + -ent → 거칠고 메마른 피부에 로션을 발라 부드럽게 풀어주거나 화난 마음을 달래는'},
{n:2749,w:'nomenclature',m:'n. ① 학명(學名), 전문어',s:'phraseology, terminology ② (특히 전문적인) 명명법(命名法)',r:'라틴어 nomen(이름) + calare(부르다) + -ure → 생물이나 화학 물질의 종류를 체계적으로 분류하고 과학적인 규칙에 따라 이름을 붙여 부르는 방법'},
{n:2750,w:'reverberate',m:'v. ① (소리가) 반향하다, 울려 퍼지다',s:'echo, resound ② (빛·열 등을) 반사시키다, reflect ③ (사람들에게) 반향을 불러일으키다',r:'라틴어 re-(다시) + verberare(치다) + -ate → 동굴 속에서 낸 소리가 벽을 계속 때리며 웅웅거리고 끊임없이 메아리쳐 울리다'},
{n:2751,w:'grisly',m:'a. 무시무시한, 소름끼치는',s:'ghastly, gruesome, hair-raising, hideous, horrible',r:'고대 영어 grislic(무서운) → 피투성이가 된 살인 현장처럼 쳐다보기도 힘들 만큼 끔찍하고 등골이 오싹해지며 공포스러운'},
{n:2752,w:'stupor',m:'n. (술·약물·충격 등으로 인한) 지각 마비 (상태), 인사불성',s:'stupefaction, torpor',r:'라틴어 stupere(마비되다, 멍해지다) + -or → 술이나 마약, 둔기에 맞아 감각이 둔해지고 뇌가 정지하여 주변을 전혀 모르는 멍한 상태'},
{n:2753,w:'maverick',m:'n. 어느 파에도 속하지 않는 정치인[예술가], 독불장군',s:'',r:'인명 Samuel Maverick에서 유래 → 소에 낙인을 찍지 않은 사람의 이름에서 유래하여 어느 무리에도 얽매이지 않고 제멋대로 하는 이단아'},
{n:2754,w:'dislodge',m:'v. ① (특정 지위나 장소에서) 제거하다, 쫓아내다',s:'displace, eject, evict, oust ② (어떤 장소에서) 움직이다, 이동시키다',r:'프랑스어 des-(분리) + loge(숙소) → 단단히 박혀 있거나 자리 잡고 숨어 있는 적군을 억지로 쑤셔 빼내어 쫓아버리다'},
{n:2755,w:'artifice',m:'n. ① 책략, 계략',s:'maneuver, ruse, stratagem, strategy, tactics ② 교묘함, 재주 좋음',r:'라틴어 ars(기술) + facere(만들다) → 정당하게 힘으로 이길 수 없어 잔머리를 굴려 교묘하게 꾸며낸 속임수나 기술'},
{n:2756,w:'sully',m:'v. (가치 등을) 더럽히다, 훼손하다',s:'besmirch, defile, soil, taint, tarnish',r:'프랑스어 souiller(더럽히다) → 깨끗한 흰옷에 더러운 구정물을 튀기듯 사람의 결백하고 빛나는 명예를 진흙탕에 처박아 훼손하다'},
{n:2757,w:'plangent',m:'a. ① 구슬프게 울리는, 울려 퍼지는',s:'resonant, resounding, sonorous ② (파도가) 밀려와 부딪치는',r:'라틴어 plangere(가슴을 치다) + -ent → 바위에 부서지는 웅장한 파도 소리나 가슴을 치며 우는 듯한 애절하고 구슬픈 종소리'},
{n:2758,w:'imprecate',m:'vt. (아무에게 재난·불행이 있기를) 빌다, 저주하다',s:'anathematize, curse, cuss, execrate',r:'라틴어 in-(향하여) + precari(기도하다) + -ate → 신에게 두 손 모아 저 악당의 머리 위로 벼락이 떨어지고 끔찍한 파멸이 닥치기를 기도하다'},
{n:2759,w:'amnesty',m:'n. ① 대사(大赦), 사면(赦免)',s:'absolution, pardon, remission ② (범행·무기의) 자진 신고 기간, 처벌 유예 기간',r:'그리스어 a-(없는) + mnasthai(기억하다) + -y → 국가가 반역자나 정치범들이 저지른 과거의 범죄 기록을 기억에서 완전히 지워주고 용서해 주는 특사'},
{n:2760,w:'ecclesiastical',m:'a. 교회의, 교회 조직의; 성직자의',s:'churchly, spiritual; clerical, priestly',r:'그리스어 ekklesia(의회, 교회) + -stical → 세상의 법이 아니라 신을 모시는 기독교의 성스러운 교회 조직이나 성직자와 관련된'},
{n:2761,w:'fritter',m:'v. (시간·돈 등을) 조금씩 낭비[허비]하다[away]',s:'dissipate, squander, waste',r:'라틴어 frictus(부서진 조각) → 소중한 돈이나 귀중한 시간을 빵 부스러기처럼 잘게 쪼개어 아주 조금씩 의미 없이 날려버리다'},
{n:2762,w:'apocryphal',m:'a. 출처가 불분명한; 가짜의, 위작(僞作)의',s:'bogus, counterfeit, fake, phony, spurious',r:'그리스어 apo-(멀리) + kryptein(숨기다) + -al → 정식 성경에서 빠져 깊숙이 숨겨진 외경처럼 누가 썼는지 알 수 없고 진짜가 아닌 듯한'},
{n:2763,w:'prostrate',m:'vt. ① (제귀용법) 엎드리다; 넘어뜨리다 ② 굴복시키다, 의기소침하게 하다',s:'disarm, overcome, overwhelm a. ① 엎드린, 길게 누운, fallen, flat, prone ② 굴복한, 항복한, disarmed, overwhelmed ③ 기진맥진한, drained, exhausted',r:'라틴어 pro-(앞으로) + sternere(뻗다) + -ate → 신이나 승리자 앞에서 복종의 뜻으로 바닥에 납작 엎드려 몸을 쭉 뻗거나, 지쳐서 탈진한 상태'},
{n:2764,w:'squarely',m:'ad. ① 정면으로, 똑바로',s:'directly ② 정확하게; 공명정대하게; 솔직히, justly ③ 단호하게, 분명히',r:'영어 square(정사각형) + -ly → 정사각형처럼 각이 딱 잡혀 비뚤어짐 없이 정면으로 마주하거나, 아주 공평하고 단호하게'},
{n:2765,w:'charter',m:'n. ① 헌장, 선언서 ② 특허장, 면허장 ③ (버스·비행기 등의) 대절[계약], 전세 vt. ① ~에게 특허장[면허]을 주다',s:'authorize, empower, license, permit ② (비행기·버스·선박 등을) 전세 내다, hire, lease, rent',r:'라틴어 chartula(종이) → 왕이나 국가가 특수한 권리를 허락한다고 종이에 써준 공식 문서이거나, 비행기를 통째로 돈을 내고 빌리는 계약'},
{n:2766,w:'truant',m:'n. 무단결석생; 게으름뱅이, 꾀부리는 사람',s:'absentee, delinquent a. 게으름피우는, 무단결석하는; 게으른, absent, missing',r:'고대 프랑스어 truant(부랑자) → 책임과 의무를 팽개치고 학교에 가기 싫어서 부랑자처럼 거리를 쏘다니며 땡땡이를 피우는 학생'},
{n:2767,w:'seismology',m:'n. 지진학',s:'',r:'그리스어 seismos(지진) + -logy(학문) → 땅이 무섭게 흔들리고 갈라지는 지진의 원인과 파동을 전문적으로 연구하는 학문'},
{n:2768,w:'overrule',m:'v. ① 기각[각하]하다, (결정 등을) 뒤엎다',s:'disallow, overturn, reverse ② (의지 등을) 지배하다, 제압하다, 좌우하다, dominate, govern, rule',r:'영어 over(위에서) + rule(통치하다) → 상급 법원이나 윗사람이 아랫사람의 기존 판결이나 결정을 위에서 눌러 완전히 거부하고 뒤엎어 버리다'},
{n:2769,w:'detonation',m:'n. 폭발; 폭발음',s:'blast, explosion',r:'라틴어 de-(아래로) + tonare(천둥 치다) + -tion → 다이너마이트가 터질 때 마치 하늘에서 번개와 천둥이 치는 것처럼 쾅 하고 울리는 무서운 폭발'},
{n:2770,w:'countermand',m:'vt. (명령·주문 등을) 취소하다, 철회하다',s:'abrogate, annul, recant, rescind, revoke',r:'라틴어 contra-(반대로) + mandare(명령하다) → 상황이 바뀌어 예전에 내렸던 명령을 싹 거두어들이고 완전히 정반대되는 새로운 명령을 내리다'},
{n:2771,w:'reverend',m:'a. ① (사람·사물·장소 등이) 귀하신, 존경할 만한, 거룩한',s:'respectable, venerable ② (the R~) ~님(성직자에 대한 경칭; 약어: Rev.) n. 성직자, 목사, 신부, clergyman, minister, priest',r:'라틴어 re-(강조) + vereri(두려워하다, 존경하다) → 신을 모시며 두려울 만큼 깊은 존경을 받을 만한 훌륭한 성직자'},
{n:2772,w:'weed',m:'n. ① 잡초; 해초 ② 쓸모없는 것[사람]; 잡초 같은 존재, 유해물 v. ① 잡초를 뽑다',s:'pluck, pull ② 없애다, 제거하다[out], clear, eliminate, remove',r:'고대 영어 weod(잡초) → 정성껏 가꾼 밭에 쓸데없이 자라나서 영양분을 뺏어 먹는 풀을 뽑아버리다'},
{n:2773,w:'lineal',m:'a. ① 직계의, 정통의',s:'direct ② 선(모양)의, linear',r:'라틴어 linea(선) + -al → 부모에서 자식으로 핏줄이 선처럼 똑바로 끊어지지 않고 이어져 내려온'},
{n:2774,w:'evoke',m:'vt. ① (감정·기억·이미지를) 떠올려 주다[환기시키다]',s:'arouse, provoke ② (웃음·갈채 등을) 자아내다 ③ (죽은 사람의 영혼 등을) 불러내다, invoke',r:'라틴어 e-(밖으로) + vocare(부르다) → 깊숙이 잠들어 있던 옛 기억이나 감정을 밖으로 소리쳐 불러내다'},
{n:2775,w:'custody',m:'n. ① 보관, 관리; (특히 미성년자의) 보호, 감독, 후견, 양육권',s:'safekeeping; care, protection ② 감금, 구류, confinement, detention, imprisonment',r:'라틴어 custos(경비병, 보호자) + -y → 소중한 아이나 물건을 지키기 위해 돌보거나, 죄수를 감옥에 가두어 관리함'},
{n:2776,w:'fustian',m:'n. 과장된 언사, 호언; (문장·말의) 과장',s:'bombast, rhetoric, verbose a. 야단스러운, 과장된, grandiloquent, pompous',r:'아랍어 fustat(두꺼운 무명천) → 값싼 천에 솜을 잔뜩 집어넣어 부풀린 것처럼 속은 텅 비고 겉만 잔뜩 부풀려 쓴 허세 섞인 글'},
{n:2777,w:'quip',m:'n. 재치 있는 말, 경구(警句), 명언(名言)',s:'epigram, wisecrack, witticism v. 빈정대다, 놀리다, banter, gibe, jeer, ridicule',r:'라틴어 quippe(정말로, 물론) → 분위기를 띄우려고 아주 빠르고 날카롭게 던지는 재치 만점의 짧은 농담이나 비꼬는 말'},
{n:2778,w:'banish',m:'vt. ① 추방하다; 내쫓다',s:'deport, exile, expatriate ② (마음을) 떨쳐버리다, (근심 따위를) 쫓아버리다',r:'고대 프랑스어 banir(추방하다) → 국가의 법으로 흉악한 범죄자를 국경 밖으로 내쫓아 영원히 돌아오지 못하게 하다'},
{n:2779,w:'heyday',m:'n. (활동·정력·성공 등의) 한창때, 전성기',s:'golden age, prime',r:'감탄사 hey + day(날) → 기쁨에 겨워 \'야호!\' 하고 소리칠 만큼 인생에서 가장 화려하고 잘나가는 황금빛 시절'},
{n:2780,w:'irenic',m:'a. 평화[협조]적인, 평화에 도움이 되는',s:'pacific, peaceful',r:'그리스어 eirene(평화) + -ic → 분쟁을 멈추고 갈등을 부드럽게 해결하여 마음을 편안하고 평화롭게 만들어 주는'},
{n:2781,w:'constrain',m:'vt. ① 억지로 ~시키다, 강요하다',s:'coerce, compel, force, impose ② 제한[제약]하다, 속박하다, curb, limit, restrain, restrict',r:'라틴어 con-(함께) + stringere(단단히 묶다) → 밧줄로 꽁꽁 묶어 옴짝달싹 못 하게 억누르거나 억지로 행동하게 강요하다'},
{n:2782,w:'repository',m:'n. 저장소, 창고; (지식·정보 등의) 보고(寶庫)',s:'warehouse; depository',r:'라틴어 re-(뒤로) + ponere(놓다) + -ory → 귀중한 물건이나 방대한 정보를 안전한 곳에 모아두고 보관하는 창고'},
{n:2783,w:'vituperative',m:'a. 비난하는, 매도하는; 독설을 퍼붓는',s:'abusive, defamatory, invective, vitriolic',r:'라틴어 vitium(결점) + parare(준비하다) + -ive → 남의 결점을 꼬투리 잡아 모욕적이고 잔인한 독설을 퍼붓는'},
{n:2784,w:'adumbrate',m:'vt. ① 개요를[개략적으로] 알려주다',s:'outline, recapitulate, sketch, summarize ② (미래를) 예시하다, foreshadow',r:'라틴어 ad-(~로) + umbra(그림자) + -ate → 아직 뚜렷하지 않은 사물이나 사건의 어렴풋한 그림자만 스케치하듯 미리 보여주다'},
{n:2785,w:'stern',m:'a. ① 엄격한, 단호한',s:'rigid, rigorous, strict, stringent ② (사태·사정 따위가) 심각한, 가혹한, extreme, grave, serious, severe n. (배의) 고물, 선미(船尾)',r:'고대 영어 styrne(엄격한) → 얼굴에 미소 하나 없이 바늘로 찔러도 피 한 방울 안 나올 것처럼 몹시 차갑고 가혹한'},
{n:2786,w:'usury',m:'n. 고리대금 (행위); (법정 이율 이상의) 고리(高利)',s:'loan-sharking',r:'라틴어 usura(사용, 이자) → 돈을 빌려주고 그 사용료로 법이 허용하는 범위를 훌쩍 넘어 악랄하게 뜯어내는 엄청난 이자'},
{n:2787,w:'goof',m:'v. ① 실수하여 망쳐 버리다[up]; 바보 같은 실수를 하다 ② 빈둥거리다, 시간을 허비하다[off, around]',s:'loaf, lounge n. ① 바보, 멍청이, dummy, dunce ② 실수, blunder, mistake',r:'프랑스어 goffe(바보 같은) → 어리석고 주의력이 부족하여 멀쩡한 일을 완전히 망쳐버리거나 얼간이처럼 굴다'},
{n:2788,w:'fluke',m:'n. 뜻밖의 행운, 요행(수)',s:'godsend, windfall',r:'어원 불명 (당구 용어에서 유래) → 실력이 아니라 그저 운이 엄청나게 좋아서 어쩌다 우연히 딱 얻어걸린 요행'},
{n:2789,w:'bleed',m:'v. ① 출혈하다, 피를 흘리다',s:'gush, hemorrhage, shed ② 마음이 몹시 아프다[for]',r:'고대 영어 bledan(피를 흘리다) → 몸에 상처가 나서 붉은 피가 줄줄 쏟아지거나 남을 동정하여 마음이 피가 나듯 아프다'},
{n:2790,w:'exodus',m:'n. ① (많은 사람들이 동시에 하는) 탈출, 이동, 이주',s:'departure, flight, migration ② (E~) (구약 성서의) 출애굽기',r:'그리스어 ex-(밖으로) + hodos(길) → 모세가 이스라엘 백성을 이끌고 이집트를 빠져나왔듯 엄청난 무리가 한꺼번에 탈출함'},
{n:2791,w:'contrived',m:'a. 억지로 꾸민 듯한, 부자연스러운',s:'artificial, concocted, forced, unnatural',r:'고대 프랑스어 con-(함께) + trover(찾다) + -ed → 자연스럽지 못하게 머리를 굴려 억지로 짜내어 아주 부자연스러운'},
{n:2792,w:'droop',m:'v. ① 축 늘어지다, 수그러지다; (머리 등을) 수그리다, 숙이다',s:'sag, sink ② (초목이) 시들다; (기력·의기 등이) 쇠하다, 의기소침해지다, wilt, wither; languish n. ① 숙임, 수그러짐 ② 풀이 죽음, 의기소침',r:'고대 노르드어 drupa(고개를 숙이다) → 꽃이 시들거나 지친 사람이 기운이 쪽 빠져 머리를 푹 숙이고 축 처지다'},
{n:2793,w:'propriety',m:'n. ① 예의바름; 예의범절, 예절',s:'courtesy, decency, decorum, etiquette ② (행동의 도덕적·사회적) 적절성, appropriateness, relevance',r:'라틴어 proprius(자신의, 적당한) + -ety → 사회적 규칙에 맞게 자신을 다스리며 바르고 단정하게 행동하는 예절'},
{n:2794,w:'culinary',m:'a. 부엌의, 요리의; 부엌용의, 요리용의',s:'',r:'라틴어 culina(부엌) + -ary → 부엌에서 맛있는 음식을 지지고 볶고 만들어내는 일과 관련된'},
{n:2795,w:'incarnation',m:'n. 육체를 갖추게 함, 인간의 모습을 취함, 화신(化身); 구체화',s:'embodiment, personification',r:'라틴어 in-(안으로) + caro(고기, 육체) + -tion → 신이나 악마 같은 추상적 존재가 실제 사람의 육신을 입고 태어난 것'},
{n:2796,w:'resuscitate',m:'v. ① (인공호흡법 등으로) 소생시키다, 의식을 회복시키다',s:'resurrect ② (과거의 것을) 부흥하다, 부활시키다, revive',r:'라틴어 re-(다시) + sub-(아래에서) + citare(부르다) → 숨이 멎어 죽어가는 사람을 밑바닥에서부터 다시 흔들어 깨워 살려내다'},
{n:2797,w:'sinuous',m:'a. ① (강 등이) 꾸불꾸불한, 굽이친',s:'convoluted, curving, meandering, winding ② 복잡한, complicated, intricate ③ 사악한, sinister, wicked',r:'라틴어 sinus(곡선, 굽음) + -ous → 뱀이나 강물처럼 똑바로 가지 않고 구불구불하게 휘어진'},
{n:2798,w:'nugget',m:'n. ① (귀금속 등의) 덩어리',s:'chunk, clump, hunk, lump, mass ② (가치 있는) 작고 귀중한 것, 귀중한 정보',r:'영어 nug(작은 덩어리) + -et(작은) → 흙 속에서 캐낸 작지만 눈부시게 빛나는 진짜 순금 덩어리나 가치 있는 사실'},
{n:2799,w:'moot',m:'a. ① 논란의 여지가 있는, 논쟁 중인, 미해결의',s:'controversial, debatable ② (가능성이 적으므로) 고려할 가치가 없는',r:'고대 영어 mot(회의) → 결론이 안 나서 회의에 올려놓고 계속 입씨름하며 따져봐야 하는 문제'},
{n:2800,w:'premiere',m:'n. ① (연극의) 첫날, 초연; (영화의) 개봉',s:'first night, unveiling; release ② (연극의) 주연 여배우, main actress v. (연극·작곡의) 첫 공연을 하다, (영화를) 개봉하다 a. 첫날의, 최초의; 주요한, 눈에 띄는',r:'프랑스어 premier(첫째의) → 세상 사람들에게 완전히 처음으로 작품을 공개하는 가장 특별한 첫 공연'},
{n:2801,w:'brandish',m:'vt. ① (칼·무기 등을) 휘두르다',s:'swing, wield ② 과시하다, flaunt, parade, show off',r:'고대 프랑스어 brandir(칼을 흔들다) → 번쩍이는 칼을 높이 쳐들고 무섭게 윙윙 휘두르거나 허세를 부리며 뽐내다'},
{n:2802,w:'puerile',m:'a. 어린아이 같은, 유치한, 미숙한',s:'babyish, childish, immature, infantile',r:'라틴어 puer(소년) + -ile(형용사 접미사) → 어른답지 못하고 어린 꼬마처럼 생각과 행동이 몹시 유치한'},
{n:2803,w:'spinster',m:'n. 노처녀, 독신녀(특히 나이가 많고 결혼할 가능성이 적어 보이는 사람)',s:'',r:'영어 spin(실을 잣다) + -ster(사람) → 옛날에 결혼하지 않고 혼자 물레를 돌려 실을 짜며 살아가던 나이 든 여성'},
{n:2804,w:'disabuse',m:'vt. ~의 어리석음을 깨우치다, (그릇된 관념·잘못 따위를) 깨닫게 하다',s:'disenchant, disillusion',r:'프랑스어 des-(반대, 분리) + abuser(남용하다, 속이다) → 남이 깊게 빠져 있는 헛된 착각이나 환상을 와장창 깨뜨려 진실을 보게 하다'},
{n:2805,w:'all-out',m:'a. 총력을 기울인, 전면적인',s:'full-out, full-scale, overall, total',r:'영어 all(모든) + out(밖으로) → 아끼는 것 없이 자신이 가진 모든 힘과 자원을 남김없이 밖으로 쏟아부은'},
{n:2806,w:'promenade',m:'n. ① 산책, 산보',s:'stroll, walk ② (말·수레를 탄) 행렬, 행진, parade ③ 산책길, 산책하는 곳, walkway v. ① 슬슬 거닐다, 산책하다; (아무를) 산책시키다, stroll, walk ② 뽐내며 걷다, 행진하다, parade, strut',r:'프랑스어 promener(산책시키다) → 바닷가나 예쁜 길을 따라 여유롭게 걸으며 경치를 즐기거나 남에게 보여주는 산책'},
{n:2807,w:'stoke',m:'v. ① (연료를) 보급하다',s:'fuel ② (감정을) 부추기다, 불러일으키다[up], stir',r:'네덜란드어 stoken(불을 피우다) → 화로에 장작을 마구 집어넣어 불길을 확 키우듯 사람의 화를 무섭게 부추기다'},
{n:2808,w:'cocoon',m:'n. (곤충의) 고치; 보호막 v. ~을 보호하다',s:'',r:'프랑스어 cocon(작은 껍질) → 애벌레가 번데기가 되려고 실을 뿜어 자기 몸을 따뜻하게 감싸 만든 둥근 집'},
{n:2809,w:'risque',m:'a. 음란한, 외설스러운',s:'bawdy, lewd, obscene, salacious, scabrous',r:'프랑스어 risquer(위험을 무릅쓰다) → 도덕의 선을 아슬아슬하게 넘나들어 듣기 민망할 정도로 야한'},
{n:2810,w:'provident',m:'a. ① 선견지명이 있는; (특히 돈을 저축하면서) 장래를 준비하는[of] ② 절약하는, 검소한',s:'economical, thrifty ③ 조심성 있는, 신중한, careful, precautious, prudent',r:'라틴어 pro-(미리) + videre(보다) + -ent → 다가올 흉년을 미리 내다보고 곡식을 아끼고 모아두며 빈틈없이 대비하는'},
{n:2811,w:'immure',m:'vt. ① 감금하다, 투옥하다, 가두다',s:'imprison, incarcerate, jail ② (어떤 범위에) 한정[제한]하다[in], confine, restrict',r:'라틴어 in-(안에) + murus(벽) → 사람을 차가운 돌벽 안에 꽉 가두어 바깥세상으로 한 발짝도 못 나오게 하다'},
{n:2812,w:'suspense',m:'n. ① 미결정인 상태, 불안정, 어중간함',s:'insecurity, obscurity ② (소설·영화 등의) 지속적 긴장감, 서스펜스 ③ 걱정, 근심, 불안, anxiety, apprehension, uneasiness, worry',r:'라틴어 sub-(아래에서) + pendere(매달다) → 사건의 결말이 안 나고 허공에 대롱대롱 매달려 있어 조마조마하고 피가 마르는 긴장감'},
{n:2813,w:'animus',m:'n. ① 적의, 원한, 적개심, 증오',s:'animosity, antagonism, enmity, hostility ② 의도, 의사, 의향, intention',r:'라틴어 animus(마음, 영혼, 분노) → 마음속 깊은 곳에서 부글부글 끓어오르는 누군가를 향한 지독한 미움과 적대감'},
{n:2814,w:'clinch',m:'v. ① (사건·토론 등의) 결말을 짓다, 매듭짓다',s:'conclude, settle ② 성사시키다, 이뤄내다',r:'고대 영어 clencan(단단히 잡다) → 길고 지루한 협상의 끝에 드디어 두 손을 꽉 맞잡고 계약에 쐐기를 박다'},
{n:2815,w:'resolution',m:'n. ① 다짐, 결심; 결의안; 결단력; 확고부동 ② (문제·불화 등의) 해결',s:'settlement, solution ③ (컴퓨터 화면·TV 등의) 해상도',r:'라틴어 re-(강조) + solvere(풀다) + -tion → 엉킨 문제를 확실히 풀어내거나 어떤 일이 있어도 꼭 해내겠다고 마음을 굳게 묶는 다짐'},
{n:2816,w:'grope',m:'v. ① 손으로 더듬다, 더듬어 찾다[for, after]',s:'fumble ② (암중) 모색하다, 찾다[for, after], explore ③ 여성의 몸을 더듬다, 애무하다[for, after]',r:'고대 영어 grapian(만지다) → 빛이 전혀 없는 암흑 속에서 오직 두 손의 감각만으로 길이나 물건을 더듬거리며 찾다'},
{n:2817,w:'crib',m:'n. ① 구유, 여물통',s:'manger ② (난간이 달린) 어린이 침대, 요람, bassinet, cradle ③ (흔히 시험 때 이용하는) 커닝 쪽지, 커닝 페이퍼, cheat sheet v. 도용하다, 표절하다, 커닝하다',r:'고대 영어 cribb(소구유, 짜 엮은 바구니) → 나뭇가지를 엮어 만든 소의 밥통이나 아기 침대, 혹은 몰래 숨겨둔 부정행위 쪽지'},
{n:2818,w:'smug',m:'a. ① 자만심이 강한, 자기만족의; 잘난 체하는',s:'complacent, self-satisfied ② 말끔한, 산뜻한, 말쑥한, neat, spruce, trim n. (사교나 운동은 하지 않고) 공부만 하는 학생, dig, grind, swot',r:'저지 독일어 smuk(단정한) → 자신만 완벽하다고 믿어 턱을 쳐들고 얄밉게 씩 웃으며 잘난 척하는 표정'},
{n:2819,w:'annals',m:'n. 연대기, 연표; 역사적 기록',s:'chronicle',r:'라틴어 annus(해, 년) + -al → 한 해 한 해 일어난 크고 중요한 역사적 사건들을 순서대로 빠짐없이 기록해 둔 묵직한 책'},
{n:2820,w:'momentum',m:'n. ① (일의 진행에 있어서의) 탄력, 기세, 힘, 여세',s:'force, impetus, power ② 가속도, acceleration',r:'라틴어 movere(움직이다) + -mentum → 눈덩이가 굴러가며 점점 거대해지듯 일이 앞으로 나아갈수록 무섭게 붙는 가속도와 탄력'},
{n:2821,w:'implacable',m:'a. ① 달랠[누그러뜨릴] 수 없는, 화해하기 어려운, 앙심 깊은 ② 용서 없는, 무자비한',s:'merciless, relentless, ruthless',r:'라틴어 in-(not) + placare(달래다) + -able → 아무리 빌고 사정해도 돌처럼 차갑게 굳어 절대 분노를 풀지 않는'},
{n:2822,w:'excise',m:'vt. ① (어구·문장 등을) 삭제하다',s:'delete, erase, expunge ② (종기 등을) 잘라내다, 절제하다, extract, remove ③ 물품세[소비세]를 부과하다, impose, levy n. (술·담배 등에 대한) 물품세, (국내) 소비세, commodity tax',r:'라틴어 ex-(밖으로) + caedere(자르다) → 병든 살덩이나 검열에 걸린 문장을 가위나 메스로 싹둑 잘라서 밖으로 빼버리다'},
{n:2823,w:'refulgent',m:'a. 빛나는, 찬란한',s:'brilliant, radiant, shining',r:'라틴어 re-(강조) + fulgere(빛나다) + -ent → 어둠을 뚫고 쏟아지는 찬란한 황금빛 태양처럼 눈이 부시게 번쩍거리는'},
{n:2824,w:'countenance',m:'n. (얼굴의) 표정, 안색; 얼굴, 용모',s:'face, phiz, visage vt. 지지하다, 동의하다, agree, approve, concur, consent, subscribe, support',r:'고대 프랑스어 contenance(행동, 표정) → 감정이 겉으로 드러난 얼굴빛이거나, 고개를 끄덕여 긍정적인 표정을 지으며 남을 지지해주다'},
{n:2825,w:'jolly',m:'a. 명랑한, 즐거운, 유쾌한',s:'cheerful, gay, jocund, jovial, mirthful',r:'고대 프랑스어 jolif(축제 분위기의) → 잔칫날 춤추고 노래하듯 가슴속에서 우러나오는 기쁨으로 몹시 신나고 유쾌한'},
{n:2826,w:'trinket',m:'n. 자질구레한 장신구',s:'doodad, knickknack, ornament',r:'고대 프랑스어 trenchet(작은 칼) → 값이 싸고 반짝거리지만 실용성은 없는 조그맣고 하찮은 장식품'},
{n:2827,w:'debonair',m:'a. ① (보통 남자가) 멋지고 당당한, 세련된',s:'refined, urbane ② 사근사근한, 공손한; 명랑한, 쾌활한, affable, courteous; cheerful',r:'프랑스어 de bon aire(좋은 혈통의) → 멋진 정장을 입고 젠틀하게 미소 지으며 사람들을 홀리는 매력 만점의 신사다운'},
{n:2828,w:'originate',m:'v. ① 비롯하다, 일어나다, 생기다, 시작하다[from, in, with]',s:'begin, start ② 시작하다, 일으키다; 발명하다, 고안하다, cause; invent',r:'라틴어 origo(기원, 시작) + -ate → 강물이 옹달샘에서 처음 솟아나듯 어떤 일이나 생명이 맨 처음 시작되다'},
{n:2829,w:'mealy-mouthed',m:'a. 완곡하게 말하는, 에둘러 말하는, 말을 솔직하게 하지 않는',s:'euphemistic, indirect',r:'영어 meal(거친 가루) + mouth(입) + -ed → 입안에 마른 가루를 가득 물고 있는 것처럼 말을 시원하게 못 하고 우물쭈물 빙빙 돌려 말하는'},
{n:2830,w:'swagger',m:'v. ① 뽐내며 걷다, 거드름피우며 활보하다',s:'parade, prance, stride, strut ② 허풍을 떨다, 뻐기다, boast, brag, vaunt ③ ~을 위협하여 ~을 시키다[하지 못하게 하다], blackmail, bully, intimidate, threaten',r:'북유럽어 swag(흔들다) + -er → 어깨에 잔뜩 힘을 주고 마치 세상이 다 자기 것인 양 거만하게 좌우로 흔들며 걷다'},
{n:2831,w:'artisan',m:'n. 장인, 기능공',s:'artificer, craftsman',r:'이탈리아어 artigiano(기술자) → 기계로 대량 생산하지 않고 오직 두 손으로 평생 기술을 닦아 물건을 만드는 사람'},
{n:2832,w:'lagniappe',m:'n. (물건을 산 고객에게 주는) 덤, 경품; 팁',s:'bonus, gift, gratuity, largess',r:'스페인어 la ñapa(그 덤) → 시장에서 물건을 살 때 주인이 기분 좋게 슬쩍 하나 더 얹어주는 뜻밖의 작은 선물'},
{n:2833,w:'yield',m:'v. ① (수익·결과·농작물 등을) 내다, 산출하다, 생산하다',s:'generate, produce ② 양도하다, 넘겨주다, cede, devolve, relinquish ③ 항복[굴복]하다[to], capitulate, succumb, surrender n. 산출[수확]물; 산출[수확]량, crop, harvest, output',r:'고대 영어 gieldan(지불하다) → 땀 흘린 대가로 풍성한 열매를 맺어 수확하거나, 끝내 버티지 못하고 적에게 손을 들고 엎드리다'},
{n:2834,w:'exuberant',m:'a. ① 열광적인, 활기가 넘치는',s:'ebullient, enthusiastic, passionate ② 무성한, 우거진, lush, luxuriant ③ (부·상상력·재능 등이) 풍부한; (문체가) 화려한',r:'라틴어 ex-(강조) + uberare(다산하다, 풍부하다) → 에너지가 화산처럼 뿜어져 나와 펄펄 끓어넘치거나 밀림처럼 생명력이 빽빽하게 뿜어져 나오는'},
{n:2835,w:'prelude',m:'n. ① (사건 등의) 전조, 서곡[to]; 준비 행위, 서두[to] ② (음악) 전주곡, 서곡; 서문, 서론',s:'overture, preamble, preface',r:'라틴어 prae-(미리) + ludere(연주하다) → 오페라나 거대한 전쟁이 터지기 직전에 분위기를 띄우며 긴장감을 끌어올리는 서막'},
{n:2836,w:'disarm',m:'v. ① 무기를 빼앗다, 무장 해제하다; 군비를 축소하다',s:'demilitarize, unarm ② 진정시키다, (노여움을) 가라앉히다; (적의를) 없애다, appease, mollify, subdue',r:'프랑스어 des-(반대) + armer(무장하다) → 손에 쥐고 있던 위험한 칼과 총을 뺏어버리거나 팽팽하던 적개심을 무너뜨리다'},
{n:2837,w:'notch',m:'n. ① (질·성취 정도를 나타내는) 급수, 단계, 정도, 계급',s:'degree, grade, step ② (기록 등을 위해 막대기 등에 새겨 놓은 V자) 표시, 새김눈, indentation, mark, nick',r:'프랑스어 oche(베인 자국) → 통나무에 칼로 깊게 V자 모양의 흠집을 파서 기록하거나, 남보다 한 차원 높은 특별한 수준의 단계'},
{n:2838,w:'whet',m:'vt. ① (칼 등을) 갈다, 갈아서 날카롭게 하다',s:'sharpen ② (식욕·욕구·흥미를) 자극하다, 돋우다, stimulate n. ① 벼리기, 갈기, 연마 ② 자극(물); 식욕을 돋우는 것; 한 잔의 술',r:'고대 영어 hwettan(날카롭게 하다) → 둔탁해진 칼날을 거친 숫돌에 대고 서늘하게 갈아내거나 식욕이나 호기심을 예리하게 깨우다'},
{n:2839,w:'vein',m:'n. ① 정맥; (넓은 뜻으로) 혈관',s:'blood vessel ② 기질, 성질; (일시적인) 기분, temper; mood',r:'라틴어 vena(혈관, 핏줄) → 심장으로 피를 돌려보내는 푸른 핏줄이거나 식물의 잎이나 대리석에 난 줄무늬'},
{n:2840,w:'grill',m:'v. ① 그릴[석쇠]에 굽다, (야외에서) 불에 굽다',s:'barbecue, broil, roast ② (경찰 등이) 엄하게 심문하다, 다그치다, interrogate, question, quiz n. (고기 따위를 굽는) 석쇠, grid, gridiron',r:'라틴어 craticula(작은 격자) → 뜨거운 불 위에 고기를 굽기 위해 올려놓은 쇠창살이나, 용의자를 의자에 앉혀놓고 뜨거운 불에 굽듯 독하게 캐묻고 심문하다'},
{n:2841,w:'fragment',m:'n. 파편, 조각, 단편',s:'bit, fraction, particle, piece v. 산산이 부수다, 해체하다, disintegrate, shatter',r:'라틴어 frangere(부수다) + -ment → 폭탄이 터지거나 유리가 깨졌을 때 사방으로 산산이 부서져 흩어진 뾰족하고 작은 조각들'},
{n:2842,w:'enshrine',m:'vt. ① (신전·묘당 등에) 안치하다, 모시다 ② (신성한 것으로서) 소중히 하다, (마음속에) 간직하다',s:'cherish, treasure',r:'영어 en-(안에) + shrine(성지, 사당) → 가장 성스럽고 귀한 신전이나 무덤 안에 모시어 아무도 함부로 못 하게 굳게 지키다'},
{n:2843,w:'prig',m:'n. ① 박식한 척 하는 사람 ② 깐깐한 사람, 잔소리꾼',s:'',r:'어원 불명(16세기 좀도둑, 젠체하는 사람) → 자기가 세상에서 가장 잘나고 도덕적인 줄 착각하며 남의 행동에 사사건건 깐깐하게 훈계하는 얄미운 척쟁이'},
{n:2844,w:'baleful',m:'a. 악의적인, 해로운, 재앙의',s:'evil, harmful',r:'고대 영어 bealu(악, 고통) + -ful(가득한) → 쳐다보는 눈빛만으로도 당장 무서운 재앙이나 끔찍한 죽음을 가져올 듯이 사악한'},
{n:2845,w:'cadet',m:'n. ① (경찰·군대의) 사관후보생, 사관학교 생도 ② 차남 이하의 아들, 막내아들; 동생',s:'',r:'가스통어 capdet(작은 머리, 둘째 아들) → 옛날 재산을 물려받지 못한 귀족의 둘째 아들이 먹고살려고 군대에 들어가 장교가 되기 위해 훈련받는 어린 생도'},
{n:2846,w:'accrete',m:'v. ① 부착하다, 하나로 합치다',s:'adhere, attach, cleave, stick ② ~을 증대시키다, 보태다, augment, expand, increase',r:'라틴어 ad-(~로) + crescere(자라다) → 우주 먼지들이 뭉쳐 행성이 되듯 오랜 시간에 걸쳐 겉에 겹겹이 붙어 크기가 커지다'},
{n:2847,w:'rouse',m:'vt. ① 깨우다, 일으키다; ~의 의식을 회복시키다',s:'awaken, wake up ② 분발하게 하다; (감정을) 돋우다, 선동하다; 성나게 하다, arouse, provoke, stimulate, stir n. 각성; 분기(奮起), arousal, awakening',r:'라틴어 re-(뒤로) + excutere(흔들어 떨다) → 깊이 잠든 사람의 몸을 마구 흔들어 억지로 깨우거나 잠잠하던 분노를 확 일으키다'},
{n:2848,w:'supple',m:'a. ① 나긋나긋한, 유연한',s:'elastic, flexible, resilient ② (머리·정신 등이) 유연성 있는, 순응성 있는, adaptable, flexible ③ (사람이) 유순한, 순종적인; (태도 따위가) 비위 맞추는, 알랑대는',r:'라틴어 sub-(아래로) + plicare(접다) → 체조 선수의 몸처럼 마음대로 부드럽게 잘 휘어지거나 윗사람의 뜻에 고분고분 엎드려 잘 굽히는'},
{n:2849,w:'troupe',m:'n. (가수·배우 등의) 공연단, 극단; 일단, 한패',s:'band, company, group',r:'프랑스어 troupe(무리) → 한 명의 배우가 아니라 서커스나 연극을 위해 수십 명이 하나의 무리를 지어 이리저리 함께 떠돌아다니는 예술가 집단'},
{n:2850,w:'interdict',m:'vt. 금지하다, 금하다',s:'ban, forbid, injunct, outlaw, prohibit, proscribe n. (법원·행정관의) 금지명령, 금지령, ban, prohibition',r:'라틴어 inter-(사이에) + dicere(말하다) → 어떤 행동을 하려는 사람의 앞길 사이를 턱 가로막고 입으로 \'절대 안 돼!\'라고 강하게 말하여 법적으로 금지하다'},
{n:2851,w:'propitiate',m:'vt. 달래다; 비위를 맞추다; 화해시키다',s:'appease, comfort, conciliate, mollify, placate, soothe',r:'라틴어 propitius(호의적인) → 화가 난 사람에게 다가가 호의적으로 달래고 비위를 맞추다'},
{n:2852,w:'evanescent',m:'a. 쉬이 사라지는, 덧없는, 무상한',s:'ephemeral, fleeting, transient',r:'라틴어 ex-(밖으로) + vanescere(사라지다) → 연기가 허공 밖으로 흩어져 금방 흔적도 없이 사라져 버리는'},
{n:2853,w:'squabble',m:'vi. (사소한 일로) 말다툼하다[about, over]',s:'argue, quarrel, wrangle n. 시시한 언쟁, 입씨름, argument, dispute, quarrel',r:'스칸디나비아어(새가 시끄럽게 울다) → 작은 새들이 먹이를 두고 시끄럽게 짹짹거리며 유치하게 다투는 모습'},
{n:2854,w:'beleaguer',m:'vt. ① 포위(공격)하다, 에워싸다',s:'beset, besiege ② 괴롭히다, ~에 끈덕지게 붙어 다니다',r:'네덜란드어 be-(주위에) + leger(진영, 캠프) → 적의 진지 주변을 둥글게 에워싸고 옴짝달싹 못 하게 괴롭히다'},
{n:2855,w:'coward',m:'n. 겁쟁이, 비겁자',s:'craven, dastard, poltroon, wimp',r:'고대 프랑스어 coart(꼬리를 내린) → 짐승이 잔뜩 겁을 먹고 다리 사이에 꼬리를 둥글게 말고 도망치는 비겁한 모습'},
{n:2856,w:'swarthy',m:'a. (피부 등이) 거무스름한, 가무잡잡한',s:'dark-skinned, dusky, somber, sooty',r:'고대 영어 sweart(검은) + -y → 뜨거운 햇볕에 까맣게 타거나 숯이 묻어 피부색이 거무튀튀한'},
{n:2857,w:'dovetail',m:'v. (사실·지식 등을) 긴밀히 연관시키다; 꼭 들어맞다',s:'link; coincide, correspond, fit together',r:'영어 dove(비둘기) + tail(꼬리) → 목공에서 나무를 비둘기 꼬리 모양으로 깎아 틈새 하나 없이 딱 맞물리게 끼워 넣는 기술'},
{n:2858,w:'amenity',m:'n. ① (pl.) 기분 좋은 응대[태도]; 예의',s:'civility, courtesy ② (pl.) 생활 편의 시설, conveniences, facilities ③ (장소·기후 등의) 쾌적함, (성질·태도 등의) 상냥함, agreeableness',r:'라틴어 amoenus(기분 좋은) + -ity → 사람을 편안하고 기분 좋게 만들어 주는 쾌적한 시설이나 상냥한 태도'},
{n:2859,w:'trifle',m:'n. ① 하찮은 것[일]',s:'bagatelle, bauble, triviality ② 소량, 약간; 푼돈, bit, little, pittance v. ① 가볍게[소홀히] 다루다, 우습게 보다[with], look down on, make light of ② 시간을 헛되이 보내다, 빈둥거리다, dawdle, idle, loaf, squander',r:'고대 프랑스어 trufle(조롱, 속임수) → 신경 쓸 가치도 없을 만큼 아주 하찮고 사소한 물건이나 일'},
{n:2860,w:'provenance',m:'n. 기원, 출처, 유래',s:'origin, quarry, source',r:'프랑스어 pro-(앞으로) + venir(오다) + -ance → 골동품이나 예술 작품이 세상 밖으로 처음 등장한 진짜 기원이나 출처'},
{n:2861,w:'choke',m:'v. ① 질식시키다, 숨막히게 하다; 숨이 막히다',s:'smother, stifle, strangle, suffocate ② (성장·행동 등을) 저지[억제]하다, block, obstruct ③ (감정·눈물을) 억누르다, restrain, suppress',r:'고대 영어 ceocian(목을 조르다) → 목구멍을 꽉 막아 숨을 못 쉬게 하거나, 터져 나오는 감정을 억지로 꾹 참아내다'},
{n:2862,w:'austere',m:'a. ① (태도 등이) 엄격한, 엄한',s:'rigorous, severe, stern, strict ② (문체·건물 등이) 꾸밈없는, 간결한, plain, simple, unadorned ③ (생활 등이) 검소한, 절약하는; 금욕적인, economical, frugal, thrifty',r:'그리스어 austeros(거친, 쓴) → 혀끝을 찌르는 쓴맛처럼 태도가 몹시 엄격하고 삶에 사치나 꾸밈이 전혀 없는'},
{n:2863,w:'restraint',m:'n. 억제, 규제, 제지; 구속, 속박; 자제',s:'constraint; control; moderation',r:'라틴어 re-(뒤로) + stringere(단단히 묶다) → 자유롭게 나대지 못하게 뒤에서 밧줄로 꽁꽁 묶어 억누르는 것'},
{n:2864,w:'intercept',m:'vt. ① 가로막다, 가로채다',s:'block, hijack, interrupt, seize ② (적기·미사일을) 요격하다 n. ① 방해, 저지, deterrence, obstruction ② 요격',r:'라틴어 inter-(사이에) + capere(잡다) → 목적지로 날아가고 있는 편지나 미사일을 중간에 휙 끼어들어 낚아채다'},
{n:2865,w:'lugubrious',m:'a. 침울한, 우울한, 애처로운, 가련한',s:'dismal, gloomy, sad',r:'라틴어 lugere(애도하다, 슬퍼하다) + -ous → 장례식장에서 엉엉 울듯 분위기가 한없이 무겁고 몹시 침울한'},
{n:2866,w:'febrifuge',m:'a. 해열성의 n. 해열제; 청량음료',s:'',r:'라틴어 febris(열) + fugere(도망치게 하다) → 몸을 펄펄 끓게 만드는 뜨거운 열을 도망가게 쫓아버리는 해열제'},
{n:2867,w:'glare',m:'n. 번쩍이는(눈부신) 빛, 섬광',s:'blaze, brilliance v. ① 번쩍번쩍 빛나다, 눈부시게 빛나다, dazzle, flare, shine ② 노려보다, glower, scowl',r:'중세 영어 glaren(번쩍이다) → 태양빛이 눈을 찌를 듯 번쩍거리거나, 화가 나서 이글거리는 눈빛으로 쏘아보다'},
{n:2868,w:'strip',m:'v. ① 옷을 벗다[벗기다]',s:'disrobe, unclothe, undress ② (막·껍질 등을) 벗기다, peel, scale, scrape, skin ③ (처벌로서 재산·명예를) 박탈하다, 빼앗다, deprive, dispossess, rob',r:'고대 영어 stripan(약탈하다) → 몸에 입은 옷이나 나무껍질을 홀랑 벗겨내거나 누군가 가진 재산과 권리를 깡그리 빼앗다'},
{n:2869,w:'contraception',m:'n. 피임, 피임법',s:'birth control',r:'라틴어 contra-(반대하여) + conceptio(수태, 임신) → 정자와 난자가 만나 아이가 들어서는(임신) 과정을 인위적으로 가로막음'},
{n:2870,w:'disown',m:'vt. ① (자식 등과) 인연을 끊다, 의절하다',s:'renounce, repudiate ② (저작물 등을) 자기 것이 아니라고 말하다; ~와의 관계를 부인하다',r:'영어 dis-(반대) + own(소유하다, 인정하다) → 자기 자식이나 물건을 더 이상 내 것이 아니라고 딱 잘라 부인하며 인연을 끊다'},
{n:2871,w:'rife',m:'a. ① (병·소문 등이) 유행하는, 널리 퍼져 있는',s:'prevailing, prevalent, rampant ② (나쁜 것으로) 가득 찬, 풍부한[with], abundant, plentiful, replete, rich',r:'고대 영어 rif(풍부한) → 나쁜 전염병이나 흉흉한 소문이 온 동네에 걷잡을 수 없이 퍼져 득실거리는'},
{n:2872,w:'nonentity',m:'n. ① 별 볼일 없는 사람, 하찮은 사람',s:'cipher, lightweight ② 실재하지 않는 것, 상상의 것, imaginings, unreality',r:'라틴어 non-(not) + entitas(존재) → 세상에 존재할 가치조차 없을 정도로 존재감도 없고 몹시 하찮은 사람'},
{n:2873,w:'de facto',m:'a. (법적으로는 받아들여지지 않더라도) 사실상의, 실질적인',s:'actual, effective, real',r:'라틴어 de facto(사실상) → 서류나 법률에 명시되어 있든 없든 현실에서 버젓이 통용되고 있는 실질적인'},
{n:2874,w:'appurtenance',m:'n. ① (보통 pl.) 부속물, 부속품',s:'accessory, adjunct, appendage, appendix ② 장치, 기계, device',r:'고대 프랑스어 apartenir(속하다) + -ance → 커다란 주택에 딸린 창고처럼 주된 물건에 곁달려 붙어 있는 부속물'},
{n:2875,w:'extemporize',m:'v. (연설·연주 등을) 즉석에서 만들다, 즉흥적으로 하다',s:'ad-lib, improvise',r:'라틴어 ex-(밖으로) + tempus(시간) + -ize → 미리 대본을 준비할 시간 없이 그 자리에서 밖으로 즉흥적으로 쏟아내다'},
{n:2876,w:'impunity',m:'n. 처벌을 받지 않음, 무사',s:'exemption',r:'라틴어 in-(not) + poena(형벌) + -ity → 큰 죄를 짓고도 벌을 받지 않고 법의 그물을 유유히 빠져나가는 뻔뻔한 상태'},
{n:2877,w:'mellifluous',m:'a. (음악이나 사람의 목소리가) 달콤한, 감미로운',s:'dulcet, euphonious, mellow',r:'라틴어 mel(꿀) + fluere(흐르다) + -ous → 사람의 목소리나 악기 소리가 꿀처럼 끈적하고 달콤하게 귓가로 흘러드는'},
{n:2878,w:'comity',m:'n. 예의, 예절; 예양(禮讓)',s:'courtesy',r:'라틴어 comis(친절한) + -ity → 사람들 사이나 국가 간에 서로 둥글게 양보하고 친절하게 지켜주는 예의범절'},
{n:2879,w:'hoist',m:'vt. (돛·깃발 등을) 내걸다; (무거운 것을) 천천히 들어올리다, 들어서 올리다',s:'elevate, erect, heave, lift',r:'중세 네덜란드어 hijschen(들어올리다) → 국기 게양대나 크레인을 써서 무거운 물건이나 깃발을 밧줄로 영차 끌어 올리다'},
{n:2880,w:'iffy',m:'a. 조건부의; 불확실한, 의문점이 많은, 모호한',s:'',r:'영어 if(만약) + -y → \'만약에\'라는 조건이 잔뜩 붙어서 앞날이 어떻게 될지 몹시 불확실하고 아리송한'},
{n:2881,w:'upstart',m:'n. 벼락출세한 사람, 벼락부자',s:'parvenu, nouveau riche, arriviste a. 벼락출세한',r:'영어 up(위로) + start(튀어오르다) → 밑바닥에 있던 사람이 갑자기 윗자리로 용수철처럼 튀어 올라 거드름을 피우는 자'},
{n:2882,w:'muse',m:'v. 명상하다, 깊이 생각하다',s:'contemplate, meditate, ponder, reflect n. 시적 영감, (작가·화가 등에게 영감을 주는) 뮤즈',r:'고대 프랑스어 muser(깊이 생각하다) / 그리스 신화의 예술 여신 Muse → 예술의 여신이 귀에 속삭이듯 무언가에 홀려 조용히 깊은 생각에 잠기다'},
{n:2883,w:'ergonomics',m:'n. 인간공학; 생물공학',s:'human engineering; biotechnology',r:'그리스어 ergon(일) + nomos(법칙) + -ics → 인간이 일하는 환경과 기계를 사람의 몸에 가장 편안하고 알맞게 설계하는 학문'},
{n:2884,w:'reprobate',m:'n. 부도덕한 사람, 방탕아, 무뢰한',s:'profligate, rogue, scamp, scoundrel a. 사악한, 타락한, 불량한, corrupt, degenerate, depraved, wicked vt. 책망하다, 비난하다, condemn, denounce, reprehend, reproach, reprove',r:'라틴어 re-(반대) + probare(증명하다, 승인하다) → 신의 도덕적 시험을 통과하지 못해 버림받을 만큼 몹시 타락하고 부도덕한 자'},
{n:2885,w:'viand',m:'n. 식품; (pl.) 음식, 양식; 고급 요리',s:'comestibles, edibles, provisions, victuals',r:'라틴어 vivere(살다) → 생명을 유지하며 살아가는 데 반드시 필요한 맛있고 훌륭한 여러 가지 양식'},
{n:2886,w:'disgruntle',m:'vt. 기분 상하게 하다, ~에게 불만을 품게 하다',s:'annoy, discontent, irritate',r:'영어 dis-(강조) + gruntle(투덜거리다) → 마음에 안 들어서 돼지처럼 꿀꿀 소리를 내며 불만에 꽉 차서 투덜거리게 만들다'},
{n:2887,w:'greasy',m:'a. ① 기름투성이의, 기름기 있는; (음식이) 기름기 많은',s:'fatty ② 아첨하는; 미덥지 못한, unreliable',r:'고대 프랑스어 craisse(기름) + -y → 피부나 음식에 미끈미끈한 기름이 번지르르하게 끼어 있거나 속이 뻔히 보이는 아부를 하는'},
{n:2888,w:'primogeniture',m:'n. 장자의 신분; 장자 상속제, 장자 상속권',s:'',r:'라틴어 primus(첫째의) + genitura(태어남) → 첫 번째로 태어난 큰아들이 집안의 모든 재산과 권리를 통째로 물려받는 제도'},
{n:2889,w:'consummate',m:'vt. ① 성취[완성]하다, 절정에 달하게 하다',s:'accomplish, achieve, finish, fulfill ② (결혼식 후) 첫날밤을 치르다[부부관계를 맺다] a. ① 완성된, 완전한, complete, perfect ② 숙련된, 유능한, gifted, skilled',r:'라틴어 con-(완전히) + summa(최고점) + -ate → 모든 노력을 합쳐 가장 높은 정상에 도달하여 흠잡을 데 없이 완벽하게 끝마치다'},
{n:2890,w:'tirade',m:'n. 긴 연설, (비난·공격 등의) 장광설, 격론',s:'diatribe',r:'프랑스어 tirer(당기다, 쏘다) + -ade → 화가 나서 상대의 잘못을 물어뜯으며 입에서 쉴 새 없이 길게 총알처럼 쏘아대는 비난의 말'},
{n:2891,w:'oust',m:'vt. 내쫓다, 몰아내다, 축출하다',s:'depose, dislodge, expel',r:'고대 프랑스어 oster(제거하다) → 권력을 쥐고 있던 자를 억지로 자리에서 끄집어내어 밖으로 무자비하게 쫓아버리다'},
{n:2892,w:'apotheosis',m:'n. ① 신격화',s:'deification, divinization, glorification ② (누구의 인생이나 사회생활에서) 절정기, heyday, prime',r:'그리스어 apo-(변화) + theos(신) + -is → 평범한 인간이 죽어서 위대한 신의 반열에 오르거나 인생에서 빛이 폭발하는 최고의 전성기'},
{n:2893,w:'branch',m:'n. ① 가지 ② 지부, 지국, 지점, 출장소',s:'bureau, subsidiary ③ 분과(分科), 부문, department, section',r:'후기 라틴어 branca(동물의 발) → 짐승의 발가락처럼 큰 나무통에서 여러 갈래로 뻗어 나간 줄기나 회사의 지점'},
{n:2894,w:'superimpose',m:'vt. ① 겹쳐 놓다, 포개놓다',s:'cross, heap, overlap, stack, superpose ② (어떤 요소·특징을) 덧붙이다, 첨가하다, add, append, superinduce',r:'라틴어 super-(위에) + in-(안에) + ponere(놓다) → 이미 있는 바탕 그림이나 글씨 바로 그 위에 또 다른 이미지를 그대로 겹쳐 얹다'},
{n:2895,w:'polyglot',m:'n. 여러 언어에 통하는 사람; 여러 개의 국어로 쓴 책 a. 여러 개의 국어에 통하는; 여러 개의 국어로 쓴',s:'',r:'그리스어 polys(많은) + glotta(혀, 언어) → 입안에 혀가 여러 개 달린 것처럼 수많은 외국어를 쏼라쏼라 자유롭게 구사하는 사람'},
{n:2896,w:'enjoin',m:'vt. ① 명령하다, 요구하다, 강요하다',s:'command, direct, instruct, order ② 금지하다, 못하게 하다[from], ban, bar, forbid, prohibit',r:'라틴어 in-(안으로) + jungere(합치다) → 강제로 명령을 내려 사람을 옴짝달싹 못 하게 매어두거나 법으로 엄격히 금지하다'},
{n:2897,w:'yummy',m:'a. 아주 맛있는',s:'delicious, luscious, tasty, toothsome',r:'의성어 yum-yum(쩝쩝) + -y → 아이들이 맛있는 음식을 먹고 기분 좋아서 입맛을 다시며 \'냠냠\'거릴 만큼 입에 착 붙는'},
{n:2898,w:'astringent',m:'a. ① 수렴성의, 수축시키는 ② (표현 등이) 통렬한, 신랄한; (성격·태도 등이) 엄한, 엄격한',s:'bitter, harsh, severe, sharp ③ (맛이) 떫은, acerbic',r:'라틴어 ad-(~로) + stringere(단단히 묶다) + -ent → 입안의 점막을 밧줄로 묶듯 꽉 조여 떫고 쓴맛이 나거나 성격이 몹시 날카롭고 쏘아붙이는'},
{n:2899,w:'spasm',m:'n. ① 경련, 쥐',s:'convulsion, throe, twitch ② 발작(돌발적인 활동·감정 등), burst, fit, outburst, paroxysm, seizure',r:'그리스어 spasmos(잡아당기기) → 근육이 제멋대로 강하게 휙 잡아당겨져 통제가 안 되고 쥐가 나는 고통스러운 현상'},
{n:2900,w:'corral',m:'vt. ① 울타리 안으로 몰아넣다, 가두다',s:'cage, confine, coop ② (사람들을 한 곳으로) 모으다 n. 울타리; 가축우리, 축사, pen',r:'스페인어 corral(가축 우리) → 말이나 소 떼가 뿔뿔이 도망가지 못하게 둥글게 친 나무 울타리 안으로 싹 다 몰아넣다'},
{n:2901,w:'outstanding',m:'a. ① 두드러진, 현저한; 뛰어난, 걸출한',s:'distinguished, eminent, excellent, prominent, superior ② (부채·문제 등이) 미결정의, 미해결의, 미불의, pending, unpaid, unsettled, unsolved',r:'영어 out(밖으로) + stand(서다) + -ing → 수많은 무리 밖으로 혼자만 튀어나와 서 있어서 실력이 월등히 눈에 띄거나 아직 해결 안 되고 튀어나온 빚'},
{n:2902,w:'espouse',m:'vt. (주의·학설 등을) 신봉[지지, 옹호]하다',s:'advocate, defend, support, uphold',r:'라틴어 sponsare(약혼하다) → 새로운 사상이나 주장을 아내로 맞아들여 평생 지켜주고 믿고 따르기로 굳게 맹세하다'},
{n:2903,w:'atrocity',m:'n. (특히 전쟁 때의) 잔혹 행위',s:'barbarity, brutality, cruelty, savagery',r:'라틴어 atrox(사나운, 잔인한) + -ity → 전쟁터에서 이성을 잃고 맹수처럼 무자비하게 저지르는 극악무도한 만행이나 학살'},
{n:2904,w:'vernacular',m:'n. (특정 지역·집단이 쓰는) 말, 지방어, 사투리, 방언; 자국어, 제 나라 말',s:'dialect, patois, provincialism',r:'라틴어 verna(집에서 태어난 노예) + -cular → 거창한 외국어나 어려운 학문적 언어가 아니라 그 고을 평민들이 시장통에서 흔히 쓰는 토착 사투리'},
{n:2905,w:'sumptuary',m:'a. 비용 절감의, 절약의; 사치 금제[단속]의',s:'cost-cutting, frugal, thrifty',r:'라틴어 sumptus(비용, 사치) + -ary → 백성들이 옷이나 음식에 지나치게 돈을 펑펑 쓰며 사치 부리는 것을 법으로 막고 통제하는'},
{n:2906,w:'lance',m:'n. (옛날에 말을 탄 무사들이 쓰던) 긴 창; 작살',s:'javelin, spear',r:'라틴어 lancea(가벼운 창) → 중세 시대 기사들이 무거운 갑옷을 입고 말을 타고 돌진하며 적을 찌를 때 겨누던 뾰족하고 무시무시하게 긴 쇠창'},
{n:2907,w:'recompense',m:'n. ① 보수; 보답',s:'requital, reward ② 보상, 배상, compensation vt. ① 보답하다, 배상하다, reimburse ② 보상하다, 배상하다, indemnify, requite',r:'라틴어 re-(다시) + com-(함께) + pendere(달다) → 남이 입은 손해나 나를 위해 흘린 땀방울을 저울에 달아 그 무게만큼 다시 금화로 갚아주다'},
{n:2908,w:'excrescence',m:'n. ① (군살·사마귀 등의) 이상 생성물 ② 방해물, 무용지물',s:'',r:'라틴어 ex-(밖으로) + crescere(자라다) + -ence → 정상적이고 매끈한 피부 밖으로 보기 흉하게 불쑥 튀어나와 자라난 징그러운 사마귀나 혹'},
{n:2909,w:'decrepit',m:'a. 노쇠한, 노후한, 늙어빠진',s:'dilapidated, feeble, infirm',r:'라틴어 de-(아래로) + crepare(삐걱거리다) → 뼈마디가 삐걱삐걱 소리를 내며 무너져 내릴 만큼 세월의 풍파에 몹시 늙고 병들어 허약해진'},
{n:2910,w:'tycoon',m:'n. (실업계·정계의) 거물',s:'bigwig, magnate, mogul',r:'일본어 taikun(大君: 대군) → 에도 막부 시대 일본의 최고 권력자를 부르던 말에서 바다 건너와 오늘날 정계나 재계의 막강한 실력자'},
{n:2911,w:'ball-park',m:'a. (견적·추정이) 대강의, 대략적인',s:'approximate, rough',r:'영어 ball park(야구장) → 홈런 공이 야구장 안쪽 어딘가에 대충 떨어지듯 정확하지 않고 얼추 짐작해서 때려 맞춘 대략적인 범위'},
{n:2912,w:'aspersion',m:'n. 비난, 비방, 중상',s:'calumny, defamation, detraction, slander',r:'라틴어 ad-(~로) + spargere(뿌리다) + -sion → 새하얀 드레스에 흙탕물을 팍 끼얹듯 남의 깨끗한 명예에 더러운 비난과 험담을 퍼붓는 짓'},
{n:2913,w:'fast',m:'v. 단식[절식]하다, 정진(精進)하다',s:'abstain from food, starve n. (특히 종교상의) 단식; 금식; 단식 기간',r:'고대 영어 fæstan(단단히 지키다, 굳히다) → 신앙이나 굳은 뜻을 지키기 위해 일정 기간 음식의 유혹을 독하게 끊고 참아내는 단식'},
{n:2914,w:'spoliation',m:'n. ① (특히 중립국에 대한) 강탈, 약탈, 파괴',s:'despoliation, extortion, plunder ② (서류·유서 등의) 문서 변조[파기]',r:'라틴어 spoliare(짐승의 가죽을 벗기다) + -tion → 적을 쓰러뜨리고 무기와 귀중품을 짐승 껍질 벗기듯 모조리 털어가는 무자비한 강탈이나 파괴 행위'},
{n:2915,w:'immanent',m:'a. 내재(內在)하는, 내재적인',s:'inherent, intrinsic',r:'라틴어 in-(안에) + manere(머물다) + -ent → 화려한 겉포장이 아니라 세상 만물이나 사람의 본성 가장 깊은 곳에 원래부터 자연스럽게 머물러 존재하는'},
{n:2916,w:'protrude',m:'vi. 튀어나오다, 돌출하다; 내밀다',s:'jut, overhang, project',r:'라틴어 pro-(앞으로) + trudere(밀다) → 짐승의 뾰족한 주둥이나 배불뚝이의 배처럼 평평한 곳에서 앞쪽으로 쑥 밀려 나와 툭 튀어나오다'},
{n:2917,w:'crabbed',m:'a. ① (성격이) 심술궂은, 괴팍한',s:'ill-natured, perverse ② (문제·작품 등이) 이해하기 어려운, 난해한, abstruse, intricate, unintelligible ③ (필적이) 해독하기 어려운, hieroglyphic, illegible, indecipherable, unreadable',r:'영어 crab(게) + -ed → 옆으로 삐딱하게 걷는 게처럼 성격이 심술궂거나, 글씨가 게가 기어간 듯 삐뚤빼뚤하여 도무지 알아볼 수 없는'},
{n:2918,w:'muddle',m:'v. 뒤죽박죽으로 만들다, 혼란시키다; 혼동하다',s:'confuse, embarrass, jumble, perplex n. 혼란, 난잡; 혼란 상태, confusion, disorder, mess',r:'네덜란드어 moddel(진흙) → 맑은 우물에 진흙을 풀어 뿌옇게 흐려놓듯 상황을 뒤죽박죽 엉망진창으로 꼬아 혼란스럽게 만들다'},
{n:2919,w:'gargantuan',m:'a. 거대한, 엄청나게 큰',s:'enormous, gigantic, huge, immense',r:'소설 주인공 Gargantua(가르강튀아) + -an → 프랑스 작가 라블레의 소설에 나오는 식욕이 엄청난 거인 왕의 이름에서 따온 상상을 초월하게 거대한'},
{n:2920,w:'rustle',m:'v. (나뭇잎·비단옷 등이) 와삭거리다, 바스락거리다',s:'swish, whisper n. 살랑살랑[바스락바스락]하는 소리, whispering',r:'의성어(바스락 소리) → 적막한 가을밤 마른 낙엽이 스치거나 여인의 비단 치마가 스칠 때 나는 가벼운 사각사각, 바스락 소리'},
{n:2921,w:'baptism',m:'n. 세례(식), 침례, 영세(領洗)',s:'christening',r:'그리스어 baptein(물에 담그다) + -ism → 과거의 지은 죄를 씻어내고 새로운 사람으로 다시 태어나기 위해 몸을 성스러운 물에 푹 담그는 기독교 의식'},
{n:2922,w:'dissemble',m:'v. ① (감정·사상·목적 등을) 숨기다, 속이다',s:'conceal, dissimulate, hide, mask ② 가장하다, ~인 체하다, affect, disguise, feign, pretend',r:'라틴어 dis-(반대) + simulare(비슷하게 하다) → 진짜 자신의 시커먼 속마음은 꽁꽁 감추고 겉으로는 천사처럼 가식적인 표정을 지어 감쪽같이 속이다'},
{n:2923,w:'ablution',m:'n. (주로 pl.) 몸[손]을 씻음, 목욕재계; 목욕',s:'cleansing, lavation, purification',r:'라틴어 ab-(멀리) + luere(씻다) + -tion → 신을 뵙는 종교적 의식을 치르기 전에 죄와 속세의 더러움을 멀리 씻어내기 위해 성스럽게 몸을 닦는 행위'},
{n:2924,w:'curmudgeon',m:'n. 심술궂은 구두쇠, 노랭이',s:'cheapskate, miser, tightwad',r:'어원 불명(cur 개에서 유래 추정) → 동네 꼬마들이 오면 지팡이를 휘두르며 사나운 개처럼 으르렁대고 남에게 돈 한 푼 안 쓰는 고집불통 영감'},
{n:2925,w:'elegant',m:'a. (인물 등이) 기품 있는; (문체 등이) 우아한, 세련된',s:'graceful, refined',r:'라틴어 e-(밖으로) + legere(고르다) + -ant → 수많은 평범한 것들 틈에서 유독 눈에 띄게 아름다운 것만 밖으로 골라낸 듯 굉장히 우아하고 세련된'},
{n:2926,w:'innuendo',m:'n. 풍자, 비꼼, 빗대어 빈정거림',s:'allusion, insinuation',r:'라틴어 innuere(고개 끄덕이다) + -endo → 대놓고 시원하게 욕하지 않고 눈짓이나 고갯짓으로 슬쩍 빗대어 남을 은근히 깎아내리는 얄미운 빈정거림'},
{n:2927,w:'suavity',m:'n. ① 온화, 온화, 상냥함',s:'amiability, benignity, kindliness, placidity ② 온화한 태도, 정중한 태도, 예의, civility, courteousness, courtesy',r:'라틴어 suavis(달콤한) + -ity → 사람을 대하는 매너가 모난 데 하나 없이 솜사탕처럼 달콤하고 몹시 부드러운 상냥함'},
{n:2928,w:'humdrum',m:'a. 단조로운, 평범한, 지루한',s:'drab, monotonous, tedious',r:'의성어 hum(윙윙대다) + drum(북 치는 소리) → 기계가 윙윙 도는 소리나 단조로운 북소리처럼 아무런 변화 없이 똑같이 반복되어 하품이 쏟아지는'},
{n:2929,w:'confectionery',m:'n. 과자류; 과자 제조(법); 제과점',s:'',r:'라틴어 con-(함께) + facere(만들다) + -ery → 밀가루, 버터, 설탕을 오븐에 함께 넣고 구워내어 달콤한 냄새가 거리에 진동하는 마법의 빵집이나 과자'},
{n:2930,w:'apocalypse',m:'n. ① 계시, 묵시; 예언',s:'revelation; prognostication, prophecy ② 세계의 종말[파멸]; 전무후무[대재앙]의 날, doom, downfall; doomsday ③ (사회의) 대참사, 대재난, 대재앙, calamity, cataclysm, catastrophe',r:'그리스어 apo-(멀리, 벗겨내다) + kalyptein(덮다) → 하늘을 덮고 있던 장막을 확 걷어내어 세상의 끔찍한 종말과 숨겨진 신의 계시를 보여주다'},
{n:2931,w:'proclivity',m:'n. (흔히 좋지 못한) 경향, 성벽, 기질',s:'disposition, penchant, predisposition',r:'라틴어 pro-(앞으로) + clivus(비탈, 경사) + -ity → 가파른 비탈길에서 공이 굴러가듯, 억누르려 해도 자꾸만 도박이나 나쁜 짓 쪽으로 자연스럽게 기울어지는 성질'},
{n:2932,w:'yelp',m:'v. ① (개·여우 등이) 날카롭게 짖어대다',s:'bark, howl, yap, yip ② 날카로운 소리로 외치다, 비명을 지르다, scream, screech, shriek, yell n. (날카롭게) 짖는 소리, 외치는 소리, 비명, cry, scream, screech, shriek',r:'고대 영어 gielpan(자랑하다, 크게 소리치다) → 강아지가 꼬리를 밟혔을 때 깜짝 놀라 엄청나게 아파서 찢어질 듯 날카롭게 \'깽!\' 하고 지르는 비명'},
{n:2933,w:'crook',m:'n. ① 갈고리; 갈고리 모양의 것; 손잡이가 구부러진 지팡이 ② 사기꾼',s:'con man, fraud, fraudster, mountebank, swindler, trickster v. ① (팔·손가락 등을) 구부리다, bend, curve ② (물건을) 훔치다, 사취하다, cheat, defraud, ramp, steal, swindle',r:'고대 노르드어 krokr(갈고리) → 목동이 도망가는 양을 낚아챌 때 쓰는 끝이 둥글게 휜 지팡이나, 마음씨가 똑바르지 못하고 뱀처럼 꼬여 남을 등쳐먹는 사기꾼'},
{n:2934,w:'manure',m:'n. (동물의 배설물로 만든) 거름, 천연 비료',s:'compost, fertilizer, ordure',r:'고대 프랑스어 manouvrer(손으로 일하다) → 트랙터가 없던 시절 농부들이 흙에 영양을 주려고 소똥이나 말똥을 손으로 직접 밭에 펴 바르던 냄새나는 거름'},
{n:2935,w:'fortitude',m:'n. (곤란·역경·위험·유혹에 직면한) 꿋꿋함, 불요불굴, 불굴의 정신',s:'bravery, courage, perseverance, resolution',r:'라틴어 fortis(강한) + -tude(상태) → 끔찍한 고통이나 무서운 시련 앞에서도 거대한 바위처럼 부서지지 않고 꿋꿋하게 버텨내는 강인한 정신력'},
{n:2936,w:'nook',m:'n. ① 방 등의 아늑하고 조용한 구석, 모퉁이',s:'alcove, corner, niche, recess ② 외진 곳, 벽지(僻地), backwater, backwoods, boondocks',r:'중세 영어 nok(구석) → 복잡한 방 안이나 건물 모퉁이에 쏙 들어가 있어 남의 눈에 띄지 않고 혼자만의 시간을 보낼 수 있는 세상에서 제일 아늑한 구석'},
{n:2937,w:'quotidian',m:'a. ① 매일의, 매일같이 일어나는',s:'daily, diurnal ② 흔해빠진, 평범한, 시시한, commonplace, everyday, ordinary, trivial',r:'라틴어 quot(매) + dies(날) + -an → 해가 뜨고 지듯 하루도 빠짐없이 매일매일 똑같이 일어나서 너무나 흔해빠지고 지루하게 평범한'},
{n:2938,w:'consecrate',m:'vt. ① 신성하게 하다, 성화(聖化)하다',s:'bless, hallow, sacralize, sanctify ② (주교 등) 성직에 임명하다, institute, ordain ③ 생애 등을 어떤 목적·용도에 바치다, dedicate, devote',r:'라틴어 con-(함께) + sacrare(거룩하게 만들다) → 속세의 때가 묻은 평범한 땅이나 사람을 성스러운 의식을 통해 하늘의 신에게 온전히 바쳐 더없이 거룩하게 만들다'},
{n:2939,w:'incinerate',m:'v. ① 태워서 재로 만들다, 태워 없애다, 소각하다',s:'burn up, char, flame, ignite ② (시체를) 화장하다, cremate',r:'라틴어 in-(안으로) + cinis(재) + -ate → 쓰레기나 시체를 거대한 화로의 무섭게 타오르는 불길 속에 던져 넣어 하얀 재가 될 때까지 남김없이 태워버리다'},
{n:2940,w:'adipose',m:'a. 지방(질)의, 지방이 많은',s:'fatty, sebaceous',r:'라틴어 adeps(동물의 굳기름) + -ose → 매일 기름진 고기를 먹어서 배와 허벅지 피부 밑에 동물성 비계와 지방질이 두툼하게 꽉 들어찬'},
{n:2941,w:'strangle',m:'vt. ① 목 졸라 죽이다, 질식사시키다',s:'asphyxiate, choke, smother, suffocate, throttle ② (활동·비판 등을) 억누르다, 억압하다, inhibit, repress, subdue, suppress',r:'그리스어 strangale(올가미) → 굵은 밧줄이나 두 손으로 상대의 목구멍을 꽉 움켜쥐어 숨통을 끊어버리거나 반란의 싹을 무자비하게 짓밟아 억압하다'},
{n:2942,w:'guise',m:'n. ① 외관, 모습',s:'appearance, aspect, semblance ② 가장, 변장, 구실, disguise, dressing-up, pretense',r:'고대 프랑스어 guise(방법, 방식) → 늑대가 양의 탈을 뒤집어쓰듯 자신의 시커먼 진짜 속내를 감추려고 천사처럼 겉으로만 그럴싸하게 꾸며 입은 가짜 껍데기'},
{n:2943,w:'douse',m:'v. ① (물에) 처넣다; (물을) 끼얹다, 흠뻑 적시다',s:'drench, drown, saturate, soak ② (불·전등 따위를) 끄다, extinguish, quench, smother',r:'어원 불명(물속에 처박다, 치다) → 무더운 여름날 양동이에 든 얼음장 같은 물을 머리 위로 확 부어 온몸을 흠뻑 적시거나, 활활 타는 불길을 한 방에 꺼버리다'},
{n:2944,w:'suture',m:'n. (의학) 봉합용 실, (꿰맬 때 쓰는) 실, 봉합선(縫合線) vt. (상처 따위를) 봉합하다, 꿰매다',s:'seam, sew, stitch',r:'라틴어 suere(꿰매다) + -ure → 피가 뚝뚝 떨어지는 살갗이 벌어진 끔찍한 상처를 수술용 바늘과 튼튼한 실로 십자수 하듯 한 땀 한 땀 촘촘하게 꿰매어 붙이다'},
{n:2945,w:'repulsive',m:'a. ① 역겨운, 혐오스러운',s:'disgusting, foul, offensive, repugnant ② 매정한, 쌀쌀한, 냉담한, chilly, cold, frigid, wintry',r:'라틴어 re-(뒤로) + pellere(밀다) + -sive → 쓰레기장 시궁창 냄새처럼 너무나 소름 끼치고 토가 나와서 자신도 모르게 몸을 뒤로 휙 빼며 밀어내게 만드는'},
{n:2946,w:'trek',m:'n. (특히 힘든) 여행 v. 길고 힘든 여행을 하다; 집단 이동하다',s:'',r:'네덜란드어 trekken(마차를 끌다, 이동하다) → 바퀴가 진흙에 빠지는 험악한 산맥을 소가 끄는 달구지에 짐을 가득 싣고 수십 일 동안 땀범벅이 되어 넘는 고된 대장정'},
{n:2947,w:'slate',m:'vt. ① 예정하다, 계획하다',s:'plan, schedule ② (책 등을) 혹평하다; (무대 등을) 호되게 꾸짖다, criticize, pan, slam n. 슬레이트, 석판',r:'고대 프랑스어 esclate(쪼개진 돌 조각) → 옛날 영화감독이 딱딱이 칠판(석판)에 촬영할 내용을 분필로 적어두며 앞으로의 계획을 확정 짓던 데서 유래'},
{n:2948,w:'phantom',m:'n. ① 환영(幻影), 유령',s:'apparition, ghost, spirit ② 환각, 착각, 망상, hallucination, illusion, vision a. ① 환상의, 상상의; 유령의, fictitious, imaginary ② 실체가 없는, 겉뿐인',r:'그리스어 phantasma(환영) → 눈에 보이지만 실제로는 존재하지 않는 헛된 그림자나 유령'},
{n:2949,w:'execrable',m:'a. 혐오[증오]할, 저주할; 몹시 서투른[형편없는]',s:'abominable, detestable, horrible',r:'라틴어 ex-(밖으로) + sacer(신성한) + -able → 신성한 곳에서 밖으로 내쫓겨 저주받아 마땅한, 몹시 끔찍하고 형편없는'},
{n:2950,w:'bristle',m:'v. ① (털·깃털 등이) 곤두서다',s:'prickle ② 화내다, (화가 나서) 발끈하다, 초조해하다, irritate, rage n. 뻣뻣한 털',r:'고대 영어 byrst(강모) → 성난 짐승의 뻣뻣한 털이 쭈뼛 서듯 잔뜩 화가 나서 발끈하다'},
{n:2951,w:'exacerbate',m:'vt. ① (고통·병·노여움 따위를) 악화시키다',s:'aggravate, worsen ② (감정 따위를) 격분시키다; 화나게[짜증나게] 하다',r:'라틴어 ex-(강조) + acerbus(거친, 신맛의) + -ate → 상처에 소금을 뿌리듯 상황이나 감정을 더욱 맵고 쓰라리게 악화시키다'},
{n:2952,w:'resurgence',m:'n. (활동의) 재기, 부활',s:'rebirth, renewal, resurrection',r:'라틴어 re-(다시) + surgere(일어나다) + -ence → 바닥으로 가라앉았던 세력과 활동이 다시 힘차게 솟아오름'},
{n:2953,w:'ultimatum',m:'n. 최종 제안, 최후통첩',s:'',r:'라틴어 ultimus(마지막의) + -um → 외교나 협상에서 타협의 여지 없이 상대방에게 들이미는 마지막 최후의 요구'},
{n:2954,w:'maraud',m:'v. 약탈하다, 습격하다[on, upon]',s:'despoil, loot, pillage, plunder, raid, ransack',r:'프랑스어 maraud(악당, 건달) → 도적 떼가 이리저리 떠돌아다니며 남의 재산을 무자비하게 털고 약탈하다'},
{n:2955,w:'prank',m:'n. 농담, 못된 장난',s:'joke, trick',r:'어원 불명(장식하다, 차려입다에서 유래 추정) → 남을 속이거나 깜짝 놀라게 하려고 꾸미는 짓궂은 장난'},
{n:2956,w:'daredevil',m:'a., n. 무모한, 물불을 가리지 않는, 저돌적인 (사람)',s:'madcap, risk-taker',r:'영어 dare(감히 ~하다) + devil(악마) → 악마 앞에서도 감히 겁 없이 달려들 만큼 무모하게 덤비는 사람'},
{n:2957,w:'steppingstone',m:'n. 디딤돌; 수단, 발판',s:'foothold, means',r:'영어 stepping(밟는) + stone(돌) → 냇물을 건널 때 밟고 지나가는 돌처럼 더 높은 성공으로 가기 위한 발판'},
{n:2958,w:'beneficent',m:'a. 자선을 베푸는; 친절한, 인정 많은',s:'benevolent, charitable, generous',r:'라틴어 bene(좋게) + facere(만들다) + -ent → 불쌍한 사람들을 위해 좋은 일을 행하며 자비와 친절을 베푸는'},
{n:2959,w:'alacrity',m:'n. 민첩, 기민함',s:'agility, alertness, nimbleness, promptitude',r:'라틴어 alacer(생기 넘치는) + -ity → 불평 하나 없이 기꺼운 마음으로 빠르고 민첩하게 움직이는 태도'},
{n:2960,w:'rebel',m:'n. 반역자, 모반자',s:'insurgent, mutineer a. 모반한, 반역의; 반항적인, insurrectionary, mutinous vi. 반역하다, 반란[모반]을 일으키다; 반항하다[against], mutiny, resist, revolt',r:'라틴어 re-(다시, 반대) + bellum(전쟁) → 지배 체제에 순응하지 않고 다시 무기를 들고 일어나 격렬하게 저항하다'},
{n:2961,w:'pungent',m:'a. ① (맛·냄새가) 톡 쏘는 듯한[몹시 자극적인]',s:'acrid, piquant ② (말 등이) 날카로운, 신랄한, acid, biting, caustic, incisive, pointed',r:'라틴어 pungere(찌르다) + -ent → 코를 찌를 듯이 냄새가 톡 쏘거나 사람의 마음을 쿡쿡 찌를 정도로 날카로운'},
{n:2962,w:'crumb',m:'n. ① (보통 pl.) 작은 조각, 빵부스러기',s:'fragment, particle, scrap, shred ② (비유) 소량, 약간[of], bit, grain, jot, morsel',r:'고대 영어 cruma(부스러기) → 빵을 자를 때 뚝 떨어지는 아주 작고 하찮은 조각이나 부스러기'},
{n:2963,w:'salve',m:'n. ① (상처 등에 바르는) 연고',s:'ointment, unction, unguent ② (괴로움 등을) 달래주는 것, (~에 대한) 위안, 위로, solace vt. ① (자존심·양심 따위를) 달래다, solace, soothe ② (불화·죄책 등을) 적당히 처리하다, 미봉하다, 얼버무리다',r:'고대 영어 sealf(연고, 치유) → 쓰라린 상처에 부드럽게 발라 고통을 가라앉히고 아픈 마음을 위로해 주는 약'},
{n:2964,w:'ineffable',m:'a. 말로 표현할 수 없는, 이루 말할 수 없는, 형언할 수 없는',s:'indescribable',r:'라틴어 in-(not) + ex-(밖으로) + fari(말하다) + -able → 그 감동이나 슬픔이 너무 거대해서 도무지 밖으로 말로 표현할 수 없는'},
{n:2965,w:'breed',m:'v. ① 새끼를 낳다, 알을 까다 ② 번식시키다; 사육하다; (품종을) 개량하다',s:'multiply, reproduce ③ 일으키다, 야기하다, cause, create, produce ④ 기르다, 양육하다, nurture, raise, rear n. 종류; 유형; 품종; 종족; 혈통',r:'고대 영어 bredan(따뜻하게 품다) → 짐승이 알이나 새끼를 낳아 대를 이으며 특정한 품종이나 종족을 만들어내다'},
{n:2966,w:'compendium',m:'n. ① 개설, 개론',s:'introduction, outline, survey ② 적요, 요약, abridgment, abstract, digest, epitome, summary',r:'라틴어 com-(함께) + pendere(달다) → 방대한 분량의 지식을 한데 긁어모아 저울에 달고 핵심만 아주 간결하게 줄여 놓은 요약본'},
{n:2967,w:'gung-ho',m:'a. ① 충성을 다하는; (미국·속어) 바보처럼[무턱대고] 열심인, 열광적인',s:'ardent, enthusiastic, zealous ② (미국·속어) 세련되지 않은, 감정적인',r:'중국어 gung ho(工合, 공업합작사) → 2차 대전 당시 중국을 지원하던 미 해병대원들이 외치던 구호에서 유래하여 무언가에 맹목적일 만큼 몹시 열광적인'},
{n:2968,w:'fusion',m:'n. ① 용해, 융해; 용해[융해]물',s:'dissolution, liquefaction, melting ② (정당·정파 등의) 합동, 합병; 연합체, alliance, coalition',r:'라틴어 fundere(붓다, 녹이다) + -sion → 쇠를 뜨거운 용광로에 부어 하나로 섞듯 서로 다른 물질이나 사상을 완전히 하나로 융합시킴'},
{n:2969,w:'summon',m:'vt. ① 소환하다, 호출하다; 소집하다',s:'call, convene, subpoena ② (용기 등을) 불러일으키다, 환기하다[up]',r:'라틴어 sub-(아래에, 은밀히) + monere(경고하다) → 국가나 법원이 공식적인 권위로 사람을 법정이나 특정 장소로 오라고 강력하게 부르다'},
{n:2970,w:'prescience',m:'n. 예지, 선견, 혜안, 통찰',s:'foresight, precognition, presage',r:'라틴어 prae-(미리) + scire(알다) + -ence → 사건이 터지기 전에 앞으로 다가올 미래의 일을 미리 내다보고 꿰뚫어 아는 통찰력'},
{n:2971,w:'lucubrate',m:'vi. (밤늦게까지) 열심히 공부하다[일하다]',s:'cram, moil, toil',r:'라틴어 lucubrare(불빛 아래서 일하다) → 모두가 잠든 깊은 밤에 홀로 등불을 켜놓고 뼈를 깎듯 열심히 공부하다'},
{n:2972,w:'hydrophobia',m:'n. 공수병(恐水病), 광견병',s:'rabies',r:'그리스어 hydro(물) + phobia(공포증) → 광견병에 걸린 개나 사람이 물 삼키기를 고통스러워하여 물 자체를 몹시 두려워하는 증상'},
{n:2973,w:'ostentatious',m:'a. 과시하는, 허세부리는',s:'flaunting, pretentious, showy',r:'라틴어 ob-(~를 향해) + tendere(뻗다) + -ous → 남의 시선을 끌려고 자신의 부와 명예를 앞세워 눈에 띄게 뻐기며 자랑하는'},
{n:2974,w:'atrophy',m:'n. 위축; 퇴화, 쇠퇴',s:'shrinkage; degeneracy, degeneration, deterioration v. 위축시키다, 위축되다; 퇴화[쇠퇴]시키다, shrink; degenerate, deteriorate',r:'그리스어 a-(없는) + trophe(영양) → 세포나 조직에 영양분이 공급되지 않아 근육이 말라 비틀어지고 쪼그라들다'},
{n:2975,w:'dingy',m:'a. ① 거무스름한; 더러운',s:'dirty, grimy ② 음침한, 칙칙한, dreary, somber',r:'고대 영어 dung(거름) + -y → 오랫동안 청소를 안 해서 거름처럼 더러운 때가 찌들고 분위기가 칙칙한'},
{n:2976,w:'turpitude',m:'n. 대단히 부도덕한 행위, 타락한 행위',s:'depravity, immorality, wickedness',r:'라틴어 turpis(천박한, 추악한) + -tude → 보통 사람의 도덕적 기준을 까마득히 넘어서는 몹시 비열하고 타락한 악행'},
{n:2977,w:'moribund',m:'a. 빈사 상태의, 죽어가는, 소멸[절멸] 직전의',s:'dying',r:'라틴어 mori(죽다) + -bundus(향하는) → 숨이 꼴깍꼴깍 넘어가며 마지막 죽음의 문턱을 향해 다가가고 있는'},
{n:2978,w:'splice',m:'vt. ① (필름·밧줄·테이프의 두 끝을) 잇다',s:'connect, join, knit, unite ② 결혼시키다, marry, wed',r:'중세 네덜란드어 splissen(꼬아 잇다) → 잘라진 밧줄이나 끊어진 영화 필름의 양 끝을 겹쳐서 단단하게 하나로 잇다'},
{n:2979,w:'cult',m:'n. ① (종교상의) 예배(식), 제사',s:'rite, ritual ② (사람·물건·사상에 대한) 숭배; (일시적) 유행; 숭배의 대상, adoration, worship ③ 이교(異敎); 맹신적 교단, 사이비 종교 집단',r:'라틴어 cultus(숭배, 경작) → 특정 인물이나 사상을 신처럼 떠받들며 맹목적으로 추종하는 소규모 광신 집단'},
{n:2980,w:'immolate',m:'vt. 제물로 바치다, 희생하다',s:'sacrifice, victimize',r:'라틴어 in-(위에) + mola(가루) + -ate → 제물로 바칠 짐승의 머리 위에 신성한 곡식 가루를 뿌려 불에 태워 바치는 의식'},
{n:2981,w:'stricken',m:'a. ① (~으로) 시달리는[고통 받는], (피해·질병 등에) 당한[걸린]',s:'affected ② (슬픔·비애 따위에) 억눌린[빠진]',r:'영어 strike(치다)의 과거분사형 → 질병이나 무서운 재난의 거대한 타격을 정통으로 맞아 고통에 허덕이는'},
{n:2982,w:'query',m:'n. 질문, 의문',s:'inquiry, question v. 묻다, 질문하다, ask, inquire',r:'라틴어 quaerere(묻다, 구하다) → 사실이 맞는지 의심을 품고 확실한 답을 구하기 위해 캐묻고 질문하다'},
{n:2983,w:'desiccate',m:'v. ① 건조시키다, (동식물을) 말려서 보존하다',s:'dehydrate, dry up ② 생기를 잃게 하다, 무기력하게 하다, devitalize, enervate',r:'라틴어 de-(강조) + siccare(말리다) + -ate → 뜨거운 햇빛에 수분을 한 방울도 남김없이 증발시켜 미라처럼 바싹 말라 비틀어지게 하다'},
{n:2984,w:'celibate',m:'a. ① (특히 종교적인 이유로) 결혼을 하지 않는, 독신의 ② 성관계를 하지 않는, 금욕하는 n. 독신주의자',s:'',r:'라틴어 caelebs(미혼의) + -ate → 신에 대한 신앙을 지키기 위해 평생 결혼하지 않고 육체적 욕망을 금욕하는 사람'},
{n:2985,w:'insurance',m:'n. ① 보험; 보험업 ② (보험사에 내는) 보험료',s:'premium ③ (미래의 불행에 대비한) 보호[예방] 수단, preventive',r:'프랑스어 enseurer(확실하게 하다) + -ance → 만약의 끔찍한 사고나 재난이 터졌을 때 피해를 보상받을 수 있도록 미리 돈을 내어 확실하게 대비하는 장치'},
{n:2986,w:'envisage',m:'vt. (미래의 일·상상 따위를) 마음속에 그리다, 상상하다, 예견[구상]하다',s:'conceive, envision, imagine, visualize',r:'프랑스어 en-(안에) + visage(얼굴, 시야) → 아직 닥치지 않은 미래의 일이나 상황을 마음속 시야에 눈앞의 얼굴처럼 또렷하게 그려보다'},
{n:2987,w:'lump',m:'n. ① 덩어리, 덩이',s:'clod, clump, mass ② 혹, 종기, 부스럼, bump, swelling ③ 대다수, 여럿, 무더기; 많음, bulk, lion\'s share, majority',r:'중세 영어 lumpe(작은 덩어리) → 진흙이나 고기가 뭉쳐진 불규칙한 모양의 큰 덩어리이거나 피부에 볼룩하게 솟아오른 혹'},
{n:2988,w:'fraught',m:'a. ① (좋지 않은 것들) 투성이의, 가득한[with]',s:'full of, replete ② (물건을) 실은, 적재한, laden',r:'중세 네덜란드어 vrachten(짐을 싣다) → 배에 무거운 짐이 잔뜩 실려 있듯, 위험이나 끔찍한 문제점들이 속 안에 잔뜩 도사리고 있는'},
{n:2989,w:'sobriety',m:'n. ① 술에 취하지 않은 상태, 맨 정신',s:'soberness ② 절주, 금주, abstemiousness, abstinence, temperance ③ 냉철함, 진지함, earnestness, seriousness, solemnness',r:'라틴어 sobrius(술 취하지 않은) + -ety → 알코올 기운이 싹 가셔서 머리가 맑고 맨정신이거나, 성격이 흔들림 없이 몹시 바르고 진지한 상태'},
{n:2990,w:'overhaul',m:'v. ① 철저히 조사[검사]하다',s:'examine, inspect, investigate, scrutinize ② (경주에서 남을) 앞지르다, outdistance, outrun, outstrip, overtake n. 철저한 조사, 정밀 검사[점검], inspection, scan, scrutiny',r:'영어 over(위로) + haul(끌어당기다) → 고장 난 기계의 부품을 위로 완전히 끌어내어 속속들이 분해하고 철저하게 점검하여 수리하다'},
{n:2991,w:'volley',m:'n. (화살·총알 등의) 일제 사격; (질문·비난 등의) 연발[of]',s:'barrage, fusillade',r:'프랑스어 volée(날기, 비행) → 하늘을 새까맣게 뒤덮으며 수많은 총알이나 화살이 한꺼번에 소나기처럼 무섭게 쏟아지는 것'},
{n:2992,w:'drone',m:'n. ① (꿀벌의) 수벌 ② 게으름뱅이; 무위도식하는 자',s:'idler, loafer; parasite ③ (무선 조종에 의한) 무인 비행기[선박, 미사일], 드론 v. 게으름피우다, 빈둥거리다, idle, loaf, loiter',r:'고대 영어 dran(수벌, 윙윙 소리) → 꿀은 안 모으고 윙윙거리며 놀기만 하는 수벌이나 단조로운 기계음을 내며 날아다니는 무인 비행기'},
{n:2993,w:'animadversion',m:'n. 비평, 비난, 혹평',s:'censure, criticism, stricture',r:'라틴어 animus(마음) + ad-(~로) + vertere(돌리다) + -sion → 상대의 작은 결점이나 행동 쪽으로 비판적인 마음을 확 돌려 몹시 날카롭게 비난하는 짓'},
{n:2994,w:'concatenate',m:'vt. 사슬같이 잇다; (사건 등을) 연결시키다',s:'connect, join, link',r:'라틴어 con-(함께) + catena(사슬) + -ate → 여러 개의 끊어진 사건이나 말을 쇠사슬 고리처럼 하나로 찰칵찰칵 연결하다'},

{n:2996,w:'equinox',m:'n. 주야 평분시, 춘분, 추분',s:'',r:'라틴어 aequus(같은) + nox(밤) → 일 년 중 태양이 적도 위를 정확히 통과하면서 낮과 밤의 길이가 한 치의 오차 없이 똑같아지는 절기'},

let currentSet=[],idx=0,isFlipped=false;
function loadSet(setNum){
  setNum=parseInt(setNum);
  const s=(setNum-1)*20;
  currentSet=WORDS.slice(s,s+20);
  idx=0;isFlipped=false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('setInfo').textContent=`세트 ${setNum} — ${currentSet[0].n}번~${currentSet[currentSet.length-1].n}번`;
  render();
}
function shuffle(){currentSet=currentSet.sort(()=>Math.random()-.5);idx=0;isFlipped=false;document.getElementById('card').classList.remove('flipped');render();}
function resetSet(){loadSet(document.getElementById('setSelect').value);}
function render(){
  const w=currentSet[idx];
  document.getElementById('num').textContent=`#${w.n}`;
  document.getElementById('num2').textContent=`#${w.n}`;
  document.getElementById('word').textContent=w.w;
  document.getElementById('meaning').textContent=w.m||'(뜻 없음)';
  document.getElementById('syn').textContent=w.s?'동의어: '+w.s:'';
  document.getElementById('root').textContent=w.r?'어원: '+w.r:'';
  document.getElementById('cnt').textContent=`${idx+1} / ${currentSet.length}`;
  document.getElementById('progress').textContent=`진행: ${idx+1}/${currentSet.length} (${Math.round((idx+1)/currentSet.length*100)}%)`;
  isFlipped=false;document.getElementById('card').classList.remove('flipped');
}
function flipCard(){isFlipped=!isFlipped;document.getElementById('card').classList.toggle('flipped');}
function next(){if(idx<currentSet.length-1){idx++;render();}}
function prev(){if(idx>0){idx--;render();}}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')next();
  else if(e.key==='ArrowLeft')prev();
  else if(e.key===' '){e.preventDefault();flipCard();}
});
loadSet(1);
</script>
