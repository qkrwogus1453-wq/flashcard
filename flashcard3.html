*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}

.syn{font-size:.75em;color:#4ecca3;margin-bottom:6px;text-align:left;width:100%;line-height:1.4}
.syn::before{content:'동의어: ';font-weight:bold}
.root{font-size:.72em;color:#f0a500;line-height:1.4;text-align:left;width:100%}
.root::before{content:'어원: ';font-weight:bold}
.nav{display:flex;gap:14px;align-items:center}
.nav button{padding:10px 22px;font-size:1em}
.nav .cnt{color:#aaa;font-size:.9em;min-width:80px;text-align:center}
.set-info{color:#4ecca3;font-size:.85em;margin-bottom:6px}

<script>
const WORDS=[
{n:2001,w:'oppose',m:'v. ① ~에 반대하다, ~에 이의를 제기하다; 대항하다; 적대하다 ② ~에 대비[대조]시키다; 대립시키다[to, against]',s:'resist, against',r:'de (away) + mis (send, 보내다) → 다시 돌아오지 않는 곳으로 보내다 → 죽음·서거·소멸로 고착 > 왕의 서거를 알리는 종소리가 울리는 장면이 원형'},
{n:2002,w:'avid',m:'a. ① 몹시 탐내는, 탐욕스러운 ② 열심인, 열렬한, 열광적인',s:'covetous, greedy, insatiable, voracious, ardent, eager, enthusiastic, fervent',r:'de (down) + rog (ask, 요청하다) + -ory (형용사형) → 아래로 끌어내리는 → 경멸적인·얕잡아 보는으로 고착 > 누군가를 깎아내리는 말을 하는 장면이 원형'},
{n:2003,w:'plum',m:'n. ① 서양자두 ② 근사한 것, 요직, 횡재 / a. 아주 근사한, 알짜의, 대우가 좋은',s:'choice, first-class',r:'라틴어 pinna (feather/wing, 깃털) + -acle (작은 것) → 뾰족하게 솟아오른 꼭대기 → 작은 첨탑·절정·정상으로 고착 > 교회 지붕 꼭대기의 뾰족한 탑의 장면이 원형'},
{n:2004,w:'stampede',m:'n. ① (가축 등이) 놀라서 우르르 달아남; (군중 등이) 앞을 다투어 달아남, 제주(奔走) ② 쇄도, 집결 / v. ① 우르르 몰리다; 우르르 몰리게 하다 ② 재촉하다, 몰아붙이다',s:'',r:'라틴어 effetus (worn out by bearing, 낳아서 지친) → 다 낳아버려 기력이 빠진 → 쇠약해진·나약한으로 고착 > 너무 많이 써서 탄성이 없어진 낡은 스프링의 장면이 원형'},
{n:2005,w:'hilarious',m:'a. 명랑한, 즐거운; 웃음을 자아내는, 재미있는',s:'amusing, entertaining, funny',r:'pre (before) + dis + pos (place, 놓다) → 미리 특정 방향으로 놓아두다 → 경향 갖게 하다·걸리기 쉽게 하다로 고착 > 기울어진 판 위에 구슬을 놓으면 저절로 굴러가는 장면이 원형'},
{n:2006,w:'epithet',m:'n. ① 별명, 별칭, 통칭 ② (사람·사물의 특성을 나타내는) 형용사구',s:'alias, nickname, sobriquet',r:'라틴어 acer (sharp, 날카로운) + -mony (명사형) → 날카롭게 찌르는 독한 기운 → 신랄함·가혹함으로 고착 > 날카로운 말이 상대의 마음을 찌르는 장면이 원형'},
{n:2007,w:'babble',m:'v. (어린이 등이) 더듬거리며 말하다; 중얼중얼 지껄이다',s:'gibber, chatter, prate',r:'프랑스어 piquer (prick, 찌르다) → 바늘로 찌르듯 자존심을 건드리다 → 불쾌감·화남·자극하다로 고착 > 자존심을 건드리는 말에 미간이 찌푸려지는 장면이 원형'},
{n:2008,w:'community',m:'n. ① (지역) 사회, (지역) 공동체; 지역 공동체에 사는 주민 ② 공동, 공유 ③ 공통, 공통성; 유사성',s:'share, commonness, likeness, similarity',r:'in (not) + cess (go, 가다) + -ant (형용사형) → 멈추지 않고 계속 가는 → 끊임없는·쉬지 않는으로 고착 > 비가 하루 종일 멈추지 않고 쏟아지는 장면이 원형'},
{n:2009,w:'slough',m:'n. ① 진창, 진구렁, 수렁, 늪, 습지 ② (뱀 등의) 허물; 썩은 살, 딱지 / v. ① (습지 등에) 빠지다, 탈피하다; 허물',s:'mire, mud, quagmire, sludge, cast-off skin, scab',r:'con (completely) + trit (grind, 갈다) → 완전히 갈려 부서진 → 진심으로 뉘우치는·회한에 찬으로 고착 > 무릎 꿇고 눈물을 흘리며 사죄하는 장면이 원형'},
{n:2010,w:'indubitable',m:'a. 의심의 여지가 없는, 확실[명백]한',s:'certain, evident, sure, unquestionable',r:'라틴어 vindicta (revenge, 복수) + -ive (형용사형) → 복수하려는 성질 → 앙심을 품은·복수심에 불타는으로 고착 > 당한 것을 갚아주겠다며 이를 가는 장면이 원형'},
{n:2011,w:'divest',m:'vt. ① (옷을) 벗기다[of] ② 빼앗다, 박탈하다[of]',s:'strip, unclothe, undress, deprive, despoil, dispossess, rob',r:'con (together) + robor (strength, 힘) + -ate (동사형) → 힘을 합쳐 강화하다 → 확증하다·확인하다로 고착 > 여러 증인이 같은 사실을 뒷받침하는 장면이 원형'},
{n:2012,w:'carping',m:'a. 흠잡는, 잔소리하는',s:'captious, fault-finding',r:'고대 영어 herbeorgian (provide lodging, 숙소 제공하다) → 군대 앞에 먼저 가서 숙소를 준비하는 사람 → 선구자·전조로 고착 > 봄이 오기 전 제비가 먼저 날아오는 장면이 원형'},
{n:2013,w:'seam',m:'n. ① (천 등의) 솔기; (판자 등의) 이음매, 접합선 ② <해부> 봉합선; (얼굴의) 주름살 / v. 이어[꿰매어] 맞추다; ~에 솔기를 대다',s:'suture, wrinkle',r:'그리스어 lethe (forgetfulness, 망각) + argia (inactivity, 비활동) → 망각처럼 무기력하고 아무것도 하기 싫은 → 무기력·혼수 상태로 고착 > 아무것도 하기 싫어 침대에 늘어져 있는 장면이 원형'},
{n:2014,w:'portentous',m:'a. 전조(前兆)의; 불길한, 흉조의',s:'ominous, sinister',r:'아랍어 al-malgham (combination, 결합) + -ate (동사형) → 수은처럼 다른 것과 합쳐 하나가 되다 → 합병하다·결합하다로 고착 > 두 회사가 하나로 합쳐지는 장면이 원형'},
{n:2015,w:'revenge',m:'n. 보복, 복수, 앙갚음; 원한, 복수심 / v. (재귀용법 또는 수동태) ~에게 원수를 갚다, 앙갚음[복수]하다',s:'reprisal, retaliation, vengeance, avenge, retaliate',r:'프랑스어 lampon (drinking song, 술 노래) → 술자리에서 부르는 풍자 노래에서 비방문으로 발전 → 풍자문·비방하다로 고착 > 정치인을 우스꽝스럽게 과장해 그리는 만평의 장면이 원형'},
{n:2016,w:'extinction',m:'n. ① (생물 등의) 멸종, 사멸; (정열·권리 등의) 소멸, 소실 ② (불 등의) 끄기, 소화(消化), 소등(消燈)',s:'annihilation, extinguishing',r:'ad (to) + monish (warn, 경고하다) → ~에게 경고하다 → 훈계하다·타이르다로 고착 > 선생님이 학생을 불러 조용히 타이르는 장면이 원형'},
{n:2017,w:'fringe',m:'n. ① 가장자리, 변두리, 주변 ② (경제·사회·정치 등의) 비주류, 주류(主流)에서의 이탈자 / a. 부수적인; (중요성 따위가) 2차적인',s:'border, edge, margin, outskirts, verge, collateral, incidental, subsidiary',r:'라틴어 cogere (drive together, 강제로 모으다) + -ent (형용사형) → 논리를 하나로 몰아붙이는 설득력 → 타당한·설득력 있는으로 고착 > 증거를 빈틈없이 제시해 배심원을 설득하는 장면이 원형'},
{n:2018,w:'bespoke',m:'a. 개인 주문에 따라 맞춘; 맞춤 생산을 하는',s:'custom-made, tailor-made',r:'라틴어 capra (goat, 염소) → 염소처럼 예측 불가능하게 이리저리 뛰는 → 변덕스러운·일관성 없는으로 고착 > 한 순간에 기분이 바뀌는 장면이 원형'},
{n:2019,w:'misnomer',m:'n. 잘못된 명칭, 오칭(誤稱)',s:'',r:'라틴어 dignare (consider worthy, 가치 있다 여기다) → 자신을 낮춰 가치 있다고 여기고 허락하다 → 마지못해 허락하다·굽혀서 하다로 고착 > 왕이 마지못해 신하의 청을 들어주는 장면이 원형'},
{n:2020,w:'graze',m:'v. ① (소나 양이) 풀을 뜯어먹다; 방목하다 ② 가벼운 식사를 하다, 간식을 먹다',s:'pasture, snack',r:'pro (forth) + fligat (strike down, 쓰러뜨리다) + -ate → 앞으로 마구 쓰러뜨리며 낭비하는 → 방탕한·낭비하는으로 고착 > 재산을 물 쓰듯 써버리는 장면이 원형'},
{n:2021,w:'tithe',m:'n. ① (종종 pl.) (교회의) 십일조(十一租) (헌금); 10분의 1세(稅) ② 10분의 1; <부정문에서> 조금도 ~않는',s:'',r:'프랑스어 chagrin (rough skin, 거친 가죽) → 거친 가죽처럼 쓸려 쓰라린 → 분하고 억울함·초조함으로 고착 > 기대했던 일이 어긋나 속이 상하는 장면이 원형'},
{n:2022,w:'intertwine',m:'v. ① 뒤얽히다, 엮다, 엮이다, 얽어 짜다 ② 밀접하게 관련지우다',s:'entwine, interlace, interweave, interrelate',r:'in (not) + nomin (name, 이름) + -y → 이름을 더럽히는 것 → 불명예·수치로 고착 > 공개적으로 수치를 당해 고개를 숙이는 장면이 원형'},
{n:2023,w:'compunction',m:'n. 양심의 가책; 뉘우침, 후회',s:'penitence, qualm, regret, remorse, repentance',r:'as (to) + sid (sit, 앉다) + -uous (형용사형) → 자리를 지키며 꾸준히 하는 → 근면한·부지런한으로 고착 > 해가 떠도 지도 책상을 떠나지 않는 장면이 원형'},
{n:2024,w:'delirious',m:'a. ① 의식이 혼미한, 헛소리하는, (일시적) 정신착란의 ② 좋아서 어쩔 줄 모르는, 기뻐 날뛰는',s:'crazy, demented, insane, ecstatic, rapt',r:'im (against) + pugn (fight, 싸우다) → 맞서 싸우다 → 정당성을 의심하다·반박하다로 고착 > 상대방 주장의 허점을 날카롭게 찌르는 장면이 원형'},
{n:2025,w:'vicissitude',m:'n. ① 변화, 변천 ② (pl.) (인생·운명·처지 등의) 흥망, 성쇠, 부침(浮沈), 우여곡절',s:'change, mutation',r:'라틴어 aemulari (rival, 경쟁하다) → 따라잡으려 경쟁적으로 모방하다 → 모방하다·경쟁하다로 고착 > 우상의 동작을 거울 앞에서 따라 하는 장면이 원형'},
{n:2026,w:'jeremiad',m:'n. (장황한) 넋두리, 푸념, 한탄, 비탄',s:'lamentation, whine',r:'라틴어 floridus (flowery, 꽃이 핀) → 꽃처럼 화려하게 피어오른 → 혈색이 좋은·화려한으로 고착 > 장미꽃처럼 붉고 화사한 볼의 장면이 원형'},
{n:2027,w:'curse',m:'v. ① 저주하다 ② 욕설을 퍼붓다, 악담[모독]하다 / n. ① 저주; 악담, 욕설; 저주의 말 ② 천벌, 벌; 재해, 화(禍), 불행',s:'anathematize, damn, execrate, imprecate, abuse, blaspheme, cuss, revile, swear, malediction, oath, affliction, bane, plague, scourge',r:'라틴어 scrupulus (small sharp stone, 작은 돌) → 신발 속 작은 돌처럼 신경 쓰이는 것을 놓치지 않는 → 양심적인·세심한으로 고착 > 계약서의 작은 글씨 하나까지 꼼꼼히 읽는 장면이 원형'},
{n:2028,w:'orotund',m:'a. ① 성량이 풍부한, 낭랑하게 울리는 ② (문체·말투가) 뽐내는, 과장된',s:'resonant, resounding, sonorous, bombastic, ostentatious, pompous',r:'con (together) + found (pour, 붓다) → 함께 뒤섞어 부어버리다 → 당혹하게 하다·혼동하다로 고착 > 뒤섞인 퍼즐 조각에 어디서 시작해야 할지 모르는 장면이 원형'},
{n:2029,w:'lagoon',m:'n. 석호, lagoon; (강·호수와 이어지는) 작은 늪, 석호(潟湖)',s:'bog, marsh, swamp, tideland',r:'라틴어 garrire (chatter, 지껄이다) + -ous (형용사형) → 끊임없이 지껄이는 성질 → 수다스러운·말 많은으로 고착 > 다른 사람이 말할 틈도 없이 혼자 떠들어대는 장면이 원형'},
{n:2030,w:'outstrip',m:'vt. ① (크기·중요성 등에서 ~을) 앞지르다 ② (경쟁 상대를) 능가하다[앞서다] ③ (경주에서 남을) 앞지르다',s:'exceed, excel, outdo, surpass',r:'프랑스어 autrui (other, 다른 사람) + -ism (주의) → 자신보다 다른 사람을 먼저 생각하는 주의 → 이타주의로 고착 > 자신의 몫을 남에게 나눠주는 장면이 원형'},
{n:2031,w:'isotope',m:'n. <화학> 동위 원소, 동위체',s:'',r:'고대 영어 hwettan (sharpen, 날카롭게 하다) → 칼을 갈아 날카롭게 하다 → 날카롭게 하다·식욕을 돋우다로 고착 > 숫돌에 칼날을 갈아 번뜩이게 하는 장면이 원형'},
{n:2032,w:'dwarf',m:'n. ① 난쟁이 ② <천문학> 왜성(矮星) / a. 왜소한; 소형의',s:'homunculus, Lilliputian, midget, pygmy, diminutive, miniature, small, tiny',r:'프랑스어 accoler (embrace, 껴안다) → 기사 서임 시 목을 껴안거나 어깨를 치는 행위 → 칭찬·영예·포상으로 고착 > 왕이 검으로 어깨를 가볍게 치며 기사 서임을 하는 장면이 원형'},
{n:2033,w:'transitory',m:'a. 일시적인, 덧없는, 무상한',s:'fleeting, momentary, transient',r:'de (away) + prec (pray, 기도하다) + -ate (동사형) → 나쁜 일이 일어나지 않도록 기도하다 → 반대하다·비난하다·경시하다로 고착 > 고개를 저으며 강하게 반대를 표명하는 장면이 원형'},
{n:2034,w:'spine',m:'n. ① 척추, 등뼈 ② 가골, 근성',s:'backbone, vertebra, fortitude, perseverance, tenacity',r:'그리스어 sardonios (sardinian plant, 사르디니아 풀, 먹으면 쓴웃음을 짓게 하는 독초) → 독초를 먹은 것처럼 비틀린 웃음 → 조소하는·냉소적인으로 고착 > 입꼬리만 비틀어 올린 냉소적인 미소의 장면이 원형'},
{n:2035,w:'expropriate',m:'vt. ① (사유재산을 공공용으로) 수용(收用)하다, 강제로 사들이다 ② (남으로부터 물건의) 소유권을 빼앗다, 몰수하다',s:'appropriate, commandeer, confiscate, dispossess, seize',r:'라틴어 tritus (worn, 닳아빠진) → 너무 많이 써서 닳아버린 표현 → 진부한·판에 박힌으로 고착 > 수없이 쓰여 표면이 닳아버린 동전의 장면이 원형'},
{n:2036,w:'aliment',m:'n. ① 자양물, 영양물; 음식물 ② 부조(扶助); 지재[지지] / vt. 자양물을 주다; 지재[지원]하다',s:'nourishment, nutriment, food, victuals, sustain, support',r:'e (out) + nerv (nerve, 신경) + -ate (동사형) → 신경에서 힘을 뽑아내다 → 기력을 빼앗다·약화시키다로 고착 > 심한 더위에 기운이 빠져 늘어지는 장면이 원형'},
{n:2037,w:'grouch',m:'n. ① 불평이 많은 사람; 불평분자 ② (하찮은 것에 대한) 불평',s:'complainer, malcontent, complaint, gripe, grouse, grumbling',r:'gain (against, 맞서) + say (말하다) → 맞서 말하다 → 부인하다·반박하다로 고착 > 상대의 주장에 정면으로 이의를 제기하는 장면이 원형'},
{n:2038,w:'foretell',m:'v. ① 예언하다; 예고하다 ② 예시하다; ~의 전조(前兆)가 되다',s:'predict, prophesy, portend, signify',r:'라틴어 credere (believe, 믿다) + -ulous (쉽게 하는) → 쉽게 믿어버리는 → 믿기 쉬운·잘 속는으로 고착 > 터무니없는 말을 진지하게 믿는 장면이 원형'},
{n:2039,w:'brethren',m:'n. (pl.) (종교상의) 형제, 같은 신자; 조합원, 동업자; 동포',s:'',r:'막달라 마리아(Mary Magdalene)의 눈물 흘리는 모습 → 눈물을 질질 짜는 감상적 상태 → 지나치게 감상적인으로 고착 > 술에 취해 눈물을 흘리며 옛날 이야기를 하는 장면이 원형'},
{n:2040,w:'disable',m:'vt. ① (신체에) 장애를 입히다, 장애자로 만들다 ② 무능력하게 하다, ~을 ...하지 못하게 하다',s:'cripple, impair, incapacitate',r:'라틴어 truncare (cut off, 잘라내다) → 끝을 잘라 짧게 만들다 → 짧게 자르다·절단하다로 고착 > 나무 꼭대기를 톱으로 잘라 평평하게 만드는 장면이 원형'},
{n:2041,w:'wry',m:'a. ① 비뚤어진, 뒤틀린 ② (얼굴 등이) 찌푸린, 찡그린 ③ 심술궂은, 심보가 사나운',s:'distorted, frowning, screwed-up, ill-natured',r:'ob (in the way) + vi (way, 길) + -ate (동사형) → 길을 막는 것을 미리 없애다 → 어려움을 제거하다·미연에 방지하다로 고착 > 문제가 생기기 전에 미리 막는 장면이 원형'},
{n:2042,w:'chafe',m:'v. ① 몸을 비비다, 쓸리다 ② 신경질 나다, 안달하다 ③ (손 따위를) 비비다, 비벼서 따뜻하게 하다',s:'abrade, rub, irritate',r:'라틴어 probus (upright, 정직한) + -ity (명사형) → 흔들림 없이 곧은 성질 → 정직·성실·청렴으로 고착 > 유혹에도 흔들리지 않고 올바름을 지키는 장면이 원형'},
{n:2043,w:'rape',m:'n. ① 강간 ② 강탈, 약탈; (자연의) 파괴 / vt. 강간하다',s:'assault, violation, depredation, despoliation, pillage, rapine, outrage, ravish, violate',r:'그리스어 polemikos (warlike, 전쟁의) → 전쟁처럼 격렬하게 논쟁하는 것 → 논쟁·논전·논쟁적인으로 고착 > 두 학자가 서로의 주장을 격렬하게 반박하는 장면이 원형'},
{n:2044,w:'matriarch',m:'n. ① 여가장(女家長), 여족장; 가장의 아내 ② (단체 등의) 여성 창설자; 위엄 있는 노부인',s:'matron',r:'e (out) + vas (go, 가다) + -ion (명사형) → 밖으로 빠져나가는 것 → 회피·기피·얼버무림으로 고착 > 불편한 질문을 교묘하게 피해 다니는 장면이 원형'},
{n:2045,w:'surreptitious',m:'a. 내밀한, 비밀의, 은밀한',s:'clandestine, covert',r:'라틴어 macer (lean, 여윈) → 여위어 빈약한 상태 → 빈약한·불충분한·여윈으로 고착 > 그릇에 겨우 몇 알만 담긴 빈약한 식사의 장면이 원형'},
{n:2046,w:'adulterate',m:'v. ① (음식이나 음료에) 불순물을 섞다, 석을질하다 ② (나쁜 것을 섞어) 품질을 떨어뜨리다 / a. ① 섞음질한, 불순물을 섞은 ② 불륜의, 간통의',s:'debase, degrade, deteriorate, adulterous, unfaithful',r:'라틴어 inimicus (enemy, 적) + -al (형용사형) → 적처럼 대하는 → 적대적인·비우호적인·해로운으로 고착 > 차가운 눈빛으로 상대를 적으로 대하는 장면이 원형'},
{n:2047,w:'varnish',m:'n. ① 니스; 유약(釉藥) ② 겉치레, 겉꾸미기, 허식, 눈가림 / vt. ① ~에 니스를 칠하다; ~의 윤[광택]을 내다 ② ~에 겉을 꾸미다, 눈가림하다',s:'gloss, luster, glaze, polish, embellish, gild, gloss, lacquer',r:'고대 영어 slæwth (slowness, 느림) → 느림보처럼 움직이려 하지 않는 → 나태·게으름·나무늘보로 고착 > 아무것도 하기 싫어 나무에 매달려 늘어진 나무늘보의 장면이 원형'},
{n:2048,w:'connubial',m:'a. 결혼(생활)의, 부부의',s:'conjugal, marital, matrimonial, nuptial',r:'그리스어 panakeia (pan 전부 + ake 치유하다) → 모든 것을 치유하는 것 → 만병통치약·만능 해결책으로 고착 > 한 가지 약이 모든 병을 낫게 한다고 주장하는 장면이 원형'},
{n:2049,w:'prognosticate',m:'v. ① (전조에 의해) 예지하다, 예언[예측]하다 ② ~의 징후를 보이다',s:'forecast, foretell, predict, forebode, foreshadow, indicate, presage',r:'그리스어 phobos (fear, 공포) → 통제할 수 없는 극단적 공포 → 공포증·혐오증으로 고착 > 거미 하나에 비명을 지르며 도망가는 장면이 원형'},
{n:2050,w:'ethereal',m:'a. ① 공기 같은; 가벼운 ② 천상의, 하늘의 ③ 아주 우아한, 절묘[영묘]한 ④ 무형의',s:'aerial, airy, celestial, heavenly, supernal, delicate, exquisite, insubstantial, intangible',r:'라틴어 diligere (love, 좋아하다) + -ent (형용사형) → 하는 일을 사랑하여 열심히 하는 → 부지런한·근면한으로 고착 > 매일 일찍 출근해 마지막까지 남아 일하는 장면이 원형'},
{n:2051,w:'considerate',m:'a. 동정심 많은, 인정이 있는, 사려 깊은',s:'attentive, prudent, sympathetic, thoughtful',r:'라틴어 verbum (word, 말) + -ose (많은) → 말이 지나치게 많은 → 장황한·말이 많은으로 고착 > 간단한 것을 설명하는데 한 시간 넘게 말하는 장면이 원형'},
{n:2052,w:'hone',m:'vt. (기술 등을) 갈다, 연마하다; 날카롭게 갈다',s:'grind, polish, sharpen, whet',r:'라틴어 indigere (lack, 부족하다) + -ent (형용사형) → 기본 것도 부족한 → 가난한·빈곤한으로 고착 > 끼니를 걱정하는 극빈자의 장면이 원형'},
{n:2053,w:'interregnum',m:'n. ① (국왕·원수 등의) 궐위(闕位) 기간, 군주 부재 기간, 정치 공백 기간 ② (일반적으로) (연속성의) 단절[공백](기간)',s:'hiatus',r:'그리스 Lakonia 지방(스파르타) → 스파르타 인처럼 말을 극도로 아끼는 → 말이 적은·간결한으로 고착 > 천 마디 말 대신 한 마디로 끝내는 장면이 원형'},
{n:2054,w:'substantiate',m:'vt. 실체화[구체화]하다; 확증[입증]하다',s:'affirm, confirm, corroborate, verify',r:'re (back) + cant (sing, 말하다) → 이전에 말한 것을 거두어 들이다 → 철회하다·취소하다로 고착 > 법정에서 이전 진술을 번복하는 장면이 원형'},
{n:2055,w:'binding',m:'a. 속박[구속]하는; 구속력 있는, 의무를 지우는',s:'compulsory, mandatory, obligatory',r:'라틴어 munus (gift, 선물) + fic (make, 만들다) + -ent (형용사형) → 선물을 아낌없이 만들어 주는 → 매우 관대한·아낌없이 주는으로 고착 > 모든 손님에게 넉넉히 나눠주는 장면이 원형'},
{n:2056,w:'duly',m:'ad. ① 정식으로, 정당하게, 적절한 절차에 따라 ② 제시간에, 때에 알맞게; 기일[시간]대로',s:'properly, punctually',r:'im (not) + pervi (through, 관통하다) + -ous (형용사형) → 관통되지 않는 성질 → 통과시키지 않는·영향을 받지 않는으로 고착 > 방수복을 입어 빗물이 전혀 스며들지 않는 장면이 원형'},
{n:2057,w:'communism',m:'n. 공산주의',s:'',r:'그리스어 myrias (ten thousand, 만) → 셀 수 없이 많은 수 → 무수한으로 고착 > 밤하늘에 셀 수 없이 많은 별이 가득한 장면이 원형'},
{n:2058,w:'inveterate',m:'a. ① (나쁜 감정·습관이) 뿌리 깊은 ② (사람이) 상습적인, 버릇이 된',s:'deep-rooted, deep-seated, ingrained, chronic, compulsive, habitual, hardened',r:'re (back) + calcitrant (kick, 발로 차다) → 뒤로 발길질하며 저항하는 → 반항하는·다루기 힘든으로 고착 > 끌려가면서도 발버둥치며 저항하는 장면이 원형'},
{n:2059,w:'platitudinous',m:'a. 시시한 말을 하는, 평범한, 진부한',s:'banal, commonplace, mediocre',r:'스페인어 filibustero (pirate, 해적) → 해적처럼 의회 진행을 약탈하듯 방해하다 → 의사 방해로 고착 > 법안 통과를 막으려 몇 시간씩 연설하는 장면이 원형'},
{n:2060,w:'revision',m:'n. ① 개정, 수정 ② 검토; 변경',s:'amendment, correction, modification, re-examination, alteration',r:'라틴어 loqui (speak, 말하다) + -acious (많이 하는) → 말을 많이 하는 성질 → 말이 많은·수다스러운으로 고착 > 상대가 말할 틈도 없이 계속 이야기하는 장면이 원형'},
{n:2061,w:'extricate',m:'vt. (위험·곤경에서) 구출하다, 탈출시키다, 해방시키다',s:'free, liberate, rescue',r:'라틴어 fallax (deceitful, 속이는) + -ious (형용사형) → 속이는 성질의 → 잘못된·그릇된·속이는으로 고착 > 논리적으로 보이지만 실제로는 틀린 주장을 펼치는 장면이 원형'},
{n:2062,w:'mettle',m:'n. 기개, 용기, 열의, 패기',s:'courage, grit, spirit',r:'라틴어 impetus (rush, 돌진) + -ous (형용사형) → 돌진하듯 앞뒤 없이 행동하는 → 충동적인·성급한으로 고착 > 생각도 않고 바로 뛰어드는 장면이 원형'},
{n:2063,w:'firm',m:'a. ① 굳은, 단단한, 튼튼한, 견고한 ② (장소에) 고정된, 흔들리지 않는 ③ (신념·주의 등이) 변치 않는, 확고한, 단호한 / n. 상사(商社), 상회, 회사',s:'hard, solid, fixed, secure, strong, adamant, determined, resolute, business, company',r:'ob (toward) + sequ (follow, 따르다) + -ious (형용사형) → 지나치게 따르는 → 아첨하는·굽실거리는으로 고착 > 상사 말 하나하나에 고개를 조아리는 장면이 원형'},
{n:2064,w:'tract',m:'n. ① 지역, 지대 ② 소책자, 소논문 ③ (생물의) 관(管), ~계(系)',s:'area, district, booklet, essay, treatise',r:'라틴어 supercilium (eyebrow, 눈썹) + -ous (형용사형) → 눈썹을 치켜 올리며 내려다보는 → 오만한·거드름 피우는으로 고착 > 눈썹을 높이 올리며 상대를 깔보는 표정의 장면이 원형'},
{n:2065,w:'browbeat',m:'vt. 위협하다, 협박하다; 위협하여 ~하게 하다',s:'intimidate, menace, threaten',r:'라틴어 pertinax (holding fast) + -ious → 끝까지 붙잡고 놓지 않는 → 완고한·집요한으로 고착 > 한번 결정한 것을 끝까지 밀어붙이는 장면이 원형'},
{n:2066,w:'ensign',m:'n. ① (선박·비행기의 국적을 나타내는) 기; 국기 ② 기장; 상징, 표장',s:'banner, colors, flag, standard, badge, emblem, insignia, symbol',r:'라틴어 queri (complain, 불평하다) + -ulous (잘 하는) → 불평을 잘 하는 → 투덜거리는으로 고착 > 사소한 것에도 끊임없이 불평을 늘어놓는 장면이 원형'},
{n:2067,w:'swallow',m:'v. ① (음식 등을) 삼키다, (목구멍으로) 넘기다 ② (사실로) 받아들이다, 믿다 / n. ① 제비 ② 한 모금, 한 입',s:'gulp, ingest, swig, accept, adopt, believe, embrace',r:'라틴어 temere (rashly, 무모하게) + -ity (명사형) → 무모하게 행동하는 것 → 무모함·만용으로 고착 > 경고를 무시하고 위험 속으로 뛰어드는 장면이 원형'},
{n:2068,w:'grimace',m:'n. 찌푸린 얼굴[표정], 우거지상 / vi. 얼굴을 찡그리다',s:'frown, scowl',r:'라틴어 truculentus (fierce, 사나운) + -ent (형용사형) → 사납고 공격적인 성질 → 호전적인·신랄한으로 고착 > 작은 자극에도 공격적으로 반응하는 장면이 원형'},
{n:2069,w:'array',m:'vt. ① 정렬시키다, 배열[배치]하다 ② 치장하다, 차려 입히다 / n. 배열; 열거, 줄 지어 있는 것들; 치장',s:'arrange, dispose, line up, range, attire, dress',r:'라틴어 tenax (holding, 붙드는) + -ious (형용사형) → 끝까지 붙들어 놓지 않는 → 끈기 있는·잘 붙는으로 고착 > 낙지처럼 한번 붙으면 떼어낼 수 없는 장면이 원형'},
{n:2070,w:'unremitting',m:'a. (노력 등이) 끊임없는, 부단한, 그칠 사이 없는',s:'ceaseless, constant, continual, incessant',r:'circum (around, 주위) + locut (speak, 말하다) + -ion (명사형) → 빙글빙글 돌려 말하기 → 에두른 표현·장황한 말로 고착 > 간단한 것을 길게 돌려 말하는 장면이 원형'},
{n:2071,w:'puncture',m:'n. 타이어에 난 펑크, (뾰족한 것에 찔려서 생긴) 구멍[상처] / v. ① 펑크[구멍]를 내다; 펑크[구멍]가 나다 ② (자신감 등을) 상하게 하다',s:'bore, pierce, prick, dash, deflate, discourage',r:'라틴어 pejorare (make worse, 더 나쁘게 하다) + -ive (형용사형) → 의미를 더 나쁘게 만드는 → 경멸적인·좋지 않은 의미의로 고착 > 중립적 단어에 나쁜 뉘앙스를 덧씌우는 장면이 원형'},
{n:2072,w:'attainment',m:'n. ① 달성, 도달 ② (보통 pl.) 위업, 공적 ③ 학식, 재능',s:'accomplishment, achievement, fulfillment',r:'라틴어 sedulus (diligent, 부지런한) + -ous (형용사형) → 꾸준히 부지런한 성질 → 부지런한·꾸준한으로 고착 > 매일 쉬지 않고 조금씩 발전하는 장면이 원형'},
{n:2073,w:'rabid',m:'a. ① 과격한, 난폭한, 맹렬한 ② 광견병에 걸린',s:'fanatical, frenzied, furious',r:'e (out) + lucid (light, 빛) + -ate (동사형) → 빛을 내어 밝히다 → 설명하다·밝히다로 고착 > 손전등으로 어두운 곳을 비춰 선명하게 드러내는 장면이 원형'},
{n:2074,w:'probity',m:'n. 정직, 성실',s:'honesty, morality, rectitude',r:'per (through) + lucid (light, 빛) → 빛이 완전히 통과하는 → 투명한·맑은·명쾌한으로 고착 > 맑은 물이 바닥까지 훤히 보이는 장면이 원형'},
{n:2075,w:'itch',m:'n. ① 가려움 ② 참을 수 없는 욕망, 갈망; 정욕, 색욕 / v. ① 가렵다[가립게 하다] ② ~하고 싶어서 몸이 쑤시다, 근질거리다',s:'itchiness, pruritus, craving, desire, longing, lust',r:'라틴어 laudare (praise, 칭찬하다) → 소리 높여 칭찬하다 → 칭찬하다·찬양하다로 고착 > 군중 앞에서 업적을 높이 기리는 장면이 원형'},
{n:2076,w:'census',m:'n. (통계) 조사; 인구조사, 국제조사',s:'',r:'pro (forth) + fus (pour, 붓다) → 앞으로 마구 쏟아내는 → 아낌없는·풍부한·과다한으로 고착 > 폭포처럼 쏟아지듯 넘쳐나는 장면이 원형'},
{n:2077,w:'wily',m:'a. 교활한, 약삭빠른, 술책[농간]을 부리는',s:'crafty, cunning, shrewd, sly',r:'라틴어 pecunia (money, 돈) + -ary (형용사형) → 돈과 관련된 → 금전의·금전상의로 고착 > 계약서에 금전 조항을 들여다보는 장면이 원형'},
{n:2078,w:'accolade',m:'n. ① 칭찬, 포상; 영예 ② 나이트(knight) 작위 수여(식)',s:'applause, compliment, honor, kudos, laurels',r:'라틴어 culpa (fault, 잘못) + -able (할 수 있는) → 잘못이 돌려질 수 있는 → 비난받아 마땅한·과실이 있는으로 고착 > 사고 현장에서 책임자를 가리키는 장면이 원형'},
{n:2079,w:'depress',m:'vt. ① 우울하게 하다, 낙담시키다 ② 불경기로 만들다; (시세 등을) 하락시키다',s:'deject, discourage, dispirit, sadden, depreciate, diminish, lower',r:'프랑스어 ennui (boredom, 권태) → 아무것도 흥미롭지 않은 무료함 → 권태·지루함으로 고착 > 멍하니 창밖을 바라보며 시간을 죽이는 장면이 원형'},
{n:2080,w:'xenophobia',m:'n. 외국인 혐오증, 외국 혐오',s:'',r:'dif (away) + fid (trust, 신뢰) + -ent (형용사형) → 자신을 신뢰하지 않는 → 자신 없는·소심한으로 고착 > 발표 전 손을 떨며 자신감을 잃은 장면이 원형'},
{n:2081,w:'virile',m:'a. 남자다운, 남성적인, 강건한, 씩씩한',s:'manly, masculine, robust',r:'in (in) + veter (old, 오래된) + -ate (형용사형) → 오랫동안 안에 자리 잡은 → 뿌리 깊은·상습적인으로 고착 > 수십 년을 지속한 습관이 뼈에 박힌 장면이 원형'},
{n:2082,w:'proceeds',m:'n. (거래·투자 등에 의한) 수입, 수익',s:'income, profit, revenue, yield',r:'re (again) + monstr (show, 보이다) + -ate (동사형) → 다시 보여주며 항의하다 → 항의하다·이의를 제기하다로 고착 > 증거를 들고 강하게 이의를 제기하는 장면이 원형'},
{n:2083,w:'chasten',m:'vt. ① 징계하다, (산역경이 인간을) 단련시키다 ② (열정 따위를) 억제하다, 누그러뜨리다',s:'discipline, subdue',r:'pro (before) + scrib (write, 쓰다) → 앞에 써서 금지 선언하다 → 금지하다·추방하다로 고착 > 공고문에 이름을 써서 추방을 선언하는 장면이 원형'},
{n:2084,w:'stricture',m:'n. ① (주로 pl.) (특히 남의 행동에 대한) 심한 비난[혹평] ② (행동에 대한) 제한[구속, 제약]',s:'censure, restriction',r:'라틴어 duplex (double, 이중의) + -ity (명사형) → 두 개의 얼굴을 가진 것 → 이중성·표리부동으로 고착 > 앞과 뒤가 완전히 다른 두 얼굴을 가진 장면이 원형'},
{n:2085,w:'coalition',m:'n. ① 합동, 연합 ② (정치적인) 제휴, 연립',s:'alliance, bloc, union',r:'per (through, 완전히) + fid (faith, 믿음) + -ious (형용사형) → 믿음을 완전히 저버리는 → 불성실한·배신하는으로 고착 > 신뢰를 주고 뒤통수를 치는 장면이 원형'},
{n:2086,w:'routine',m:'n. ① 판에 박힌 일, 일상의 과정[일] ② 기계적인 순서[일, 습관] / a. 판에 박힌, 일상적인',s:'habitual, ordinary, regular, usual',r:'라틴어 mendax (liar, 거짓말쟁이) + -ity (명사형) → 거짓말하는 성질 → 거짓말·허위로 고착 > 거짓말이 쌓여 더 큰 거짓말을 만드는 장면이 원형'},
{n:2087,w:'mold',m:'n. ① 형(型), 모형, 금형, 주형(주형), 틀, 거푸집 ② 곰팡이 / v. 틀에 넣어 만들다, 주조하다',s:'fungus, mildew, must, coin, found, mint',r:'im (not) + pecuni (money, 돈) + -ous (형용사형) → 돈이 없는 → 가난한으로 고착 > 지갑을 열었을 때 아무것도 없는 장면이 원형'},
{n:2088,w:'dissection',m:'n. ① 해체, 해부 ② 정밀한 분석[조사]',s:'anatomy, autopsy, necropsy, postmortem, analysis, examination, inspection, scrutiny',r:'라틴어 lassus (weary, 지친) + -tude (명사형) → 지쳐 기운이 빠진 상태 → 피로·나른함으로 고착 > 기운이 빠져 축 늘어진 장면이 원형'},
{n:2089,w:'evangelical',m:'a. 복음의, 복음 전도의',s:'',r:'per (through) + spic (see, 보다) + -acious (잘 하는) → 완전히 꿰뚫어 보는 → 통찰력 있는·날카로운으로 고착 > 겉만 보고도 본질을 꿰뚫어 보는 장면이 원형'},
{n:2090,w:'lyric',m:'n. ① 서정시 ② (pl.) (노래나 뮤지컬의) 가사',s:'open, libretto, words',r:'라틴어 paenitere (repent, 뉘우치다) + -ent (형용사형) → 뉘우치는 상태의 → 뉘우치는·회개하는으로 고착 > 무릎을 꿇고 진심으로 용서를 구하는 장면이 원형'},
{n:2091,w:'outlaw',m:'vt. ① 불법화하다, 금지하다 ② 사회에서 매장[추방]하다 / n. 무법자, 상습범; 사회에서 버림받은 사람',s:'ban, criminalize, forbid, illegalize, prohibit, banish, ostracize, bandit, criminal',r:'ex (out) + purg (clean, 정화하다) + -ate (동사형) → 밖으로 꺼내 정화하다 → 외설적 부분을 삭제하다로 고착 > 편집자가 책에서 부적절한 부분을 가위로 오려내는 장면이 원형'},
{n:2092,w:'brook',m:'n. 개울, 시내 / vt. (주로 부정문) 참다, 견디다',s:'creek, rivulet, stream, bear, endure, tolerate',r:'그리스어 en (in) + komos (festivity, 축제) → 축제에서 바치는 찬가 → 찬사·칭찬으로 고착 > 행사에서 누군가를 높이 치켜세우는 연설의 장면이 원형'},
{n:2093,w:'noted',m:'a. 저명한, 유명한',s:'celebrated, distinguished, famous, eminent, prominent',r:'in (not) + sol (accustomed, 익숙한) + -ent (형용사형) → 예의를 익히지 않은 → 오만한·무례한으로 고착 > 어른 앞에서 버릇없이 구는 장면이 원형'},
{n:2094,w:'coterie',m:'n. ① (공통의 목적·취미를 갖는) 동료, 친구; (문에 등의) 동인(동인) ② (예술가 등의) 서클, 동아리, 그룹, 집단',s:'circle, group, set',r:'라틴어 venerari (worship, 숭배하다) → 신처럼 숭배하여 경의를 표하다 → 숭배하다·존경하다로 고착 > 조상 묘 앞에서 깊이 머리를 숙이는 장면이 원형'},
{n:2095,w:'solvent',m:'a. ① 자불능력이 있는, 상환능력이 있는 ② 녹이는, 용해력이 있는, 용해되는 / n. ① 용제, 용액 ② 해답, 해결책',s:'dissolvent, resolvent, soluble, remedy, solution',r:'im (not) + pud (shame, 수치) + -ent (형용사형) → 수치를 모르는 → 뻔뻔스러운·무례한으로 고착 > 잘못을 지적해도 당당하게 반박하는 장면이 원형'},
{n:2096,w:'thirst',m:'n. ① 갈증, 목마름 ② 갈망, 열망 / vi. 갈망[열망]하다[for, after]',s:'dipsesis, drought, craving, desire, longing, yearning, crave, long, yearn',r:'그리스어 austeros (harsh, 가혹한) → 불필요한 것을 다 버린 엄격한 상태 → 엄격한·금욕적인·소박한으로 고착 > 장식 하나 없이 텅 빈 수도사의 방의 장면이 원형'},
{n:2097,w:'ordain',m:'vt. ① (산·운명 등이) 정하다; (법규 따위가) 규정하다 ② (성직자로) 임명하다',s:'order, rule',r:'라틴어 stolidus (dull, 둔한) → 어떤 자극에도 반응하지 않는 둔한 → 둔감한·무감각한으로 고착 > 폭발이 일어나도 눈 하나 깜짝 않는 장면이 원형'},
{n:2098,w:'flagship',m:'a. 가장 중요한 / n. 기함(기함); 주력 제품; 가장 중요한 것; 본점, 본사',s:'chief, main',r:'라틴어 vox (voice, 목소리) + fer (carry, 나르다) + -ous (형용사형) → 목소리를 크게 실어 나르는 → 소리를 지르는·시끄러운으로 고착 > 군중이 한목소리로 외치는 장면이 원형'},
{n:2099,w:'gut',m:'n. ① 창자, 장(장); (pl.) 내장 ② (pl.) (책 등의) 내용; 실질, 핵심 ③ (pl.) 기운, 용기, 배짱, 끈기, 지구력',s:'bowels, entrails, intestines, contents, essential, fundamental, audacity, backbone, courage, nerve',r:'circum (around, 주위) + spect (look, 보다) → 주위를 빙 둘러 살피다 → 신중한·주도면밀한으로 고착 > 발을 내딛기 전 사방을 꼼꼼히 살피는 장면이 원형'},
{n:2100,w:'desecrate',m:'vt. (신성한 것을) 훼손하다, 더럽히다, 모독하다',s:'blaspheme, defile, profane',r:'라틴어 penuria (want, 결핍) → 기본적인 것도 결핍된 극도의 가난 → 극도의 빈곤으로 고착 > 먹을 것도 없어 뼈만 남은 장면이 원형'},
{n:2101,w:'outburst',m:'n. ① (감정의) 폭발, 분출 ② (특정 활동·태도의) 급격한 증가',s:'attack, eruption, fit, flare-up, explosion, outbreak, surge',r:'out (밖으로) + burst (터지다) → 안에 쌓인 것이 밖으로 터져 나오다 → 감정의 폭발·분출로 고착 > 댐이 압력을 이기지 못하고 터지는 장면이 원형'},
{n:2102,w:'devious',m:'a. ① 정직하지 못한, 기만적인 ② 우회하는, 에두르는',s:'bent, deceitful, dirty, insincere, underhand, circumambient, indirect, roundabout',r:'de (from) + vi (way, 길) + -ous (형용사형) → 길에서 벗어난 → 기만적인·우회하는으로 고착 > 목적지로 곧장 가지 않고 빙 돌아가는 장면이 원형'},
{n:2103,w:'adjoin',m:'v. 인접하다',s:'abut, border, butt, neighbor, verge',r:'ad (to) + join (연결하다) → ~에 맞닿아 연결되다 → 인접하다로 고착 > 두 방이 벽을 공유하며 나란히 붙어있는 장면이 원형'},
{n:2104,w:'profuse',m:'a. ① 아낌없는, 마음이 후한 ② 많은, 풍부한',s:'generous, liberal, ample, plentiful',r:'pro (forth) + fus (pour, 붓다) → 앞으로 마구 쏟아내는 → 아낌없는·풍부한으로 고착 > 꽃이 가득 피어 넘쳐흐르는 정원의 장면이 원형'},
{n:2105,w:'infiltrate',m:'v. 침투하다[침투시키다], 잠입하다[잠입시키다], 스며들게 하다, 스며들다',s:'',r:'in (into) + filtrat (filter, 스며들다) → 필터처럼 조금씩 스며들다 → 침투하다·잠입하다로 고착 > 스파이가 적 조직에 서서히 녹아드는 장면이 원형'},
{n:2106,w:'celerity',m:'n. ① (행동의) 날램, 민첩함, 기민함, 신속함 ② 속력, 속도',s:'swiftness, speed, velocity',r:'라틴어 celer (swift, 빠른) + -ity (명사형) → 빠름의 성질 → 신속함·민첩으로 고착 > 번개처럼 순식간에 목표를 달성하는 장면이 원형'},
{n:2107,w:'forge',m:'v. ① (화폐·문서 등을) 위조하다, (거짓말을) 꾸며내다 ② (친교·관계 등을) 맺다, 구축하다 ③ (쇠를) 불리다; 단조(단조)하다 / n. ① 용광로 = furnace ② 제철소; 대장간',s:'counterfeit, fake, build, construct, form, ironworks, smithery, smithy',r:'라틴어 fabrica (workshop, 작업장) → 불로 달궈 두드려 형태를 만들다 → 위조하다·단조하다로 고착 > 대장장이가 달군 쇳덩이를 망치로 두드리는 장면이 원형'},
{n:2108,w:'pretense',m:'n. ① 겉치레, 가식(가식), 가면, 위장, 허위 ② 구실, 핑계',s:'pretext',r:'pre (before) + tens (stretch, 뻗다) → 앞에 내밀어 내세우는 것 → 허위·가장·구실로 고착 > 아프지 않은데 아픈 척 이유를 꾸며대는 장면이 원형'},
{n:2109,w:'extramural',m:'a. ① 교외의, 구역 밖의 ② 대학 외부로부터의; 학교 대항의',s:'',r:'extra (outside, 밖) + mur (wall, 벽) + -al → 담장 밖의 → 과외의·교외의로 고착 > 학교 담장 너머 지역사회에서 하는 활동의 장면이 원형'},
{n:2110,w:'swerve',m:'v. ① 빗나가다, (~에서) 벗어나다, (운동 도중에) 갑자기 방향을 바꾸다 ② 정도를 벗어나다, 일탈하다',s:'digress, turn, veer, depart, deviate',r:'고대 영어 sweorfan (file, 갈다) → 갑자기 방향을 틀다 → 빗나가다·급히 방향 전환하다로 고착 > 장애물을 피해 갑자기 핸들을 꺾는 장면이 원형'},
{n:2111,w:'dolmen',m:'n. 고인돌',s:'cromlech',r:'켈트어 dol (table) + men (stone) → 테이블처럼 생긴 돌 → 고인돌로 고착 > 납작한 돌이 두 기둥돌 위에 얹힌 선사 무덤의 장면이 원형'},
{n:2112,w:'contravene',m:'vt. ① (법률·규정 등을) 위반[위배]하다 ② (진술·원칙 등을) 부정[반박]하다',s:'disobey, infringe, transgress, violate, contradict, disprove, oppose, refute',r:'contra (against) + ven (come, 오다) → 거슬러 오다 → 위반하다·반하다로 고착 > 법 조항을 정면으로 어기는 장면이 원형'},
{n:2113,w:'agitation',m:'n. ① (인심·마음의) 동요, 불안 ② (사회적인) 소동; 선동; 시위',s:'nervousness, unrest, commotion, disturbance, turmoil, upheaval',r:'라틴어 agitare (drive, 몰다) + -tion (명사형) → 계속 몰고 흔드는 것 → 선동·동요·흥분으로 고착 > 군중 앞에서 손을 흔들며 선동하는 장면이 원형'},
{n:2114,w:'lofty',m:'a. ① 아주 높은, 우뚝 솟은 ② 고상한, 고결한',s:'towering, elevated, grand, noble',r:'고대 영어 lyft (sky, 하늘) + -y → 하늘처럼 높은 → 고상한·거만한·높은으로 고착 > 구름에 닿을 듯 높이 솟은 건물의 장면이 원형'},
{n:2115,w:'metallurgy',m:'n. 야금학(야금학), 야금술(야금술), 금속공학',s:'',r:'그리스어 metallon (metal, 금속) + erg (work, 일하다) + -y → 금속을 다루는 기술 → 야금학으로 고착 > 용광로에서 쇳물이 쏟아지는 장면이 원형'},
{n:2116,w:'replenish',m:'vt. 다시 채우다, 보충하다[with]',s:'refill, restock',r:'re (again) + plen (full, 가득한) + -ish → 다시 가득 채우다 → 보충하다·다시 채우다로 고착 > 빈 물통에 다시 물을 가득 채우는 장면이 원형'},
{n:2117,w:'conflagration',m:'n. 큰 불, 대화재',s:'great fire',r:'con (completely) + flagr (burn, 타다) + -ation → 완전히 타오르는 것 → 대화재·큰 불로 고착 > 도시 전체를 집어삼키는 거대한 불길의 장면이 원형'},
{n:2118,w:'sullen',m:'a. ① 부루퉁한, 시무룩한, 뚱한, 기분이 언좨은 ② 음산한, 음울한, 밝지 못한',s:'dour, morose, surly',r:'라틴어 solus (alone, 혼자) → 혼자 틀어박혀 시무룩한 → 시무룩한·침울한으로 고착 > 입을 꾹 다물고 구석에 혼자 앉은 장면이 원형'},
{n:2119,w:'bandit',m:'n. 산적, 노상강도, 도둑; 악당',s:'brigand, plunderer, robber, outlaw',r:'이탈리아어 bandito (banned, 추방된) → 사회에서 추방된 무법자 → 강도·도적으로 고착 > 마스크를 쓰고 총을 든 강도의 장면이 원형'},
{n:2120,w:'flimsy',m:'a. ① 무른, 취약한 ② (근거·논리가) 박약한, 얄팍한 ③ 하찮은, 보잘 것 없는',s:'fragile, weak, unconvincing, insignificant, paltry',r:'중세 영어 flimsi (frail, 약한) → 살짝 건드려도 구겨지는 얇고 약한 것 → 허술한·얄팍한으로 고착 > 비바람에 종잇장처럼 흔들리는 장면이 원형'},
{n:2121,w:'grip',m:'n. ① 꽉 쥠[잡음]; 통제, 지배; 통제력, 지배력 ② 파악력, 이해력, 터득 / v. ① 꽉 쥐다, 꼭 잡다 ② ~의 마음을 사로잡다; (주의·흥미를) 끌다 ③ 이해하다',s:'clutch, grasp, control, mastery, understanding, arrest, comprehend, understand',r:'고대 영어 gripe (grasp, 잡다) → 손으로 꽉 쥐어 잡다 → 꽉 잡다·이해하다·손잡이로 고착 > 봉을 두 손으로 힘껏 쥐는 장면이 원형'},
{n:2122,w:'parenthesis',m:'n. ① (보통 pl.) (둥근) 괄호 ② (문장 속의) 삽입어구 ③ 막간극; 막간, 휴게시간',s:'bracket',r:'그리스어 para (beside) + en (in) + thesis (place) → 문장 옆에 끼워 넣은 것 → 괄호·삽입구로 고착 > 본문 사이에 괄호로 부연 설명이 끼워진 장면이 원형'},
{n:2123,w:'anticlimax',m:'n. ① 급락; 큰 기대 뒤의 실망, 용두사미 ② <수사학> 점강법(점강법)',s:'bathos',r:'anti (against) + climax (정점) → 정점에 반하는 갑작스런 하락 → 용두사미·실망스런 결말로 고착 > 긴장감 끝에 황당한 결말이 오는 장면이 원형'},
{n:2124,w:'intestine',m:'n. (보통 pl.) 창자, 장(장) / a. 내부의; 국내의',s:'bowels, gut, internal, domestic',r:'라틴어 intestinus (internal, 내부의) → 몸 안에 있는 기관 → 창자·내장·국내의로 고착 > 배 안에 구불구불한 소장이 담긴 장면이 원형'},
{n:2125,w:'befuddle',m:'vt. 어리둥절하게 하다, 당황하게 하다',s:'baffle, confuse, puzzle',r:'be (completely) + fuddle (confuse, 혼란시키다) → 완전히 혼란에 빠뜨리다 → 혼란시키다·취하게 하다로 고착 > 복잡한 말에 머리가 빙글빙글 도는 장면이 원형'},
{n:2126,w:'enormity',m:'n. ① (상황·사건 등의) 심각함, (범죄의) 무모함; 막대함, 엄청남 ② (pl.) 잔학무도한 행위; 흉악 범죄',s:'immensity, atrocity, depravity, turpitude, villainy',r:'e (out) + norm (rule, 규범) + -ity → 규범에서 완전히 벗어난 크기 → 엄청난 나쁜 행위·심각성으로 고착 > 상상을 초월한 범죄의 심각성을 실감하는 장면이 원형'},
{n:2127,w:'cadaver',m:'n. 시체',s:'corpse',r:'라틴어 cadere (fall, 쓰러지다) → 쓰러져 버린 몸 → 시체·시신으로 고착 > 해부학 실습실에 놓인 시신의 장면이 원형'},
{n:2128,w:'kleptomania',m:'n. (병적인) 도벽, 절도광',s:'',r:'그리스어 kleptein (steal, 훔치다) + mania (광기) → 훔치고 싶은 충동을 참지 못하는 병 → 도벽(절도광)으로 고착 > 필요도 없는 물건을 충동적으로 훔치는 장면이 원형'},
{n:2129,w:'factious',m:'a 당파적인; 당쟁을 일삼는, 당파심이 강한',s:'partisan',r:'라틴어 factio (faction, 파벌) + -ous → 파벌을 만들어 분열시키는 → 파벌적인·불화를 일으키는으로 고착 > 집단이 두 패로 나뉘어 싸우는 장면이 원형'},
{n:2130,w:'trite',m:'a. 진부한, 흔해빠진, 케케묵은',s:'banal, commonplace, hackneyed',r:'라틴어 tritus (worn, 닳아빠진) → 너무 써서 닳아버린 → 진부한으로 고착 > 천 번은 들은 것 같은 판에 박힌 말의 장면이 원형'},
{n:2131,w:'bypass',m:'n. 우회도로 / vt. 우회하다; (문제·질문 등을) 회피하다, 무시하다',s:'detour, relief road, avoid, circumvent, sidestep',r:'by (옆으로) + pass (지나가다) → 옆으로 돌아 지나가다 → 우회하다·건너뛰다로 고착 > 막힌 도로를 피해 옆 길로 돌아가는 장면이 원형'},
{n:2132,w:'over-the-counter',m:'a. ① (약이) 의사의 처방 없이 살 수 있는, 일반 판매약의 ② (주식이) 비상장(非上場)의; 장외(場外) 거래의, 점두(店頭) 매매의',s:'',r:'over (넘어서) + counter (판매대) → 판매대 너머로 직접 주고받는 → 처방전 없이 살 수 있는·장외 거래의로 고착 > 약국 판매대에서 처방전 없이 약을 사는 장면이 원형'},
{n:2133,w:'anoint',m:'vt. ① (상처 따위에) 기름을[연고를] 바르다 ② (사람의 머리에) 기름을 부어 신성하게 하다',s:'consecrate, hallow, sanctify',r:'an (on) + oint (oil, 기름) → 기름을 바르다 → 기름 붓다·선발하다로 고착 > 왕의 이마에 성유를 바르는 즉위식의 장면이 원형'},
{n:2134,w:'connection',m:'n. ① 관계, 관련성; 교섭, 교제 ② 연락, 연결, 결합 ③ (보통 pl.) 연고, 연줄',s:'association, link, relation, relationship, junction, liaison, nexus, contact',r:'con (together) + nect (bind, 묶다) + -ion → 함께 묶어 연결하는 것 → 연결·관계·접속으로 고착 > 두 전선을 이어 회로를 완성하는 장면이 원형'},
{n:2135,w:'vacuate',m:'v. ① 대피시키다, 소개(疏開)시키다 ② 떠나다, 피난하다',s:'clear, remove, withdraw, depart, leave',r:'라틴어 vacuus (empty, 비다) + -ate → 비워내다 → 비우다·철수하다로 고착 > 건물을 긴급히 비워내는 장면이 원형'},
{n:2136,w:'irreversible',m:'a. (이전 상태로) 되돌릴 수 없는, 철회할 수 없는, 취소할 수 없는',s:'irrevocable',r:'ir (not) + revers (turn back, 되돌리다) + -ible → 되돌릴 수 없는 → 돌이킬 수 없는으로 고착 > 깨진 달걀은 다시 붙일 수 없는 장면이 원형'},
{n:2137,w:'saliva',m:'n. 침, 타액(唾液)',s:'spit',r:'라틴어 saliva (spit, 침) → 입 안에서 분비되는 액체 → 침·타액으로 고착 > 맛있는 음식 냄새에 침이 고이는 장면이 원형'},

{n:2139,w:'hedge',m:'n. ① 산울타리 ② 장벽, 장애 ③ (손실·위험 등에 대한) 방지책[against]',s:'quickset, barrier, obstacle, guard, protection, safeguard',r:'고대 영어 hecg (fence, 울타리) → 울타리로 구분하다 → 울타리·회피하다·위험 분산하다로 고착 > 집 주변을 생울타리로 둘러싸는 장면이 원형'},
{n:2140,w:'winnow',m:'v. ① (곡물 겨 등을) 까부르다, 키질하다 ② 가려내다, 선별하다; (쓸모없는 것을) 제거하다 ③ 분석하다, 검토하다',s:'fan, distinguish, sift, analyze',r:'고대 영어 windwian (to fan, 바람으로 날리다) → 바람으로 겨를 날려 좋은 것만 남기다 → 키질하다·가려내다로 고착 > 곡식을 높이 던져 바람에 겨를 날리는 장면이 원형'},
{n:2141,w:'serene',m:'a. ① 고요한, 잔잔한 ② (사람·표정·기질 등이) 침착한, 차분한; 평화로운, 평온한 ③ 화창한, 맑게 갠',s:'quiet, tranquil, composed, halcyon, peaceful, placid, clear, fair',r:'라틴어 serenus (clear, 맑은) → 하늘처럼 맑고 고요한 → 고요한·평온한으로 고착 > 구름 한 점 없이 맑고 잔잔한 호수의 장면이 원형'},

{n:2143,w:'reliant',m:'a. 의지하는, 의존하는, 신뢰하는[on, upon]',s:'dependent, relying',r:'re (again) + li (bind, 묶다) + -ant → 다시 묶여 의지하는 → 의존하는으로 고착 > 어린 새끼가 어미 품에 의지하는 장면이 원형'},
{n:2144,w:'thermometer',m:'n. 온도계; 체온계',s:'',r:'그리스어 thermo (heat, 열) + meter (measure, 측정하다) → 열을 측정하는 기구 → 온도계로 고착 > 아이 겨드랑이에 체온계를 끼우는 장면이 원형'},
{n:2145,w:'divert',m:'vt. ① 방향을 전환하다, 우회시키다 ② (주의·관심을) 딴 데로 돌리다 ③ (자금을) 전용[유용]하다 ④ 기분을 전환시키다, 즐겁게 하다',s:'redirect, shift, detract, distract, appropriate, misappropriate, amuse, entertain',r:'di (away) + vert (turn, 돌리다) → 다른 방향으로 돌리다 → 전환하다·우회시키다·즐겁게 하다로 고착 > 강물 방향을 다른 수로로 돌리는 장면이 원형'},
{n:2146,w:'modish',m:'a. 유행의, 유행을 따르는',s:'fashionable, stylish',r:'mode (유행) + -ish (형용사형) → 유행을 따르는 → 유행하는·최신 유행의로 고착 > 최신 트렌드를 입고 걷는 장면이 원형'},
{n:2147,w:'purge',m:'v. ① (몸·마음을) 깨끗이 하다, 정화하다 ② 내쫓다, 추방하다',s:'cleanse, clear, purify, banish, eject, expel, oust',r:'라틴어 purgare (clean, 정화하다) → 불순물을 완전히 씻어내다 → 숙청하다·정화하다로 고착 > 조직에서 반대파를 모두 제거하는 장면이 원형'},

{n:2149,w:'cognate',m:'a. ① 조상이 같은, 동족의 ② 같은 기원의; 같은 성질의, 동종의; 어원이 같은',s:'akin, consanguineous, kindred, related',r:'con (together) + gnat (born, 태어난) → 함께 태어난 → 같은 기원의·친족의로 고착 > 같은 뿌리에서 갈라진 두 언어가 비슷한 장면이 원형'},
{n:2150,w:'gimmick',m:'n. 속임수 장치; (관심을 끌기 위한) 술책[장치]',s:'artifice, scheme, trick',r:'영어 속어 gimmick (trick, 속임수) → 관심을 끌기 위한 교묘한 장치 → 속임수·눈길 끄는 장치로 고착 > 제품 광고에 사람들의 눈을 끄는 특이한 장치의 장면이 원형'},

{n:2152,w:'verge',m:'n. 가장자리; (the ~) 경계, 한계',s:'brink, edge',r:'라틴어 virga (rod, 막대기) → 경계를 나타내는 막대기 → 가장자리·~하려는 직전으로 고착 > 절벽 끝 바로 직전에 서있는 장면이 원형'},
{n:2153,w:'resplendent',m:'a. 반짝반짝 빛나는, 눈부신',s:'brilliant, dazzling, glittering',r:'re (again) + splend (shine, 빛나다) + -ent → 다시 빛을 발하는 → 눈부신·화려한으로 고착 > 보석으로 치장한 왕관이 빛나는 장면이 원형'},
{n:2154,w:'spellbind',m:'vt. ① 주문으로 얽매다, 마법을 걸다 ② 매혹하다, 황홀하게 하다',s:'bewitch, conjure, spell, witch, charm, enthrall, entrance, fascinate',r:'spell (마법) + bind (묶다) → 마법으로 묶어놓다 → 매혹하다·넋을 빼앗다로 고착 > 연설에 완전히 빠져들어 꼼짝 않는 청중의 장면이 원형'},
{n:2155,w:'content',m:'a. ① (~에) 만족하는[with] ② 기꺼이 ~하는[to do] / vt. 만족시키다 / n. ① (용기 속의) 내용, 내용물 ② (pl.) (서적 등의) 목차, 목록, 내용 ③ 함유량, 산출량; 용량, 크기',s:'gratified, satisfied, willing, gratify, satisfy, constituent, element, material, substance, size, volume',r:'con (together) + tent (hold, 담다) → 함께 담고 있는 것 → 내용·목차·만족한으로 고착 > 상자 안에 담긴 물건의 목록을 확인하는 장면이 원형'},
{n:2156,w:'amity',m:'n. 우호, 친선, 친목',s:'amicability, friendliness, friendship, goodwill',r:'라틴어 amicus (friend, 친구) + -ity → 친구다운 우호 관계 → 우호·친선으로 고착 > 두 나라 대표가 악수하며 평화 협정을 맺는 장면이 원형'},
{n:2157,w:'peculate',m:'v. (공금·위탁금 등을) 횡령하다, 유용하다',s:'embezzle, misappropriate',r:'라틴어 peculari (embezzle, 횡령하다) → 공금을 몰래 챙기다 → 횡령하다·공금을 착복하다로 고착 > 관리자가 공금을 자신의 주머니에 넣는 장면이 원형'},
{n:2158,w:'insignia',m:'n. (계급·소속 등을 나타내는) 휘장[배지], 훈장',s:'badge, decoration, order',r:'라틴어 insignia (badges, 휘장) → 신분을 나타내는 표시 → 휘장·계급장·상징으로 고착 > 군복 어깨에 달린 계급장의 장면이 원형'},
{n:2159,w:'spoil',m:'v. ① 망치다, 상하게 하다, 못 쓰게 만들다; (음식물을) 썩히다 ② (남의) 성격[성질]을 버리다; 응석 받아주다 / n. ① (pl.) 전리품, 약탈품 ② (노력의) 성과',s:'damage, ruin, booty, pillage, plunder, attainment',r:'라틴어 spolium (booty, 전리품) → 빼앗아 망가뜨리다 → 망치다·부패하다·전리품으로 고착 > 오래된 음식이 썩어 못 먹게 된 장면이 원형'},
{n:2160,w:'credential',m:'n. ① (대사·공사·사절 등의) 신임장 ② 자격증명서, 자격 인정서 ③ 성적증명서',s:'certificate, warrant, grade_transcript, transcript',r:'라틴어 credere (believe, 믿다) + -tial → 믿을 만하다는 것을 보여주는 것 → 자격증·신임장으로 고착 > 인터뷰 전에 학위증과 자격증을 제출하는 장면이 원형'},
{n:2161,w:'dog-in-the-manger',m:'a. 심술쟁이 같은, 심술궂은',s:'bloody-minded, ill-natured, mean',r:'이솝 우화의 여물통을 차지한 개 → 자기도 못 쓰면서 남도 못 쓰게 하는 → 심술궂은·이기적인으로 고착 > 먹지도 못하는 여물통을 지키며 소를 쫓아내는 개의 장면이 원형'},
{n:2162,w:'forbear',m:'v. 억제하다, 삼가다, 참다, 관용하다',s:'abstain, refrain, withhold',r:'for (away, 참아내며) + bear (견디다) → 참아내며 억제하다 → 참다·자제하다로 고착 > 화가 나도 꾹 참고 말을 삼키는 장면이 원형'},
{n:2163,w:'progenitor',m:'n. ① 조상, 선조 ② 창시자, 선구자',s:'ancestor, forebear, originator, predecessor',r:'pro (before) + genit (beget, 낳다) + -or (사람) → 먼저 낳은 사람 → 시조·조상으로 고착 > 가계도 맨 위에 그려진 공통 조상의 장면이 원형'},
{n:2164,w:'bootleg',m:'a. 밀매[밀조, 밀수]된; (제작·판매가) 불법의, 해적판의 / v. (술 등을) 밀매밀조, 밀수하다',s:'smuggled, illegal, illicit, pirated, smuggle',r:'boot (장화) + leg (다리) → 장화 안 다리 쪽에 술을 숨겨 밀반입하던 것 → 밀수품·불법 복제로 고착 > 장화 안에 술병을 숨겨 밀수하는 장면이 원형'},
{n:2165,w:'citadel',m:'n. (도시·주민을 보호하는) 성채, 요새; 아성; 최후의 거점',s:'bastion, bulwark, fortification, fortress, stronghold',r:'이탈리아어 cittadella (small city, 작은 도시) → 도시 안의 도시, 최후 방어선 → 요새·성채로 고착 > 언덕 위에 높이 세워진 난공불락의 성의 장면이 원형'},
{n:2166,w:'typical',m:'a. ① 전형적인, 대표적인 ② 보통의, 일반적인',s:'classic, common',r:'그리스어 typos (type, 유형) + -ical → 유형의 특징을 가진 → 전형적인·특유의로 고착 > 패턴에서 딱 예상되는 행동을 하는 장면이 원형'},
{n:2167,w:'rectitude',m:'n. ① 정직, 청렴, 강직 ② (판단방법의) 올바름, 정확',s:'integrity, probity, righteousness, uprightness, accuracy, correctness, precision',r:'라틴어 rectus (straight, 곧은) + -tude → 곧음의 성질 → 올바름·청렴·정직으로 고착 > 자를 대고 그은 것처럼 반듯한 태도의 장면이 원형'},

{n:2169,w:'prone',m:'a. ① 수그린, 납작 엎드린 ② ~하기 쉬운, ~의 경향을 갖게 되는; ~에 걸리기 쉬운[to]',s:'face_down, flat, lying_down, liable, subject, susceptible',r:'라틴어 pronus (leaning forward, 앞으로 기울어진) → 앞으로 기울어 엎어진 → 엎드린·~하기 쉬운으로 고착 > 바닥에 엎드려 누운 자세의 장면이 원형'},
{n:2170,w:'huddle',m:'v. ① 붐비다, 밀치락달치락하다, 모이다 ② 뒤죽박죽 쌓아 올리다 / n. ① 옹기종기 모여 서 있는 것 ② 혼잡, 난잡',s:'cluster, crowd, flock',r:'중세 영어 hoderen (crowd, 모이다) → 몸을 웅크리며 한 곳에 모이다 → 웅크리다·모이다·밀담으로 고착 > 추위에 몸을 웅크려 서로 붙어있는 장면이 원형'},
{n:2171,w:'motion',m:'n. ① 운동, 활동 ② 동작, 몸짓 ③ 발의(發議), 제의, 제안',s:'action, activity, mobility, movement, gesticulation, gesture, sign, signal, proposal, proposition',r:'라틴어 motio (movement, 움직임) → 움직이는 것 → 움직임·동의·제안으로 고착 > 회의에서 손을 들어 안건을 제안하는 장면이 원형'},
{n:2172,w:'grandiose',m:'a. ① 웅장한, 숭고한, 장엄한 ② (너무) 거창한, (실속 없이) 거창하기만 한',s:'grand, magnificent',r:'라틴어 grandis (great, 웅장한) + -ose → 웅장함을 과장하는 → 웅장한·과대망상적인으로 고착 > 실제보다 훨씬 과장된 청사진을 그리는 장면이 원형'},
{n:2173,w:'stratagem',m:'n. 전략; 계략, 책략, 술수',s:'maneuver, ruse, strategy, tactic, trick',r:'그리스어 strategos (general, 장군) → 장군이 쓰는 계략 → 책략·전략적 술수로 고착 > 적을 함정으로 유인하는 교묘한 계략의 장면이 원형'},
{n:2174,w:'deprecate',m:'vt. ① (강력히) 비난하다 ② (강력히) 반대하다, 불찬성을 주장하다',s:'condemn, disapprove, oppugn, vilify, counter, oppose, oppugn',r:'de (away) + prec (pray, 기도하다) + -ate → 나쁜 일을 막으려 기도하다 → 반대하다·경시하다로 고착 > 손을 들어 강하게 반대 의사를 표시하는 장면이 원형'},
{n:2175,w:'flotsam',m:'n. ① (조난선의) 표류 화물, 잡동사니 ② 부량자, 깡패, 인간쓰레기',s:'flotage, jetsam, scum',r:'고대 프랑스어 floter (float, 떠다니다) → 물에 떠다니는 난파 잔해 → 표류물·쓸모없는 것들로 고착 > 파선 후 바다 위에 잔해가 둥둥 떠다니는 장면이 원형'},
{n:2176,w:'incense',m:'v. ① 향을 피우다, 분향하다 ② 몹시 화나게 하다, 격노[격분]시키다 / n. 향, 향료',s:'cense, enrage, infuriate',r:'라틴어 incendere (set on fire, 불 지르다) → 향을 불 질러 피우다·마음에 불을 지르다 → 향·격노하게 하다로 고착 > 향이 타며 연기가 피어오르는 장면이 원형'},
{n:2177,w:'obligation',m:'n. ① 의무, 책임 ② 채무, 채권[채무] 관계; 채권, 증권',s:'duty, liability, responsibility, debt, bond',r:'ob (toward) + lig (bind, 묶다) + -ation → ~를 향해 묶인 것 → 의무·책임·채무로 고착 > 계약서에 서명해 책임을 지는 장면이 원형'},
{n:2178,w:'unruly',m:'a. 다루기 힘든, 제멋대로 구는, 감당할 수 없는',s:'disobedient, fractious, restive',r:'un (not) + rule (규칙) + -y → 규칙을 따르지 않는 → 제멋대로인·말을 안 듣는으로 고착 > 선생님 말을 무시하고 제멋대로 구는 장면이 원형'},
{n:2179,w:'burnish',m:'v. (금속에) 광을 내다, 윤을 내다',s:'glaze, gloss, luster, polish, shine',r:'고대 프랑스어 burnir (polish, 닦다) → 문질러 빛나게 닦다 → 닦다·윤내다·광내다로 고착 > 은제 식기를 천으로 닦아 빛을 내는 장면이 원형'},
{n:2180,w:'expulsion',m:'n. ① (조직에서의) 제명, 제적, 추방 ② 배출, 방출',s:'dismissal, ejection, exclusion, purge',r:'ex (out) + puls (drive, 몰다) + -ion → 밖으로 몰아내는 것 → 추방·제명·퇴학으로 고착 > 교장이 문제 학생을 학교 밖으로 내보내는 장면이 원형'},
{n:2181,w:'logical',m:'a. ① 논리의, 논리학의, 논리상의; 논리적인 ② (행동 등이) 사리에 맞는, 이치에 맞는',s:'reasonable',r:'그리스어 logos (reason, 이성) + -ical → 이성적 사고에 따른 → 논리적인으로 고착 > 증거에서 결론으로 단계적으로 추론하는 장면이 원형'},
{n:2182,w:'clot',m:'v. 덩어리지다; 응고하다, 굳히다 / n. 떼, (엉긴) 덩어리; <속어> 바보, 멍청이',s:'coagulate, congeal',r:'고대 영어 clott (lump, 덩어리) → 액체가 굳어 생기는 덩어리 → 응고하다·혈전으로 고착 > 피가 상처 위에서 굳어 딱지가 생기는 장면이 원형'},
{n:2183,w:'nutrition',m:'n. ① 영양; 영양 공급[섭취] ② 자양물, 음식물, 영양소',s:'nourishment, nutriment, sustenance',r:'라틴어 nutrire (nourish, 양육하다) + -tion → 몸을 길러주는 것 → 영양·영양분으로 고착 > 균형 잡힌 식사가 몸에 흡수되는 장면이 원형'},
{n:2184,w:'abscond',m:'vi. 무단이탈하다, 종적[자취]을 감추다, 도주[도망]하다',s:'decamp, escape, flee',r:'ab (away) + scond (hide, 숨다) → 숨어서 도망가다 → 도주하다·몰래 도망치다로 고착 > 범인이 새벽에 흔적을 지우고 사라지는 장면이 원형'},
{n:2185,w:'pollen',m:'n. 꽃가루',s:'anther_dust, farina',r:'라틴어 pollen (fine flour, 고운 가루) → 꽃의 고운 가루 → 꽃가루·화분으로 고착 > 꽃 수술에서 노란 가루가 날리는 장면이 원형'},
{n:2186,w:'defect',m:'n. ① 결점, 결함; 단점, 약점 ② 결여, 결핍, 부족 / vi. (국가·주의 등을) 버리다, 도망[탈주]하다, 변절하다',s:'blemish, flaw, drawback, shortcoming, deficiency, lack, shortage, desert, escape, flee',r:'de (from) + fect (do, 만들다) → 만들어진 것에서 결함 → 결함·탈주하다로 고착 > 제품 검사에서 불량품을 골라내는 장면이 원형'},
{n:2187,w:'talisman',m:'n. ① (행운을 가져다준다고 여겨지는) 부적 ② 불가사의한 힘이 있는 것',s:'amulet, charm, periapt',r:'아랍어 tilsam (magic image, 마법 이미지) → 마법의 힘을 가진 물건 → 부적·행운의 물건으로 고착 > 목에 건 부적이 나쁜 기운을 막아주는 장면이 원형'},
{n:2188,w:'musty',m:'a. ① 곰팡이 슨, 곰팡내 나는 ② 케케묵은, 시대에 뒤진, 진부한',s:'frowzy, fusty, moldy, mucid, antiquated, stale, time-worn',r:'moist (축축한) + -y → 축축하게 오래되어 냄새 나는 → 퀴퀴한·케케묵은으로 고착 > 오랫동안 닫힌 지하실에서 나는 냄새의 장면이 원형'},
{n:2189,w:'egress',m:'n. ① 밖으로 나감; (우주선에서의) 탈출 ② 출구, 배출구 / vi. 밖으로 나가다',s:'emergence, escape, exit, outlet, vent',r:'e (out) + gress (go, 나가다) → 밖으로 나가는 것 → 출구·나가는 행위로 고착 > 비상구 표시가 된 출구의 장면이 원형'},
{n:2190,w:'amortize',m:'vt. ① (부채를) 분할 상환하다 ② (부동산을) 법인에게 양도하다',s:'',r:'a (to) + mort (death, 죽음) + -ize → 부채를 서서히 죽여 없애다 → (부채를) 상환하다·감가상각하다로 고착 > 대출금을 매달 조금씩 갚아나가는 장면이 원형'},
{n:2191,w:'brevity',m:'n. ① (지속 시간이) 짧음, 덧없음 ② 간결성, (문장 따위의) 간결함',s:'ephemerality, evanescence, transience, briefness, conciseness',r:'라틴어 brevis (short, 짧은) + -ity → 짧음의 성질 → 간결함·짧음으로 고착 > 핵심만 담아 짧게 쓴 한 문장의 장면이 원형'},
{n:2192,w:'compound',m:'v. ① 혼합하다, 합성하다 ② 악화시키다, 더 심각하게 만들다 / n. 혼합[복합, 합성]물 / a. 합성[복합]의',s:'blend, combine, mix, aggravate, exacerbate, worsen, composite, mixture, complex, composite, synthetic',r:'com (together) + pound (pour, 붓다) → 함께 부어 합치다 → 복합물·혼합하다·악화시키다로 고착 > 여러 성분을 섞어 새로운 물질을 만드는 장면이 원형'},
{n:2193,w:'frost',m:'n. ① 서리, 서릿발; 성에 ② 결빙; 추운 날씨; (태도 등의) 쌀쌀함 / v. 서리로 덮다; 된서리로 죽게 하다',s:'',r:'고대 영어 forst (freezing, 냉동) → 추위로 얼어붙는 현상 → 서리·얼리다로 고착 > 아침 풀잎마다 하얀 서리가 맺힌 장면이 원형'},
{n:2194,w:'asunder',m:'ad. a. 산산이 흩어져[흩어진], 따로따로 떨어져[떨어진]',s:'apart',r:'고대 영어 on sundran (apart, 분리되어) → 완전히 두 조각으로 나뉘어 → 산산이·둘로 나뉘어로 고착 > 밧줄이 팽팽하게 당겨지다 끊어져 두 토막 나는 장면이 원형'},
{n:2195,w:'genuflect',m:'vi. ① 정중히 무릎 꿇다[예배를 드리기 위해] ② 비굴한 태도를 보이다, 비굴하게 추종하다',s:'bow, kneel, kowtow, grovel',r:'라틴어 genu (knee, 무릎) + flect (bend, 구부리다) → 무릎을 구부리다 → 무릎 꿇다·굴종하다로 고착 > 왕 앞에 한쪽 무릎을 꿇는 장면이 원형'},
{n:2196,w:'retrospect',m:'n. 회상, 회고, 추억 / v. 회고[추억]하다; 회상에 잠기다[on]',s:'recollection, reminiscence',r:'retro (backward, 뒤로) + spect (look, 보다) → 뒤를 바라보다 → 회고·돌이켜봄으로 고착 > 앨범을 넘기며 지난 세월을 돌아보는 장면이 원형'},
{n:2197,w:'jaded',m:'a. 몹시 지친; 물린, 싫증난',s:'exhausted, tired, weary',r:'중세 영어 jade (worn-out horse, 늙은 말) → 지쳐 더 이상 흥미가 없는 → 지친·싫증난으로 고착 > 수없이 봐온 것에 이제 아무 감흥도 없는 장면이 원형'},
{n:2198,w:'lust',m:'n. ① (강한) 성욕, 육욕 ② (아주 강한) 욕망, 갈망',s:'carnality, concupiscence, libido, avidity, craving, desire',r:'고대 영어 lust (pleasure, 쾌락) → 절제 없이 타오르는 욕망 → 욕정·강한 욕망·열망으로 고착 > 눈에 불을 켜고 원하는 것을 쫓는 장면이 원형'},
{n:2199,w:'stultify',m:'vt. ① ~을 바보처럼 보이게 하다, 우롱하다 ② ~을 쓸모없게[헛되게] 만들다, 무효로 만들다',s:'',r:'라틴어 stultus (foolish, 어리석은) + -fy → 어리석게 만들다 → 무용지물로 만들다·지루하게 하다로 고착 > 훌륭한 아이디어를 관료주의가 무력화하는 장면이 원형'},
{n:2200,w:'invulnerable',m:'a. ① 손상되지 않는, 불사의, 무적의 ② 공격할 수 없는, 처부술[논파할] 수 없는',s:'indomitable, invincible, unbeatable, impregnable, inexpugnable',r:'in (not) + vulner (wound, 상처) + -able → 상처입힐 수 없는 → 무적의·난공불락의로 고착 > 어떤 공격도 통하지 않는 갑옷의 장면이 원형'},
{n:2201,w:'juvenile',m:'a. ① 젊은, 어린, 청소년의 ② 어린애 같은, 유치한, 미숙한 / n. 청소년, 아동',s:'adolescent, young, childish, immature, infantile, puerile, child, youth',r:'라틴어 juvenis (young, 젊은) + -ile (형용사형) → 젊은 성질 → 청소년의·유치한으로 고착 > 아직 어른이 되지 않은 청소년이 어리광을 부리는 장면이 원형'},
{n:2202,w:'expertise',m:'n. 전문가적 의견, 전문 지식[기술]',s:'know-how',r:'프랑스어 expert (experienced, 경험 있는) + -ise (명사형) → 경험에서 나온 전문 지식 → 전문 지식·전문 기술로 고착 > 수십 년 경험으로 눈 감고도 문제를 해결하는 장면이 원형'},
{n:2203,w:'surly',m:'a. ① 무뚝뚝한, 퉁명스러운, 뚱한, 불친절한 ② (날씨가) 고약한, 험악한',s:'dour, sullen, testy, nasty, rough, stormy, wretched',r:'중세 영어 sirly (lordly, 거만한) → 귀족처럼 불친절하고 무뚝뚝한 → 퉁명스러운으로 고착 > 도와달라는 말에 눈도 안 마주치며 퉁명스럽게 대하는 장면이 원형'},
{n:2204,w:'pry',m:'v. ① (남의 사생활을) 캐다, 파고들다, 캐묻다 ② 엿보다, 엿보고 다니다',s:'grill, inquire, interrogate, peek, peep, snoop',r:'중세 영어 prien (peer, 엿보다) → 좁은 틈으로 캐내듯 들여다보다 → 캐묻다·엿보다로 고착 > 열쇠 구멍으로 안을 들여다보는 장면이 원형'},
{n:2205,w:'acquisitive',m:'a. (지식·부·권력 등을) 원하는; 욕심이 많은, 탐욕스러운',s:'avaricious, covetous, greedy',r:'라틴어 acquirere (acquire, 얻다) + -ive (형용사형) → 얻으려는 성질이 강한 → 욕심이 많은·탐욕스러운으로 고착 > 더 가지려고 손에 잡히는 것마다 챙기는 장면이 원형'},
{n:2206,w:'detach',m:'vt. ① 떼어내다, 분리하다 ② (군대 등을) 파견[분견]하다',s:'disconnect, segregate, separate, dispatch',r:'de (away) + tach (fasten, 고정하다) → 고정된 것에서 때어내다 → 떼어내다·분리하다로 고착 > 벽에 붙은 포스터를 뜯어내는 장면이 원형'},
{n:2207,w:'cane',m:'n. ① 지팡이, 단장; 매, 회초리 ② (마디가 있는 식물의) 줄기',s:'rod, walking_stick, stalk, stem',r:'라틴어 canna (reed, 갈대) → 갈대처럼 속이 비고 단단한 줄기 → 지팡이·회초리·줄기로 고착 > 할아버지가 짚고 다니는 나무 지팡이의 장면이 원형'},
{n:2208,w:'insouciant',m:'a. 무관심한, 태평한',s:'carefree, indifferent, nonchalant, pococurante',r:'프랑스어 in (not) + soucier (care, 걱정하다) → 걱정하지 않는 → 무관심한·태평한으로 고착 > 주위가 아수라장이어도 여유롭게 커피를 마시는 장면이 원형'},
{n:2209,w:'scoop',m:'n. ① 국자; 주겁, 큰 숟가락 ② 최신 정보, (신문의) 특종 / v. ① 푸다, 뜨다, 퍼올리다 ② (특종을) 입수하다',s:'ladle, exclusive, dig',r:'중세 영어 scope (ladle, 국자) → 국자로 퍼올리듯 먼저 정보를 건져 올리다 → 국자·특종·퍼올리다로 고착 > 기자가 다른 언론보다 먼저 특종을 건져 올리는 장면이 원형'},
{n:2210,w:'apprentice',m:'n. 견습생, 도제; 초심자',s:'cub, learner, probationer, pupil, trainee',r:'고대 프랑스어 apprendre (learn, 배우다) → 배우는 사람 → 견습생·초심자로 고착 > 장인 옆에서 기술을 배우는 도제의 장면이 원형'},
{n:2211,w:'revert',m:'v. ① (본래 상태·습관·신앙으로) 되돌아가다[to] ② (처음 이야기·생각으로) 되돌아가다[to]',s:'retrovert, turn_back',r:'re (back) + vert (turn, 돌아가다) → 뒤로 돌아가다 → 원상태로 되돌아가다로 고착 > 개선됐던 것이 다시 예전 상태로 되돌아가는 장면이 원형'},
{n:2212,w:'brash',m:'a. ① 경솔한, 무모한 ② 버릇없는, 무례한, 건방진',s:'foolhardy, madcap, reckless, arrogant, bumptious, presumptuous',r:'고대 영어 bræsc (broken, 부서진) → 부서질 듯 무모하게 밀어붙이는 → 경솔한·버릇없는으로 고착 > 상황을 파악하지도 않고 무작정 뛰어드는 장면이 원형'},
{n:2213,w:'genealogy',m:'n. 가계(家系), 혈통; 계통, 계보',s:'ancestry, descent, lineage, pedigree',r:'그리스어 genea (race, 혈통) + log (study, 연구) + -y → 혈통을 연구하는 것 → 가계·계보로 고착 > 가족 나무가 위에서 아래로 가지치며 그려진 장면이 원형'},
{n:2214,w:'pressing',m:'a. ① 긴급한, 절박한 ② 간청하는, 귀찮게 조르는',s:'imperative, urgent',r:'라틴어 pressare (press, 누르다) + -ing → 강하게 눌러오는 → 긴급한·절박한으로 고착 > 마감이 코앞인데 아직 처리 못 한 일이 쌓인 장면이 원형'},

{n:2219,w:'congratulation',m:'n. 축하, 경축; (pl.) 축사',s:'celebration, felicitation',r:'con (together) + gratu (grace, 은혜) + -ation → 함께 기쁨을 나누는 것 → 축하·경축으로 고착 > 합격 소식에 친구들이 환호하며 달려오는 장면이 원형'},

{n:2226,w:'duplicity',m:'n. 표리부동, 불성실; 이중성',s:'double-dealing',r:'라틴어 duplex (double, 이중의) + -ity → 두 얼굴을 가진 것 → 표리부동·이중성으로 고착 > 앞에서는 웃고 뒤에서는 험담하는 장면이 원형'},
{n:2227,w:'stump',m:'n. ① (나무의) 그루터기 ② (연필·양초 등의) 쓰다 남은 동강 ③ (선거 등) 연설의 연단 / v. ① 쩔쩔매게 하다, 당황하게 하다 ② (선거) 유세를 하다',s:'snag, stub, butt, remainder, remnant, dais, platform, podium, rostrum, baffle, bewilder, confound, flummox, barnstorm, campaign, canvass, electioneer',r:'고대 노르드어 stumpr (tree stump, 그루터기) → 잘린 후 남은 것 → 그루터기·어리둥절하게 하다·유세로 고착 > 벌목 후 남은 나무 그루터기의 장면이 원형'},

{n:2231,w:'slime',m:'n. ① 차진 흙; 끈끈한 물질; 점액(粘液), (달팽이·물고기 등의) 진액 ② 악취가 나는 것',s:'sludge, mucus, filth, muck',r:'고대 영어 slim (mud, 진흙) → 끈끈하게 달라붙는 물질 → 점액·끈적한 물질로 고착 > 달팽이가 지나간 자리에 남은 끈적한 흔적의 장면이 원형'},

{n:2236,w:'panoply',m:'n. ① 장대한 진열[배열, 장관] ② (한 벌의) 갑옷과 투구; 완전한 장비; (도구의) 한 벌 ③ 덮개, 방어물; 정장; 훌륭한 장식[꾸밈]',s:'array, range, armaments, adornment, trappings',r:'그리스어 pan (all, 모든) + hopla (arms, 무기) → 완전한 갑옷 한 벌 → 장대한 진열·완전한 장비로 고착 > 박물관에 완전한 갑옷 한 벌이 진열된 장면이 원형'},
{n:2237,w:'dissipate',m:'v. ① (안개·구름 따위를) 흩뜨리다; (군중 따위를) 쫓아 흩어버리다; (열 따위를) 방산하다 ② (의심·공포 따위를) 일소하다 ③ 사라지다, 흩어져 없어져 버리다 ④ (시간·돈 등을) 하루루 쓰다, 낭비하다',s:'dispel, dissolve, prodigalize, squander, waste',r:'dis (apart) + sip (throw, 흩뿌리다) → 사방으로 흩어버리다 → 흩어지게 하다·낭비하다로 고착 > 안개가 햇볕에 서서히 사라지는 장면이 원형'},
{n:2238,w:'bipolar',m:'a. ① 상반되는, 양극단의 ② 조울증의, 조울증을 앓는',s:'antithetical, conflicting, contrary',r:'bi (two, 둘) + polar (극, 극단) + -ar → 두 극단 사이를 오가는 → 양극단의·조울증의로 고착 > 자석의 N극과 S극처럼 완전히 반대인 두 상태의 장면이 원형'},

{n:2241,w:'filch',m:'vt. 훔치다, 좀도둑질[슬쩍]하다',s:'steal, thieve',r:'중세 영어 filchen (pilfer, 슬쩍하다) → 눈치채지 못하게 살짝 훔치다 → 훔치다·좀도둑질하다로 고착 > 가게에서 작은 물건을 주머니에 슬쩍 넣는 장면이 원형'},

{n:2244,w:'installment',m:'n. ① 할부; 분할불의 1회분, 할부금 ② (전집·연속물 등의) 1회분',s:'easy_terms, monthly_payment, episode',r:'in (into) + stall (place, 위치) + -ment → 분할하여 자리에 놓는 것 → 할부·1회분으로 고착 > 매달 분할금을 내며 물건을 사는 장면이 원형'},

{n:2246,w:'belch',m:'v. ① 트림하다 ② (폭언·욕설 등을) 내뱉다[forth]; (가스·연기 등을) 내뿜다, 분출하다[out, forth]',s:'burp, emit, gush, puff',r:'고대 영어 bealcan (to belch, 트림하다) → 가스가 역류해 소리와 함께 나오다 → 트림하다·내뿜다로 고착 > 과식 후 가스가 역류해 트림이 나오는 장면이 원형'},
{n:2247,w:'terminology',m:'n. (전문) 용어',s:'jargon, lingo, term',r:'그리스어 terma (boundary, 경계) + log (word, 말) + -y → 특정 분야의 경계를 나타내는 말 → 전문 용어로 고착 > 의학 교과서에 가득한 전문 용어의 장면이 원형'},

{n:2249,w:'subject',m:'n. ① (논의 등의) 주제; 당면과제, 문제, 사안 ② (학교의) 학과, (시험) 과목; <문법> 주어, 주부 ③ (행위의) 대상, 소재; 실험대상, 피험자; 국민, 피지배자 / a. ① 지배를 받는; 복종하는; 종속하는 ② 걸리기 쉬운, 당하기 쉬운; (승인 따위를) 받아야 하는 / vt. (~을) 지배하에 두다, 종속시키다',s:'matter, theme, subordinate',r:'sub (under) + ject (throw, 던지다) → 아래로 던져진 → 주제·복종하는·종속시키다로 고착 > 왕 아래 복종하는 신민의 장면이 원형'},
{n:2250,w:'ornithology',m:'n. 조류학',s:'',r:'그리스어 ornis (bird, 새) + log (study) + -y → 새를 연구하는 학문 → 조류학으로 고착 > 쌍안경으로 나무 위 새를 관찰하는 장면이 원형'},
{n:2251,w:'hereditary',m:'a. ① 유전하는, 유전성의, 유전적인 ② 상속권에 의한, 세습의, 세습되는',s:'genetic, inheritable',r:'라틴어 heres (heir, 상속인) + -ary → 상속인에게 전해지는 → 유전하는·세습의로 고착 > 부모에게서 자식으로 전해지는 특질의 장면이 원형'},
{n:2252,w:'clemency',m:'n. ① (성격·성질의) 온화, 온순; 관대, 자비 ② (처벌·대상에 대한) 관용, 관대한 처분 ③ (날씨의) 온화함, 따뜻함',s:'charity, gentleness, leniency, mercy',r:'라틴어 clemens (mild, 온화한) + -y → 온화한 성질 → 관대·자비·온화함으로 고착 > 판사가 최소 형벌로 자비를 베푸는 장면이 원형'},
{n:2253,w:'impinge',m:'vi. 침범[침해]하다; ~에 영향[지장]을 주다; 부딪히다, 충돌하다',s:'',r:'im (against) + ping (strike, 치다) → 부딪혀 영향을 미치다 → 침범하다·충돌하다로 고착 > 빛이 표면에 부딪혀 반사되는 장면이 원형'},
{n:2254,w:'example',m:'n. ① 예, 보기, 실례; 전례 ② 본보기, 모범, 본; (벌로서의) 교훈, 경고',s:'instance, precedent, model, lesson',r:'ex (out) + ampl (take, 가져오다) → 밖으로 꺼내 보여주는 것 → 예·실례·모범으로 고착 > 칠판에 예시 문제를 하나 써서 보여주는 장면이 원형'},
{n:2255,w:'dim',m:'a. ① (빛·장소가) 어둑한, 어스레한 ② (형체가) 잘 안 보이는, 흐릿한; (기억이) 희미한, 어렴풋한',s:'dull, dusky, gloomy, murky, bleary, blurred, faint, hazy',r:'고대 영어 dimm (dark, 어두운) → 충분히 밝지 않아 어슴푸레한 → 어둑한·흐릿한으로 고착 > 멀리 가로등 하나만 켜진 안개 낀 골목의 장면이 원형'},
{n:2256,w:'buffoonery',m:'n. ① 광대짓, 익살, 해학 ② 저속한 농담',s:'clownery, drollery, jest, jocularity, joke, raillery',r:'이탈리아어 buffare (puff, 부풀리다) → 과장해서 우스꽝스럽게 하는 짓 → 광대짓·저속한 농담으로 고착 > 광대가 과장된 몸짓으로 웃음을 자아내는 장면이 원형'},
{n:2257,w:'corrode',m:'v. 부식시키다, 좀먹다; 부식하다',s:'erode, rot, rust',r:'con (completely) + rod (gnaw, 갉다) → 완전히 갉아 부식시키다 → 부식시키다·좀먹다로 고착 > 금속 표면이 녹슬어 갉아먹히는 장면이 원형'},
{n:2258,w:'ado',m:'n. ① 야단법석, 소동 ② 노고, 고생, 고심',s:'commotion, fuss, to-do, uproar, toil, travail',r:'중세 영어 at do (to do, 해야 할 것) → 해야 할 일로 인한 소동 → 야단법석·노고로 고착 > 별것 아닌 일에 온 집안이 법석을 떠는 장면이 원형'},
{n:2259,w:'stringent',m:'a. ① (법률·규칙·규정 등이) 엄중한, 엄격한 ② (자금이나 재정적 조건이) 긴박한, 절박한',s:'rigorous',r:'라틴어 stringere (bind tight, 꽉 묶다) + -ent → 꽉 조이는 → 엄격한·긴박한으로 고착 > 규정을 어기면 즉시 처벌하는 엄격한 규칙의 장면이 원형'},
{n:2260,w:'glacier',m:'n. 빙하',s:'',r:'프랑스어 glace (ice, 얼음) + -ier → 얼음 덩어리 → 빙하로 고착 > 수천 년 된 얼음이 산을 덮고 천천히 흘러내리는 장면이 원형'},
{n:2261,w:'prevaricate',m:'vi. 얼버무리다, 발뺌하다; 속이다, 거짓말하다',s:'dodge, equivocate, evade, lie',r:'pre (before) + varic (spread apart, 벌리다) → 발을 벌리고 이쪽저쪽으로 빠져나가다 → 얼버무리다·발뺌하다로 고착 > 질문에 이것도 저것도 아닌 대답으로 피해가는 장면이 원형'},
{n:2262,w:'revolution',m:'n. ① 혁명; 변혁 ② 회전(운동); 선회; 공전(公轉)',s:'coup, revolt,荒, rotation, turn',r:'re (again) + volut (roll, 굴러가다) → 다시 굴러 돌아오는 것 → 혁명·회전·공전으로 고착 > 지구가 태양을 한 바퀴 도는 장면이 원형'},
{n:2263,w:'exalt',m:'vt. ① (지위·명예 등을) 높이다, 승격시키다 ② 칭찬하다, 찬양하다',s:'elevate, promote, extol, glorify, laud',r:'ex (up) + alt (high, 높은) → 위로 높이 올리다 → 높이다·찬양하다로 고착 > 왕이 공신을 높은 지위로 올리는 장면이 원형'},
{n:2264,w:'libretto',m:'n. (오페라·음악극 등의) 가사, 대본',s:'',r:'이탈리아어 libro (book, 책) + -etto (작은) → 오페라의 작은 책, 가사집 → 오페라 대본으로 고착 > 지휘자 옆에 오페라 가사가 적힌 작은 책의 장면이 원형'},
{n:2265,w:'murky',m:'a. ① 매우 어두운, 깜깜한; 어둑어둑한 ② 아주 음산한 ③ (표현 등이) 애매한, 이해하기 어려운',s:'dark, dim, lightless, dismal, dreary, gloomy, obscure, unperceivable',r:'고대 노르드어 myrkr (dark, 어두운) + -y → 안개 낀 것처럼 어둡고 탁한 → 어두운·음산한·애매한으로 고착 > 안개 자욱한 항구에서 배가 희미하게 보이는 장면이 원형'},
{n:2266,w:'wilt',m:'v. ① (화초 등이) 시들다[시들게 하다] ② (사람이) 지치다, 풀이 죽다, 약해지다',s:'shrivel, wither, wizen, droop, languish, sag',r:'중세 영어 welken (wither, 시들다) → 물기를 잃고 축 늘어지다 → 시들다·지치다로 고착 > 물 없이 방치된 화분의 꽃이 고개를 숙이는 장면이 원형'},
{n:2267,w:'edict',m:'n. 칙령, 포고; 명령',s:'decree, mandate, ordinance, proclamation',r:'e (out) + dict (say, 말하다) → 밖으로 공식 선포하다 → 칙령·포고·명령으로 고착 > 왕이 왕실 인장이 찍힌 칙령을 발표하는 장면이 원형'},
{n:2268,w:'overlap',m:'v. ① 부분적으로 덮다; 부분적으로 ~위에 겹치다, 마주 겹치다 ② 일부분이 일치하다; (시간 등이) 중복되다',s:'overlay, superimpose',r:'over (위에) + lap (겹치다) → 위에 올라타며 겹치다 → 겹치다·중복되다로 고착 > 두 원이 서로 겹쳐 공통 영역을 만드는 장면이 원형'},
{n:2269,w:'contentious',m:'a. ① 논쟁[싸움]을 좋아하는 ② 논쟁적인, 논쟁을 불러일으키는',s:'argumentative, quarrelsome, controversial, disputable',r:'con (together) + tent (hold, 붙잡다) + -ious → 서로 붙잡고 싸우는 → 싸우기 좋아하는·논쟁적인으로 고착 > 작은 의견 차이도 큰 논쟁으로 번지는 장면이 원형'},
{n:2270,w:'boulevard',m:'n. 넓은 가로수 길; 큰길, 대로',s:'avenue, thoroughfare',r:'프랑스어 boulevard (originally bollwerk, bulwark, 성벽) → 성벽이 철거된 자리에 만든 넓은 길 → 넓은 가로수 길로 고착 > 양쪽에 나무가 늘어선 넓은 도로의 장면이 원형'},
{n:2271,w:'roil',m:'v. ① (액체를) 휘젓다, 흐리게 하다 ② 요동치다, 요동치게 만들다 ③ 화나게 만들다, 발끈하게 하다',s:'agitate, beat, churn, stir, whip, whisk, jolt, plunge, shake, thrash, irritate, miff, offend, peeve, vex',r:'프랑스어 rouiller (make muddy, 흐리게 하다) → 저어서 흐리게 만들다 → 휘젓다·화나게 하다로 고착 > 맑은 물 바닥을 발로 휘저어 흙탕물을 만드는 장면이 원형'},
{n:2272,w:'impostor',m:'n. 사기꾼, 협잡꾼; (성명·신분 등을) 사칭하는 사람',s:'charlatan, mountebank',r:'라틴어 imponere (impose, 속이다) + -or → 자신을 다른 사람으로 속이는 자 → 사기꾼·사칭하는 사람으로 고착 > 유명인을 사칭해 사람들을 속이는 장면이 원형'},
{n:2273,w:'slink',m:'vi. 살금살금[가만히] 걷다, 살며시 도망치다; (여자가) 간통들을 걷다 / n. 좀도둑',s:'creep, sneak',r:'고대 영어 slincan (crawl, 기다) → 눈에 띄지 않게 살금살금 움직이다 → 살금살금 걷다·도망치다로 고착 > 들키지 않게 고양이처럼 살금살금 빠져나가는 장면이 원형'},
{n:2274,w:'niggardly',m:'a. ① 인색한, 인색하게 구는 ② (액수·분량이) 아주 적은, 빈약한, 근소한',s:'miserly, parsimonious, stingy',r:'고대 노르드어 hnøggr (stingy, 인색한) + -ly → 극도로 인색하게 → 인색한·아주 적은으로 고착 > 손에 쥔 것을 한 푼도 내놓으려 하지 않는 장면이 원형'},
{n:2275,w:'chimney',m:'n. (잡기·기관차·선공장 등의) 굴뚝',s:'funnel, smokestack, stack',r:'그리스어 kaminos (furnace, 화덕) → 연기가 빠져나가는 통로 → 굴뚝으로 고착 > 집 지붕에서 연기가 피어오르는 굴뚝의 장면이 원형'},
{n:2276,w:'deviate',m:'v. (상도·원칙 따위에서) 벗어나다, 빗나가다',s:'depart, stray, swerve',r:'de (from) + vi (way, 길) + -ate → 길에서 벗어나다 → 벗어나다·빗나가다로 고착 > 정해진 경로를 이탈해 다른 방향으로 가는 장면이 원형'},
{n:2277,w:'alma mater',m:'n. 모교(母校), 출신교',s:'',r:'라틴어 alma (nourishing, 기르는) + mater (mother, 어머니) → 길러준 어머니 → 모교로 고착 > 졸업생이 오랜만에 모교를 방문하는 장면이 원형'},
{n:2278,w:'friction',m:'n. ① (두 물체의) 마찰 ② 알력(軋轢), 불화, 갈등',s:'abrasion, rubbing, conflict, hostility, opposition',r:'라틴어 fricare (rub, 문지르다) + -tion → 두 물체가 문질러지는 것 → 마찰·알력·갈등으로 고착 > 두 면이 맞닿아 열이 나도록 문질러지는 장면이 원형'},
{n:2279,w:'sultry',m:'a. 무더운, 찌는 듯이 더운, 후덥지근한',s:'muggy, sweltering',r:'고대 영어 sweltan (die of heat, 더위로 죽다) → 숨막히게 더운 → 무더운·후덥지근한으로 고착 > 열기와 습기가 뒤엉켜 숨쉬기 힘든 여름날의 장면이 원형'},
{n:2280,w:'tome',m:'n. 큰 책, 학술서적',s:'',r:'그리스어 tomos (cut, 잘린 것) → 두루마리를 잘라 엮은 두꺼운 책 → 큰 책·학술서적으로 고착 > 책상 위에 놓인 백과사전처럼 두꺼운 책의 장면이 원형'},
{n:2281,w:'expatriate',m:'n. (고국이 아닌) 국외 거주자, 해외 근무[주재]자 / v. 국외로 추방하다',s:'banish, deport, exile, expel',r:'ex (out) + patri (fatherland, 고국) + -ate → 고국 밖으로 나간 사람 → 해외 거주자·추방하다로 고착 > 타국에서 생활하는 해외 파견 직원의 장면이 원형'},
{n:2282,w:'promiscuous',m:'a. ① (성생활이) 난잡한[문란한] ② 난잡한, 뒤범벅의; 엉망인',s:'disorderly, indiscriminate',r:'pro (forward) + misc (mix, 섞다) + -uous → 앞뒤 없이 섞이는 → 난잡한·성관계가 문란한으로 고착 > 구분 없이 뒤섞인 혼란한 장면이 원형'},
{n:2283,w:'virtue',m:'n. ① 미덕, 덕, 선; 선행, 덕행 ② 장점, 가치',s:'goodness, integrity, morality, advantage, merit',r:'라틴어 virtus (manliness, 덕) → 덕망 있는 성품 → 미덕·장점으로 고착 > 유혹 앞에서도 올바름을 지키는 장면이 원형'},
{n:2284,w:'gloss',m:'v. ① 광택을 내다 ② 겉치레를 하다; 그럴듯하게 얼버무리다, 속이다[over] / n. ① 광택, 윤 ② 허식, 겉치레',s:'polish, shine, luster, sheen, varnish, veneer',r:'고대 노르드어 glossi (flame, 빛) → 표면에서 빛나는 광택 → 광택·겉치레·얼버무리다로 고착 > 페인트 칠로 표면을 반짝이게 만드는 장면이 원형'},
{n:2285,w:'cipher',m:'n. ① (숫자의) 영(零) ② 암호, 암호문 ③ 하찮은 사람[것]',s:'naught, nil, zero, code, cryptogram, nobody, nonentity, nullity',r:'아랍어 sifr (zero, 영) → 아무 가치 없는 영(0)에서 암호로 → 영·암호·하찮은 사람으로 고착 > 종이에 암호문이 가득 적힌 장면이 원형'},
{n:2286,w:'doggerel',m:'a. (시가) 우스꽝스러운; 조잡한, 졸렬한 / n. 엉터리 시; 광시(狂詩)',s:'awkward, bungling, clumsy, unskillful',r:'중세 영어 dogerel (bad verse, 엉터리 시) → 개(dog)처럼 저급한 시 → 엉터리 시·조잡한으로 고착 > 박자도 맞지 않는 우스꽝스러운 시의 장면이 원형'},
{n:2287,w:'clique',m:'n. (배타적인) 소집단, 파벌, 패거리, 도당',s:'coterie, faction, posse',r:'프랑스어 cliquer (click, 딸깍 소리) → 딸깍 소리처럼 서로 딱 맞는 패거리 → 파벌·패거리로 고착 > 학교 안에서 특정 무리끼리만 어울리는 장면이 원형'},
{n:2288,w:'twilight',m:'n. ① (해진 뒤·해뜨기 전의) 어스름, 해질녘, 황혼 ② (the ~) (전성기·성공 뒤에 오는) 쇠퇴기',s:'dusk, sunset, decline, ebb',r:'고대 영어 twi (between, 사이) + light (빛) → 낮과 밤 사이의 빛 → 황혼·어스름·쇠퇴기로 고착 > 해가 지며 하늘이 오렌지빛과 보라빛으로 물드는 장면이 원형'},
{n:2289,w:'barter',m:'v. 물물교환하다, 교역하다',s:'exchange, swap, trade',r:'고대 프랑스어 barater (exchange, 교환하다) → 돈 없이 물건으로 거래하다 → 물물교환하다로 고착 > 농부가 채소와 어부의 생선을 맞바꾸는 장면이 원형'},
{n:2290,w:'anesthetic',m:'n. 마취제, 마취약 / a. ① 마취의 ② (몸이) 무감각한, 마비 상태인',s:'narcotic, stupefacient, narcose, paralytic, paralyzed',r:'그리스어 an (not) + esthetic (feel, 느끼다) → 느끼지 못하게 하는 것 → 마취제·무감각한으로 고착 > 의사가 마취 주사를 놓아 감각을 없애는 장면이 원형'},
{n:2291,w:'yeoman',m:'n. 소지주; 중류 농민, 자작농',s:'independent_farmer',r:'중세 영어 yoman (young man, 젊은이) → 독립적으로 땅을 소유한 자작농 → 소지주·자작농으로 고착 > 자기 밭을 직접 경작하는 자작농의 장면이 원형'},
{n:2292,w:'florid',m:'a. ① (안색이) 불그레한, 혈색이 좋은 ② 화려한, 현란한, 장식이 많은',s:'reddish, rubicund, ruddy, flamboyant, ornate',r:'라틴어 floridus (flowery, 꽃이 핀) → 꽃처럼 화려한 → 혈색이 좋은·화려한으로 고착 > 화사한 색채로 가득 채워진 바로크 장식의 장면이 원형'},
{n:2293,w:'schizophrenia',m:'n. 정신 분열증, 조현병; 분열성 성격',s:'',r:'그리스어 schiz (split, 쪼개다) + phrenia (mind, 정신) → 정신이 쪼개진 상태 → 정신 분열증·조현병으로 고착 > 현실과 환각이 뒤섞인 혼란한 장면이 원형'},
{n:2294,w:'pep',m:'n. 원기; 기력 / vt. 원기를 북돋우다, 격려하다[up]',s:'energy, life, spirit, vitality',r:'중세 영어 pepper (후추) → 후추처럼 기운을 돋우는 자극 → 원기·기력·격려하다로 고착 > 코치가 선수들에게 경기 전 힘을 불어넣는 장면이 원형'},
{n:2295,w:'articulate',m:'a. ① (발음이) 또렷한, 분명한 ② (생각·느낌을) 분명하게 표현하는 / v. ① 또렷하게 발음하다 ② (생각·감정을) 분명히 표현하다, 조리 있게 설명하다',s:'clear, clear-cut, precise, coherent, eloquent, expressive, fluent, enunciate, pronounce, explain, express',r:'라틴어 articulare (divide into joints, 관절로 나누다) → 관절처럼 분명히 나눠 말하다 → 또렷하게 발음하다·분명히 표현하다로 고착 > 단어 하나하나를 또렷하게 발음하는 장면이 원형'},
{n:2296,w:'malpractice',m:'n. (의사의) 부정치료; 의료과실, 오진; 배임[위법] 행위',s:'misconduct, negligence',r:'mal (bad, 나쁜) + practice (시행) → 나쁘게 시행하는 것 → 의료과실·배임 행위로 고착 > 의사의 실수로 환자에게 피해가 가는 장면이 원형'},
{n:2297,w:'reprove',m:'v. 나무라다, 꾸짖다, 비난하다',s:'chide, condemn, rebuke',r:'re (again) + prov (prove, 증명하다) → 잘못을 증명해 가리키다 → 나무라다·꾸짖다로 고착 > 선생님이 틀린 부분을 짚어 조용히 꾸짖는 장면이 원형'},
{n:2298,w:'upholstery',m:'n. 가구; 실내 장식품(커튼·쿠션·융단 등)',s:'',r:'up (위에) + holster (support, 받치다) → 위를 받쳐 꾸미는 것 → 가구 내장재·실내 장식으로 고착 > 소파에 두툼한 천을 씌워 편하게 만드는 장면이 원형'},
{n:2299,w:'symmetry',m:'n. (면·선·중심축에 관하여) 대칭',s:'balance, equilibrium, equipoise, trade-off',r:'그리스어 syn (together) + metron (measure, 측정) → 함께 측정하면 같은 → 대칭으로 고착 > 나비 날개의 양쪽이 완전히 같은 장면이 원형'},
{n:2300,w:'quiescent',m:'a. ① 조용한, 잠잠한; 정지한, 움직이지 않는 ② (병 등이 특히 잠정적으로) 진행이 중단된 ③ (글자가) 발음되지 않는, 묵음의',s:'calm, stationary, dormant, silent',r:'라틴어 quiescere (rest, 쉬다) + -ent → 쉬고 있는 상태 → 조용한·정지한으로 고착 > 화산이 아무 활동 없이 잠잠히 있는 장면이 원형'},
{n:2301,w:'invalidate',m:'vt. ① (서류·계약·선거 등을) 무효화하다 ② (생각·주장 등이) 틀렸음을 입증하다',s:'annul, cancel, nullify / confute, disprove',r:'in (not) + valid (strong, 유효한) + -ate → 유효하지 않게 만들다 → 무효화하다·틀렸음을 입증하다로 고착 > 도장이 찍힌 계약서에 빨간 X 표시로 무효를 선언하는 장면이 원형'},
{n:2302,w:'maleficent',m:'a. 유해한, 나쁜; 나쁜 짓을 하는',s:'baleful, deleterious, detrimental, injurious',r:'male (bad, 나쁜) + fic (do, 하다) + -ent → 나쁜 짓을 하는 → 유해한·나쁜 짓을 하는으로 고착 > 독이 든 사과를 건네는 악당의 장면이 원형'},
{n:2303,w:'palpitate',m:'vi. ① (심장·가슴이) 뛰다, 두근거리다, 고동치다 ② (몸이) 떨리다',s:'beat, pulsate, pulse, throb / quiver, tremble',r:'라틴어 palpitare (throb, 두근거리다) → 빠르게 두근거리며 떨리다 → 심장이 뛰다·떨리다로 고착 > 긴장으로 심장이 귀에까지 들릴 것처럼 뛰는 장면이 원형'},
{n:2304,w:'delirium',m:'n. ① (병으로 인한) 망상, 헛소리, 정신착란 ② 무아지경',s:'insanity, lunacy, madness / ecstasy, entrancement, rapture, trance, transport',r:'라틴어 delirare (go off the furrow, 이랑을 벗어나다) → 이성의 궤도를 벗어난 상태 → 망상·정신착란·무아지경으로 고착 > 고열로 헛소리를 하며 날뛰는 장면이 원형'},
{n:2305,w:'squeal',m:'v. ① 빽 소리[비명]를 지르다 ② 밀고하다, 배반하다[on] ③ 불평하다, 항의하다 / n. ① 다소 긴 비명 (소리) ② 밀고, 배반 ③ 불평, 항의',s:'scream, screech, shriek, yell / grass, inform on[against], rat on / complain, moan, protest, squawk',r:'중세 영어 squelen (cry out, 소리치다) → 날카롭게 비명을 지르다 → 비명 지르다·밀고하다로 고착 > 공포에 날카로운 비명을 지르는 장면이 원형'},
{n:2306,w:'profane',m:'a. ① 신성모독의, 불경한 ② 세속적인 / vt. 신성을 더럽히다[목독하다]',s:'irreverent, sacrilegious / secular, temporal / defile, desecrate',r:'pro (before/outside) + fan (temple, 신전) → 신전 밖의, 세속적인 → 불경한·세속적인으로 고착 > 신성한 곳에서 불경스러운 언행을 하는 장면이 원형'},
{n:2307,w:'adultery',m:'n. 간통, 불의(不義)',s:'affair, infidelity, liaison',r:'라틴어 adulterare (corrupt, 타락시키다) → 결혼 서약을 타락시키다 → 간통·불의로 고착 > 혼인 서약을 어기는 장면이 원형'},
{n:2308,w:'suck',m:'v. ① (액체 등을) 빨다, 흡수하다, 빨아들이다 ② 빨아 먹다, 마시다 ③ 엉망이다, 형편없다',s:'absorb, soak up, swallow up / drink, quaff, sip, slurp',r:'고대 영어 sucan (suck, 빨다) → 빨아들이다 → 빨다·흡수하다·형편없다로 고착 > 아기가 젖병을 빠는 장면이 원형'},
{n:2309,w:'cutthroat',m:'a. ① 살인의, 잔인한, 흉악한 ② (경쟁 등이) 치열한, 먹느냐 먹히느냐의 / n. 살인자',s:'cruel, ferocious, murderous, ruthless, vicious / dog-eat-dog, fierce, intense',r:'cut (베다) + throat (목) → 목을 베는 → 살인의·치열한으로 고착 > 한 치의 양보 없이 피 말리는 경쟁을 하는 장면이 원형'},
{n:2310,w:'nonsense',m:'n. ① 터무니없는 생각[말], 허튼소리 ② 아무 의미가 없는[뜻이 통하지 않는] 말',s:'drivel, hot air, twaddle, waffle / jabberwocky',r:'non (not) + sense (의미) → 의미가 없는 것 → 터무니없는 말·허튼소리로 고착 > 아무 논리도 없는 엉뚱한 말을 늘어놓는 장면이 원형'},
{n:2311,w:'benighted',m:'a. 무지몽매한, 미개한, 문화가 뒤떨어진',s:'savage, uncivilized, unenlightened',r:'be + night (밤) + -ed → 밤 속에 갇힌 → 무지몽매한·미개한으로 고착 > 등불도 없이 어두운 무지 속에 갇힌 장면이 원형'},
{n:2312,w:'extrapolate',m:'v. (기존 자료에 기초하여) 추론[추정]하다',s:'deduce, infer, reason',r:'extra (beyond) + pol (smooth, 다듬다) + -ate → 기존 자료 너머로 매끄럽게 연장하다 → 추론하다·추정하다로 고착 > 그래프 선을 연장해 미래 값을 예측하는 장면이 원형'},
{n:2313,w:'complicity',m:'n. 공모, 공범, 연루',s:'collusion, conspiracy, involvement',r:'con (together) + plic (fold, 겹치다) + -ity → 함께 겹쳐 얽힌 것 → 공모·공범·연루로 고착 > 두 사람이 몰래 눈빛을 교환하며 공모하는 장면이 원형'},
{n:2314,w:'repose',m:'n. ① 휴식, 휴양; 수면 ② 침착, 평정[평형], 평안 / v. 드러눕다, 눕다; 쉬다, 휴식하다',s:'access, relaxation, rest / calmness, composure, equanimity, tranquility / lie, recline, relax, rest',r:'re (again) + pos (place, 놓다) → 다시 편히 내려놓다 → 휴식·평정으로 고착 > 모든 걱정을 내려놓고 편히 누운 장면이 원형'},
{n:2315,w:'indent',m:'v. ① (절의) 첫 행을 들여 쓰다 ② (해안선)에 들쭉날쭉 굽어 들다 / n. 오목한 곳, 음푹한 곳',s:'',r:'in (into) + dent (tooth, 이빨) → 이빨로 물어 들어간 곳 → 들여 쓰다·오목한 곳으로 고착 > 문서 첫 행이 안쪽으로 들여 쓰인 장면이 원형'},
{n:2316,w:'divine',m:'a. 신성한, 신(神)의, 성스러운 / v. (직감으로) 알다, 예측하다',s:'hallowed, holy, religious, sacred / forecast, foresee, predict, prophesy',r:'라틴어 divinus (of a god, 신의) → 신에 속하는 → 신성한·예측하다로 고착 > 신탁을 받아 미래를 예언하는 장면이 원형'},
{n:2317,w:'grapple',m:'v. ① 잡다, 붙잡다; 맞붙어 싸우다 ② (해결책을 찾아) 고심하다, 씨름하다[with]',s:'struggle, tussle, wrestle / wrestle',r:'고대 프랑스어 grappin (hook, 갈고리) → 갈고리로 잡아 붙들다 → 맞붙어 싸우다·씨름하다로 고착 > 레슬러 두 명이 서로를 붙잡고 엉켜 싸우는 장면이 원형'},
{n:2318,w:'vernal',m:'a. ① 봄의, 봄 같은; 봄에 나타나는 ② 청춘의, 젊은',s:'spring, springlike / young, youthful',r:'라틴어 vernus (of spring, 봄의) + -al → 봄의 성질 → 봄의·청춘의로 고착 > 새싹이 돋아나는 이른 봄 들판의 장면이 원형'},
{n:2319,w:'fuss',m:'n. ① 공연한 소란 ② 싸움; 말다툼',s:'commotion, stir / quarrel',r:'중세 영어 fusse (commotion, 소동) → 작은 일에 과도하게 반응하는 소동 → 공연한 소란·말다툼으로 고착 > 사소한 일에 난리가 난 장면이 원형'},
{n:2320,w:'sedate',m:'a. 차분한, 조용한',s:'calm, serene, tranquil',r:'라틴어 sedare (calm, 가라앉히다) → 흥분을 가라앉힌 → 차분한·조용한으로 고착 > 소란스러운 자리에서도 조용히 앉아 있는 장면이 원형'},
{n:2321,w:'despoil',m:'vt. (사람·장소에서 재산 등을) 빼앗다, 약탈하다',s:'depredate, loot, pillage, plunder',r:'de (completely) + spoil (빼앗다) → 완전히 빼앗아 황폐화하다 → 약탈하다로 고착 > 침략자가 마을의 모든 것을 빼앗는 장면이 원형'},
{n:2322,w:'injunction',m:'n. ① 명령, 지령, 훈령 ② (법원의) 금지[강제] 명령',s:'command, dictate, instruction, mandate',r:'in (upon) + junct (join, 연결하다) + -ion → 법이 특정 행위와 연결시켜 명하는 것 → 금지 명령·훈령으로 고착 > 법원이 특정 행위를 즉시 중지하라고 명하는 장면이 원형'},
{n:2323,w:'tumble',m:'v. ① 넘어지다; 굴러 떨어지다 ② (가격 등이) 폭락하다; 급강하하다 ③ (건물 등이) 무너지다, 붕괴하다 / n. ① 넘어지기, 구르기 ② (주가 등의) 폭락, 하락',s:'drop, fall, stumble, topple / decline, fall, plummet / collapse, crumple',r:'고대 영어 tumbian (dance, 구르다) → 제어 없이 굴러떨어지다 → 넘어지다·폭락하다로 고착 > 계단에서 발을 헛디뎌 굴러 떨어지는 장면이 원형'},
{n:2324,w:'mode',m:'n. ① (특정한) 방식, 모드; (기계 등이 가동 중에 있는) 어떤 특정한 상태 ② (옷 등의) 유행, 스타일; 관습, 관행',s:'way; state / style, custom',r:'라틴어 modus (measure, 방식) → 정해진 방식이나 상태 → 방식·유행으로 고착 > 기계가 특정 작동 상태에 들어가는 장면이 원형'},
{n:2325,w:'attenuate',m:'v. ① ~을 가늘게 하다, 작게 하다, 묽게 하다 ② (함량·효리가치 따위를) 줄이다; ~을 희박하게[희석]하다',s:'reduce, weaken / diminish, lessen',r:'ad (to) + tenu (thin, 가늘게) + -ate → 점점 가늘게 만들다 → 가늘게 하다·희석하다로 고착 > 굵은 선이 끝으로 갈수록 가늘어지는 장면이 원형'},
{n:2326,w:'cantrip',m:'n. ① 주문(呪文) ② 장난',s:'charm, conjuration, incantation, spell / mischief, prank',r:'스코틀랜드 방언 cantrip (trick, 장난) → 마법 주문처럼 묘한 장난 → 주문·장난으로 고착 > 마법사가 주문을 외우는 장면이 원형'},
{n:2327,w:'swoop',m:'v. ① (사냥감 등을) 갑자기 덮치다, 급습하다 ② (새·비행기가) 휙 내려앉다, 급강하하다',s:'bust, hawk, raid / nosedive, plummet',r:'고대 영어 swapan (sweep, 쓸다) → 위에서 아래로 훑으며 급강하하다 → 급습하다·급강하하다로 고착 > 독수리가 먹이를 향해 급강하하는 장면이 원형'},
{n:2328,w:'requiem',m:'n. 진혼곡, 만가(挽歌), 비가',s:'dirge, elegy, threnody',r:'라틴어 requies (rest, 안식) → 망자에게 안식을 구하는 음악 → 진혼곡·만가로 고착 > 교회에서 엄숙하게 연주되는 망자를 위한 음악의 장면이 원형'},
{n:2329,w:'bastion',m:'n. 요새, 성채, 보루',s:'bulwark, citadel, fortress, stronghold',r:'이탈리아어 bastione (build, 건축하다) → 튼튼하게 쌓아 올린 방어 구조물 → 요새·보루로 고착 > 성벽 모퉁이에 돌출된 방어 탑의 장면이 원형'},
{n:2330,w:'convoke',m:'vt. (회의·의회 등을) 소집하다',s:'assemble, congregate, convene, muster, summon',r:'con (together) + vok (call, 부르다) → 함께 불러 모으다 → 소집하다로 고착 > 의장이 국회의원들을 긴급 소집하는 장면이 원형'},
{n:2331,w:'erect',m:'a. ① 똑바로 선, 직립(直立)의 ② (머리카락 등이) 곤두선, 빳빳한 / v. ① (몸·기둥 등을) 세우다, 똑바로 세우다 ② (건물을) 세우다, 짓다; 조립하다',s:'perpendicular, straight, upright, vertical / bristled, horrent / rear, set up, stand / build, construct, raise',r:'e (out) + rect (straight, 곧은) → 밖으로 곧게 세우다 → 직립의·세우다로 고착 > 쓰러진 기둥을 다시 곧게 세우는 장면이 원형'},
{n:2332,w:'forensic',m:'a. ① 법의학적인, 범죄 과학 수사의 ② 법정의, 법정에 관한 ③ 변론[토론]에 적합한 / n. (pl.) 변론[토론]술',s:'',r:'라틴어 forum (public place, 광장) + -ic → 광장(법정)에 관한 → 법의학적인·법정의·변론에 적합한으로 고착 > 법정에서 증거를 내밀며 논증하는 장면이 원형'},
{n:2333,w:'preferment',m:'n. ① 승진, 승급; 발탁 ② 우선권',s:'advancement, promotion / priority',r:'pre (before) + fer (carry, 나르다) + -ment → 앞으로 나르는 것 → 승진·발탁·우선권으로 고착 > 줄 서 있는 많은 사람 중 한 명을 앞으로 내세우는 장면이 원형'},
{n:2334,w:'outsource',m:'v. (타사 일을) 하청하다, 외주 제작하다, 외주를 주다',s:'',r:'out (밖으로) + source (원천) → 밖에서 원천을 구하다 → 외주를 주다·하청하다로 고착 > 내부 대신 외부 업체에 업무를 맡기는 장면이 원형'},
{n:2335,w:'kindred',m:'n. ① 친척, 일가 ② 유사, 동종 / a. ① 비슷한, 동류의, 관련된 ② 혈족의, 친척의',s:'kin, kinsfolk, relative / affinity, likeness, semblance / akin, analogous, similar / cognate, consaquineous, related',r:'고대 영어 cyndren (kin, 친족) → 같은 기원을 가진 사람들 → 친척·동류의로 고착 > 가족 모임에 모인 일가친척의 장면이 원형'},
{n:2336,w:'galore',m:'a. (명사 뒤에 쓰여) 풍부한, 많은',s:'abundant, bountiful, plentiful',r:'아일랜드어 go leor (enough, 충분히) → 넘쳐날 만큼 충분한 → 풍부한·많은으로 고착 > 축제 테이블에 음식이 넘쳐나는 장면이 원형'},
{n:2337,w:'hover',m:'v. ① (허공을) 맴돌다 ② (수줍거나 자신감 없는 태도로 특히 다른 사람 주위를) 맴돌다[서성이다] ③ (무엇의 가까이·불확실한 상태에) 계속 맴돌다[머물다]',s:'',r:'고대 노르드어 hufra (linger, 맴돌다) → 한 곳에서 계속 맴도는 → 맴돌다·서성이다로 고착 > 헬리콥터가 같은 자리에서 공중에 떠있는 장면이 원형'},
{n:2338,w:'antediluvian',m:'a. ① 구식인, 시대에 뒤진 ② Noah의 대홍수 이전의',s:'ancient, antiquated, archaic, old-fashioned',r:'ante (before) + diluv (flood, 홍수) + -ian → 대홍수 이전의 → 구식인·시대에 뒤진으로 고착 > 노아 방주 이전 시대처럼 완전히 낡은 것의 장면이 원형'},
{n:2339,w:'occasion',m:'n. ① (특정한) 경우, 때, 시(時); 기회, 호기(好機), 알맞은 때 ② 축전(祝典), 행사 ③ 이유, 근거; 원인',s:'event, occurrence / cause, reason',r:'ob (toward) + cas (fall, 떨어지다) → 기회가 딱 맞아 떨어지는 → 경우·기회·행사로 고착 > 모든 조건이 딱 맞아 기회가 주어지는 장면이 원형'},
{n:2340,w:'infernal',m:'a. ① 지옥의; 악마 같은, 극악무도한 ② 지독한, 지긋지긋한, 정말 싫은',s:'nether; devilish, fiendish',r:'라틴어 infernus (below, 아래) + -al → 지하(지옥)의 성질 → 지옥의·극악무도한·지독한으로 고착 > 불길이 타오르는 지옥 같은 광경의 장면이 원형'},
{n:2341,w:'cataract',m:'n. ① 큰 폭포; (강의) 급류 ② 큰 비, 호우, 억수; 홍수 ③ 백내장(白內障)',s:'waterfall; rapids / downpour; deluge, flood',r:'그리스어 katarrhaktes (down-rushing, 아래로 쏟아지는) → 위에서 아래로 세차게 쏟아지는 것 → 큰 폭포·백내장으로 고착 > 거대한 폭포가 굉음을 내며 쏟아지는 장면이 원형'},
{n:2342,w:'retrogress',m:'vi. ① 되돌아가다, 되돌아오다, 후퇴하다, 역행하다 ② 퇴화하다, 퇴보하다, 쇠퇴하다',s:'back, backtrack, fall back / regress, retrograde',r:'retro (backward, 뒤로) + gress (go, 가다) → 뒤로 걸어가다 → 후퇴하다·퇴화하다로 고착 > 발전하다 멈추고 과거로 되돌아가는 장면이 원형'},
{n:2343,w:'brackish',m:'a. 소금기 있는, 맛이 짠',s:'briny, saline, saltish, salty',r:'네덜란드어 brak (salty, 짠) + -ish → 약간 짠 성질 → 소금기 있는으로 고착 > 민물과 바닷물이 만나는 기수 지역의 물맛 장면이 원형'},
{n:2344,w:'whitewash',m:'n. (과실·결점 등을 감추기 위한) 겉꾸밈, 속임수 / v. ~의 결점[과실]을 감추다, 겉꾸미다',s:'camouflage, disguise / cover up, gloss over',r:'white (하얀) + wash (씻다) → 하얗게 덮어 씻어내듯 감추다 → 겉꾸밈·결점 감추다로 고착 > 더러운 벽을 흰 페인트로 덮어 깨끗해 보이게 하는 장면이 원형'},
{n:2345,w:'transaction',m:'n. ① (업무) 처리(과정) ② 거래, 매매',s:'the bargain, covenant, deal',r:'trans (across) + act (do, 행하다) + -ion → 사이를 가로질러 행하는 것 → 거래·처리로 고착 > 은행 창구에서 돈을 주고받는 장면이 원형'},
{n:2346,w:'congeal',m:'v. ① 얼다, 얼리다, 응결시키다[하다] ② (주위·원리 등을) 고정하다[경직시키다]',s:'clot, coagulate, curdle, solidify',r:'con (together) + geal (freeze, 얼다) → 함께 얼어 굳다 → 얼다·응결하다로 고착 > 식은 수프 위에 기름이 굳어 굳는 장면이 원형'},
{n:2347,w:'extramarital',m:'a. 혼외의, 혼외정사의, 간통[불륜]의',s:'',r:'extra (outside) + marital (결혼의) → 결혼 밖의 → 혼외의·불륜의로 고착 > 배우자 몰래 다른 관계를 맺는 장면이 원형'},
{n:2348,w:'legion',m:'n. ① (고대 로마의) 군대, 부대 ② (사람·물건의) 큰 떼, 다수 / a. [서술적] 많은, 무수하여',s:'army, force, troop, unit / drove, horde, host, mass, multitude',r:'라틴어 legio (army, 군대) → 수천 명의 로마 군단 → 군대·큰 떼·많은으로 고착 > 방패와 창으로 무장한 수천 명의 로마 군단이 행진하는 장면이 원형'},
{n:2349,w:'punctilious',m:'a. 세심한, 꼼꼼한',s:'conscientious, fastidious, meticulous, scrupulous',r:'라틴어 punctum (point, 점) + -ilious → 작은 점 하나까지 신경 쓰는 → 세심한·꼼꼼한으로 고착 > 서류의 점 하나, 쉼표 하나까지 확인하는 장면이 원형'},
{n:2350,w:'misapprehension',m:'n. 잘못된 생각, 오해',s:'delusion, misconception, misunderstanding',r:'mis (wrongly) + apprehend (이해하다) + -ion → 잘못 이해한 것 → 오해로 고착 > 같은 말을 완전히 다르게 받아들이는 두 사람의 장면이 원형'},
{n:2351,w:'draconian',m:'a. (법·처벌 등이) 매우 엄격한, 가혹한',s:'rigid, rigorous, severe, stern, strict',r:'Dracon (기원전 7세기 아테네의 가혹한 법전 제정자) → 드라콘의 가혹한 법처럼 → 매우 엄격한·가혹한으로 고착 > 사소한 위반에도 극형을 선고하는 장면이 원형'},
{n:2352,w:'glimmer',m:'n. 깜박이는 빛, 희미한 빛 / vi. 희미하게 빛나다',s:'gleam / flicker, shimmer',r:'고대 영어 glitenian (glitter, 반짝이다) → 희미하게 깜박이며 빛나다 → 희미한 빛으로 고착 > 어둠 속에서 저 멀리 희미하게 깜박이는 불빛의 장면이 원형'},
{n:2353,w:'stratify',m:'v. ① 층을 이루게 하다; 층을 이루다 ② (사회 등을) 계층화하다, 계급으로 나누다',s:'',r:'라틴어 stratum (layer, 층) + -fy → 층으로 나누다 → 층을 이루다·계층화하다로 고착 > 퇴적암이 층층이 쌓인 단면의 장면이 원형'},
{n:2354,w:'curfew',m:'n. ① 만종(晩鐘), 인경, 저녁 종 ② 야간 통행 금지령, 통행금지 시간',s:'',r:'고대 프랑스어 couvrefeu (cover fire, 불 덮기) → 저녁에 불을 덮으라는 신호의 종소리 → 야간 통행 금지령으로 고착 > 종소리와 함께 모두가 집 안으로 들어가는 장면이 원형'},
{n:2355,w:'molest',m:'vt. ① (여성·아동에게) 짓궂게 굴다, 성추행하다 ② 괴롭히다',s:'assault, harass / annoy, bother, disturb, harry, plague',r:'라틴어 molestare (trouble, 괴롭히다) → 원치 않는 방식으로 괴롭히다 → 짓궂게 굴다·성추행하다로 고착 > 원하지 않는 접촉으로 불쾌해하는 장면이 원형'},
{n:2356,w:'insurgent',m:'n. 반란자, 폭도 / a. 반란[폭동]을 일으킨, 모반하는',s:'mutineer, rebel / insubordinate, mutinous, rebellious',r:'in (into) + surg (rise, 일어나다) + -ent → 안에서 일어나는 반란자 → 반란자·폭도·모반하는으로 고착 > 무기를 들고 정부에 맞서 봉기하는 장면이 원형'},
{n:2357,w:'bedlam',m:'n. 소란한 장소; 대소동, 혼란, 아수라장',s:'chaos, pandemonium, tumult, turmoil',r:'Bethlem (베들레헴 수도원, 런던의 정신병원) → 정신병원처럼 혼란스러운 곳 → 대소동·아수라장으로 고착 > 모든 것이 통제 불능의 혼란 속에 빠진 장면이 원형'},
{n:2358,w:'antiseptic',m:'n. 소독제, 방부제 / a. 소독이 되는; 소독[살균]된',s:'disinfectant, preservative / sterilized',r:'anti (against) + sept (putrefy, 부패하다) + -ic → 부패에 맞서는 → 소독의·방부제로 고착 > 상처에 소독제를 발라 세균을 없애는 장면이 원형'},
{n:2359,w:'condemn',m:'vt. ① 비난하다, 규탄하다[for] ② 유죄 판결을 내리다; 형을 선고하다 ③ 운명지우다[to]',s:'blame, censure, denounce, reproach / convict, sentence / destine, doom, fate',r:'con (completely) + demn (harm, 해치다) → 완전히 해로운 것으로 판정하다 → 비난하다·유죄 판결하다로 고착 > 판사가 망치를 두드리며 유죄를 선고하는 장면이 원형'},
{n:2360,w:'ruthless',m:'a. 무자비한, 가차 없는, 인정사정없는',s:'merciless, pitiless, relentless',r:'ruth (pity, 연민) + -less (없는) → 연민이 없는 → 무자비한·가차 없는으로 고착 > 상대가 아무리 애원해도 냉혹하게 밀어붙이는 장면이 원형'},
{n:2361,w:'equanimity',m:'n. (마음의) 평정, 침착, 냉정',s:'aplomb, composure, serenity, tranquility',r:'equi (equal, 같은) + anim (spirit, 정신) + -ity → 정신이 균형 잡힌 상태 → 마음의 평정·침착으로 고착 > 어떤 상황에서도 흔들리지 않는 표정의 장면이 원형'},
{n:2362,w:'surrogate',m:'a. 대리의, 대용의 / n. 대리인, 대행자, 대용물 / vt. 대리[대용]로 임명하다',s:'acting, substitutionary, vicarious / deputy, proxy, replacement, substitute / replace, supersede',r:'sub (in place of) + rog (ask, 요청하다) + -ate → 대신 들어서도록 요청된 → 대리의·대행자로 고착 > 본인 대신 다른 사람이 역할을 맡는 장면이 원형'},
{n:2363,w:'overhear',m:'v. (상대방 모르게 남의 대화를) 우연히 듣다; 엿듣다, 도청하다',s:'eavesdrop',r:'over (위에서) + hear (듣다) → 대화 위로 흘러들어 듣다 → 우연히 듣다·엿듣다로 고착 > 칸막이 너머의 대화가 귀에 들어오는 장면이 원형'},
{n:2364,w:'wreck',m:'n. ① 난파 ② 파괴, 파멸 ③ 난파선, 잔해 / v. ① 난파시키다 ② 파괴하다, 부수다 ③ 망가뜨리다, 끝장내다',s:'shipwreck / destruction, ruin / break, demolish, destroy, ruin, smash / spoil',r:'고대 노르드어 rek (drift, 표류물) → 폭풍에 부서진 채 표류하는 배 → 난파·파멸·부수다로 고착 > 암초에 부딪혀 산산조각 난 배의 장면이 원형'},
{n:2365,w:'homily',m:'n. 설교; 훈계',s:'the discourse, lecture, sermon',r:'그리스어 homilia (conversation, 대화) → 회중을 향한 종교적 대화·강론 → 설교·훈계로 고착 > 신부가 신자들에게 교훈을 설교하는 장면이 원형'},
{n:2366,w:'dizzy',m:'a. 현기증 나는, 어지러운; 아찔한',s:'dazed, giddy, vertiginous, woozy',r:'고대 영어 dysig (foolish, 어리석은) → 정신이 빙빙 도는 → 현기증 나는·어지러운으로 고착 > 빠르게 빙글빙글 돌다가 비틀거리는 장면이 원형'},
{n:2367,w:'condiment',m:'n. 양념, 조미료',s:'flavoring, seasoner, seasoning, spice',r:'라틴어 condire (season, 양념하다) → 음식을 맛있게 만드는 것 → 양념·조미료로 고착 > 음식 위에 소금과 후추를 뿌리는 장면이 원형'},
{n:2368,w:'fiddle',m:'n. ① 바이올린 ② 사기, 사취 / v. ① (손가락으로) 만지작거리다 ② 빈둥빈둥 시간을 보내다[about, around]',s:'violin / fraud, scam / meddle / mess around',r:'고대 영어 fithele (violin, 바이올린) → 바이올린처럼 이리저리 만지작거리다 → 바이올린·만지작거리다·사기로 고착 > 손가락으로 물건을 이리저리 만지작거리는 장면이 원형'},
{n:2369,w:'precipitous',m:'a. ① 가파른, 절벽의, 깎아지른 ② 황급한, 급작스러운; 경솔한, 무모한',s:'steep / sudden; hasty',r:'라틴어 praeceps (headlong, 거꾸로 떨어지는) + -ous → 머리를 아래로 곧장 떨어지는 → 가파른·경솔한으로 고착 > 수직에 가까운 절벽 앞에 선 장면이 원형'},
{n:2370,w:'endurance',m:'n. ① 인내, 참을성, 인내력 ② 지구력; 내구성 ③ (견뎌야 할) 시련, 고난',s:'bent, patience, stickability / stamina; durability / hardship, ordeal',r:'en (in) + dur (hard, 단단한) + -ance → 단단하게 버티는 것 → 인내·지구력으로 고착 > 마라톤 42km를 끝까지 버티며 달리는 장면이 원형'},
{n:2371,w:'regiment',m:'n. ① 공식 연대 ② 큰 무리 / vt. 엄격히[획일적으로] 관리하다, 엄격히 훈련시키다',s:'',r:'라틴어 regere (rule, 지배하다) → 규율로 통제하는 군사 단위 → 연대·엄격히 관리하다로 고착 > 군인들이 획일적인 훈련을 받는 장면이 원형'},
{n:2372,w:'peregrination',m:'n. 여행, 여정, 유람',s:'journey, tour, trip',r:'라틴어 peregrinus (foreign, 외국의) + -ation → 먼 타국을 여행하는 것 → 여행·여정으로 고착 > 먼 나라를 향해 긴 여정을 떠나는 장면이 원형'},
{n:2373,w:'commiserate',m:'v. ① 가볍게 여기다, 불쌍하게 여기다 ② 동정하다; 조의를 표하다[with]',s:'pity / compassionate; condole, sympathize',r:'con (together) + miser (wretched, 불쌍한) + -ate → 함께 불쌍히 여기다 → 동정하다·조의를 표하다로 고착 > 고통받는 사람 옆에 앉아 함께 슬퍼하는 장면이 원형'},
{n:2374,w:'manslaughter',m:'n. (고의적이 아닌) 살인, 과실치사',s:'unpremeditated homicide',r:'man (사람) + slaughter (도살) → 의도치 않게 사람을 죽이다 → 과실치사·살인으로 고착 > 실수로 사고가 나 사람이 죽는 장면이 원형'},
{n:2375,w:'trump',m:'v. (더 나은 말이나 행동으로 상대방을) 이기다, 능가하다 / n. 으뜸패; 비장의 수단, 마지막 패',s:'beat, surpass',r:'네덜란드어 tromp (trumpet, 나팔) → 나팔처럼 결정적 순간에 울리는 으뜸패 → 으뜸패·능가하다로 고착 > 카드 게임에서 마지막 순간 으뜸패를 내는 장면이 원형'},
{n:2376,w:'bumpy',m:'a. ① (지면이) 평탄치 않은, 울퉁불퉁한 ② 흥망성쇠[기복]가 심한 / n. 충돌; 혹',s:'pitted, rough, uneven / checkered, roller-coaster',r:'bump (충돌, 혹) + -y → 충돌이 많은 → 울퉁불퉁한·기복이 심한으로 고착 > 돌투성이 도로를 달리며 차가 덜컹거리는 장면이 원형'},
{n:2377,w:'vehicle',m:'n. ① 차량, 탈것, 운송 수단 ② (감정 표현·목표 달성 등의) 수단, 매개체',s:'conveyance, transport / means, medium',r:'라틴어 vehere (carry, 나르다) → 나르는 수단 → 차량·수단·매개체로 고착 > 사람과 짐을 싣고 달리는 운송 수단의 장면이 원형'},
{n:2378,w:'adjunct',m:'n. 부속물, 부가물; 보조자, 조수 / a. 부속된; 보조의, 임시의',s:'accessory / attached; auxiliary',r:'ad (to) + junct (join, 연결하다) → ~에 부가적으로 연결된 것 → 부속물·보조자로 고착 > 주된 것에 덧붙여 보조하는 역할의 장면이 원형'},
{n:2379,w:'courier',m:'n. 운반[배달]원; 급사',s:'bearer, messenger',r:'고대 프랑스어 courir (run, 달리다) → 빨리 달려 전달하는 사람 → 배달원·급사로 고착 > 중요 서류를 오토바이로 빠르게 배달하는 장면이 원형'},
{n:2380,w:'lurid',m:'a. ① (이야기·범죄 등이) 소름이 끼치는, 무서운, 끔찍한 ② 선정적인, 야한',s:'ghastly, grisly, gruesome, hideous / garish, gaudy, loud, sensational',r:'라틴어 luridus (pale yellow, 창백한 노란색) → 섬뜩하게 창백한 빛깔의 → 소름끼치는·선정적인으로 고착 > 범죄 현장의 섬뜩한 사진의 장면이 원형'},
{n:2381,w:'extradite',m:'vt. (도주 범인을) 인도하다; 인도받다, 인수하다',s:'',r:'ex (out) + tradit (hand over, 넘기다) → 밖으로 넘겨주다 → 범인을 인도하다로 고착 > 국경을 넘어 도주한 범인을 해당국에 넘기는 장면이 원형'},
{n:2382,w:'gruff',m:'a. ① 거친, 퉁명스러운 ② 목소리가 걸걸한',s:'abrupt, blunt, brief, brusque / croaky, hoarse, husky',r:'저지 독일어 grof (coarse, 거친) → 목소리나 태도가 거칠고 퉁명스러운 → 거친·걸걸한으로 고착 > 굵고 거친 목소리로 짧게 대답하는 장면이 원형'},
{n:2383,w:'nondescript',m:'a. n. 정체를 알 수 없는 (사람[것]); 특징이 없는 (사람[것])',s:'commonplace, featureless, undistinguished',r:'non (not) + descript (described, 묘사된) → 특별히 묘사할 것이 없는 → 특징이 없는으로 고착 > 지나쳐도 기억에 남지 않는 평범한 사람의 장면이 원형'},
{n:2384,w:'outskirts',m:'n. (도시·읍 등의) 변두리, 교외',s:'border, edge',r:'out (밖) + skirts (가장자리) → 도시 가장자리 밖 → 변두리·교외로 고착 > 도심에서 벗어난 외곽 지역의 장면이 원형'},
{n:2385,w:'forlorn',m:'a. ① (장소나 집이) 버려진, 황량한 ② 쓸쓸해 보이는, 외로운 ③ 희망 없는, 절망적인',s:'abandoned, deserted / desolate, lonely / desperate, hopeless',r:'고대 영어 forloren (lost, 잃어버린) → 완전히 버려진 → 버려진·외로운·희망 없는으로 고착 > 아무도 없는 황량한 곳에 홀로 남겨진 장면이 원형'},
{n:2386,w:'inebriate',m:'vt. 취하게 하다; 도취시키다 / a. 술에 취한',s:'intoxicate / drunk',r:'in (into) + ebri (drunk, 취한) + -ate → 취한 상태로 만들다 → 취하게 하다·도취시키다로 고착 > 포도주를 마시며 점점 취해가는 장면이 원형'},
{n:2387,w:'prime',m:'a. ① 첫째의, 수위의, 가장 중요한 ② 최초의, 원시적인 ③ 기초적인, 근본적인 / n. 전성기; 청춘 / vt. 준비하다',s:'',r:'라틴어 primus (first, 첫째) → 첫째의 성질 → 가장 중요한·전성기·준비하다로 고착 > 활짝 피어 인생의 전성기를 누리는 장면이 원형'},
{n:2388,w:'approbation',m:'n. 승인, 찬성, 허가',s:'approval, consent, sanction',r:'ap (to) + prob (test, 시험하다) + -ation → 시험해 보고 허락하는 것 → 승인·찬성·허가로 고착 > 위원회가 검토 후 손을 들어 찬성하는 장면이 원형'},
{n:2389,w:'flunk',m:'v. (시험 등에서) 실패하다, 낙제하다[시키다]',s:'drop out, fail',r:'18세기 미국 속어 flunk (fail, 실패하다) → 시험에 떨어지다 → 낙제하다·실패하다로 고착 > 시험지에 빨간 F 점수가 찍힌 장면이 원형'},
{n:2390,w:'scurvy',m:'a. 상스러운, 천한, 한심한 / n. 괴혈병',s:'contemptible, low, mean',r:'고대 노르드어 skyrbjugr (swollen, 부은) → 비타민C 부족으로 잇몸이 붓는 병 → 괴혈병·상스러운으로 고착 > 괴혈병으로 잇몸이 붓고 이가 빠지는 장면이 원형'},
{n:2391,w:'milestone',m:'n. 이정표; 중대 시점, 획기적인 사건',s:'',r:'mile (마일) + stone (돌) → 도로에 거리를 표시한 돌 → 이정표·획기적 사건으로 고착 > 역사의 중요한 분기점을 표시하는 기념비의 장면이 원형'},
{n:2392,w:'expurgate',m:'vt. (책이나 기록에서 부적당한 부분을) 삭제하다',s:'bowdlerize, censor, redact',r:'ex (out) + purg (cleanse, 정화하다) + -ate → 밖으로 꺼내 정화하다 → 부적당한 부분을 삭제하다로 고착 > 편집자가 부적절한 내용을 가위로 오려내는 장면이 원형'},
{n:2393,w:'crass',m:'a. ① 우둔한, 어리석은, 무신경한 ② 심한, 지독한',s:'insensitive, stupid / nasty',r:'라틴어 crassus (thick, 두꺼운) → 두꺼운 것처럼 둔감한 → 우둔한·무신경한으로 고착 > 상황을 전혀 파악 못 하고 엉뚱한 말을 하는 장면이 원형'},
{n:2394,w:'idolatry',m:'n. ① 우상숭배 ② 맹목적 숭배, 심취',s:'the idol worshipping / adoration, apotheosis, worship',r:'그리스어 eidolon (image, 형상) + latria (worship, 숭배) → 형상을 숭배하는 것 → 우상숭배·맹목적 숭배로 고착 > 신상 앞에 엎드려 절하는 장면이 원형'},
{n:2395,w:'uxorious',m:'a. 아내에게 무른, 애처가인',s:'',r:'라틴어 uxor (wife, 아내) + -ious → 아내에게 지나치게 고분고분한 → 애처가인으로 고착 > 아내의 모든 요구를 무조건 따르는 남편의 장면이 원형'},
{n:2396,w:'bungle',m:'v. ~을 엉망으로 하다; 망치다, 실수하다 / n. 실수',s:'blunder, botch, flub / blunder, mistake, muff',r:'스웨덴어 bangla (work inefficiently, 서투르게 일하다) → 서투르게 망쳐버리다 → 엉망으로 하다·실수하다로 고착 > 조심하다 오히려 더 엉망이 된 장면이 원형'},
{n:2397,w:'refection',m:'n. ① 기분 전환, 위안, 휴양; 원기 회복 ② (간단한) 식사, 간식',s:'recreation; refreshment / light meal, nosh, snack',r:'re (again) + fect (make, 만들다) + -ion → 다시 기운을 만드는 것 → 원기 회복·간단한 식사로 고착 > 긴 여행 중 잠깐 멈춰 간식을 먹으며 쉬는 장면이 원형'},
{n:2398,w:'denigrate',m:'vt. ① 명예를 훼손하다 ② 경시하다, 폄하하다, 깎아내리다',s:'defame, libel, slander / belittle, derogate, disparage',r:'de (down) + nigr (black, 검은) + -ate → 검게 칠해 아래로 끌어내리다 → 명예를 훼손하다·폄하하다로 고착 > 누군가의 평판을 시커멓게 만드는 장면이 원형'},
{n:2399,w:'sympathy',m:'n. ① 동정, 연민 ② 호의, 찬성, 동조, 지지, 동의 ③ 문상, 위문',s:'commiseration, pity / agreement, endorsement, favor, support / condolence',r:'그리스어 syn (together) + pathos (feeling, 감정) → 함께 같은 감정을 느끼는 것 → 동정·연민·동조로 고착 > 상대의 슬픔을 함께 느끼며 위로하는 장면이 원형'},
{n:2400,w:'telltale',m:'n. ① 고자질쟁이, 밀고자 ② (비밀·속사정 등을) 폭로하는 것; 표시, 증거 / a. 숨길 수 없는, 비밀을 폭로하는, 고자질하는',s:'blabbermouth, sneak, squealer / evidence, indication / revealing',r:'tell (말하다) + tale (이야기) → 이야기를 고자질하는 → 밀고자·폭로하는으로 고착 > 숨겨진 비밀을 드러내는 단서의 장면이 원형'},
{n:2401,w:'frail',m:'a. ① 연약한, 허약한 ② 깨지기 쉬운, 부서지기 쉬운',s:'delicate, feeble, tender, vulnerable / breakable, brittle, crump, fragile',r:'라틴어 fragilis (fragile, 부서지기 쉬운) → 약해서 쉽게 부러지는 → 연약한·깨지기 쉬운으로 고착 > 바람에 금방 꺾일 것 같은 가느다란 줄기의 장면이 원형'},
{n:2402,w:'soporific',m:'a. 최면성의; 졸리게 하는, 잠이 오는 / n. 수면제, 마취제',s:'hypnagogic, drowsy, somniferous / hypnotic',r:'라틴어 sopor (deep sleep, 깊은 잠) + -fic (make, 만들다) → 깊은 잠을 만드는 → 졸리게 하는·수면제로 고착 > 지루한 강의를 듣다 눈꺼풀이 무거워지는 장면이 원형'},
{n:2403,w:'ethics',m:'n. ① (단수취급) 윤리학 ② 도의, 도덕, 윤리',s:'morals / morality, principles',r:'그리스어 ethos (character, 성격) + -ics (학문) → 성격·행동 방식을 연구하는 학문 → 윤리학·도덕으로 고착 > 옳고 그름의 기준을 따지며 토론하는 장면이 원형'},
{n:2404,w:'defalcate',m:'vi. (공금·위탁 재산 등을) 부정하게 사용하다, 부당 유용하다, 횡령하다',s:'appropriate, embezzle, misappropriate, peculate',r:'라틴어 de (away) + falc (sickle, 낫) → 낫으로 잘라내듯 공금을 몰래 빼내다 → 횡령하다로 고착 > 회계 담당자가 공금을 조금씩 빼돌리는 장면이 원형'},
{n:2405,w:'hyperbole',m:'n. 과장(법); 과장 표현, 과장 어구',s:'exaggeration, overstatement, rhetoric',r:'그리스어 hyper (over, 지나치게) + bole (throw, 던지다) → 지나치게 던져 올리다 → 과장법·과장 표현으로 고착 > 산더미만 한 숙제라고 말하는 장면이 원형'},
{n:2406,w:'confess',m:'v. (과실·죄를) 고백하다, 자백하다, 토로하다; 인정하다',s:'confide, profess / acknowledge, admit',r:'con (completely) + fess (speak, 말하다) → 완전히 털어놓아 말하다 → 고백하다·자백하다로 고착 > 무릎 꿇고 모든 것을 털어놓는 장면이 원형'},
{n:2407,w:'indenture',m:'n. 계약서, 약정서; (보통 pl.) 도제(徒弟)살이 계약서, 노예계약서 / vt. 도제살이 계약서로 고용하다',s:'',r:'in (into) + dent (tooth, 이빨) → 이빨 모양으로 들쑥날쑥 잘라 계약 증거를 남기다 → 계약서·도제 계약으로 고착 > 양쪽이 가지는 계약서를 들쑥날쑥 잘라 나누는 장면이 원형'},
{n:2408,w:'strut',m:'n. ① 지주, 버팀목 ② 점잔뺀 걸음걸이, 활보; 과시, 자만 / v. 뽐내며 걷다, 과시하다',s:'brace, prop / prance, stalk, swagger',r:'고대 영어 strutian (stand out stiffly, 뻣뻣이 서다) → 뻣뻣하게 당당히 걷다 → 지주·뽐내며 걷다로 고착 > 가슴을 내밀고 거들먹거리며 걷는 장면이 원형'},
{n:2409,w:'reverse',m:'v. ① 거꾸로 하다, 반대로 하다; 뒤집다, 뒤엎다 ② 바꾸어 놓다, 교환하다, 전환하다 ③ (주와·결정 등을) 뒤집다, 번복하다 / a. 반대의, 거꾸로의; 역(逆)의 / n. 역(逆), 반대',s:'overthrow, overturn / change, shift, switch / annul, cancel, repeal, revoke / contrary, converse, opposite',r:'re (back) + vers (turn, 돌다) → 뒤로 돌리다 → 거꾸로 하다·번복하다·반대로 고착 > 차를 후진시키는 장면이 원형'},
