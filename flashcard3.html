{n:2410,w:'plank',m:'n. ① 널빤지, 두꺼운 판자 ② 정당 강령의 항목[조항]',s:'board / platform',r:'고대 노르드어 planki (board, 판자) → 두꺼운 나무 판자 → 널빤지·강령 항목으로 고착 > 다리를 놓기 위해 두꺼운 판자를 까는 장면이 원형'},
{n:2411,w:'dialectic',m:'n. 변증법(문답에 의해 진리에 도달하는 방법) / a. 변증법적인, 문답식의',s:'',r:'그리스어 dialektike (art of debate, 토론술) → 문답으로 진리를 찾는 방법 → 변증법으로 고착 > 질문과 답변을 주고받으며 진리에 다가가는 장면이 원형'},
{n:2412,w:'alimony',m:'n. (보통 남편이 아내에게 주는) 별거[이혼] 수당, 위자료',s:'separation allowance, maintenance',r:'라틴어 alimonia (nourishment, 양식) → 헤어진 후에도 부양을 위해 주는 것 → 위자료·별거 수당으로 고착 > 이혼 후 법원이 정한 생활비를 매달 송금하는 장면이 원형'},
{n:2413,w:'bustle',m:'v. 분주히 돌아다니다, 서두르다 / n. 야단법석, 혼잡, 붐빔',s:'fuss, hurry, rush / ado, fuss, hustle-bustle, stir, tumult',r:'중세 영어 bustlen (be active, 활발히 움직이다) → 분주하게 이리저리 움직이다 → 분주히 돌아다니다·야단법석으로 고착 > 시장 골목에서 사람들이 북적이는 장면이 원형'},
{n:2414,w:'structure',m:'n. ① 구조, 체제, 짜임새 ② 구조물, 건축물 / vt. 조직하다, 구조화하다',s:'construction, design, fabric, organization / building, construction, edifice, fabrication / form, orchestrate, organize',r:'라틴어 struere (build, 짓다) + -ure (명사형) → 지어진 것 → 구조·건축물·조직하다로 고착 > 뼈대가 세워지는 건물의 골격 장면이 원형'},
{n:2415,w:'protean',m:'a. ① 변화무쌍한, 갖가지로 변하는 ② (배우가) 여러 가지 역할을 소화하는',s:'ever-changing, kaleidoscopic',r:'그리스 신화 Proteus (형태를 자유로이 바꾸는 바다 신) → 프로테우스처럼 끊임없이 형태를 바꾸는 → 변화무쌍한으로 고착 > 카멜레온이 배경에 따라 색을 바꾸는 장면이 원형'},
{n:2416,w:'latch',m:'n. (문이나 대문의) 걸쇠, 빗장 / v. ~에 걸쇠를 걸다; 걸쇠가 걸리다',s:'bar, bolt, clasp, fastening / fasten, lock, secure',r:'고대 영어 læccan (grasp, 잡다) → 잡아 걸어두는 잠금장치 → 걸쇠·빗장으로 고착 > 문에 걸쇠를 딸깍 걸어 잠그는 장면이 원형'},
{n:2417,w:'myopic',m:'a. 근사(안)의, 근시안적인',s:'nearsighted, shortsighted',r:'그리스어 myein (close, 닫다) + ops (eye, 눈) → 눈을 가늘게 떠야 보이는 → 근시의·근시안적인으로 고착 > 먼 것을 보려고 눈을 가늘게 뜨는 장면이 원형'},
{n:2418,w:'gauntlet',m:'n. ① (갑옷의) 손가락개; (승마·펜싱 등에 쓰는) 긴 장갑 ② 태형 ③ 시련(試鍊)',s:'flogging / test, trial',r:'고대 프랑스어 gantelet (little glove, 작은 장갑) → 갑옷의 긴 장갑·두 줄의 매질 형벌 → 긴 장갑·시련으로 고착 > 두 줄로 선 병사들 사이를 뛰어가는 태형의 장면이 원형'},
{n:2419,w:'shred',m:'n. ① 조각, 파편 ② 약간, 소량, 극히 조금',s:'fragment, particle / bit, scrap',r:'고대 영어 screade (piece cut off, 잘린 조각) → 잘려 나간 작은 조각 → 조각·파편·극히 조금으로 고착 > 서류를 세절기로 잘게 찢는 장면이 원형'},
{n:2420,w:'capitulate',m:'vi. (오랫동안 거부하던 것에) 굴복하다, 항복하다',s:'succumb, surrender, yield',r:'라틴어 capitulum (chapter, 장) → 조항을 정해 항복 조건을 협상하다 → 굴복하다·항복하다로 고착 > 흰 깃발을 들고 항복하는 장면이 원형'},
{n:2421,w:'treason',m:'n. ① 반역, 반역죄, 모반 ② 배신, 배반, 불충, 불성실',s:'rebellion, revolt, sedition, treachery / betrayal, disloyalty, perfidy',r:'라틴어 traditio (handing over, 넘겨줌) → 나라를 적에게 넘겨주다 → 반역·배신으로 고착 > 국가 기밀을 적국에 팔아넘기는 장면이 원형'},
{n:2422,w:'buzzword',m:'n. (사업가·정치과학자 등이 쓰는) 전문 용어; (언론 등에서 많이 사용되는) 유행어',s:'',r:'buzz (윙윙 소리) + word (말) → 벌처럼 윙윙거리며 퍼지는 말 → 유행어·전문 용어로 고착 > 회의에서 모두가 반복해 쓰는 유행 단어의 장면이 원형'},
{n:2423,w:'nubile',m:'a. ① (여성이) 결혼 적령기의, 요령의, 시집갈 나이의 ② (젊은 여자가) 성적 매력이 있는',s:'marriageable / desirable, foxy, sexy',r:'라틴어 nubere (marry, 결혼하다) + -ile → 결혼할 수 있는 나이의 → 결혼 적령기의로 고착 > 결혼 적령기에 달한 젊은 여성의 장면이 원형'},
{n:2424,w:'criterion',m:'n. (판단·평가를 위한) 표준, 기준 (pl. criteria)',s:'gauge, norm, standard, touchstone, yardstick',r:'그리스어 krinein (judge, 판단하다) + -ion → 판단의 기준 → 표준·기준으로 고착 > 평가 기준표를 보며 항목을 채점하는 장면이 원형'},
{n:2425,w:'scour',m:'v. ① 문질러 닦다, 윤내다 ② 비벼 빨다, 세탁하다 ③ (~을 구해서) 찾아다니다, 찾아 헤매다[after, for]',s:'polish, scrub / clean, wash / comb, forage, ransack, search',r:'고대 노르드어 skura (clean, 닦다) → 세게 문질러 깨끗이 닦다 → 문질러 닦다·찾아다니다로 고착 > 냄비를 철수세미로 힘껏 문지르는 장면이 원형'},
{n:2426,w:'fever',m:'n. ① (병으로 인한) 열, 발열; 열병 ② 열중, 열광, 흥분',s:'',r:'라틴어 febris (fever, 열) → 몸이 달아오르는 열 → 발열·열중·열광으로 고착 > 체온계 눈금이 높이 올라가는 장면이 원형'},
{n:2427,w:'armchair',m:'a. ① 이론뿐인, 탁상공론의 ② (책 등을 통해) 간접적으로 아는, 간접 경험의',s:'academic, impractical / indirect',r:'arm (팔걸이) + chair (의자) → 팔걸이 달린 편한 의자에 앉아 → 이론뿐인·간접 경험의로 고착 > 현장에 나가지 않고 의자에 앉아 이론만 늘어놓는 장면이 원형'},
{n:2428,w:'cosmetic',m:'n. ① (보통 pl.) 화장품 ② (비유) 결점을 감추는 것 / a. ① 화장용의 ② 겉치레의, 표면적인',s:'makeup, toiletries / ostensible, perfunctory, superficial',r:'그리스어 kosmos (order, 질서) + -tic → 질서 있게 꾸미는 → 화장품·겉치레의로 고착 > 화장으로 얼굴을 꾸미는 장면이 원형'},
{n:2429,w:'grouse',m:'vi. 불평하다, 투덜대다[about]',s:'complain, grumble, moan, mutter',r:'스코틀랜드어 grouse (complain, 불평하다) → 들꿩처럼 꽥꽥 불평 소리를 내다 → 불평하다·투덜대다로 고착 > 사소한 것에도 끊임없이 불만을 표시하는 장면이 원형'},
{n:2430,w:'knot',m:'n. ① 매듭; (줄기의) 마디, 옹이, 혹 ② 분규, 곤란, 혼란, 어려운 일, 난제 ③ (부부 등의) 인연, 연분, 유대',s:'gnarl / complication, difficulty, tangle / bond, connection, relation, ties',r:'고대 영어 cnotta (knot, 매듭) → 실을 묶어 만든 매듭 → 매듭·난제·인연으로 고착 > 두 줄을 꽁꽁 묶어 풀기 어렵게 만드는 장면이 원형'},
{n:2431,w:'riveting',m:'a. 관심을 사로잡는, 황홀케 하는, 매혹적인',s:'captivating, engrossing, enthralling, fascinating',r:'rivet (대갈못으로 고정하다) + -ing → 대갈못처럼 시선을 단단히 고정시키는 → 매혹적인·관심을 사로잡는으로 고착 > 눈을 뗄 수 없어 꼼짝 않고 보는 장면이 원형'},
{n:2432,w:'chill',m:'n. ① 냉기, 한기; 오한 ② 냉담, 냉명함; 오싹함 / a. ① 차가운, 냉랭한; 오싹함 ② 냉담한, 쌀쌀한 / v. ① 식히다, 냉각하다 ② 춥게 하다, 오싹하게 하다 ③ (계획·사람에게) 냉담하게 되다; 열의가 식다; 냉정해지다',s:'chilly, cold, frigid, wintry / cool, refrigerate / appall, horrify, thrill',r:'고대 영어 ciele (cold, 차가움) → 몸을 오싹하게 만드는 냉기 → 냉기·오싹함·냉담한으로 고착 > 갑자기 찬바람이 불어 온몸이 소름 돋는 장면이 원형'},
{n:2433,w:'pulverize',m:'v. 가루로 만들다, 빻다',s:'crush, grind, mill, pound',r:'라틴어 pulvis (dust, 먼지) + -ize → 먼지처럼 가루로 만들다 → 가루로 만들다·빻다로 고착 > 절구로 곡식을 빻아 가루로 만드는 장면이 원형'},
{n:2434,w:'altercation',m:'n. 언쟁, 논쟁',s:'argument, bicker, dispute, quarrel, wrangle',r:'라틴어 altercari (dispute, 다투다) + -tion → 서로 다투는 것 → 언쟁·논쟁으로 고착 > 두 사람이 큰 소리로 맞서 언쟁하는 장면이 원형'},
{n:2435,w:'exude',m:'v. (액체·냄새·느낌 등을) 흘리다[스며나오다]',s:'emanate, emit, ooze, radiate',r:'ex (out) + ud (sweat, 땀) → 밖으로 스며나오다 → 흘리다·스며나오다로 고착 > 모공에서 땀이 배어나오는 장면이 원형'},
{n:2436,w:'veterinarian',m:'n. 수의사',s:'',r:'라틴어 veterinae (beasts of burden, 짐승) + -arian → 짐승을 돌보는 사람 → 수의사로 고착 > 동물 병원에서 아픈 강아지를 진찰하는 장면이 원형'},
{n:2437,w:'obsequious',m:'a. 아첨하는, 아부하는; 비굴한',s:'flattering, servile, submissive',r:'ob (toward) + sequ (follow, 따르다) + -ious → 지나치게 따르는 → 아첨하는·비굴한으로 고착 > 상사 말에 무조건 고개를 조아리는 장면이 원형'},
{n:2438,w:'mass',m:'n. ① 다량, 다수, 많음; (the ~) 대부분, 태반 ② 덩어리 ③ 부피, 크기; <물리학> 질량 ④ 일반 대중 ⑤ (흔히 M~) (가톨릭) 미사; 미사의식; 미사곡',s:'',r:'라틴어 massa (lump, 덩어리) → 한 덩어리로 뭉친 것 → 다량·덩어리·대중·미사로 고착 > 수천 명이 한 덩어리로 모인 군중의 장면이 원형'},
{n:2439,w:'sweeping',m:'a. ① 광범위한, 포괄적인, 전면적인 ② 압도적인',s:'broad, comprehensive, extensive, overall / inundant, knockdown, landslide, overwhelming',r:'sweep (쓸다) + -ing → 빗자루로 쓸듯 광범위하게 → 광범위한·압도적인으로 고착 > 빗자루가 바닥을 한 번에 넓게 쓸어버리는 장면이 원형'},
{n:2440,w:'wean',m:'vt. ① 젖을 떼다, 이유시키다 ② (나쁜 버릇 따위를) 버리게 하다, 단념시키다',s:'ablactate / discourage',r:'고대 영어 wenian (accustom, 익숙하게 하다) → 젖에서 익숙함을 떼어내다 → 젖을 떼다·나쁜 습관을 버리게 하다로 고착 > 아기가 젖 대신 이유식을 먹기 시작하는 장면이 원형'},
{n:2441,w:'bandage',m:'n. 붕대; 안대(眼帶), 눈가림개',s:'dressing, blindfold',r:'프랑스어 bande (strip, 띠) + -age → 띠로 감는 것 → 붕대로 고착 > 상처 위에 붕대를 감아 보호하는 장면이 원형'},
{n:2442,w:'turbulent',m:'a. (날씨 등이) 사나운, 거친, 요동치는; 소란스러운',s:'rough, stormy, uproarious',r:'라틴어 turbulentus (agitated, 흔들리는) + -ent → 마구 흔들리는 → 사나운·요동치는·소란스러운으로 고착 > 비행기가 난기류에 흔들리는 장면이 원형'},
{n:2443,w:'overture',m:'n. ① 신청, 제안; 예비교섭 ② <음악> 서곡, 전주곡',s:'proposal, suggestion / prelude',r:'라틴어 apertura (opening, 열림) → 열어 시작하는 것 → 서곡·제안·예비교섭으로 고착 > 오페라 막이 오르기 전 서곡이 울리는 장면이 원형'},
{n:2444,w:'putrid',m:'a. (동식물이) 썩은, 부패한; (썩으면서) 악취가 나는',s:'decayed, rotten, foul, malodorous',r:'라틴어 putridus (rotten, 썩은) → 완전히 썩어 악취가 나는 → 썩은·부패한으로 고착 > 오랫동안 방치된 음식이 썩어 악취를 내는 장면이 원형'},
{n:2445,w:'drain',m:'v. ① ~에서 배수하다, ~의 물을 빼다[빠지다] ② (힘·돈 등을) 빼내 가다, 소모시키다; (인재를) 유출시키다 / n. ① 배수, 방수; 유출, 배수관 ② 고갈, 낭비, 소모; (많은 시간·돈 등을) 고갈시키는[잡아먹는] 것',s:'the dewater / deplete, exhaust',r:'고대 영어 drehnian (strain off, 빼내다) → 물을 빼내다 → 배수하다·소모시키다·배수관으로 고착 > 욕조 마개를 뽑아 물이 빠져나가는 장면이 원형'},
{n:2446,w:'accost',m:'vt. 다가가서 말을 걸다',s:'',r:'라틴어 ad (to) + cost (side, 옆) → 옆에 다가가다 → 다가가서 말을 걸다로 고착 > 낯선 사람이 갑자기 옆으로 다가와 말을 거는 장면이 원형'},
{n:2447,w:'ecumenic',m:'a. ① 전반적인, 보편적인, 세계적인 ② 전 기독교(회)의, 세계 교회 운동의',s:'general, universal',r:'그리스어 oikoumene (inhabited world, 사람이 사는 세계) + -ic → 전 세계에 걸친 → 보편적인·전 기독교의로 고착 > 전 세계 교회 지도자들이 한자리에 모이는 장면이 원형'},
{n:2448,w:'freak',m:'n. ① 변덕, 일시적 기분 ② 기형, 변종; 괴짜 ③ 열광자, ~광(狂) / v. ① 흥분하다[시키다], 기겁을 하다[하게 만들다] ② 얼룩지게 하다',s:'caprice, whim / eccentric, weirdo / enthusiast, fan / stain',r:'고대 영어 frician (dance, 춤추다) → 예측 불가한 변칙 → 변덕·기형·괴짜·열광자로 고착 > 자연의 법칙을 벗어난 기이한 현상의 장면이 원형'},
{n:2449,w:'purvey',m:'v. (식료품 등을) 공급하다, 조달하다, 납품하다[for, to]',s:'provide, sell, supply',r:'라틴어 providere (foresee, 미리 보다) → 미리 보고 준비해 공급하다 → 공급하다·조달하다로 고착 > 군대에 식료품을 공급하는 장면이 원형'},
{n:2450,w:'circumlocution',m:'n. 에두른[완곡한] 표현',s:'euphemism, periphrasis',r:'circum (around) + locut (speak, 말하다) + -ion → 빙 돌려 말하기 → 에두른 표현으로 고착 > 간단한 것을 길게 돌려 말하는 장면이 원형'},
{n:2451,w:'zenith',m:'n. ① 천정(天頂) ② 정점, 절정, 전성기',s:'vertex / acme, apex, heyday, peak, prime, summit',r:'아랍어 samt (path, 길) → 머리 바로 위의 하늘 길 → 천정·정점·전성기로 고착 > 태양이 하늘 정중앙에 달한 정오의 장면이 원형'},
{n:2452,w:'exemplary',m:'a. ① 모범적인, 모범이 되는, 훌륭한 ② (처벌이) 본보기를 보이기 위한, 경고가 되는',s:'excellent, ideal, model, perfect / cautionary, warning',r:'라틴어 exemplum (example, 예) + -ary → 예가 될 만한 → 모범적인·경고가 되는으로 고착 > 다른 이의 귀감이 되는 행동의 장면이 원형'},
{n:2453,w:'declaim',m:'v. ① 열변을 토하다 ② 맹렬히 비난[규탄]하다[against]',s:'harangue, orate, perorate, rant / arraign, censure, denounce, inveigh',r:'de (completely) + claim (cry out, 외치다) → 완전히 크게 외치다 → 열변을 토하다·비난하다로 고착 > 연단에서 격렬하게 연설하는 장면이 원형'},
{n:2454,w:'armament',m:'n. ① (군대·군함·비행기 등을 포함한) 장비, 무기, 병기 ② (한 나라의) 군사력, 군비',s:'the ammunition, arms',r:'라틴어 armare (arm, 무장하다) + -ment → 무장하는 것 → 무기·군비로 고착 > 전함에 무기를 탑재하는 장면이 원형'},
{n:2455,w:'intangible',m:'a. ① 손으로 만질 수 없는, 만질 수 없는; 실체가 없는, 무형의 ② 파악할 수 없는, 막연한, 불가해한',s:'impalpable, corporeal, insubstantial',r:'in (not) + tangib (touch, 만지다) + -le → 만질 수 없는 → 무형의·파악할 수 없는으로 고착 > 손으로 잡으려 해도 잡히지 않는 안개 같은 장면이 원형'},
{n:2456,w:'shoddy',m:'a. ① 가짜의, 겉만 그럴듯한, 싸구려의 ② (재료나 만들어진 것이) 조잡한 / n. 가짜, 위조품, 모조품',s:'',r:'19세기 영어 shoddy (inferior wool, 저급 양모) → 재활용 양모로 만든 조잡한 제품 → 싸구려의·조잡한으로 고착 > 겉은 그럴듯하나 금방 망가지는 제품의 장면이 원형'},
{n:2457,w:'progeny',m:'n. ① (사람·동식물의) 자손; 후계자 ② 결과, 소산',s:'child, descendant, offspring / consequence, outcome, result',r:'라틴어 pro (forth) + gign (beget, 낳다) → 앞으로 낳아 내보내다 → 자손·후계자·결과로 고착 > 한 그루 나무에서 뻗어나온 수많은 가지의 장면이 원형'},
{n:2458,w:'rejoice',m:'v. 기뻐하다, 좋아하다, 축하하다[at, in, over, on]',s:'delight, exult, glory, revel',r:'re (again) + joice (joy, 기쁨) → 다시 기쁨을 느끼다 → 기뻐하다·축하하다로 고착 > 합격 소식에 두 손을 높이 들고 환호하는 장면이 원형'},
{n:2459,w:'cornucopia',m:'n. 풍요, 풍부',s:'abundance, affluence, exuberance, opulence',r:'라틴어 cornu (horn, 뿔) + copia (plenty, 풍부함) → 풍요의 뿔 → 풍요·풍부로 고착 > 과일과 채소가 넘치도록 담긴 뿔 모양 바구니의 장면이 원형'},
{n:2460,w:'outmoded',m:'a. 유행에 뒤떨어진, 구식의',s:'ancient, antique, old-fashioned, outdated',r:'out (넘어서) + mode (유행) + -d → 유행을 넘어서 버린 → 구식의·유행에 뒤떨어진으로 고착 > 아무도 쓰지 않는 낡은 기기의 장면이 원형'},
{n:2461,w:'barb',m:'n. ① (화살촉·낚싯가시·가시철사의) 미늘; 갈고리, 가시 ② 날카로운 비판, 가시 돋친 말 / vt. ~에 미늘[갈고리, 가시]을 달다',s:'flue, fluke / acerbity, shaft, stinger',r:'라틴어 barba (beard, 수염) → 수염처럼 뒤로 휜 낚싯바늘의 가시 → 미늘·가시 돋친 말로 고착 > 낚싯바늘 끝의 뒤로 휜 가시가 살을 파고드는 장면이 원형'},
{n:2462,w:'exchequer',m:'n. ① 국고(國庫) ② (개인·회사 등의) 재원, 재력, 재정 (상태), 재정 형편 ③ (영) (the E~) 재무부',s:'national treasury / coffers, funds / the Finance Ministry, the Ministry of Finance',r:'고대 프랑스어 eschequier (chessboard, 체스판) → 체스판 무늬 천 위에서 회계를 계산하던 것 → 국고·재무부로 고착 > 체스판 무늬 천 위에서 동전을 세던 장면이 원형'},
{n:2463,w:'consign',m:'vt. ① 맡기다, 위탁하다, 위임하다 ② (상품을) 위탁(판매)하다; (위탁 판매를 위해) 발송하다, 부치다 ③ (좋지 않은 상황에) 처하게 만들다, ~을 (나쁜 상태 등에) 몰아넣다',s:'commit',r:'con (together) + sign (mark, 표시하다) → 함께 표시하여 넘기다 → 맡기다·위탁하다로 고착 > 서명과 도장을 찍어 물건을 넘기는 장면이 원형'},
{n:2464,w:'invincible',m:'a. 천하무적의, 아무도 꺾을 수 없는',s:'impregnable, unbeatable, unconquerable',r:'in (not) + vinc (conquer, 정복하다) + -ible → 정복할 수 없는 → 천하무적의로 고착 > 어떤 공격도 통하지 않는 장면이 원형'},
{n:2465,w:'dawdle',m:'v. 꾸물거리다, 빈둥빈둥 시간을 보내다',s:'the idle, loiter, procrastinate, tarry',r:'중세 영어 daddle (walk slowly, 느릿느릿 걷다) → 아무것도 하지 않으며 시간을 흘려보내다 → 꾸물거리다·빈둥빈둥으로 고착 > 해야 할 일을 앞에 두고 딴짓만 하는 장면이 원형'},
{n:2466,w:'swashbuckle',m:'v. 허세부리다, 젠체하다',s:'',r:'swash (물 소리) + buckle (방패) → 방패를 요란하게 두드리며 허세 부리다 → 허세부리다·젠체하다로 고착 > 칼을 휘두르며 요란하게 허세를 부리는 장면이 원형'},
{n:2467,w:'compass',m:'n. ① 나침반; (보통 pl.) (제도용) 컴퍼스 ② (비유) 한계, 범위, 주위',s:'boundary, extent, limit, range, area',r:'라틴어 com (together) + pass (step, 걸음) → 함께 걸음을 맞추며 방향을 잡다 → 나침반·범위로 고착 > 나침반 바늘이 북쪽을 가리키는 장면이 원형'},
{n:2468,w:'naughty',m:'a. ① (어린이가) 말을 듣지 않는, 장난꾸러기인, 버릇없는 ② (행위 등이) 음탕한, 외설적인',s:'disobedient, impish, mischievous / bawdy, improper, lewd, obscene',r:'중세 영어 naught (nothing, 아무것도 없는) + -y → 아무것도 가진 게 없는 비천한 → 버릇없는·음탕한으로 고착 > 규칙을 무시하고 장난을 치는 아이의 장면이 원형'},
{n:2469,w:'modicum',m:'n. 소량, 근소, 약간',s:'bit, drop, little',r:'라틴어 modicus (moderate, 적당한) → 딱 적당한 적은 양 → 소량·약간으로 고착 > 커피에 설탕을 아주 조금만 넣는 장면이 원형'},
{n:2470,w:'grumble',m:'v. 불평하다, 투덜거리다, 푸념하다, 중얼거리다[at, about] / n. 투덜대는 소리, 불만, 불평, 푸념',s:'complain, moan / complaint, protest',r:'중세 영어 gromblen (growl, 으르렁거리다) → 낮은 소리로 불만을 투덜거리다 → 불평하다·투덜거리다로 고착 > 입 속으로 중얼중얼 불만을 늘어놓는 장면이 원형'},
{n:2471,w:'tergiversation',m:'n. ① 핑계, 구실, 변명 ② 변절',s:'excuse, pretext / betrayal, defection, treachery',r:'라틴어 tergum (back, 등) + vers (turn, 돌다) + -tion → 등을 돌려 변절하다 → 변명·변절로 고착 > 편의에 따라 말을 바꾸며 핑계를 대는 장면이 원형'},
{n:2472,w:'bosom',m:'n. ① 가슴, 흉부; 여성의 유방 ② 가슴 속의 생각, 속마음; 친애의 정, 애정 / a. 친한; 비밀을 털어놓을 수 있는, 심복의',s:'breast, bust, chest / close, confidential, intimate',r:'고대 영어 bosm (breast, 가슴) → 포근하게 안아주는 가슴 → 가슴·속마음·친밀한으로 고착 > 품에 안겨 따뜻하게 감싸이는 장면이 원형'},
{n:2473,w:'coeval',m:'a. 같은 나이[연대, 시기]의 / n. 동시대[동연대]의 사람[것]',s:'coetaneous, contemporary',r:'co (together) + ev (age, 시대) + -al → 같은 시대의 → 동시대의로 고착 > 같은 시대를 살아간 두 사람의 장면이 원형'},
{n:2474,w:'fret',m:'v. ① 초조해 하다, 안달하다, 애태우다 ② (산·녹 때문에) 부식하다, 침식하다',s:'chafe, fuss, jitter, worry / corrode, erode',r:'고대 영어 fretan (devour, 갉아먹다) → 걱정이 마음을 갉아먹다 → 초조해하다·부식하다로 고착 > 근심이 마음 속을 갉아먹는 장면이 원형'},
{n:2475,w:'radiation',m:'n. ① (빛·열 등의) 방사, 복사 ② 방사선, 복사 에너지; 방사선',s:'emanation, emission',r:'라틴어 radiare (emit rays, 빛을 내다) + -tion → 사방으로 광선을 내보내는 것 → 방사·복사·방사선으로 고착 > 태양이 사방으로 빛을 내뿜는 장면이 원형'},
{n:2476,w:'educe',m:'v. ① (잠재적 능력 등을) 끌어내다 ② (자료에서 결론을) 추론(推論)하다, 연역(演繹)하다 ③ (화합물에서) ~을 추출하다',s:'draw, elicit / deduce, infer / extract',r:'e (out) + duc (lead, 이끌다) → 밖으로 이끌어내다 → 끌어내다·추론하다로 고착 > 숨겨진 잠재력을 이끌어내는 장면이 원형'},
{n:2477,w:'unison',m:'n. 일치, 조화, 화합',s:'the accord, harmony',r:'uni (one, 하나) + son (sound, 소리) → 하나의 소리 → 일치·조화로 고착 > 합창단이 하나의 소리로 완벽하게 일치하는 장면이 원형'},
{n:2478,w:'putative',m:'a. 추정되는, 소문에 들리는',s:'alleged, conjectural, supposed, suppositional',r:'라틴어 putare (think, 생각하다) + -ive → 그렇다고 생각되는 → 추정되는·소문에 들리는으로 고착 > 확실히 증명되지 않았지만 아버지로 여겨지는 장면이 원형'},
{n:2479,w:'ingratiate',m:'vt. 환심을 사다, 비위를 맞추다, 마음에 들게 하다, 영합하다',s:'curry favor with, flatter, make one\'s marbles good',r:'in (into) + grati (grace, 호의) + -ate → 호의 속으로 들어가다 → 환심을 사다·비위를 맞추다로 고착 > 선물을 들고 아첨하며 상사의 환심을 사는 장면이 원형'},
{n:2480,w:'puppet',m:'n. ① 작은 인형 ② 꼭두각시 ③ 괴뢰, 앞잡이',s:'the marionette / minion, pawn, tool',r:'고대 프랑스어 poupette (little doll, 작은 인형) → 실로 조종하는 작은 인형 → 꼭두각시·괴뢰로 고착 > 뒤에서 줄을 당겨 인형을 조종하는 장면이 원형'},
{n:2481,w:'volant',m:'a. ① 나는, 날 수 있는 ② 날쌔고, 기민한, 민첩한, 몸이 가벼운',s:'flying, volitant, agile, birdlike, nimble, nippy',r:'라틴어 volare (fly, 날다) + -ant → 나는 → 날 수 있는·기민한으로 고착 > 날개를 펴고 가볍게 날아오르는 장면이 원형'},
{n:2482,w:'crusade',m:'n. ① 십자군 ② (종교상의) 성전(聖戰); 개혁 운동',s:'campaign, drive, movement',r:'중세 라틴어 cruciata (cross, 십자가) → 십자가를 들고 싸우는 운동 → 십자군·개혁 운동으로 고착 > 십자가를 앞세운 기사들이 성지를 향해 진군하는 장면이 원형'},
{n:2483,w:'leapfrog',m:'v. (더 높은 위치·등급으로) 뛰어넘다, 앞서다, 앞지르다',s:'bounce, leap, outdo, surpass',r:'leap (도약) + frog (개구리) → 개구리처럼 뛰어넘다 → 앞지르다·뛰어넘다로 고착 > 앞사람 등을 넘어 훌쩍 앞으로 나아가는 장면이 원형'},
{n:2484,w:'hive',m:'n. ① 벌통, 벌집 ② 바쁜 사람들이 붐비는 곳, (활동 등의) 중심지',s:'beehive, center, hub',r:'고대 영어 hyf (beehive, 벌집) → 벌이 바쁘게 모여 일하는 곳 → 벌집·활동 중심지로 고착 > 수천 마리 벌이 분주히 드나드는 벌통의 장면이 원형'},
{n:2485,w:'engulf',m:'vt. ① (불·늘·파도 등이) 집어삼키다, 휩쓸리게 하다 ② (강한 감정 등이) 사로잡다, 압도하다',s:'immerse, inundate, submerge, swamp, overcome, overwhelm',r:'en (in) + gulf (만, 깊은 곳) → 깊은 만으로 삼켜버리다 → 집어삼키다·사로잡다로 고착 > 파도가 배를 통째로 삼켜버리는 장면이 원형'},
{n:2486,w:'benison',m:'n. 축복',s:'benediction, blessing',r:'라틴어 benedictio (blessing, 축복) → 신의 은총을 비는 것 → 축복으로 고착 > 사제가 손을 들어 축복을 내리는 장면이 원형'},
{n:2487,w:'overcast',m:'a. 구름이 뒤덮인, 흐린, 우중충한; 음울한, 우울한 / v. (구름이) ~을 덮다, 흐리게 하다, 어둡게 하다; (슬픔 등으로) 음울하게 만들다',s:'',r:'over (위를) + cast (던지다) → 위를 구름으로 덮어 던지다 → 구름이 뒤덮인·음울한으로 고착 > 두꺼운 구름이 하늘을 온통 덮어버리는 장면이 원형'},
{n:2488,w:'blockade',m:'n. (항구·해안 등의) 봉쇄; (진행·교통의) 장애(물)',s:'block, barrier, obstacle',r:'block (막다) + -ade (명사형) → 막아 봉쇄하는 것 → 봉쇄·장애물로 고착 > 군함이 항구 입구를 막아 출입을 차단하는 장면이 원형'},
{n:2489,w:'rugged',m:'a. ① 울퉁불퉁한, 고저(高低)가 있는 ② 소박한, 조야한',s:'bumpy, rough, uneven, rude',r:'고대 노르드어 rugga (rough, 거친) → 거칠고 울퉁불퉁한 → 울퉁불퉁한·소박한으로 고착 > 바위와 돌로 가득한 험준한 지형의 장면이 원형'},
{n:2490,w:'ledge',m:'n. ① (특히 창문 아래 벽에 붙인) 선반 ② 절벽에서 (선반처럼) 튀어나온 바위, 돌출부',s:'shelf, jut, projection',r:'중세 영어 legge (bar, 가로대) → 벽에 가로로 튀어나온 선반 → 선반·돌출 바위로 고착 > 절벽에서 선반처럼 튀어나온 바위에 발을 딛는 장면이 원형'},
{n:2491,w:'transplant',m:'n. ① 이식 ② 이식된 갯기관, 식물 / v. 이식하다, 옮겨 심다',s:'graft',r:'trans (across) + plant (심다) → 다른 곳으로 옮겨 심다 → 이식하다·옮겨 심다로 고착 > 뿌리째 뽑아 다른 화분에 심는 장면이 원형'},
{n:2492,w:'forte',m:'n. 장점; 특기, 장기',s:'specialty, strength, talent',r:'이탈리아어 forte (strong, 강한) → 강한 부분 → 장점·특기로 고착 > 선수가 가장 잘 하는 특기 종목에서 빛나는 장면이 원형'},
{n:2493,w:'dilated',m:'a. (집 따위가) 기울어진, (가구 따위가) 낡아빠진; (복장이) 남루한',s:'ramshackle, run-down, tumble-down',r:'라틴어 dilatare (widen, 넓히다) → 낡아서 늘어진 → 기울어진·낡아빠진으로 고착 > 오래되어 뒤틀리고 기울어진 가구의 장면이 원형'},
{n:2494,w:'stipend',m:'n. 급료, 수당, 봉급; 연금; 장학금',s:'allowance, pension, grant',r:'라틴어 stips (donation, 기부금) + pend (weigh, 달다) → 달아 지불하는 돈 → 급료·장학금으로 고착 > 정해진 날에 급여가 계좌에 들어오는 장면이 원형'},
{n:2495,w:'minister',m:'n. ① 성직자, 목사 ② 장관, 대신, 각료 / v. ① (식·예배 등을) 거행하다, 집행하다 ② 섬기다, 봉사하다; 보살펴 주다[to]',s:'clergyman, divine, pastor, preacher, priest, secretary, care for, look after, take care of',r:'라틴어 minister (servant, 하인) → 섬기는 사람 → 성직자·장관·봉사하다로 고착 > 하느님과 신도를 섬기는 목사의 장면이 원형'},
{n:2496,w:'pellucid',m:'a. ① 투명한, 맑은 ② (말·뜻·표현·문체가) 명료한, 명백한 ③ (머리가) 명석한',s:'diaphanous, transparent, clear, lucid, plain, bright, brilliant, clever',r:'per (through) + lucid (light, 빛) → 빛이 완전히 통과하는 → 투명한·명료한으로 고착 > 유리처럼 맑아 바닥이 훤히 보이는 호수의 장면이 원형'},
{n:2497,w:'constituency',m:'n. ① (국회의원을 선출하는) 선거구 ② (특정 지역의) 선거구민, 유권자들 ③ (특정 인물·상품 등의) 지지층, 후원단체, 고객층, 구독자층',s:'precinct, balloter, elector, electorate, voter',r:'라틴어 constituere (establish, 세우다) + -ency → 세워진 지역구 → 선거구·유권자·지지층으로 고착 > 국회의원을 뽑는 지역 유권자들의 장면이 원형'},
{n:2498,w:'twig',m:'n. ① 잔가지 ② <해부학> (혈관·신경의) 지맥(支脈) / v. (불현듯) 깨닫다, 이해하다',s:'small branch, spray, sprig',r:'고대 영어 twig (small branch, 잔가지) → 가지에서 갈라진 잔가지 → 잔가지·깨닫다로 고착 > 문득 머릿속에서 작은 가지가 연결되는 순간의 장면이 원형'},
{n:2499,w:'anneal',m:'vt. (강철·유리 등을) 달구어 서서히 식히다; 벼리다; (의지·정신들을) 단단[강화]하다',s:'harden, strengthen, temper, toughen',r:'고대 영어 onaelan (set on fire, 불 지르다) → 불로 달궜다가 서서히 식혀 강하게 만들다 → 달구어 식히다·단련하다로 고착 > 대장장이가 쇠를 달궜다 식히며 강도를 높이는 장면이 원형'},
{n:2500,w:'infatuation',m:'n. ① 정신을 잃게[열중하게] 함[됨]; 홀림; 심취, 사랑의 열병 ② 열중[심취]하게 하는 사람[것]',s:'absorption',r:'라틴어 infatuare (make a fool of, 바보로 만들다) + -tion → 이성을 잃게 만드는 열병 → 심취·사랑의 열병으로 고착 > 한눈에 반해 이성을 잃은 장면이 원형'},
{n:2501,w:'blatant',m:'a. ① 뻔뻔스러운; 속이 들여다보이는, 노골적인; 야한 ② 떠들썩한, 시끄러운',s:'obtrusive, obvious, noisy',r:'라틴어 blatire (babble, 재잘거리다) → 부끄러움 없이 크게 떠벌리는 → 뻔뻔스러운·노골적인으로 고착 > 거짓말을 뻔뻔하게 대놓고 하는 장면이 원형'},
{n:2502,w:'primordial',m:'a. ① 태고의, 원시시대의, 원시 시대부터 존재하는 ② 원초적인, 근원적인, 근본적인 / n. 기본 원리',s:'primeval, primitive, basic, fundamental, primal, primary, basics, elements, fundamentals',r:'라틴어 primus (first, 첫째) + ordin (order, 순서) + -al → 맨 처음 질서의 → 태고의·원초적인으로 고착 > 지구 탄생 직후 원시 바다에서 생명이 시작되는 장면이 원형'},
{n:2503,w:'explicate',m:'vt. (어떤 사상·문학 작품들을) 설명[해석]하다',s:'clarify, elucidate, explain, expound',r:'ex (out) + plic (fold, 접다) + -ate → 접힌 것을 펼쳐 설명하다 → 설명하다·해석하다로 고착 > 복잡하게 접힌 지도를 펼쳐 길을 설명하는 장면이 원형'},
{n:2504,w:'coronation',m:'n. (국왕·대관식 등의) 대관식, 즉위식; 대관, 즉위',s:'enthronement',r:'라틴어 corona (crown, 왕관) + -tion → 왕관을 씌우는 것 → 대관식·즉위식으로 고착 > 왕의 머리에 황금 왕관을 올리는 장면이 원형'},
{n:2505,w:'roar',m:'v. ① (짐승 등이) 으르렁거리다, 포효하다 ② 고함치다, 소리 지르다 / n. 으르렁거리는 소리, 고함소리; 노호, 굉음',s:'bay, growl, howl, snarl, bawl, cry, shout, yell, bellow, outcry',r:'고대 영어 rarian (cry, 소리치다) → 크고 거칠게 울리는 소리 → 포효하다·고함치다로 고착 > 사자가 입을 크게 벌려 포효하는 장면이 원형'},
{n:2506,w:'humility',m:'n. 겸손, 비하; (pl.) 겸손한 행위',s:'humbleness, modesty',r:'라틴어 humilis (low, 낮은) + -ity → 낮추는 성질 → 겸손·비하로 고착 > 고개를 낮추고 자신을 내세우지 않는 장면이 원형'},
{n:2507,w:'stack',m:'n. ① 무더기, 더미 ② (a ~ 또는 pl.) 다량, 많음 / v. 산더미처럼 쌓다, 쌓아올리다',s:'bundle, heap, pile, load, stockpile',r:'고대 노르드어 stakkr (haystack, 건초더미) → 층층이 쌓인 더미 → 무더기·쌓아올리다로 고착 > 책을 층층이 높이 쌓아올리는 장면이 원형'},
{n:2508,w:'mollusk',m:'n. 연체동물',s:'',r:'라틴어 molluscus (soft, 부드러운) → 부드러운 몸을 가진 동물 → 연체동물로 고착 > 껍데기 안에 부드러운 살을 가진 조개의 장면이 원형'},
{n:2509,w:'outlandish',m:'a. ① 이국풍의 ② 이상스런 ③ 외진, 벽촌의',s:'exotic, foreign, bizarre, odd, strange, outlying, remote',r:'out (밖의) + land (땅) + -ish → 땅 밖에서 온 이상한 → 이국풍의·이상한으로 고착 > 어느 나라 것인지 알 수 없는 기이한 복장의 장면이 원형'},
{n:2510,w:'sedition',m:'n. (반정부적인) 선동; 치안 방해, 폭동 교사; 반란, 폭동',s:'mutiny, rebellion',r:'라틴어 seditio (going apart, 따로 가다) → 국가에서 떨어져 나가려는 반란 행위 → 선동·폭동 교사로 고착 > 민중을 선동해 정부에 맞서게 하는 장면이 원형'},
{n:2511,w:'construe',m:'v. 해석하다, 번역하다',s:'interpret, render, translate',r:'con (together) + stru (build, 쌓다) → 함께 쌓아 의미를 만들다 → 해석하다·번역하다로 고착 > 문장 구조를 분석해 의미를 파악하는 장면이 원형'},
{n:2512,w:'introspective',m:'a. ① 내성적인 ② 자기성찰적인, 자기반성의',s:'diffident, introvert, introverted, mousy, inward-looking, meditative, reflective',r:'intro (inward, 안으로) + spect (look, 보다) + -ive → 안을 들여다보는 → 내성적인·자기성찰적인으로 고착 > 자신의 마음 깊은 곳을 들여다보는 장면이 원형'},
{n:2513,w:'psalm',m:'n. ① (성경에 나오는) 성가, 찬송가 ② (the P~s) (구약 성서의) 시편(詩篇) / v. 찬송가로 축하하다, 성가를 불러 찬미하다',s:'anthem, canticle, carol, hymn',r:'그리스어 psalmos (plucking of strings, 현 뜯기) → 현을 뜯어 부르는 성가 → 성가·찬송가로 고착 > 하프를 뜯으며 신에게 찬가를 드리는 장면이 원형'},
{n:2514,w:'den',m:'n. ① (야수의) 잠자리, 굴, 동굴 ② (부정한 행위를 하기 위한) 소굴 ③ (집 안에서 조용히 일할 수 있는) 서재[작업실]',s:'antre, cave, cavern, lair, cesspit, hangout, hotbed, ken, nest, atelier, studio, study',r:'고대 영어 denn (valley, 계곡) → 동물이 숨어 지내는 움푹한 공간 → 잠자리·소굴·서재로 고착 > 곰이 겨울잠을 자는 동굴 속 은신처의 장면이 원형'},
{n:2515,w:'twinkle',m:'v. 반짝거리다, 반짝반짝 빛나는 / n. ① (눈이 행복감·흥분으로) 반짝거림, 빛남 ② 눈 깜박할 사이, 순간',s:'glitter, sparkle, blink',r:'고대 영어 twinclian (twinkle, 반짝이다) → 빛이 깜박깜박하며 반짝이다 → 반짝거리다·순간으로 고착 > 밤하늘 별이 깜박깜박 반짝이는 장면이 원형'},
{n:2516,w:'cryptic',m:'a. ① 숨은, 비밀의, 뜻을 헤아리기 어려운 ② (색깔 등이) 몸을 숨기기에 알맞은, 의태의',s:'mysterious',r:'그리스어 kryptein (hide, 숨기다) + -ic → 숨겨진 → 뜻을 헤아리기 어려운·비밀의로 고착 > 암호처럼 풀기 어려운 수수께끼 문장의 장면이 원형'},
{n:2517,w:'macrocosm',m:'n. ① 대우주 ② 전체, 총체, 복합체; 확대모형',s:'',r:'그리스어 makros (large, 큰) + kosmos (world, 세계) → 큰 세계 → 대우주·전체로 고착 > 망원경으로 광활한 우주를 바라보는 장면이 원형'},
{n:2518,w:'insolent',m:'a. 거만한, 버릇없는, 무례한',s:'arrogant, impertinent, impudent, rude',r:'in (not) + sol (accustomed, 익숙한) + -ent → 예의를 모르는 → 거만한·무례한으로 고착 > 어른에게 반말로 대드는 장면이 원형'},
{n:2519,w:'fulminate',m:'v. 맹렬히 비난하다',s:'censure, denounce, execrate',r:'라틴어 fulmen (lightning, 번개) + -ate → 번개처럼 격렬하게 치다 → 맹렬히 비난하다·폭발하다로 고착 > 천둥처럼 격렬하게 비난을 쏟아내는 장면이 원형'},
{n:2520,w:'subservient',m:'a. ① 복종하는, 종속하는; 비굴한 ② 도움이 되는, 유용함[to] ③ (~보다) 부차적인[덜 중요한]',s:'menial, servile, submissive, conducive, implemental, instrumental, secondary',r:'sub (under) + servi (serve, 섬기다) + -ent → 아래에서 섬기는 → 복종하는·부차적인으로 고착 > 명령에 무조건 복종하는 장면이 원형'},
{n:2521,w:'court',m:'n. ① 법정, 법원; [집합적] 법관 ② 궁전, 왕실 / v. ① ~의 환심을 사다 ② 구애하다; (칭찬 등을) 얻어려고 애쓰다',s:'palace, woo, solicit',r:'라틴어 cohors (enclosure, 울타리) → 왕이 있는 울타리 안 → 법정·궁전·환심 사다로 고착 > 왕 앞에 신하들이 늘어선 궁정의 장면이 원형'},
{n:2522,w:'plenitude',m:'n. ① 충분, 풍부; 완전 ② (위(胃) 등의) 포만(飽滿)',s:'abundance, opulence, profusion, completeness, repletion, satiety',r:'라틴어 plenus (full, 가득한) + -tude → 가득 참의 상태 → 충분·풍부로 고착 > 창고가 넘칠 만큼 가득 찬 장면이 원형'},
{n:2523,w:'tug',m:'v. 당기다, (세게) 잡아당기다 / n. ① (갑자기 세게) 잡아당김 ② 예인선',s:'drag, haul, pull, jerk, yank, tugboat',r:'중세 영어 toggen (pull, 당기다) → 힘껏 잡아당기다 → 당기다·예인선으로 고착 > 줄다리기에서 전력으로 밧줄을 당기는 장면이 원형'},
{n:2524,w:'venial',m:'a. (좌과실 등이) 용서할 수 있는, 가벼운',s:'excusable, pardonable',r:'라틴어 venia (forgiveness, 용서) + -al → 용서받을 수 있는 → 용서할 수 있는·가벼운으로 고착 > 사소한 실수를 너그럽게 용서하는 장면이 원형'},
{n:2525,w:'sterling',m:'n. 순은, 순은 제품; 영국 파운드화 / a. 훌륭한; 진짜의; 신뢰할만한',s:'excellent, genuine, trustworthy',r:'영국 화폐 중심지 Easterling (동쪽 상인들의 은화) → 품질이 보장된 순은 → 순은·훌륭한·신뢰할 만한으로 고착 > 순도를 보증하는 각인이 찍힌 은제품의 장면이 원형'},
{n:2526,w:'greed',m:'n. 탐욕, 욕심',s:'avarice, covetousness, cupidity, rapacity',r:'고대 영어 graedig (eager, 열망하는) → 더 갖고 싶은 욕망 → 탐욕·욕심으로 고착 > 금화를 양팔로 끌어안고도 더 달라는 장면이 원형'},
{n:2527,w:'besmirch',m:'vt. 더럽히다; (명예·인격 등을) 손상시키다',s:'defile, soil, stain, sully, taint',r:'be (completely) + smirch (smear, 더럽히다) → 완전히 더럽히다 → 더럽히다·명예를 손상시키다로 고착 > 깨끗한 명성에 진흙을 끼얹는 장면이 원형'},
{n:2528,w:'apothegm',m:'n. 격언, 경구',s:'adage, aphorism, dictum, maxim, proverb, saying',r:'그리스어 apo (from) + phtheggesthai (speak out, 말하다) → 요점만 말하다 → 격언·경구로 고착 > 오랜 지혜를 짧고 날카롭게 담은 한 문장의 장면이 원형'},
{n:2529,w:'livid',m:'a. ① 몹시 화가 난, 격노한 ② 납빛의, 검푸른, 창백한',s:'enraged, furious, outraged, ashy, pale, pallid, wan',r:'라틴어 lividus (bluish, 납빛의) → 화가 나 얼굴이 납빛이 된 → 격노한·납빛의로 고착 > 분노로 얼굴이 시퍼렇게 질린 장면이 원형'},
{n:2530,w:'irrupt',m:'vi. ① 침입[난입]하다[into] ② 거친[난폭한] 행동을 하다, 거친 감정을 나타내다',s:'break in, burst in on, invade, rush in',r:'ir (into) + rupt (break, 터지다) → 안으로 터져 들어오다 → 침입하다·난입하다로 고착 > 문을 박차고 갑자기 뛰어드는 장면이 원형'},
{n:2531,w:'peroration',m:'n. ① (연설 등의) 마무리 부분, 결론 부분, 끝맺는 말 ② 장황한[열변적인] 연설',s:'conclusion, epilogue, harangue, screed, sermon, tirade',r:'per (through) + orat (speak, 말하다) + -ion → 처음부터 끝까지 다 말하는 것 → 마무리 연설·결론 부분으로 고착 > 긴 연설의 마지막을 힘차게 마무리하는 장면이 원형'},
{n:2532,w:'oath',m:'n. ① 맹세, 서약; (법정의) 선서 ② (화·놀람 등을 나타내는) 저주, 악담, 욕설',s:'bond, pledge, promise, vow, curse, imprecation, malediction',r:'고대 영어 ath (oath, 맹세) → 신이나 진리를 걸고 맹세하는 것 → 맹세·선서·욕설로 고착 > 법정에서 손을 들고 진실만을 말하겠다고 선서하는 장면이 원형'},
{n:2533,w:'gossamer',m:'a. 가볍고 얇은; 섬세한 / n. ① (공중에 떠돌거나 풀 같은 데 걸려 있는) 섬세한 거미줄[집] ② 섬세한 것, 가냘픈 것; 뜻없는 것',s:'delicate',r:'중세 영어 gossomer (goose summer, 거위의 여름) → 가을 거미줄처럼 가볍고 섬세한 → 섬세한 거미줄·가냘픈 것으로 고착 > 햇빛에 빛나는 거미줄이 바람에 가볍게 흔들리는 장면이 원형'},
{n:2534,w:'duck',m:'v. ① (책임·위험 등을) 피하다 ② (머리나 몸을) 쑥 수그리다[숙이다] / n. 오리, 집오리; 암오리',s:'avoid, dodge, elude, evade, shun, bend, bow, incline, stoop',r:'고대 영어 duce (diver, 잠수하는 것) → 오리처럼 재빨리 몸을 숙이다 → 피하다·머리 숙이다·오리로 고착 > 날아오는 물체를 피해 재빨리 몸을 숙이는 장면이 원형'},
{n:2535,w:'frontier',m:'n. ① 국경, 국경 지방 ② 변경(邊境) ③ (지식·학문 등의) 미개척 영역',s:'border, borderland',r:'고대 프랑스어 frontiere (front, 정면) → 문명과 미개척지의 정면 경계 → 국경·미개척 영역으로 고착 > 지도에서 두 나라 사이의 경계선의 장면이 원형'},
{n:2536,w:'monstrous',m:'a. ① 괴물 같은, 기괴한; 무시무시한; 극악무도한 ② 엄청난',s:'evil, horrifying, outrageous, colossal, huge, massive',r:'라틴어 monstrum (omen, 흉조) + -ous → 흉조처럼 기괴한 → 괴물 같은·극악무도한으로 고착 > 인간의 형체를 넘어선 기이한 존재의 장면이 원형'},
{n:2537,w:'bayonet',m:'n. 총검; (the ~) 무력; (pl.) 보병',s:'',r:'프랑스 Bayonne 지방 (최초로 만든 곳) → 총구에 꽂아 쓰는 칼 → 총검으로 고착 > 소총 끝에 칼날을 꽂아 무장하는 장면이 원형'},
{n:2538,w:'piscatorial',m:'a. 어부[어업]의; 낚시의, 낚시를 좋아하는; 어업에 종사하는',s:'',r:'라틴어 piscator (fisherman, 어부) + -ial → 어부의 → 어부의·낚시의로 고착 > 강가에서 낚싯대를 드리운 어부의 장면이 원형'},
{n:2539,w:'aver',m:'vt. 단언하다, 주장하다, 확인하다',s:'affirm, assert',r:'라틴어 ad (to) + verus (true, 진실) → 진실이라고 단언하다 → 단언하다·주장하다로 고착 > 눈을 맞추며 확신에 차 단언하는 장면이 원형'},
{n:2540,w:'evident',m:'a. 분명한, 명백한, 뚜렷한',s:'apparent, conspicuous, manifest, obvious',r:'e (out) + vid (see, 보다) + -ent → 밖으로 분명히 보이는 → 분명한·명백한으로 고착 > 모두가 한눈에 알아볼 수 있는 장면이 원형'},
{n:2541,w:'snub',m:'vt. ① 모욕하다, 무시하다 ② (참석·수락을) 거부하다',s:'front, humiliate, ignore, insult, deny, rebuff, refuse, reject',r:'고대 노르드어 snubba (rebuke, 꾸짖다) → 무시하며 코웃음 치다 → 무시하다·거부하다로 고착 > 아는 척을 해도 눈도 안 마주치며 지나치는 장면이 원형'},
{n:2542,w:'pavilion',m:'n. ① (전시장 등으로 쓰는) 가설[특설] 건축물; 대형 천막; 정자 ② 선수 대기실, 임시 관람석',s:'',r:'라틴어 papilio (butterfly, 나비) → 나비 날개처럼 펼쳐진 텐트 → 가설 건물·대형 천막으로 고착 > 운동장 한편에 임시로 세워진 선수 대기 천막의 장면이 원형'},
{n:2543,w:'catapult',m:'n. ① (Y자 모양의) 새총 ② 투석기 / v. ① ~을 세게 내던지다, 발사하다 ② 갑자기 (어떤 상태에) 이르게 하다',s:'slingshot, onager, fling, hurl, hurtle, launch, project',r:'그리스어 kata (down) + pallein (hurl, 던지다) → 아래로 강하게 내던지다 → 투석기·새총·발사하다로 고착 > 거대한 투석기가 돌을 성벽을 향해 날리는 장면이 원형'},
{n:2544,w:'affliction',m:'n. 고통, 고뇌, 고난, 불행',s:'misery, suffering, torment',r:'af (to) + flict (strike, 치다) + -ion → 계속 치고 들어오는 것 → 고통·고뇌·불행으로 고착 > 거듭된 불행이 한 사람을 짓누르는 장면이 원형'},
{n:2545,w:'jostle',m:'v. ① 난폭하게 밀다, 밀치다, 밀어 제치다 ② (이익·지위를 놓고) ~와 겨루다, 경합하다',s:'hustle, push, shove',r:'고대 영어 justlen (push, 밀다) → 군중 속에서 서로 밀치다 → 난폭하게 밀다·경합하다로 고착 > 좁은 통로에서 사람들이 서로 밀치는 장면이 원형'},
{n:2546,w:'willful',m:'a. ① 계획[의도]적인, 고의의 ② 고집 센, 외고집의, 완고한',s:'delicate, intentional, headstrong, obstinate, stubborn, wayward',r:'will (의지) + -ful (가득한) → 자신의 의지로 가득한 → 고의의·고집 센으로 고착 > 결과를 알면서도 의도적으로 밀어붙이는 장면이 원형'},
{n:2547,w:'retract',m:'v. ① (앞서 한 말·약속·명령·합의 등을) 철회[취소]하다 ② (몸통·껍질 등의 속으로) 들어가다[움츠리다]; 집어넣다',s:'recant, revoke',r:'re (back) + tract (pull, 당기다) → 뒤로 당겨 거두다 → 철회하다·움츠리다로 고착 > 고양이가 발톱을 발 안으로 집어넣는 장면이 원형'},
{n:2548,w:'votary',m:'n. ① (특정 종교의) 신봉자, 신자 ② (사상·주의 등의) 지지자; 애호가',s:'devotee, enthusiast',r:'라틴어 votum (vow, 서약) + -ary → 서약한 사람 → 신봉자·지지자·애호가로 고착 > 신앙을 위해 서약하고 헌신하는 장면이 원형'},
{n:2549,w:'encroach',m:'vi. ① (남의 나라·땅 등을) 잠식(蠶食)하다, 침략하다, 침입하다[on, upon] ② (남의 권리 등을) 침해하다[on, upon] ③ (바다가) 침식하다',s:'intrude, trespass, infringe, violate, erode',r:'en (in) + croc (hook, 갈고리) → 갈고리로 걸어 조금씩 침범하다 → 잠식하다·침해하다로 고착 > 이웃 땅을 조금씩 침범해 들어가는 장면이 원형'},
{n:2550,w:'disheveled',m:'a. ① (머리카락 등이) 흐트러진, 엉클어진 ② (옷차림 등이) 단정치 못한, 난잡한',s:'uncombed, messy, unkempt, untidy',r:'고대 프랑스어 descheveler (unkempt hair, 헝클어진 머리) → 머리카락이 흐트러진 → 흐트러진·단정치 못한으로 고착 > 바람에 머리가 사방으로 헝클어진 장면이 원형'},
{n:2551,w:'explicit',m:'a. 명백한, 명확한; 노골적인',s:'clear, clear-cut, definite, flagrant, unequivocal',r:'ex (out) + plic (fold, 접다) → 접힌 것을 밖으로 펼쳐 보이다 → 명백한·노골적인으로 고착 > 숨김없이 모든 것을 펼쳐 보여주는 장면이 원형'},
{n:2552,w:'subjugate',m:'vt. 정복하다, 지배[통제]하에 두다, 종속시키다',s:'conquer, dominate',r:'sub (under) + jug (yoke, 멍에) + -ate → 멍에 아래 두다 → 정복하다·종속시키다로 고착 > 소의 목에 멍에를 씌워 복종시키는 장면이 원형'},
{n:2553,w:'corollary',m:'n. 추론; 필연적인[당연한] 결과',s:'conclusion, consequence, outcome, result',r:'라틴어 corollarium (gift, 선물) → 증명 후 저절로 따라오는 결론 → 추론·필연적 결과로 고착 > 수학 정리를 증명하면 자동으로 도출되는 보조 정리의 장면이 원형'},
{n:2554,w:'prim',m:'a. ① 까다로운, 지나치게 꼼꼼한; (여자가) 새침한 ② (복장·정원 등이) 단정한, 깔끔한',s:'old-maidish, precise, prudish, neat, trim',r:'고대 프랑스어 prim (fine, 섬세한) → 지나치게 세세하게 따지는 → 까다로운·단정한으로 고착 > 먼지 하나 없이 흠잡을 데 없이 정리된 장면이 원형'},
{n:2555,w:'blandish',m:'v. 달콤한 말로 구슬리다, 구슬려서 ~를 시키다, 구워삶다',s:'cajole, coax, wheedle',r:'라틴어 blandiri (flatter, 아첨하다) → 달콤한 말로 구슬리다 → 구슬리다·구워삶다로 고착 > 달콤한 말로 상대를 녹여 원하는 것을 얻는 장면이 원형'},
{n:2556,w:'diatribe',m:'n. 통렬한 비난, 비방, 혹평',s:'denunciation, harangue, tirade, vituperation',r:'그리스어 diatribe (pastime, 소일) → 시간을 들여 격렬히 비난하는 것 → 통렬한 비난·혹평으로 고착 > 상대를 향해 거침없이 독설을 쏟아내는 장면이 원형'},
{n:2557,w:'horrible',m:'a. 무서운, 끔찍한; 소름 끼치도록 싫은; 지독한',s:'awful, dreadful, terrible',r:'라틴어 horrere (shudder, 전율하다) + -ible → 전율하게 만드는 → 무서운·끔찍한으로 고착 > 너무 무서워 온몸이 떨리는 장면이 원형'},
{n:2558,w:'protégé',m:'n. ① 피보호자, 피후견인 ② 후배[제자]',s:'ward, pupil',r:'프랑스어 protéger (protect, 보호하다) → 보호받는 사람 → 피후견인·후배·제자로 고착 > 스승이 날개 아래 제자를 보호하는 장면이 원형'},
{n:2559,w:'repress',m:'vt. ① (감정을) 억누르다, 억제하다 ② 진압하다, 억압하다',s:'control, hold back, suppress, crush, subdue',r:'re (back) + press (누르다) → 뒤로 눌러 억누르다 → 억누르다·진압하다로 고착 > 솟구치는 감정을 꾹 눌러 참는 장면이 원형'},
{n:2560,w:'skirmish',m:'n. ① 전초전(前哨戰), (우발적인) 작은 전투, 소규모 충돌 ② 작은 충돌, 작은 논쟁',s:'battle, fight, argument, conflict, dispute',r:'고대 프랑스어 eskirmir (fence, 검술) → 작은 규모의 칼싸움 → 전초전·소규모 충돌로 고착 > 본격적인 전투 전 소규모 선발대가 부딪히는 장면이 원형'},
{n:2561,w:'adventitious',m:'a. ① 우연히 얻은, 우연의, 우발의 ② 부수적인 ③ 외래의',s:'inadvertent, incidental, occurrent, collateral, subordinate, subsidiary, adscititious, foreign, heterogenous',r:'라틴어 adventicius (coming from outside, 외부에서 오는) → 외부에서 우연히 온 → 우연의·부수적인으로 고착 > 예상치 않았던 곳에서 우연히 생겨난 장면이 원형'},
{n:2562,w:'contour',m:'n. ① 윤곽, 외형; 윤곽선; 등고선 ② 형세, 정세, 상황',s:'outline, profile, shape, conditions, situation, state',r:'con (together) + tour (turn, 돌다) → 함께 돌아 이어진 선 → 윤곽·등고선으로 고착 > 산의 높이를 나타내는 등고선이 그려진 지도의 장면이 원형'},
{n:2563,w:'stodgy',m:'a. ① (음식이) 소화가 잘 안 되는, 더부룩한 느낌을 주는 ② 따분한, 지루한',s:'boring, dull, tedious, tiresome',r:'stodge (heavy food, 무거운 음식) + -y → 소화가 안 되는 무거운 것처럼 → 더부룩한·따분한으로 고착 > 빽빽한 내용으로 소화하기 어려운 책의 장면이 원형'},
{n:2564,w:'demarcate',m:'vt. 경계를 정하다; 한정[구분]하다',s:'define, differentiate, separate',r:'de (out) + marc (mark, 표시하다) + -ate → 경계를 표시해 구분하다 → 경계를 정하다·구분하다로 고착 > 두 나라 사이에 국경선을 긋는 장면이 원형'},
{n:2565,w:'mirage',m:'n. 신기루, 환상',s:'delusion, fantasy, hallucination, illusion',r:'아랍어 maraja (to appear, 보이다) → 사막에서 물이 있는 것처럼 보이는 환상 → 신기루·환상으로 고착 > 뜨거운 사막에서 물이 있는 것처럼 보이는 장면이 원형'},
{n:2566,w:'chaste',m:'a. ① (육체적으로) 순결한; (여자가) 정숙한 ② (사람·행위가) 조심스러운, 품위 있는',s:'pure, virginal, decent, elegant, modest, refined',r:'라틴어 castus (pure, 순수한) → 순수하고 깨끗한 → 순결한·정숙한·품위 있는으로 고착 > 유혹 앞에서도 순결을 지키는 장면이 원형'},
{n:2567,w:'imbibe',m:'v. ① (술 등을) 마시다 ② (사상·정보 등을) 받아들이다, 흡수하다',s:'absorb, assimilate',r:'im (in) + bib (drink, 마시다) → 안으로 마셔 들이다 → 마시다·흡수하다로 고착 > 스펀지가 물을 빨아들이듯 지식을 흡수하는 장면이 원형'},
{n:2568,w:'consanguinity',m:'n. ① 혈족 (관계), 동족, 친족 (관계) ② 밀접한 관계',s:'blood-relationship, kin, kinship, affinity, twinship',r:'con (together) + sanguin (blood, 피) + -ity → 같은 피를 가진 것 → 혈족 관계로 고착 > 같은 핏줄이 흐르는 가족 나무의 장면이 원형'},
{n:2569,w:'emeritus',m:'a. 명예퇴직의; 전관 예우의 / n. 명예교수; 전관 대우자',s:'',r:'라틴어 emeritus (having served out one\'s time, 복무를 마친) → 충분히 복무한 → 명예퇴직의·전관 예우의로 고착 > 오랜 봉사 후 명예 직함을 달고 은퇴하는 교수의 장면이 원형'},
{n:2570,w:'anguish',m:'n. (극심한) 괴로움, 고통, 고뇌',s:'agony, grief, pain, torment',r:'라틴어 angustia (tightness, 좁음) → 가슴이 조여드는 고통 → 극심한 괴로움·고뇌로 고착 > 가슴을 틀어쥐고 고통스러워하는 장면이 원형'},
{n:2571,w:'outshine',m:'v. ~보다 밝게 빛나다, ~보다 뛰어나다, 무색하게 하다',s:'eclipse, outdo, surpass',r:'out (넘어서) + shine (빛나다) → 더 밝게 빛나 능가하다 → 더 뛰어나다·무색하게 하다로 고착 > 태양이 별을 무색하게 만드는 장면이 원형'},
{n:2572,w:'clip',m:'v. ① 자르다, 베다, 가위질하다, 깎다 ② (기간 등을) 단축하다; (경비 등을) 삭감하다 / n. 동영상',s:'cut, prune, shave, shear, trim, curtail, pare, reduce, shorten',r:'고대 영어 clyppan (embrace, 껴안다) → 가위로 자르다·재빨리 움직이다 → 자르다·단축하다·동영상으로 고착 > 가위로 신문 기사를 오려내는 장면이 원형'},
{n:2573,w:'defray',m:'vt. (비용을) 지불하다, 부담하다, 지출하다',s:'disburse, pay',r:'고대 프랑스어 defrayer (pay costs, 비용을 치르다) → 비용을 대신 치르다 → 지불하다·부담하다로 고착 > 계산서를 들고 비용을 지불하는 장면이 원형'},
{n:2574,w:'ragged',m:'a. ① 누더기를 걸친; (옷이) 해진, 너덜너덜[누덕누덕]한',s:'shabby, tattered, torn, worn',r:'고대 노르드어 rögg (shaggy, 거친 털) + -ed → 거칠게 너덜너덜한 → 누더기를 걸친·해진으로 고착 > 옷이 닳고 찢겨 너덜거리는 장면이 원형'},
{n:2575,w:'non sequitur',m:'n. ① (전제와 아무런 연결이 안 되는) 불합리한 추론[결론] ② (이제까지의 화제와는) 무관한 이야기',s:'',r:'라틴어 non (not) + sequitur (it follows, 따라온다) → 앞의 것에서 논리적으로 따라오지 않는 것 → 불합리한 결론·무관한 이야기로 고착 > 앞 말과 전혀 상관없는 결론을 내리는 장면이 원형'},
{n:2576,w:'tricky',m:'a. ① (다루기) 힘든[까다로운], 곤란한 ② 교활한, 교묘한',s:'complicated, difficult, crafty, cunning, guileful, sly',r:'trick (속임수) + -y → 속임수가 가득한 → 까다로운·교활한으로 고착 > 겉으로 단순해 보이지만 함정이 가득한 문제의 장면이 원형'},
{n:2577,w:'melee',m:'n. ① 치고받기, 난투, 혼전 ② 혼란, 소동, 아수라장',s:'brawl, fight, fracas, fray, tussle, confusion, disturbance, fuss, perturbation',r:'프랑스어 mêlée (mix, 뒤섞다) → 모두가 뒤섞여 치고받는 난투 → 난투·혼란으로 고착 > 여러 사람이 뒤엉켜 치고받는 혼전의 장면이 원형'},
{n:2578,w:'enthrone',m:'vt. ① 왕좌[왕위]에 앉히다, 즉위시키다 ② 떠받들다, 깊이 존경[경배]하다',s:'crown, scepter, respect, revere',r:'en (in) + throne (왕좌) → 왕좌에 앉히다 → 즉위시키다·떠받들다로 고착 > 새 왕이 보석 박힌 왕좌에 앉는 장면이 원형'},
{n:2579,w:'unrest',m:'n. (사회적인) 불안, 불만; 걱정; 동요',s:'insecurity, dissatisfaction, anxiety, disturbance',r:'un (not) + rest (안정) → 안정이 없는 상태 → 불안·불만·동요로 고착 > 사회가 들끓으며 불안이 퍼지는 장면이 원형'},
{n:2580,w:'bulwark',m:'n. ① 성채, 보루 ② 방호물, 방벽',s:'bastion, citadel, fortress, rampart, barrier, dike',r:'중세 영어 bulwerke (rampart, 성벽) → 방어를 위해 쌓은 성벽 → 성채·방벽으로 고착 > 두꺼운 돌담이 외부 공격을 막아내는 장면이 원형'},
{n:2581,w:'graft',m:'n. ① 접목, 접붙이기; (피부·뼈 등의) 이식 ② (특히 정치 관계의) 부정 이득, 수뢰(收賂) / v. 접목하다; (피부·뼈 등을) 이식하다',s:'transplant, bribery',r:'고대 프랑스어 greffe (stylus, 접목 칼) → 나무를 잘라 붙이다 → 접목·이식·부정 이득으로 고착 > 두 나무를 잘라 이어 붙여 하나로 만드는 장면이 원형'},
{n:2582,w:'diurnal',m:'a. ① 낮 동안의, 주간의 ② (동물이) 주행성(晝行性)의, 낮에 활동하는',s:'daytime',r:'라틴어 diurnus (daily, 낮의) + -al → 낮 동안의 → 낮 동안의·주행성의로 고착 > 해가 뜨면 활동을 시작하는 동물의 장면이 원형'},
{n:2583,w:'verse',m:'n. 운문, 시(詩) / vt. ~에 정통[숙달]하다[in]',s:'poem, poetry, be conversant with, be familiar with, be well acquainted with',r:'라틴어 versus (turn of the plow, 쟁기의 방향 전환) → 쟁기가 끝에서 방향을 바꾸듯 줄이 끝에서 꺾이는 시 → 운문·정통하다로 고착 > 박자와 운을 맞춰 쓴 한 절의 시의 장면이 원형'},
{n:2584,w:'knowingly',m:'ad. ① (사정 등을) 알고도, 고의로 ② (비밀로 되어 있는 일을) 다 알고 있다는 듯이',s:'deliberately, intentionally, wittingly',r:'knowing (알면서) + -ly → 알면서도 → 고의로·다 알고 있다는 듯이로 고착 > 결과를 알면서도 일부러 그 행동을 하는 장면이 원형'},
{n:2585,w:'textile',m:'n. 직물, 옷감; 직물의 원료',s:'cloth, fabric, material',r:'라틴어 texere (weave, 짜다) + -ile → 짜인 것 → 직물·옷감으로 고착 > 씨실과 날실을 교차해 천을 짜는 장면이 원형'},
{n:2586,w:'syllogism',m:'n. 삼단논법; 연역적 추리',s:'',r:'그리스어 syllogizesthai (infer, 추론하다) → 두 전제에서 결론을 도출하는 추론 → 삼단논법으로 고착 > 대전제·소전제·결론의 세 단계로 논리를 전개하는 장면이 원형'},
{n:2587,w:'banal',m:'a. 평범한, 진부한',s:'commonplace, hackneyed, trite',r:'프랑스어 banal (common, 공통의) → 모두가 공유해 진부해진 → 평범한·진부한으로 고착 > 너무 많이 써서 아무 감흥도 없는 표현의 장면이 원형'},
{n:2588,w:'alight',m:'vi. ① (탈것에서) 내리다, 하차하다 ② (새·곤충이) ~에 내려앉다 / a. ① 불붙은, 불타는 ② (기쁨·흥분으로 눈이) 빛나는',s:'descend, land, perch, aflame, burning, flaming, bright, gleaming, radiant, refulgent',r:'고대 영어 alihtan (dismount, 내리다) → 탈것에서 내려 땅에 닿다 → 내리다·내려앉다·불타는으로 고착 > 새가 나뭇가지에 살포시 내려앉는 장면이 원형'},
{n:2589,w:'foil',m:'vt. (계획 등을) 좌절시키다, 저지하다, 미연에 방지하다',s:'frustrate, thwart',r:'고대 프랑스어 fouler (trample, 짓밟다) → 계획을 짓밟아 좌절시키다 → 좌절시키다·저지하다로 고착 > 범인의 탈출 계획이 마지막 순간에 저지되는 장면이 원형'},
{n:2590,w:'gene',m:'n. 유전자, 유전 인자',s:'',r:'그리스어 genos (birth, 출생) → 유전 정보를 담고 태어나게 하는 것 → 유전자로 고착 > 부모의 특성이 자녀에게 전달되는 DNA의 장면이 원형'},
{n:2591,w:'cull',m:'vt. 고르다, 추려내다, 선택하다 / n. 선별; 채집',s:'pick, select',r:'라틴어 colligere (gather, 모으다) → 모은 것 중 좋은 것을 골라내다 → 고르다·추려내다로 고착 > 수확물에서 좋은 것만 골라내는 장면이 원형'},
{n:2592,w:'would-be',m:'a. (장차) ~이 되려고 하는, ~지망의; 자칭 ~의',s:'prospective, self-styled',r:'would (원하다) + be (되다) → ~이 되고 싶은 → ~지망의·자칭으로 고착 > 배우가 되길 꿈꾸며 오디션을 보는 장면이 원형'},
{n:2593,w:'limbo',m:'n. ① 망각의 구렁; 지옥의 변방; 중간 지역; 불확실한[어중간한] 상태 ② 구치소, 교도소',s:'jail, prison',r:'라틴어 limbus (edge, 가장자리) → 천국도 지옥도 아닌 가장자리 → 중간 지역·불확실한 상태로 고착 > 결정도 거절도 아닌 상태로 대기하는 장면이 원형'},
{n:2594,w:'page',m:'n. (호텔 등의) 급사; 시종(侍從) / v. 이름을 불러 (~를) 찾다; ~에게 휴대용 무선 호출기로 연락하다',s:'attendant, errand boy, varlet, beep, call',r:'라틴어 pagina (sheet, 페이지) → 메시지를 전달하는 급사 → 급사·이름을 불러 찾다로 고착 > 호텔에서 이름을 크게 불러 손님을 찾는 장면이 원형'},
{n:2595,w:'stunt',m:'vt. 성장[발달]을 방해하다, 저해하다, 저지하다 / n. 발육 저해; 성장을 방해하는 것',s:'hamper, hinder, retard',r:'고대 영어 stunt (foolish, 어리석은) → 발육을 어리석게 막아버리다 → 발달을 방해하다로 고착 > 영양 부족으로 성장이 멈춘 식물의 장면이 원형'},
{n:2596,w:'roster',m:'n. 근무자 명단, 근무 당번표, 직원[선수] 명단, 명부',s:'list, register, roll',r:'네덜란드어 rooster (gridiron, 석쇠) → 석쇠처럼 줄 지어 이름을 나열한 명부 → 근무자 명단으로 고착 > 벽에 붙은 당번표에 이름이 나열된 장면이 원형'},
{n:2597,w:'forthright',m:'a. ① 기탄없이 말하는, 솔직한 ② 직진하는, 똑바른 / ad. 똑바로; 솔직히',s:'candid, frank, outspoken, straightforward, direct, straight',r:'forth (앞으로) + right (곧은) → 앞으로 곧장 가는 → 솔직한·직접적인으로 고착 > 돌려 말하지 않고 직접 핵심을 말하는 장면이 원형'},
{n:2598,w:'ignition',m:'n. 점화, 발화, 인화(引火); 연소; (내연 기관의) 점화 장치',s:'combustion',r:'라틴어 ignis (fire, 불) + -tion → 불을 일으키는 것 → 점화·발화·점화 장치로 고착 > 열쇠를 꽂아 돌리자 엔진이 불을 일으키는 장면이 원형'},
{n:2599,w:'presage',m:'n. 전조, 조짐, 예감, 육감[of] / v. 전조가 되다, 예언하다, 예감하다',s:'omen, portent, prognostic, augur, auspicate, bode',r:'라틴어 prae (before) + sagire (perceive, 감지하다) → 미리 감지하다 → 전조·예감·예언하다로 고착 > 먹구름이 폭풍이 올 것을 예고하는 장면이 원형'},
{n:2600,w:'iniquitous',m:'a. 부정한, 불법의; 간악한',s:'unjust, vicious, wicked',r:'라틴어 iniquus (unequal, 불공평한) + -ous → 불공평하고 간악한 → 부정한·불법의·간악한으로 고착 > 저울을 속여 공정하지 않게 재는 장면이 원형'},
{n:2601,w:'judicious',m:'a. 현명한, 분별력 있는, 사려 깊은',s:'reasonable, sagacious, sensible, wise',r:'라틴어 judicium (judgment, 판단) + -ious → 판단력이 뛰어난 → 현명한·사려 깊은으로 고착 > 성급하지 않고 모든 것을 헤아려 결정하는 장면이 원형'},
{n:2602,w:'chicanery',m:'n. 교묘한 속임수, 책략',s:'deceit, deception, subterfuge, trickery',r:'프랑스어 chicaner (quibble, 트집 잡다) → 교묘한 말과 술수로 속이다 → 교묘한 속임수·책략으로 고착 > 법의 허점을 교묘히 이용해 빠져나가는 장면이 원형'},
{n:2603,w:'siphon',m:'v. ① 사이펀으로 빨아들이다; (수입·세금 등을) 빨아들이다, 흡수하다 ② (이익 등을) 빼돌리다, (부정하게) 유용하다[off, from]',s:'divert, pocket',r:'그리스어 siphon (tube, 관) → 관을 이용해 액체를 빨아들이다 → 빨아들이다·빼돌리다로 고착 > 호스로 통 속 물을 빨아 다른 곳으로 옮기는 장면이 원형'},
{n:2604,w:'preemptive',m:'a. 선제적인, 선수를 치는, 예방의',s:'anticipative',r:'pre (before) + empt (buy, 사다) + -ive → 먼저 사버리는 → 선제적인·선수를 치는으로 고착 > 상대가 행동하기 전에 먼저 치는 장면이 원형'},
{n:2605,w:'behead',m:'vt. (형벌로) 목을 베다, 참수하다, 참수형에 처하다',s:'decapitate',r:'be (completely) + head (머리) → 머리를 완전히 분리하다 → 목을 베다·참수하다로 고착 > 단두대에서 칼날이 내려오는 장면이 원형'},
{n:2606,w:'spree',m:'n. ① 흥청거리기, 법석댐; 술잔치',s:'bender, binge, carousal, orgy, revel ② (범행을) 한바탕 저지르기',r:'18세기 스코틀랜드어 spree (drinking bout, 술잔치) → 흥청망청 마시고 노는 것 → 흥청거리기·법석댐으로 고착 > 밤새 술을 마시며 법석대는 장면이 원형'},
{n:2607,w:'efficacy',m:'n. (약 등의) 효험, 효능; 유효성',s:'effectiveness, potency, virtue',r:'라틴어 efficacia (effectiveness, 효과) → 목적을 달성하는 능력 → 효험·효능·유효성으로 고착 > 약이 증상을 빠르게 없애는 장면이 원형'},
{n:2608,w:'diaphanous',m:'a. (천이) 아주 얇은, 내비치는, 투명한',s:'gossamer, pellucid, sheer, transparent',r:'그리스어 dia (through) + phainein (show, 보이다) → 빛이 통과해 비치는 → 아주 얇은·투명한으로 고착 > 얇은 시폰 천 너머로 윤곽이 비치는 장면이 원형'},
{n:2609,w:'contort',m:'v. 비틀다, 일그러뜨리다; (의미 등을) 왜곡[곡해]하다',s:'twist, distort',r:'con (together) + tort (twist, 비틀다) → 완전히 뒤틀다 → 비틀다·일그러뜨리다로 고착 > 고통으로 얼굴이 일그러지는 장면이 원형'},
{n:2610,w:'subsidiary',m:'a. ① 부수적인; 보조의',s:'secondary, subordinate ② 보조금의, 보조금에 의한 n. ① 보조물, 부가물, additament, appendage ② 자회사, affiliate, branch, division',r:'라틴어 subsidium (support, 지원) + -ary → 지원하는 역할의 → 부수적인·보조의로 고착 > 본사 아래에 딸린 자회사의 장면이 원형'},
{n:2611,w:'invidious',m:'a. ① 비위에 거슬리는, 불쾌한, 기분 나쁘게 만드는',s:'offensive, unpleasant ② 불공평한, 부당한, unfair, unjust',r:'라틴어 invidia (envy, 시기) + -ous → 시기심을 불러일으키는 → 비위에 거슬리는·불쾌한으로 고착 > 불공평한 비교로 기분을 나쁘게 만드는 장면이 원형'},
{n:2612,w:'promontory',m:'n. 곶(바다 혹은 강물의 융기지형), 갑(岬)',s:'cape, foreland, headland',r:'라틴어 prominere (jut out, 튀어나오다) → 바다 쪽으로 툭 튀어나온 땅 → 곶·갑으로 고착 > 바다를 향해 뾰족하게 뻗어 나온 육지의 장면이 원형'},
{n:2613,w:'belittle',m:'vt. 얕잡아보다, 깔보다, 비하하다',s:'disparage, downplay, underestimate',r:'be (make) + little (작은) → 작게 만들다 → 얕잡아보다·비하하다로 고착 > 상대의 노력을 사소하게 깎아내리는 장면이 원형'},
{n:2614,w:'sonorous',m:'a. (소리가) 울리는, 울려 퍼지는, 낭랑한',s:'orotund, resonant, vibrant',r:'라틴어 sonorus (loud, 울리는) → 풍부하게 울려 퍼지는 소리 → 낭랑한으로 고착 > 깊고 울림 있는 목소리가 홀 전체에 퍼지는 장면이 원형'},
{n:2615,w:'repartee',m:'n. 재치 있는 즉답, 환담; 재치 있는 말재주',s:'riposte, witticism, wordplay',r:'프랑스어 repartir (set out again, 다시 출발하다) → 재빨리 되받아치는 재치 있는 대답 → 재치 있는 즉답으로 고착 > 상대의 농담에 즉시 더 재치 있게 받아치는 장면이 원형'},
{n:2616,w:'glutton',m:'n. 대식가, 탐식가',s:'gourmand',r:'라틴어 gluttire (swallow, 삼키다) → 음식을 게걸스럽게 삼키는 사람 → 대식가·탐식가로 고착 > 음식을 빠르게 입에 쑤셔 넣는 장면이 원형'},
{n:2617,w:'assay',m:'v. 시험하다; 분석[시금]하다; 평가하다',s:'examine, analyze, evaluate',r:'고대 프랑스어 assaier (test, 시험하다) → 금속의 순도를 시험하다 → 시험하다·분석하다로 고착 > 금속 표본을 화학적으로 분석하는 장면이 원형'},
{n:2618,w:'complimentary',m:'a. ① 무료의',s:'buckshee, gratis, gratuitous ② 칭찬하는, commendatory, eulogistic, laudatory, panegyric',r:'라틴어 complere (complete, 완성하다) → 서비스를 완성해주는 것 → 무료의·칭찬의로 고착 > 호텔에서 아침 식사를 무료로 제공하는 장면이 원형'},
{n:2619,w:'murmur',m:'n. (불평·불만의) 중얼거림, 투덜거림',s:'grouse, grumble, moan v. 중얼거리다; 불평하다, 투덜대다, complain, grumble',r:'라틴어 murmur (humming, 웅웅거림) → 낮고 부드럽게 웅웅거리다 → 중얼거림·투덜거림으로 고착 > 입을 반쯤 닫고 불만을 중얼거리는 장면이 원형'},
{n:2620,w:'fetid',m:'a. 악취를 내뿜는, 고약한 냄새가 나는',s:'foul, rank, stinking',r:'라틴어 fetere (stink, 악취가 나다) + -id → 썩어서 악취가 나는 → 악취를 내뿜는으로 고착 > 오랫동안 방치된 것에서 역겨운 냄새가 나는 장면이 원형'},
{n:2621,w:'aggregate',m:'a. 집합한; 합계[총계]의',s:'gross, overall, total, whole n. 합계, 총액, total v. 모으다, 집합하다; 총계 ~이 되다, amount to',r:'라틴어 ad (to) + greg (flock, 무리) + -ate → 무리를 이루어 합친 → 집합한·합계의로 고착 > 여러 부분이 합쳐져 하나의 총합을 이루는 장면이 원형'},
{n:2622,w:'crumble',m:'v. ① (빵 등을) 부스러뜨리다, 가루로 만들다; 산산조각 나다, 부서지다',s:'pulverize ② (건물이나 땅이) 허물어지다, 무너지다, collapse, founder, shatter',r:'고대 영어 cruma (crumb, 부스러기) → 부스러지며 작은 조각으로 무너지다 → 부스러지다·산산조각 나다로 고착 > 오래된 건물 벽이 부스러져 떨어지는 장면이 원형'},
{n:2623,w:'stagger',m:'v. ① 비틀거리다, 비틀거리며 걷다',s:'stumble, totter ② 큰 충격을 주다, 깜짝 놀라게 하다',r:'중세 영어 stakeren (reel, 비틀거리다) → 중심을 잃고 비틀거리다 → 비틀거리다·깜짝 놀라게 하다로 고착 > 술에 취해 이쪽저쪽으로 비틀거리는 장면이 원형'},
{n:2624,w:'inflection',m:'n. ① 굴절, 굴곡, 만곡 ② 억양, 어조',s:'cadence, intonation, modulation, tone ③ (단어·어미의) 굴절, 어형 변화',r:'in (into) + flect (bend, 구부리다) + -ion → 안으로 구부러지는 것 → 굴절·억양으로 고착 > 질문할 때 문장 끝의 음이 올라가는 장면이 원형'},
{n:2625,w:'combustible',m:'a. ① 가연성인, 불붙기 쉬운',s:'flammable, inflammable ② 흥분하기 쉬운, excitable, hotheaded',r:'라틴어 comburere (burn up, 다 타다) + -ible → 다 타버릴 수 있는 → 가연성인·불붙기 쉬운으로 고착 > 성냥 하나에 금방 불이 붙는 물질의 장면이 원형'},
{n:2626,w:'avalanche',m:'n. ① 눈사태',s:'landslide, landslip, snowslide ② (질문·편지 등의) 쇄도, barrage, deluge, torrent',r:'프랑스어 aval (downward, 아래로) → 아래로 쏟아지는 눈 → 눈사태로 고착 > 산 위의 눈이 굉음과 함께 쏟아져 내리는 장면이 원형'},
{n:2627,w:'rub',m:'v. ① 문지르다, 비비다; 마찰하다',s:'chafe, scrape ② 닦다; 문질러 지우다, 비벼 떼어[없애]다, erase, polish, scour, scrub ③ 안달 나게 하다, 애먹이다, nettle, rankle',r:'고대 영어 rubbian (rub, 문지르다) → 표면을 맞대고 문지르다 → 문지르다·마찰하다로 고착 > 손바닥을 비벼 열을 내는 장면이 원형'},
{n:2628,w:'erratic',m:'a. ① 별난, 괴짜의',s:'bizarre, eccentric ② 불규칙한, 일정치 않은, 변덕스러운, irregular, mercurial, unpredictable, wayward',r:'라틴어 errare (wander, 방황하다) + -ic → 정처 없이 방황하는 → 별난·불규칙한으로 고착 > 예측할 수 없이 이리저리 방향을 바꾸는 장면이 원형'},
{n:2629,w:'deign',m:'v. ① 황송하게도 ~해 주시다',s:'condescend ② (주로 부정문에서) 머리를 숙여[체면 불구하고] ~하다',r:'라틴어 dignare (deem worthy, 가치 있다 여기다) → 자신을 낮춰 허락하다 → 황송하게도 해 주시다로 고착 > 왕이 마지못해 신하의 청을 허락하는 장면이 원형'},
{n:2630,w:'travesty',m:'n. 익살스럽게 고친 것, 졸렬한 모방[조롱]',s:'burlesque, caricature, parody vt. (진지한 작품을) 우스꽝스럽게 만들다, 희화화(戱畵化)하다',r:'이탈리아어 travestire (disguise, 변장하다) → 원작을 우스꽝스럽게 변장시킨 것 → 졸렬한 모방·조롱으로 고착 > 진지한 작품을 우습게 패러디한 장면이 원형'},
{n:2631,w:'bountiful',m:'a. ① (물건이) 많은, 풍부한',s:'abundant, ample, bounteous, plentiful ② (사람이) 아낌없이 주는, 통이 큰, generous, liberal, munificent',r:'bounty (너그러움) + -ful → 너그러움이 가득한 → 풍부한·너그러운으로 고착 > 식탁에 음식이 넘치도록 차려진 장면이 원형'},
{n:2632,w:'interlope',m:'vi. ① 남의 일에 참견하다(주제넘게 나서다)',s:'intermeddle, kibitz, meddle ② 무허가 영업을 하다',r:'inter (between) + lope (run, 달리다) → 사이로 끼어들다 → 참견하다·주제넘게 나서다로 고착 > 남의 사업에 허락도 없이 끼어드는 장면이 원형'},
{n:2633,w:'warp',m:'v. ① (재목·판자 등을) 휘게 하다, 구부리다, 뒤틀다',s:'bend, buckle, contort, deform ② (마음·판단 등을) 비뚤어지게 하다; 왜곡하다, distort, pervert, twist',r:'고대 영어 weorpan (throw, 던지다) → 던져진 것처럼 비틀어지다 → 휘게 하다·뒤틀다로 고착 > 습기로 나무 판자가 휘어진 장면이 원형'},
{n:2634,w:'hush',m:'n. 침묵, 고요, 조용함',s:'calm, quiescence, silence, stillness, tranquility',r:'중세 영어 husht (silent, 조용한) → 소리를 죽여 조용하게 하다 → 침묵·조용함으로 고착 > 입에 손가락을 대며 쉿하는 장면이 원형'},
{n:2635,w:'carouse',m:'v. 술을 마구 마시고 법석대다',s:'booze, revel n. 떠들썩한 잔치; 흥겹게 마시고 놀기, binge, spree',r:'독일어 gar aus trinken (drink completely, 다 마시다) → 술을 모두 들이켜며 법석대다 → 술을 마구 마시고 법석대다로 고착 > 잔을 들고 노래하며 법석이는 장면이 원형'},
{n:2636,w:'ornate',m:'a. 화려하게 장식한; (문체가) 화려한, 매우 수사적인',s:'elaborate, flamboyant',r:'라틴어 ornare (adorn, 꾸미다) + -ate → 화려하게 꾸민 → 화려하게 장식한·매우 수사적인으로 고착 > 금박과 보석으로 가득 장식된 장면이 원형'},
{n:2637,w:'leviathan',m:'n. ① (강력하고) 거대한 것',s:'behemoth, colossus, mammoth ② (일반적으로) 거대한 바다 동물, (특히) 고래 ③ (the L~) 전제주의 국가, totalitarian state a. 거대한, colossal, gargantuan, gigantic, huge, mammoth',r:'히브리어 liwyathan (twisted, 뒤틀린) → 성경의 거대한 바다 괴물 → 거대한 것으로 고착 > 바다를 뒤흔드는 거대한 고래의 장면이 원형'},
{n:2638,w:'foment',m:'vt. (불화·반란 등을) 조장하다, 선동하다',s:'foster, instigate, provoke',r:'라틴어 fomentum (poultice, 습포) → 온찜질로 따뜻하게 불을 피우듯 조장하다 → 선동하다·조장하다로 고착 > 불씨에 바람을 불어 불길을 키우는 장면이 원형'},
{n:2639,w:'notion',m:'n. ① 관념, 개념',s:'belief, concept ② 생각, 의견; 의향, idea, opinion',r:'라틴어 notio (concept, 개념) → 마음속에 생겨난 개념 → 관념·개념으로 고착 > 머릿속에 막연하게 떠오른 생각의 장면이 원형'},
{n:2640,w:'revitalize',m:'vt. 생기를 회복시키다, 소생시키다; 부흥[부활]시키다',s:'reanimate',r:'re (again) + vital (life, 생명) + -ize → 다시 생명을 불어넣다 → 생기를 회복시키다·소생시키다로 고착 > 시들었던 화초에 물을 줘 되살리는 장면이 원형'},
{n:2641,w:'privation',m:'n. ① (생활필수품 등의) 결여, 결핍; 궁핍',s:'destitution, impoverishment ② 박탈, 몰수, 상실',r:'라틴어 privare (deprive, 빼앗다) + -tion → 필수적인 것을 빼앗긴 상태 → 결핍·궁핍으로 고착 > 기본 생필품도 없이 지내는 장면이 원형'},
{n:2642,w:'turgid',m:'a. ① 부은, 팽창한; (손발이) 부어오른',s:'inflated, puffy, swollen ② (말·문체가) 과장된, 허풍치는, bloated, bombastic, pompous',r:'라틴어 turgere (swell, 부풀다) + -id → 부풀어 오른 → 부은·팽창한·문체가 과장된으로 고착 > 벌에 쏘여 부어오른 피부의 장면이 원형'},
{n:2643,w:'dope',m:'n. ① (아편·모르핀 등의) 마약',s:'drug, narcotic ② 마약 (중독) 환자; 멍청이, 얼간이, donkey, dunce, idiot, simpleton ③ (경마에 관한) 내부정보; 비밀 정보',r:'네덜란드어 doop (sauce, 소스) → 들이켜는 소스에서 마약으로 → 마약·정보·속이다로 고착 > 주사기로 마취제를 투여하는 장면이 원형'},
{n:2644,w:'expound',m:'v. 상세히 설명하다, 상술[해설]하다',s:'elucidate, expatiate, explicate',r:'ex (out) + pound (put, 놓다) → 밖으로 꺼내 자세히 설명하다 → 상세히 설명하다로 고착 > 칠판에 단계별로 써가며 상세히 설명하는 장면이 원형'},
{n:2645,w:'bugaboo',m:'n. 도깨비, 요괴; 몹시 두렵게 하는 것; (근거 없는) 걱정거리',s:'bogeyman, bogy, bugbear',r:'bugbear (귀신) + boo (놀람 소리) → 갑자기 나타나 겁을 주는 것 → 두렵게 하는 것·근거 없는 걱정으로 고착 > 어두운 곳에서 갑자기 나타나 깜짝 놀라게 하는 장면이 원형'},
{n:2646,w:'provision',m:'n. ① 예비, 준비, 설비[for, against]',s:'arrangements, plan, preparation ② 공급, 지급; (pl.) 양식, 식량, supplying ③ 규정, 조항, clause, condition, term',r:'pro (before) + vis (see, 보다) + -ion → 미리 보아 준비하는 것 → 예비·준비·설비로 고착 > 여행 전에 필요한 것들을 미리 챙기는 장면이 원형'},
{n:2647,w:'gloat',m:'vi. 흡족한[기분 좋은, 고소한] 듯이 바라보다; 혼자서 히죽이 웃다[over, upon, on]',s:'',r:'고대 노르드어 glotta (grin, 비웃다) → 남의 불행을 보고 히죽이 웃다 → 흡족한 듯 바라보다로 고착 > 상대의 실패를 보며 고소하게 웃는 장면이 원형'},
{n:2648,w:'vine',m:'n. ① 덩굴; 덩굴 식물',s:'creeper ② 포도나무, grapevine',r:'라틴어 vinea (vineyard, 포도원) → 포도원의 덩굴 → 덩굴·덩굴 식물로 고착 > 담장을 타고 올라가는 포도 넝쿨의 장면이 원형'},
{n:2649,w:'devolve',m:'v. (일·권리·의무 등을) 양도하다, 위임하다, 맡기다',s:'delegate, depute, entrust',r:'de (down) + volv (roll, 굴러가다) → 아래로 굴려 넘기다 → 양도하다·위임하다로 고착 > 상급자가 업무를 하급자에게 넘기는 장면이 원형'},
{n:2650,w:'smudge',m:'n. (더러운) 자국, 얼룩',s:'blot, smear, stain v. 더럽히다, 얼룩을 남기다, besmirch, soil',r:'중세 영어 smogen (smear, 바르다) → 문질러 번진 자국 → 더러운 자국·얼룩으로 고착 > 잉크가 번져 생긴 얼룩의 장면이 원형'},
{n:2651,w:'quiver',m:'v. 떨리다[떨게 하다], 흔들리다, 진동하다',s:'quake, shake, shiver, shudder, tremble, vibrate n. 떨림, 진동, tremor, vibration',r:'중세 영어 quiveren (tremble, 떨다) → 가늘게 떨리다 → 떨리다·진동하다로 고착 > 공포로 입술이 가늘게 떨리는 장면이 원형'},
{n:2652,w:'overt',m:'a. 명백한, 공공연한',s:'apparent, manifest, obvious, open, plain',r:'고대 프랑스어 overt (open, 열린) → 열려 있어 누구나 볼 수 있는 → 명백한·공공연한으로 고착 > 아무도 모르게 하려 했지만 너무 드러나는 장면이 원형'},
{n:2653,w:'anathema',m:'n. ① 아주 싫은 것[사람]',s:'detestation ② (가톨릭교회의) 파문(破門), 저주, excommunication',r:'그리스어 anathema (thing devoted to evil, 저주받은 것) → 교회에서 파문하며 저주하는 것 → 아주 싫은 것으로 고착 > 교회가 공식적으로 저주를 선언하는 장면이 원형'},
{n:2654,w:'stint',m:'n. ① (일정 기간 동안 특정한 곳에서 하는) 일, 활동',s:'assignment, service ② 제한; 아끼며 함, 절약 v. (비용·식사 따위를) 바짝 줄이다, 절감하다, scrape, scrimp, skimp on',r:'고대 영어 styntan (blunt, 무디게 하다) → 정해진 양을 넘지 않게 제한하다 → 일정 기간 활동·절약하다로 고착 > 정해진 근무 기간을 다하는 장면이 원형'},
{n:2655,w:'convulsion',m:'n. ① 경련, 경기',s:'cramp, crick, fit, spasm, tic, twitch ② (사회·정치 등의) 격변, 동란, 동요, disturbance, turbulence, upheaval',r:'con (together) + vuls (pull, 당기다) + -ion → 온몸이 함께 당겨지는 것 → 경련·경기로 고착 > 온몸이 통제 없이 떨리며 경련하는 장면이 원형'},
{n:2656,w:'suffocate',m:'v. 숨이 막히게 하다; 질식시키다, 질식하다',s:'asphyxiate, choke, smother, stifle, strangle',r:'sub (under) + foc (throat, 목구멍) + -ate → 목구멍을 막다 → 숨이 막히게 하다·질식시키다로 고착 > 산소가 없어 숨이 막히는 장면이 원형'},
{n:2657,w:'equestrian',m:'a. 승마의, 마술(馬術)의 n. 승마자, 기수(騎手)',s:'horseman, jockey',r:'라틴어 equus (horse, 말) + -trian → 말에 관한 → 승마의·기수로 고착 > 말을 우아하게 타며 장애물을 넘는 장면이 원형'},
{n:2658,w:'propensity',m:'n. (특정한 행동을 하는) 경향, 성향',s:'disposition, inclination, tendency',r:'라틴어 propendere (hang toward, ~로 기울다) → 자연스럽게 기우는 경향 → 경향·성향으로 고착 > 기울어진 판 위의 구슬이 저절로 한쪽으로 구르는 장면이 원형'},
{n:2659,w:'discredit',m:'vt. ① 신용을 떨어뜨리다, 평판을 나쁘게 하다 ② 의심하다, 신용하지 않다',s:'distrust n. 불신; 불명예, mistrust, dishonor',r:'dis (not) + credit (믿음) → 믿음을 없애다 → 신용을 떨어뜨리다·의심하다로 고착 > 증거가 드러나 주장이 신뢰를 잃는 장면이 원형'},
{n:2660,w:'inexorable',m:'a. ① 냉혹한, 무정한, 용서 없는',s:'cold-blooded, cold-hearted, merciless, relentless ② 멈출[변경할] 수 없는, 거침없는, unstoppable',r:'in (not) + ex (out) + orable (pray, 기도하다) → 기도로도 막을 수 없는 → 냉혹한·용서 없는으로 고착 > 아무리 애원해도 멈추지 않는 장면이 원형'},
{n:2661,w:'assuage',m:'vt. (고통·슬픔·노여움 등을) 누그러뜨리다, 완화시키다',s:'allay, alleviate, appease, relieve, soothe',r:'라틴어 ad (to) + suavis (sweet, 달콤한) → 달콤하게 달래다 → 누그러뜨리다·완화시키다로 고착 > 화가 난 상대를 달콤한 말로 달래는 장면이 원형'},
{n:2662,w:'cupidity',m:'n. (재산·권력 등에 대한) 탐욕',s:'avarice, avidity, greed, rapacity',r:'라틴어 cupiditas (desire, 욕망) → 끝없는 욕망 → 탐욕으로 고착 > 가지면 가질수록 더 원하는 장면이 원형'},
{n:2663,w:'rattle',m:'v. ① 덜걱덜걱[우르르] 소리나다; (차 등이) 덜거덕거리며 달리다',s:'clatter, jangle, jolt ② 재잘거리다, 나불나불 지껄이다, chatter, gabble, prattle',r:'중세 영어 ratelen (rattle, 덜컹거리다) → 느슨한 것들이 부딪혀 덜컹대다 → 덜걱거리다·흔들다로 고착 > 빈 캔 안에서 동전이 덜그락거리는 장면이 원형'},
{n:2664,w:'preamble',m:'n. (법률·조약 등의) 전문(前文); 서문, 머리말',s:'foreword, introduction, preface, prelude',r:'라틴어 pre (before) + amble (walk, 걷다) → 앞서 걷는 것 → 전문·서문으로 고착 > 본론 전에 배경을 설명하는 도입부의 장면이 원형'},
{n:2665,w:'sacrosanct',m:'a. 신성불가침의, (사람·장소·법률 등이) 더할 나위 없이 신성한',s:'inviolable, sacred',r:'라틴어 sacer (sacred, 신성한) + sanctus (holy, 거룩한) → 신성하고 거룩한 → 신성불가침의로 고착 > 절대 건드릴 수 없는 성역의 장면이 원형'},
{n:2666,w:'meteor',m:'n. ① 유성(流星), 별똥별, 운석 ② 일시적으로 화려한 것, 일시적으로 반짝하는 사람',s:'',r:'그리스어 meteoron (thing in the air, 공중의 것) → 하늘에서 타며 떨어지는 것 → 유성·일시적으로 반짝하는 것으로 고착 > 밤하늘을 가로질러 타오르는 별똥별의 장면이 원형'},
{n:2667,w:'inveigle',m:'vt. 감언이설로 구슬리다, 꾀다, 속이다',s:'cajole, coax, entice, wheedle',r:'라틴어 ab (from) + oculis (eyes, 눈) → 눈을 멀게 해 속이다 → 감언이설로 구슬리다로 고착 > 달콤한 말로 상대를 홀려 함정에 빠뜨리는 장면이 원형'},
{n:2668,w:'snob',m:'n. ① 속물(지위나 재산이 있는 자에게 아첨하고 남을 얕보는 사람)',s:'philistine, vulgarian ② 학자인 체하는 사람, 사이비 학자, highbrow, wiseacre',r:'18세기 영어 snob (cobbler, 구두장이) → 귀족을 흉내 내는 천민 → 속물로 고착 > 지위 있는 사람에게 아첨하고 남을 깔보는 장면이 원형'},
{n:2669,w:'bush',m:'n. ① 관목; 덤불; (덤불처럼) 숱 많은 머리털 ② 미개간지, 오지',s:'outback, wasteland ③ (술집 간판으로서의) 담쟁이 가지; 술집',r:'고대 영어 bysc (bush, 관목) → 뒤엉킨 관목 → 관목·덤불·오지로 고착 > 정글처럼 우거진 덤불이 길을 막는 장면이 원형'},
{n:2670,w:'expedient',m:'a. ① (목적에) 맞는, 쓸모 있는, 편리한',s:'advantageous, convenient, useful ② 편의주의적인; (사람이) 이기적인, opportunistic, politic, selfish n. (임시 방편적인) 조치, 수단, 방편, 응급조치, makeshift',r:'라틴어 expedire (free from a snare, 덫에서 풀다) + -ent → 발을 빼기에 편리한 → 편리한·방편으로 고착 > 목적을 위해 가장 편한 방법을 선택하는 장면이 원형'},
{n:2671,w:'apparition',m:'n. ① 유령, 망령, 허깨비',s:'ghost, phantom, specter, spook, wraith ② (갑작스러운) 출현, advent, appearance, emergence',r:'라틴어 apparere (appear, 나타나다) + -tion → 갑자기 나타난 것 → 유령·망령으로 고착 > 어둠 속에서 하얀 형체가 갑자기 나타나는 장면이 원형'},
{n:2672,w:'unravel',m:'v. ① (얽힌 실·끈 등을) 풀다',s:'disentangle ② 해명하다; 해결하다, solve ③ (시스템·계획·관계 등이) 흐트러지기 시작하다',r:'un (reverse) + ravel (tangle, 엉키다) → 엉킨 것을 거꾸로 풀다 → 풀다·해결하다로 고착 > 엉킨 실 뭉치를 끝에서부터 차근히 풀어나가는 장면이 원형'},
{n:2673,w:'tier',m:'n. ① (층이 진) 열, 단, 층',s:'layer, line, range, row ② 단계; (사회) 계층, class, grade, level, order, rank',r:'고대 프랑스어 tire (rank, 열) → 층층이 쌓인 열 → 층·단으로 고착 > 웨딩케이크가 여러 층으로 쌓인 장면이 원형'},
{n:2674,w:'crush',m:'v. ① (물건을) 눌러 부수다, 으깨다',s:'break, pound, squash, trample ② (폭력으로) 진압하다, 탄압하다, quash, quell, subdue, suppress n. (보통 연상의 대상에 대한) 강렬한 사랑, 홀딱 반함, infatuation',r:'고대 프랑스어 croissir (gnash, 으깨다) → 강한 힘으로 눌러 으깨다 → 눌러 부수다·짝사랑으로 고착 > 포도를 발로 밟아 으깨는 장면이 원형'},
{n:2675,w:'flare',m:'v. ① (불꽃·불길이) 확 타오르다',s:'blaze, flame, flash ② (분노·반란 등이) 솟구치다, 갑자기 일어나다, erupt, explode n. 불길; 섬광',r:'중세 영어 flaren (blaze, 타오르다) → 갑자기 확 타오르다 → 확 타오르다·신호탄으로 고착 > 성냥에 불이 확 붙는 장면이 원형'},
{n:2676,w:'hang-up',m:'n. 심리적 장애, 고민, 곤란, 문제, 콤플렉스',s:'',r:'hang (걸리다) + up (위에) → 해결되지 않고 걸려있는 것 → 심리적 장애·콤플렉스로 고착 > 과거 상처가 걸림돌이 되어 앞으로 나아가지 못하는 장면이 원형'},
{n:2677,w:'mutilate',m:'vt. (수족 등을) 절단하다, 불구로 만들다',s:'cripple, maim',r:'라틴어 mutilare (maim, 불구로 만들다) → 신체 일부를 잘라 불구로 만들다 → 절단하다·훼손하다로 고착 > 팔다리가 절단되어 불구가 된 장면이 원형'},
{n:2678,w:'ambulatory',m:'a. 보행의, 이동하는, 이동성의, 돌아다니는',s:'movable, shifting, vagabond; (의학) 외래의, 통원의',r:'라틴어 ambulare (walk, 걷다) + -ory → 걷는 것과 관련된 → 보행의·이동하는으로 고착 > 환자가 침대를 벗어나 걷기 시작하는 장면이 원형'},
{n:2679,w:'wholesale',m:'n. 도매 a. 도매의; 대량의, 다수의, 대규모의 ad. 도매로; 대량으로, 다수로, 대규모로',s:'',r:'whole (전부) + sale (팔다) → 전부를 한꺼번에 팔다 → 도매·대량의로 고착 > 창고에서 상품을 박스째 대량으로 사는 장면이 원형'},
{n:2680,w:'epicenter',m:'n. ① (지진의) 진원지, 진앙(震央)',s:'epicentre ② (활동·문제의) 중심점, 핵심, center, centre, core',r:'그리스어 epi (upon, 위에) + center (중심) → 지표면에서 진원 바로 위 → 진원지·진앙으로 고착 > 지진계 중심에서 진동이 퍼져나가는 장면이 원형'},
{n:2681,w:'bereave',m:'vt. ① (가족·근친 등을) 앗아가다 ② (희망·기쁨 등을) 빼앗다',s:'deprive, dispossess, rob, strip',r:'고대 영어 bereafian (deprive, 빼앗다) → 소중한 것을 빼앗기다 → 가족을 앗아가다·빼앗다로 고착 > 갑작스러운 사망으로 가족을 잃는 장면이 원형'},
{n:2682,w:'gallows',m:'n. ① 교수대',s:'scaffold ② (the ~) 교수형, hanging',r:'고대 영어 galga (gallows, 교수대) → 목에 밧줄을 걸어 처형하는 기구 → 교수대로 고착 > 교수대 위에서 밧줄이 내려지는 장면이 원형'},
{n:2683,w:'luminous',m:'a. ① 어둠에서 빛나는, 야광의, 형광의',s:'fluorescent, glow-in-the-dark ② 이해하기 쉬운, 명료한, 명쾌한, accessible, clear, explicit, lucid ③ 지적으로 뛰어난, 총명한; 계몽적인, intelligent, enlightening',r:'라틴어 lumen (light, 빛) + -ous → 빛을 내는 → 어둠에서 빛나는·형광의로 고착 > 어두운 밤에 홀로 빛을 내는 장면이 원형'},
{n:2684,w:'infancy',m:'n. ① 유년기, 유아기',s:'babyhood, early childhood ② 초기, 초창기, 요람기, 미발달기, beginnings, cradle, dawn, inception',r:'라틴어 infans (not speaking, 말하지 못하는) + -y → 말을 못 하는 시기 → 유아기·초기로 고착 > 아직 말을 못 하는 갓난아기의 장면이 원형'},
{n:2685,w:'crotchety',m:'a. 변덕스러운, 까다로운',s:'bad-tempered, cranky, eccentric, petulant',r:'crotchet (변덕스러운 생각) + -y → 변덕스럽고 까다로운 → 변덕스러운·까다로운으로 고착 > 사소한 것에도 이러니저러니 까다롭게 구는 장면이 원형'},
{n:2686,w:'engrave',m:'vt. ① (금속·나무·돌 등에) 새기다, 조각하다[on, with]',s:'carve, etch, inscribe ② (마음·기억 등에) 명심하다, 새겨두다, embed, imprint',r:'en (into) + grave (cut, 새기다) → 안으로 새겨 넣다 → 새기다·조각하다로 고착 > 금속판에 정으로 글씨를 새기는 장면이 원형'},
{n:2687,w:'prudish',m:'a. (섹스와 관련하여) 얌전한[고상한] 체하는, 내숭떠는',s:'demure, genteel',r:'Prude (지나치게 점잖은 체하는 사람) + -ish → 과도하게 얌전한 척하는 → 내숭떠는으로 고착 > 아무것도 아닌 것에 수줍어하며 얼굴을 붉히는 장면이 원형'},
{n:2688,w:'nuance',m:'n. (색채·음조·의미·감정 등의) 미묘한 차이, 뉘앙스',s:'nicety, subtlety',r:'프랑스어 nuer (shade, 색조를 내다) → 색의 미묘한 차이 → 미묘한 차이·뉘앙스로 고착 > 비슷해 보이는 두 색 사이의 미묘한 차이를 구분하는 장면이 원형'},
{n:2689,w:'chasm',m:'n. ① (땅·바위·얼음 속 등에 난) 아주 깊은 틈[구멍]',s:'crevice, fissure ② (사람·집단 사이의) 큰 차이[골], gap',r:'그리스어 khasma (gaping hollow, 벌어진 구멍) → 땅이 벌어져 생긴 깊은 틈 → 깊은 틈·격차로 고착 > 지진으로 땅이 갈라져 깊은 틈이 생긴 장면이 원형'},
{n:2690,w:'debauch',m:'v. ① 타락시키다; (여자를) 유혹하다',s:'corrupt, demoralize, deprave; seduce ② ~을 더럽히다, 손상시키다 ③ 주색에 빠지다, 방탕하다 n. 방탕, 난봉; 폭음, 폭식',r:'프랑스어 débaucher (lead astray, 그릇된 길로 이끌다) → 타락의 길로 이끌다 → 타락시키다·방탕하게 하다로 고착 > 향락으로 도덕이 무너지는 장면이 원형'},
{n:2691,w:'gruesome',m:'a. 무시무시한, 소름끼치는, 섬뜩한',s:'awful, ghastly, grisly, horrible, macabre',r:'중세 영어 gruwen (to shudder, 전율하다) → 전율하게 만드는 → 무시무시한·섬뜩한으로 고착 > 보기만 해도 몸이 떨리는 공포스러운 장면이 원형'},
{n:2692,w:'reservation',m:'n. ① 예약',s:'booking ② 의구심, 거리낌; 보류, 유보 ③ 조건, 단서, term ④ 인디언 보호구역, 수렵금지 구역',r:'re (back) + serv (keep, 보관하다) + -ation → 뒤에 보관해두는 것 → 예약·보호구역·유보로 고착 > 식당 자리를 미리 잡아두는 장면이 원형'},
{n:2693,w:'badger',m:'vt. (질문 등으로) 괴롭히다[with]; (물건을) 갖고 싶다고 조르다; (~해 달라고) 졸라대다[to do]',s:'annoy, bother, harass, nag, pester, tease n. (동물) 오소리',r:'동물 badger (오소리, 굴을 파며 괴롭힘) → 오소리처럼 끈질기게 괴롭히다 → 괴롭히다·졸라대다로 고착 > 원하는 것을 얻을 때까지 끊임없이 조르는 장면이 원형'},
{n:2694,w:'sophistry',m:'n. 궤변, 제멋대로의 이유',s:'casuistry, fallacy, quibble, sophism',r:'그리스어 sophistes (wise man, 현자) → 진짜 지혜가 아닌 가짜 논리 → 궤변으로 고착 > 틀린 것이 맞아 보이도록 교묘하게 꾸민 논리의 장면이 원형'},
{n:2695,w:'tyranny',m:'n. ① 압제, 폭정, 포악행위',s:'atrocity, coercion, oppression ② 독재(정치), 전제정치, 독재국가, autocracy, despotism, dictatorship',r:'그리스어 tyrannos (absolute ruler, 절대 지배자) → 절대 권력으로 억압하는 것 → 압제·폭정으로 고착 > 공포로 백성을 지배하는 독재자의 장면이 원형'},
{n:2696,w:'full-fledged',m:'a. 깃털이 다 난; 제몫을 하게 된, 자격이 충분한; 어엿한',s:'mature, qualified',r:'full (완전히) + fledged (깃털이 다 난) → 깃털이 완전히 자란 → 제몫을 하는·자격이 충분한으로 고착 > 새끼 새가 깃털을 다 키워 날 수 있게 된 장면이 원형'},
{n:2697,w:'curator',m:'n. (박물관·도서관 등의) 큐레이터, 관리인, 관장',s:'conservator, custodian, keeper',r:'라틴어 curare (take care of, 돌보다) + -tor → 돌보는 사람 → 큐레이터·관리인으로 고착 > 박물관 작품 하나하나를 돌보고 관리하는 장면이 원형'},
{n:2698,w:'rummage',m:'v. 샅샅이 뒤지다[찾다], 샅샅이 조사하다',s:'forage, ransack, search n. ① 샅샅이 뒤지기, 수색, search ② 잡동사니, 폐물',r:'고대 프랑스어 arrumage (stowing cargo, 화물 정리) → 뒤죽박죽 화물을 샅샅이 뒤지다 → 샅샅이 뒤지다로 고착 > 서랍을 몽땅 꺼내 뒤지는 장면이 원형'},
{n:2699,w:'plumb',m:'a. ① 똑바른, 곧은; 수직[연직]의',s:'erect, upright; vertical ② 정확한; 순전한, 완전한, exact, precise v. ① 수직이 되게 하다 ② (물 깊이 등을) 재다, 측량하다, measure ③ ~에 배관(配管)하다, ~의 배관 수리 공사를 하다',r:'라틴어 plumbum (lead, 납) → 납추처럼 수직으로 곧은 → 수직의·완전히로 고착 > 납추를 달아 벽이 수직인지 확인하는 장면이 원형'},
{n:2700,w:'voyeur',m:'n. (성적으로) 엿보는[훔쳐보는] 취미를 가진 사람',s:'peeper, peeping Tom, snooper',r:'프랑스어 voir (see, 보다) + -eur → 엿보는 사람 → 훔쳐보는 사람으로 고착 > 남의 사생활을 몰래 엿보는 장면이 원형'},
{n:2701,w:'oscillate',m:'v. ① (진자(振子)와 같이) 진동하다, 흔들리다',s:'vibrate ② (마음·의견 따위가) 동요하다, 흔들리다, 갈피를 못 잡다, vacillate, waver',r:'라틴어 oscillare (swing, 흔들리다) → 진자처럼 좌우로 흔들리다 → 진동하다·흔들리다로 고착 > 시계 추가 규칙적으로 좌우로 흔들리는 장면이 원형'},
{n:2702,w:'mischance',m:'n. 불운, 불행, 재난',s:'calamity, disaster, misfortune, mishap',r:'mis (bad) + chance (운) → 나쁜 운 → 불운·불행으로 고착 > 아무 잘못도 없이 나쁜 일이 생기는 장면이 원형'},
{n:2703,w:'superannuated',m:'a. ① 노령[병약]으로 퇴직한, 연금을 받고 퇴직한',s:'pensioned off, retired ② (사람·사물이) 너무 노쇠한, 노후화된, 시대에 뒤진',r:'라틴어 super (beyond) + annus (year, 해) + -ated → 나이를 넘어선 → 노령으로 퇴직한·구식의로 고착 > 더 이상 현역으로 일하기 어려운 나이가 된 장면이 원형'},
{n:2704,w:'affinity',m:'n. ① (~에 대한) 애호, 좋아함; 친근감, 공감, 호감',s:'fondness ② 유사성; 관련성, 밀접한 관계, resemblance, similarity ③ 맞는 성질',r:'라틴어 affinis (neighboring, 인접한) → 서로 닿아 끌리는 관계 → 애호·친근감·공감으로 고착 > 처음 만났지만 오래된 친구처럼 통하는 장면이 원형'},
{n:2705,w:'rusty',m:'a. ① 녹슨, 녹이 난',s:'corroded, rusted ② 색이 바랜; 낡은, 구식의, faded; antiquated, old-fashioned ③ (쓰지 않아) 무디어져, 솜씨가 떨어진, 서투른, out of practice',r:'rust (녹) + -y → 녹이 슨 상태 → 녹슨·쇠퇴한으로 고착 > 오래 쓰지 않아 녹이 슨 자물쇠의 장면이 원형'},
{n:2706,w:'inveigh',m:'vi. 통렬히 비난[항의]하다, 호되게 매도하다[against]',s:'berate, blame, censure, condemn, denounce, reproach',r:'라틴어 invehere (attack verbally, 언어로 공격하다) → 거세게 비난하며 공격하다 → 통렬히 비난하다로 고착 > 마이크 앞에서 분노를 쏟아내는 장면이 원형'},
{n:2707,w:'contumacious',m:'a. 아무리 해도 말을 듣지 않는, 반항적인, 오만한',s:'defiant, mutinous, rebellious',r:'라틴어 contumacia (stubbornness, 완고함) + -ious → 완고하게 반항하는 → 반항적인·오만한으로 고착 > 명령을 듣지 않고 끝까지 버티는 장면이 원형'},
{n:2708,w:'squint',m:'n. ① 사시, 사팔뜨기',s:'cockeye, cross-eye ② 잠깐 봄, 흘낏 보기, glance, glimpse, peep v. ① 눈을 가늘게 뜨고 보다, 찡그리고 보다 ② (눈이) 사시이다',r:'중세 영어 squinten (look obliquely, 비스듬히 보다) → 눈을 가늘게 뜨고 비스듬히 보다 → 사시·곁눈질로 고착 > 눈이 서로 다른 방향을 보는 장면이 원형'},
{n:2709,w:'precedent',m:'n. 선례, 전례, 판례',s:'antecedent',r:'라틴어 prae (before) + ced (go, 가다) + -ent → 앞서 간 것 → 선례·판례로 고착 > 법원이 이전 판결을 기준으로 새 판결을 내리는 장면이 원형'},
{n:2710,w:'awry',m:'ad., a. ① (계획 등이) 빗나간, 잘못되어',s:'wrong ② 구부러져, 비틀어져, 비스듬히, askance, askew',r:'a (on) + wry (twisted, 비틀린) → 비틀어진 방향으로 → 빗나간·잘못된으로 고착 > 목표를 향해 쏜 화살이 옆으로 빗나가는 장면이 원형'},
{n:2711,w:'extort',m:'v. ① 억지로 빼앗다, 갈취하다',s:'blackmail, exact, squeeze, wrest, wring ② (약속·자백 등을) 강요하다, coerce, force',r:'ex (out) + tort (twist, 비틀다) → 비틀어 억지로 빼내다 → 억지로 빼앗다·갈취하다로 고착 > 협박으로 돈을 강제로 뜯어내는 장면이 원형'},
{n:2712,w:'fugacious',m:'a. ① (꽃이) 빨리 지는, 시드는',s:'evanescent ② 덧없는, 순식간의, ephemeral, evanescent, fleeting, transitory',r:'라틴어 fugax (fleeing, 달아나는) + -ious → 달아나듯 빨리 사라지는 → 빨리 지는·덧없는으로 고착 > 꽃봉오리가 피자마자 금방 지는 장면이 원형'},
{n:2713,w:'consort',m:'n. ① (특히 국왕·여왕 등의) 배우자',s:'spouse ② 일치, 조화, harmony v. ① (나쁜 사람과) 교제하다, 사귀다[with], associate with ② 일치[조화]하다, agree, harmonize',r:'라틴어 consors (partner, 동반자) → 함께 운명을 나누는 배우자 → 배우자·어울리다로 고착 > 왕비가 왕 옆에 자리하는 장면이 원형'},
{n:2714,w:'prehensile',m:'a. ① (동물) 쥐기에 적당한, (발·꼬리 등이) 잡는 힘이 있는',s:'grabby, grasping ② 이해력[지각력]이 있는',r:'라틴어 prehendere (seize, 잡다) + -ile → 잡을 수 있는 → 쥐기에 적당한으로 고착 > 원숭이가 꼬리로 나뭇가지를 감아 잡는 장면이 원형'},
{n:2715,w:'subterfuge',m:'n. ① 핑계, 구실',s:'pretext ② 속임수, deception, trick, trickery',r:'라틴어 subter (beneath) + fug (flee, 도망치다) → 아래로 빠져나가다 → 핑계·속임수로 고착 > 책임을 피하기 위해 그럴듯한 핑계를 대는 장면이 원형'},
{n:2716,w:'dumbfound',m:'vt. ~을 어이가 없어 말도 하지 못하도록 하다, 아연실색케 하다',s:'amaze, astound, flabbergast, startle, stun',r:'dumb (말 못 하는) + found (strike, 치다) → 말을 못 하게 만들다 → 어이없어 말도 못 하게 하다로 고착 > 너무 황당해 입이 벌어진 채 굳어버리는 장면이 원형'},
{n:2717,w:'wound',m:'n. ① 부상, 상처',s:'cut, hurt, injury, lesion ② (정신적) 상처, 고통, pain, trauma v. ① 상처를 입히다, hurt, injure ② (감정을) 해치다, offend, pique',r:'고대 영어 wund (wound, 상처) → 신체에 난 상처 → 부상·상처로 고착 > 칼에 베인 상처에서 피가 흐르는 장면이 원형'},
{n:2718,w:'practitioner',m:'n. ① (전문직·기술 등에) 개업자, (특히) 개업 의사, 변호사',s:'professional ② (특정 생활·종교 양식 등을) 실천하는 사람',r:'라틴어 practicus (practical, 실제적인) + -er → 실제로 행하는 사람 → 개업 의사·전문직 종사자로 고착 > 의사가 진료실에서 환자를 보는 장면이 원형'},
{n:2719,w:'careen',m:'v. ① (배가) 한쪽으로 기울다, (배를) 기울이다',s:'heel, incline, lean, tilt ② (자동차 등이) 흔들리며 위태롭게 질주하다',r:'프랑스어 carène (keel, 용골) → 배가 용골을 드러내며 기울어지다 → 한쪽으로 기울다로 고착 > 강한 바람에 배가 옆으로 기울어지는 장면이 원형'},
{n:2720,w:'treacherous',m:'a. ① 배반하는, 반역하는; (사람·언행이) 불성실한, 기대에 어긋나는 ② (기후·기억 등이) 믿을 수 없는, 의지가 안 되는 ③ (발판 따위가) 불안정한, 무너질 것 같은; 위험한',s:'',r:'고대 프랑스어 trechier (trick, 속이다) + -ous → 속임으로 배신하는 → 배반하는·위험한으로 고착 > 믿었던 동료가 뒤에서 칼을 꽂는 장면이 원형'},
{n:2721,w:'internment',m:'n. (포로 등의) 억류, 감금',s:'confinement, detainment, detention',r:'inter (in, 안에) + -ment → 안에 가두는 것 → 억류·감금으로 고착 > 전쟁 포로를 철조망 안에 가두는 장면이 원형'},
{n:2722,w:'gush',m:'v. ① (액체가) 쏟아져 나오다, 분출하다',s:'flow, pour, spurt, stream ② (감정적으로·과장하여) 지껄여대다, 마구 쏟아 내다, rave, spout n. (액체 등의) 쏟아짐, 분출; (감정·말 등의) 분출, 격발, spate, torrent',r:'중세 영어 gushen (flow rapidly, 급히 흐르다) → 세차게 솟구쳐 나오다 → 쏟아져 나오다·분출하다로 고착 > 수도관이 터져 물이 세차게 분출하는 장면이 원형'},
{n:2723,w:'euphemism',m:'n. 완곡어법; 완곡 어구[표현]',s:'circumlocution',r:'그리스어 eu (good) + pheme (speech, 말) → 좋게 말하기 → 완곡어법으로 고착 > 죽음을 \'돌아가셨다\'고 부드럽게 표현하는 장면이 원형'},
{n:2724,w:'doctor',m:'v. ① 치료하다',s:'medicate, treat ② (문서·증거 따위를) 조작하다, 변조하다, fabricate, fake, manipulate',r:'라틴어 docere (teach, 가르치다) + -or → 가르치는 사람 → 치료하다·박사로 고착 > 의사가 환자를 진찰하며 치료하는 장면이 원형'},
{n:2725,w:'contraband',m:'n. ① 밀수품, 금제품',s:'smuggled goods ② 밀수, 밀매매, 불법 거래, illicit traffic, smuggling',r:'스페인어 contrabando (against ban, 금지에 반하는) → 금지령에 반하는 물건 → 밀수품·금제품으로 고착 > 세관을 통과하지 않고 몰래 들여오는 금지 물품의 장면이 원형'},
{n:2726,w:'stab',m:'v. (칼같이 뾰족한 것으로) 찌르다',s:'spear, stick, thrust n. ① 찔린 상처, 자상(刺傷), prick, wound ② 찌르는 듯한 통증, 쑤시는 느낌, ache, pang',r:'스칸디나비아어 stab (pierce, 찌르다) → 날카로운 것으로 찌르다 → 찌르다로 고착 > 칼이 살 속으로 깊이 찔러 들어가는 장면이 원형'},
{n:2727,w:'benevolent',m:'a. ① 자비심이 많은, 인정 많은, 친절한',s:'benign, charitable, generous ② 자선의, charitable',r:'라틴어 bene (well, 좋게) + vol (wish, 바라다) + -ent → 좋은 것을 바라는 → 자비심이 많은·친절한으로 고착 > 어려운 이웃을 위해 기꺼이 나누는 장면이 원형'},
{n:2728,w:'vertigo',m:'n. 어지러움, 현기증',s:'dizziness, giddiness',r:'라틴어 vertere (turn, 돌다) + -igo → 세상이 빙빙 도는 느낌 → 어지러움·현기증으로 고착 > 높은 곳에서 아래를 내려다보며 머리가 빙빙 도는 장면이 원형'},
{n:2729,w:'holistic',m:'a. 전체론의, 전체론적인',s:'',r:'그리스어 holos (whole, 전체) + -tic → 전체로 보는 → 전체론적인으로 고착 > 부분이 아닌 전체를 함께 바라보는 장면이 원형'},
{n:2730,w:'quell',m:'vt. ① (반란·소요 등을) 진압[평정]하다',s:'put down, subdue, suppress ② (당황하거나 불쾌한 감정을) 가라앉히다[누그러뜨리다], suppress',r:'고대 영어 cwellan (kill, 죽이다) → 저항을 죽여 없애다 → 진압하다·억누르다로 고착 > 폭동을 진압대가 강경히 막아서는 장면이 원형'},
{n:2731,w:'statute',m:'n. 법규, 법령; 규칙, 학칙, 정관',s:'',r:'라틴어 statuere (set up, 세우다) → 세워진 규칙 → 법규·법령으로 고착 > 의회가 법안을 통과시켜 법령을 제정하는 장면이 원형'},
{n:2732,w:'thoroughfare',m:'n. ① (도시의) 주요[간선] 도로, 큰 거리',s:'road, street, way ② 통행, 통항, 통과, passage, transit',r:'thorough (완전히 통해) + fare (go, 가다) → 완전히 통과해 갈 수 있는 길 → 주요 도로·간선 도로로 고착 > 차들이 끊임없이 오가는 넓은 도로의 장면이 원형'},
{n:2733,w:'mordant',m:'a. 신랄한, 독설적인, 통렬한',s:'acerbic, biting, caustic, scathing',r:'라틴어 mordere (bite, 물다) + -ant → 물어뜯는 성질의 → 신랄한·독설적인으로 고착 > 상대의 약점을 날카롭게 물어뜯는 비평의 장면이 원형'},
{n:2734,w:'rendition',m:'n. ① 번역; 해석',s:'interpretation ② (연극·음악의) 연출, 연주, 공연, performance',r:'라틴어 reddere (give back, 돌려주다) + -tion → 원본을 돌려주듯 해석하는 것 → 번역·해석·공연으로 고착 > 가수가 유명 곡을 자신만의 스타일로 재해석해 부르는 장면이 원형'},
{n:2735,w:'lumber',m:'n. ① 목재, 제재목(통나무·들보·판자 등)',s:'timber ② 잡동사니 v. 재목을 베어내다; 육중하게 움직이다',r:'고대 노르드어 lomra (move heavily, 무겁게 움직이다) → 무겁게 쌓인 목재 → 목재·무겁게 걷다로 고착 > 제재소에서 통나무를 잘라 목재를 만드는 장면이 원형'},
{n:2736,w:'aperture',m:'n. 구멍, 틈, 균열',s:'gap, hole, interstice, orifice',r:'라틴어 aperire (open, 열다) → 열린 구멍 → 구멍·틈으로 고착 > 카메라 렌즈의 빛이 들어오는 구멍의 장면이 원형'},
{n:2737,w:'blurt',m:'vt. 불쑥 말하다, 무심코 말하다, 누설하다[out]',s:'betray, burst out, disclose',r:'고대 영어 blurten (speak hastily, 급히 말하다) → 생각 없이 불쑥 말하다 → 불쑥 말하다·누설하다로 고착 > 비밀을 무심코 내뱉어버리는 장면이 원형'},
{n:2738,w:'inextricable',m:'a. ① 빠져나올[탈출할] 수 없는 ② (매듭이) 풀리지 않는',s:'tangled ③ 불가분한, 떼려야 뗄 수 없는, involved',r:'in (not) + extric (disentangle, 풀다) + -able → 풀어낼 수 없는 → 빠져나올 수 없는으로 고착 > 한번 들어가면 나올 수 없는 덫의 장면이 원형'},
{n:2739,w:'arraign',m:'vt. ① (피고를) 법정에 소환하다; 죄상의 진위 여부를 묻다; 기소 인정 여부 절차를 밟다',s:'charge, indict, prosecute ② 규탄하다, 책망하다, censure, denounce, impeach, reproach',r:'라틴어 ad (to) + ratio (reason, 이유) → 이유를 밝히기 위해 소환하다 → 법정에 소환하다·기소하다로 고착 > 피고인이 법정에 서서 죄상을 읽히는 장면이 원형'},
{n:2740,w:'deranged',m:'a. (특히 정신병으로 인해 행동과 사고가) 정상이 아닌, 미친',s:'crazy, insane, mad',r:'de (from) + range (order, 순서) → 순서에서 벗어난 → 정상이 아닌·미친으로 고착 > 정상적 사고 체계가 무너진 장면이 원형'},
{n:2741,w:'fail-safe',m:'a. 전혀 문제가 없는, 절대 안전한',s:'foolproof, infallible, sound',r:'fail (실패) + safe (안전) → 실패해도 안전한 → 절대 안전한으로 고착 > 어떤 오작동이 일어나도 피해가 없는 설계의 장면이 원형'},
{n:2742,w:'gouge',m:'vt. ① 둥근 끌로 파다, (눈알 따위를) 도려내다[out]',s:'hollow, scoop, scrape ② 바가지를 씌우다; 값을 부당하게 올리다',r:'고대 프랑스어 gouge (chisel, 끌) → 둥근 끌로 파내다 → 파내다·도려내다로 고착 > 끌로 나무를 파 홈을 만드는 장면이 원형'},
{n:2743,w:'overbearing',m:'a. 거만한, 오만한; 고압적인',s:'arrogant, domineering, haughty; high-handed',r:'over (지나치게) + bear (참다) → 지나치게 참게 만드는 → 거만한·고압적인으로 고착 > 주변 사람을 짓누르는 압도적 태도의 장면이 원형'},
{n:2744,w:'beat',m:'v. ① (연속적으로) 두드리다, 때리다; (장단을) 맞추다; (심장이) 고동치다, 뛰다 ② (상대방을) 이기다, 패배시키다; 능가하다',s:'defeat; outdo ③ (힘든 문제 등을) 억제하다, 통제하다, control n. 박자, 비트, time',r:'고대 영어 beatan (strike, 치다) → 반복적으로 치다 → 두드리다·이기다·능가하다로 고착 > 드럼을 박자에 맞춰 두드리는 장면이 원형'},
{n:2745,w:'prurient',m:'a. 색을 밝히는, 음란한, 외설적인',s:'lascivious, libidinous, lustful, salacious',r:'라틴어 prurire (itch, 가렵다) + -ent → 음욕이 가려운 → 음란한·외설적인으로 고착 > 야한 것에 집착하는 장면이 원형'},
{n:2746,w:'clan',m:'n. ① 씨족(氏族), 문중, 일족',s:'family, tribe ② 당파, 도당; 파벌, band, clique, faction',r:'스코틀랜드 게일어 clann (children, 자녀) → 같은 혈통의 자녀들 → 씨족·일족으로 고착 > 같은 조상을 둔 씨족이 모여 사는 장면이 원형'},
{n:2747,w:'swoon',m:'vi. ① 기절하다, 졸도하다, 까무러치다',s:'conk, faint, keel ② 황홀경에 빠지다 ③ (소리 따위가) 약해지다, 차츰 사라져 가다 n. 기절, 졸도, asphyxiation, fainting',r:'고대 영어 geswogen (in a faint, 기절한) → 의식을 잃고 쓰러지다 → 기절하다·졸도하다로 고착 > 충격에 눈을 굴리며 쓰러지는 장면이 원형'},
{n:2748,w:'emollient',m:'a. (마음·상황·피부 등을) 진정시키는, 부드럽게 하는',s:'assuaging, mitigative, mollifying',r:'라틴어 emollire (soften, 부드럽게 하다) + -ent → 부드럽게 만드는 → 진정시키는·부드럽게 하는으로 고착 > 거친 피부에 보습 크림을 발라 부드럽게 하는 장면이 원형'},
{n:2749,w:'nomenclature',m:'n. ① 학명(學名), 전문어',s:'phraseology, terminology ② (특히 전문적인) 명명법(命名法)',r:'라틴어 nomen (name, 이름) + calare (call, 부르다) → 이름을 부르는 체계 → 학명·전문어로 고착 > 생물학자가 새로 발견한 종에 학명을 붙이는 장면이 원형'},
{n:2750,w:'reverberate',m:'v. ① (소리가) 반향하다, 울려 퍼지다',s:'echo, resound ② (빛·열 등을) 반사시키다, reflect ③ (사람들에게) 반향을 불러일으키다',r:'라틴어 reverberare (strike back, 되치다) → 소리가 벽에 부딪혀 되돌아오다 → 반향하다·울려 퍼지다로 고착 > 동굴 속에서 목소리가 메아리치는 장면이 원형'},
{n:2751,w:'grisly',m:'a. 무시무시한, 소름끼치는',s:'ghastly, gruesome, hair-raising, hideous, horrible',r:'고대 영어 grislic (horrible, 끔찍한) → 공포스럽고 끔찍한 → 무시무시한·소름끼치는으로 고착 > 눈 뜨고 보기 어려운 끔찍한 장면이 원형'},
{n:2752,w:'stupor',m:'n. (술·약물·충격 등으로 인한) 지각 마비 (상태), 인사불성',s:'stupefaction, torpor',r:'라틴어 stupere (be stunned, 멍해지다) → 정신이 완전히 멍해진 상태 → 지각 마비·인사불성으로 고착 > 술에 취해 의식이 흐릿해지는 장면이 원형'},
{n:2753,w:'maverick',m:'n. 어느 파에도 속하지 않는 정치인[예술가], 독불장군',s:'',r:'Samuel Maverick (자기 소에 낙인을 찍지 않은 텍사스 목장주) → 어느 무리에도 속하지 않는 독자적인 사람 → 독불장군으로 고착 > 어떤 파에도 속하지 않고 독자적으로 행동하는 장면이 원형'},
{n:2754,w:'dislodge',m:'v. ① (특정 지위나 장소에서) 제거하다, 쫓아내다',s:'displace, eject, evict, oust ② (어떤 장소에서) 움직이다, 이동시키다',r:'dis (away) + lodge (settle, 자리 잡다) → 자리에서 밀어내다 → 제거하다·쫓아내다로 고착 > 단단히 박힌 것을 힘으로 빼내는 장면이 원형'},
{n:2755,w:'artifice',m:'n. ① 책략, 계략',s:'maneuver, ruse, stratagem, strategy, tactics ② 교묘함, 재주 좋음',r:'라틴어 ars (art, 기술) + fic (make, 만들다) → 기술로 만든 것 → 책략·계략으로 고착 > 교묘한 술수로 상대를 함정에 빠뜨리는 장면이 원형'},
{n:2756,w:'sully',m:'v. (가치 등을) 더럽히다, 훼손하다',s:'besmirch, defile, soil, taint, tarnish',r:'고대 프랑스어 soillier (soil, 더럽히다) → 더럽혀 손상시키다 → 더럽히다·훼손하다로 고착 > 깨끗한 평판에 얼룩을 남기는 장면이 원형'},
{n:2757,w:'plangent',m:'a. ① 구슬프게 울리는, 울려 퍼지는',s:'resonant, resounding, sonorous ② (파도가) 밀려와 부딪치는',r:'라틴어 plangere (beat, 치다) + -ent → 두드리듯 구슬프게 울리는 → 구슬프게 울리는으로 고착 > 파도가 바위를 치며 내는 구슬픈 소리의 장면이 원형'},
{n:2758,w:'imprecate',m:'vt. (아무에게 재난·불행이 있기를) 빌다, 저주하다',s:'anathematize, curse, cuss, execrate',r:'im (upon) + prec (pray, 기도하다) + -ate → ~에게 나쁜 일이 오도록 기도하다 → 저주하다로 고착 > 손을 내밀어 상대에게 재앙이 오도록 비는 장면이 원형'},
{n:2759,w:'amnesty',m:'n. ① 대사(大赦), 사면(赦免)',s:'absolution, pardon, remission ② (범행·무기의) 자진 신고 기간, 처벌 유예 기간',r:'그리스어 amnestia (forgetfulness, 망각) → 잊어주는 것 → 대사·사면으로 고착 > 국가가 대규모로 죄수들의 죄를 면해주는 장면이 원형'},
{n:2760,w:'ecclesiastical',m:'a. 교회의, 교회 조직의; 성직자의',s:'churchly, spiritual; clerical, priestly',r:'그리스어 ekklesia (assembly, 집회) + -al → 교회 집회의 → 교회의·성직자의로 고착 > 성직자가 교회 의식을 집전하는 장면이 원형'},
{n:2761,w:'fritter',m:'v. (시간·돈 등을) 조금씩 낭비[허비]하다[away]',s:'dissipate, squander, waste',r:'고대 프랑스어 friture (frying, 튀김) → 기름에 조금씩 튀기듯 조금씩 낭비하다 → 조금씩 낭비하다로 고착 > 중요한 시간을 사소한 것에 조금씩 써버리는 장면이 원형'},
{n:2762,w:'apocryphal',m:'a. 출처가 불분명한; 가짜의, 위작(僞作)의',s:'bogus, counterfeit, fake, phony, spurious',r:'그리스어 apocryphon (hidden, 숨겨진) → 출처가 숨겨진 → 출처가 불분명한·가짜의로 고착 > 정경에 포함되지 않은 비밀 문서의 장면이 원형'},
{n:2763,w:'prostrate',m:'vt. ① (제귀용법) 엎드리다; 넘어뜨리다 ② 굴복시키다, 의기소침하게 하다',s:'disarm, overcome, overwhelm a. ① 엎드린, 길게 누운, fallen, flat, prone ② 굴복한, 항복한, disarmed, overwhelmed ③ 기진맥진한, drained, exhausted',r:'pro (before) + strat (spread, 펼치다) → 앞에 엎드려 펼치다 → 엎드리다·굴복시키다로 고착 > 왕 앞에 땅에 납작 엎드리는 장면이 원형'},
{n:2764,w:'squarely',m:'ad. ① 정면으로, 똑바로',s:'directly ② 정확하게; 공명정대하게; 솔직히, justly ③ 단호하게, 분명히',r:'square (정사각형·공정한) + -ly → 정면으로 똑바로 → 정면으로·공정하게로 고착 > 상대의 눈을 정면으로 바라보는 장면이 원형'},
{n:2765,w:'charter',m:'n. ① 헌장, 선언서 ② 특허장, 면허장 ③ (버스·비행기 등의) 대절[계약], 전세 vt. ① ~에게 특허장[면허]을 주다',s:'authorize, empower, license, permit ② (비행기·버스·선박 등을) 전세 내다, hire, lease, rent',r:'라틴어 charta (paper, 종이) → 권리를 종이에 문서화한 것 → 헌장·면허장·전세로 고착 > 왕이 서명한 특허장을 시민에게 내리는 장면이 원형'},
{n:2766,w:'truant',m:'n. 무단결석생; 게으름뱅이, 꾀부리는 사람',s:'absentee, delinquent a. 게으름피우는, 무단결석하는; 게으른, absent, missing',r:'고대 프랑스어 truant (vagrant, 부랑자) → 학교에 가지 않고 거리를 떠도는 → 무단결석생·꾀부리는으로 고착 > 학교 대신 공원에서 빈둥거리는 장면이 원형'},
{n:2767,w:'seismology',m:'n. 지진학',s:'',r:'그리스어 seismos (earthquake, 지진) + log (study) + -y → 지진을 연구하는 학문 → 지진학으로 고착 > 지진계 바늘이 심하게 흔들리는 장면이 원형'},
{n:2768,w:'overrule',m:'v. ① 기각[각하]하다, (결정 등을) 뒤엎다',s:'disallow, overturn, reverse ② (의지 등을) 지배하다, 제압하다, 좌우하다, dominate, govern, rule',r:'over (위에서) + rule (지배하다) → 위에서 지배해 뒤엎다 → 기각하다·뒤엎다로 고착 > 상급 법원이 하급 법원 판결을 뒤집는 장면이 원형'},
{n:2769,w:'detonation',m:'n. 폭발; 폭발음',s:'blast, explosion',r:'라틴어 detonare (thunder down, 천둥 치다) + -tion → 천둥처럼 폭발하는 것 → 폭발·폭발음으로 고착 > 뇌관이 점화되며 굉음과 함께 폭발하는 장면이 원형'},
{n:2770,w:'countermand',m:'vt. (명령·주문 등을) 취소하다, 철회하다',s:'abrogate, annul, recant, rescind, revoke',r:'counter (반하여) + mand (order, 명령하다) → 명령에 반하는 명령 → 취소하다·철회하다로 고착 > 이미 내려진 명령을 새 명령으로 취소하는 장면이 원형'},
{n:2771,w:'reverend',m:'a. ① (사람·사물·장소 등이) 귀하신, 존경할 만한, 거룩한',s:'respectable, venerable ② (the R~) ~님(성직자에 대한 경칭; 약어: Rev.) n. 성직자, 목사, 신부, clergyman, minister, priest',r:'라틴어 revereri (revere, 경외하다) + -nd → 경외해야 할 → 귀하신·존경할 만한으로 고착 > 예배 중인 성직자를 경의로 바라보는 장면이 원형'},
{n:2772,w:'weed',m:'n. ① 잡초; 해초 ② 쓸모없는 것[사람]; 잡초 같은 존재, 유해물 v. ① 잡초를 뽑다',s:'pluck, pull ② 없애다, 제거하다[out], clear, eliminate, remove',r:'고대 영어 weod (weed, 잡초) → 뽑아내야 할 잡초 → 잡초·쓸모없는 것·잡초를 뽑다로 고착 > 밭에서 잡초를 하나씩 뽑아내는 장면이 원형'},
{n:2773,w:'lineal',m:'a. ① 직계의, 정통의',s:'direct ② 선(모양)의, linear',r:'라틴어 linealis (of a line, 선의) → 직선으로 이어진 → 직계의·정통의로 고착 > 가계도에서 직선으로 이어진 혈통의 장면이 원형'},
{n:2774,w:'evoke',m:'vt. ① (감정·기억·이미지를) 떠올려 주다[환기시키다]',s:'arouse, provoke ② (웃음·갈채 등을) 자아내다 ③ (죽은 사람의 영혼 등을) 불러내다, invoke',r:'e (out) + vok (call, 부르다) → 밖으로 불러내다 → 감정·기억을 떠올리게 하다로 고착 > 어린 시절 냄새가 오래된 기억을 불러내는 장면이 원형'},
{n:2775,w:'custody',m:'n. ① 보관, 관리; (특히 미성년자의) 보호, 감독, 후견, 양육권',s:'safekeeping; care, protection ② 감금, 구류, confinement, detention, imprisonment',r:'라틴어 custos (guard, 지키는 사람) → 지키며 보관하는 것 → 보관·양육권·구금으로 고착 > 법원이 아이의 양육권을 부모 중 한쪽에 결정하는 장면이 원형'},
{n:2776,w:'fustian',m:'n. 과장된 언사, 호언; (문장·말의) 과장',s:'bombast, rhetoric, verbose a. 야단스러운, 과장된, grandiloquent, pompous',r:'Fustat (이집트 도시, 조잡한 면직물의 산지) → 화려하지만 속 빈 과장된 말 → 과장된 언사·호언으로 고착 > 내용 없이 요란하게 부풀린 연설의 장면이 원형'},
{n:2777,w:'quip',m:'n. 재치 있는 말, 경구(警句), 명언(名言)',s:'epigram, wisecrack, witticism v. 빈정대다, 놀리다, banter, gibe, jeer, ridicule',r:'라틴어 quippe (indeed, 물론) → 날카롭게 찌르는 재치 있는 말 → 재치 있는 말·경구로 고착 > 순간적인 재치로 상황을 반전시키는 한 마디의 장면이 원형'},
{n:2778,w:'banish',m:'vt. ① 추방하다; 내쫓다',s:'deport, exile, expatriate ② (마음을) 떨쳐버리다, (근심 따위를) 쫓아버리다',r:'고대 프랑스어 banir (proclaim, 공포하다) → 공식적으로 쫓아내다 → 추방하다·내쫓다로 고착 > 죄인을 국경 밖으로 쫓아내는 장면이 원형'},
{n:2779,w:'heyday',m:'n. (활동·정력·성공 등의) 한창때, 전성기',s:'golden age, prime',r:'중세 영어 heyda (exclamation of joy, 기쁨의 환호) → 기쁨이 절정인 시기 → 전성기·한창때로 고착 > 배우가 가장 인기 있던 전성기의 장면이 원형'},
{n:2780,w:'irenic',m:'a. 평화[협조]적인, 평화에 도움이 되는',s:'pacific, peaceful',r:'그리스어 eirene (peace, 평화) + -ic → 평화의 성질 → 평화적인·평화에 도움이 되는으로 고착 > 양측이 화해의 손을 내미는 장면이 원형'},
{n:2781,w:'constrain',m:'vt. ① 억지로 ~시키다, 강요하다',s:'coerce, compel, force, impose ② 제한[제약]하다, 속박하다, curb, limit, restrain, restrict',r:'con (together) + strain (bind, 묶다) → 함께 묶어 제한하다 → 강요하다·제약하다로 고착 > 자유롭게 움직이지 못하도록 묶어두는 장면이 원형'},
{n:2782,w:'repository',m:'n. 저장소, 창고; (지식·정보 등의) 보고(寶庫)',s:'warehouse; depository',r:'라틴어 repositorium (storehouse, 창고) → 보관하는 장소 → 저장소·보고로 고착 > 소중한 자료들을 체계적으로 보관하는 창고의 장면이 원형'},
{n:2783,w:'vituperative',m:'a. 비난하는, 매도하는; 독설을 퍼붓는',s:'abusive, defamatory, invective, vitriolic',r:'라틴어 vituperare (blame, 비난하다) + -ive → 비난하는 성질 → 비난하는·독설을 퍼붓는으로 고착 > 상대를 향해 독설을 쏟아내는 장면이 원형'},
{n:2784,w:'adumbrate',m:'vt. ① 개요를[개략적으로] 알려주다',s:'outline, recapitulate, sketch, summarize ② (미래를) 예시하다, foreshadow',r:'라틴어 ad (to) + umbra (shadow, 그림자) + -ate → 그림자를 드리우다 → 개요를 알려주다·예시하다로 고착 > 스케치로 작품의 윤곽만 잡는 장면이 원형'},
{n:2785,w:'stern',m:'a. ① 엄격한, 단호한',s:'rigid, rigorous, strict, stringent ② (사태·사정 따위가) 심각한, 가혹한, extreme, grave, serious, severe n. (배의) 고물, 선미(船尾)',r:'고대 영어 styrne (severe, 엄한) → 타협 없이 엄격한 → 엄격한·단호한으로 고착 > 흔들리지 않는 눈빛으로 단호히 대하는 장면이 원형'},
{n:2786,w:'usury',m:'n. 고리대금 (행위); (법정 이율 이상의) 고리(高利)',s:'loan-sharking',r:'라틴어 usura (use, 사용) → 돈을 빌려주고 과도하게 사용료를 받다 → 고리대금으로 고착 > 법정 이자를 훨씬 넘는 이율로 돈을 빌려주는 장면이 원형'},
{n:2787,w:'goof',m:'v. ① 실수하여 망쳐 버리다[up]; 바보 같은 실수를 하다 ② 빈둥거리다, 시간을 허비하다[off, around]',s:'loaf, lounge n. ① 바보, 멍청이, dummy, dunce ② 실수, blunder, mistake',r:'미국 속어 goof (fool, 바보) → 바보 같은 실수를 하다 → 실수하다·빈둥거리다로 고착 > 쉬운 일을 엉망으로 해버리는 장면이 원형'},
{n:2788,w:'fluke',m:'n. 뜻밖의 행운, 요행(수)',s:'godsend, windfall',r:'고대 영어 floc (flatfish, 넙치) → 넙치처럼 우연히 평평하게 바닥에 떨어진 행운 → 뜻밖의 행운·요행으로 고착 > 실력이 아닌 순전한 운으로 성공한 장면이 원형'},
{n:2789,w:'bleed',m:'v. ① 출혈하다, 피를 흘리다',s:'gush, hemorrhage, shed ② 마음이 몹시 아프다[for]',r:'고대 영어 bledan (bleed, 피를 흘리다) → 피가 흘러나오다 → 출혈하다·피를 흘리다로 고착 > 상처에서 붉은 피가 흘러내리는 장면이 원형'},
{n:2790,w:'exodus',m:'n. ① (많은 사람들이 동시에 하는) 탈출, 이동, 이주',s:'departure, flight, migration ② (E~) (구약 성서의) 출애굽기',r:'그리스어 exodos (going out, 나가기) → 대규모로 나가는 것 → 탈출·이동·이주로 고착 > 수많은 사람이 한꺼번에 빠져나가는 장면이 원형'},
{n:2791,w:'contrived',m:'a. 억지로 꾸민 듯한, 부자연스러운',s:'artificial, concocted, forced, unnatural',r:'con (completely) + triv (find, 찾다) → 억지로 꾸며 찾아낸 → 억지로 꾸민·부자연스러운으로 고착 > 지나치게 꾸며내 어색한 결말의 장면이 원형'},
{n:2792,w:'droop',m:'v. ① 축 늘어지다, 수그러지다; (머리 등을) 수그리다, 숙이다',s:'sag, sink ② (초목이) 시들다; (기력·의기 등이) 쇠하다, 의기소침해지다, wilt, wither; languish n. ① 숙임, 수그러짐 ② 풀이 죽음, 의기소침',r:'고대 노르드어 drupa (hang down, 아래로 처지다) → 힘없이 아래로 처지다 → 축 늘어지다·수그러지다로 고착 > 기운 없이 꽃잎이 아래로 처지는 장면이 원형'},
{n:2793,w:'propriety',m:'n. ① 예의바름; 예의범절, 예절',s:'courtesy, decency, decorum, etiquette ② (행동의 도덕적·사회적) 적절성, appropriateness, relevance',r:'라틴어 proprietas (ownership, 소유) → 자신에게 적합한 것 → 예의바름·예절로 고착 > 상황에 맞게 예의 바르게 행동하는 장면이 원형'},
{n:2794,w:'culinary',m:'a. 부엌의, 요리의; 부엌용의, 요리용의',s:'',r:'라틴어 culina (kitchen, 부엌) + -ary → 부엌과 관련된 → 부엌의·요리의로 고착 > 셰프가 부엌에서 음식을 만드는 장면이 원형'},
{n:2795,w:'incarnation',m:'n. 육체를 갖추게 함, 인간의 모습을 취함, 화신(化身); 구체화',s:'embodiment, personification',r:'라틴어 in (into) + carn (flesh, 살) + -tion → 살 속으로 들어가는 것 → 화신·육신을 가짐으로 고착 > 신이 인간의 몸을 입고 지상에 내려오는 장면이 원형'},
{n:2796,w:'resuscitate',m:'v. ① (인공호흡법 등으로) 소생시키다, 의식을 회복시키다',s:'resurrect ② (과거의 것을) 부흥하다, 부활시키다, revive',r:'라틴어 re (again) + suscitare (raise up, 일으키다) → 다시 일으키다 → 소생시키다·의식을 회복시키다로 고착 > 심폐소생술로 멈춘 심장을 다시 뛰게 하는 장면이 원형'},
{n:2797,w:'sinuous',m:'a. ① (강 등이) 꾸불꾸불한, 굽이친',s:'convoluted, curving, meandering, winding ② 복잡한, complicated, intricate ③ 사악한, sinister, wicked',r:'라틴어 sinuosus (full of curves, 굴곡 많은) → 굴곡이 많은 → 꾸불꾸불한으로 고착 > 뱀이 S자로 굽이치며 움직이는 장면이 원형'},
{n:2798,w:'nugget',m:'n. ① (귀금속 등의) 덩어리',s:'chunk, clump, hunk, lump, mass ② (가치 있는) 작고 귀중한 것, 귀중한 정보',r:'영어 nug (lump, 덩어리) + -et → 작은 덩어리 → 귀금속 덩어리·핵심 정보로 고착 > 강바닥에서 발견된 번쩍이는 금덩어리의 장면이 원형'},
{n:2799,w:'moot',m:'a. ① 논란의 여지가 있는, 논쟁 중인, 미해결의',s:'controversial, debatable ② (가능성이 적으므로) 고려할 가치가 없는',r:'고대 영어 mot (assembly, 집회) → 집회에서 토론하는 → 논란의 여지가 있는으로 고착 > 사람마다 의견이 달라 결론 내리기 어려운 장면이 원형'},
{n:2800,w:'premiere',m:'n. ① (연극의) 첫날, 초연; (영화의) 개봉',s:'first night, unveiling; release ② (연극의) 주연 여배우, main actress v. (연극·작곡의) 첫 공연을 하다, (영화를) 개봉하다 a. 첫날의, 최초의; 주요한, 눈에 띄는',r:'프랑스어 première (first, 첫째) → 처음으로 공개하는 것 → 초연·개봉으로 고착 > 레드카펫 위에서 영화가 처음 공개되는 장면이 원형'},
{n:2801,w:'brandish',m:'vt. ① (칼·무기 등을) 휘두르다',s:'swing, wield ② 과시하다, flaunt, parade, show off',r:'고대 프랑스어 brandir (wave a sword, 칼을 휘두르다) → 무기를 위협적으로 흔들다 → 휘두르다로 고착 > 전사가 칼을 머리 위로 치켜들며 흔드는 장면이 원형'},
{n:2802,w:'puerile',m:'a. 어린아이 같은, 유치한, 미숙한',s:'babyish, childish, immature, infantile',r:'라틴어 puer (boy, 소년) + -ile → 소년 같은 → 어린아이 같은·유치한으로 고착 > 어른이 어린아이처럼 철없이 구는 장면이 원형'},
{n:2803,w:'spinster',m:'n. 노처녀, 독신녀(특히 나이가 많고 결혼할 가능성이 적어 보이는 사람)',s:'',r:'중세 영어 spinnestre (spinner, 실 잣는 여자) → 결혼 못 하고 실이나 잣는 사람 → 노처녀·독신녀로 고착 > 혼자 실을 잣으며 조용히 사는 장면이 원형'},
{n:2804,w:'disabuse',m:'vt. ~의 어리석음을 깨우치다, (그릇된 관념·잘못 따위를) 깨닫게 하다',s:'disenchant, disillusion',r:'dis (undo) + abuse (오용) → 잘못된 생각을 되돌리다 → 어리석음을 깨우치다로 고착 > 잘못된 믿음을 바로잡아 주는 장면이 원형'},
