<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MVP 단어 학습</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 6px;
      background: linear-gradient(90deg, #a78bfa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 40px;
    }
    .grid {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 18px;
      padding: 24px 28px;
      text-decoration: none;
      color: white;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .card:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(167,139,250,0.5);
      transform: translateY(-2px);
    }
    .icon {
      font-size: 32px;
      flex-shrink: 0;
    }
    .info { flex: 1; }
    .card-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      line-height: 1.5;
    }
    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      margin-top: 8px;
      display: inline-block;
    }
    .badge-purple { background: rgba(167,139,250,0.2); color: #a78bfa; }
    .badge-green { background: rgba(52,211,153,0.2); color: #34d399; }
    .badge-yellow { background: rgba(251,191,36,0.2); color: #fbbf24; }
    .arrow {
      font-size: 20px;
      color: rgba(255,255,255,0.3);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <h1>📚 MVP 단어 학습</h1>
  <p class="subtitle">학습할 메뉴를 선택하세요</p>

  <div class="grid">

    <a class="card" href="mvp flashcards v4 변환.html">
      <div class="icon">🃏</div>
      <div class="info">
        <div class="card-title">플래시카드</div>
        <div class="card-desc">단어 #1 ~ #1700 · 어근 분석 · 동의어</div>
        <span class="badge badge-purple">전체 1,700단어</span>
        <span class="badge badge-yellow">동의어 🔁</span>
      </div>
      <div class="arrow">›</div>
    </a>

    <a class="card" href="MVP 사지선다 1~589.html">
      <div class="icon">✏️</div>
      <div class="info">
        <div class="card-title">사지선다 퀴즈 Vol.1 (전반)</div>
        <div class="card-desc">단어 #1 ~ #589</div>
        <span class="badge badge-green">Vol.1</span>
      </div>
      <div class="arrow">›</div>
    </a>

    <a class="card" href="MVP Vol2 600~1000 사지선다.html">
      <div class="icon">✏️</div>
      <div class="info">
        <div class="card-title">사지선다 퀴즈 Vol.2 (전반)</div>
        <div class="card-desc">단어 #600 ~ #1000</div>
        <span class="badge badge-green">Vol.2</span>
      </div>
      <div class="arrow">›</div>
    </a>

    <a class="card" href="MVP Vol2 1001~1300 사지선다.html">
      <div class="icon">✏️</div>
      <div class="info">
        <div class="card-title">사지선다 퀴즈 Vol.2 (후반)</div>
        <div class="card-desc">단어 #1001 ~ #1300</div>
        <span class="badge badge-green">Vol.2</span>
      </div>
      <div class="arrow">›</div>
    </a>

    <a class="card" href="편입 단어 퀴즈 최종 사지선다.html">
      <div class="icon">✏️</div>
      <div class="info">
        <div class="card-title">편입 영어 단어 퀴즈</div>
        <div class="card-desc">편입 영어 사지선다</div>
        <span class="badge badge-purple">편입</span>
      </div>
      <div class="arrow">›</div>
    </a>

  </div>
</body>
</html>
