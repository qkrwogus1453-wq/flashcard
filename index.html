<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVP 단어장</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px}
h1{color:#e94560;font-size:1.8em;margin-bottom:8px}
.sub{color:#aaa;font-size:.9em;margin-bottom:40px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:500px}
.card{background:#16213e;border-radius:14px;padding:22px;text-align:center;text-decoration:none;color:#eee;border:2px solid transparent;transition:all .2s}
.card:hover{border-color:#e94560;transform:translateY(-2px)}
.card.quiz{border-color:#0f3460}
.card.quiz:hover{border-color:#4ecca3}
.emoji{font-size:2em;margin-bottom:8px}
.card-title{font-size:1em;font-weight:bold;margin-bottom:4px}
.card-sub{font-size:.78em;color:#888}
.section-label{grid-column:1/-1;color:#e94560;font-size:.85em;font-weight:bold;padding-top:10px}
</style>
</head>
<body>
<h1>📚 MVP 단어장</h1>
<p class="sub">편입 영어 3000단어 학습 시스템</p>
<div class="grid">
  <div class="section-label">📇 플래시카드 (20단어씩)</div>
  <a href="flashcard1.html" class="card">
    <div class="emoji">🃏</div>
    <div class="card-title">플래시카드 1</div>
    <div class="card-sub">1~1000번 · 50세트</div>
  </a>
  <a href="flashcard2.html" class="card">
    <div class="emoji">🃏</div>
    <div class="card-title">플래시카드 2</div>
    <div class="card-sub">1001~2000번 · 50세트</div>
  </a>
  <a href="flashcard3.html" class="card">
    <div class="emoji">🃏</div>
    <div class="card-title">플래시카드 3</div>
    <div class="card-sub">2001~3000번 · 50세트</div>
  </a>
  <div class="section-label">✏️ 사지선다 퀴즈 (50문제씩)</div>
  <a href="quiz1.html" class="card quiz">
    <div class="emoji">📝</div>
    <div class="card-title">퀴즈 1</div>
    <div class="card-sub">1~1000번 · 20세트</div>
  </a>
  <a href="quiz2.html" class="card quiz">
    <div class="emoji">📝</div>
    <div class="card-title">퀴즈 2</div>
    <div class="card-sub">1001~2000번 · 20세트</div>
  </a>
  <a href="quiz3.html" class="card quiz">
    <div class="emoji">📝</div>
    <div class="card-title">퀴즈 3</div>
    <div class="card-sub">2001~3000번 · 20세트</div>
  </a>
</div>
</body>
</html>
