const TOTAL_DAYS = Object.keys(WORDS_DATA).length;

function getSets(dayWords) {
  const sets = [];
  for (let i = 0; i < dayWords.length; i += 20) {
    sets.push(dayWords.slice(i, i + 20));
  }
  return sets;
}

// Cache for generated 어근 (in-memory)
const rootCache = {};

async function fetchRoot(word, meaning) {
  const cacheKey = `${word}`;
  if (rootCache[cacheKey]) return rootCache[cacheKey];

  const prompt = `영어 단어 "${word}" (뜻: ${meaning})의 어근을 한국어로 간결하게 설명해주세요.
라틴어/그리스어 어원, 접두사, 접미사, 어근의 의미를 포함해서 단 1-2줄로 작성하세요.
예시: "라틴어 in(not) + nocere(해치다) → 해치지 않는, 무죄의"
예시: "그리스어 anti(반대) + thesis(명제) → 반대 명제"
오직 어근 설명만 출력하고 다른 말은 하지 마세요.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  });

  const data = await response.json();
  const root = data.content?.[0]?.text?.trim() || "";
  rootCache[cacheKey] = root;
  return root;
}

export default function FlashCards() {
  const [screen, setScreen] = useState("home");
  const [selectedDay, setSelectedDay] = useState(null);
  const [selectedSet, setSelectedSet] = useState(null);
  const [cards, setCards] = useState([]);
  const [currentIndex, setCurrentIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [known, setKnown] = useState(new Set());
  const [showRoots, setShowRoots] = useState(true);
  const [generatedRoot, setGeneratedRoot] = useState(null);
  const [loadingRoot, setLoadingRoot] = useState(false);

  const days = Object.keys(WORDS_DATA).map(Number).sort((a, b) => a - b);

  function startStudy(day, setIdx) {
    const dayWords = WORDS_DATA[String(day)];
    const sets = getSets(dayWords);
    setCards(sets[setIdx]);
    setSelectedDay(day);
    setSelectedSet(setIdx);
    setCurrentIndex(0);
    setFlipped(false);
    setKnown(new Set());
    setGeneratedRoot(null);
    setScreen("study");
  }

  const card = cards[currentIndex];

  useEffect(() => {
    if (!card) return;
    setGeneratedRoot(null);
    // If this card already has a root, no need to fetch
    if (card["어근"]) return;
    // Only fetch when flipped
  }, [currentIndex, cards]);

  useEffect(() => {
    if (!card || !flipped) return;
    if (card["어근"]) return;

    const cacheKey = card["단어"];
    if (rootCache[cacheKey]) {
      setGeneratedRoot(rootCache[cacheKey]);
      return;
    }

    setLoadingRoot(true);
    setGeneratedRoot(null);

    fetchRoot(card["단어"], card["뜻"])
      .then(root => {
        setGeneratedRoot(root);
        setLoadingRoot(false);
      })
      .catch(() => {
        setLoadingRoot(false);
      });
  }, [flipped, currentIndex, cards]);

  function handleShuffle() {
    setCards([...cards].sort(() => Math.random() - 0.5));
    setCurrentIndex(0);
    setFlipped(false);
    setGeneratedRoot(null);
  }

  function handleReset() {
    const dayWords = WORDS_DATA[String(selectedDay)];
    const sets = getSets(dayWords);
    setCards(sets[selectedSet]);
    setCurrentIndex(0);
    setFlipped(false);
    setKnown(new Set());
    setGeneratedRoot(null);
  }

  function handleNext() {
    if (currentIndex < cards.length - 1) {
      setCurrentIndex(currentIndex + 1);
      setFlipped(false);
      setGeneratedRoot(null);
    }
  }

  function handlePrev() {
    if (currentIndex > 0) {
      setCurrentIndex(currentIndex - 1);
      setFlipped(false);
      setGeneratedRoot(null);
    }
  }

  function markKnown() {
    const newKnown = new Set(known);
    newKnown.add(currentIndex);
    setKnown(newKnown);
    if (currentIndex < cards.length - 1) {
      setCurrentIndex(currentIndex + 1);
      setFlipped(false);
      setGeneratedRoot(null);
    }
  }

  function markUnknown() {
    if (currentIndex < cards.length - 1) {
      setCurrentIndex(currentIndex + 1);
      setFlipped(false);
      setGeneratedRoot(null);
    }
  }

  function getDayRange(day) {
    const words = WORDS_DATA[String(day)];
    const nums = words.map(w => w["번호"]);
    return `${Math.min(...nums)}–${Math.max(...nums)}`;
  }

  function hasStaticRoots(day) {
    return WORDS_DATA[String(day)].some(w => w["어근"]);
  }

  const currentRoot = card?.["어근"] || generatedRoot;
  const isAIRoot = !card?.["어근"] && !!generatedRoot;

  if (screen === "home") {
    return (
      <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #0f0c29, #302b63, #24243e)", fontFamily: "'Segoe UI', system-ui, sans-serif", color: "#fff" }}>
        <div style={{ padding: "36px 28px 20px", borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
          <div style={{ fontSize: 11, letterSpacing: 4, color: "#a78bfa", fontWeight: 700, marginBottom: 8, textTransform: "uppercase" }}>MVP 단어장</div>
          <div style={{ fontSize: 28, fontWeight: 800, letterSpacing: -0.5 }}>Flash Cards</div>
          <div style={{ fontSize: 13, color: "rgba(255,255,255,0.45)", marginTop: 4 }}>
            총 {Object.values(WORDS_DATA).reduce((a, b) => a + b.length, 0).toLocaleString()}개 단어 · {TOTAL_DAYS}일 과정
          </div>
          <div style={{ marginTop: 10, fontSize: 11, color: "#34d399", background: "rgba(52,211,153,0.1)", padding: "6px 12px", borderRadius: 8, display: "inline-block" }}>
            ✨ Day 3부터 AI 어근 자동 생성 지원
          </div>
        </div>
        <div style={{ padding: "24px 20px", maxWidth: 480, margin: "0 auto" }}>
          {days.map(day => {
            const dayWords = WORDS_DATA[String(day)];
            const sets = getSets(dayWords);
            const hasStatic = hasStaticRoots(day);
            const hasAI = day >= 3;
            const hasSynonyms = day >= 14;
            return (
              <div key={day} style={{ background: "rgba(255,255,255,0.05)", borderRadius: 16, marginBottom: 16, border: "1px solid rgba(167,139,250,0.2)", overflow: "hidden" }}>
                <div style={{ padding: "14px 20px", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <span style={{ fontWeight: 700, fontSize: 15 }}>Day {day}</span>
                    <span style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginLeft: 10 }}>#{getDayRange(day)}</span>
                    {hasStatic && (
                      <span style={{ fontSize: 10, color: "#34d399", background: "rgba(52,211,153,0.15)", padding: "2px 7px", borderRadius: 20, marginLeft: 8, fontWeight: 700 }}>어근 ✓</span>
                    )}
                    {hasAI && !hasStatic && (
                      <span style={{ fontSize: 10, color: "#a78bfa", background: "rgba(167,139,250,0.15)", padding: "2px 7px", borderRadius: 20, marginLeft: 8, fontWeight: 700 }}>AI 어근 ✨</span>
                    )}
                    {hasSynonyms && (
                      <span style={{ fontSize: 10, color: "#fbbf24", background: "rgba(251,191,36,0.15)", padding: "2px 7px", borderRadius: 20, marginLeft: 8, fontWeight: 700 }}>동의어 🔁</span>
                    )}
                  </div>
                  <span style={{ fontSize: 11, fontWeight: 700, color: "#a78bfa", background: "rgba(167,139,250,0.15)", padding: "3px 10px", borderRadius: 20 }}>{dayWords.length}단어</span>
                </div>
                <div style={{ padding: "10px 14px", display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {sets.map((set, si) => {
                    const start = set[0]["번호"];
                    const end = set[set.length - 1]["번호"];
                    return (
                      <button key={si} onClick={() => startStudy(day, si)}
                        style={{ background: "rgba(167,139,250,0.12)", border: "1px solid rgba(167,139,250,0.3)", borderRadius: 10, padding: "8px 14px", color: "#e0d7ff", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>
                        Set {si + 1}
                        <span style={{ color: "rgba(255,255,255,0.4)", fontWeight: 400, marginLeft: 6 }}>{start}–{end}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  const progress = ((currentIndex + 1) / cards.length) * 100;

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #0f0c29, #302b63, #24243e)", fontFamily: "'Segoe UI', system-ui, sans-serif", color: "#fff", display: "flex", flexDirection: "column" }}>
      <div style={{ padding: "16px 20px", display: "flex", alignItems: "center", gap: 12, borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
        <button onClick={() => setScreen("home")} style={{ background: "rgba(255,255,255,0.1)", border: "none", color: "#fff", width: 34, height: 34, borderRadius: 10, cursor: "pointer", fontSize: 16 }}>←</button>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13, fontWeight: 700 }}>Day {selectedDay} · Set {selectedSet + 1}</div>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", marginTop: 1 }}>{cards[0]?.["번호"]}–{cards[cards.length - 1]?.["번호"]}번</div>
        </div>
        <div style={{ fontSize: 12, color: "#34d399", fontWeight: 700 }}>✓ {known.size}/{cards.length}</div>
      </div>

      <div style={{ height: 3, background: "rgba(255,255,255,0.1)" }}>
        <div style={{ height: "100%", width: `${progress}%`, background: "linear-gradient(90deg, #a78bfa, #818cf8)", transition: "width 0.3s" }} />
      </div>

      <div style={{ textAlign: "center", padding: "12px 0 4px", fontSize: 13, color: "rgba(255,255,255,0.4)" }}>
        {currentIndex + 1} / {cards.length}
      </div>

      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "8px 20px" }}>
        {card && (
          <div onClick={() => setFlipped(!flipped)} style={{
            width: "100%", maxWidth: 420,
            minHeight: flipped && currentRoot ? 280 : 240,
            background: flipped ? "linear-gradient(135deg, rgba(167,139,250,0.2), rgba(129,140,248,0.15))" : "rgba(255,255,255,0.07)",
            border: flipped ? "1px solid rgba(167,139,250,0.5)" : "1px solid rgba(255,255,255,0.12)",
            borderRadius: 24, cursor: "pointer",
            display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
            padding: "32px 28px", transition: "all 0.25s", userSelect: "none",
          }}>
            {!flipped ? (
              <>
                <div style={{ fontSize: 11, color: "#a78bfa", fontWeight: 700, letterSpacing: 3, marginBottom: 20, textTransform: "uppercase" }}>영어 단어</div>
                <div style={{ fontSize: 34, fontWeight: 800, letterSpacing: -1, textAlign: "center" }}>{card["단어"]}</div>
                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)", marginTop: 28 }}>탭하여 뜻 확인</div>
              </>
            ) : (
              <>
                <div style={{ fontSize: 11, color: "#818cf8", fontWeight: 700, letterSpacing: 3, marginBottom: 16, textTransform: "uppercase" }}>한국어 뜻</div>
                <div style={{ fontSize: 15, fontWeight: 700, textAlign: "center", color: "#e0d7ff", marginBottom: currentRoot || loadingRoot ? 20 : 0, lineHeight: 1.6 }}>{card["뜻"]}</div>
                
                {showRoots && (
                  <>
                    {loadingRoot && !currentRoot && (
                      <div style={{ width: "100%", background: "rgba(255,255,255,0.05)", borderRadius: 12, padding: "12px 16px", borderLeft: "3px solid rgba(167,139,250,0.4)" }}>
                        <div style={{ fontSize: 10, color: "#a78bfa", fontWeight: 700, letterSpacing: 2, marginBottom: 6, textTransform: "uppercase" }}>🔤 어근 생성 중...</div>
                        <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)" }}>AI가 어근을 분석하고 있어요</div>
                      </div>
                    )}
                    {currentRoot && (
                      <div style={{ width: "100%", background: "rgba(255,255,255,0.07)", borderRadius: 12, padding: "12px 16px", borderLeft: `3px solid ${isAIRoot ? "#a78bfa" : "#34d399"}` }}>
                        <div style={{ fontSize: 10, color: isAIRoot ? "#a78bfa" : "#34d399", fontWeight: 700, letterSpacing: 2, marginBottom: 6, textTransform: "uppercase" }}>
                          {isAIRoot ? "✨ AI 어근" : "🔤 어근"}
                        </div>
                        <div style={{ fontSize: 12, color: "rgba(255,255,255,0.75)", lineHeight: 1.7 }}>{currentRoot}</div>
                      </div>
                    )}
                    {card["전치사"] && (
                      <div style={{ width: "100%", background: "rgba(255,255,255,0.05)", borderRadius: 12, padding: "12px 16px", borderLeft: "3px solid #f59e0b", marginTop: 8 }}>
                        <div style={{ fontSize: 10, color: "#f59e0b", fontWeight: 700, letterSpacing: 2, marginBottom: 6, textTransform: "uppercase" }}>
                          📌 전치사 표현
                        </div>
                        <div style={{ fontSize: 12, color: "rgba(255,255,255,0.75)", lineHeight: 1.8, whiteSpace: "pre-line" }}>{card["전치사"]}</div>
                      </div>
                    )}
                    {card["동의어"] && (
                      <div style={{ width: "100%", background: "rgba(251,191,36,0.08)", borderRadius: 12, padding: "12px 16px", borderLeft: "3px solid #fbbf24", marginTop: 8 }}>
                        <div style={{ fontSize: 10, color: "#fbbf24", fontWeight: 700, letterSpacing: 2, marginBottom: 6, textTransform: "uppercase" }}>
                          🔁 동의어
                        </div>
                        <div style={{ fontSize: 12, color: "rgba(255,255,255,0.75)", lineHeight: 1.8 }}>{card["동의어"]}</div>
                      </div>
                    )}
                  </>
                )}
                <div style={{ fontSize: 10, color: "rgba(255,255,255,0.25)", marginTop: 14 }}>#{card["번호"]}</div>
              </>
            )}
          </div>
        )}
      </div>

      <div style={{ textAlign: "center", paddingBottom: 4 }}>
        <button onClick={() => setShowRoots(!showRoots)} style={{ background: "none", border: "1px solid rgba(167,139,250,0.3)", borderRadius: 20, padding: "4px 14px", color: showRoots ? "#a78bfa" : "rgba(255,255,255,0.3)", fontSize: 11, cursor: "pointer", fontWeight: 600 }}>
          {showRoots ? "🔤 어근 숨기기" : "🔤 어근 보기"}
        </button>
      </div>

      {flipped && (
        <div style={{ display: "flex", gap: 12, padding: "8px 20px", maxWidth: 460, margin: "0 auto", width: "100%" }}>
          <button onClick={markKnown} style={{ flex: 1, padding: "12px", borderRadius: 14, background: "rgba(52,211,153,0.15)", border: "1px solid rgba(52,211,153,0.4)", color: "#6ee7b7", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>✓ 알아요</button>
          <button onClick={markUnknown} style={{ flex: 1, padding: "12px", borderRadius: 14, background: "rgba(251,113,133,0.15)", border: "1px solid rgba(251,113,133,0.4)", color: "#fda4af", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>✗ 모르겠어요</button>
        </div>
      )}

      <div style={{ display: "flex", gap: 10, padding: "8px 20px 24px", maxWidth: 460, margin: "0 auto", width: "100%" }}>
        <button onClick={handlePrev} disabled={currentIndex === 0} style={{ flex: 1, padding: "11px", borderRadius: 12, background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.12)", color: currentIndex === 0 ? "rgba(255,255,255,0.2)" : "#fff", fontWeight: 600, fontSize: 13, cursor: currentIndex === 0 ? "default" : "pointer" }}>← 이전</button>
        <button onClick={handleShuffle} style={{ padding: "11px 14px", borderRadius: 12, background: "rgba(167,139,250,0.12)", border: "1px solid rgba(167,139,250,0.3)", color: "#a78bfa", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>⇄</button>
        <button onClick={handleReset} style={{ padding: "11px 14px", borderRadius: 12, background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", color: "rgba(255,255,255,0.5)", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>↺</button>
        <button onClick={handleNext} disabled={currentIndex === cards.length - 1} style={{ flex: 1, padding: "11px", borderRadius: 12, background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.12)", color: currentIndex === cards.length - 1 ? "rgba(255,255,255,0.2)" : "#fff", fontWeight: 600, fontSize: 13, cursor: currentIndex === cards.length - 1 ? "default" : "pointer" }}>다음 →</button>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FlashCards />);
  </script>
</body>
</html>
