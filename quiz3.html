<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVP 퀴즈 2001~3000</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{color:#e94560;margin-bottom:8px;font-size:1.4em}
.subtitle{color:#aaa;font-size:.85em;margin-bottom:20px}
.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
select,button{padding:8px 14px;border-radius:8px;border:none;font-size:.9em;cursor:pointer}
select{background:#16213e;color:#eee;border:1px solid #e94560}
button{background:#e94560;color:#fff;font-weight:bold}
button:hover{background:#c73652}
button.secondary{background:#0f3460}
button.secondary:hover{border:1px solid #4ecca3}
.score-bar{background:#16213e;border-radius:12px;padding:10px 20px;margin-bottom:16px;font-size:.9em;color:#4ecca3;width:100%;max-width:480px;text-align:center}
.q-box{background:#16213e;border-radius:16px;padding:24px;width:100%;max-width:480px;margin-bottom:16px}
.q-num{color:#888;font-size:.8em;margin-bottom:6px}
.q-word{font-size:1.6em;font-weight:bold;color:#fff;margin-bottom:6px}
.q-label{color:#aaa;font-size:.82em;margin-bottom:16px}
.choices{display:flex;flex-direction:column;gap:10px}
.choice{background:#0f3460;border:2px solid #0f3460;border-radius:10px;padding:12px 16px;cursor:pointer;font-size:.85em;line-height:1.4;transition:all .2s;text-align:left}
.choice:hover{border-color:#e94560}
.choice.correct{background:#1a4731;border-color:#4ecca3;color:#4ecca3}
.choice.wrong{background:#3d1a1a;border-color:#e94560;color:#e94560}
.choice.reveal{background:#1a4731;border-color:#4ecca3;color:#4ecca3}
.feedback{margin-top:12px;font-size:.85em;min-height:20px;color:#f0a500}
.nav{display:flex;gap:14px;align-items:center;margin-top:10px}
.nav button{padding:10px 22px;font-size:1em}
.nav .cnt{color:#aaa;font-size:.9em;min-width:80px;text-align:center}
.result-box{background:#16213e;border-radius:16px;padding:30px;text-align:center;max-width:480px;width:100%;display:none}
.result-box h2{color:#4ecca3;font-size:1.4em;margin-bottom:12px}
.result-score{font-size:2.5em;font-weight:bold;color:#e94560;margin-bottom:8px}
.result-box p{color:#aaa;margin-bottom:20px}
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.wrong-list{background:#16213e;border-radius:16px;padding:24px;max-width:480px;width:100%;display:none;margin-top:16px}
.wrong-list h3{color:#e94560;margin-bottom:16px;font-size:1.1em}
.wrong-item{border-bottom:1px solid #0f3460;padding:12px 0}
.wrong-item:last-child{border-bottom:none}
.wrong-word{font-size:1.1em;font-weight:bold;color:#fff;margin-bottom:4px}
.wrong-num{font-size:.75em;color:#888;margin-bottom:4px}
.wrong-my{font-size:.82em;color:#e94560;margin-bottom:4px}
.wrong-my::before{content:'내 답: '}
.wrong-correct{font-size:.82em;color:#4ecca3}
.wrong-correct::before{content:'정답: '}
</style>
</head>
<body>
<h1>MVP 단어장 사지선다 퀴즈</h1>
<p class="subtitle">2001~3000번 · 1000단어 · 50문제씩 20세트</p>
<div class="controls">
  <select id="setSelect" onchange="loadSet(this.value)">
    <option value="1">세트 1 (2001~2050번)</option>
    <option value="2">세트 2 (2051~2100번)</option>
    <option value="3">세트 3 (2101~2150번)</option>
    <option value="4">세트 4 (2151~2200번)</option>
    <option value="5">세트 5 (2201~2250번)</option>
    <option value="6">세트 6 (2251~2300번)</option>
    <option value="7">세트 7 (2301~2350번)</option>
    <option value="8">세트 8 (2351~2400번)</option>
    <option value="9">세트 9 (2401~2450번)</option>
    <option value="10">세트 10 (2451~2500번)</option>
    <option value="11">세트 11 (2501~2550번)</option>
    <option value="12">세트 12 (2551~2600번)</option>
    <option value="13">세트 13 (2601~2650번)</option>
    <option value="14">세트 14 (2651~2700번)</option>
    <option value="15">세트 15 (2701~2750번)</option>
    <option value="16">세트 16 (2751~2800번)</option>
    <option value="17">세트 17 (2801~2850번)</option>
    <option value="18">세트 18 (2851~2900번)</option>
    <option value="19">세트 19 (2901~2950번)</option>
    <option value="20">세트 20 (2951~3000번)</option>
  </select>
  <button onclick="shuffleSet()">🔀 섞기</button>
</div>
<div class="score-bar" id="scoreBar">점수: 0 / 0 &nbsp;|&nbsp; 정답률: -</div>
<div class="q-box" id="qBox">
  <div class="q-num" id="qNum"></div>
  <div class="q-word" id="qWord"></div>
  <div class="q-label">이 단어의 뜻은?</div>
  <div class="choices" id="choices"></div>
  <div class="feedback" id="feedback"></div>
</div>
<div class="nav">
  <button onclick="prevQ()">◀ 이전</button>
  <span class="cnt" id="cnt"></span>
  <button onclick="nextQ()">다음 ▶</button>
</div>
<div class="result-box" id="resultBox">
  <h2>세트 완료! 🎉</h2>
  <div class="result-score" id="resultScore"></div>
  <p id="resultMsg"></p>
  <div class="result-btns">
    <button onclick="retrySet()">↺ 다시 풀기</button>
    <button class="secondary" id="wrongBtn" onclick="showWrongList()">❌ 오답 보기</button>
  </div>
</div>
<div class="wrong-list" id="wrongList">
  <h3>❌ 오답 목록</h3>
  <div id="wrongItems"></div>
</div>
<script>

  document.getElementById('qBox').style.display='block';
  document.querySelector('.nav').style.display='flex';
  updateScore();renderQ();
}

function shuffleSet(){
  curSet=curSet.sort(()=>Math.random()-.5);
  curIdx=0;answered=new Array(curSet.length).fill(null);
  correct=0;total_q=0;wrongAnswers=[];
  document.getElementById('resultBox').style.display='none';
  document.getElementById('wrongList').style.display='none';
  document.getElementById('qBox').style.display='block';
  document.querySelector('.nav').style.display='flex';
  updateScore();renderQ();
}

function renderQ(){
  const q=curSet[curIdx];
  document.getElementById('qNum').textContent=`문제 ${curIdx+1} / ${curSet.length} | #${q.n}`;
  document.getElementById('qWord').textContent=q.w;
  document.getElementById('cnt').textContent=`${curIdx+1} / ${curSet.length}`;
  const box=document.getElementById('choices');
  box.innerHTML='';
  q.c.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice';btn.textContent=c;
    btn.onclick=()=>answer(i);
    box.appendChild(btn);
  });
  document.getElementById('feedback').textContent='';
  if(answered[curIdx]!==null) showResult(answered[curIdx],q.a);
}

function answer(i){
  if(answered[curIdx]!==null) return;
  const q=curSet[curIdx];
  answered[curIdx]=i;total_q++;
  if(i===q.a){ correct++; }
  else { wrongAnswers.push({n:q.n,word:q.w,myAns:q.c[i],correctAns:q.c[q.a]}); }
  updateScore();showResult(i,q.a);
  if(curIdx===curSet.length-1 && answered.every(a=>a!==null)){
    setTimeout(()=>showFinal(),800);
  }
}

function showResult(chosen,correct_idx){
  const btns=document.querySelectorAll('.choice');
  btns.forEach((b,i)=>{
    if(i===correct_idx) b.classList.add(chosen===correct_idx?'correct':'reveal');
    else if(i===chosen) b.classList.add('wrong');
    b.onclick=null;
  });
  document.getElementById('feedback').textContent=chosen===correct_idx?'✅ 정답!':'❌ 오답';
}

function updateScore(){
  const rate=total_q>0?Math.round(correct/total_q*100):'-';
  document.getElementById('scoreBar').textContent=`점수: ${correct} / ${total_q}  |  정답률: ${rate==='-'?'-':rate+'%'}`;
}

function nextQ(){
  if(curIdx<curSet.length-1){
    curIdx++;renderQ();
  } else {
    if(answered.every(a=>a!==null)){ showFinal(); }
    else {
      curIdx=answered.findIndex(a=>a===null);
      renderQ();
    }
  }
}

function prevQ(){if(curIdx>0){curIdx--;renderQ();}}

function showFinal(){
  document.getElementById('qBox').style.display='none';
  document.querySelector('.nav').style.display='none';
  const rate=Math.round(correct/curSet.length*100);
  document.getElementById('resultScore').textContent=`${correct} / ${curSet.length} (${rate}%)`;
  document.getElementById('resultMsg').textContent=rate>=80?'훌륭해요! 🎊':rate>=60?'조금만 더 연습하세요 💪':'플래시카드로 복습해보세요 📖';
  document.getElementById('wrongBtn').style.display=wrongAnswers.length>0?'':'none';
  document.getElementById('resultBox').style.display='block';
}

function showWrongList(){
  const box=document.getElementById('wrongItems');
  box.innerHTML='';
  wrongAnswers.forEach(w=>{
    const div=document.createElement('div');
    div.className='wrong-item';
    div.innerHTML=`<div class="wrong-num">#${w.n}</div><div class="wrong-word">${w.word}</div><div class="wrong-my">${w.myAns}</div><div class="wrong-correct">${w.correctAns}</div>`;
    box.appendChild(div);
  });
  document.getElementById('wrongList').style.display='block';
  document.getElementById('wrongList').scrollIntoView({behavior:'smooth'});
}

function retrySet(){loadSet(document.getElementById('setSelect').value);}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') nextQ();
  else if(e.key==='ArrowLeft') prevQ();
  else if(['1','2','3','4'].includes(e.key)) answer(parseInt(e.key)-1);
});

loadSet(1);
</script>
</body>
</html>
