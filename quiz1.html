<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVP2 퀴즈 1~1000</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{color:#e94560;margin-bottom:8px;font-size:1.4em}
.subtitle{color:#aaa;font-size:.85em;margin-bottom:20px}
.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
select,button{padding:8px 14px;border-radius:8px;border:none;font-size:.9em;cursor:pointer}
select{background:#16213e;color:#eee;border:1px solid #e94560}
button{background:#e94560;color:#fff;font-weight:bold}
button:hover{background:#c73652}
.btn-secondary{background:#0f3460!important}
.btn-secondary:hover{border:1px solid #4ecca3!important}
#scoreBar{background:#16213e;border-radius:12px;padding:10px 20px;margin-bottom:16px;font-size:.9em;color:#4ecca3;width:100%;max-width:520px;text-align:center}
#qBox{background:#16213e;border-radius:16px;padding:24px;width:100%;max-width:520px;margin-bottom:16px}
#qNum{color:#888;font-size:.8em;margin-bottom:6px}
#qWord{font-size:1.6em;font-weight:bold;color:#fff;margin-bottom:6px}
.q-label{color:#aaa;font-size:.82em;margin-bottom:16px}
#choiceBox{display:flex;flex-direction:column;gap:10px}
.choice{background:#0f3460;border:2px solid #0f3460;border-radius:10px;padding:12px 16px;cursor:pointer;font-size:.85em;line-height:1.5;text-align:left;transition:all .15s;display:flex;flex-direction:column;gap:4px}
.choice:hover{border-color:#e94560}
.choice-text{color:inherit}
.choice-owner{display:none;font-size:.78em;font-weight:bold;opacity:.85}
.choice.answered .choice-owner{display:block}
.choice.correct{background:#1a4731!important;border-color:#4ecca3!important;color:#4ecca3!important;cursor:default}
.choice.wrong{background:#3d1a1a!important;border-color:#e94560!important;color:#e94560!important;cursor:default}
.choice.reveal{background:#1a4731!important;border-color:#4ecca3!important;color:#4ecca3!important;cursor:default}
.choice.neutral{background:#0f3460!important;border-color:#2a3f5f!important;color:#888!important;cursor:default}
.choice.neutral .choice-owner{color:#f0a500}
.choice.wrong .choice-owner{color:#ff8fa3}
#feedback{margin-top:12px;font-size:.85em;min-height:20px;color:#f0a500}
#extraInfo{display:none;margin-top:12px;padding:10px 14px;background:#0a2040;border-radius:10px;border-left:3px solid #4ecca3}
.extra-syn{font-size:.78em;color:#4ecca3;margin-bottom:5px;line-height:1.4}
.extra-syn::before{content:'동의어: ';font-weight:bold}
.extra-root{font-size:.78em;color:#f0a500;line-height:1.4}
.extra-root::before{content:'어원: ';font-weight:bold}
#navBox{display:flex;gap:14px;align-items:center;margin-top:10px}
#navBox button{padding:10px 22px;font-size:1em}
#qCnt{color:#aaa;font-size:.9em;min-width:80px;text-align:center}
#resultBox{background:#16213e;border-radius:16px;padding:30px;text-align:center;max-width:520px;width:100%;display:none}
#resultBox h2{color:#4ecca3;font-size:1.4em;margin-bottom:12px}
#resultScore{font-size:2.5em;font-weight:bold;color:#e94560;margin-bottom:8px}
#resultMsg{color:#aaa;margin-bottom:20px}
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
#wrongBox{background:#16213e;border-radius:16px;padding:24px;max-width:520px;width:100%;display:none;margin-top:16px}
#wrongBox h3{color:#e94560;margin-bottom:16px;font-size:1.1em}
.wrong-item{border-bottom:1px solid #0f3460;padding:14px 0}
.wrong-item:last-child{border-bottom:none}
.wrong-num{font-size:.75em;color:#888;margin-bottom:3px}
.wrong-word{font-size:1.1em;font-weight:bold;color:#fff;margin-bottom:5px}
.wrong-syn{font-size:.78em;color:#4ecca3;margin-bottom:3px;line-height:1.4}
.wrong-syn::before{content:'동의어: ';font-weight:bold}
.wrong-root{font-size:.78em;color:#f0a500;margin-bottom:6px;line-height:1.4}
.wrong-root::before{content:'어원: ';font-weight:bold}
.wrong-mine{font-size:.82em;color:#e94560;margin-bottom:3px}
.wrong-mine::before{content:'내 답: ';font-weight:bold}
.owner-tag{color:#f0a500;font-weight:bold;font-size:.95em}
.wrong-ans{font-size:.82em;color:#4ecca3}
.wrong-ans::before{content:'정답: ';font-weight:bold}
</style>
</head>
<body>
<h1>MVP2 단어장 사지선다 퀴즈</h1>
<p class="subtitle">1~1000번 · 1000단어 · 50문제씩 20세트 · 크로스 체킹 모드</p>
<div class="controls">
  <select id="setSelect">
<option value="1">세트 1 (1~50번)</option>
<option value="2">세트 2 (51~100번)</option>
<option value="3">세트 3 (101~150번)</option>
<option value="4">세트 4 (151~200번)</option>
<option value="5">세트 5 (201~250번)</option>
<option value="6">세트 6 (251~300번)</option>
<option value="7">세트 7 (301~350번)</option>
<option value="8">세트 8 (351~400번)</option>
<option value="9">세트 9 (401~450번)</option>
<option value="10">세트 10 (451~500번)</option>
<option value="11">세트 11 (501~550번)</option>
<option value="12">세트 12 (551~600번)</option>
<option value="13">세트 13 (601~650번)</option>
<option value="14">세트 14 (651~700번)</option>
<option value="15">세트 15 (701~750번)</option>
<option value="16">세트 16 (751~800번)</option>
<option value="17">세트 17 (801~850번)</option>
<option value="18">세트 18 (851~900번)</option>
<option value="19">세트 19 (901~950번)</option>
<option value="20">세트 20 (951~1000번)</option>
  </select>
  <button onclick="doShuffle()">🔀 섞기</button>
</div>
<div id="scoreBar">점수: 0 / 0 &nbsp;|&nbsp; 정답률: -</div>
<div id="qBox">
  <div id="qNum"></div>
  <div id="qWord"></div>
  <div class="q-label">이 단어의 뜻은?</div>
  <div id="choiceBox"></div>
  <div id="feedback"></div>
  <div id="extraInfo"></div>
</div>
<div id="navBox">
  <button onclick="goPrev()">◀ 이전</button>
  <span id="qCnt"></span>
  <button onclick="goNext()">다음 ▶</button>
</div>
<div id="resultBox">
  <h2>세트 완료! 🎉</h2>
  <div id="resultScore"></div>
  <p id="resultMsg"></p>
  <div class="result-btns">
    <button onclick="initSet(curSetIdx)">↺ 다시 풀기</button>
    <button id="wrongBtn" class="btn-secondary" onclick="showWrongList()">❌ 오답 보기</button>
  </div>
</div>
<div id="wrongBox">
  <h3>❌ 오답 목록</h3>
  <div id="wrongItems"></div>
</div>
<script>
const WORDS=[
{n:1,w:'innocent',m:'결백한, 무죄인 / 순진한, 순수한',r:'in (not) + noc (harm, 해치다) + -ent → 해치지 않는 → 결백한·순진한으로 고착 > 아무 죄도 짓지 않았음을 호소하는 장면이 원형',s:'guiltless, blameless, pure, naive'},
{n:2,w:'hostile',m:'적의 있는, 적대하는 / 불리한',r:'라틴어 hostis (enemy, 적) + -ile → 적의 성질 → 적의 있는·불리한으로 고착 > 마주보는 두 군대가 서로를 노려보는 장면이 원형',s:'antagonistic, unfriendly, belligerent, aggressive'},
{n:3,w:'glorify',m:'찬미하다, 영광을 찬양하다 / 미화하다',r:'glory (영광) + -fy (동사형) → 영광스럽게 만들다 → 찬미하다·미화하다로 고착 > 신의 업적을 높이 찬양하는 장면이 원형',s:'praise, extol, exalt, honor, magnify'},
{n:4,w:'deceased',m:'죽은, 사망한 / 고인이 된',r:'de (completely) + ceas (go, 가다) → 완전히 떠나버린 → 죽은·사망한으로 고착 > 다시는 돌아오지 않는 곳으로 떠난 장면이 원형',s:'dead, departed, late, gone'},
{n:5,w:'antithesis',m:'정반대, 반대되는 것 / 대조, 대립',r:'그리스어 anti (against) + thesis (place, 놓음) → 정반대로 놓인 것 → 정반대·대조로 고착 > 빛과 어둠이 정반대로 나란히 놓인 장면이 원형',s:'contrast, opposite, contradiction, antonym'},
{n:6,w:'multiple',m:'많은, 다수의 / 다양한, 복합적인',r:'라틴어 multiplex (many fold, 여러 겹) → 여러 겹으로 이루어진 → 많은·다양한으로 고착 > 하나의 씨앗에서 여러 줄기가 뻗어 나온 장면이 원형',s:'numerous, various, manifold, diverse'},
{n:7,w:'refund',m:'환불금 / 환불하다',r:'re (back) + fund (pour, 붓다) → 다시 부어 돌려주다 → 환불금·환불하다로 고착 > 구매자에게 돈을 되돌려 주는 장면이 원형',s:'reimbursement, repayment, rebate'},
{n:8,w:'dotage',m:'망령, 노망 / 맹목적 애정',r:'dote (지나치게 좋아하다) + -age (상태) → 지나치게 집착하는 노쇠 상태 → 망령·맹목적 애정으로 고착 > 노인이 정신이 흐릿해져 헛소리를 하는 장면이 원형',s:'senility, infatuation, foolishness'},
{n:9,w:'satire',m:'풍자, 풍자 문학 / 비꼼',r:'라틴어 satura (full dish, 가득 찬 접시) → 여러 것을 섞어 풍자하는 것 → 풍자·비꼼으로 고착 > 권력자를 우스꽝스럽게 과장해 비판하는 장면이 원형',s:'parody, mockery, irony, sarcasm'},
{n:10,w:'proficient',m:'숙달된, 능숙한',r:'라틴어 proficere (make progress, 발전하다) + -ent → 발전하여 능숙해진 → 숙달된·능숙한으로 고착 > 수천 번의 연습으로 능숙해진 장인의 장면이 원형',s:'skilled, adept, expert, competent, capable'},
{n:11,w:'exert',m:'발휘하다, 쓰다 / 열심히 노력하다',r:'ex (out) + sert (join, 연결하다) → 밖으로 힘을 연결해 내다 → 발휘하다·쓰다로 고착 > 전력을 쏟아내는 장면이 원형',s:'apply, exercise, wield, employ'},
{n:12,w:'artificial',m:'인조의, 인공적인 / 부자연스러운',r:'라틴어 ars (art, 기술) + fic (make, 만들다) + -ial → 기술로 만든 → 인공적인·부자연스러운으로 고착 > 공장에서 기계로 만들어진 꽃의 장면이 원형',s:'synthetic, fake, man-made, unnatural'},
{n:13,w:'whim',m:'변덕, 일시적 기분',r:'17세기 영어 whim-wham (fancy, 기발한 것) → 갑자기 생겨난 일시적 욕구 → 변덕·일시적 기분으로 고착 > 갑자기 생각이 바뀌어 계획을 뒤집는 장면이 원형',s:'caprice, impulse, fancy, notion'},
{n:14,w:'formidable',m:'무서운, 무시무시한 / 방대한',r:'라틴어 formidare (fear, 두려워하다) + -able → 두려워할 만한 → 무서운·방대한으로 고착 > 앞에 서기만 해도 위압감이 느껴지는 장면이 원형',s:'daunting, intimidating, redoubtable, fearsome'},
{n:15,w:'commerce',m:'상업, 통상, 교역 / 사회적 교류',r:'con (together) + merc (trade, 거래) → 함께 거래하다 → 상업·교역으로 고착 > 시장에서 물건을 사고파는 장면이 원형',s:'trade, business, industry, exchange'},
{n:16,w:'drastic',m:'급격한 / 극단적인, 과감한',r:'그리스어 drastikos (active, 활발한) → 강하고 급격하게 작용하는 → 급격한·극단적인으로 고착 > 단번에 상황을 뒤집는 강력한 조치의 장면이 원형',s:'extreme, radical, severe, harsh'},
{n:17,w:'usurp',m:'빼앗다, 찬탈하다',r:'라틴어 usurpare (seize for use, 빼앗아 쓰다) → 권력을 강제로 빼앗다 → 빼앗다·찬탈하다로 고착 > 왕좌를 힘으로 차지하는 장면이 원형',s:'seize, usurpate, appropriate, take over'},
{n:18,w:'primitive',m:'원시의, 원시시대의 / 원시적인',r:'라틴어 primus (first, 첫째) + -ive → 맨 처음의 성질 → 원시의·원시적인으로 고착 > 문명 이전 도구도 없이 살아가는 장면이 원형',s:'ancient, primal, rudimentary, early'},
{n:19,w:'ramp',m:'경사로, 비탈길',r:'고대 프랑스어 ramper (climb, 기어오르다) → 기어오를 수 있는 경사면 → 경사로·비탈길로 고착 > 휠체어가 오를 수 있는 완만한 경사로의 장면이 원형',s:'slope, incline, gradient'},
{n:20,w:'esteem',m:'존중하다, 높이 평가하다 / 존경',r:'라틴어 aestimare (estimate, 평가하다) → 높이 평가하다 → 존중하다·존경으로 고착 > 오랜 경험을 가진 어른을 높이 평가하는 장면이 원형',s:'respect, regard, admire, value, revere'},
{n:21,w:'beneficial',m:'유익한, 이익을 가져오는',r:'라틴어 bene (well) + fic (do) + -ial → 좋은 일을 하는 → 유익한·이익을 가져오는으로 고착 > 운동이 건강에 이로운 효과를 주는 장면이 원형',s:'advantageous, helpful, profitable, useful'},
{n:22,w:'transit',m:'수송, 통과, 환승',r:'trans (across) + it (go, 가다) → 가로질러 가는 것 → 수송·통과·환승으로 고착 > 기차가 도시를 통과해 지나가는 장면이 원형',s:'passage, transport, conveyance'},
{n:23,w:'acknowledge',m:'인정하다, 승인하다 / 사의를 표명하다',r:'ac (to) + knowledge (지식) → 지식으로 인정하다 → 인정하다·승인하다로 고착 > 고개를 끄덕이며 사실임을 인정하는 장면이 원형',s:'admit, recognize, confess, concede'},
{n:24,w:'peninsula',m:'반도(半島)',r:'라틴어 paene (almost, 거의) + insula (island, 섬) → 거의 섬 같은 땅 → 반도로 고착 > 세 면이 바다로 둘러싸인 땅의 장면이 원형',s:'promontory, cape'},
{n:25,w:'outspoken',m:'솔직한, 거리낌 없는',r:'out (밖으로) + spoken (말한) → 속 말을 밖으로 내어 말한 → 솔직한·거리낌 없는으로 고착 > 돌려 말하지 않고 직접 의견을 말하는 장면이 원형',s:'candid, frank, blunt, forthright'},
{n:26,w:'virtuoso',m:'예술의 대가, 명인',r:'이탈리아어 virtuoso (skilled, 숙련된) → 탁월한 기술을 가진 → 예술의 대가·명인으로 고착 > 무대 위에서 압도적인 연주를 선보이는 장면이 원형',s:'master, expert, maestro, prodigy'},
{n:27,w:'laud',m:'찬양하다, 기리다 / 기림, 찬미',r:'라틴어 laudare (praise, 칭찬하다) → 높이 소리 내어 칭찬하다 → 찬양하다·기리다로 고착 > 업적을 높이 칭송하는 연설의 장면이 원형',s:'praise, extol, commend, acclaim'},
{n:28,w:'tension',m:'긴장, 불안 / 긴박, 팽팽함',r:'라틴어 tendere (stretch, 당기다) + -ion → 팽팽하게 당겨진 상태 → 긴장·팽팽함으로 고착 > 줄이 팽팽하게 당겨져 끊어질 듯한 장면이 원형',s:'stress, strain, anxiety, pressure'},
{n:29,w:'squalid',m:'더러운, 누추한, 지저분한',r:'라틴어 squalere (be foul, 더럽다) + -id → 더럽고 누추한 → 더러운·지저분한으로 고착 > 오랫동안 청소하지 않아 지저분한 장면이 원형',s:'dirty, filthy, shabby, sordid'},
{n:30,w:'rigid',m:'엄격한, 융통성 없는 / 단단한',r:'라틴어 rigere (be stiff, 뻣뻣하다) + -id → 굽히지 않고 뻣뻣한 → 엄격한·단단한으로 고착 > 조금도 구부러지지 않는 강철 막대의 장면이 원형',s:'strict, inflexible, stiff, unyielding'},
{n:31,w:'entrepreneur',m:'실업가, 기업가',r:'프랑스어 entreprendre (undertake, 맡다) → 사업을 스스로 맡아 하는 사람 → 실업가·기업가로 고착 > 위험을 감수하고 새 사업을 시작하는 장면이 원형',s:'businessman, businessperson, capitalist'},
{n:32,w:'approximately',m:'대략, 대강, 얼추',r:'라틴어 ad (to) + proximus (nearest, 가장 가까운) → 가장 가까운 수치로 → 대략·대강으로 고착 > 정확한 자 없이 눈대중으로 재는 장면이 원형',s:'roughly, about, around, nearly'},
{n:33,w:'signify',m:'의미하다, 뜻하다 / 알리다',r:'라틴어 signum (sign, 표시) + -fy → 표시로 나타내다 → 의미하다·알리다로 고착 > 신호 하나가 특정 의미를 전달하는 장면이 원형',s:'mean, indicate, denote, represent'},
{n:34,w:'cohort',m:'집단, 코호트 / 친구, 동료',r:'라틴어 cohors (enclosure, 울타리) → 같은 울타리 안의 집단 → 집단·코호트·동료로 고착 > 같은 부대 안에서 함께 훈련받는 장면이 원형',s:'group, company, band, troop'},

{n:429,w:'migrate',m:'v. (한 곳에서 다른 곳으로) 옮기다, 이동하다 = journey, move, travel, trek',r:'라틴어 migrare (move, 이동하다) → 장소를 이동하다 → 이동하다·옮기다로 고착 > 철새들이 무리 지어 이동하는 장면이 원형',s:'move, travel, journey, relocate'},
{n:430,w:'orifice',m:'n. 구멍 = aperture, hole, opening',r:'라틴어 os (mouth, 입) + facere (make, 만들다) → 입처럼 만들어진 구멍 → 구멍으로 고착 > 파이프 끝의 둥근 구멍의 장면이 원형',s:'opening, hole, gap, passage'},
{n:431,w:'brittle',m:'a. ① 깨지기 쉬운, 부서지기 쉬운, 무른 = breakable, fragile, frail / ② (관계·정세 따위가) 불안정한, 취약한 = unstable, volatile, vulnerable',r:'고대 영어 breotan (break, 부수다) → 쉽게 부서지는 → 깨지기 쉬운·취약한으로 고착 > 살짝 건드리기만 해도 부서지는 유리의 장면이 원형',s:'delicate, fragile, crisp, frail'},

{n:433,w:'leisurely',m:'a. 느긋한, 여유 있는, 한가로운 = laid-back, relaxed, unhurried / ad. 느긋하게; 서두르지 않고, 천천히 = at leisure, comfortably, easily, well at ease',r:'고대 영어 laesu (opportunity, 기회) → 여유를 가진 → 느긋한·여유 있는으로 고착 > 급하지 않게 천천히 산책하는 장면이 원형',s:'relaxed, easy, unhurried, laid-back'},

{n:459,w:'beseech',m:'v. 간청하다, 애원하다, 탄원하다 = beg, entreat, implore, plead, solicit, supplicate',r:'고대 영어 besecan (seek from, 간청하다) → 간절히 구하다 → 간청하다·애원하다로 고착 > 무릎 꿇고 두 손을 모아 간절히 부탁하는 장면이 원형',s:'plead, implore, beg, entreat'},

{n:467,w:'triumph',m:'n. 승리; 대성공, 위업; 승리감, 승리[성공]의 기쁨 = achievement, feat / vi. 승리를 거두다, 이기다, 이겨내다[over] = overcome, prevail, succeed',r:'라틴어 triumphus (victory procession, 승리 행진) → 승리를 기념하는 행진 → 승리·대성공으로 고착 > 전투에서 이기고 의기양양하게 도시로 돌아오는 장면이 원형',s:'victory, success, achievement, conquest'},
{n:468,w:'oracle',m:'n. ① 신탁(神託); 신탁을 전하는 사람 / ② 신의 계시; 지성소(至聖所); (pl.) 성서 / ③ 예언자, 현인, 철인(哲人)',r:'라틴어 oraculum (divine announcement, 신의 말씀) → 신이 전하는 말씀 → 신탁·예언자로 고착 > 델포이 신전에서 신탁을 받는 장면이 원형',s:'prophecy, prediction, divine message'},
{n:469,w:'curb',m:'vt. 제한하다, (특히 좋지 못한 것을) 억제하다 = inhibit, restrain, restrict / n. ① (말의) 재갈, 고삐 = rein / ② 구속, 제한, 억제 = check',r:'고대 프랑스어 courber (bend, 구부리다) → 구부려 제한하다 → 제한하다·재갈로 고착 > 고삐를 당겨 말의 속도를 늦추는 장면이 원형',s:'restrict, limit, confine, bound'},
{n:470,w:'streak',m:'n. ① 줄, 선 = line, strand, string, strip, thread / ② (스포츠·도박에서 성공·실패의) 일련, 연속 = chain, parade, series / ③ 경향, 기미',r:'고대 영어 strica (stroke, 줄) → 길게 그어진 선 → 줄·연속으로 고착 > 하늘에 유성이 긴 선을 그리는 장면이 원형',s:'series, run, succession, sequence'},
{n:471,w:'mural',m:'n. 벽화 = fresco, wall painting / a. 벽의, 벽 같은; 벽면의, 벽 위의',r:'라틴어 murus (wall, 벽) + -al → 벽의 → 벽화로 고착 > 큰 건물 벽면에 그려진 대형 그림의 장면이 원형',s:'fresco, painting, wall art, mosaic'},
{n:472,w:'anxiety',m:'n. ① 걱정, 불안, 염려 = apprehension, concern, disquiet, misgivings / ② 열망 = aspiration, craving, eagerness, longing, yen',r:'라틴어 anxietas (anguish, 고뇌) → 가슴을 죄는 불안 → 걱정·불안으로 고착 > 결과를 기다리며 가슴이 조이는 장면이 원형',s:'worry, concern, unease, nervousness'},
{n:473,w:'congruous',m:'a. 일치하는, 조화하는, 어울리는, 적합한[with, to] = consistent, harmonious',r:'라틴어 congruere (come together, 모이다) → 함께 딱 맞게 모이다 → 일치하는·적합한으로 고착 > 퍼즐 조각이 빈틈없이 맞아 들어가는 장면이 원형',s:'consistent, compatible, corresponding, fitting'},
{n:474,w:'instrument',m:'n. ① 기계, 기구, 도구 = apparatus, appliance, device, implement, tool / ② 악기 / ③ 수단, 방편, 매개체 = means, medium, vehicle',r:'라틴어 instruere (equip, 갖추다) → 갖춰주는 도구 → 기구·악기·수단으로 고착 > 의사가 진찰에 사용하는 정밀 기구의 장면이 원형',s:'tool, device, equipment, apparatus'},
{n:475,w:'vex',m:'vt. 초조하게 하다, 성가시게 굴다, 성나게 하다, 괴롭하다, 난처하게[귀찮게] 하다 = annoy, bother, irritate, provoke',r:'라틴어 vexare (shake, 흔들다) → 흔들어 성가시게 하다 → 짜증나게 하다·괴롭히다로 고착 > 끊임없이 거슬리게 하는 장면이 원형',s:'annoy, irritate, trouble, bother'},
{n:476,w:'formal',m:'a. ① 정식의, 공식의; 의례상의 = ceremonial, conventional / ② 형식적인, 표면적인 / ③ (태도·문체 등이) 형식에 치우친, 딱딱한, 격식적인 = serious, solemn, stiff',r:'라틴어 forma (form, 형태) + -al → 형태를 갖춘 → 정식의·형식적인으로 고착 > 정해진 격식을 갖춰 진행하는 행사의 장면이 원형',s:'official, ceremonial, conventional, proper'},
{n:477,w:'effigy',m:'n. 상(像), 조상(彫像), (어떤 사람의 모습을 일부러 추하게 만든) 인형 = dummy, figure, statue',r:'라틴어 effigies (image, 모습) → 만들어진 모습 → 상·인형으로 고착 > 싫어하는 인물의 모형을 불태우는 장면이 원형',s:'statue, likeness, effigy, dummy'},
{n:478,w:'precise',m:'a. 정확한, 정밀한, 명확한 = accurate, exact',r:'라틴어 praecidere (cut off, 잘라내다) → 불필요한 것을 잘라내 정확한 → 정확한·명확한으로 고착 > 정밀 기계로 오차 없이 측정하는 장면이 원형',s:'exact, accurate, meticulous, careful'},
{n:479,w:'rhapsodize',m:'v. 열광적으로 이야기하다[쓰다] = gush, rave',r:'그리스어 rhapsodos (epic poet, 서사시인) + -ize → 서사시인처럼 열정적으로 읊다 → 열광적으로 이야기하다로 고착 > 흥분해서 감격스럽게 말하는 장면이 원형',s:'gush, enthuse, praise, exclaim'},
{n:480,w:'agreeable',m:'a. ① 기분 좋은, 유쾌한, 상냥한 = amiable, friendly, pleasant, pleasing / ② 선뜻 동의[승낙]하는[to] = consenting / ③ 받아들일 수 있는, 알맞은 = appropriate, proper',r:'고대 프랑스어 agreable (pleasing, 기쁜) → 기쁘게 하는 → 기분 좋은·선뜻 동의하는으로 고착 > 상냥한 미소로 분위기를 밝게 하는 장면이 원형',s:'pleasant, pleasing, agreeable, congenial'},
{n:481,w:'henchman',m:'n. 충실한[믿을 수 있는] 부하, 심복; (정치가·갱단의) 추종자, 똘마니 = attendant, minion, subordinate',r:'고대 영어 hengest (horse, 말) + man → 말을 관리하는 사람 → 심복·추종자로 고착 > 우두머리 곁에서 항상 시중드는 부하의 장면이 원형',s:'follower, supporter, associate, aide'},
{n:482,w:'unprecedented',m:'a. 전례 없는, 미증유의 = exceptional, unexampled',r:'un (not) + precedented (전례 있는) → 이전에 없었던 → 전례 없는으로 고착 > 역사상 처음 일어나는 사건의 장면이 원형',s:'unheard-of, unparalleled, novel, extraordinary'},
{n:483,w:'discomfit',m:'vt. ① 쩔쩔매게 하다, 당황하게 하다 = confuse, disconcert, embarrass, upset / ② (계획 등을) 뒤집어엎다, 좌절시키다 = disappoint, frustrate, scupper, thwart',r:'라틴어 dis (apart) + conficere (prepare, 준비하다) → 준비를 흩뜨리다 → 당황하게 하다·좌절시키다로 고착 > 완벽한 계획이 갑자기 무너지는 장면이 원형',s:'confuse, embarrass, perplex, bewilder'},
{n:484,w:'performance',m:'n. ① 실행, 수행, 이행, 성취 = completion, execution, fulfillment / ② 성적, 성과; 공적 = accomplishment, achievement / ③ 상연, 연극, 연기, 공연 = acting, presentation, show',r:'라틴어 performare (carry through, 완수하다) → 완수하는 것 → 실행·공연으로 고착 > 무대 위에서 완벽하게 공연하는 장면이 원형',s:'do, execute, carry out, accomplish'},
{n:485,w:'slip',m:'v. ① 미끄러지다, 미끄러져 넘어지다, 발을 헛디디다 = fall, slide, trip / ② 무심코 입 밖에 내다; 얼결에 틀리다[실수하다][in] / ③ (기억·기력 등이) 없어지다, 쇠퇴하다 = decline, deteriorate, fall / n. 과실, 잘못 = error, mistake',r:'고대 영어 slipan (glide, 미끄러지다) → 미끄러지다 → 미끄러지다·실수로 고착 > 빙판에서 발이 미끄러지는 장면이 원형',s:'fall, stumble, trip, blunder'},
{n:486,w:'immaculate',m:'a. ① 티 하나 없이 깔끔한[깨끗한]; 청순한, 순결한 = neat, clean / ② 오류가 전혀 없는 = faultless, flawless, impeccable',r:'라틴어 im (not) + maculare (stain, 더럽히다) → 더럽히지 않은 → 티 없이 깨끗한으로 고착 > 먼지 하나 없이 완벽하게 깨끗한 장면이 원형',s:'spotless, flawless, pure, unblemished'},
{n:487,w:'litter',m:'n. ① 찌꺼기, 쓰레기 = junk, refuse, rubbish, trash, waste / ② 잡동사니, 어질러져 있는 것; 난잡, 혼란 = jumble, mess / v. 흩뜨리다, 어지르다, 어수선하게 하다 = clutter, mess up',r:'고대 프랑스어 litiere (bed, 침대) → 짐승의 깔개에서 잡동사니로 → 쓰레기·어지르다로 고착 > 바닥에 쓰레기가 어질러진 장면이 원형',s:'debris, rubbish, trash, mess'},
{n:488,w:'generalize',m:'v. ① 일반화하다; (일반에게) 보급시키다 = normalize, popularize / ② (사실 등을) 개괄[총괄]하다; 귀납하다, 일반 법칙화하다',r:'라틴어 generalis (general, 일반의) + -ize → 일반적으로 만들다 → 일반화하다·개괄하다로 고착 > 여러 사례에서 공통 법칙을 끌어내는 장면이 원형',s:'popularize, spread, universalize, extend'},
{n:489,w:'turmoil',m:'n. 소란, 소동, 혼란 = disturbance, fuss, tumult, turbulence, uproar',r:'16세기 영어 turmoil (confusion, 혼란) → 격렬한 혼란 → 소란·혼란으로 고착 > 전쟁터처럼 사방이 혼란스러운 장면이 원형',s:'chaos, disorder, disturbance, commotion'},
{n:490,w:'range',m:'v. ① (범위가 ~에) 이르다, 미치다, 걸치다, 퍼지다 = extend, reach / ② (어떤 범위 안에서) 변동하다, 변화하다; (온도계 등이) 오르내리다 = change, vary / n. ① 산맥 / ② 방목 구역; 목장 = pasture, ranch / ③ (동식물의) 분포 구역; (세력·지식 등이 미치는) 범위, 한계 = bounds, extent',r:'고대 프랑스어 rengier (arrange, 배열하다) → 배열되어 뻗어나가다 → 범위·산맥·변동하다로 고착 > 넓게 펼쳐진 산맥의 장면이 원형',s:'extend, cover, vary, reach'},
{n:491,w:'covetous',m:'a. 탐내는, 갈망[열망]하는 = avaricious, greedy',r:'라틴어 cupiditas (desire, 욕망) → 가진 것을 탐내는 → 탐내는·갈망하는으로 고착 > 남의 것을 바라보며 갖고 싶어하는 장면이 원형',s:'greedy, covetous, avaricious, envious'},
{n:492,w:'zeitgeist',m:'n. 시대정신[사조] = spirit of the times',r:'독일어 Zeit (time, 시간) + Geist (spirit, 정신) → 시대의 정신 → 시대정신으로 고착 > 어느 시대를 지배하는 공통된 사상과 분위기의 장면이 원형',s:'spirit of the age, prevailing mood'},
{n:493,w:'worship',m:'n. 숭배, 예배, 존경, 흠모 = praise, reverence / v. 숭배하다, 예배하다; 존경하다 = adore, glorify, revere',r:'고대 영어 weorthscipe (worthiness, 가치 있음) → 가치를 최고로 여기며 섬기다 → 숭배·예배하다로 고착 > 제단 앞에 무릎 꿇고 신을 섬기는 장면이 원형',s:'adore, revere, venerate, idolize'},
{n:494,w:'denizen',m:'n. (특정 지역에서 사는) 사람[생물], 거주민 = dweller, inhabitant, occupant',r:'라틴어 deintus (from within, 안에서) → 안에서 사는 사람 → 거주민으로 고착 > 특정 지역에서 오래 살아온 장면이 원형',s:'resident, occupant, inhabitant, dweller'},
{n:495,w:'panic',m:'n. ① (원인이 불명치 않은) 돌연한 공포; 겁먹음; 당황, 낭패 = alarm, fear, horror / ② 〈경제〉 공황 / v. 공포심을 느끼게 하다, 당황하게 하다',r:'그리스어 Pan (목동의 신) → 파신이 일으키는 갑작스러운 공포 → 돌연한 공포·당황으로 고착 > 이유도 모르고 갑자기 공포에 사로잡히는 장면이 원형',s:'terror, fear, alarm, hysteria'},
{n:496,w:'ancillary',m:'a. 보조적인, 부수적인, 종속적인 = accessory, auxiliary, subordinate, subsidiary',r:'라틴어 ancilla (maidservant, 하녀) → 주된 것을 돕는 → 보조적인·종속적인으로 고착 > 주요 기능을 뒤에서 받쳐주는 장면이 원형',s:'subsidiary, auxiliary, supplementary, secondary'},
{n:497,w:'entertain',m:'v. ① 대접[환대]하다; (특히) 식사에 초대하다 = receive, treat / ② 즐겁게 하다, 위로하다[with] = amuse, beguile, delight, please, regale / ③ 마음에 품다, 생각하다 = cherish, harbor, hold',r:'라틴어 inter (between) + tenere (hold, 잡다) → 사이에서 잡아 즐겁게 하다 → 대접하다·즐겁게 하다로 고착 > 손님을 음식과 이야기로 대접하는 장면이 원형',s:'host, amuse, treat, welcome'},
{n:498,w:'mirth',m:'n. 명랑, 즐거움, 환희, 웃음소리 = merriment, pleasure',r:'고대 영어 myrgth (pleasure, 즐거움) → 즐거움에서 터지는 웃음 → 명랑·즐거움으로 고착 > 모두가 배를 잡고 웃는 장면이 원형',s:'cheerful, jolly, festive, lively'},
{n:499,w:'document',m:'n. 문서, 서류, 기록, 증거자료 = archives, record, report / vt. ① 증거를 제공하다; 서류로 입증하다 = certify, support, verify / ② (상세히) 보도[기록]하다',r:'라틴어 documentum (lesson, 교훈) → 교훈이 담긴 기록 → 문서·기록·증거로 고착 > 중요한 계약 내용이 담긴 서류의 장면이 원형',s:'record, evidence, proof, file'},
{n:500,w:'brusque',m:'a. (말이나 태도가) 무뚝뚝한, 퉁명스러운 = abrupt, blunt, curt, surly',r:'이탈리아어 brusco (rough, 거친) → 거칠고 무뚝뚝한 → 무뚝뚝한·퉁명스러운으로 고착 > 질문에 퉁명스럽게 짧게 대답하는 장면이 원형',s:'abrupt, curt, blunt, rude'},
{n:501,w:'virtual',m:'a. ① 사실상의, 실질상의, 거의 ~과 다를없는 = effective, practical / ② (컴퓨터를 이용한) 가상의',r:'라틴어 virtus (strength, 힘) + -al → 힘은 있지만 형태가 없는 → 사실상의·가상의로 고착 > 실제와 구별할 수 없는 컴퓨터 가상 공간의 장면이 원형',s:'effective, practical, near, almost'},
{n:502,w:'astrology',m:'n. 점성학, 점성술',r:'그리스어 astron (star, 별) + log (study) → 별을 연구하는 학문 → 점성학으로 고착 > 별자리를 보며 미래를 예언하는 장면이 원형',s:'horoscope, star chart, zodiac reading'},
{n:503,w:'distend',m:'v. 부풀다, 팽창하다[시키다] = dilate, expand, inflate, swell',r:'라틴어 dis (apart) + tendere (stretch, 뻗다) → 사방으로 뻗어 팽창하다 → 부풀다·팽창하다로 고착 > 공기가 들어가 풍선이 부풀어 오르는 장면이 원형',s:'swell, bloat, expand, puff up'},
{n:504,w:'staunch',m:'a. (사람·주장 따위가) 신조에 철두철미한, 완고한, 충실한 = firm, steadfast, stout',r:'고대 프랑스어 estanche (watertight, 방수의) → 흔들리지 않는 → 신조에 철두철미한·충실한으로 고착 > 어떤 압력에도 흔들리지 않는 장면이 원형',s:'firm, resolute, steadfast, unwavering'},
{n:505,w:'poverty',m:'n. 가난, 빈곤; 결핍, 부족 = destitution, indigence, penury; lack',r:'라틴어 pauper (poor, 가난한) → 가진 것이 없는 상태 → 가난·결핍으로 고착 > 기본 생필품도 없는 극빈한 장면이 원형',s:'poverty, lack, scarcity, need'},
{n:506,w:'infinitesimal',m:'a. 극미한, 극소의, 무한소(無限小)의 = microscopic, minute',r:'라틴어 infinitus (infinite, 무한한) → 무한히 작은 → 극미한·무한소의로 고착 > 현미경으로도 보기 어려울 만큼 작은 장면이 원형',s:'tiny, minute, negligible, fractional'},
{n:507,w:'expire',m:'v. ① 끝나다, 만료되다, 만기가 되다 = cease, finish, lapse, terminate / ② 숨을 거두다, 죽다 = decease, die, pass away, perish',r:'라틴어 ex (out) + spirare (breathe, 숨쉬다) → 마지막 숨을 내쉬다 → 끝나다·죽다로 고착 > 유효기간 날짜가 지나 사용 불가가 된 장면이 원형',s:'end, finish, conclude, terminate'},
{n:508,w:'suffrage',m:'n. ① 투표권, 선거권, 참정권 = voting right / ② (투표에 의한) 찬성, 찬성(표); 동의',r:'라틴어 suffragium (vote, 투표) → 투표로 지지를 표현하는 것 → 투표권·선거권으로 고착 > 투표함에 한 표를 넣는 장면이 원형',s:'voting rights, right to vote, enfranchisement'},
{n:509,w:'gorge',m:'v. 게걸스럽게[배불리] 먹다 = devour, fill oneself with, gobble / n. 골짜기, 협곡 = canyon, ravine, valley',r:'라틴어 gurges (whirlpool, 소용돌이) → 소용돌이처럼 빨아들이듯 먹다 → 게걸스럽게 먹다·협곡으로 고착 > 음식을 허겁지겁 들이붓는 장면이 원형',s:'eat greedily, devour, wolf, gorge'},
{n:510,w:'cannibal',m:'n. ① 인육을 먹는 사람, 식인종 = man-eater, people-eater / ② 동족을 잡아먹는 동물 / a. ① 식인의, 인육을 먹는, 식인 관습을 가진 = anthropophagous, man-eating / ② (동물이) 동족을 잡아먹는',r:'스페인어 canibal (인육을 먹는 카리브 원주민) → 인육을 먹는 → 식인종으로 고착 > 동족의 살을 먹는 장면이 원형',s:'savage, barbarian, primitive, wild'},
{n:511,w:'proceed',m:'vi. ① (앞으로) 나아가다, 전진하다 = advance, carry on, go on / ② (일이) 진행되다, 속행되다; 계속해야 하다, 계속하다 = continue, progress',r:'라틴어 pro (forward) + cedere (go, 가다) → 앞으로 나아가다 → 나아가다·계속하다로 고착 > 장애물을 지나 앞으로 계속 나아가는 장면이 원형',s:'advance, continue, go forward, progress'},
{n:512,w:'disciple',m:'n. 제자, 문하생, 신봉자 = adherent, apostle, follower, pupil',r:'라틴어 discipulus (pupil, 학생) → 가르침을 받아 따르는 사람 → 제자·신봉자로 고착 > 스승의 가르침을 따르며 배우는 장면이 원형',s:'follower, student, devotee, adherent'},
{n:513,w:'brilliant',m:'a. ① 찬란하게 빛나는, 번쩍번쩍 빛나는 = bright, luminous, radiant / ② 재기가 넘치는, 두뇌가 날카로운 = clever, intelligent / ③ 훌륭한, 멋진, 아주 성공적인 = excellent, outstanding',r:'라틴어 beryllus (beryl, 베릴) → 보석처럼 빛나는 → 빛나는·두뇌가 날카로운으로 고착 > 다이아몬드가 빛을 받아 사방으로 반짝이는 장면이 원형',s:'dazzling, gifted, talented, exceptional'},
{n:514,w:'ovation',m:'n. 열렬한 환영, 대단한 갈채, 대인기 = applause',r:'라틴어 ovatio (minor triumph, 소규모 개선식) → 박수로 승리를 축하하다 → 열렬한 환영·갈채로 고착 > 관중이 일어서서 박수를 치는 장면이 원형',s:'applause, cheers, acclaim, praise'},
{n:515,w:'ameliorate',m:'v. 개선하다, 개량하다; 좋아지다, 호전되다 = improve, mend',r:'라틴어 melior (better, 더 좋은) → 더 좋게 만들다 → 개선하다·좋아지다로 고착 > 나쁜 상황이 점점 나아지는 장면이 원형',s:'improve, better, upgrade, enhance'},
{n:516,w:'erroneous',m:'a. 잘못된, 틀린 = false, incorrect, spurious, unsound',r:'라틴어 errare (wander, 방황하다) → 올바른 길에서 벗어난 → 잘못된·틀린으로 고착 > 사실과 다른 틀린 정보의 장면이 원형',s:'incorrect, wrong, mistaken, false'},
{n:517,w:'cherish',m:'vt. ① 소중히 여기다 = hold dear, prize, treasure, value / ② (희망·계획·념 등을) 마음에 품다',r:'고대 프랑스어 cherir (hold dear, 소중히 하다) → 소중히 안아두다 → 소중히 여기다·마음에 품다로 고착 > 귀한 것을 가슴에 꼭 안는 장면이 원형',s:'treasure, cherish, value, prize'},
{n:518,w:'antinomy',m:'n. 모순; 자기모순, 자기당착; 〈철학〉 이율배반 = contradiction, paradox',r:'그리스어 anti (against) + nomos (law, 법) → 법끼리 서로 충돌하는 → 모순·이율배반으로 고착 > 두 원리가 동시에 맞으면서 서로 충돌하는 장면이 원형',s:'contradiction, paradox, inconsistency'},
{n:519,w:'reinforce',m:'vt. ① (감정·생각 등을) 강화하다 = strengthen / ② (구조 등을) 보강하다 = fortify / ③ (군대·구성원·장비 등을) 증강[증원]하다',r:'re (again) + in + force (힘) → 다시 힘을 더하다 → 강화하다·보강하다로 고착 > 약한 구조물에 추가 지지대를 덧붙이는 장면이 원형',s:'strengthen, bolster, support, augment'},
{n:520,w:'influx',m:'n. 유입, 쇄도 = inflow, rush',r:'라틴어 in (in) + fluere (flow, 흐르다) → 안으로 흘러들다 → 유입·쇄도로 고착 > 도시로 많은 사람들이 몰려드는 장면이 원형',s:'inflow, arrival, influx, stream'},
{n:521,w:'priceless',m:'a. 값을 매길 수 없는, 대단히 귀중한 = invaluable, precious, valuable',r:'price (가격) + -less (없는) → 가격을 매길 수 없는 → 대단히 귀중한으로 고착 > 어떤 돈으로도 살 수 없는 가치의 장면이 원형',s:'invaluable, beyond price, treasured'},
{n:522,w:'muffle',m:'vt. ① 싸다, 덮다 = cover, wrap up / ② (소리를) 죽이다 = damp, mute',r:'고대 프랑스어 moufle (thick glove, 두꺼운 장갑) → 두껍게 감싸 소리를 죽이다 → 싸다·소리를 죽이다로 고착 > 천으로 감싸 소리를 줄이는 장면이 원형',s:'silence, muffle, deaden, suppress'},
{n:523,w:'analogy',m:'n. ① 유사, 유사점, 비슷함 = likeness, resemblance, similarity / ② 유추 = conjecture, inference',r:'그리스어 analogia (proportion, 비율) → 비율이 같은 관계 → 유사·유추로 고착 > 두 다른 것이 같은 관계 구조를 가진 장면이 원형',s:'comparison, similarity, parallel, inference'},
{n:524,w:'trustworthy',m:'a. (사람·정보 등이) 신뢰[신용]할 수 있는, 기대[의지]할 수 있는 = dependable, reliable',r:'trust (신뢰) + worthy (가치 있는) → 신뢰할 가치 있는 → 신뢰할 수 있는으로 고착 > 어떤 비밀도 안심하고 맡길 수 있는 장면이 원형',s:'reliable, dependable, honest, faithful'},
{n:525,w:'hoax',m:'vt. 감쪽같이 속이다, 골탕 먹이다 = bamboozle, dupe, fool, trick / n. 사람을 속이기, 장못된 장난; 날조 = joke, prank',r:'18세기 영어 hoax (trick, 속임수) → 감쪽같이 속이는 장난 → 속이다·날조로 고착 > 완전히 속아 진짜라고 믿는 장면이 원형',s:'trick, deceive, fool, bluff'},
{n:526,w:'docile',m:'a. 다루기 쉬운, 유순한 = compliant, meek, obedient, submissive',r:'라틴어 docilis (teachable, 가르치기 쉬운) → 쉽게 가르칠 수 있는 → 유순한·다루기 쉬운으로 고착 > 주인 말을 잘 따르는 순한 개의 장면이 원형',s:'obedient, manageable, compliant, submissive'},
{n:527,w:'plaintiff',m:'n. 〈법률〉 원고(原告), 고소인',r:'고대 프랑스어 plaintif (lamenting, 탄원하는) → 법정에서 탄원하는 사람 → 원고·고소인으로 고착 > 피해를 주장하며 법원에 소장을 제출하는 장면이 원형',s:'claimant, litigant, suer, accuser'},
{n:528,w:'inhabit',m:'vt. ~에 살다, 거주하다, 서식하다 = dwell in, live in',r:'라틴어 in (in) + habitare (dwell, 살다) → 안에 살다 → ~에 살다·서식하다로 고착 > 생물이 환경에 적응해 사는 장면이 원형',s:'reside, occupy, live, dwell'},
{n:529,w:'marsh',m:'n. 습지, 늪지대 = bog, quagmire, swamp',r:'고대 영어 mersc (marsh, 습지) → 물이 고여 있는 습한 땅 → 습지·늪지대로 고착 > 발이 빠지는 질퍽한 습지의 장면이 원형',s:'wetland, swamp, bog, fen'},
{n:530,w:'frank',m:'a. 솔직한, 숨김없는, 노골적인 = candid, forthright, honest, outspoken',r:'라틴족 Frank (자유로운 사람들) → 솔직하고 자유로운 → 솔직한·숨김없는으로 고착 > 꾸밈없이 있는 그대로 말하는 장면이 원형',s:'open, candid, sincere, direct'},
{n:531,w:'junk',m:'n. ① 쓰레기, 잡동사니, 폐품(廢物) = litter, refuse, rubbish, trash / ② 마약, 헤로인 = dope, drug, narcotic',r:'중세 영어 jonk (old rope, 낡은 밧줄) → 쓸모없어진 낡은 것 → 쓰레기·잡동사니로 고착 > 고물상에 쌓인 각종 폐품의 장면이 원형',s:'rubbish, garbage, waste, scrap'},
{n:532,w:'lease',m:'n. (토지·건물 등의) 차용계약, 차용증서; 임대차 (계약); 임차권 = hire, rental / vt. 빌리다, 임대[임차]하다 = charter, hire, let, loan, rent',r:'고대 프랑스어 laissier (let go, 놓아주다) → 일정 기간 사용하도록 놓아주다 → 임대차 계약·빌리다로 고착 > 계약서에 서명하고 아파트를 빌리는 장면이 원형',s:'loan, rent, credit, borrowing'},
{n:533,w:'state-of-the-art',m:'a. 최첨단의, 최신식의 = latest, modern, up-to-date',r:'state (상태) + of + the + art (기술) → 기술의 현재 최상 상태 → 최첨단의·최신식의로 고착 > 가장 최신 기술로 만들어진 제품의 장면이 원형',s:'latest, newest, most advanced, cutting-edge'},
{n:534,w:'turnpike',m:'n. (유료) 고속도로; 통행료 징수소 = pike',r:'turn (회전) + pike (창) → 가로막는 창을 돌려 통과하는 → 유료 고속도로로 고착 > 요금소를 지나야 이용할 수 있는 도로의 장면이 원형',s:'highway, expressway, motorway, freeway'},
{n:535,w:'scramble',m:'v. ① 기어오르다 = clamber, climb / ② 다투다, 서로 빼앗다, 얻으려고 다투다 = strive, vie / ③ 허둥대다 = rush / ④ (내습한 적기의 요격을 위해) 긴급 발진하다',r:'중세 영어 scram (scratch, 긁다) → 긁으며 기어오르다 → 기어오르다·다투다로 고착 > 바위를 손발로 짚으며 기어오르는 장면이 원형',s:'clamber, claw, jostle, compete'},
{n:536,w:'cordial',m:'a. 진심에서 우러난, 따뜻한 = affectionate, hearty, sincere',r:'라틴어 cor (heart, 마음) + -ial → 마음에서 우러난 → 진심에서 우러난·따뜻한으로 고착 > 진심으로 따뜻하게 맞이하는 장면이 원형',s:'warm, sincere, friendly, hearty'},
{n:537,w:'wont',m:'a. ~하는 데 익숙한, ~하는 버릇[습관]이 있는[to do] = accustomed, inclined / n. 습관, 버릇; 풍습, 관습 = custom, habit, habitus, practice',r:'고대 영어 gewunian (be accustomed, 익숙하다) → 익숙해진 습관 → 습관이 있는·관습으로 고착 > 매일 같은 시간에 반복하는 습관의 장면이 원형',s:'habitual, usual, accustomed, practiced'},
{n:538,w:'barometer',m:'n. ① 〈기상〉 기압계 / ② (여론·시세 등의 동향을 나타내는) 지표, 척도, 바로미터 = criterion, index, measure, standard',r:'그리스어 baros (weight, 무게) + meter (측정) → 대기 무게를 측정하는 것 → 기압계·지표로 고착 > 대기압을 측정해 날씨를 예측하는 장면이 원형',s:'pressure gauge, weather instrument'},
{n:539,w:'phonetic',m:'a. ① 음성의, 음성[발음]을 표시하는 / ② 음성학의',r:'그리스어 phone (sound, 소리) + -tic → 소리의 → 음성의·발음을 표시하는으로 고착 > 발음 기호로 소리를 표시하는 장면이 원형',s:'sound-related, pronunciation, vocal'},
{n:540,w:'frighten',m:'v. ① 두려워하게 하다, 흠칫 놀라게 하다 = intimidate, scare, shock / ② 위협하여 ~시키다 = intimidate, threaten',r:'고대 영어 fyrhtan (terrify, 겁주다) → 공포를 주다 → 두려워하게 하다로 고착 > 갑작스러운 소리에 놀라 뒤로 물러서는 장면이 원형',s:'scare, terrify, alarm, horrify'},
{n:541,w:'catalyst',m:'n. ① 촉매 = accelerant, catalyzer / ② (변화의) 기폭제 = impetus, stimulant',r:'그리스어 katalysis (dissolution, 분해) → 반응을 촉진하는 물질 → 촉매·기폭제로 고착 > 화학 반응을 빠르게 일어나게 하는 물질의 장면이 원형',s:'accelerator, activator, promoter'},
{n:542,w:'sway',m:'v. ① 흔들리다; 흔들다 = shake, waver / ② (편단·의견 등이) 동요하다; (사람·의견 따위를) 움직이다, 좌우하다 = oscillate / n. ① (전후·좌우로) 흔들림, 진동 = oscillation, quake, roll, tremor, vibration / ② 장악, 지배, 통치 = control, domination, governance, reign, rule / ③ 영향력 = clout, heft, influence, leverage',r:'고대 노르드어 sveigja (bend, 구부리다) → 흔들려 기울다 → 흔들리다·지배하다로 고착 > 바람에 나무가 좌우로 흔들리는 장면이 원형',s:'influence, affect, swing, persuade'},
{n:543,w:'restive',m:'a. ① 침착성이 없는, 들뜬 = edgy, impatient, restless / ② 다루기 힘든, 고집 센, 반항적인 = obstinate, recalcitrant',r:'라틴어 restare (remain, 머물다) → 앞으로 나가지 않고 머물며 버티는 → 들뜬·다루기 힘든으로 고착 > 말이 앞으로 가지 않고 버티는 장면이 원형',s:'unruly, obstinate, stubborn, disobedient'},
{n:544,w:'enchant',m:'vt. 매혹하다; 마술[마법]을 걸다 = bewitch, captivate, charm, fascinate, mesmerize',r:'라틴어 in (into) + cantare (sing, 노래하다) → 노래로 마법을 걸다 → 매혹하다·마법을 걸다로 고착 > 아름다운 노래로 모두를 홀리는 장면이 원형',s:'charm, bewitch, fascinate, captivate'},
{n:545,w:'acrimonious',m:'a. (말투가) 신랄한, 풍언이 오가는 = bitter, caustic, scathing, trenchant, vitriolic',r:'라틴어 acer (sharp, 날카로운) + -monious → 날카롭고 신랄한 → 신랄한으로 고착 > 날카로운 말이 오가는 격렬한 논쟁의 장면이 원형',s:'bitter, caustic, sharp, harsh'},
{n:546,w:'decay',m:'v. ① 썩다, 부패[부식]하다 = decompose, rot, spoil / ② 쇠하다, 감쇠[쇠퇴]하다, 쇠퇴하다 = decline, degenerate, deteriorate, wane / n. ① 부패, 부식 = corrosion, decomposition / ② 감쇠, 쇠약, 쇠퇴, 노화 = degeneration, deterioration',r:'라틴어 de (down) + cadere (fall, 떨어지다) → 아래로 무너져 썩다 → 썩다·쇠퇴하다로 고착 > 버려진 건물이 서서히 무너지는 장면이 원형',s:'rot, deteriorate, degenerate, corrupt'},
{n:547,w:'valetudinarian',m:'a. ① 병약한, 허약한 = feeble, infirm, invalid, sickly, weakly / ② 건강[병]에 지나치게 신경 쓰는 = hypochondriac / n. ① 병약자 = invalid / ② 건강[병]에 지나치게 신경 쓰는 사람 = hypochondriac',r:'라틴어 valetudo (health, 건강) → 건강에 지나치게 신경 쓰는 사람 → 병약한·건강에 지나치게 신경 쓰는으로 고착 > 사소한 증상에도 병원을 찾는 장면이 원형',s:'sickly, frail, weak, infirm'},
{n:548,w:'override',m:'vt. ① (결정 등을) 기각하다, 무효로 하다, 뒤엎다 = annul, invalidate, nullify / ② ~보다 더 중요하다[우선시하다] = outbalance, outweigh, precede / ③ (반대·고집 따위를) 무시하다 = disdain, disregard, ignore, neglect, snub',r:'over (위에서) + ride (타다) → 위에 타서 무효로 하다 → 기각하다·더 중요하다로 고착 > 상위 결정이 하위 결정을 뒤엎는 장면이 원형',s:'overrule, reverse, overturn, veto'},

{n:550,w:'coincide',m:'vi. ① 동시에 같은 공간을 차지하다; 동시에 일어나다[with] = coexist; synchronize / ② (의견·생각 등이) 일치하다, 맞다[with, in] = accord, concur, correspond',r:'라틴어 co (together) + incidere (fall on, 떨어지다) → 함께 같은 곳에 떨어지다 → 동시에 일어나다·일치하다로 고착 > 두 시계가 정확히 같은 시간을 가리키는 장면이 원형',s:'correspond, match, overlap, agree'},
{n:551,w:'revere',m:'vt. (경건한 마음으로) 숭배하다, 존경하다 = admire, esteem, idolize, worship',r:'라틴어 revereri (regard with awe, 경외하다) → 경외하며 존경하다 → 숭배하다·존경하다로 고착 > 오래된 성현의 가르침을 경건히 따르는 장면이 원형',s:'respect, adore, venerate, revere'},
{n:552,w:'clandestine',m:'a. 비밀의, 은밀한 = covert, furtive, surreptitious, underhand',r:'라틴어 clam (secretly, 비밀리에) → 비밀리에 하는 → 비밀의·은밀한으로 고착 > 아무도 모르게 몰래 만나는 장면이 원형',s:'secret, undercover, hidden, covert'},
{n:553,w:'signature',m:'n. 서명, 사인, 서명하기 = autograph / a. 전형적인, 대표적인; 우수한',r:'라틴어 signare (mark, 표시하다) → 자신만의 표시 → 서명·대표적인으로 고착 > 계약서에 자신만의 서명을 남기는 장면이 원형',s:'autograph, monogram, name, inscription'},

{n:555,w:'arena',m:'n. ① 원형 투기장; 시합장, 경기장 = amphitheater; field, pavilion, stadium / ② 활동 무대, (경쟁) 마당, ~계(界)',r:'라틴어 arena (sand, 모래) → 모래가 깔린 로마 원형 경기장 → 경기장·활동 무대로 고착 > 검투사가 싸우는 원형 경기장의 장면이 원형',s:'stadium, ring, amphitheater, coliseum'},

{n:557,w:'dissident',m:'a. 의견을 달리하는; 반체제의 = dissenting, opposing / n. 의견을 달리하는 사람, 반체제 인사 = dissenter, rebel',r:'라틴어 dis (apart) + sedere (sit, 앉다) → 따로 앉아 의견을 달리하는 → 의견을 달리하는·반체제로 고착 > 다수 의견에 반대 손을 드는 장면이 원형',s:'disagree, differ, object, protest'},

{n:561,w:'cubicle',m:'n. (큰 방 한 쪽을 칸막이 해 만든) 좁은 방; 작은 침실; 개인용 열람석',r:'라틴어 cubiculum (bedroom, 침실) → 작은 방 → 좁은 방·개인 공간으로 고착 > 사무실에서 칸막이로 나뉜 개인 공간의 장면이 원형',s:'compartment, booth, cell, space'},
{n:562,w:'appliance',m:'n. (특히 가정용) 기구, 장치, 설비 = device, gadget, instrument, machine, tool',r:'라틴어 applicare (apply, 적용하다) → 특정 용도에 적용되는 기구 → 기구·설비로 고착 > 부엌에서 사용하는 다양한 가전제품의 장면이 원형',s:'gadget, device, utensil, tool'},

{n:564,w:'delineate',m:'vt. 윤곽을 그리다; 상세하게 묘사[기술]하다 = portray; depict, describe',r:'라틴어 de (out) + lineare (draw lines, 선을 긋다) → 선으로 윤곽을 그리다 → 윤곽을 그리다·묘사하다로 고착 > 지도 위에 경계선을 그리는 장면이 원형',s:'describe, portray, depict, sketch'},
{n:565,w:'sufficient',m:'a. 충분한 = abundant, adequate, ample, enough',r:'라틴어 sufficere (be enough, 충분하다) → 충분히 있는 → 충분한으로 고착 > 접시에 딱 필요한 만큼 음식이 담긴 장면이 원형',s:'adequate, enough, ample, satisfactory'},
{n:566,w:'whistle-blower',m:'n. 내부 고발자, 폭로[밀고]하는 사람 = bigmouth, blabbermouth, tattletale',r:'whistle (호루라기) + blower (부는 사람) → 호루라기를 불어 알리는 사람 → 내부 고발자로 고착 > 조직의 비리를 외부에 알리는 장면이 원형',s:'informer, leaker, whistleblower, exposer'},

{n:569,w:'intricate',m:'a. 복잡한, 뒤얽힌, 난해한 = complex, complicated, tangled',r:'라틴어 intricare (entangle, 얽히게 하다) → 복잡하게 얽힌 → 복잡한·뒤얽힌으로 고착 > 실이 여러 겹으로 뒤엉킨 장면이 원형',s:'complicated, elaborate, detailed, complex'},
{n:570,w:'leeway',m:'n. (공간·시간·활동 등의) 여지, 여유, 자유, 재량 = latitude, margin, room',r:'lee (바람 등지는 쪽) + way (길) → 바람을 피할 여유 공간 → 여지·재량으로 고착 > 규정 안에서 자유롭게 선택할 수 있는 공간의 장면이 원형',s:'freedom, margin, room, latitude'},
{n:571,w:'vie',m:'vi. 경쟁하다, 겨루다, 다투다[in, with] = compete, contend',r:'라틴어 viare (travel, 여행하다) → 목표를 향해 경쟁하다 → 경쟁하다·겨루다로 고착 > 같은 목표를 향해 앞다퉈 달리는 장면이 원형',s:'compete, contend, rival, contest'},
{n:572,w:'staggering',m:'a. ① 비틀거리는, 휘청거리는 = faltering, tottering / ② (너무 엄청나서) 믿기 어려운, 경이적인, 어마어마한 = astonishing, stunning',r:'stagger (비틀거리다) + -ing → 비틀거릴 만큼 충격적인 → 믿기 어려운·어마어마한으로 고착 > 충격적인 숫자에 눈이 휘둥그레지는 장면이 원형',s:'shocking, overwhelming, astounding, staggering'},

{n:574,w:'conciliatory',m:'a. 달래는 듯한, 화유적인, 타협적인 = peacemaking, placatory, propitiatory',r:'라틴어 conciliare (bring together, 화해시키다) → 화해를 이끄는 → 달래는·타협적인으로 고착 > 적대하던 두 사람을 화해시키는 장면이 원형',s:'soothing, appeasing, mollifying, calming'},
{n:575,w:'fallout',m:'n. ① 방사성 낙진; 죽음의 재; (방사선 물질 등의) 강하 / ② 부산물, 부수적인 결과 = by-product, spin-off',r:'fall (떨어지다) + out (밖으로) → 밖으로 떨어져 나오는 것 → 방사성 낙진·부산물로 고착 > 핵폭발 후 방사성 물질이 비처럼 내리는 장면이 원형',s:'aftermath, result, repercussion, side effect'},
{n:576,w:'tepid',m:'a. ① (액체가) 미지근한 = lukewarm, warmish / ② (감정·반응 등이) 열의 없는 = half-hearted, indifferent, unenthusiastic',r:'라틴어 tepidus (warm, 미지근한) → 딱 중간 온도의 → 미지근한·열의 없는으로 고착 > 뜨겁지도 차갑지도 않은 물의 장면이 원형',s:'lukewarm, indifferent, apathetic, unenthusiastic'},

{n:578,w:'pro-life',m:'a. 낙태[닉태 합법화]에 반대하는 = anti-choice',r:'pro (지지하는) + life (생명) → 생명을 지지하는 → 낙태 반대의로 고착 > 생명 보호를 주장하는 시위의 장면이 원형',s:'anti-abortion, pro-birth, conservative'},
{n:579,w:'incidence',m:'n. (사건·영향 등의) 범위, 발생률, 발병률, 빈도 = frequency, occurrence, prevalence',r:'라틴어 incidere (fall upon, 발생하다) → 발생하는 빈도 → 발생률·빈도로 고착 > 통계 그래프에서 발병 빈도를 나타내는 장면이 원형',s:'rate, frequency, occurrence, prevalence'},
{n:580,w:'mobilize',m:'v. (군대·단체 등을) 동원하다[되다] = assemble, marshal, rally',r:'라틴어 mobilis (movable, 움직일 수 있는) + -ize → 움직일 수 있게 하다 → 동원하다로 고착 > 비상 상황에 군대를 소집하는 장면이 원형',s:'rally, assemble, deploy, gather'},
{n:581,w:'extraordinary',m:'a. ① 대단한, 보통이 아닌, 비범한, 엄청난 = remarkable, unusual / ② 터무니없는, 놀라운, 의외의; 이상한 = amazing, exceptional / ③ 특별의, 임시의',r:'extra (beyond, 넘어서) + ordinary (평범한) → 평범함을 넘어선 → 비범한·놀라운으로 고착 > 누구도 예상 못 한 놀라운 일이 일어나는 장면이 원형',s:'exceptional, remarkable, unusual, uncommon'},
{n:582,w:'detect',m:'vt. 발견하다, 간파하다, 탐지하다 = discover, notice, perceive, uncover',r:'라틴어 de (from) + tectus (covered, 덮인) → 덮인 것에서 드러내다 → 발견하다·탐지하다로 고착 > 탐정이 숨겨진 단서를 찾아내는 장면이 원형',s:'find, uncover, reveal, unearth'},

{n:584,w:'burgeon',m:'vi. ① 싹트다, 새싹이 나다, 움트다 = bud, sprout / ② 급성장하다, 급증하다 = mushroom, surge / n. 싹, 어린 가지 = shoot',r:'고대 프랑스어 bourgeonner (bud, 싹트다) → 싹이 트듯 빠르게 자라다 → 급성장하다·싹트다로 고착 > 씨앗이 터져 새싹이 나오는 장면이 원형',s:'sprout, flourish, grow rapidly, bloom'},

{n:717,w:'duplicate',m:'v. 사본을 만들다, 복사[복제]하다 / a. 이중의, 중복의; 사본의; (일반적으로 다른 것과) 똑같은 / n. 등본, 사본, 부본; 복사; 복제(물)',r:'라틴어 duplicare (double, 두 배로 하다) → 똑같이 두 배로 만들다 → 복사하다·중복의로 고착 > 원본과 동일한 복사본을 만드는 장면이 원형',s:'copy, reproduce, clone, replicate'},
{n:718,w:'rip-off',m:'n. 사취, 착취, 바가지(물품); (원래 것보다 못한) 모작(模作), 아류, 도작(盜作)',r:'rip (찢다) + off (제거) → 뜯어가는 것 → 사취·바가지로 고착 > 터무니없이 비싼 가격으로 뜯기는 장면이 원형',s:'cheat, swindle, exploitation, scam'},
{n:719,w:'harsh',m:'a. 거친, 껄껄한; 혼된, 모진, 가혹한; (장소·풍토 등이) 황량한, 쓸쓸한',r:'고대 노르드어 harskr (rough, 거친) → 거칠고 가혹한 → 가혹한·황량한으로 고착 > 사막처럼 척박하고 가혹한 환경의 장면이 원형',s:'rough, grating, stern, harsh'},

{n:732,w:'extravagant',m:'a. 낭비하는, 사치스러운; (요구·대가 등이) 터무니없는, 지나친; (생각·언설·행동이) 화려한, 과장된',r:'라틴어 extra (beyond) + vagari (wander, 방랑하다) → 범위를 벗어나 방랑하다 → 낭비하는·지나친으로 고착 > 필요 이상으로 화려하게 쓰는 장면이 원형',s:'wasteful, lavish, extravagant, excessive'},

{n:745,w:'balk',m:'v. 방해하다; 좌절시키다; 실망시키다; 주저하다, 멈칫거리다 / n. 장애, 방해, 방해물',r:'고대 영어 balca (ridge, 이랑) → 이랑처럼 방해하다 → 방해하다·주저하다로 고착 > 장애물 앞에서 갑자기 멈추는 장면이 원형',s:'frustrate, hinder, prevent, foil'},

{n:748,w:'picturesque',m:'a. 그림 같이 아름다운; (말·문체 등이) 생생한',r:'이탈리아어 pittoresco (like a painting, 그림 같은) → 그림처럼 아름다운 → 그림 같이 아름다운으로 고착 > 산과 호수가 어우러진 풍경화 같은 장면이 원형',s:'scenic, charming, attractive, lovely'},

{n:750,w:'lacerate',m:'vt. 찢다, 잡아 찢다, 찢어내다; (마음 등을) 상하게 하다, 괴롭히다',r:'라틴어 lacerare (tear, 찢다) → 날카롭게 찢다 → 찢다·마음을 괴롭히다로 고착 > 예리한 것에 살이 찢기는 장면이 원형',s:'cut, gash, tear, wound'},
{n:751,w:'orthodox',m:'a. 정통파의; 승인된; 전통적인',r:'그리스어 orthos (correct, 올바른) + doxa (opinion, 의견) → 올바른 의견 → 정통파의·전통적인으로 고착 > 오래된 가르침을 그대로 따르는 장면이 원형',s:'traditional, conventional, conservative, accepted'},
{n:752,w:'debase',m:'vt. (품질·가치·품위 등을) 떨어뜨리다, 저하시키다',r:'de (down) + base (기반) → 기반을 아래로 낮추다 → 품질을 떨어뜨리다·저하시키다로 고착 > 금화에 값싼 금속을 섞어 가치를 낮추는 장면이 원형',s:'lower, degrade, humiliate, diminish'},

{n:926,w:'fortuitous',m:'a. 우연한, 예기치 않은, 뜻밖의',r:'라틴어 fortuitus (accidental, 우연한) → 우연히 일어나는 → 우연한·뜻밖의로 고착 > 예상치 않게 마주친 행운의 장면이 원형',s:'accidental, unplanned, unexpected, chance'},

{n:929,w:'nourish',m:'vt. ~에 영양분[자양분]을 주다, 기르다; 육성하다, 강화하다, 증진시키다; (희망·원한·노여움 등을) 마음에 품다',r:'라틴어 nutrire (feed, 먹이다) → 영양을 주어 기르다 → 영양분을 주다·육성하다로 고착 > 음식으로 몸을 건강하게 기르는 장면이 원형',s:'feed, nourish, sustain, foster'},
{n:930,w:'wretched',m:'a. (사람이) 비참한, 불행한; (사람이) 몸[기분]이 안 좋은',r:'고대 영어 wrecca (exile, 추방자) → 추방되어 비참한 → 비참한·불행한으로 고착 > 모든 것을 잃고 처참한 상황의 장면이 원형',s:'miserable, pitiful, poor, unhappy'},
{n:931,w:'amount',m:'vi. (총계·금액이) ~이 되다, 총계 (~에) 달하다; (~에) 해당[상당]하다, 결국 (~이) 되다 / n. (the ~) 총계, 총액; 양, 액(額)',r:'고대 프랑스어 amonter (go up, 올라가다) → 올라가 총액에 달하다 → 총계에 달하다·양으로 고착 > 영수증 금액이 합산되어 총액을 나타내는 장면이 원형',s:'reach, total, come to, add up'},
{n:932,w:'trepidation',m:'n. 전율, (앞일에 대한) 공포, 두려움; (마음의) 동요, 당황; (손발 따위의) 떨림',r:'라틴어 trepidare (tremble, 떨다) → 떨리는 공포 → 전율·두려움·떨림으로 고착 > 앞으로 닥칠 일에 손이 부들부들 떨리는 장면이 원형',s:'alarm, fear, panic, dread'},
{n:933,w:'mammoth',m:'a. 거대한, 엄청난',r:'시베리아 원주민어 mamont (earth horn, 땅의 뿔) → 코끼리보다 거대한 선사 동물 → 거대한·엄청난으로 고착 > 털로 덮인 거대한 매머드의 장면이 원형',s:'colossal, enormous, huge, immense'},

{n:935,w:'besiege',m:'vt. ~을 포위 공격하다; 에워싸다; ~에 몰려들다[쇄도하다]; (요구·질문 따위로) 공세를 피붓다, 괴롭히다',r:'be (around) + siege (포위) → 사방에서 포위하다 → 포위 공격하다·쇄도하다로 고착 > 군대가 성 사방을 에워싸는 장면이 원형',s:'besiege, surround, attack, beleaguer'},

{n:937,w:'excrete',m:'vt. (노폐물을) 배설하다; 분비하다',r:'라틴어 ex (out) + cernere (sift, 걸러내다) → 밖으로 걸러 내보내다 → 배설하다·분비하다로 고착 > 몸이 노폐물을 밖으로 내보내는 장면이 원형',s:'eliminate, eject, discharge, evacuate'},
{n:938,w:'fashionable',m:'a. 유행의, 유행을 따른; 최신식의, 현대적인',r:'fashion (유행) + -able → 유행에 맞는 → 유행의·최신식의로 고착 > 최신 트렌드를 입고 거리를 걷는 장면이 원형',s:'stylish, trendy, chic, modish'},
{n:939,w:'overturn',m:'v. 뒤집다, 뒤집히다, 전복시키다[되다] / n. 전복, 타도, 와해, 멸망',r:'over (위에서) + turn (돌리다) → 위에서 뒤집다 → 뒤집다·전복시키다로 고착 > 배가 파도에 뒤집어지는 장면이 원형',s:'topple, reverse, defeat, upend'},
{n:940,w:'cuisine',m:'n. 요리법; 요리',r:'프랑스어 cuisine (kitchen, 부엌) → 부엌에서 나오는 요리 → 요리법·요리로 고착 > 셰프가 정성껏 요리를 준비하는 장면이 원형',s:'food style, cooking method, gastronomy'},

var curSetIdx=0, curSet=[], curQ=0, results=[], wrongList=[], finished=false;

// 오답 3개 모두 같은 세트에서 뽑기 (크로스 체킹 강화)
function buildChoices(q, setWords) {
  // 같은 세트의 다른 단어들
  var others = setWords.filter(function(w){ return w.n !== q.n; });
  // 랜덤 셔플 후 3개 선택
  var shuffled = others.slice().sort(function(){ return Math.random()-0.5; });
  var wrongs = shuffled.slice(0, 3);

  // 선지 객체: {text: 뜻, owner: 그 뜻의 주인 단어}
  var options = [
    { text: q.m, owner: q.w, isAnswer: true }
  ];
  wrongs.forEach(function(w) {
    options.push({ text: w.m, owner: w.w, isAnswer: false });
  });

  // 섞기
  for (var i = options.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var tmp = options[i]; options[i] = options[j]; options[j] = tmp;
  }

  var ansIdx = options.findIndex(function(o){ return o.isAnswer; });
  return { options: options, ans: ansIdx };
}

function initSet(setIdx) {
  curSetIdx = setIdx;
  var s = setIdx * 50;
  var setWords = WORDS.slice(s, s+50);
  curSet = setWords.map(function(w){ return Object.assign({}, w); });
  curSet.forEach(function(q) {
    var b = buildChoices(q, setWords);
    q.options = b.options;
    q.ans = b.ans;
  });
  curQ=0; results=new Array(curSet.length).fill(null); wrongList=[]; finished=false;
  document.getElementById('resultBox').style.display='none';
  document.getElementById('wrongBox').style.display='none';
  document.getElementById('qBox').style.display='block';
  document.getElementById('navBox').style.display='flex';
  renderScore(); renderQuestion();
}

function renderQuestion() {
  if(finished) return;
  var q = curSet[curQ];
  document.getElementById('qNum').textContent = '문제 '+(curQ+1)+' / '+curSet.length+'  |  #'+q.n;
  document.getElementById('qWord').textContent = q.w;
  document.getElementById('qCnt').textContent = (curQ+1)+' / '+curSet.length;
  document.getElementById('feedback').textContent = '';
  document.getElementById('extraInfo').style.display = 'none';
  document.getElementById('extraInfo').innerHTML = '';

  var box = document.getElementById('choiceBox');
  box.innerHTML = '';
  q.options.forEach(function(opt, i) {
    var btn = document.createElement('button');
    btn.className = 'choice';
    // 선지 텍스트 + 주인 단어 표시용 span (초기엔 숨김)
    var textSpan = document.createElement('span');
    textSpan.className = 'choice-text';
    textSpan.textContent = opt.text;
    btn.appendChild(textSpan);
    var ownerSpan = document.createElement('span');
    ownerSpan.className = 'choice-owner';
    ownerSpan.textContent = '= ' + opt.owner;
    btn.appendChild(ownerSpan);

    (function(idx){ btn.onclick = function(){ submitAnswer(idx); }; })(i);
    box.appendChild(btn);
  });

  if(results[curQ] !== null) { applyResult(results[curQ].chose, q.ans); showExtraInfo(q); }
}

function submitAnswer(chose) {
  if(finished) return;
  if(results[curQ] !== null) return;
  var q = curSet[curQ];
  var isCorrect = (chose === q.ans);
  results[curQ] = { chose: chose, correct: isCorrect };
  if(!isCorrect) {
    wrongList.push({
      n: q.n, word: q.w, root: q.r, syn: q.s,
      mine: q.options[chose].text,
      mineOwner: q.options[chose].owner,
      answer: q.options[q.ans].text
    });
  }
  applyResult(chose, q.ans);
  showExtraInfo(q);
  renderScore();
  var done = results.filter(function(r){ return r!==null; }).length;
  if(done === curSet.length) { setTimeout(showResult, 600); }
}

function applyResult(chose, correctIdx) {
  var btns = document.getElementById('choiceBox').querySelectorAll('button.choice');
  btns.forEach(function(btn, i) {
    btn.onclick = null;
    btn.classList.add('answered'); // 주인 단어 표시 활성화
    if(i === correctIdx) btn.classList.add(chose===correctIdx ? 'correct' : 'reveal');
    else if(i === chose) btn.classList.add('wrong');
    else btn.classList.add('neutral');
  });
  document.getElementById('feedback').textContent = (chose===correctIdx) ? '✅ 정답!' : '❌ 오답';
}

function showExtraInfo(q) {
  var box = document.getElementById('extraInfo');
  var html = '';
  if(q.s) html += '<div class="extra-syn">'+q.s+'</div>';
  if(q.r) html += '<div class="extra-root">'+q.r+'</div>';
  if(html) { box.innerHTML = html; box.style.display = 'block'; }
}

function renderScore() {
  var done = results.filter(function(r){ return r!==null; }).length;
  var ok = results.filter(function(r){ return r!==null && r.correct; }).length;
  var rate = done > 0 ? Math.round(ok/done*100) : '-';
  document.getElementById('scoreBar').textContent = '점수: '+ok+' / '+done+'  |  정답률: '+(rate==='-'?'-':rate+'%');
}

function goNext() {
  if(finished) return;
  if(curQ < curSet.length-1) { curQ++; renderQuestion(); }
  else {
    var first = results.findIndex(function(r){ return r===null; });
    if(first !== -1) { curQ = first; renderQuestion(); } else { showResult(); }
  }
}

function goPrev() { if(finished) return; if(curQ>0) { curQ--; renderQuestion(); } }

function showResult() {
  if(finished) return; finished = true;
  document.getElementById('qBox').style.display = 'none';
  document.getElementById('navBox').style.display = 'none';
  var ok = results.filter(function(r){ return r!==null && r.correct; }).length;
  var rate = Math.round(ok/curSet.length*100);
  document.getElementById('resultScore').textContent = ok+' / '+curSet.length+' ('+rate+'%)';
  document.getElementById('resultMsg').textContent = rate>=80 ? '훌륭해요! 🎊' : rate>=60 ? '조금만 더 연습하세요 💪' : '플래시카드로 복습해보세요 📖';
  document.getElementById('wrongBtn').style.display = wrongList.length > 0 ? '' : 'none';
  document.getElementById('resultBox').style.display = 'block';
}

function showWrongList() {
  var box = document.getElementById('wrongItems');
  box.innerHTML = '';
  wrongList.forEach(function(w) {
    var div = document.createElement('div'); div.className = 'wrong-item';
    div.innerHTML = '<div class="wrong-num">#'+w.n+'</div>'+
      '<div class="wrong-word">'+w.word+'</div>'+
      (w.syn ? '<div class="wrong-syn">'+w.syn+'</div>' : '')+
      (w.root ? '<div class="wrong-root">'+w.root+'</div>' : '')+
      '<div class="wrong-mine">'+w.mine+' <span class="owner-tag">= '+w.mineOwner+'</span></div>'+
      '<div class="wrong-ans">'+w.answer+'</div>';
    box.appendChild(div);
  });
  document.getElementById('wrongBox').style.display = 'block';
  document.getElementById('wrongBox').scrollIntoView({ behavior: 'smooth' });
}

function doShuffle() {
  var setWords = WORDS.slice(curSetIdx*50, curSetIdx*50+50);
  curSet = setWords.slice().sort(function(){ return Math.random()-0.5; }).map(function(w){ return Object.assign({},w); });
  curSet.forEach(function(q) {
    var b = buildChoices(q, setWords);
    q.options = b.options; q.ans = b.ans;
  });
  curQ=0; results=new Array(curSet.length).fill(null); wrongList=[]; finished=false;
  document.getElementById('resultBox').style.display='none';
  document.getElementById('wrongBox').style.display='none';
  document.getElementById('qBox').style.display='block';
  document.getElementById('navBox').style.display='flex';
  renderScore(); renderQuestion();
}

document.addEventListener('keydown', function(e) {
  if(finished) return;
  if(e.key==='ArrowRight') { e.preventDefault(); goNext(); }
  else if(e.key==='ArrowLeft') { e.preventDefault(); goPrev(); }
  else if(e.key==='1') submitAnswer(0);
  else if(e.key==='2') submitAnswer(1);
  else if(e.key==='3') submitAnswer(2);
  else if(e.key==='4') submitAnswer(3);
});

document.getElementById('setSelect').addEventListener('change', function() {
  initSet(parseInt(this.value)-1);
});

initSet(0);

</script>
</body>
</html>
