*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{color:#e94560;margin-bottom:8px;font-size:1.4em}

.num{position:absolute;top:10px;left:14px;color:#e94560;font-size:.8em;font-weight:bold}
.word{font-size:1.8em;font-weight:bold;color:#fff;margin-bottom:6px}
.hint{font-size:.8em;color:#888}
.meaning{font-size:.88em;color:#eee;line-height:1.5;margin-bottom:6px;overflow-y:auto;max-height:80px}
.syn{font-size:.75em;color:#4ecca3;margin-bottom:4px}
.root{font-size:.72em;color:#f0a500;line-height:1.4}
.nav{display:flex;gap:14px;align-items:center}
.nav button{padding:10px 22px;font-size:1em}
.nav .cnt{color:#aaa;font-size:.9em;min-width:80px;text-align:center}
.set-info{color:#4ecca3;font-size:.85em;margin-bottom:6px}
</style>

{n:1748,w:'distill',m:'v. ① 증류하다, 정제하다 ② 추출하다',s:'purify, refine / extract',r:'라틴어 de(아래로) + stillare(방울지다) → 액체를 끓여 수증기로 만든 뒤 방울방울 모으다 → 증류하다, 추출하다'},
{n:1749,w:'evade',m:'v. ① 피하다, 회피하다 ② 얼버무리며 넘기다',s:'escape, flee / fudge, parry',r:'라틴어 ex(밖으로) + vadere(가다) → 의무나 책임의 테두리 밖으로 슬쩍 빠져나가다 → 피하다, 회피하다'},
{n:1750,w:'tribunal',m:'n. ① 재판소, 법정, 법원 ② 조사 위원회, 심사 위원회',s:'bar, court, judicatory',r:'라틴어 tribunus(호민관) → 고대 로마 호민관이 심판을 내리던 높은 자리 → 재판소, 법원'},
{n:1751,w:'worldly',m:'a. 현세의, 속세의, 세속적인',s:'earthly, mundane, secular',r:'영어 world(세상) + -ly(형용사) → 영적인 것이 아니라 이 세상의 쾌락이나 가치에 속하는 → 현세의, 세속적인'},
{n:1752,w:'disconcert',m:'vt. 당황하게 하다, 쩔쩔매게 하다',s:'baffle, confuse, disturb, puzzle',r:'라틴어 dis(반대) + concertare(조화시키다) → 잘 짜여진 계획이나 조화를 깨뜨려 당황하게 만들다 → 당황하게 하다'},
{n:1753,w:'constellation',m:'n. ① 별자리, 성좌 ② 기라성 같은 모임',s:'asterism / galaxy',r:'라틴어 con(함께) + stella(별) + -tion → 밤하늘에 별들이 함께 모여 이룬 무리 → 별자리, 기라성 같은 모임'},
{n:1754,w:'stifle',m:'v. ① 숨 막히게 하다; 질식시키다 ② 억누르다, 억제하다; 억압하다',s:'asphyxiate, choke, suffocate / curb, restrain, suppress',r:'고대 프랑스어 estouffer(질식시키다) → 숨이 막히게 억눌러 끄거나 행동을 못 하게 막다 → 숨 막히게 하다, 억압하다'},
{n:1755,w:'decorum',m:'n. 단정, 예의 바름, 예절',s:'civility, courtesy, decency, propriety',r:'라틴어 decorus(적절한, 예의 바른) → 상황에 맞게 겉으로 드러나는 단정하고 적절한 행동 → 단정, 예의 바름'},
{n:1756,w:'quarrelsome',m:'a. 화를 잘 내는, 말다툼을 좋아하는',s:'argumentative, disputatious',r:'라틴어 queri(불평하다) + -some(경향이 있는) → 사소한 일에 불평하며 걸핏하면 싸우려 드는 → 말다툼을 좋아하는'},
{n:1757,w:'proscribe',m:'vt. ① 금하다, 금지하다 ② 추방하다',s:'ban, forbid, prohibit / exclude, expel, outlaw',r:'라틴어 pro(앞에) + scribere(쓰다) → 게시판에 범죄자의 이름을 써서 법적 보호를 박탈하다 → 금지하다, 추방하다'},
{n:1758,w:'spurious',m:'a. 가짜의, 위조의; 그럴듯한',s:'bogus, counterfeit, fake',r:'라틴어 spurius(사생아의, 가짜의) → 진짜 혈통이 아니거나 출처가 거짓인 → 가짜의, 그럴듯한'},
{n:1759,w:'ebb',m:'n. ① 썰물, 간조 ② 쇠퇴, 쇠퇴기 / vi. ① 조수가 빠지다 ② 점점 쇠하다, 약해지다',s:'low tide, reflux / decay, decline, decrease / diminish, flag, lessen, recede',r:'고대 영어 ebba(썰물) → 조수가 빠져나가듯 힘이나 세력이 점차 줄어들다 → 썰물, 쇠퇴하다'},
{n:1760,w:'institute',m:'n. 협회, 학회; 연구소 / vt. ① (제도 등을) 만들다, 설치하다 ② 시작하다',s:'constitute; establish; enact',r:'라틴어 in(안에) + statuere(세우다) → 안건을 안에 세워 공식화하거나 조직을 세우다 → 협회, 설립하다'},
{n:1761,w:'censorious',m:'a. 몹시 비판적인, 트집만 잡으려고 하는',s:'captious, fault-finding',r:'라틴어 censere(판단하다, 검열하다) → 남의 결점을 매의 눈으로 검열하고 혹평하는 → 몹시 비판적인'},
{n:1762,w:'preliminary',m:'a. 예비적인, 준비의 / n. 사전준비; 예비시험',s:'pilot; opening',r:'라틴어 prae(미리) + limen(문턱) → 본론의 문턱을 넘기 전에 미리 준비하는 것 → 예비적인, 사전준비'},
{n:1763,w:'adjudicate',m:'v. 판결을 내리다, 재결하다',s:'adjudge, judge, sentence',r:'라틴어 ad(~로) + judicare(판단하다) → 법관으로서 재판정에 나아가 공식적으로 판결하다 → 판결을 내리다'},
{n:1764,w:'beset',m:'vt. ① 포위하다, 에워싸다 ② 따라다니다, 괴롭히다',s:'besiege',r:'고대 영어 besettan(포위하다) → 사방에서 겹겹이 에워싸서 공격하거나 괴롭히다 → 포위하다, 괴롭히다'},
{n:1765,w:'omen',m:'n. 전조, 징조, 조짐 / vt. 전조가 되다, 예고하다',s:'augury, harbinger, indication / forebode, prognosticate',r:'라틴어 omen(전조) → 미래의 좋고 나쁜 일을 미리 알려주는 신성한 신호 → 전조, 징조'},
{n:1766,w:'transmute',m:'v. 바꾸다, 변화시키다',s:'alter, change, transform',r:'라틴어 trans(가로질러, 변화) + mutare(바꾸다) → 모양이나 성질을 완전히 다른 것으로 바꾸다 → 바꾸다, 변화시키다'},
{n:1767,w:'matrix',m:'n. 모체, 기반; 자궁',s:'',r:'라틴어 matrix(자궁, 모체) → 다른 것이 발생하고 자라나는 기반이나 형태의 틀 → 모체, 기반'},
{n:1768,w:'revamp',m:'vt. ① 개조[개정·개혁·쇄신]하다 ② 수선하다',s:'renovate, revise',r:'프랑스어 re(다시) + vamp(구두창을 대다) → 낡은 구두에 새 창을 대듯 전체를 새롭게 개조하다 → 개조하다, 수선하다'},
{n:1769,w:'interstice',m:'n. 간격, 틈새, 작은 틈',s:'chink, crack, crevice, fissure',r:'라틴어 inter(사이에) + sistere(서다) → 두 물체나 구조 사이에 갈라져 서 있는 작은 틈 → 간격, 틈새'},
{n:1770,w:'fascinating',m:'a. 황홀하게 하는, 매혹적인',s:'alluring, captivating, charming, enchanting',r:'라틴어 fascinare(마법을 걸다) → 마법의 주문에 걸린 듯 사람의 마음을 완전히 사로잡는 → 황홀하게 하는, 매혹적인'},
{n:1771,w:'garrison',m:'n. ① 수비대, 주둔군 ② 요새, 주둔지 / vt. 수비대를 두다; 주둔시키다',s:'fort, fortress / position, station',r:'고대 프랑스어 garison(수비, 방어) → 적의 공격을 막기 위해 요새에 머무는 부대 → 수비대, 요새'},
{n:1772,w:'collogue',m:'vi. 밀담하다; 공모하다',s:'hugger-mugger; conspire, intrigue, plot',r:'라틴어 con(함께) + loqui(말하다) → 사람들 몰래 모여서 은밀하게 속닥이며 음모를 꾸미다 → 밀담하다, 공모하다'},
{n:1773,w:'infirm',m:'a. ① 허약한; 노쇠한 ② 의지 등이 약한, 우유부단한',s:'feeble, frail, weak / irresolute, volitionless',r:'라틴어 in(not) + firmus(확고한, 강한) → 몸이나 의지가 단단하지 못하고 허약하게 흔들리는 → 허약한, 우유부단한'},
{n:1774,w:'saga',m:'n. 전설; 무용담, 모험담',s:'epic, legend, story, tale',r:'고대 노르드어 saga(이야기) → 바이킹 시대 노르웨이나 아이슬란드의 긴 영웅 서사시 → 전설, 무용담'},
{n:1775,w:'noticeable',m:'a. 눈에 띄는, 현저한, 두드러진',s:'conspicuous, noteworthy',r:'영어 notice(알아차리다) + -able → 숨길 수 없이 눈에 확 띄어 알아차리기 쉬운 → 눈에 띄는, 현저한'},
{n:1776,w:'corpse',m:'n. 시체, 송장',s:'cadaver, carcass, remains',r:'라틴어 corpus(몸, 신체) → 생명이 빠져나가고 물리적인 몸집만 남은 상태 → 시체, 송장'},
{n:1777,w:'deny',m:'vt. ① 사실이 아니라고 말하다; 부인하다 ② 거부하다 ③ 면회를 거절하다',s:'contradict, refute / refuse, reject, veto',r:'라틴어 de(완전히) + negare(부정하다) → 상대의 말이나 요구를 완전히 아니라고 강하게 거부하다 → 부인하다, 거부하다'},
{n:1778,w:'piebald',m:'a. 얼룩무늬가 있는; 잡색의 / n. 얼룩말; 얼룩무늬 동물',s:'',r:'영어 pie(까치) + bald(흰 얼룩이 있는) → 까치처럼 검고 흰 얼룩무늬가 섞여 있는 → 잡색의, 얼룩말'},
{n:1779,w:'horrid',m:'a. ① 무시무시한 ② 매우 불쾌한, 싫은',s:'frightful, horrible / nasty, repulsive',r:'라틴어 horrere(머리털이 곤두서다) → 무서움이나 혐오감으로 머리카락이 쭈뼛 설 정도로 싫은 → 무시무시한, 불쾌한'},
{n:1780,w:'circuit',m:'n. ① 순회; 순회여행 ② 우회(도로) ③ 회로, 회선',s:'tour / detour',r:'라틴어 circum(주위를) + ire(가다) → 빙 둘러서 제자리로 돌아오거나 우회하는 선 → 순회, 우회, 회로'},
{n:1781,w:'nitpick',m:'v. 하찮은 일에 꽁꽁 앓다, 트집[흠]을 잡다',s:'',r:'영어 nit(이의 알) + pick(따다) → 머리카락에서 아주 작은 이의 알을 찾아내듯 사소한 결점을 꼬치꼬치 캐내다 → 트집 잡다'},
{n:1782,w:'effect',m:'n. ① 결과 ② 효과; 효력 ③ 취지, 의미 ④ 소지품 / vt. ① 초래하다 ② 실행하다, 성취하다',s:'consequence / impact / meaning / bring about / achieve',r:'라틴어 ex(밖으로) + facere(만들다) → 원인에 의해 밖으로 만들어져 나온 최종 결과물 → 결과, 효과, 초래하다'},
{n:1783,w:'vagrant',m:'a. ① 방랑하는 ② 변덕스러운 / n. 방랑자',s:'roving, wandering / desultory, whimsical / hobo, tramp, vagabond',r:'라틴어 vagari(헤매다, 떠돌다) → 일정한 직업 없이 이리저리 정처 없이 떠도는 사람 → 방랑하는, 방랑자'},
{n:1784,w:'resource',m:'n. ① 자원; 물자 ② 수단, 방책',s:'reserve, source, supply / means, resort',r:'라틴어 re(다시) + surgere(일어나다) → 필요할 때마다 다시 솟아올라 도움을 주는 수단 → 자원, 수단'},
{n:1785,w:'butt',m:'n. ① 대상, 표적 ② 꽁초 ③ 통; 엉덩이; 밑동',s:'object, target, victim',r:'고대 프랑스어 but(목표물) → 총이나 화살을 쏠 때 과녁으로 삼는 대상이나 밑동 → 대상, 꽁초, 엉덩이'},
{n:1786,w:'arcane',m:'a. 비밀의; 신비로운, 불가사의한',s:'mysterious, occult, secret',r:'라틴어 arca(비밀 상자, 궤) → 아무나 열어볼 수 없는 비밀 상자에 감춰진 → 비밀의, 신비로운'},
{n:1787,w:'phenom',m:'n. 천재, 경이적인 사람',s:'genius, marvel, prodigy, wonder',r:'phenomenon(경이로운 현상)의 축약어 → 평범함을 뛰어넘는 놀라운 능력을 보여주는 인물 → 천재, 경이적인 사람'},
{n:1788,w:'uphold',m:'vt. ① 떠받치다 ② 지지하다, 옹호하다',s:'elevate, hoist, raise / buttress, defend, maintain, support',r:'영어 up(위로) + hold(잡다) → 무너지지 않게 밑에서 위로 떠받쳐 지탱하거나 방어하다 → 떠받치다, 옹호하다'},
{n:1789,w:'munition',m:'n. ① 군수품, 탄약 ② 필수품, 자금, 자재',s:'ammo, ordnance / commodities, necessaries',r:'라틴어 munire(방어하다) → 적을 방어하기 위해 비축해두는 군사 물자와 화약 → 군수품, 탄약'},
{n:1790,w:'gorgeous',m:'a. 호화로운, 화려한; 멋진',s:'beautiful, magnificent, splendid',r:'고대 프랑스어 gorgias(화려한 목걸이) → 화려한 장신구로 목을 장식한 듯 눈부시게 아름다운 → 호화로운, 화려한'},
{n:1791,w:'bay',m:'n. ① 만(灣) ② 궁지; 막다른 곳',s:'cove, gulf / fix, plight, predicament',r:'고대 프랑스어 baer(입을 벌리다) → 바다가 육지 쪽으로 입을 벌린 듯한 모양 / 막힌 구석 → 만(灣), 궁지'},
{n:1792,w:'downright',m:'a. ① 철저한, 완전한 ② 솔직한, 노골적인 / ad. 철저히, 완전히; 솔직히',s:'absolute, complete, outright, utter / blunt, frank, honest / completely, perfectly',r:'영어 down(아래로) + right(곧게) → 숨김없이 아래로 곧게 뻗어 내려가는 → 철저한, 솔직한'},
{n:1793,w:'shroud',m:'n. ① 수의(壽衣) ② 덮개, 가리개, 장막 / vt. ① 수의를 입히다 ② 싸다, 가리다, 감추다',s:'covering, veil / conceal, cover, hide, screen',r:'고대 영어 scrud(의복) → 죽은 자를 덮는 천이나 물건을 감쪽같이 덮어 가리는 덮개 → 수의, 장막, 가리다'},
{n:1794,w:'tutor',m:'n. 가정교사, 지도 교사[교수] / v. 가르치다, 개인 교습을 하다',s:'coach, educator, instructor, teacher / educate, instruct, teach',r:'라틴어 tueri(보호하다, 지켜보다) → 학생을 보호하며 곁에서 개별적으로 지도를 해주는 사람 → 가정교사, 가르치다'},
{n:1795,w:'frenzy',m:'n. 극도의 흥분, 열광, 광분, 광란 / vt. ~를 몹시 흥분[격분]시키다, 미쳐 날뛰게 하다',s:'fever, hysteria, madness, mania, tumult / madden',r:'그리스어 phren(마음) + -esis(상태) → 마음이 병들어 통제력을 잃고 날뛰는 상태 → 극도의 흥분, 광란'},
{n:1796,w:'lullaby',m:'n. 자장가; 졸음이 오게 하는 노래[소리]',s:'berceuse, cradlesong',r:'영어 lull(달래다) + by(안녕) → 아기를 달래서 잠재우기 위해 부드럽게 부르는 노래 → 자장가'},
{n:1797,w:'exhume',m:'vt. 파내다, (특히 시체를) 발굴하다; (숨은 인재·명작 등을) 찾아내다, 발굴하다',s:'excavate, unearth',r:'라틴어 ex(밖으로) + humus(땅, 흙) → 땅속에 묻힌 시체나 잊혀진 사실을 파내어 꺼내다 → 파내다, 발굴하다'},
{n:1798,w:'suite',m:'n. ① 수행원, 종자(從者) ② (특히 호텔의) 스위트룸',s:'attendant, cortege, entourage',r:'라틴어 sequi(따르다) → 왕이나 귀족을 따라다니는 무리 / 방들이 이어져 있는 세트 → 수행원, 스위트룸'},
{n:1799,w:'rambunctious',m:'a. (사람·행위가) 난폭한, 사나운; 사납게 날뛰는; 제멋대로인',s:'rowdy, unruly',r:'어원 불명(robustious 변형 추정) → 통제가 안 될 정도로 활력과 장난기가 넘쳐 날뛰는 → 난폭한, 제멋대로인'},
{n:1800,w:'agent',m:'n. ① 대리인, 대행자; 주선인, 중개인 ② 첩보원, 간첩 ③ 중요한 작용을 하는 사람[것]; 작인(作因), 동인(動因)',s:'delegate, deputy, proxy, representative',r:'라틴어 agere(행동하다) + -ent(사람) → 남의 부탁을 받아 대신 행동하거나 중요한 작용을 하는 자 → 대리인, 첩보원'},
{n:1801,w:'novice',m:'n. 초심자, 초보자, 초년생, 풋내기',s:'beginner, greenhorn, newcomer, tyro',r:'라틴어 novus(새로운) + -ice(명사 접미사) → 어떤 분야에 새롭게 들어와 시작하는 사람 → 초심자, 풋내기'},
{n:1802,w:'concerted',m:'a. (특히 둘 이상의 사람·국가 등이) 일치단결된, 합심한, 결연한',s:'combined, unanimous, united',r:'라틴어 con-(함께) + certare(겨루다, 확실히 하다) → 힘을 모아 확실하게 하나의 목표를 향하는 → 일치단결된, 합심한'},
{n:1803,w:'expunge',m:'vt. (이름·정보·기억 등을) 지우다, 삭제하다',s:'delete, efface, erase, remove',r:'라틴어 ex-(밖으로) + pungere(찌르다) → (점 등을 찍어) 명단에서 밖으로 빼버리다 → 지우다, 삭제하다'},
{n:1804,w:'profligate',m:'a. ① 낭비가 심한 ② 품행이 나쁜, 방탕한 / n. ① 방탕아, 난봉꾼 ② 낭비가',s:'extravagant, prodigal, spendthrift, wasteful / degenerate, depraved, immoral / libertine / squanderer',r:'라틴어 pro-(앞으로) + fligere(치다) → 재산을 앞으로 마구 던져 치며 흩어버리는 → 낭비가 심한, 방탕한'},
{n:1805,w:'assail',m:'vt. ① 공격[습격]하다, 비난하다 ② (불안·의심 등이) 괴롭히다',s:'assault, attack',r:'라틴어 ad-(~에) + salire(뛰다) → 적을 향해 거칠게 뛰어들며 맹렬히 부딪히다 → 공격하다, 괴롭히다'},
{n:1806,w:'livelihood',m:'n. 살림살이, 생계; 생계수단',s:'housekeeping, living',r:'고대 영어 lif(생명) + lad(길, 인도) → 생명을 유지하며 이끌어가는 방법이나 수단 → 살림살이, 생계'},
{n:1807,w:'requisite',m:'a. 필요한, 없어서는 안 될, 필수인 / n. 필수품, 필요조건',s:'essential, necessary, required / precondition, requirement',r:'라틴어 re-(다시, 강력히) + quaerere(구하다) → 어떤 목적을 달성하기 위해 다시 꼭 구해야만 하는 → 필수적인, 필요조건'},
{n:1808,w:'sidestep',m:'v. 옆으로 비키다; (책임 등을) 회피하다',s:'avoid, evade',r:'영어 side(옆) + step(걸음) → 다가오는 책임이나 문제를 피해 옆으로 걸음을 옮기다 → 옆으로 비키다, 회피하다'},
{n:1809,w:'despondent',m:'a. 낙담한, 실의에 빠진, 풀이 죽은',s:'dejected, depressed, discouraged',r:'라틴어 de-(아래로, 멀리) + spondere(약속하다) → 희망에 대한 약속을 버리고 낙담한 → 실의에 빠진, 풀이 죽은'},
{n:1810,w:'induct',m:'vt. ① (정식으로 직위·성직·지위에) 임명하다, 취임시키다 ② (비결 등을) 전수하다, 초보를 가르치다',s:'inaugurate, install, instate / initiate, introduce',r:'라틴어 in-(안으로) + ducere(이끌다) → 사람을 새로운 직위나 비밀스러운 모임 안으로 이끌어들이다 → 취임시키다, 전수하다'},
{n:1811,w:'privilege',m:'n. 특권, 특전',s:'prerogative',r:'라틴어 privus(개인의) + lex(법) → 특정 개인에게만 적용되는 특별한 이익을 주는 법 → 특권, 특전'},
{n:1812,w:'strident',m:'a. ① 소리가 불쾌한, 날카로운, 귀에 거슬리는 ② 공격적인, 단호한, 집요한',s:'noisy, raucous, vociferous',r:'라틴어 stridere(삐걱거리다) → 쇠가 마찰하며 귀를 찌르는 듯한 날카롭고 거친 소리를 내는 → 귀에 거슬리는, 단호한'},
{n:1813,w:'denomination',m:'n. ① 명칭, 호칭 ② 종파, 교파 ③ (특히 돈의) 액면가, 액면표시금액',s:'appellation, compellation, designation / religious sect / face value',r:'라틴어 de-(완전히) + nominare(이름 부르다) → 특정 집단이나 가치에 공식적인 이름을 부여함 → 명칭, 종파, 액면가'},
{n:1814,w:'fester',m:'v. ① (상처가) 곪다; (쓰레기 등이) 부패하다 ② (분통 등으로) 마음이 아프다; 노여움 등이 심해지다 ③ (문제 등이) 악화되다',s:'become infected, decay, putrefy, suppurate / annoy, irk, irritate / intensify',r:'라틴어 fistula(고름관) → 상처에 고름이 차서 썩어 들어가다 / 마음속 불만이 곪아 터지다 → 곪다, 악화되다'},
{n:1815,w:'acupuncture',m:'n. 침술(요법)',s:'',r:'라틴어 acus(바늘) + punctura(찌름) → 가는 바늘로 피부의 특정 부위를 찔러 치료하는 의술 → 침술'},
{n:1816,w:'injurious',m:'a. ① 해로운, 유해한 ② 상처를 주는, (말이) 무례한, 모욕적인',s:'damaging, detrimental, harmful / hurtful, insulting',r:'라틴어 in-(not) + jus(법, 권리) → 법이나 권리에 어긋나 부당한 피해를 입히는 → 해로운, 모욕적인'},
{n:1817,w:'bonanza',m:'n. ① (찾아낸) 풍부한 광맥, 노다지 ② 뜻밖의 행운, 횡재, 대성공',s:'bunce, jackpot, windfall',r:'스페인어 bonanza(잔잔한 바다, 번영) → 라틴어 bonus(좋은)에서 유래, 날씨가 좋아 큰 이득을 보는 상황 → 노다지, 뜻밖의 행운'},
{n:1818,w:'dispose',m:'v. ① 처분하다[of] ② 배치하다, 배열하다 ③ ~의 경향을 갖게 하다',s:'arrange, order, place / incline, predispose, tempt',r:'라틴어 dis-(따로) + ponere(놓다) → 제자리에 따로따로 나누어 적절하게 놓아두다 → 처분하다, 배치하다'},
{n:1819,w:'suggestion',m:'n. ① 제안, 제의, 의견 ② 시사, 암시 ③ 연상, 착상 ④ 기미, 기색',s:'proposal, proposition, recommendation / allusion, implication / idea / hint, note, sign',r:'라틴어 sub-(아래에서) + gerere(나르다) → 마음 밑바닥에서 은근히 어떤 생각을 나르며 넌지시 건네다 → 제안, 암시'},
{n:1820,w:'timorous',m:'a. 겁 많은, 소심한',s:'chicken-hearted, cowardly, pusillanimous, timid',r:'라틴어 timere(두려워하다) + -ous(형용사 접미사) → 항상 마음속에 두려움에 사로잡혀 있는 → 겁 많은, 소심한'},
{n:1821,w:'euphoria',m:'n. (극도의) 행복감, 희열',s:'ecstasy, jubilation, rapture',r:'그리스어 eu-(좋은) + pherein(나르다) → 참을 수 없을 만큼 좋은 기분을 나르는 상태 → 행복감, 희열'},
{n:1822,w:'compress',m:'v. ① 압축[압착]하다 ② (사상·언어 등을) 요약하다, 집약하다 / n. 압박 붕대; 습포',s:'condense / abridge, abstract, summarize',r:'라틴어 com-(함께) + premere(누르다) → 여러 개를 한데 모아 강하게 꾹 눌러 부피를 줄이다 → 압축하다, 요약하다'},
{n:1823,w:'exigency',m:'n. 위급, 급박, 긴급 사태',s:'crisis, emergency, urgency',r:'라틴어 ex-(밖으로) + agere(몰다) → 사람을 밖으로 강하게 몰아붙여 행동하게 만드는 위급한 상황 → 위급, 긴급 사태'},
{n:1824,w:'subterranean',m:'a. ① 지하의, 지하에 있는 ② 숨은, 비밀의',s:'underground / covert, hidden',r:'라틴어 sub-(아래에) + terra(땅) → 땅의 바로 밑바닥에 보이지 않게 숨어 존재하는 → 지하의, 숨은'},
{n:1825,w:'mercury',m:'n. ① 수은, 수은주 ② <천문학> 수성(水星) ③ 활기',s:'animation, briskness, liveliness, spirit, vigor',r:'라틴어 Mercurius(로마의 전령 신) → 날개 달린 신발을 신은 전령이나 별(수성)처럼 빠르고 유동적인 → 수은, 수성, 활기'},
{n:1826,w:'glean',m:'v. ① (정보·지식 등을) 조금씩 수집하다, 모으다 ② (이삭을) 줍다',s:'collect, gather',r:'고대 프랑스어 glener(이삭 줍다) → 켈트어 유래, 추수 후 들판을 깨끗이 하며 남은 것을 줍다 → 수집하다'},
{n:1827,w:'affection',m:'n. ① 애정, 호의; 애착 ② 감정, 감동 ③ 영향 ④ 병',s:'attachment, devotion, love / emotion, feeling / effect, influence / disease, illness',r:'라틴어 ad-(~로) + facere(만들다, 작용하다) → 마음이 어떤 대상을 향해 강하게 끌리고 작용함 → 애정, 병'},
{n:1828,w:'oval',m:'a. 달걀 모양의, 타원형의',s:'egg-shaped, elliptical, ovoid',r:'라틴어 ovum(알) + -al(형용사 접미사) → 새의 알처럼 길쭉하고 둥근 곡선을 가진 → 달걀 모양의, 타원형의'},
{n:1829,w:'mote',m:'n. 티끌, 매우 작은 먼지; 작은 결정',s:'bit, grain, particle; speck',r:'고대 영어 mot(작은 입자) → 햇빛에 비쳐 눈에 겨우 보이는 아주 작은 먼지 → 티끌, 매우 작은 먼지'},
{n:1830,w:'wail',m:'v. (고통·슬픔·통증 등으로) 울부짖다, 통각하다 / n. 울부짖음, 통곡',s:'cry, howl, weep / lamentation, moan',r:'고대 노르드어 vala(슬피 울다) → 심한 고통이나 슬픔을 이기지 못하고 길게 소리 내어 울다 → 울부짖다, 통곡'},
{n:1831,w:'tumult',m:'n. 소란, 소동; 폭동, 반란',s:'commotion, riot, to-do, turmoil, uproar',r:'라틴어 tumere(부풀어 오르다) → 군중의 흥분과 분노가 잔뜩 부풀어 올라 통제되지 않는 상태 → 소란, 폭동'},
{n:1832,w:'hue',m:'n. ① 색조; 빛깔; 색상 ② (의견·태도 등의) 경향, 특색',s:'color, shade, tone / aspect, light',r:'고대 영어 hiw(색깔, 형태) → 사물이 겉으로 띠고 있는 시각적인 색깔이나 뚜렷한 특징 → 색조, 특색'},
{n:1833,w:'retribution',m:'n. ① (나쁜 행동에 대한) 보복, 앙갚음 ② 징벌, 천벌',s:'reprisal, retaliation, vengeance',r:'라틴어 re-(뒤로) + tribuere(할당하다, 주다) → 지은 죄와 똑같은 분량만큼 뒤로 돌려주는 것 → 보복, 징벌'},
{n:1834,w:'leery',m:'a. ① 의심 많은, 조심하는, 경계하는 ② 곁눈질하는',s:'cauthorized, suspicious / casting a side glance',r:'고대 영어 hleor(뺨, 얼굴) → 의심스러워 고개를 돌리고 뺨을 보이며 곁눈질로 힐끗 보는 → 의심 많은, 경계하는'},
{n:1835,w:'crux',m:'n. ① 가장 중요한 부분, 핵심 ② 난문(難問), 난제(難題) ③ 십자가',s:'core, gist, kernel, nitty-gritty, pith',r:'라틴어 crux(십자가) → 고통을 주는 십자가 형벌처럼 가장 해결하기 어렵고 중요한 핵심 문제 → 핵심, 난제'},
{n:1836,w:'diverge',m:'v. ① 갈라지다, 분기하다 ② (의견 등이) 갈라지다, 다르다 ③ (진로·이야기 등에서) 빗나가다, 벗어나다',s:'divide, fork, separate, split / conflict, differ, disagree / deviate, digress, stray',r:'라틴어 dis-(따로) + vergere(기울다) → 한 점에서 시작하여 여러 갈래로 나뉘어 다른 방향으로 뻗다 → 갈라지다, 벗어나다'},
{n:1837,w:'pendulum',m:'n. (시계 등의) 진자, 흔들리는 추; 샹들리에; 마음을 잡지 못하는 사람',s:'',r:'라틴어 pendere(매달리다) + -ulum(도구) → 실이나 줄에 매달려 일정한 주기로 흔들리는 도구 → 진자, 흔들리는 추'},
{n:1838,w:'voluminous',m:'a. ① 부피[용적]가 큰, 방대한, 다량의 ② 권수[책수]가 많은, 여러 권의 ③ 저서가 많은, 다작의',s:'ample, copious, massive / productive, prolific',r:'라틴어 volumen(두루마리) + -ous → 수많은 두루마리 책을 채울 만큼 내용이나 부피가 방대한 → 부피가 큰, 다작의'},
{n:1839,w:'caption',m:'n. ① (페이지·기사 등의) 표제, 제목; 자막 ② (사진·삽화의) 설명(문)',s:'heading, title; subtitle / legend, underline',r:'라틴어 capere(잡다) → 독자의 시선을 확 잡아끌기 위해 글이나 그림 위에 붙인 짤막한 머리말 → 표제, 자막, 설명문'},
{n:1840,w:'ornament',m:'n. 장식품, 장신구; 장식 / vt. 장식하다',s:'adornment, decoration, embellishment / adorn, decorate, embellish',r:'라틴어 ornare(장식하다) + -ment(명사 접미사) → 무언가를 더 아름답고 돋보이게 꾸미기 위해 덧붙이는 물건 → 장식품'},
{n:1841,w:'emend',m:'vt. (문서·잘못 등을) 교정하다, 수정하다',s:'correct, rectify, revise',r:'라틴어 e-(밖으로) + menda(결점) → 원고나 문서에서 틀리거나 나쁜 결점들을 밖으로 빼내어 바로잡다 → 교정하다, 수정하다'},
{n:1842,w:'bedridden',m:'a. 물져 누워 있는, 누워서만 지내는; 노후한, 낡은',s:'laid up, sick[ill] in bed',r:'영어 bed(침대) + ridden(ride의 과거분사) → 질병이나 노환 때문에 침대에 눌려 타 있는(일어나지 못하는) 상태 → 앓아누워 있는'},
{n:1843,w:'interference',m:'n. 간섭, 참견, 개입, 방해',s:'intervention, intrusion, meddling',r:'라틴어 inter-(사이에) + ferire(치다) → 원활하게 돌아가는 둘 사이에 뛰어들어 부딪히며 훼방을 놓음 → 간섭, 개입, 방해'},
{n:1844,w:'amorphous',m:'a. ① 확실한 형태가 없는, 무정형의 ② 특색[개성]이 뚜렷하지 않은, 특징이 없는',s:'formless, shapeless, unshaped / characterless, featureless, gray',r:'그리스어 a-(없는) + morphe(형태) → 일정한 고체 모양이나 뚜렷한 구조적인 특징이 없는 → 무정형의, 특징이 없는'},
{n:1845,w:'rout',m:'n. ① 완패, 패주 ② 혼란한 군중; 소란 / vt. 완패[패주]시키다',s:'beating, debacle / beat, defeat, thrash, vanquish',r:'라틴어 ruptus(부서진) → 전투 중 대열이 완전히 부서져 군대가 무질서하게 달아나는 패배 → 완패, 완패시키다'},
{n:1846,w:'knead',m:'vt. ① (가루·흙 등을) 반죽하다, 개다 ② (어깨나 근육 등을) 주무르다 ③ (인격을) 닦다, 도야하다',s:'mold, work / massage, rub / cultivate, file, train',r:'고대 영어 cnedan(누르다) → 손으로 가루나 흙 덩어리를 꾹꾹 눌러 치대며 하나의 덩어리로 만들다 → 반죽하다, 주무르다'},
{n:1847,w:'comrade',m:'n. 동료, 동지, 전우, 친구, 벗',s:'associate, colleague, companion',r:'라틴어 camera(방) → 스페인어 camarada(방을 같이 쓰는 사람) → 한 방을 쓰며 뜻을 함께하고 고생을 나누는 사이 → 동료, 전우'},
{n:1848,w:'foray',m:'n. ① 습격, 급습 ② 본업 이외의 분야에의 진출 / v. ① 습격[약탈]하다 ② 침입[진출]하다',s:'incursion, inroad, invasion, raid / loot, pillage, plunder',r:'고대 프랑스어 forrer(약탈하다) → 먹을 것을 구하기 위해 적진이나 다른 곳에 쳐들어가 약탈하는 것 → 습격, 진출'},
{n:1849,w:'barrister',m:'n. 법정 변호사; 변호사, 법률가',s:'attorney, counsel, lawyer, solicitor',r:'영어 bar(법정의 난간) + -ister(사람) → 법정 안쪽의 칸막이 자리에 설 자격을 갖춘 법률 전문가 → 법정 변호사'},
{n:1850,w:'prowl',m:'v. ① 살금살금 돌아다니다 ② 배회하다 ③ 서성거리다[어슬렁거리다]',s:'wander / loaf, rove',r:'중세 영어 prollen(헤매다) → 포식자가 먹잇감을 찾아 조용하고 은밀하게 어슬렁거리며 돌아다니다 → 살금살금 돌아다니다'},
{n:1851,w:'immortal',m:'a. 죽지 않는, 불사의, 불멸의',s:'eternal, imperishable, indestructible, undying',r:'라틴어 in-(not) + mortalis(죽을 운명의) → 영원히 생명을 유지하며 결코 죽을 운명이 아닌 → 죽지 않는, 불멸의'},
{n:1852,w:'constrict',m:'vt. 압축하다; 죄다; 수축시키다',s:'compress, contract, squeeze, tighten',r:'라틴어 con-(함께) + stringere(단단히 묶다) → 밧줄로 여러 개를 한데 모아 꽉 조여 크기나 흐름을 줄이다 → 압축하다, 수축시키다'},
{n:1853,w:'persiflage',m:'n. 야유, 희롱; 농담',s:'banter, raillery',r:'프랑스어 per-(통과하여) + siffler(휘파람 불다) → 심각한 상황에서도 가볍게 휘파람을 불듯 비웃거나 놀리는 태도 → 야유, 농담'},
{n:1854,w:'subordinate',m:'a. 부차적[부수]적인 / vt. 하위에 두다; 경시하다 / n. 하급[종속]자, 부하',s:'collateral, secondary, subservient / belittle, disvalue, downplay / henchman, junior',r:'라틴어 sub-(아래에) + ordinare(순서를 매기다) → 지위나 중요도의 순서를 남의 밑에 놓아 종속시키다 → 부차적인, 하급자'},
{n:1855,w:'accrue',m:'v. (이자·이익 등이) 생기다',s:'accumulate',r:'라틴어 ad-(~에) + crescere(자라다) → 원금에 이자가 더해지며 자연스럽게 크기가 자라나 늘어나다 → (이자·이익이) 생기다'},
{n:1856,w:'offspring',m:'n. ① 자식, 자녀; 자손, 후예 ② 생겨난 것, 소산, 결과',s:'descendant, progeny / fruit, result',r:'영어 off(떨어져서) + spring(솟아나다) → 원래의 줄기나 조상으로부터 떨어져 솟아나온 새로운 생명 → 자식, 후예'},
{n:1857,w:'retaliate',m:'v. 보복하다, 앙갚음하다, 응수하다',s:'avenge, requite, revenge',r:'라틴어 re-(다시) + talis(같은 것) → 자신이 입은 피해나 고통과 똑같은 것을 상대에게 다시 갚아주다 → 보복하다, 앙갚음하다'},
{n:1858,w:'primary',m:'a. ① 첫째의, 제1의, 수위의, 주요한 ② 최초의, 처음의; 원시적인; 근본적인',s:'chief, major, principal / basic, essential, fundamental',r:'라틴어 primus(첫째의) + -ary(형용사 접미사) → 순서나 중요도가 가장 첫 번째 자리에 위치한 → 첫째의, 주요한, 근본적인'},
{n:1859,w:'somniloquy',m:'n. 잠꼬대(하는 버릇)',s:'sleep talking',r:'라틴어 somnus(잠) + loqui(말하다) → 잠든 상태에서 무의식적으로 자기도 모르게 중얼거리며 말하는 것 → 잠꼬대'},
{n:1860,w:'ghastly',m:'a. ① 무시무시한, 소름끼치는 ② 파랗게 질린, 송장 같은',s:'grisly, gruesome, hideous, horrible',r:'고대 영어 gast(유령, 영혼) → 공포로 인해 피가 빠져나가 죽은 유령처럼 몹시 창백하고 무서운 → 무시무시한, 파랗게 질린'},
{n:1861,w:'trammel',m:'n. 방해, 제약, 속박 / vt. 구속하다, 제한하다',s:'bond, chain, fetter, leash / fetter, hopple, restrict, tie',r:'라틴어 tri-(셋) + macula(그물코) → 세 겹으로 얽힌 고기잡이 그물처럼 옴짝달싹 못 하게 발목을 묶는 것 → 방해, 구속하다'},
{n:1862,w:'dispatch',m:'v. ① 급파하다; 발송하다 ② 신속히 해치우다 ③ 죽이다 / n. 급파; 급보; 신속한 처리',s:'expedite / destroy, eliminate / expedition; haste',r:'스페인어 despachar(서둘러 보내다) → 방해되는 일들을 재빨리 치워버리고 사람이나 문서를 서둘러 보내다 → 급파하다, 신속히 해치우다'},
{n:1863,w:'cant',m:'n. ① 위선적인 말투 ② 은어',s:'hypocritical statement / jargon, lingo',r:'라틴어 cantare(노래하다) → 거지들이 구걸할 때 동정을 사려고 슬프게 노래하듯 징징대는 말투 → 위선적인 말투, 은어'},
{n:1864,w:'blemish',m:'n. 흠, 오점, 결점 / vt. 더럽히다, 손상하다',s:'blot, defect, fault, flaw, stain, stigma, sully, taint, tarnish',r:'고대 프랑스어 bleme(창백한) → 매끄러운 표면에 상처나 얼룩이 생겨 망쳐짐 → 흠, 결점, 더럽히다'},
{n:1865,w:'ritual',m:'n. ① 의식, 예배식 ② 의식적 행사, 관례 / a. 의식의; 관습의',s:'ceremony, observance, rite, convention, custom, ceremonial, conventional',r:'라틴어 ritus(종교적 의식) + -al(형용사 접미사) → 성스러운 목적을 위해 정해진 규칙과 절차에 따라 엄숙히 행하는 것 → 의식, 관례'},
{n:1866,w:'incise',m:'vt. ① 새기다, 조각하다 ② 베다, 째다, 절개하다',s:'carve, engrave, cut, section',r:'라틴어 in-(안으로) + caedere(자르다) → 날카로운 조각칼이나 메스로 표면을 뚫고 안으로 깊이 파고들어 자르다 → 새기다, 절개하다'},
{n:1867,w:'edifice',m:'n. ① 건물, 건축물, 전당 ② 조직, 체계',s:'building, construction, structure, system',r:'라틴어 aedes(집, 신전) + facere(만들다) → 평범한 집이 아니라 중요 목적으로 거대하게 세운 훌륭한 건축물 → 대형 건물, 체계'},
{n:1868,w:'bamboozle',m:'v. ① 교묘한 말로 속이다 ② 당황하게[어리둥절하게] 하다',s:'deceive, trick, confuse, perplex',r:'어원 불명(18세기 영국 은어) → 순진한 사람의 혼을 쏙 빼놓아 이치에 맞지 않는 말로 교묘하게 속이다 → 속이다, 당황하게 하다'},
{n:1869,w:'monolithic',m:'a. ① 하나의 암석으로 된 ② 단일체의; 획일적이고 자유가 없는',s:'undiversified',r:'그리스어 monos(하나의) + lithos(돌) → 산처럼 거대한 하나의 돌덩이로 만들어져서 다양성이 없는 → 단일체의, 획일적인'},
{n:1870,w:'famine',m:'n. ① 기근; 흉작 ② 굶주림, 배고픔',s:'deprivation, hunger, starvation',r:'라틴어 fames(배고픔) + -ine(명사 접미사) → 넓은 지역의 사람들이 먹을 것이 없어 극심하게 굶주리는 상태 → 기근, 굶주림'},
{n:1871,w:'display',m:'v. ① 전시하다, 보이다 ② 올리다, 게양하다 / n. 전시, 진열; 드러냄',s:'exhibit, show, fly, hoist, unfurl',r:'라틴어 dis-(풀다) + plicare(접다) → 겹겹이 접혀 안 보이던 것을 활짝 펼쳐서 여러 사람의 눈에 띄게 보여주다 → 전시하다, 드러냄'},
{n:1872,w:'nosy',m:'a. 참견하기 좋아하는, 꼬치꼬치 캐묻는 / n. 참견하기 좋아하는 사람',s:'intrusive, meddlesome, backseat driver, busybody',r:'영어 nose(코) + -y(형용사 접미사) → 마치 개가 냄새를 맡듯 남의 일상에 킁킁거리며 코를 깊숙이 들이미는 → 참견하기 좋아하는'},
{n:1873,w:'efflorescence',m:'n. 개화; 개화기; 절정, 전성기',s:'anthesis, blossoming, flowering',r:'라틴어 ex-(밖으로) + flos(꽃) + -escence(상태) → 단단한 봉오리가 터지며 그 안에서 꽃잎이 활짝 피어남 → 개화, 전성기'},
{n:1874,w:'unleash',m:'vt. 풀어놓다; 해방하다; 폭발시키다',s:'unbind, unchain, release',r:'영어 un-(반대, 풀다) + leash(가죽끈) → 동물을 묶어두었던 목줄을 풀어 한껏 억눌린 힘을 분출하게 하다 → 풀어놓다, 폭발시키다'},
{n:1875,w:'trend',m:'n. 경향, 동향, 추세',s:'current, direction, temporary, tendency',r:'고대 영어 trendan(회전하다) → 강물이 굽이치며 일정한 방향으로 흐르는 물결이나 사람들의 생각이 쏠리는 방향 → 경향, 추세'},
{n:1876,w:'lascivious',m:'a. 음탕한, 호색의; 선정적인, 도발적인',s:'lecherous, lewd, libidinous, licentious, obscene',r:'라틴어 lascivus(장난치는, 방탕한) → 이성적 통제를 잃고 성적인 욕구나 쾌락을 마구잡이로 좇아 노는 → 음탕한, 선정적인'},
{n:1877,w:'exploit',m:'vt. ① 착취하다 ② 활용하다 ③ 개발하다 / n. 위업, 공적',s:'abuse, misuse, capitalize, use, utilize, develop, achievement, feat',r:'라틴어 ex-(밖으로) + plicare(접다) → 잠재력을 밖으로 펼쳐 위대한 업적을 이루다 / 남의 재능을 자기 이익을 위해 빼내다 → 착취하다, 위업'},
{n:1878,w:'contingent',m:'a. ① ~에 의존적인[on, upon] ② 우발적인, 우연의 / n. 대표단, 파견단',s:'conditional, dependent, accidental, casual, fortuitous',r:'라틴어 con-(함께) + tangere(만지다) → 두 가지 사건이 우연히 서로 맞닿은 일 / 어떤 조건에 닿아야만 일어나는 일 → 우발적인, ~에 의존적인'},
{n:1879,w:'frontispiece',m:'n. ① 권두 삽화; 속표지 ② 정면',s:'facade, face, front',r:'라틴어 frons(이마, 앞) + specere(보다) → 책 껍데기를 넘겼을 때 가장 먼저 정면에서 보게 되는 첫 페이지의 그림 → 권두 삽화, 정면'},
{n:1880,w:'wreak',m:'vt. ① (해별 등을) 가하다, 주다 ② (분노를) 터뜨리다',s:'inflict, unleash, vent',r:'고대 영어 wrecan(내쫓다, 복수하다) → 마음속에 쌓여 있던 억눌린 분노나 해악을 밖으로 무자비하게 쏟아내다 → 가하다, (분노를) 터뜨리다'},
{n:1881,w:'defendant',m:'n. 피고, 피고인',s:'respondent',r:'라틴어 de-(아래로) + fendere(치다, 방어하다) → 소송을 당해 쏟아지는 비난을 법정에서 방어막을 쳐 막아내는 사람 → 피고'},
{n:1882,w:'comport',m:'vt. <재귀용법> 행동[처신]하다',s:'behave, conduct',r:'라틴어 com-(함께) + portare(나르다) → 상황과 예의에 맞게 자신의 행동거지를 스스로 잘 이끌고 다니는 것 → 행동하다, 처신하다'},
{n:1883,w:'runaway',m:'a. ① 달아난, 가출한 ② 제어가 안 되는 ③ 일방적인, 낙승한 / n. ① 도망자 ② 일방적인 승리',s:'escaped, fleeing, fugitive, uncontrolled, unmanageable, easy, effortless, absconder, escapee, refugee, blowout, sweep, walkaway, walkover',r:'영어 run(달리다) + away(멀리) → 주인이나 통제를 벗어나 멀리 도망쳐 나가거나 상대가 손쓸 수 없을 정도로 압도하는 승리 → 달아난, 일방적인'},
{n:1884,w:'antecedent',m:'n. ① 선례, 전례 ② (pl.) 조상, 선조 ③ 전력, 경력 / a. 선행하는, 우선하는[to]',s:'forerunner, precursor, former, preceding',r:'라틴어 ante-(앞에) + cedere(가다) → 시간상으로 다른 사건들보다 먼저 앞으로 지나가서 기준이나 뿌리가 된 것 → 선행하는, 선례, 조상'},
{n:1885,w:'vegetarian',m:'n. 채식주의자; 초식 동물 / a. 채식의, 채식주의자의',s:'herbivore',r:'영어 vegetable(채소) + -arian(사람) → 고기를 피하고 오직 채소만 먹는 식습관을 가진 사람이나 초식 동물 → 채식주의자, 초식 동물'},
{n:1886,w:'inhale',m:'v. (공기 등을) 빨아들이다, 흡입하다',s:'breathe in, sniff, take a breath',r:'라틴어 in-(안으로) + halare(숨 쉬다) → 바깥의 신선한 공기나 연기를 폐의 깊숙한 안쪽으로 깊이 들이마시다 → 빨아들이다, 흡입하다'},
{n:1887,w:'brick-and-mortar',m:'a. 오프라인 거래의; 소매의',s:'off-line, retail, shoppy',r:'영어 brick(벽돌) + mortar(시멘트) → 인터넷 가상 공간이 아닌 실제 벽돌과 시멘트를 발라 지은 물리적 상점 → 오프라인 거래의'},
{n:1888,w:'smother',m:'v. ① 질식시키다, 숨 막히게 하다 ② (감정 등을) 억누르다, 억제하다',s:'choke, stifle, strangle, suffocate, quash, repress, subdue, suppress',r:'고대 영어 smorian(숨을 막다) → 두꺼운 이불로 덮거나 연기를 피워 숨을 쉴 수 없게 억누르고 질식시키다 → 질식시키다, 억누르다'},
{n:1889,w:'climax',m:'n. 최고조, 절정; 정점, 극점',s:'acme, culmination, peak, summit, zenith',r:'그리스어 klimax(사다리) → 사다리의 계단을 차례로 밟고 올라가 닿은 맨 꼭대기의 가장 극적인 전개 상태 → 최고조, 절정'},
{n:1890,w:'gravitate',m:'v. ① 중력[인력]에 끌리다; 가라앉다 ② 자연히 끌리다',s:'drop, fall, settle, sink, be drawn, incline, lean, tend',r:'라틴어 gravitas(무거움) → 물체가 자체의 무거운 질량 때문에 지구 중심축을 향해 자연스럽게 끌려 떨어지다 → 중력에 끌리다, 자연히 끌리다'},
{n:1891,w:'archery',m:'n. 궁술, 양궁(술)',s:'',r:'라틴어 arcus(활) + -ery(기술) → 활에 화살을 메기고 팽팽하게 당겨 멀리 있는 표적을 정확히 맞히는 무술 → 궁술, 양궁'},
{n:1892,w:'complex',m:'a. ① 복잡한, 뒤얽힌 ② 복합의, 합성의 / n. ① 대형 아파트; 종합 빌딩 ② 콤플렉스',s:'complicated, convoluted, intricate, composite, compound',r:'라틴어 com-(함께) + plectere(엮다) → 너무 많은 요소가 한데 얽히고설켜 떼어내기 힘들 만큼 복잡해진 상태 → 복잡한, 콤플렉스'},
{n:1893,w:'purport',m:'n. ① 요지, 취지 ② 목적 / vt. ① 칭하다, 주장하다 ② 의도하다, 꾀하다',s:'meaning, allege, claim, aim, propose, purpose',r:'고대 프랑스어 por-(앞으로) + porter(나르다) → 자신의 숨겨둔 진짜 의도나 주장을 상대의 눈앞으로 끄집어내어 내놓다 → 요지, 주장하다'},
{n:1894,w:'overrate',m:'vt. 과대평가하다',s:'exaggerate, overestimate, overvalue',r:'영어 over(지나치게) + rate(평가하다) → 그 사람이나 물건이 가진 실제 가치나 능력을 훨씬 뛰어넘어 점수를 매기다 → 과대평가하다'},
{n:1895,w:'husbandry',m:'n. ① 농업, 경작; 축산 ② 검약, 절약',s:'agriculture, cultivation, farming, stockbreeding, economy, frugality, thrift',r:'영어 husband(농부, 집안의 기둥) + -ry → 한 가정의 주인이 집안 살림을 알뜰하게 아껴 쓰고 땅을 정성껏 가꾸는 기술 → 농업, 절약'},
{n:1896,w:'forfeit',m:'vt. 잃다, 상실하다, 몰수당하다 / n. 벌금; 몰수품; 상실',s:'be_deprived_of, lose, fine, mulct',r:'고대 프랑스어 forfaire(범죄를 저지르다) → 법이나 규칙을 심하게 어겨서 자격을 박탈당하고 특권을 빼앗기는 상태 → 상실하다, 벌금'},
{n:1897,w:'derelict',m:'a. ① 버려진, 유기된 ② 직무에 태만한 / n. ① 낙오자, 부랑자 ② 직무 태만자',s:'abandoned, deserted, forsaken, delinquent, neglectful, negligent, remiss, dropout, hobo, stragger, vagrant',r:'라틴어 de-(완전히) + re-(뒤에) + linquere(남기다) → 챙기지 않고 뒤에 완전히 남겨두어 쓸쓸하게 방치된 건물이나 직무 태만자 → 유기된, 직무 태만자'},
{n:1898,w:'symbiosis',m:'n. 공생(共生); 상호의존관계',s:'cohabitation, interdependence, mutualism',r:'그리스어 syn-(함께) + bios(생명) + -osis → 자연계에서 이질적인 두 생물이 서로에게 이익을 주며 한데 어울려 살아가는 현상 → 공생, 상호의존관계'},
{n:1899,w:'precipitate',m:'v. ① 촉진시키다, 몰아가다 ② 거꾸로 떨어뜨리다 ③ 치닫게 하다 / a. ① 다급한, 경솔한 ② 느닷없는',s:'hasty, rash, abrupt, sudden',r:'라틴어 prae-(앞으로) + caput(머리) → 높은 곳에서 머리부터 거꾸로 곤두박질치듯 앞뒤 안 가리고 위험하게 덤벼들다 → 촉진시키다, 성급한'},
{n:1900,w:'migraine',m:'n. 편두통',s:'hemicrania, megrim',r:'그리스어 hemi-(절반) + kranion(두개골) → 뇌혈관 문제로 인해 머리통의 어느 한쪽 절반만 맥박이 뛰듯 지끈거리며 아픈 병 → 편두통'},
{n:1901,w:'erudite',m:'a. 박식한, 학식 있는',s:'knowledgeable, learned, scholarly',r:'라틴어 ex-(밖으로) + rudis(거친, 무식한) → 배움을 통해 거칠고 무식한 상태에서 벗어나 지식을 갖춘 → 박식한, 학식 있는'},
{n:1902,w:'dissolve',m:'v. ① 녹이다, 용해시키다 ② 분해시키다 ③ 해산시키다 ④ 해소하다',s:'liquefy, melt, thaw, decompose, disintegrate, disband, disperse',r:'라틴어 dis-(떨어져) + solvere(풀다) → 단단하게 뭉쳐 있던 물질이나 조직이 풀려 흩어져 사라지다 → 녹이다, 해산시키다'},
{n:1903,w:'ratio',m:'n. 비율, 비(比)',s:'proportion, rate',r:'라틴어 reri(생각하다, 계산하다) → 두 가지 양이나 수를 비교하고 계산하여 얻어낸 관계값 → 비율, 비'},
{n:1904,w:'succulent',m:'a. ① 즙이 많은 ② 다육의, 다육성의 / n. 다즙 식물',s:'juicy, pulpy, succose',r:'라틴어 sucus(즙, 액체) + -ulent(가득한) → 과일이나 식물의 잎 속에 물기가 터질 듯이 가득 찬 → 즙이 많은, 다육의'},
{n:1905,w:'appeal',m:'v. ① 호소하다, 간청하다[to] ② 상소[항소]하다 ③ 관심[흥미]을 끌다 / n. ① 호소 ② 상소 ③ 매력',s:'beg, entreat, implore, plead, attract, charm, enchant, fascinate',r:'라틴어 ad-(~로) + pellare(밀다) → 사람들의 마음이나 판사에게 억울함을 강하게 밀어붙여 호소하다 → 호소하다, 매력'},
{n:1906,w:'connivance',m:'n. ① 못 본 체하기, 묵인, 방조 ② 공모(共謀)',s:'tacit approval, collusion, conspiracy, intrigue, plot',r:'라틴어 con-(함께) + nivere(눈을 감다) → 남의 나쁜 짓을 보고도 공모한 것처럼 못 본 체 눈감아 줌 → 묵인, 공모'},
{n:1907,w:'phlegmatic',m:'a. ① 점액질의 ② 냉담한, 냉정한, 침착한',s:'apathetic, cold, unemotional',r:'그리스어 phlegma(점액, 열) + -atic → 고대 의학에서 점액이 많아 감정 변화가 없고 둔감하다고 여겨진 기질의 → 점액질의, 냉담한'},
{n:1908,w:'herald',m:'vt. ① 알리다, 포고하다 ② 안내[선도]하다 / n. ① 선구자 ② 전달자, 전령',s:'announce, declare, usher in, messenger',r:'고대 프랑스어 heraut(전령) → 군대나 군주 앞에서 중요한 사건을 나팔을 불며 널리 알리는 사람 → 포고하다, 선구자'},
{n:1909,w:'balmy',m:'a. ① 온화한, 아늑한 ② 향기로운, 방향성(芳香性)의',s:'mild, temperate, aromatic, fragrant, redolent',r:'라틴어 balsamum(향유) + -y → 발삼 향나무의 진액처럼 향기롭고 부드러우며 상처를 달래주는 듯한 → 온화한, 향기로운'},
{n:1910,w:'revolt',m:'n. ① 반란, 폭동 ② 혐오감, 반감 / v. ① 반란을 일으키다 ② 비위에 거스르다',s:'insurrection, mutiny, rebellion, uprising, dislike, distaste, repulsion, revulsion, rebel, resist',r:'라틴어 re-(뒤로, 반대로) + volvere(구르다) → 기존의 지배 체제나 마음에 안 드는 상황을 거꾸로 뒤집어엎으려 하다 → 반란, 혐오감'},
{n:1911,w:'inure',m:'v. (어려움 등에) 익숙하게 하다, 단련하다[to]',s:'accustom, habituate',r:'라틴어 in-(안으로) + 프랑스어 euvre(일) → 거칠고 힘든 일의 환경 안으로 계속 들어가 마침내 익숙해지다 → 단련하다, 익숙하게 하다'},
{n:1912,w:'copyright',m:'n. 저작권, 판권 / vt. ~의 판권을 얻다',s:'',r:'영어 copy(복제) + right(권리) → 자신이 창작한 작품을 다른 사람이 함부로 복제하지 못하게 막는 독점적 권리 → 저작권, 판권을 얻다'},
{n:1913,w:'presentiment',m:'n. 예감, 육감',s:'foreboding, presage',r:'라틴어 prae-(미리) + sentire(느끼다) → 어떤 일이 실제로 일어나기 전에 불길한 느낌을 마음속으로 먼저 느끼다 → 예감, 육감'},
{n:1914,w:'fluorescent',m:'a. ① 형광을 발하는, 형광성의 ② 아주 밝은, 선명한',s:'beaming, glowing, luminous',r:'라틴어 fluere(흐르다) + -escent(발생하는) → 형석(fluorite)이 빛을 내듯 어둠 속에서도 스스로 환하게 빛을 뿜어내는 → 형광성의, 선명한'},
{n:1915,w:'abrasive',m:'n. 연마제 / a. ① 연마제의 ② 신경에 거슬리는',s:'abradant, grating, jarring, nerve-racking, offensive',r:'라틴어 ab-(떨어져) + radere(긁다) → 표면을 긁어내 마모시키거나 남의 신경을 거슬리게 긁는 → 연마제의, 신경에 거슬리는'},
{n:1916,w:'lionize',m:'v. 치켜세우다, 떠받들다, 명사 취급하다',s:'celebrate, eulogize, exalt, glorify, idolize',r:'영어 lion(사자) + -ize(동사) → 런던 탑의 사자들처럼 희귀하고 유명한 명물로 만들어 떠받들다 → 치켜세우다, 명사 취급하다'},
{n:1917,w:'testament',m:'n. ① 유언, 유서 ② 계약, 성약 ③ 입증, 증거',s:'will',r:'라틴어 testari(증언하다) + -ment(명사) → 법적인 구속력을 가지고 죽기 전에 남기는 증언서나 계약 → 유언, 성약'},
{n:1918,w:'off-the-cuff',m:'a. ad. 즉석의[에서], 준비 없는[없이]',s:'extemporaneous, impromptu',r:'영어 off(벗어난) + the + cuff(소매) → 소매에 적어둔 메모조차 없이 즉석에서 말이 나오는 → 즉석의, 준비 없는'},
{n:1919,w:'moor',m:'n. 황무지, 황야 / v. 정박시키다, 매어두다',s:'heath, wasteland, wilderness, wildland, anchor, berth, dock, secure',r:'고대 영어 mor(황무지) / 중세 네덜란드어 maren(묶다) → 거친 풀만 자라는 버려진 땅 / 배를 밧줄로 단단히 묶다 → 황무지, 정박시키다'},
{n:1920,w:'fiendish',m:'a. ① 악마 같은; 극악무도한 ② 아주 험악한',s:'devilish, diabolical, wicked',r:'고대 영어 feond(악마) + -ish → 인간의 마음이 아니라 악마에게 씌운 것처럼 잔인하고 흉악한 → 악마 같은, 험악한'},
{n:1921,w:'describe',m:'vt. ① 묘사하다, 설명하다 ② 말하다, 평하다 ③ 그리다',s:'',r:'라틴어 de-(아래로, 완전히) + scribere(쓰다) → 종이 위에 사물의 모습이나 상황을 세밀하게 글로 써서 그려내다 → 묘사하다, 그리다'},
{n:1922,w:'garbage',m:'n. 쓰레기, 음식 찌꺼기, 잔반; 폐기물',s:'junk, rubbish, trash',r:'어원 불명(중세 프랑스어 garbel 쓰레기 추정) → 부엌이나 공장에서 나오는 더러운 찌꺼기나 못 쓰게 된 물건 → 쓰레기, 폐기물'},
{n:1923,w:'scorch',m:'v. ① 그을리다, 눋게 하다 ② 시들게 하다 ③ 호되게 헐뜯다',s:'burn, char, sear, parch, shrivel, wither, berate, revile',r:'어원 불명(고대 노르드어 skorpna 시들다 추정) → 뜨거운 불이나 햇볕에 닿아 표면이 까맣게 타고 바짝 마르다 → 그을리다, 헐뜯다'},
{n:1924,w:'emolument',m:'n. 급료, 봉급, 수당; 보수',s:'compensation, payment, returns, salary, profit',r:'라틴어 ex-(밖으로) + molere(갈다) → 맷돌로 곡식을 빻은 수고의 대가로 받는 몫이나 돈 → 급료, 보수'},
{n:1925,w:'jocular',m:'a. 익살맞은, 유머러스한, 웃기는',s:'facetious, humorous, joking',r:'라틴어 jocus(농담) + -ular(형용사) → 심각한 상황에서도 사람들을 웃기려고 우스꽝스러운 말이나 행동을 하는 → 익살맞은'},
{n:1926,w:'confabulate',m:'vi. ① 담소하다, 잡담하다 ② 꾸민 이야기를 하다',s:'chat, chitchat, small-talk',r:'라틴어 con-(함께) + fabulari(말하다) → 딱딱한 격식 없이 가까운 사람들끼리 모여 가볍고 편안하게 수다를 떨다 → 담소하다'},
{n:1927,w:'vestige',m:'n. ① 자취, 흔적 ② 아주 조금',s:'sign, trace',r:'라틴어 vestigium(발자국) → 오래전에 존재했던 것이 사라진 뒤 땅이나 기억에 희미하게 남은 발자국 → 자취, 흔적'},
{n:1928,w:'noncommittal',m:'a. 언질을 주지 않는; 애매한',s:'ambiguous, equivocal, vague',r:'라틴어 non-(not) + con-(함께) + mittere(보내다) → 확실한 약속이나 입장을 함께 던지지 않고 회피하는 → 언질을 주지 않는'},
{n:1929,w:'dissent',m:'n. 불찬성, 의견 차이, 이의 / vi. 의견을 달리하다, 이의를 말하다',s:'disagreement, objection, protest, demur, disagree',r:'라틴어 dis-(다르게) + sentire(느끼다) → 대다수의 의견에 동의하지 않고 마음속으로 다르게 느끼다 → 불찬성, 의견을 달리하다'},
{n:1930,w:'excruciate',m:'vt. 몹시 고통을 주다, 고문하다; 괴롭히다',s:'agonize, torment, torture, afflict',r:'라틴어 ex-(밖으로, 매우) + cruciare(십자가에 못 박다) → 십자가에 매달린 것처럼 육체와 정신에 끔찍한 고통을 가하다 → 고문하다, 괴롭히다'},
{n:1931,w:'indebted',m:'a. ① 신세를 진; 고마워하는 ② 빚이 있는, 부채가 있는',s:'',r:'라틴어 in-(안으로) + debere(빚지다) → 남에게 큰 도움이나 돈을 받아 빚의 굴레 안에 깊이 묶인 상태의 → 신세를 진, 빚이 있는'},
{n:1932,w:'clamp',m:'n. ① 죔쇠 ② 집게 / vt. ① 고정시키다 ② 강제로 시키다',s:'clasp, fastener, vise, clampers, nippers, tongs, brace, fasten, fix, coerce, compel, force',r:'중세 네덜란드어 klampe(집게) → 움직이지 못하도록 두 물건을 집게로 꽉 물어 고정하거나 강요하다 → 죔쇠, 고정시키다'},
{n:1933,w:'sidereal',m:'a. 별의, 항성(恒星)의, 별자리의',s:'astral, stellar',r:'라틴어 sidus(별) + -eal(형용사) → 밤하늘에 반짝이는 수많은 별들과 우주 공간에 관련된 → 별의, 항성의'},
{n:1934,w:'folly',m:'n. 어리석음; 어리석은 행동[생각]',s:'absurdity, silliness, stupidity',r:'고대 프랑스어 folie(광기) → 이성적 판단을 잃고 어리석은 생각에 빠져 우스꽝스러운 짓을 함 → 어리석음'},
{n:1935,w:'roundabout',m:'a. 에두르는, 완곡한, 간접적인 / n. 원형 교차로, 로터리',s:'circuitous, indirect, tortuous, rotary, traffic circle',r:'영어 round(둥글게) + about(주위에) → 목적지를 향해 곧장 가지 않고 빙 둘러서 가는 길이나 방법 → 에두르는, 완곡한, 로터리'},
{n:1936,w:'conclave',m:'n. ① 교황 선거 비밀회의(장소); 추기경단 ② 비밀회의',s:'',r:'라틴어 con-(함께) + clavis(열쇠) → 방안에 모여 문을 자물쇠로 잠그고 외부와 차단한 채 여는 회의 → 교황 선거 비밀회의'},
{n:1937,w:'whirl',m:'v. ① 빙빙 돌다, 회전하다 ② 혼란스럽다 / n. ① 회전, 선회 ② 혼란',s:'gyrate, revolve, rotate, spin, swirl, reel, gyration, revolution, rotation, twirl, confusion, daze, dither, giddiness',r:'고대 노르드어 hvirfla(돌다) → 팽이나 바람이 정신을 차릴 수 없을 정도로 빠르고 어지럽게 도는 현상 → 빙빙 돌다, 혼란'},
{n:1938,w:'bluff',m:'n. ① 허세, 엄포 ② 절벽 / v. 허세를 부리다 / a. 절벽의; 무뚝뚝한',s:'bluster, bravado, fanfaronade, lifemanship, pretension, cliff, escarpment, precipice, promontory, flat-hat, four-flush, swashbuckle, vapor, blunt, brusque',r:'네덜란드어 bluffen(뽐내다) → 자신이 가진 패가 나쁨에도 좋은 척 상대를 속여 기를 죽이거나 깎아지른 벼랑 → 허세, 절벽'},
{n:1939,w:'oculist',m:'n. 안과 의사',s:'ophthalmologist',r:'라틴어 oculus(눈) + -ist(사람) → 사람의 눈에 생기는 각종 질환을 진단하고 치료하는 전문가 → 안과 의사'},
{n:1940,w:'multitude',m:'n. ① 아주 많은 수, 다수 ② 일반 대중, 군중',s:'army, great number, horde, host, legion, assembled, crowd, mass, mob, throng',r:'라틴어 multus(많은) + -tude(명사) → 셀 수 없이 수많은 사람이나 물건이 거대하게 떼를 지어 모인 집단 → 아주 많은 수, 군중'},
{n:1941,w:'authoritarian',m:'a. 권위주의적인, 독재적인 / n. 권위[독재]주의자',s:'autocratic, dictatorial, autocrat, dictator',r:'라틴어 auctoritas(권력) + -arian → 개인의 자유를 억누르고 국가나 지도자의 절대적 권력에 복종하게 하는 → 권위주의적인, 독재자'},
{n:1942,w:'enliven',m:'vt. ① 활기 띠게 하다, 생기가 넘치게 하다 ② 유쾌하게 하다',s:'inspirit, stimulate, vivify, cheer, sweeten',r:'영어 en-(안에) + life(생명) + -en → 무겁고 침울한 분위기 속에 활기찬 생명력을 불어넣어 깨어나게 하다 → 활기 띠게 하다'},
{n:1943,w:'linear',m:'a. 선형의, 직선 모양의, 1차원의',s:'',r:'라틴어 linea(선) + -ar(형용사) → 점들이 구부러지지 않고 하나의 똑바른 직선 모양으로 쭉 이어진 → 선형의, 1차원의'},
{n:1944,w:'turnout',m:'n. ① 집합, 참석 수 ② 투표율 ③ 생산액, 산출고',s:'assembly, attendance, output, production, yield',r:'영어 turn(돌다) + out(밖으로) → 집 밖으로 나와 모임이나 투표소에 출석한 사람들의 숫자나 공장에서 나온 생산량 → 참석 수, 투표율'},
{n:1945,w:'inseparable',m:'a. 분리할 수 없는; 불가분의',s:'indivisible, inseverable',r:'라틴어 in-(not) + separare(분리하다) + -able → 두 사물이나 관계가 너무 끈끈하게 결합되어 떼어놓을 수 없는 → 분리할 수 없는'},
{n:1946,w:'derivative',m:'a. 파생적인 / n. 파생물; 금융 파생 상품',s:'secondary, spin-off, unoriginal',r:'라틴어 de-(아래로) + rivus(강) + -ative → 원래의 근원에서부터 강물처럼 아래로 흘러나와 파생된 것 → 파생적인, 파생물'},
{n:1947,w:'protract',m:'vt. 오래 끌게 하다, 연장하다',s:'extend, prolong',r:'라틴어 pro-(앞으로) + trahere(끌다) → 끝나야 할 시간이나 거리를 앞쪽으로 질질 끌어서 길게 늘리다 → 오래 끌게 하다, 연장하다'},
{n:1948,w:'buxom',m:'a. 포동포동한, 가슴이 풍만한; 쾌활하고 건강한',s:'busty, plump, healthy, cheerful',r:'중세 영어 buhsum(유연한, 순종적인) → 건강하고 활력이 넘쳐 여자의 가슴이나 몸집이 보기 좋게 통통한 → 포동포동한'},
{n:1949,w:'stake',m:'n. ① 상금, 내기에 건 돈 ② 이해관계 ③ 말뚝, 막대기',s:'bet, wager, interests, involvement, pole, stick',r:'고대 영어 staca(말뚝) → 말뚝을 박아 영역을 표시하거나 경마에서 말뚝에 건 돈에서 유래 → 상금, 이해관계, 말뚝'},
{n:1950,w:'cumbersome',m:'a. 성가신, 부담이 되는, 방해가 되는, 다루기 힘든',s:'budensome, unwieldy',r:'고대 프랑스어 encombrer(방해하다) + -some → 너무 크거나 무거워서 다루기 힘들고 행동에 짐이 되는 → 성가신, 다루기 힘든'},
{n:1951,w:'assiduous',m:'a. 근면 성실한, 지칠 줄 모르는',s:'diligent, hard-working, industrious, sedulous',r:'라틴어 ad-(~에) + sedere(앉다) → 어떤 일에 착 달라붙어 엉덩이를 떼지 않고 꾸준하게 몰두하는 → 근면 성실한'},
{n:1952,w:'presume',m:'v. ① 가정[추정]하다 ② 추정하다 ③ 감히 ~하다',s:'guess, suppose, think, dare',r:'라틴어 prae-(미리) + sumere(취하다) → 확실한 증거가 나오기 전에 머릿속으로 미리 사실일 것이라 짐작하여 취하다 → 가정하다'},
{n:1953,w:'behalf',m:'n. ① 측(側), 편 ② 이익, 이로움',s:'side, benefit, interest, sake',r:'고대 영어 be(곁에) + healf(쪽) → 상대방의 옆에 서서 그 사람을 위해 이익을 대변하는 입장이나 위치 → 측, 이익'},
{n:1954,w:'imbroglio',m:'n. ① 복잡한 사태, 난국 ② 복잡한 줄거리',s:'complication, entanglement, quandary',r:'이탈리아어 imbrogliare(엉클어지다) → 실타래가 꼬이듯 정치나 외교적 상황이 복잡하고 난처하게 얽힌 사태 → 복잡한 사태'},
{n:1955,w:'credulous',m:'a. 쉽사리 믿는, 잘 속는',s:'gullible, naive',r:'라틴어 credere(믿다) + -ulous → 비판적 생각 없이 남의 말을 너무 쉽게 믿어버려 속기 쉬운 성격의 → 쉽사리 믿는'},
{n:1956,w:'eschew',m:'vt. 피하다, 삼가다',s:'avoid, forbear, refrain, shun',r:'고대 프랑스어 eschiver(피하다) → 나쁜 행동이나 해로운 음식 등을 의도적으로 멀리하고 피하다 → 피하다, 삼가다'},
{n:1957,w:'spouse',m:'n. 배우자',s:'mate, partner, significant other',r:'라틴어 sponsus(약속된 사람) → 결혼이라는 공식적인 서약을 맺고 남은 평생을 함께하기로 한 짝 → 배우자'},
{n:1958,w:'dissonant',m:'a. 귀에 거슬리는, 불협화음의, 조화되지 않은',s:'cacophonous, discordant, strident',r:'라틴어 dis-(따로) + sonare(소리 나다) → 여러 악기 소리가 서로 어울리지 못하고 불쾌하게 찢어지는 소리가 나는 → 귀에 거슬리는'},
{n:1959,w:'augment',m:'v. 늘리다, 늘다, 증가시키다',s:'increase',r:'라틴어 augere(증가시키다) → 기존의 크기, 양, 가치 등에 무언가를 더 보태어 더 크고 많게 만들다 → 늘리다, 증가시키다'},
{n:1960,w:'curriculum',m:'n. 커리큘럼, 교과 과정; 이수 과정; 전반적 학교 교육',s:'',r:'라틴어 currere(달리다) → 경기장의 달리기 코스처럼 학생들이 학교에서 순서대로 밟고 지나가야 하는 학습 과정 → 교과 과정'},
{n:1961,w:'virulent',m:'a. ① (질병·독극물이) 악성의, 치명적인, 맹독의 ② 악의가 있는; 매서운, 신랄한',s:'deadly, lethal, pernicious, spiteful, bitter',r:'라틴어 virus(독) + -ulent(가득한) → 몸이나 마음에 치명적인 해를 입히는 무서운 독기가 가득 찬 → 악성의, 치명적인, 신랄한'},
{n:1962,w:'skid',m:'v. (자동차 가) 미끄러지다; 옆으로 미끄러지다 / n. (자동차 가) 옆으로 미끄러지기; 활주부',s:'glide, slide, slip, slither',r:'어원 불명 (고대 노르드어 skíth 장작 추정) → 자동차 바퀴가 눈길이나 빙판 위에서 통제력을 잃고 옆으로 휙 미끄러짐 → 미끄러지다'},
{n:1963,w:'benediction',m:'n. ① 축복 ② 감사의 기도, (예배 후의) 축복 기도',s:'blessing',r:'라틴어 bene(좋게) + dicere(말하다) + -tion → 예배가 끝난 뒤 신이 좋은 말로 은혜를 내려주기를 비는 것 → 축복, 축복 기도'},
{n:1964,w:'maroon',m:'v. (섬 같은 곳에) 고립시키다, 가두다 / n. 고홍색, 적갈색, 밤색',s:'abandon, isolate, strand',r:'프랑스어 marron(야생으로 돌아간 흑인 노예, 밤색) → 무인도 같은 험한 곳에 홀로 내버려두다 / 어두운 적갈색 → 고립시키다 / 적갈색'},
{n:1965,w:'proximity',m:'n. (거리·시간상으로) 가까움, 근접',s:'contiguity, nearness',r:'라틴어 proximus(가장 가까운) + -ity → 거리, 시간, 또는 혈연적으로 사이에 틈이 없이 아주 닿을 듯 가까움 → 가까움, 근접'},
{n:1966,w:'cleave',m:'v. ① 쪼개다, 가르다 ② 착 달라붙다; (주의 등을) 고수하다[to]',s:'divide, split, adhere, cling, stick',r:'고대 영어 cleofan(쪼개다) / clifian(달라붙다) → 도끼로 나무를 둘로 쫙 가르다 / 한 덩어리처럼 끈끈하게 착 달라붙다 → 쪼개다 / 고수하다'},
{n:1967,w:'acronym',m:'n. 두문자어(頭文字語), 머리글자어',s:'',r:'그리스어 akron(끝, 머리) + onuma(이름) → 여러 단어로 된 긴 이름의 첫 글자들만 따서 모아 만든 새 단어 → 두문자어'},
{n:1968,w:'stark',m:'a. ① (아무 색채나 장식이 없어) 삭막한, 황량한 ② (현실·선택 등이) 엄연한, 가혹한 ③ (차이가) 극명한 ④ 완전한, 순전한',s:'',r:'고대 영어 stearc(단단한, 뻣뻣한) → 장식이나 속임수가 전혀 없어 현실의 삭막하고 뼈아픈 민낯이 그대로 드러난 → 삭막한, 가혹한, 순전한'},
{n:1969,w:'relative',m:'n. 친척, 인척, 일가; 동족, 동류 / a. ① (고려·판단이) 비교상의, 상대적인 ② (~와) 관련된, (~에) 대한[to] ③ (~에) 호응하는, 비례하는[to]',s:'',r:'라틴어 re-(다시, 뒤로) + ferre(나르다) → 서로서로 피를 나누며 연결되어 있거나 다른 것과 맞대어 비교해 보았을 때의 → 친척, 상대적인'},
{n:1970,w:'desuetude',m:'n. 폐지(상태), 불용(不用), 쓰이지 않음',s:'disuse, obsoletism',r:'라틴어 de-(완전히) + suescere(익숙해지다) → 과거에는 널리 쓰였으나 이제는 사람들의 기억에서 지워져 더 이상 쓰이지 않음 → 폐지(상태), 불용'},
{n:1971,w:'flee',m:'v. 달아나다, 도망하다; 피하다',s:'escape, fly, run away',r:'고대 영어 fleon(도망치다) → 다가오는 위협이나 붙잡힐 위기에서 벗어나려고 바람처럼 빠르게 뒤도 안 돌아보고 달아남 → 달아나다, 피하다'},
{n:1972,w:'toilsome',m:'a. (생활·등산·여행 등이) 고생스러운, 힘든',s:'arduous, burdensome, laborious, strenuous, taxing',r:'고대 프랑스어 toillier(싸우다, 수고하다) + -some → 뼈 빠지게 고생해야 간신히 마칠 수 있을 만큼 몹시 힘들고 고단한 → 고생스러운, 힘든'},
{n:1973,w:'gentile',m:'n. (유대인의 입장에서) 이방인(특히, 기독교도) / a. 유대인이 아닌, (특히) 기독교도의',s:'heathen, infidel',r:'라틴어 gentilis(같은 씨족의) → 이스라엘 민족의 입장에서 유대교를 믿지 않는 다른 종족이나 이방인 → 이방인, 기독교도의'},
{n:1974,w:'provocative',m:'a. ① 성나게 하는; (말·태도 등이) 도발적인, 자극적인 ② (식욕·성욕을) 자극하는; 흥분성의 ③ 물의를 일으키는, 문제가 되는',s:'offensive, stimulating',r:'라틴어 pro-(앞으로) + vocare(부르다) → 사람의 감정이나 성욕을 앞으로 불러내어 발끈하게 하거나 자극하는 → 도발적인, 자극적인'},
{n:1975,w:'ruminate',m:'v. ① 심사숙고하다, 곰곰이 생각하다 ② (소 등이) 반추하다, 위에서 되돌려 씹다, 되새김질하다',s:'contemplate, meditate, muse, ponder',r:'라틴어 ruminare(새김질하다) → 소가 먹이를 다시 게워내어 여러 번 씹듯이 어떤 생각을 마음속에서 깊이 되새기다 → 심사숙고하다, 반추하다'},
{n:1976,w:'corsair',m:'n. ① 사포선(私捕船) ② 해적; 해적선',s:'privateer, buccaneer, pirate, picaroon',r:'고대 프랑스어 corsaire(해적) → 국가의 허락을 받고 적국의 배를 합법적으로 털던 사포선이나 지중해의 해적 → 사포선, 해적'},
{n:1977,w:'liaison',m:'n. ① (군사) 연락, 통신 ② (두 집단·조직 간의) 연락 담당자, 연락원, 연락책 ③ (배우자가 아닌 사람과의) 정사, 간통, 밀통',s:'communication, connection, contact, messenger, adultery, amour, fornication, intrigue',r:'고대 프랑스어 lier(묶다) → 군대나 두 집단 사이를 묶어서 소통하게 해주는 연결망이나 남녀 간의 비밀스러운 정사 → 연락 담당자, 정사'},

let currentSet=[],idx=0,isFlipped=false;
function loadSet(setNum){
  setNum=parseInt(setNum);
  const s=(setNum-1)*20;
  currentSet=WORDS.slice(s,s+20);
  idx=0;isFlipped=false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('setInfo').textContent=`세트 ${setNum} — ${currentSet[0].n}번~${currentSet[currentSet.length-1].n}번`;
  render();
}
function shuffle(){currentSet=currentSet.sort(()=>Math.random()-.5);idx=0;isFlipped=false;document.getElementById('card').classList.remove('flipped');render();}
function resetSet(){loadSet(document.getElementById('setSelect').value);}
function render(){
  const w=currentSet[idx];
  document.getElementById('num').textContent=`#${w.n}`;
  document.getElementById('num2').textContent=`#${w.n}`;
  document.getElementById('word').textContent=w.w;
  document.getElementById('meaning').textContent=w.m||'(뜻 없음)';
  document.getElementById('syn').textContent=w.s?'동의어: '+w.s:'';
  document.getElementById('root').textContent=w.r?'어원: '+w.r:'';
  document.getElementById('cnt').textContent=`${idx+1} / ${currentSet.length}`;
  document.getElementById('progress').textContent=`진행: ${idx+1}/${currentSet.length} (${Math.round((idx+1)/currentSet.length*100)}%)`;
  isFlipped=false;document.getElementById('card').classList.remove('flipped');
}
function flipCard(){isFlipped=!isFlipped;document.getElementById('card').classList.toggle('flipped');}
function next(){if(idx<currentSet.length-1){idx++;render();}}
function prev(){if(idx>0){idx--;render();}}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')next();
  else if(e.key==='ArrowLeft')prev();
  else if(e.key===' '){e.preventDefault();flipCard();}
});
loadSet(1);
</script>
