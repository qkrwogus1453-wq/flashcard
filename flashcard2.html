*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{color:#e94560;margin-bottom:8px;font-size:1.4em}

.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
select,button{padding:8px 14px;border-radius:8px;border:none;font-size:.9em;cursor:pointer}
select{background:#16213e;color:#eee;border:1px solid #e94560}
button{background:#e94560;color:#fff;font-weight:bold}

.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s}
.card.flipped{transform:rotateY(180deg)}
.front,.back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;text-align:center}

.back{background:linear-gradient(135deg,#0f3460,#16213e);border:2px solid #4ecca3;transform:rotateY(180deg);justify-content:flex-start;padding-top:16px;overflow-y:auto}
.num{position:absolute;top:10px;left:14px;color:#e94560;font-size:.8em;font-weight:bold}
.word{font-size:1.8em;font-weight:bold;color:#fff;margin-bottom:6px}
.hint{font-size:.8em;color:#888}
.meaning{font-size:.88em;color:#eee;line-height:1.5;margin-bottom:8px;text-align:left;width:100%}
.syn{font-size:.75em;color:#4ecca3;margin-bottom:6px;text-align:left;width:100%;line-height:1.4}
.syn::before{content:'동의어: ';font-weight:bold}
.root{font-size:.72em;color:#f0a500;line-height:1.4;text-align:left;width:100%}
.root::before{content:'어원: ';font-weight:bold}
.nav{display:flex;gap:14px;align-items:center}
.nav button{padding:10px 22px;font-size:1em}
.nav .cnt{color:#aaa;font-size:.9em;min-width:80px;text-align:center}
.set-info{color:#4ecca3;font-size:.85em;margin-bottom:6px}
</style>

<script>
const WORDS=[
{n:1001,w:'robust',m:'a. 튼튼한, 원기 왕성한, 팔팔한',s:'vigorous, energetic, hearty, sturdy',r:'라틴어 robur (oak, 참나무) → 참나무처럼 튼튼한 → 튼튼한·원기 왕성한으로 고착 > 어떤 것도 꺾을 수 없는 단단한 장면이 원형'},
{n:1002,w:'paralysis',m:'n. 마비, 불수(不隨); 중풍; (교통·거래 등의) 마비 상태, 정체',s:'paralysis, numbness, immobility, inability',r:'그리스어 para (beside) + lysis (loosening, 풀림) → 신경이 풀려 기능을 잃은 → 마비·중풍으로 고착 > 신호가 차단되어 움직이지 못하는 장면이 원형'},
{n:1003,w:'stately',m:'a. 당당한, 위엄 있는, 장중한',s:'imposing, majestic, dignified, grand',r:'state (위엄 있는 상태) + -ly → 위엄 있게 → 당당한·위엄 있는으로 고착 > 왕이 느린 걸음으로 위엄 있게 걷는 장면이 원형'},
{n:1004,w:'confiscate',m:'vt. 몰수[압수]하다, 징발하다',s:'seize, confiscate, expropriate, impound',r:'라틴어 con (together) + fiscus (treasury, 국고) + -ate → 국고로 모으다 → 몰수하다·압수하다로 고착 > 세관원이 불법 물품을 압수하는 장면이 원형'},
{n:1005,w:'duress',m:'n. 구속, 속박, 감금; 협박',s:'coercion, compulsion, threat, intimidation',r:'라틴어 durus (hard, 단단한) → 압박으로 자유를 제한하는 것 → 구속·협박으로 고착 > 협박으로 억지로 서명하게 만드는 장면이 원형'},
{n:1006,w:'intimidate',m:'vt. 위협하다, 협박하다',s:'frighten, threaten, bully, terrify',r:'라틴어 in (into) + timidus (timid, 겁많은) → 겁쟁이로 만들다 → 위협하다·협박하다로 고착 > 위압적인 분위기로 상대를 주눅들게 하는 장면이 원형'},
{n:1007,w:'stratum',m:'n. (암석 등의) 층, 지층, 단층; (사회) 계층',s:'layer, tier, level, stratum',r:'라틴어 sternere (spread, 펼치다) → 펼쳐 쌓인 층 → 지층·사회 계층으로 고착 > 지질 절벽에 나타난 수천 년의 퇴적 지층의 장면이 원형'},
{n:1008,w:'arduous',m:'a. 몹시 힘든, 고된',s:'difficult, challenging, strenuous, grueling',r:'라틴어 arduus (steep, 가파른) → 가파른 것처럼 힘든 → 몹시 힘든·고된으로 고착 > 무거운 짐을 지고 가파른 산을 오르는 장면이 원형'},
{n:1009,w:'exhort',m:'v. 열심히 권하다, 훈계하다',s:'urge, advise, encourage, counsel',r:'라틴어 ex (out) + hortari (encourage, 격려하다) → 밖으로 격려하다 → 열심히 권하다·훈계하다로 고착 > 연설로 군중을 북돋아 행동하게 하는 장면이 원형'},
{n:1010,w:'practically',m:'ad. 실제적으로, 실용적으로, 실제로; 사실상, 거의 ~나 다름없이',s:'essentially, effectively, nearly, almost',r:'라틴어 practicus (practical, 실제의) → 실제로 → 실제로·거의 ~나 다름없이로 고착 > 이론이 아닌 실제 현장에서 적용하는 장면이 원형'},
{n:1011,w:'submerge',m:'v. 물속에 가라앉히다[잠그다]; 물속에 잠기다',s:'sink, immerse, plunge, dip',r:'라틴어 sub (under) + mergere (dip, 담그다) → 아래로 담그다 → 가라앉히다·잠기다로 고착 > 잠수함이 물속으로 사라지는 장면이 원형'},
{n:1012,w:'cortege',m:'n. (집합적) 시종들, 수행원들; 행렬; (특히) 장례 행렬',s:'procession, parade, retinue, train',r:'프랑스어 cortège (retinue, 수행원들) → 뒤따르는 행렬 → 시종들·장례 행렬로 고착 > 관을 뒤따르는 사람들의 엄숙한 행렬의 장면이 원형'},
{n:1013,w:'synonym',m:'n. 동의어, 유의어',s:'equivalent term, alternate name',r:'그리스어 syn (together) + onoma (name, 이름) → 같은 이름처럼 같은 의미 → 동의어·유의어로 고착 > 같은 뜻을 가진 다른 단어들의 장면이 원형'},
{n:1014,w:'prune',m:'v. (가지·뿌리 등을) 잘라내다, 쳐내다; (불필요한 부분을) 제거하다 / n. 말린 자두',s:'trim, cut back, clip, thin',r:'라틴어 rotundus (round, 둥근) → 둥근 나뭇가지를 잘라내다 → 잘라내다·제거하다로 고착 > 정원사가 나무 가지를 잘라 정리하는 장면이 원형'},
{n:1015,w:'luxurious',m:'a. 사치스러운, 호사스러운; 사치에 빠진; 쾌락을 즐기는',s:'lavish, extravagant, opulent, sumptuous',r:'라틴어 luxuria (excess, 과잉) → 넘칠 만큼 풍요로운 → 사치스러운·호사스러운으로 고착 > 황금으로 장식된 화려한 방의 장면이 원형'},
{n:1016,w:'traverse',m:'v. 가로지르다, 횡단하다',s:'cross, span, go across, navigate',r:'라틴어 trans (across) + vertere (turn, 돌다) → 가로질러 돌아가다 → 가로지르다·횡단하다로 고착 > 광야를 가로질러 걷는 장면이 원형'},
{n:1017,w:'imply',m:'vt. 뜻하다, 의미하다; 암시하다, 넌지시 비치다',s:'suggest, hint, indicate, signify',r:'라틴어 im (into) + plicare (fold, 접다) → 안으로 접어 담다 → 암시하다·의미하다로 고착 > 말 속에 다른 뜻이 숨겨진 장면이 원형'},
{n:1018,w:'wordplay',m:'n. 재담, 재치 있는 말장난',s:'pun, play on words, wit, humor',r:'word (말) + play (놀이) → 말로 하는 놀이 → 재담·말장난으로 고착 > 같은 발음의 다른 의미를 활용한 재치 있는 장면이 원형'},
{n:1019,w:'cutting-edge',m:'a. 최첨단의',s:'advanced, pioneering, innovative, state-of-the-art',r:'cutting (자르는) + edge (날) → 가장 날카로운 끝 → 최첨단의로 고착 > 가장 앞선 기술의 최전선에 있는 장면이 원형'},
{n:1020,w:'brace',m:'v. 떠받치다, 강화하다; 대비하다, 마음의 준비를 하게 하다 / n. 버팀대, 지주(支柱)',s:'prepare, reinforce, steady, prop',r:'고대 프랑스어 bracier (embrace, 껴안다) → 버팀목으로 지지하다 → 떠받치다·버팀대로 고착 > 건물을 지지하는 강철 버팀대의 장면이 원형'},
{n:1021,w:'finite',m:'a. 한정[제한]되어 있는, 유한한',s:'limited, bounded, restricted, measurable',r:'라틴어 finitus (limited, 한정된) → 끝이 정해진 → 한정된·유한한으로 고착 > 끝이 정해진 숫자의 장면이 원형'},
{n:1022,w:'carriage',m:'n. (기차의) 객차; 마차; 탈것, 차; 유모차; 운반[수송]; 운반비[수송비]; 몸가짐, 자세',s:'vehicle, wagon, coach, car',r:'고대 노르드어 kerja (transport, 운반하다) → 운반하는 것 → 마차·운반·몸가짐으로 고착 > 말이 끄는 우아한 마차의 장면이 원형'},
{n:1023,w:'itinerant',m:'a. 순회하는, 떠돌이다니는',s:'traveling, roving, mobile, wandering',r:'라틴어 iter (journey, 여정) → 여정을 다니는 → 순회하는·떠돌이 다니는으로 고착 > 마을마다 다니며 공연하는 장면이 원형'},
{n:1024,w:'delve',m:'v. 탐구하다, 철저히 조사하다; (정보를 찾으려고) 철저히 뒤지다',s:'research, examine, probe, explore',r:'고대 영어 delfan (dig, 파다) → 깊이 파내다 → 탐구하다·철저히 조사하다로 고착 > 진실을 파내려 깊이 조사하는 장면이 원형'},
{n:1025,w:'chemistry',m:'n. 화학; 화학적 성질, 화학 반응[작용]; (남과의) 공감대, 마음이 통함, 공합이 잘 맞음',s:'chemical science, molecular study',r:'그리스어 khemia (art of alloying metals, 금속 합금술) → 물질의 변환을 다루는 학문 → 화학·공감대로 고착 > 실험실에서 물질이 반응해 변하는 장면이 원형'},
{n:1026,w:'vandalize',m:'vt. (예술·문화·공공기물을) 파괴하다, 파손하다',s:'destroy, wreck, damage, deface',r:'Vandals (5세기 로마를 파괴한 게르만 부족) → 반달족처럼 파괴하다 → 파괴하다·파손하다로 고착 > 공공재산에 낙서하거나 부수는 장면이 원형'},
{n:1027,w:'prolific',m:'a. (사람·동물이) 다산(多産)의; (식물이) 열매를 많이 맺는; (작가 따위가) 다작(多作)의; (상상력이) 풍부한; (땅이) 비옥한',s:'fertile, creative, abundant, inventive',r:'라틴어 proles (offspring, 자손) + facere (make, 만들다) → 자손을 많이 만드는 → 다산의·다작의로 고착 > 한 작가가 수십 권의 책을 출판하는 장면이 원형'},
{n:1028,w:'crouch',m:'v. 쭈그리고 앉다, 웅크리다; (비굴하게) 허리를 낮추다, 굽실거리다 / n. 웅크리기, 웅크린 자세',s:'stoop, squat, bend, huddle',r:'고대 프랑스어 crochier (bend, 구부리다) → 몸을 구부려 웅크리다 → 웅크리다·굽실거리다로 고착 > 스타트 라인에서 몸을 웅크린 선수의 장면이 원형'},
{n:1029,w:'gifted',m:'a. 타고난[천부의] 재능이 있는; 유능한; 머리가 매우 좋은',s:'talented, skilled, able, endowed',r:'gift (선물) + -ed → 재능을 선물받은 → 타고난 재능이 있는으로 고착 > 어릴 때부터 천부적 재능을 보이는 장면이 원형'},
{n:1030,w:'bystander',m:'n. 방관자, 구경꾼',s:'onlooker, observer, spectator, witness',r:'by (곁에) + stander (서 있는 사람) → 곁에 서서 보는 사람 → 방관자·구경꾼으로 고착 > 사건 현장에서 멀리 서서 바라보는 장면이 원형'},
{n:1031,w:'rescue',m:'vt. 구하다, 구조하다, 구출하다 / n. 구조, 구출, 구제',s:'save, free, liberate, recover',r:'고대 프랑스어 rescourre (shake out, 흔들어 꺼내다) → 위험에서 꺼내다 → 구하다·구조하다로 고착 > 불 속에서 사람을 끌어내는 장면이 원형'},
{n:1032,w:'mendicant',m:'n. 거지, 동냥아치 / a. (수도사 등이) 구걸하는, 빌어먹는, 탁발하는',s:'pauper, homeless person, vagrant, tramp',r:'라틴어 mendicare (beg, 구걸하다) → 구걸하는 → 거지·탁발하는으로 고착 > 손을 내밀며 음식을 구하는 장면이 원형'},
{n:1033,w:'domain',m:'n. 영토, 영지; 판도; (개인의) 소유지; (지식·활동의) 영역, 분야, 범위',s:'territory, realm, region, field',r:'라틴어 dominium (ownership, 소유권) → 소유하는 영역 → 영토·영역·분야로 고착 > 왕이 통치하는 넓은 영토의 장면이 원형'},
{n:1034,w:'formulate',m:'vt. 명확히[체계적으로] 나타내다[말하다]; 공식화[정식화]하다, 공식으로 나타내다',s:'systematize, codify, organize, structure',r:'라틴어 formula (form, 형식) + -ate → 형식으로 만들다 → 공식화하다·명확히 나타내다로 고착 > 복잡한 생각을 명확한 공식으로 나타내는 장면이 원형'},
{n:1035,w:'awe',m:'n. 경외(敬畏), 두려움 / vt. 두려움[경외하는 마음]을 느끼게 하다',s:'wonder, reverence, admiration, respect',r:'고대 노르드어 agi (fear, 두려움) → 신 앞에 선 경외감 → 경외·두려움으로 고착 > 압도적인 자연 앞에서 경외심으로 멈추는 장면이 원형'},
{n:1036,w:'trunk',m:'n. (나무의) 줄기; (사람·동물의) 몸통, 동체; (곤충의) 가슴부',s:'stump, shaft, body, barrel',r:'라틴어 truncus (trunk, 줄기) → 나무의 줄기 → 줄기·몸통·트렁크로 고착 > 나무의 굵은 줄기 장면이 원형'},
{n:1037,w:'sluggard',m:'n. 게으름뱅이, 나태한 사람 / a. 게으른, 나태한, 귀찮아하는',s:'lazybones, idler, loafer, sluggard',r:'slug (느린 것) + -ard (사람) → 느리고 게으른 사람 → 게으름뱅이·나태한으로 고착 > 종일 침대에서 일어나지 않는 장면이 원형'},
{n:1038,w:'orient',m:'v. 방위를 바르게 맞추다, 바른 방향[위치]에 놓다; (새로운 환경 등에) 적응시키다; (신입생 등에) 지도·강습을 하다 / n. 동양',s:'align, position, focus, aim',r:'라틴어 oriens (rising, 태양이 뜨는) → 태양이 뜨는 동쪽 → 동양·방향을 맞추다로 고착 > 나침반으로 동쪽을 찾는 장면이 원형'},
{n:1039,w:'backlash',m:'n. 반발, 반동',s:'reaction, recoil, opposition, resentment',r:'back (뒤로) + lash (채찍질) → 뒤로 튀는 반동 → 반발·반동으로 고착 > 정책 변화에 대한 강한 반발이 생기는 장면이 원형'},
{n:1040,w:'attend',m:'v. 출석하다, 참석하다; 시중들다, 간호하다; 주의하다, 경청하다',s:'join, be present at, look after, serve',r:'라틴어 ad (to) + tendere (stretch, 뻗다) → ~를 향해 뻗어 참석하다 → 출석하다·시중들다로 고착 > 회의에 참석하여 경청하는 장면이 원형'},
{n:1041,w:'oral',m:'a. 구두(口頭)의, 구전(口傳)의, 구술의; 입의; (약 등이) 경구용의',s:'spoken, verbal, voiced, unwritten',r:'라틴어 os (mouth, 입) + -al → 입의 → 구두의·경구용의로 고착 > 문서 없이 말로만 진행되는 시험의 장면이 원형'},
{n:1042,w:'monarch',m:'n. 군주, 제왕',s:'sovereign, ruler, king, potentate',r:'그리스어 monos (one, 하나) + archos (ruler, 지배자) → 한 명의 지배자 → 군주·제왕으로 고착 > 왕좌에 홀로 앉아 통치하는 장면이 원형'},
{n:1043,w:'homing',m:'a. 집으로 돌아오는; 귀소성(歸巢性)이 있는; (자동) 유도[추적]의',s:'homing instinct, sense of direction',r:'home (집) + -ing → 집으로 돌아오는 → 귀소성이 있는으로 고착 > 비둘기가 먼 곳에서 집을 찾아 돌아오는 장면이 원형'},
{n:1044,w:'jury',m:'n. 배심, 배심원단; (콘테스트 등의) 심사위원',s:'panel, peers, adjudicators, jurors',r:'라틴어 jurare (swear, 맹세하다) → 진실을 맹세한 사람들 → 배심원단으로 고착 > 법정에서 배심원들이 평결을 내리는 장면이 원형'},
{n:1045,w:'voracious',m:'a. (음식에 대해) 식욕이 왕성한, 대식하는, 게걸스러운; (새로운 정보 지식을) 열렬히 탐하는',s:'hungry, gluttonous, ravenous, insatiable',r:'라틴어 vorare (devour, 게걸스럽게 먹다) + -ious → 게걸스럽게 먹는 성질 → 식욕이 왕성한·열렬히 탐하는으로 고착 > 책을 게걸스럽게 읽어 치우는 장면이 원형'},
{n:1046,w:'spike',m:'v. 못을 박다; (뾰족한 것으로) 찌르다; (가치가) 급등하다; (음료에) 알코올[마약]을 넣다 / n. 못, (못같이) 뾰족한 것; 급등, 급증',s:'pierce, stab, jump, soar',r:'고대 노르드어 spiki (nail, 못) → 뾰족한 못 → 찌르다·급등하다로 고착 > 그래프가 갑자기 급격히 치솟는 장면이 원형'},
{n:1047,w:'intransigent',m:'a. 타협[양보] 하지 않는; 완고한',s:'rigid, stubborn, unyielding, inflexible',r:'라틴어 in (not) + transigere (settle, 합의하다) + -ent → 합의하지 않는 → 타협하지 않는·완고한으로 고착 > 어떤 설득에도 꿈쩍 않는 장면이 원형'},
{n:1048,w:'epigraph',m:'n. (묘비·동상 등의) 비문(碑文), 비명(碑銘)',s:'inscription, carving, commemorative text',r:'그리스어 epi (upon) + graphein (write, 쓰다) → 위에 쓰다 → 비문·묘비명으로 고착 > 석비에 새겨진 짧은 글귀의 장면이 원형'},
{n:1049,w:'dissuade',m:'vt. (설득하여) 단념시키다',s:'deter, discourage, warn off, caution',r:'라틴어 dis (away) + suadere (advise, 권고하다) → 다른 방향으로 권고하다 → 단념시키다로 고착 > 위험한 계획을 포기하게 설득하는 장면이 원형'},
{n:1050,w:'gusto',m:'n. (음식의) 맛; 마음속에서 우러나오는 즐거움[기쁨]; 열정; (개인의) 즐아하는 것, 기호(嗜好), 취미',s:'enthusiasm, zeal, pleasure, enjoyment',r:'이탈리아어 gusto (taste, 맛) → 맛있게 즐기는 기쁨 → 마음속 즐거움·열정으로 고착 > 음식을 즐겁고 열정적으로 먹는 장면이 원형'},
{n:1051,w:'abdicate',m:'v. (왕위·권리 등을) 버리다, 포기하다; 퇴위하다',s:'resign, relinquish, step down, renounce',r:'라틴어 ab (away) + dicare (proclaim, 선언하다) → 선언하며 물러나다 → 왕위를 버리다·포기하다로 고착 > 왕이 왕관을 내려놓는 장면이 원형'},
{n:1052,w:'volatile',m:'a. 휘발성의, 증발하기 쉬운; 변덕스러운; (정세·상황 따위가) 불안정한, 일촉즉발의',s:'unstable, unpredictable, explosive, lively',r:'라틴어 volare (fly, 날다) → 날아가듯 쉽게 증발하는 → 휘발성의·변덕스러운으로 고착 > 공기 중에 쉽게 날아가버리는 액체의 장면이 원형'},
{n:1053,w:'diagram',m:'n. 도형, 도표, 도식',s:'figure, shape, graph, chart',r:'그리스어 dia (through) + gramma (drawing, 그림) → 통해 그린 도형 → 도형·도표로 고착 > 복잡한 개념을 그림으로 표현하는 장면이 원형'},
{n:1054,w:'beget',m:'vt. (아버지가) (자식을) 보다, 낳다, 얻다; 생기게 하다, 초래하다',s:'father, sire, produce, create',r:'고대 영어 begetan (get, 얻다) → 얻어 태어나게 하다 → 자식을 낳다·초래하다로 고착 > 부모에서 자식이 태어나는 장면이 원형'},
{n:1055,w:'integrate',m:'v. (부분·요소를) 통합하다; 완전하게 하다; (학교·공공시설 등에서의) 인종[종교적] 차별을 폐지하다',s:'unify, merge, combine, incorporate',r:'라틴어 integer (whole, 전체) + -ate → 전체로 합치다 → 통합하다·차별을 폐지하다로 고착 > 여러 부분이 하나로 합쳐지는 장면이 원형'},
{n:1056,w:'shrub',m:'n. 키 작은 나무, 관목(灌木)',s:'bush, shrub, thicket, undergrowth',r:'고대 영어 scrobb (shrub, 관목) → 키 작은 나무 → 관목으로 고착 > 키가 낮게 자라는 작은 나무들의 장면이 원형'},
{n:1057,w:'down-to-earth',m:'a. 현실적인, 실제적인; 세상 물정에 밝은',s:'practical, sensible, grounded, matter-of-fact',r:'down (아래로) + to + earth (땅) → 땅으로 내려온 → 현실적인·실제적인으로 고착 > 거창한 말보다 실제 현실을 봐야 한다는 장면이 원형'},
{n:1058,w:'promulgate',m:'vt. (법률 등을) 공포하다, 선포하다; (교리·주의 등을) 선전하다, 널리 알리다',s:'announce, declare, broadcast, publish',r:'라틴어 promulgare (make public, 공포하다) → 공개적으로 알리다 → 공포하다·선전하다로 고착 > 왕이 새 법령을 공식 선포하는 장면이 원형'},
{n:1059,w:'mortgage',m:'n. (법률) 저당, 저당 잡힘; 담보; 담보 대출금, (저당) 융자금',s:'lien, pledge, security, guarantee',r:'고대 프랑스어 mort (dead, 죽은) + gage (pledge, 약속) → 죽은 약속(상환하면 끝나는) → 저당·담보 대출로 고착 > 집을 담보로 대출을 받는 장면이 원형'},
{n:1060,w:'auspicious',m:'a. 길조의, 상서로운, 행운의',s:'promising, favorable, encouraging, bright',r:'라틴어 auspex (bird watcher, 새 관찰자) → 새의 징조가 좋은 → 길조의·상서로운으로 고착 > 좋은 징조로 시작하는 장면이 원형'},
{n:1061,w:'demagogue',m:'n. 선동 정치가, (민중) 선동가',s:'agitator, rabble-rouser, instigator, populist',r:'그리스어 demos (people, 민중) + agogos (leading, 이끄는) → 민중을 이끄는 체하는 사람 → 선동 정치가로 고착 > 군중의 감정을 자극해 조종하는 장면이 원형'},
{n:1062,w:'flummox',m:'vt. 어쩔 줄 모르게 하다, 당황시키다, 쩔쩔매게 하다',s:'baffle, bewilder, puzzle, confound',r:'19세기 영어 flummox (confuse, 혼란시키다) → 완전히 당황하게 만들다 → 당황시키다·쩔쩔매게 하다로 고착 > 예상치 못한 말에 말문이 막히는 장면이 원형'},
{n:1063,w:'ally',m:'v. 동맹[결연, 연합, 제휴]시키다[하다] / n. 동맹국, 연합국; 협력자',s:'unite, join, align, affiliate',r:'라틴어 alligare (bind to, 묶다) → 함께 묶다 → 동맹시키다·동맹국으로 고착 > 두 나라가 조약으로 동맹을 맺는 장면이 원형'},
{n:1064,w:'insidious',m:'a. 교활한, 음흉한; 방심할 수 없는 남을 함정에 빠뜨리려는, 남을 속이는; (병 등이) 모르는 사이에 진행하는, 잠행성의',s:'sneaky, treacherous, guileful, devious',r:'라틴어 insidiae (ambush, 매복) → 매복처럼 모르는 사이에 접근하는 → 교활한·모르는 사이에 진행하는으로 고착 > 눈에 보이지 않게 서서히 퍼지는 장면이 원형'},
{n:1065,w:'treaty',m:'n. (국가 간의) 조약, 협정',s:'agreement, pact, accord, convention',r:'라틴어 tractare (handle, 다루다) → 문제를 다루어 체결한 것 → 조약·협정으로 고착 > 두 나라 대표가 협정서에 서명하는 장면이 원형'},
{n:1066,w:'stipulate',m:'v. (조항 등이) ~을 규정하다, 명기[명문화]하다',s:'specify, state, require, prescribe',r:'라틴어 stipulari (bargain, 협상하다) → 협상해 조건을 명시하다 → 규정하다·명기하다로 고착 > 계약서에 조건을 명확히 적어 넣는 장면이 원형'},
{n:1067,w:'pendent',m:'a. 매달린, 늘어진; 미결의, 미정의, 현안의',s:'unresolved, awaiting, upcoming, imminent',r:'라틴어 pendere (hang, 매달리다) → 매달린 → 매달린·미결의로 고착 > 천장에서 내려오는 펜던트 조명의 장면이 원형'},
{n:1068,w:'limp',m:'vi. (다리를) 절다, 절뚝거리다; (작업·기동력 등이) 지지부진하다 / a. (몸이) 축 늘어진, 흐느적거리는; 기염(활력)이 없는, 지친',s:'hobble, walk unevenly, limp along',r:'고대 영어 limpan (happen, 일어나다) → 힘없이 축 처지다 → 절다·축 늘어진으로 고착 > 다리를 절뚝거리며 걷는 장면이 원형'},
{n:1069,w:'extreme',m:'a. 극도의, 극심한; 극단적인, 과격한; (중심에서) 가장 먼, 맨 끝의; 최종의, 최후의',s:'utmost, ultimate, intense, severe',r:'라틴어 extremus (outermost, 가장 바깥의) → 가장 바깥 끝의 → 극도의·극단적인으로 고착 > 척도의 가장 끝 지점의 장면이 원형'},
{n:1070,w:'holocaust',m:'n. (특히 전쟁·화재로 인한) 대참사, 대파괴, 대학살; (the H~) (나치에 의한) 유대인 대학살',s:'genocide, massacre, extermination, slaughter',r:'그리스어 holos (whole, 전체) + kaustos (burned, 태워진) → 전체를 불태우는 것 → 대참사·대학살로 고착 > 전쟁으로 모든 것이 불타는 장면이 원형'},
{n:1071,w:'monumental',m:'a. 기념비적인, 역사적 의미가 있는; 엄청난, 대단한',s:'historic, landmark, timeless, iconic',r:'라틴어 monumentum (monument, 기념비) + -al → 기념비의 성질 → 기념비적인·엄청난으로 고착 > 역사에 남을 위대한 업적의 장면이 원형'},
{n:1072,w:'escapade',m:'n. 엉뚱한 짓, 장난; 탈선행위',s:'prank, mischief, exploit, adventure',r:'고대 프랑스어 escapade (escape, 탈출) → 탈출처럼 엉뚱한 행동 → 엉뚱한 짓·탈선행위로 고착 > 규칙을 어기고 제멋대로 행동하는 장면이 원형'},
{n:1073,w:'compact',m:'a. 꽉 찬, 빽빽한; 조밀한, 촘촘한, 밀집한; (동 등이) 소형인, 작고 경제적인; (문장이) 간결한',s:'dense, compressed, concise, agreement',r:'라틴어 com (together) + pangere (fasten, 고정하다) → 함께 고정해 빽빽한 → 꽉 찬·소형인으로 고착 > 빽빽하게 눌러 담아 작고 단단한 장면이 원형'},
{n:1074,w:'groan',m:'v. 신음하다, 신음소리를 내다; 신음하며[몹시] 괴로워하다; 변만하다',s:'sigh, moan, groan, complain',r:'고대 영어 granian (groan, 신음하다) → 깊은 곳에서 나오는 신음 → 신음하다·괴로워하다로 고착 > 무거운 짐에 눌려 신음을 내는 장면이 원형'},
{n:1075,w:'irrespective',m:'a. 관계없는, 상관[고려]하지 않는',s:'regardless, no matter, despite, without',r:'ir (not) + respective (각각의) → 각각에 관계없이 → 관계없는으로 고착 > 어떤 조건에도 상관없이 동일하게 적용하는 장면이 원형'},
{n:1076,w:'anthropology',m:'n. 인류학',s:'study of humans, cultural science',r:'그리스어 anthropos (human, 사람) + log (study) → 인간을 연구하는 학문 → 인류학으로 고착 > 다양한 문화의 인간을 연구하는 장면이 원형'},
{n:1077,w:'substantial',m:'a. (양·크기·중요성이) 상당한, 충분한; 실질적인, 본질적인; 견고한, 튼튼한; 진실한',s:'real, solid, significant, considerable',r:'라틴어 substantia (substance, 실체) + -al → 실체가 있는 → 상당한·실질적인으로 고착 > 충분히 크고 견고한 장면이 원형'},
{n:1078,w:'convene',m:'v. (모임·회의를) 소집하다; 모이다, 회합하다',s:'call, summon, gather, assemble',r:'라틴어 con (together) + venire (come, 오다) → 함께 오다 → 소집하다·회합하다로 고착 > 회의를 위해 사람들이 한자리에 모이는 장면이 원형'},
{n:1079,w:'basement',m:'n. (건물의) 지하층, 지하실; (구조물의) 최하부',s:'cellar, underground floor, lower level',r:'base (기반) + -ment (명사형) → 기반 아래 → 지하층·최하부로 고착 > 건물의 기초 아래 있는 지하 공간의 장면이 원형'},
{n:1080,w:'turbid',m:'a. 흐린, 탁한; 갈팡질팡하는, 혼란스러운',s:'muddy, murky, cloudy, confused',r:'라틴어 turbidus (muddy, 흐린) → 탁하고 흐린 → 흐린·혼란스러운으로 고착 > 진흙이 섞여 탁해진 강물의 장면이 원형'},
{n:1081,w:'decelerate',m:'v. 속력을 늦추다[줄이다], 감속하다',s:'slow down, brake, reduce speed',r:'de (down) + accelerate (가속하다) → 가속을 줄이다 → 감속하다로 고착 > 브레이크를 밟아 속도를 줄이는 장면이 원형'},
{n:1082,w:'prohibitive',m:'a. 금지의; 엄청나게 비싼',s:'forbid, ban, outlaw, disallow',r:'라틴어 prohibere (prevent, 막다) → 막는 성질 → 금지의·엄청나게 비싼으로 고착 > 가격이 너무 비싸 살 수 없는 장면이 원형'},
{n:1083,w:'caucus',m:'n. (정당의) 간부회의, 전당대회',s:'inner circle, leadership group, faction',r:'알곤킨어 cau-cau-as\'u (counselor, 고문) → 비공개 정당 회의 → 간부회의로 고착 > 선거 전략을 논의하는 비공개 회의의 장면이 원형'},
{n:1084,w:'surmount',m:'vt. (곤란 등을) 이겨내다, 극복하다; (산에) 오르다; 완전히 오르다, 타고 넘다',s:'conquer, defeat, get over, prevail',r:'라틴어 super (over) + mons (mountain, 산) → 산을 넘어서다 → 극복하다·오르다로 고착 > 가파른 장벽을 넘어서는 장면이 원형'},
{n:1085,w:'utopian',m:'a. 유토피아의, 이상향의, 공상적인',s:'ideal, perfect, visionary, fanciful',r:'그리스어 ou (not) + topos (place, 장소) → 어디에도 없는 이상적 곳 → 유토피아의·공상적인으로 고착 > 완벽한 세상을 꿈꾸는 장면이 원형'},
{n:1086,w:'opprobrium',m:'n. 불명예, 오명, 치욕; 악담, 욕지거리, 비난',s:'disgrace, infamy, scandal, dishonor',r:'라틴어 ob (against) + probrum (disgrace, 수치) → 수치에 맞서는 것 → 불명예·비난으로 고착 > 공개적으로 망신을 당하는 장면이 원형'},
{n:1087,w:'resort',m:'vi. 의지하다, 호소하다; 자주 드나들다 / n. 유흥지, 별장가; 의지, 의뢰; (특정 상황에서의) 제일[마지막, 최후의] 수단',s:'retreat, escape, destination, option',r:'라틴어 re (back) + sortir (go out, 나가다) → 다시 나가다 → 의지하다·유흥지로 고착 > 마지막 방법에 의지하는 장면이 원형'},
{n:1088,w:'convex',m:'a. 볼록면의, 볼록한',s:'curved, rounded, bulging, domed',r:'라틴어 convexus (vaulted, 볼록한) → 밖으로 볼록한 → 볼록한으로 고착 > 렌즈 표면이 밖으로 볼록하게 솟은 장면이 원형'},
{n:1089,w:'emphasis',m:'n. 강조, 역설, 중요시',s:'stress, highlight, underline, accentuate',r:'그리스어 em (in) + phasis (appearance, 나타남) → 안에서 밖으로 나타내다 → 강조·중요시로 고착 > 중요한 부분에 밑줄을 그어 강조하는 장면이 원형'},
{n:1090,w:'forthcoming',m:'a. 곧 나타나려고 하는, 다가오는, 이번의; (현재나) 준비되어 있는, 이용할 수 있는',s:'approaching, upcoming, imminent, near',r:'forth (앞으로) + coming (오는) → 앞에서 오는 → 다가오는·이용할 수 있는으로 고착 > 곧 나타날 새 사건의 장면이 원형'},
{n:1091,w:'nurture',m:'n. 양육, 양성, 사육; 교육, 지도 / vt. 키우다, 양육하다; 육성하다',s:'raise, rear, feed, foster',r:'라틴어 nutrire (nourish, 기르다) → 영양을 주어 기르다 → 양육하다·육성하다로 고착 > 부모가 자녀를 정성스럽게 키우는 장면이 원형'},
{n:1092,w:'convoy',m:'n. 호송, 호위; 호위대 / vt. 호위[경호, 호송]하다',s:'escort, accompany, shepherd, lead',r:'고대 프랑스어 convoier (escort, 호위하다) → 함께 호위하며 이동하다 → 호위·호위대로 고착 > 군함이 상선을 보호하며 함께 항해하는 장면이 원형'},
{n:1093,w:'weigh',m:'v. 무게[체중]를 달다; 무게가 ~이다; 숙고하다, 고찰하다; 평가하다; 비교 검토하다',s:'think over, deliberate, balance, consider',r:'고대 영어 wegan (carry, 나르다) → 물건을 들어 무게를 재다 → 무게를 달다·숙고하다로 고착 > 저울에 무게를 다는 장면이 원형'},
{n:1094,w:'excerpt',m:'n. 발췌, 인용(구) / v. 발췌하다, 인용하다',s:'quote, clip, passage, selection',r:'라틴어 ex (out) + carpere (pluck, 뽑다) → 밖으로 뽑아내다 → 발췌·인용하다로 고착 > 긴 글에서 중요한 부분만 뽑아내는 장면이 원형'},
{n:1095,w:'gibberish',m:'n. 횡설수설, 뭔가 뭔지 알 수 없는 말',s:'gibberish, nonsense, babble, drivel',r:'gibber (중얼거리다) + -ish → 알아들을 수 없는 중얼거림 → 횡설수설로 고착 > 무슨 말인지 전혀 이해가 안 되는 장면이 원형'},
{n:1096,w:'chastise',m:'vt. 심하게 꾸짖다[비난하다], 질책하다; (매질 등으로) 벌하다, 징계하다',s:'punish, discipline, rebuke, penalize',r:'라틴어 castigare (punish, 벌주다) → 벌주어 교화하다 → 꾸짖다·벌하다로 고착 > 엄하게 꾸짖어 잘못을 깨닫게 하는 장면이 원형'},
{n:1097,w:'radiant',m:'a. 빛나는, 밝은; (행복·희망 등으로) 빛나는, 환한; 복사(輻射)의, 복사에 의한, 방사의',s:'glowing, shining, bright, luminous',r:'라틴어 radiare (emit rays, 빛을 내다) + -ant → 빛을 내는 → 빛나는·환한으로 고착 > 해가 사방으로 빛을 발하는 장면이 원형'},
{n:1098,w:'predilection',m:'n. 편애, 매우 좋아함',s:'favoritism, partiality, preference, bias',r:'라틴어 prae (before) + diligere (love, 사랑하다) → 미리 사랑하는 → 편애·매우 좋아함으로 고착 > 특별히 한 가지를 더 좋아하는 장면이 원형'},
{n:1099,w:'mire',m:'v. 진창에 빠지게 하다[빠지다]; (곤경·공지에) 빠뜨리다 / n. 진창, 수렁; 공지, 곤경',s:'bog, swamp, quagmire, predicament',r:'고대 노르드어 myrr (swamp, 습지) → 진창 수렁 → 진창에 빠지다·공지에 빠뜨리다로 고착 > 발이 진흙 수렁에 빠져 나오지 못하는 장면이 원형'},
{n:1100,w:'amulet',m:'n. 부적',s:'charm, talisman, lucky piece',r:'라틴어 amuletum (amulet, 부적) → 나쁜 기운을 막는 물건 → 부적으로 고착 > 목에 건 부적이 재앙을 막아주는 장면이 원형'},
{n:1101,w:'notorious',m:'a. 악명 높은',s:'infamous, disreputable, scandalous, well-known',r:'라틴어 notus (known, 알려진) + -ious → 나쁘게 알려진 → 악명 높은으로 고착 > 나쁜 행동으로 이름이 널리 알려진 장면이 원형'},
{n:1102,w:'adulate',m:'v. 아첨하다, 비위 맞추다, 무턱대고 칭찬하다',s:'flatter, grovel, fawn, butter up',r:'라틴어 adulari (fawn on, 아첨하다) → 강아지처럼 아첨하다 → 아첨하다·지나치게 칭찬하다로 고착 > 유명인에게 지나치게 굽실거리는 장면이 원형'},
{n:1103,w:'parvenu',m:'n. 벼락부자, 벼락 출세자',s:'upstart, nouveau riche, social climber',r:'프랑스어 parvenu (arrived, 도착한) → 갑자기 높은 지위에 올라온 → 벼락출세자·신흥 부자로 고착 > 하루아침에 갑부가 되어 으스대는 장면이 원형'},
{n:1104,w:'convey',m:'vt. 나르다, 운반[운송]하다; (지식 등을) 전달하다; (소리 등을) 전하다; (병을) 옮기다',s:'transmit, communicate, transport, deliver',r:'라틴어 con (together) + via (way, 길) → 함께 길을 통해 전달하다 → 전달하다·운반하다로 고착 > 메시지를 전달자를 통해 보내는 장면이 원형'},
{n:1105,w:'penitence',m:'n. 후회, 뉘우침, 참회, 회개',s:'repent, feel remorse, regret, apologize',r:'라틴어 paenitere (repent, 뉘우치다) → 뉘우치는 것 → 뉘우침·참회로 고착 > 무릎 꿇고 눈물을 흘리며 용서를 비는 장면이 원형'},
{n:1106,w:'instigate',m:'vt. 부추기다, 선동하다',s:'provoke, stir up, foment, incite',r:'라틴어 instigare (goad, 채찍질하다) → 채찍질해 행동하게 하다 → 선동하다·충동하다로 고착 > 군중을 자극해 행동에 나서게 하는 장면이 원형'},
{n:1107,w:'reticent',m:'a. 과묵한, 말이 적은, 말을 삼가는',s:'taciturn, quiet, reserved, uncommunicative',r:'라틴어 reticere (keep silent, 침묵하다) + -ent → 침묵을 지키는 → 말이 없는·과묵한으로 고착 > 질문을 받아도 입을 열지 않는 장면이 원형'},
{n:1108,w:'deplete',m:'vt. 격감시키다; (세력·자원 등을) 고갈시키다',s:'exhaust, drain, empty, use up',r:'라틴어 de (completely) + plere (fill, 채우다) → 완전히 비워내다 → 고갈시키다·소모하다로 고착 > 저수지 물이 바닥을 드러내는 장면이 원형'},
{n:1109,w:'heap',m:'n. 쌓아올린 것, 퇴적, 덩어리; 많음, 다수, 다량 / v. 쌓아올리다, 산처럼 쌓다; (돈부 등을) 축적하다',s:'pile, stack, mound, accumulation',r:'고대 영어 heap (pile, 더미) → 물건이 쌓인 더미 → 쌓다·큰 더미로 고착 > 낙엽이 높이 쌓인 장면이 원형'},
{n:1110,w:'prosaic',m:'a. 단조로운, 지루한; 산문의, 산문체의',s:'dull, boring, mundane, unimaginative',r:'라틴어 prosaicus (prose, 산문의) → 산문처럼 꾸밈없이 평범한 → 평범한·산문적인으로 고착 > 특별한 것 없이 그냥 평범한 장면이 원형'},
{n:1111,w:'bask',m:'vi. (햇볕·열 등을) 쬐다, 일광욕하다; (행복·은혜·행운 등을) 입다, 누리다',s:'sunbathe, bask, relax, lounge',r:'고대 노르드어 baðask (bathe, 목욕하다) → 햇볕을 온몸에 쬐다 → 햇볕을 쬐다·즐기다로 고착 > 도마뱀이 바위 위에서 햇볕을 즐기는 장면이 원형'},
{n:1112,w:'superficial',m:'a. 외견상의, 표면적인, 피상적인; 깊이가 없는, 경박한, 얄팍한, 천박한',s:'shallow, trivial, cosmetic, cursory',r:'라틴어 super (above) + facies (surface, 표면) → 표면 위의 → 표면적인·피상적인으로 고착 > 겉만 보고 속은 들여다보지 않는 장면이 원형'},
{n:1113,w:'turnkey',m:'n. 교도관, 간수 / a. (건설·플랜트 수출 계약 등에서) 완성품 인도[일괄도급] 방식의',s:'ready-made, fully operational, complete',r:'turn (돌리다) + key (열쇠) → 열쇠를 돌려 준비 완료 → 즉시 사용 가능한으로 고착 > 모든 준비가 끝나 바로 사용할 수 있는 장면이 원형'},
{n:1114,w:'fragile',m:'a. 깨지기 쉬운, 부서지기 쉬운; 하약한, 연약한',s:'breakable, delicate, frail, weak',r:'라틴어 fragilis (easily broken, 쉽게 부러지는) → 쉽게 깨지는 → 부서지기 쉬운·연약한으로 고착 > 살짝 건드리기만 해도 깨지는 유리의 장면이 원형'},
{n:1115,w:'mumble',m:'v. 중얼거리다',s:'murmur, mutter, grumble, mumble',r:'중세 영어 momelen (murmur, 중얼거리다) → 입 안에서 알아듣기 어렵게 말하다 → 중얼거리다로 고착 > 입술을 거의 움직이지 않고 웅얼대는 장면이 원형'},
{n:1116,w:'spot',m:'n. (작은) 점, 반점, 얼룩; (특정한) 곳, 장소, 자리 / v. 발견하다, 찾다, 알아채다',s:'place, location, stain, mark',r:'고대 노르드어 spotti (piece, 조각) → 특정한 곳이나 반점 → 발견하다·점·장소로 고착 > 흰 천 위에 생긴 얼룩의 장면이 원형'},
{n:1117,w:'crutch',m:'n. 목발; (정신적인) 버팀목, 의자(하게 되는 것)',s:'prop, support, aid, walking stick',r:'고대 영어 crycc (staff, 지팡이) → 겨드랑이에 끼는 지지대 → 목발·버팀목으로 고착 > 다친 다리를 돕는 목발의 장면이 원형'},
{n:1118,w:'eavesdrop',m:'v. 엿듣다, 도청하다',s:'eavesdrop, overhear, spy, listen in',r:'고대 영어 yfesdrype (eave drip, 처마 낙수) → 처마 아래 몰래 서서 듣다 → 엿듣다로 고착 > 문 뒤에서 대화를 몰래 엿듣는 장면이 원형'},
{n:1119,w:'acquaintance',m:'n. 아는 사람, 지인; 면식, (약간의) 친분; 지식, 앎',s:'friend, contact, colleague, familiar',r:'고대 프랑스어 acointier (make known, 알리다) → 서로를 알게 된 것 → 아는 사람·지인으로 고착 > 가끔 마주치는 그다지 친하지 않은 사람의 장면이 원형'},
{n:1120,w:'lachrymose',m:'a. 눈물을 잘 흘리는; 눈물을 자아내는, 애절한',s:'tearful, weepy, emotional, sentimental',r:'라틴어 lacrima (tear, 눈물) + -ose → 눈물이 많은 → 눈물을 잘 흘리는·슬픈으로 고착 > 조금만 슬퍼도 눈물이 흐르는 장면이 원형'},
{n:1121,w:'storage',m:'n. 저장, 보관; 창고보관; 저장고, 보관소',s:'preservation, keeping, space, holding',r:'store (저장하다) + -age → 저장하는 것 → 저장·보관으로 고착 > 창고에 물건을 차곡차곡 쌓아두는 장면이 원형'},
{n:1122,w:'consolidate',m:'v. 굳히다, 강화하다; 공고하게하다; 통합하다[되다], 통합 정리하다, 합병하다',s:'strengthen, merge, unite, solidify',r:'라틴어 con (together) + solidare (make solid, 단단하게 하다) → 함께 단단하게 하다 → 통합하다·강화하다로 고착 > 여러 회사를 하나로 합치는 장면이 원형'},
{n:1123,w:'manuscript',m:'n. (책·악보 등의) 원고; 사본, 필사본',s:'handwritten text, original copy, draft',r:'라틴어 manu (by hand, 손으로) + scriptus (written, 쓴) → 손으로 쓴 것 → 원고·필사본으로 고착 > 수도사가 손으로 직접 성경을 베끼는 장면이 원형'},
{n:1124,w:'glimpse',m:'n. 흘긋 봄, 잠깐 동안 봄, 일견(一見); (무엇을 이해하는 데 도움이 되는) 짧은 경험[접촉] / v. 흘긋[언뜻] 보다',s:'peek, spot, see briefly, catch sight',r:'중세 영어 glimsen (shine faintly, 희미하게 빛나다) → 순간적으로 희미하게 보다 → 훔쳐보다·잠깐 봄으로 고착 > 커튼 사이로 잠깐 보이는 장면이 원형'},
{n:1125,w:'invective',m:'n. 욕설, 악담, 독설',s:'rail against, abuse, attack, berate',r:'라틴어 in (against) + vehere (carry, 나르다) → 맞서 쏟아붓는 말 → 욕설·신랄한 비난으로 고착 > 분노로 험한 말을 쏟아내는 장면이 원형'},
{n:1126,w:'surmise',m:'v. 추측하다, 추정하다, 짐작하다 / n. 추측, 추정, 짐작',s:'guess, assume, speculate, conjecture',r:'고대 프랑스어 surmise (accusation, 고발) → 증거 없이 추측하다 → 추측하다로 고착 > 단서 없이 짐작으로 결론을 내리는 장면이 원형'},
{n:1127,w:'diffident',m:'a. 자신 없는, 수줍어하는, 숫기 없는, 머뭇거리는, 내성적인',s:'bashful, timid, shy, self-conscious',r:'라틴어 dif (not) + fidere (trust, 신뢰하다) → 자신을 신뢰하지 않는 → 자신 없는·소심한으로 고착 > 발표 전 자신 없어 주저하는 장면이 원형'},
{n:1128,w:'object',m:'v. 반대하다, 이의를 말하다, 항의하다; 불평을 듣다, 반감을 가지다 / n. 물건, 물체, 사물; 목적, 목표; (동작·감정 등의) 대상; (문법) 목적어',s:'oppose, dispute, protest, challenge',r:'라틴어 ob (against) + jectum (thrown, 던진) → 맞서 던진 것 → 물건·목적·반대하다로 고착 > 제안에 손을 들어 반대하는 장면이 원형'},
{n:1129,w:'wizardry',m:'n. 마법, 마술, 묘기; 첨단기술, 첨단제품',s:'magic, sorcery, enchantment, witchcraft',r:'wizard (마법사) + -ry (기술) → 마법사의 기술 → 마법·놀라운 재주로 고착 > 마법사가 지팡이로 기적을 일으키는 장면이 원형'},
{n:1130,w:'artful',m:'a. (사람·언동 등이) 교활한; (표현 동이) 교묘한, 기교[수단] 있는',s:'cunning, tricky, clever, deceitful',r:'art (기술) + -ful → 기술이 가득한 → 교묘한·능숙한으로 고착 > 교묘하게 상황을 이용하는 장면이 원형'},
{n:1131,w:'carcass',m:'n. (짐승의) 시체; (경멸적) 인체; 송장; (건물·배 등의) 뼈대',s:'corpse, body, remains, skeleton',r:'고대 프랑스어 carcasse (skeleton, 해골) → 살이 없는 뼈대 → 죽은 동물의 몸체로 고착 > 살코기를 다 발라낸 뼈만 남은 장면이 원형'},
{n:1132,w:'kindle',m:'v. ~에 불을 붙이다, 태우다; 불이 붙다, 타오르다; (감정·열정 등을) 타오르게 하다; 자극하다, 부추기다',s:'ignite, spark, excite, arouse',r:'고대 노르드어 kynda (light a fire, 불 지르다) → 불씨에 불을 붙이다 → 불을 지피다·감정을 자극하다로 고착 > 성냥으로 장작에 불을 붙이는 장면이 원형'},
{n:1133,w:'visionary',m:'a. 공상적인, 가공의, 비현실적인; 예지력[선견지명]이 있는 / n. 선견지명이 있는 사람, 선지자',s:'imaginative, idealistic, prophetic, dreamy',r:'vision (시야·비전) + -ary → 미래를 보는 → 미래를 내다보는·공상적인으로 고착 > 남들보다 앞서 미래를 그리는 장면이 원형'},
{n:1134,w:'equilibrium',m:'n. 평형 (상태), 균형; (마음의) 평정',s:'balance, stability, equilibrium, poise',r:'라틴어 aequus (equal, 같은) + libra (scales, 저울) → 저울이 균형을 이루는 → 균형·평형으로 고착 > 저울 양쪽이 정확히 균형을 이루는 장면이 원형'},
{n:1135,w:'irresistible',m:'a. 억누를 수 없는, 저항할 수 없는; 압도적인; (사람이나 물건이) 못 견디게 매혹적인',s:'compelling, irresistible, overwhelming, powerful',r:'ir (not) + resist (저항하다) + -ible → 저항할 수 없는 → 저항할 수 없는으로 고착 > 아무리 참으려 해도 당겨지는 매력의 장면이 원형'},
{n:1136,w:'sow',m:'v. (씨를) 뿌리다, 심다 / n. (성숙한) 암퇘지',s:'scatter, plant, disperse, broadcast',r:'고대 영어 sawan (sow, 씨 뿌리다) → 씨를 뿌리다 → 씨를 뿌리다·야기하다로 고착 > 밭에 씨앗을 하나씩 뿌리는 장면이 원형'},
{n:1137,w:'allegiance',m:'n. (정당·종교·통치자 등에 대한) 충성',s:'loyalty, faithfulness, devotion, fidelity',r:'고대 프랑스어 ligeance (loyalty, 충성) → 주군에 대한 충성 → 충성·충절로 고착 > 왕 앞에 무릎 꿇고 충성을 맹세하는 장면이 원형'},
{n:1138,w:'regale',m:'v. 환응하다, 융숭하게 대접하다; 즐겁게[기쁘게] 해 주다; (맛있는 것으로) 원기를 회복하다 / n. 성찬, 향응',s:'entertain, feast, treat, welcome',r:'프랑스어 régaler (entertain lavishly, 풍성하게 대접하다) → 왕처럼 대접하다 → 성대히 대접하다·즐겁게 하다로 고착 > 손님에게 맛있는 음식을 푸짐하게 대접하는 장면이 원형'},
{n:1139,w:'pretext',m:'n. 구실, 평계',s:'excuse, pretext, cover story, alibi',r:'라틴어 prae (before) + textus (woven, 짜인) → 미리 짜놓은 이유 → 구실·핑계로 고착 > 진짜 이유를 숨기기 위해 내세운 변명의 장면이 원형'},
{n:1140,w:'compelling',m:'a. (너무나 흥미로워서) 주목하지 않을 수 없는; 설득력 있는, 강력한',s:'powerful, persuasive, convincing, forceful',r:'라틴어 compellere (force, 강요하다) + -ing → 강요하는 → 강렬한·설득력 있는으로 고착 > 눈을 뗄 수 없을 만큼 강렬한 장면이 원형'},
{n:1141,w:'beverage',m:'n. (보통 물 이외의) 마실 것, 음료',s:'drink, liquid, fluid, refreshment',r:'라틴어 bibere (drink, 마시다) → 마시는 것 → 음료로 고착 > 컵에 담긴 다양한 음료의 장면이 원형'},
{n:1142,w:'flint',m:'n. 부싯돌; 라이터 돌; 아주 단단한 물건; 냉혹[무정]한 것',s:'hard, tough, resilient, unyielding',r:'고대 영어 flint (hard stone, 단단한 돌) → 불꽃을 내는 단단한 돌 → 부싯돌로 고착 > 부싯돌을 부딪혀 불꽃을 내는 장면이 원형'},
{n:1143,w:'exotic',m:'a. 외국산의, 외국중의, 외래의; 이국적인, 이국풍의',s:'foreign, unfamiliar, tropical, strange',r:'그리스어 exotikos (foreign, 외국의) → 낯선 외국에서 온 → 이국적인·외래의로 고착 > 본 적 없는 낯선 이국의 식물의 장면이 원형'},
{n:1144,w:'dowager',m:'n. 귀족 미망인; 부와 기품을 겸비한 여성',s:'widow, noblewoman, titled lady',r:'고대 프랑스어 douagiere (dower holder, 과부 재산 보유자) → 과부로 재산을 보유한 귀부인 → 과부 귀부인으로 고착 > 품위 있는 노귀부인의 장면이 원형'},
{n:1145,w:'guarantee',m:'n. 보증; 담보, 담보물; 보증서; 개런티 / vt. 보증하다; ~을 확실히 하다, 보장하다',s:'assurance, promise, warranty, pledge',r:'스페인어 garante (guarantor, 보증인) → 보증하는 것 → 보증·담보하다로 고착 > 제품에 품질 보증서를 첨부하는 장면이 원형'},
{n:1146,w:'sturdy',m:'a. (사람·동물이) 강건한, 억센, 건장한; (물건이) 튼튼한, 견고한; 확고한, 단호한',s:'robust, tough, strong, powerful',r:'고대 프랑스어 estourdi (dazed, 어리둥절한) → 단단해 어지간한 것에 굴하지 않는 → 튼튼한·억센으로 고착 > 어떤 충격에도 버티는 튼튼한 장면이 원형'},
{n:1147,w:'reward',m:'n. 보수, 보상; 현상금, 보상금, 사례금 / vt. 보수를 주다, 상을 주다; 보답하다; 보복하다, 발하다',s:'compensate, repay, reward, recompense',r:'고대 노르드어 varða (guard, 지키다) → 지킨 것에 대한 보답 → 보상·상으로 고착 > 수고한 사람에게 포상을 주는 장면이 원형'},
{n:1148,w:'mollycoddle',m:'vt. 지나치게 떠받들다, 응석을 받아주다, 과잉보호하다 / n. 응석받이, 응석받이로 자란 사람',s:'overprotect, pamper, coddle, spoil',r:'Molly (여성 이름) + coddle (응석받이로 키우다) → 지나치게 보살피다 → 과보호하다·응석 받아주다로 고착 > 아이를 지나치게 보호해 스스로 못 하게 하는 장면이 원형'},
{n:1149,w:'trajectory',m:'n. 탄도, 궤도, 궤적',s:'path, course, arc, flight path',r:'라틴어 trans (across) + jectus (thrown, 던진) → 가로질러 던진 경로 → 궤도·경로로 고착 > 던진 공이 포물선을 그리며 날아가는 장면이 원형'},
{n:1150,w:'portion',m:'n. 한 조각, 일부, 부분; 몫; (음식의) 1인분 / vt. 나누다, 분할하다, 분배하다',s:'share, serving, allotment, piece',r:'라틴어 portio (share, 몫) → 나눈 몫 → 부분·1인분으로 고착 > 케이크를 동일하게 나누는 장면이 원형'},
{n:1151,w:'titular',m:'a. 이름뿐인, 유명무실한; 명의[명목]상의; 표제의, 제목의',s:'nominal, in name only, token, symbolic',r:'라틴어 titulus (title, 칭호) + -ar → 칭호의 → 칭호상의·주인공의로 고착 > 실권 없이 이름만 대표인 장면이 원형'},
{n:1152,w:'discretion',m:'n. 신중, 분별; 판단[선택, 행동]의 자유, 자유재량(권)',s:'judgment, caution, wisdom, prudence',r:'라틴어 discernere (distinguish, 구별하다) → 상황을 구별해 판단하는 능력 → 분별·재량으로 고착 > 상황에 맞게 신중히 판단하는 장면이 원형'},
{n:1153,w:'pretentious',m:'a. 허세 부리는, 자만하는, 잘난 체하는',s:'fake, bluff, simulate, imitate',r:'라틴어 praetendere (claim, 주장하다) → 실제보다 더 대단한 척 주장하는 → 거만한·허세부리는으로 고착 > 실제 실력 이상인 척 과시하는 장면이 원형'},
{n:1154,w:'assort',m:'v. 분류하다, 구분하다; (각종 물품을) 고루 갖추다, 구색을 갖추다',s:'classify, categorize, arrange, group',r:'라틴어 ad (to) + sortire (sort, 분류하다) → ~에 맞게 분류하다 → 분류하다·구색을 맞추다로 고착 > 색깔별로 분류해 담는 장면이 원형'},
{n:1155,w:'epiphany',m:'n. (the E~) 예수의 공현(公顯); (e~) (신의) 출현; (어떤 사물이나 본질에 대한) 직관, 통찰',s:'revelation, insight, manifestation, inspiration',r:'그리스어 epi (upon) + phainein (show, 나타내다) → 위에서 나타나다 → 갑작스러운 깨달음·현현으로 고착 > 번쩍하는 순간 진리가 깨달아지는 장면이 원형'},
{n:1156,w:'suppress',m:'v. (반란·폭동 등을) 진압하다; (감정 등을) 억누르다, 참다; (인쇄·발표 등을) 금하다',s:'put down, quell, crush, restrain',r:'라틴어 sub (under) + premere (press, 누르다) → 아래로 눌러 억누르다 → 억압하다·진압하다로 고착 > 솟구치려는 것을 강하게 눌러 막는 장면이 원형'},
{n:1157,w:'indiscriminate',m:'a. 무차별의, 무분별한',s:'random, general, sweeping, wholesale',r:'in (not) + discriminate (구별하다) → 구별하지 않는 → 무차별적인으로 고착 > 가리지 않고 모두에게 똑같이 하는 장면이 원형'},
{n:1158,w:'recruit',m:'v. (신병이나 신입사원 등을) 모집하다[뽑다] / n. 신병; 신입생; 신참자; 초심자, 초보자',s:'hire, enlist, enroll, sign up',r:'라틴어 recrescere (grow again, 다시 자라다) → 새로 키우다 → 신병을 모집하다·신입으로 고착 > 군에 새로 입대하는 신병의 장면이 원형'},
{n:1159,w:'sham',m:'n. 가짜, 속임, 협잡(協雜), 위선; 속이는 사람; 사기꾼; 야바위꾼; 꾀병 부리는 사람 / a. 모조의, 가짜의, 허위의',s:'fake, pretense, fraud, deception',r:'중세 영어 sham (disgrace, 수치) → 가짜로 수치를 가리다 → 가짜·위장하다로 고착 > 실제가 아닌데 진짜인 척 속이는 장면이 원형'},

{n:1161,w:'fray',m:'n. 싸움, 말다툼 / v. (천이) 닳다, (천을) 닳게 하다, 해어지게 하다; (신경을) 날카로워지다, (신경을) 날카로워지게 만들다',s:'battle, conflict, struggle, skirmish',r:'고대 프랑스어 frayer (rub, 문지르다) → 문질러 닳아 해지다·싸움 → 닳다·싸움으로 고착 > 소매 끝이 닳아 풀리는 장면이 원형'},
{n:1162,w:'disproportionate',m:'a. 불균형의, 어울리지 않는',s:'uneven, lopsided, unbalanced, unfair',r:'dis (not) + proportionate (비례하는) → 비례하지 않는 → 불균형한·과도한으로 고착 > 결과가 원인에 비해 과도한 장면이 원형'},

{n:1167,w:'browse',m:'v. (책·신문 등을) 대강 읽다[훑어보다]; (가게 안의 상품을) 이것저것 둘러보다[구경하다]; (정보를 찾아) 인터넷을 돌아다니다; (소·사슴 등이) 풀싹을 먹다',s:'skim, scan, look through, graze',r:'고대 프랑스어 broust (young shoot, 새순) → 새순을 뜯어 먹다 → 훑어보다·대강 보다로 고착 > 책장을 넘기며 대강 살피는 장면이 원형'},

{n:1172,w:'extract',m:'vt. 뽑아내다, 빼내다, 꺼내다; (증류·광물 등을) 추출하다, 채취하다; 발췌하다, 인용하다 / n. 추출물, (정분을 내어 농축한) 진액; 초록(抄錄), 인용(구), 발췌',s:'draw out, derive, pull, obtain',r:'라틴어 ex (out) + trahere (draw, 당기다) → 밖으로 당겨 꺼내다 → 추출하다·발췌하다로 고착 > 식물에서 정수를 뽑아내는 장면이 원형'},

{n:1176,w:'index',m:'n. 색인, 찾아보기; 표시하는 것, 표시; 지침, 지표; 지수',s:'pointer, indicator, measure, listing',r:'라틴어 indicare (point out, 가리키다) → 가리키는 것 → 색인·지수·지표로 고착 > 책 뒤에 단어와 쪽수를 나열한 색인의 장면이 원형'},

{n:1179,w:'canvass',m:'v. (여론·의견 등을) 상세히 조사하다, 검토하다; (선거·정당·지지를 위한) 유세를 하다',s:'scrutinize, inspect, examine, sift',r:'canvas (두꺼운 천) → 천에 물건을 싸서 다니며 팔다 → 표를 구하다·세밀히 조사하다로 고착 > 선거 운동원이 집집마다 방문하는 장면이 원형'},

{n:1182,w:'crack',m:'v. 갈라지다, 금이 가다; 금이 가게 하다; (암호를) 해독하다 / n. 갈라진 금, 균열; 틈; 사소한 결함[결점]',s:'snap, break, shatter, split',r:'고대 영어 cracian (make a sharp sound, 날카로운 소리를 내다) → 깨지며 나는 소리 → 금·균열·뛰어난으로 고착 > 도자기에 생긴 가는 균열의 장면이 원형'},
{n:1183,w:'stalemate',m:'n. 교착상태, 막다름, 곤경',s:'deadlock, impasse, standoff, tie',r:'stale (막다) + mate (체크메이트) → 움직일 수 없는 교착 상태 → 교착 상태·막힌 상황으로 고착 > 체스에서 어느 쪽도 이길 수 없는 교착의 장면이 원형'},
{n:1184,w:'insuperable',m:'a. (곤경·문제 등이) 이겨낼 수 없는, 극복할 수 없는',s:'insurmountable, impossible, unbeatable',r:'라틴어 in (not) + superare (overcome, 극복하다) → 극복할 수 없는 → 넘을 수 없는으로 고착 > 어떤 방법으로도 넘어갈 수 없는 장벽의 장면이 원형'},
{n:1185,w:'upset',m:'v. 뒤집다, 전복시키다; (계획 등을) 엉망으로 만들다, 잘못되게 만들다 / a. 뒤집힌, 전복한; 당황한, 혼란한, 엉망진창이 된 / n. 전복, 전도, 뒤집힘',s:'overthrow, topple, disturb, destabilize',r:'up (위로) + set (놓다) → 뒤집어 놓다 → 뒤엎다·당황하게 하다로 고착 > 쟁반이 뒤집혀 음식이 쏟아지는 장면이 원형'},

{n:1191,w:'watershed',m:'a. 분기점을 이루는, 분수령이 되는 / n. 분수령, 분수계; (국면 따위의) 결정적인 갈림[결분기]',s:'turning point, divide, critical point',r:'water (물) + shed (나누다) → 물이 나뉘는 지점 → 분수령·전환점으로 고착 > 빗물이 산 정상에서 두 방향으로 나뉘는 장면이 원형'},

{n:1194,w:'stentorian',m:'a. 목소리가 우렁찬, 목소리가 매우 큰',s:'booming, thunderous, powerful, resonant',r:'그리스 신화 Stentor (헤라의 전령, 엄청난 목소리를 가진) → 스텐토르처럼 큰 목소리 → 목소리가 매우 큰으로 고착 > 확성기 없이도 군중 전체에 들리는 목소리의 장면이 원형'},
{n:1195,w:'decode',m:'vt. (암호 등을) 해독[번역]하다',s:'decode, interpret, figure out, translate',r:'de (undo) + code (암호) → 암호를 풀다 → 해독하다로 고착 > 암호문을 분석해 의미를 밝혀내는 장면이 원형'},
{n:1196,w:'precept',m:'n. 교훈, 가르침, 개울; 격언',s:'rule, principle, guideline, instruction',r:'라틴어 prae (before) + capere (take, 잡다) → 미리 잡아두는 것 → 교훈·훈계·계율로 고착 > 스승이 제자에게 삶의 교훈을 전하는 장면이 원형'},
{n:1197,w:'numerical',m:'a. 수(數)의, 수적인, 숫자상의, 숫자로 나타낸; 계산능력의, 산수능력의',s:'mathematical, statistical, quantitative',r:'라틴어 numerus (number, 숫자) + -al → 숫자의 → 수의·숫자의로 고착 > 표에 수치가 정리된 장면이 원형'},
{n:1198,w:'cure-all',m:'n. 만병통치약; 모든 문제를 해결할 수 있는 것',s:'remedy, fix-all, solution, panacea',r:'cure (치료하다) + all (모두) → 모두를 치료하는 → 만병통치약으로 고착 > 한 가지 약으로 모든 병을 낫게 한다는 장면이 원형'},
{n:1199,w:'mischief',m:'n. (악의 없는) 나쁜 짓, 장난; (사람·평판에 대한) 해[피해], 악영향',s:'trouble, naughtiness, misbehavior, pranks',r:'mis (bad) + chief (끝) → 나쁜 끝을 만드는 것 → 장난·해로움으로 고착 > 숨어서 장난을 치며 킬킬 웃는 장면이 원형'},
{n:1200,w:'binocular',m:'a. 두 눈의, 쌍안용(雙眼用)의 / n. (보통 pl.) 쌍안경; 쌍안 망원경[현미경]',s:'field glasses, optical instrument, scope',r:'라틴어 bi (two, 둘) + ocular (eye, 눈의) → 두 눈으로 보는 → 쌍안경으로 고착 > 두 눈에 대고 멀리 보는 쌍안경의 장면이 원형'},
{n:1201,w:'mundane',m:'a. 이승의, 현세의, 세속적인; 평범한, 흔히 있는',s:'worldly, secular, everyday, temporal',r:'라틴어 mundus (world, 세계) → 세상의 평범한 일 → 세속적인·평범한으로 고착 > 영적인 것과 반대로 그냥 일상적인 장면이 원형'},
{n:1202,w:'exasperate',m:'vt. 분개시키다, 화나게 하다; (병고통·감정 따위를) 악화시키다',s:'irritate, infuriate, provoke, aggravate',r:'라틴어 ex (out) + asper (rough, 거친) + -ate → 거칠게 만들다 → 몹시 화나게 하다로 고착 > 반복되는 실수에 참을성이 바닥나는 장면이 원형'},
{n:1203,w:'depot',m:'n. (대규모의) 창고, 저장소; (상업) 상품 유통 거점; (군사) 보급소; 연대 본부; 신병 훈련소, 보충대; (철도) 역; 버스 정류장; (버스 등의) 차고',s:'storehouse, warehouse, store, repository',r:'프랑스어 dépôt (deposit, 맡기다) → 물건을 맡겨두는 곳 → 창고·차량기지로 고착 > 버스들이 주차된 차량 기지의 장면이 원형'},
{n:1204,w:'gaze',m:'vi. (놀라움·흥미를 가지고) 가만히 보다, 응시하다 / n. 응시, 주시, 눈여겨 봄',s:'stare, look, peer, observe',r:'중세 영어 gasen (stare, 응시하다) → 오랫동안 응시하다 → 응시하다·바라보다로 고착 > 지평선을 넋 놓고 바라보는 장면이 원형'},
{n:1205,w:'apogee',m:'n. 정점, 절정; (천문) 원지점(달이나 인공위성이 지구로부터 가장 멀리 떨어진 지점)',s:'peak, summit, high point, climax',r:'그리스어 apo (away) + gaia (earth, 지구) → 지구에서 가장 먼 지점 → 원지점·정점으로 고착 > 달이 지구에서 가장 멀리 떨어진 지점의 장면이 원형'},
{n:1206,w:'resonant',m:'a. (소리·목소리 등이) 울리는, 공명[반향]하는, 낭랑한; 공명[공감]을 불러일으키는',s:'echo, ring, vibrate, reverberate',r:'라틴어 resonare (resound, 울리다) + -ant → 울려 퍼지는 → 울려 퍼지는·공명하는으로 고착 > 종소리가 넓게 울려 퍼지는 장면이 원형'},
{n:1207,w:'psychology',m:'n. 심리학; 심리 (상태)',s:'mental science, behavioral study',r:'그리스어 psyche (soul, 영혼) + log (study) → 영혼을 연구하는 것 → 심리학으로 고착 > 인간 마음의 작동 원리를 연구하는 장면이 원형'},
{n:1208,w:'disfigure',m:'vt. ~의 외관을 손상시키다, 볼꼴 사납게 하다',s:'mar, spoil, blemish, deform',r:'dis (undo) + figure (모양) → 모양을 망가뜨리다 → 외모를 손상시키다로 고착 > 사고로 얼굴 형태가 변하는 장면이 원형'},
{n:1209,w:'sheen',m:'n. 번쩍임, 광휘, 광채; 광택, 윤',s:'brilliance, radiance, brightness, glitter',r:'고대 영어 sciene (bright, 밝은) → 표면에서 나는 은은한 광택 → 윤기·광택으로 고착 > 비단 천에서 반사되는 은은한 빛의 장면이 원형'},
{n:1210,w:'account',m:'n. 계산, 셈; 계산서, 청구서; 기술, 서술; 이유, 근거; 원인, 동기 / v. (이유·원인을) 설명하다; (어떤 부분·비율을) 차지하다',s:'description, record, report, narration',r:'라틴어 ad (to) + computare (count, 세다) → ~를 향해 세다 → 계산하다·설명하다·계정으로 고착 > 장부에 수입과 지출을 기록하는 장면이 원형'},
{n:1211,w:'preposterous',m:'a. 말도 안 되는, 터무니없는, 비상식적인, 불합리한; 파격적인, 엉뚱한; 앞뒤가 뒤바뀐',s:'absurd, ridiculous, irrational, nonsensical',r:'라틴어 prae (before) + posterus (after, 뒤) → 앞뒤가 뒤바뀐 → 터무니없는으로 고착 > 신발을 머리에 쓰는 것처럼 말도 안 되는 장면이 원형'},
{n:1212,w:'stain',m:'v. 얼룩지게 하다, 더럽히다; 얼룩지다, 더러워지다 / n. (지우기 힘든) 얼룩; (평판에 생긴) 오점',s:'color, tint, mark, tarnish',r:'고대 노르드어 steina (paint, 칠하다) → 색이 배어들어 얼룩이 되다 → 얼룩·오점·물들이다로 고착 > 흰 셔츠에 커피가 흘러 얼룩이 된 장면이 원형'},
{n:1213,w:'bulletin',m:'n. (중요한) 고시, 공고, 게시; (라디오·텔레비전의) 속보, 뉴스 속보',s:'notice, announcement, report, statement',r:'프랑스어 bulletin (official report, 공식 보고) → 공식 발표 → 게시·공보로 고착 > 게시판에 붙은 공지문의 장면이 원형'},
{n:1214,w:'initiate',m:'vt. 시작하다, 개시하다, 창시하다; 초보[원리]를 가르치다, 전수하다; 가입[입회]시키다',s:'begin, start, commence, launch',r:'라틴어 initiare (begin, 시작하다) → 새로 시작하게 하다 → 시작하다·입회시키다로 고착 > 새 구성원에게 입회 의식을 치르는 장면이 원형'},
{n:1215,w:'heterodox',m:'a. 이교(異敎)의, 이단의, 비정통적인',s:'unorthodox, nonconformist, dissenting',r:'그리스어 heteros (other, 다른) + doxa (opinion, 의견) → 다른 의견을 가진 → 이단적인으로 고착 > 기존 정설과 다른 주장을 내세우는 장면이 원형'},
{n:1216,w:'surveillance',m:'n. 감시, 감독',s:'monitoring, watch, tracking, observation',r:'프랑스어 sur (over) + veiller (watch, 지키다) → 위에서 지켜보다 → 감시로 고착 > 카메라로 24시간 지켜보는 장면이 원형'},
{n:1217,w:'wallow',m:'vi. (물·진흙 속에서) 뒹굴다; (사치·쾌락 등에) 빠지다, 탐닉하다',s:'roll, wallow, flounder, luxuriate',r:'고대 영어 wealwian (roll, 구르다) → 진흙 속에서 구르다 → 뒹굴다·탐닉하다로 고착 > 돼지가 진흙탕에서 뒹구는 장면이 원형'},
{n:1218,w:'vassal',m:'n. (봉건 시대의) 봉신, 가신; 종속자, 부하; 노예 / a. 봉신의, 신하의; 예속된, 종속된, 노예 같은',s:'serf, servant, subject, subordinate',r:'중세 라틴어 vassallus (servant, 하인) → 주군에 봉사하는 사람 → 봉신·신하로 고착 > 영주 앞에 무릎 꿇은 봉건 신하의 장면이 원형'},
{n:1219,w:'tailor',m:'v. (특정한 목적·사람 등에) 맞추다[조정하다]',s:'customize, fit, adapt, adjust',r:'고대 프랑스어 tailleur (cutter, 자르는 사람) → 천을 잘라 만드는 사람 → 재단사·맞춤으로 고착 > 자 대고 천을 재단하는 장면이 원형'},
{n:1220,w:'steadfast',m:'a. 확고부동한, 고정된, (신념 등이) 불변의, 부동의',s:'firm, resolute, determined, unwavering',r:'고대 영어 stedefast (fixed in place, 제자리에 고정된) → 흔들리지 않고 고정된 → 확고한·변함없는으로 고착 > 어떤 압력에도 뜻을 굽히지 않는 장면이 원형'},
{n:1221,w:'chauvinist',m:'n. 맹목적[광신적] 애국주의자; (주의나 성 차별 등의) 극단적 우월주의자',s:'nationalist, patriot, bigot, jingoist',r:'Nicolas Chauvin (나폴레옹을 맹목적으로 숭배한 군인) → 맹목적으로 자국을 숭배하는 → 국수주의자·우월주의자로 고착 > 자국이 최고라며 맹목적으로 주장하는 장면이 원형'},
{n:1222,w:'epidemic',m:'n. 유행병, 전염병 / a. 유행성[전염병]의; 유행하고 있는',s:'plague, outbreak, pandemic, contagion',r:'그리스어 epi (upon) + demos (people, 민중) → 민중 위에 퍼지는 → 유행병·만연으로 고착 > 질병이 순식간에 도시 전체로 퍼지는 장면이 원형'},
{n:1223,w:'cataclysm',m:'n. (사회·정치적인) 격변, 대변동; 대홍수, 범람',s:'flood, deluge, disaster, upheaval',r:'그리스어 kata (down) + klyzein (wash, 씻다) → 아래로 씻어 내리는 → 대홍수·대격변으로 고착 > 모든 것을 쓸어내리는 대재앙의 장면이 원형'},
{n:1224,w:'ragamuffin',m:'n. 누더기를 걸친 사람[아이]; 부랑아',s:'waif, stray, urchin, tramp',r:'중세 영어 ragamoffyn (ragged person, 누더기 입은 사람) → 누더기를 입은 개구쟁이 → 지저분한 아이·누더기 차림으로 고착 > 더러운 옷을 걸치고 장난치는 아이의 장면이 원형'},
{n:1225,w:'propel',m:'vt. 나아가게 하다, 몰고 가다, 추진하다',s:'drive, push, launch, move forward',r:'라틴어 pro (forward) + pellere (drive, 몰다) → 앞으로 몰다 → 추진하다·나아가게 하다로 고착 > 로켓 엔진이 우주선을 앞으로 밀어내는 장면이 원형'},
{n:1226,w:'impudent',m:'a. 건방진, 무례한, 버릇없는',s:'insolent, brazen, arrogant, shameless',r:'라틴어 im (not) + pudens (shame, 수치) → 수치를 모르는 → 뻔뻔스러운·무례한으로 고착 > 잘못을 지적해도 당당하게 맞서는 장면이 원형'},
{n:1227,w:'coalesce',m:'vi. (더 큰 덩어리로) 합치다, 연합[합동]하다',s:'merge, unite, fuse, combine',r:'라틴어 co (together) + alescere (grow up, 자라다) → 함께 자라 하나가 되다 → 합치다·하나가 되다로 고착 > 작은 물방울들이 합쳐져 큰 방울이 되는 장면이 원형'},
{n:1228,w:'pugnacious',m:'a. 호전적인, 싸움하기 좋아하는',s:'aggressive, combative, warlike, hostile',r:'라틴어 pugnus (fist, 주먹) + -acious → 주먹을 쓰는 성질 → 호전적인·싸우기 좋아하는으로 고착 > 작은 자극에도 주먹을 들어올리는 장면이 원형'},
{n:1229,w:'voyage',m:'n. 여행, 항해(특히 바다·우주로 하는 긴 여행)',s:'journey, trip, cruise, expedition',r:'라틴어 viaticum (traveling provision, 여행 준비물) → 준비물을 갖춘 긴 여행 → 항해·여행으로 고착 > 먼 바다를 향해 배가 출항하는 장면이 원형'},
{n:1230,w:'zoom',m:'v. (가격·비용 등이) 급등[급증]하다; (인물·장면을) 확대[축소]하다',s:'spike, soar, skyrocket, shoot up',r:'의성어 zoom (빠른 소리) → 쌩 소리를 내며 빠르게 가다 → 빠르게 움직이다·확대하다로 고착 > 카메라 렌즈가 빠르게 당겨지는 장면이 원형'},
{n:1231,w:'trilogy',m:'n. (연극·소설·영화 등의) 3부작',s:'three-part series, triad, triple work',r:'그리스어 tri (three, 셋) + log (story, 이야기) → 세 개의 이야기 → 3부작으로 고착 > 같은 세계관의 세 작품으로 이루어진 장면이 원형'},
{n:1232,w:'dutiful',m:'a. 본분을 지키는[다하는], 충실한; 순종하는',s:'loyal, obedient, faithful, responsible',r:'duty (의무) + -ful → 의무로 가득한 → 의무를 다하는·충실한으로 고착 > 어떤 상황에서도 맡은 바를 다하는 장면이 원형'},
{n:1233,w:'sleight',m:'n. 능숙한 솜씨; 교활; 속임수',s:'dexterity, deftness, agility, nimbleness',r:'고대 노르드어 slœgth (cunning, 교묘함) → 교묘한 솜씨 → 교묘한 솜씨·속임수로 고착 > 마술사가 눈 깜짝할 사이에 물건을 사라지게 하는 장면이 원형'},
{n:1234,w:'crawl',m:'v. 네발로 가다, 포복하다; (식물의 덩굴 등이) 기다; 천천히 가다, 서행(徐行)하다; (시간이) 천천히 흐르다; 비굴하게 굴다, 굽실거리다',s:'creep, inch, move slowly',r:'고대 노르드어 krafla (claw, 발톱으로 기다) → 네 발로 기다 → 기다·느릿느릿 가다로 고착 > 아기가 배를 깔고 기어가는 장면이 원형'},
{n:1235,w:'malaise',m:'n. (질병의 전구(前驅) 증상으로서) 몸이 불편한 상태, 불쾌, 부조; (도덕적·사회적 퇴락에 대한) 막연한 불안, 초조, 불쾌감',s:'unease, discomfort, sickness, nausea',r:'프랑스어 mal (bad, 나쁜) + aise (ease, 편안함) → 편안함이 나쁜 상태 → 불쾌감·병세로 고착 > 명확한 이유 없이 몸과 마음이 불편한 장면이 원형'},
{n:1236,w:'nominate',m:'v. (선거·임명의 후보자로서) 지명하다, 임명하다',s:'appoint, name, designate, propose',r:'라틴어 nominare (name, 이름 붙이다) → 이름을 지정하다 → 지명하다·추천하다로 고착 > 후보자로 이름을 올리는 장면이 원형'},
{n:1237,w:'askance',m:'ad. 의심[불신]의 눈으로; 옆으로, 비스듬히, 곁눈으로',s:'suspicious, wary, distrustful, doubtful',r:'16세기 영어 askance (sidelong, 곁눈으로) → 옆으로 비스듬히 바라보다 → 의혹의 눈초리로·곁눈질로 고착 > 눈을 가늘게 뜨고 의심스럽게 바라보는 장면이 원형'},
{n:1238,w:'cumulative',m:'a. 점증적인, 누적하는',s:'accumulate, build up, pile up, mount',r:'라틴어 cumulare (heap up, 쌓다) → 쌓아 축적된 → 누적적인·점점 커지는으로 고착 > 눈덩이가 굴러 점점 커지는 장면이 원형'},

{n:1242,w:'pigment',m:'n. 그림물감, 안료(顔料); (생물) 색소 / v. 착색하다; 물들다',s:'dye, color, stain, tint',r:'라틴어 pingere (paint, 칠하다) → 색을 칠하는 물질 → 색소·물감으로 고착 > 캔버스에 색을 입히는 물감의 장면이 원형'},
{n:1243,w:'juggernaut',m:'n. (압도적으로) 강력하고 거대한 것[존재, 조직]; 대형 버스, 대형 트럭',s:'massive force, unstoppable power',r:'힌두어 Jagannath (크리슈나의 칭호) → 거대한 신의 수레처럼 모든 것을 짓밟는 → 압도적인 거대한 힘으로 고착 > 아무것도 막을 수 없이 밀고 오는 장면이 원형'},

{n:1245,w:'quorum',m:'n. (의결에 필요한) 정족수(定足數)',s:'minimum number, required number, majority',r:'라틴어 quorum (of whom, 그들 중) → 결정에 필요한 최소 인원 → 정족수로 고착 > 회의가 성립되는 최소 인원이 모인 장면이 원형'},
{n:1246,w:'evidence',m:'n. 증거; 증언; 형적, 흔적',s:'proof, testimony, exhibit, demonstration',r:'라틴어 e (out) + videre (see, 보다) → 밖으로 보이는 것 → 증거·근거로 고착 > 법정에서 증거물을 제시하는 장면이 원형'},

{n:1248,w:'peril',m:'n. 위험; 모험',s:'danger, risk, peril, hazard',r:'라틴어 periculum (test, 시험) → 생명을 시험하는 위험 → 위험·위태로움으로 고착 > 깊은 낭떠러지 끝에 선 장면이 원형'},
{n:1249,w:'retrieve',m:'v. 되찾다, 회수[회복]하다; 만회하다, 부활[경생]시키다; 벌충하다, (손해를) 바꾸다; 수선하다, 정하다; (컴퓨터) (정보를) 검색하다',s:'recover, reclaim, take back, restore',r:'고대 프랑스어 retrouver (find again, 다시 찾다) → 다시 찾아오다 → 되찾다·복구하다로 고착 > 개가 던진 공을 물어오는 장면이 원형'},

{n:1251,w:'voluntary',m:'a. 자발적인, 임의적인, 자진한; 고의의, 계획적인',s:'optional, unpaid, willing, unforced',r:'라틴어 voluntas (will, 의지) + -ary → 의지에 따른 → 자발적인·자원봉사의로 고착 > 강요 없이 스스로 손을 드는 장면이 원형'},
{n:1252,w:'enunciate',m:'v. (분명히) 발음하다; (생각을 명확히) 발하다; (이론·제안 등을) 발표[선언]하다',s:'pronounce, articulate, state, declare',r:'라틴어 e (out) + nuntiare (announce, 선언하다) → 밖으로 선언하다 → 명확히 발음하다·선언하다로 고착 > 또렷하게 한 음절씩 발음하는 장면이 원형'},
{n:1253,w:'simian',m:'a. 원숭이의; 유인원(類人猿)의; 원숭이 같은 / n. 유인원, 원숭이',s:'monkey-like, simian, ape-related',r:'라틴어 simia (ape, 원숭이) + -an → 원숭이의 → 원숭이의·유인원 같은으로 고착 > 나무를 타며 이리저리 움직이는 원숭이의 장면이 원형'},
{n:1254,w:'contempt',m:'n. 경멸, 모욕, 멸시; 경시, 무시; 치욕, 불명예, 체면 손상',s:'scorn, despise, disdain, look down on',r:'라틴어 con (completely) + temnere (scorn, 경멸하다) → 완전히 경멸하다 → 경멸·멸시로 고착 > 코웃음 치며 상대를 내려다보는 장면이 원형'},

{n:1257,w:'moniker',m:'n. (사람의) 이름; 별명, 별칭',s:'alias, label, tag, handle',r:'19세기 속어 moniker (name, 이름) → 별명 또는 이름 → 별명·닉네임으로 고착 > 진짜 이름 대신 부르는 별명의 장면이 원형'},
{n:1258,w:'release',m:'vt. 해방[석방]하다; 면제[해제]하다; 놀아 놓다; (폭탄을) 투하하다; 방출하다; (영화를) 개봉하다; (정보·레코드·신간 등을) 공개[발표, 발매]하다 / n. 해방; 방면, 면제; 발표, 공개, 발매; 개봉 (영화)',s:'free, liberate, discharge, let go',r:'re (again) + lease (풀어주다) → 다시 풀어주다 → 석방하다·발표하다로 고착 > 새장에서 새를 놓아주는 장면이 원형'},
{n:1259,w:'denouement',m:'n. (소설·희극의) 대단원; (사건의) 고비; (분쟁 따위의) 해결, 결말',s:'resolution, conclusion, ending, outcome',r:'프랑스어 dénouer (untie, 풀다) → 매듭이 풀리는 것 → 대단원·결말로 고착 > 모든 복잡한 줄거리가 해결되는 마지막 장면이 원형'},

{n:1262,w:'sewage',m:'n. 하수, 오물, 오수(汚水)',s:'wastewater, drain, effluent',r:'sewer (하수도) + -age → 하수도로 흘러가는 것 → 하수·오수로 고착 > 지하 하수도로 오물이 흘러가는 장면이 원형'},
{n:1263,w:'blight',m:'n. (식물의) 마름병 / vt. 말라죽게[시들게] 하다; 망치다',s:'blight, mildew, rot, disease',r:'고대 영어 bliht (pale, 창백한) → 식물을 창백하게 시드는 → 병충해·황폐화로 고착 > 곰팡이가 작물을 순식간에 죽이는 장면이 원형'},

{n:1267,w:'strand',m:'v. 좌초시키다, 좌초하다, 오도 가도 못하게 하다[되다] / n. (실·전선·머리카락 등의) 가닥[올, 줄]; 물가, 해변',s:'beach, leave stranded, isolate, abandon',r:'고대 영어 strand (shore, 해안) → 해안에서 오도 가도 못 하게 된 → 좌초시키다·실 가닥으로 고착 > 무인도에 혼자 버려진 장면이 원형'},

{n:1269,w:'annual',m:'a. 1년의, 1년에 걸친; 매년의',s:'yearly, recurring, periodic, regular',r:'라틴어 annus (year, 해) + -al → 해의 → 매년의·연간으로 고착 > 해마다 같은 날에 열리는 행사의 장면이 원형'},

{n:1274,w:'discourage',m:'vt. ~의 용기[희망, 자신]를 잃게 하다, 낙담시키다; (계획·사업 등을) 못하게 말리다, 단념시키다; ~을 방해하다, 방해하다',s:'dishearten, depress, demoralize, dispirit',r:'dis (not) + courage (용기) → 용기를 없애다 → 낙담시키다·단념하게 하다로 고착 > 포기하도록 막는 말을 하는 장면이 원형'},
{n:1275,w:'municipal',m:'a. 지방 자치제의, 시[읍, 군의]의',s:'civic, urban, city, local',r:'라틴어 municipium (free town, 자유 도시) + -al → 도시의 → 시의·지방자치의로 고착 > 시청에서 지역 사업을 처리하는 장면이 원형'},
{n:1276,w:'punctuate',m:'v. (문장에) 구두점을 찍다; 강조하다; (말을) 중단시키다, 잠시 그치게 하다',s:'point, mark, comma, add punctuation',r:'라틴어 punctus (point, 점) + -ate → 점으로 표시하다 → 구두점을 찍다·강조하다로 고착 > 문장에 쉼표와 마침표를 찍는 장면이 원형'},

{n:1278,w:'agnostic',m:'n. 불가지론자',s:'skeptic, doubter, nonbeliever, questioner',r:'그리스어 a (not) + gnostikos (knowing, 아는) → 알 수 없다는 → 불가지론자로 고착 > 신의 존재를 알 수 없다고 주장하는 장면이 원형'},
{n:1279,w:'indoctrinate',m:'vt. (교의·신앙 등을) 주입하다; 세뇌시키다',s:'brainwash, train, program, influence',r:'라틴어 in (into) + doctrina (teaching, 교리) → 교리를 안에 넣다 → 주입시키다·세뇌하다로 고착 > 한쪽으로 치우친 생각을 강하게 주입시키는 장면이 원형'},
{n:1280,w:'amiss',m:'a. [서술적] 적합하지 않은, 잘못된 / ad. 잘못하여; 부적당하게',s:'wrong, mistaken, incorrect, erroneous',r:'a (on) + miss (잘못) → 잘못된 상태에 있는 → 잘못된·탈이 난으로 고착 > 무언가 어긋나 있음을 느끼는 장면이 원형'},
{n:1281,w:'truce',m:'n. 휴전, 정전; 휴전[정전] 협정; 일시적 휴가(休止), 중지, 중단',s:'ceasefire, armistice, peace, suspension',r:'고대 영어 treow (faith, 믿음) → 서로 믿고 싸움을 멈추는 것 → 휴전·잠정 협정으로 고착 > 두 군대가 무기를 내리고 협상하는 장면이 원형'},
{n:1282,w:'glitter',m:'vi. 번쩍번쩍하다, 빛나다',s:'shine, sparkle, glitter, twinkle',r:'고대 노르드어 glitra (glitter, 반짝이다) → 수많은 빛이 깜박이며 반짝이다 → 반짝이다·화려함으로 고착 > 금박과 보석이 눈부시게 반짝이는 장면이 원형'},
{n:1283,w:'hubris',m:'n. 지나친 자신, 오만, 자만',s:'arrogance, pride, insolence, conceit',r:'그리스어 hubris (insolence, 오만) → 신을 무시할 만큼 과도한 오만 → 오만·자만으로 고착 > 신에게도 도전하는 듯한 오만함의 장면이 원형'},
{n:1284,w:'rig',m:'v. 의장(艤裝)하다; 장비를 갖추다, 준비하다; (시장·가격을) 부정하게 조작하다, 인위적으로 올리다 / n. 장비, 장치; 용구 한 벌; 기계; (석유 천연가스의) 굴착장치',s:'manipulate, fix, rig, equip',r:'중세 영어 rigge (ridge, 능선) → 선박의 돛과 장치 → 조작하다·장비로 고착 > 선거 결과를 불법으로 조작하는 장면이 원형'},
{n:1285,w:'prerogative',m:'n. (관직이나 지위에 따르는) 특권, 특혜',s:'privilege, right, advantage, entitlement',r:'라틴어 prae (before) + rogare (ask, 청하다) → 먼저 청할 수 있는 권리 → 특권·고유한 권리로 고착 > 왕만이 가진 특별한 권리의 장면이 원형'},
{n:1286,w:'exemplify',m:'vt. ~의 전형적인 예가 되다; 예를 들다',s:'demonstrate, show, typify, embody',r:'라틴어 exemplum (example, 예) + -fy → 예로 만들다 → 예를 들다·전형이 되다로 고착 > 어떤 개념의 가장 전형적인 예를 보여주는 장면이 원형'},
{n:1287,w:'unkempt',m:'a. 흐트러진, 단정치 못한; (말투가) 세련되지 못한, 거친',s:'messy, disheveled, untidy, scruffy',r:'un (not) + kempt (combed, 빗질된) → 빗질되지 않은 → 단정치 못한·허름한으로 고착 > 머리가 헝클어지고 옷이 구겨진 장면이 원형'},
{n:1288,w:'compile',m:'vt. (문서·발표 자료 등을) 한 권의 책으로 엮다, 편찬[편집]하다; (자료를) 모으다, 수집하다',s:'collect, assemble, gather, put together',r:'라틴어 com (together) + pilare (press, 누르다) → 함께 눌러 모으다 → 편집하다·모으다로 고착 > 여러 자료를 모아 하나의 목록을 만드는 장면이 원형'},
{n:1289,w:'succinct',m:'a. 간결한, 간단명료한',s:'brief, concise, compact, condensed',r:'라틴어 sub (under) + cinctus (girded, 허리띠 맨) → 허리띠로 조여 간결한 → 간결한·요점만 담은으로 고착 > 핵심만 담아 짧게 표현하는 장면이 원형'},
{n:1290,w:'feudalism',m:'n. 봉건제도, 봉건주의',s:'medieval system, serfdom, hierarchy',r:'중세 라틴어 feudum (fief, 봉토) + -ism → 봉토를 기반으로 한 제도 → 봉건주의로 고착 > 영주와 봉신의 수직적 관계의 장면이 원형'},
{n:1291,w:'wield',m:'vt. (무기·도구 등을) 휘두르다, 사용하다; (권력·권위 등을) 행사하다',s:'brandish, swing, control, manage',r:'고대 영어 wieldan (control, 통제하다) → 힘으로 통제하다 → 휘두르다·행사하다로 고착 > 칼을 자유롭게 휘두르는 장면이 원형'},
{n:1292,w:'leash',m:'n. (개 등을 매는) 가죽 끈, 사슬 / vt. 가죽 끈으로 매다; 속박하다; 억제하다',s:'restraint, chain, bond, tether',r:'고대 프랑스어 laisse (cord, 끈) → 개를 묶는 가죽끈 → 가죽끈·억제하다로 고착 > 개의 목에 줄을 달아 제어하는 장면이 원형'},
{n:1293,w:'pill',m:'n. 환약, 알약; (the ~) 경구(經口) 피임약',s:'tablet, capsule, medicine, remedy',r:'라틴어 pila (ball, 공) → 작은 공 모양의 약 → 알약으로 고착 > 물과 함께 알약을 삼키는 장면이 원형'},
{n:1294,w:'bail',m:'n. 보석(保釋); 보석금 / vt. 보석하다; (경제적 위기에 처한 사람·회사 등을) 구해하다',s:'secure release, rescue, obtain freedom',r:'고대 프랑스어 bailler (hand over, 넘기다) → 돈을 넘겨 석방시키다 → 보석금·보석하다로 고착 > 법원에 보석금을 내고 석방되는 장면이 원형'},
{n:1295,w:'delectable',m:'a. 즐거운, 기쁜, 유쾌한; (음식물·음료수가) 아주 맛있는[맛있어 보이는], 좋은 냄새가 나는',s:'tasty, delicious, flavorful, scrumptious',r:'라틴어 delectare (delight, 기쁘게 하다) → 기쁘게 하는 → 맛있는·즐거운으로 고착 > 맛있는 음식에 눈을 감으며 감탄하는 장면이 원형'},
{n:1296,w:'giddy',m:'a. 현기증이 나는, 어지러운; 들뜬',s:'dizzy, excited, lightheaded, flighty',r:'고대 영어 gidig (insane, 미친) → 머리가 빙빙 도는 → 어지러운·들뜬으로 고착 > 빙글빙글 돌고 나서 어지러워하는 장면이 원형'},
{n:1297,w:'overtake',m:'v. 따라잡다[붙들다]; 추월하다, (뒤밖인 일 등을) 만히다',s:'catch, overtake, surpass, pass',r:'over (위로) + take (잡다) → 앞으로 잡아 추월하다 → 추월하다·따라잡다로 고착 > 달리기에서 앞선 선수를 추월하는 장면이 원형'},
{n:1298,w:'captious',m:'a. 흠잡기 잘하는, 말꼬리를 잡고 늘어지는, (공연히) 헐뜯는',s:'quibble, nitpick, find fault, criticize',r:'라틴어 captiosus (deceptive, 속이는) → 함정을 파는 → 트집 잡기 좋아하는으로 고착 > 사소한 것에서 흠을 찾아 비판하는 장면이 원형'},
{n:1299,w:'mechanism',m:'n. 기계 장치, 기구; 심리 과정, (심적) 기제; 무의식적 수단',s:'mechanism, apparatus, device, system',r:'그리스어 mechane (machine, 기계) + -ism → 기계의 작동 방식 → 기계 장치·작동 원리로 고착 > 시계 내부의 정밀한 톱니바퀴들의 장면이 원형'},
{n:1300,w:'replete',m:'a. 가득한, 충만한, 충분한',s:'full, stuffed, filled, abundant',r:'라틴어 re (again) + plere (fill, 채우다) → 완전히 다시 채운 → 충분히 채운·잔뜩 먹은으로 고착 > 배불리 먹어 더 이상 먹을 수 없는 장면이 원형'},
{n:1301,w:'nuisance',m:'n. 성가신[귀찮은] 사람[것, 일], 골칫거리',s:'annoyance, bother, trouble',r:'라틴어 nocere (harm, 해치다) → 해를 끼치는 귀찮은 것 → 골칫거리·성가신 것으로 고착 > 끊임없이 귀찮게 하는 장면이 원형'},
{n:1302,w:'stupefy',m:'vt. ① 마비시키다; 무감각하게 하다 ② (충격·감동 등으로) 멍하게 하다, 깜짝 놀라게 하다',s:'amaze, astonish, stun',r:'라틴어 stupere (be stunned, 멍하다) + -fy → 멍하게 만들다 → 망연자실하게 하다·마비시키다로 고착 > 충격으로 멍하게 서있는 장면이 원형'},
{n:1303,w:'boisterous',m:'a. ① 떠들썩한, 시끄러운, 흥청거리는, 활기찬; 난폭한, 거친 ② (바람·파도 등이) 거친, 사나운, 휘몰아치는',s:'clamorous, obstreperous, rowdy, uproarious',r:'중세 영어 boistuous (rude, 거친) → 거칠고 시끄러운 → 떠들썩한·난폭한으로 고착 > 아이들이 시끄럽게 뛰어다니는 장면이 원형'},
{n:1304,w:'autopsy',m:'n. 시체 해부, 검시, 부검 / vt. 검시하다',s:'necropsy, postmortem',r:'그리스어 autos (self, 스스로) + opsis (sight, 봄) → 스스로 보는 것 → 부검·검시로 고착 > 사인을 밝히기 위해 시신을 해부하는 장면이 원형'},
{n:1305,w:'sightly',m:'a. ① 보기 좋은, 아름다운, 예쁜, 잘생긴 ② 경치가 좋은, 전망이 좋은',s:'attractive, good-looking, nice-looking',r:'sight (시야) + -ly → 시야에 좋은 → 보기 좋은·아름다운으로 고착 > 눈을 사로잡는 아름다운 경치의 장면이 원형'},
{n:1306,w:'destination',m:'n. ① (여행 등의) 목적지, 행선지; 도착지 ② 목적, 의도; 용도',s:'goal, terminus',r:'라틴어 destinare (make firm, 굳히다) → 목표를 정해 놓은 곳 → 목적지·행선지로 고착 > 지도에서 최종 목적지를 표시하는 장면이 원형'},
{n:1307,w:'challenging',m:'a. ① 사람의 능력을 시험하는; 힘든; 흥미를 돋우는, 해볼 만한 ② 도발적인; 매력[매혹]적인',s:'testing',r:'challenge (도전) + -ing → 도전하게 만드는 → 어려운·도전적인으로 고착 > 쉽지 않은 과제에 도전하는 장면이 원형'},
{n:1308,w:'expostulate',m:'vi. 충고하다, 타이르다, 훈계하다',s:'admonish, exhort',r:'라틴어 ex (out) + postulare (demand, 요구하다) → 밖으로 요구하다 → 항의하다·설득하다로 고착 > 잘못에 강하게 항의하는 장면이 원형'},
{n:1309,w:'catastrophe',m:'n. 대참사, 재앙',s:'calamity, disaster, holocaust, scourge',r:'그리스어 kata (down) + strophe (turning, 전환) → 아래로 전환되는 것 → 대재앙·파국으로 고착 > 모든 것이 무너지는 최악의 사태의 장면이 원형'},
{n:1310,w:'grudge',m:'n. 원한, 유감; 악의 / vt. ① (무엇을 하거나 주는 것을) 억울해 하다, 아까워하다 ② 배 아파하다, 샘내다, 시기하다, 질투하다',s:'animosity, malice, rancor, resentment, venom, begrudge, envy',r:'고대 노르드어 grugga (make dark, 어둡게 하다) → 마음 안에 어두운 원한 → 원한·억울함으로 고착 > 오래된 억울함을 마음 속에 품은 장면이 원형'},
{n:1311,w:'overweening',m:'a. ① 자만심이 강한, 우쭐대는 ② (자랑 등이) 과장된, 도가 지나친',s:'arrogant, conceited, exaggerated, immoderate, inordinate',r:'고대 영어 oferwenian (be presumptuous, 주제넘다) → 지나치게 자신만만한 → 오만한·우쭐댄으로 고착 > 자신의 능력을 과대평가하며 거들먹거리는 장면이 원형'},
{n:1312,w:'inoculation',m:'n. ① (예방) 접종 ② 사상의 주입, 불어넣기; 강화; 접붙임, 접목',s:'vaccination',r:'라틴어 inoculare (graft, 접목하다) → 접목하듯 약한 균을 넣다 → 접종·예방 주사로 고착 > 주사기로 백신을 접종하는 장면이 원형'},
{n:1313,w:'testify',m:'v. 증언[증명]하다; 입증하다',s:'attest, certify',r:'라틴어 testis (witness, 증인) + -fy → 증인으로서 말하다 → 증언하다·입증하다로 고착 > 법정에서 손을 들고 증언하는 장면이 원형'},
{n:1314,w:'ethnocentrism',m:'n. (다른 민족을 멸시하는) 자기민족 중심주의',s:'',r:'그리스어 ethnos (race, 민족) + center (중심) + -ism → 자기 민족을 중심으로 보는 주의 → 자민족 중심주의로 고착 > 자신의 문화만이 옳다고 판단하는 장면이 원형'},
{n:1315,w:'refractory',m:'a. ① 말을 안 듣는, 다루기 어려운, 고집 센 ② (병이) 난치의, 잘 낫지 않는',s:'disobedient, stubborn, unmanageable, unruly, incurable, intractable, obstinate',r:'라틴어 refractarius (stubborn, 완고한) → 완고하게 저항하는 → 반항적인·다루기 어려운으로 고착 > 어떤 치료도 듣지 않는 장면이 원형'},
{n:1316,w:'predisposition',m:'n. 성향, 경향; 질병에 대한 소인',s:'disposition, inclination, tendency',r:'pre (before) + disposition (성향) → 미리 성향이 정해진 → 성질·소인·경향으로 고착 > 유전적으로 특정 병에 걸리기 쉬운 장면이 원형'},
{n:1317,w:'invade',m:'v. ① 침입하다, 침략하다 ② (권리 등을) 침해하다 ③ (병이) 침범하다, 엄습하다; (소리·냄새 등이) 퍼지다',s:'attack, raid, encroach, intrude, trespass',r:'라틴어 in (into) + vadere (go, 가다) → 안으로 무력으로 들어가다 → 침략하다·침범하다로 고착 > 군대가 국경을 넘어 쳐들어가는 장면이 원형'},
{n:1318,w:'didactic',m:'a. 교훈적인, 설교적인, 가르치기 위한',s:'instructive, preachy',r:'그리스어 didaskein (teach, 가르치다) + -ic → 가르치는 → 교훈적인·교조적인으로 고착 > 도덕을 직접 설명하는 이야기의 장면이 원형'},
{n:1319,w:'surfeit',m:'n. ① 과도, 과다, 지나치게 많은 양 ② 과식, 폭식, 과음 / v. 과식[폭식, 과음]하다',s:'excess, plethora, repletion, gluttony, overeating, pig-out',r:'고대 프랑스어 surfaire (overdo, 과하게 하다) → 과하게 하다 → 과식·초과로 고착 > 음식을 너무 많이 먹어 더 이상 못 먹는 장면이 원형'},
{n:1320,w:'pander',m:'v. ① (저속한 욕망에) 영합하다, (남의 약점을) 이용하다[to] ② 매춘을 알선해 주다; 나쁜 짓을 하도록 도와주다 / n. 약점을 이용하는 자, 나쁜 짓의 중재자; (남자) 매춘 알선인',s:'cater to, pimp',r:'Pandare (트로이 전쟁의 인물) → 상대의 나쁜 욕구를 채워주다 → 나쁜 욕구에 영합하다로 고착 > 자극적인 내용으로 수익을 올리는 장면이 원형'},
{n:1321,w:'misdemeanor',m:'n. ① 경범죄 ② 비행, 행실[품행]이 나쁨',s:'minor offense, misconduct, misdeed, wrongdoing',r:'mis (bad) + demeanor (행동) → 나쁜 행동 → 경범죄·위법 행위로 고착 > 법을 가볍게 위반하는 장면이 원형'},
{n:1322,w:'wishy-washy',m:'a. ① 미온적인, 확고하지 못한, 우유부단한 ② (색깔이) 선명하지 못한',s:'indecisive, irresolute',r:'wash + wash → 물처럼 흐릿하고 힘없는 → 우유부단한·흐리멍텅한으로 고착 > 어느 쪽도 결정 못 하고 우물쭈물하는 장면이 원형'},
{n:1323,w:'currency',m:'n. ① (현금) 통화, 유통 화폐 ② (화폐의) 유통, 통용; (사상·말·소문 등의) 유포, 보급; 유행',s:'cash, coin, coinage, circulation, prevalence, spread',r:'라틴어 currere (run, 달리다) → 유통되어 달리는 것 → 통화·유통으로 고착 > 시장에서 돈이 오가는 장면이 원형'},
{n:1324,w:'abet',m:'vt. 부추기다, 선동하다, 교사하다',s:'incite, instigate',r:'고대 프랑스어 abeter (bait, 미끼로 꾀다) → 나쁜 일을 부추기다 → 교사하다·방조하다로 고착 > 뒤에서 범행을 부추기는 장면이 원형'},
{n:1325,w:'revenue',m:'n. ① 소득, 수익; 정기적 수입; 수입원 ② 수입 항목, 재원; (국가의) 세입',s:'gain, income, proceeds, profits',r:'라틴어 revenire (return, 돌아오다) → 돌아오는 수입 → 세입·수입으로 고착 > 정부로 세금이 들어오는 장면이 원형'},
{n:1326,w:'juxtapose',m:'vt. 나란히 놓다, 병렬[병치]하다',s:'put side by side',r:'라틴어 juxta (beside, 옆에) + ponere (place, 놓다) → 옆에 나란히 놓다 → 병치하다로 고착 > 두 대조적인 것을 나란히 놓는 장면이 원형'},
{n:1327,w:'obloquy',m:'n. ① 욕설, 비방, 비난, 악평 ② 오명, 불명예',s:'calumny, slander, vilification, disgrace, dishonor, shame',r:'라틴어 ob (against) + loqui (speak, 말하다) → 맞서 말하다 → 비난·욕설·불명예로 고착 > 공개적으로 비난받는 장면이 원형'},
{n:1328,w:'estranged',m:'a. 떨어진, 소원해진, 부부가 별거 중인',s:'',r:'라틴어 extraneus (foreign, 외국의) → 낯선 사람이 된 → 소원해진·멀어진으로 고착 > 한때 가까웠지만 이제 서로 멀어진 장면이 원형'},
{n:1329,w:'forgo',m:'vt. ~없이 지내다, (하고·갖고 싶은 것을) 포기하다; 버리다, 그만두다',s:'abandon, give up, renounce',r:'for (away) + go (가다) → 가지 않고 포기하다 → 포기하다·삼가다로 고착 > 원하지만 참고 포기하는 장면이 원형'},
{n:1330,w:'blizzard',m:'n. ① 심한 눈보라, 블리자드 ② (편지 등과 같은 사물의) 쇄도',s:'snowstorm, spindrift, flood, rush, stampede',r:'19세기 미국 영어 blizzard (violent blow, 강한 타격) → 눈이 퍼붓는 강한 폭풍 → 눈보라·폭설로 고착 > 세찬 바람과 함께 눈이 사방으로 몰아치는 장면이 원형'},
{n:1331,w:'potential',m:'a. 잠재적인; 가능한; 장래 ~의 가능성이 있는 / n. 잠재력, 가능성',s:'latent, possible, prospective',r:'라틴어 potentia (power, 힘) + -al → 발휘될 수 있는 힘 → 잠재적인·가능성으로 고착 > 아직 발휘되지 않은 내면의 능력의 장면이 원형'},
{n:1332,w:'dodder',m:'vi. (중풍이나 노령으로) 떨다, 휘청거리다, 비실비실하다',s:'totter, waddle',r:'중세 영어 daderen (shake, 흔들리다) → 노쇠해 비틀거리며 걷다 → 비틀거리다·노쇠하다로 고착 > 지팡이를 짚고 힘없이 걷는 장면이 원형'},
{n:1333,w:'shelf',m:'n. ① 선반, 시령; 선반 모양의 턱진 장소; 단; (벼랑의) 바위 턱 ② 얕은 곳, 여울목; 모래톱, 암초 ③ 대륙붕',s:'ledge, rack, rock, shoal',r:'고대 영어 scylfe (ledge, 선반) → 벽에 고정된 선반 → 선반으로 고착 > 벽에 붙어있는 선반에 책을 꽂는 장면이 원형'},
{n:1334,w:'insane',m:'a. 미친, 정신 이상의; 비상식적인',s:'crazy, demented, deranged, mad',r:'라틴어 in (not) + sanus (healthy, 건강한) → 건강하지 않은 정신 → 정신이상의·미친으로 고착 > 이성을 잃어 통제할 수 없는 장면이 원형'},
{n:1335,w:'swarm',m:'n. ① (한 방향으로 이동하는 곤충의) 떼[무리] ② (같은 방향으로 급히 이동 중인) 군중, 대중 / v. 떼[무리]를 지어 다니다',s:'army, drove, herd, horde, crowd, flock, mass, multitude, throng, troop',r:'고대 영어 swearm (swarm, 무리) → 벌처럼 떼 지어 움직이다 → 떼·우글거리다로 고착 > 수천 마리 벌이 한꺼번에 날아오르는 장면이 원형'},
{n:1336,w:'luxuriant',m:'a. ① 무성한, 울창한; (땅이) 비옥한 ② (장식·문체 등이) 화려한, 현란한',s:'exuberant, flourishing, lush, thriving, brilliant, elaborate, florid, ornate',r:'라틴어 luxuria (excess, 과잉) → 과할 만큼 무성한 → 무성한·풍성한으로 고착 > 잎이 울창하게 자라 뒤덮인 장면이 원형'},
{n:1337,w:'paean',m:'n. 기쁨의 노래, 찬가',s:'anthem, hymn',r:'그리스어 paian (hymn to Apollo, 아폴론 찬가) → 신에게 바치는 찬가 → 찬사·감사의 노래로 고착 > 승리를 기뻐하며 환호하는 장면이 원형'},
{n:1338,w:'amplify',m:'v. ① 확대[확장]하다 ② 상세히 설명하다, 부연하다[on, upon]',s:'expand, extend, increase, magnify, elaborate',r:'라틴어 amplus (large, 큰) + -fy → 크게 만들다 → 증폭하다·자세히 설명하다로 고착 > 마이크가 작은 소리를 크게 만드는 장면이 원형'},
{n:1339,w:'menopause',m:'n. 폐경기, 갱년기',s:'climacteric, climacterium',r:'그리스어 meno (month, 달) + pause (pause, 멈춤) → 월경이 멈추는 것 → 폐경으로 고착 > 중년 여성의 호르몬 변화의 장면이 원형'},
{n:1340,w:'trim',m:'v. ① (불필요한 부분을) 잘라내다, 다듬다, 손질하다 ② (예산 등을) 깎다, 삭감하다 / a. ① 잘 가꾼, 깔끔한 ② (몸매가 건강하고) 늘씬한',s:'pare, prune, neat, spruce, tidy, beach-ready, clean-limbed, slender, slim',r:'고대 영어 trymian (strengthen, 강화하다) → 불필요한 것을 잘라 깔끔하게 → 다듬다·단정한으로 고착 > 가위로 깔끔하게 다듬는 장면이 원형'},
{n:1341,w:'vicarious',m:'a. 대리의, 대신하는',s:'delegated, substituted, surrogate',r:'라틴어 vicarius (substitute, 대리인) → 대리인처럼 대신 경험하는 → 대리의·간접 경험의로 고착 > 책이나 영화로 실제 경험을 대신하는 장면이 원형'},
{n:1342,w:'sleuth',m:'n. 탐정, 형사',s:'detective, investigator',r:'고대 노르드어 sloth (trail, 흔적) → 흔적을 쫓는 사람 → 탐정·추적하다로 고착 > 흔적을 따라 사건을 해결하는 장면이 원형'},
{n:1343,w:'command',m:'v. ① 명령하다, 지시하다 ② 지배하다, 장악하다; (군대 등을) 지휘하다 ③ 마음대로 할 수 있다; (말을) 자유자재로 구사하다 ④ 내려다보다, 전망하다 / n. ① 명령, 지령 ② (언어의) 구사력, 유창함 ③ 전망, 조망',s:'bid, direct, instruct, order, tell, lead, overlook, directive, instruction, mandate, fluency, mastery, view',r:'라틴어 com (together) + mandare (entrust, 맡기다) → 함께 맡겨 명령하다 → 명령하다·지휘하다로 고착 > 상관이 부하에게 명령을 내리는 장면이 원형'},
{n:1344,w:'holdup',m:'n. ① (열차·자동차 또는 그 승객에 대한) 불법 억류; 권총 강도, 노상강도 ② 정지, 정체, 지체, 방해',s:'stickup, delay, stoppage',r:'hold (잡다) + up (위로) → 손을 들게 하여 강탈하다 → 강탈·방해로 고착 > 총을 들고 손을 올리라고 하는 강도의 장면이 원형'},
{n:1345,w:'proclaim',m:'v. 선언하다, 공포하다, 포고하다',s:'announce, declare, pronounce',r:'라틴어 pro (before) + clamare (cry out, 외치다) → 앞에서 크게 외치다 → 선포하다·선언하다로 고착 > 광장에서 공식 선포를 하는 장면이 원형'},
{n:1346,w:'multifarious',m:'a. 다양한, 다채로운, 다방면에 걸친',s:'diverse, miscellaneous, multi-faceted, varied',r:'라틴어 multus (many, 많은) + farius (kind, 종류) → 많은 종류의 → 다방면의·다양한으로 고착 > 셀 수 없이 다양한 종류가 가득한 장면이 원형'},
{n:1347,w:'allegory',m:'n. ① 우화, 비유담 ② 풍유, 비유',s:'apologue, fable, parable',r:'그리스어 allos (other, 다른) + agoreuein (speak, 말하다) → 다른 것을 빗대어 말하다 → 우화·풍유로 고착 > 동물 이야기를 통해 인간 사회를 비판하는 장면이 원형'},
{n:1348,w:'reprimand',m:'vt. 질책[비난]하다, 호되게 꾸짖다 / n. 질책, 비난; 견책, 징계',s:'blame, censure, reproach',r:'프랑스어 réprimande (rebuke, 꾸짖음) → 공식적으로 꾸짖다 → 꾸짖다·견책하다로 고착 > 상관이 공식적으로 서면으로 경고하는 장면이 원형'},
{n:1349,w:'facet',m:'n. ① (결정·보석의) 작은 면, 깎은 면 ② (일의) 일면, 양상, 국면',s:'side, aspect, part, phase',r:'프랑스어 facette (little face, 작은 면) → 보석의 작은 면 → 측면·양상으로 고착 > 다이아몬드의 여러 면 중 하나의 장면이 원형'},
{n:1350,w:'conscript',m:'vt. 징집[징용]하다 / n. 징집병',s:'commandeer, draft, levy, draftee, inductee',r:'라틴어 con (together) + scribere (write, 쓰다) → 명단에 함께 쓰다 → 징병하다·징집된 병사로 고착 > 군 복무를 위해 이름이 등록되는 장면이 원형'},
{n:1351,w:'indulge',m:'v. ① (욕망·정열 등을) 만족시키다; 탐닉하다, 마음껏 누리다[in] ② 제멋대로 하게 두다, (응석·변덕 등을) 다 받아 주다',s:'gratify, wallow, coddle, mollycoddle, pamper',r:'라틴어 indulgere (be lenient, 관대하다) → 스스로에게 관대하게 허용하다 → 마음껏 즐기다·빠지다로 고착 > 달콤한 것을 마음껏 먹는 장면이 원형'},
{n:1352,w:'demise',m:'n. ① 사망, 서거, 죽음 ② (제도·존재 등의) 소멸, 종료, 종말',s:'death, decease, passing, disappearance, end, termination',r:'라틴어 demittere (send down, 내려보내다) → 다시는 돌아오지 않는 곳으로 → 죽음·소멸로 고착 > 왕의 서거를 알리는 종소리의 장면이 원형'},
{n:1353,w:'frivolous',m:'a. ① 경박한, 경솔한 ② 시시한, 하찮은',s:'careless, flippant, rash, skittish, yeasty, fiddling, insignificant, petty, trifling, trivial',r:'라틴어 frivolus (trifling, 하찮은) → 하찮고 경박한 → 경박한·시시한으로 고착 > 사소한 것에 지나치게 시간을 쓰는 장면이 원형'},
{n:1354,w:'epitaph',m:'n. 비명, 묘비명',s:'epigraph, inscription',r:'그리스어 epi (upon) + taphos (tomb, 무덤) → 무덤 위에 쓴 글 → 비문·추도사로 고착 > 묘비에 새겨진 짧은 추도 문구의 장면이 원형'},
{n:1355,w:'secure',m:'a. ① 안심하는 ② 안전한, 확실한, 안정적인 / v. ① (특히 힘들게) 얻어 내다, 획득[확보]하다 ② 안전하게 지키다; 확실하게 하다',s:'reliable, stable',r:'라틴어 se (without) + cura (care, 걱정) → 걱정 없이 안전한 → 안전한·확보하다로 고착 > 자물쇠로 잠근 안전한 공간의 장면이 원형'},
{n:1356,w:'predecessor',m:'n. ① 전임자 ② 이전의 것',s:'forerunner, precursor',r:'라틴어 prae (before) + decedere (go away, 떠나다) → 먼저 떠난 사람 → 전임자·선배로 고착 > 은퇴한 전임자로부터 자리를 이어받는 장면이 원형'},
{n:1357,w:'revive',m:'v. ① (생명·의식 등을) 소생[회복]시키다 ② (잊혀진 관습·유행·효력 등을) 되살아나게 하다, 부활시키다 ③ 소생하다; 부활하다',s:'recover, resuscitate, revitalize, rekindle, renew, restore, resurrect',r:'라틴어 re (again) + vivere (live, 살다) → 다시 살리다 → 소생시키다·부활시키다로 고착 > 의식을 잃었다가 다시 깨어나는 장면이 원형'},
{n:1358,w:'pedantic',m:'a. 아는 체하는, 현학적인, 학자라고 뽐내는',s:'pompous',r:'그리스어 paideutikos (teaching, 가르치는) → 가르치듯 형식에 집착하는 → 현학적인·형식에 얽매이는으로 고착 > 사소한 형식에 집착하며 따지는 장면이 원형'},
{n:1359,w:'staple',m:'n. ① 주요 산물, 주요 상품 ② 주요소, 주성분 / a. 주된, 주요한',s:'chief, fundamental, principal',r:'고대 영어 stapol (post, 기둥) → 핵심 기둥이 되는 → 주요 산물·주식의·스테이플로 고착 > 식탁에 항상 오르는 기본 음식의 장면이 원형'},
{n:1360,w:'brainwash',m:'n. 세뇌 / vt. 세뇌하다',s:'indoctrinate',r:'brain (뇌) + wash (씻다) → 뇌를 씻어 세뇌하다 → 세뇌하다로 고착 > 반복적인 메시지로 다른 생각을 심는 장면이 원형'},
{n:1361,w:'void',m:'a. ① 빈, 공허한; 공석인 ② 무효의 / n. 공간, 허공; 공허감',s:'empty, vacant, inoperative, invalid, emptiness, vacancy',r:'라틴어 vocitus (empty, 빈) → 완전히 비어있는 → 비어있는·무효의·빈 공간으로 고착 > 계약서에 무효 표시를 하는 장면이 원형'},
{n:1362,w:'amnesia',m:'n. 기억상실증, 건망증',s:'absent-mindedness, forgetfulness',r:'그리스어 a (not) + mnesia (memory, 기억) → 기억이 없는 → 기억상실증으로 고착 > 과거 기억이 완전히 사라진 장면이 원형'},
{n:1363,w:'mince',m:'v. ① (고기 등을) 잘게 썰다, 다지다 ② 조심스럽게[점잖게, 완곡하게] 말하다',s:'',r:'고대 프랑스어 mincer (cut small, 잘게 자르다) → 아주 잘게 자르다 → 잘게 다지다·조심스럽게 말하다로 고착 > 칼로 고기를 잘게 다지는 장면이 원형'},
{n:1364,w:'parody',m:'n. ① (풍자적·해학적인) 모방 시문, 패러디 ② 서투른 모방, 흉내 / vt. ① 서투르게 흉내 내다 ② 풍자적으로 개작하다',s:'satire, travesty, imitation, imitate, mimic, caricature, lampoon, satirize',r:'그리스어 para (beside) + ode (song, 노래) → 원작 옆에 놓인 우스꽝스러운 것 → 패러디·풍자로 고착 > 유명 작품을 우스꽝스럽게 따라한 장면이 원형'},
{n:1365,w:'linguist',m:'n. ① 언어학자 ② 여러 외국어에 능한 사람',s:'linguician, philologist, multilingual, polyglot',r:'라틴어 lingua (tongue, 혀) → 언어를 다루는 사람 → 언어학자·어학에 능통한 사람으로 고착 > 여러 언어를 능숙하게 구사하는 장면이 원형'},
{n:1366,w:'hustle',m:'v. ① (사람을 거칠게) 떠밀다, 밀치다 ② 서두르다',s:'jostle, push, shove, thrust, bustle, hurry, rush',r:'중세 영어 husselen (shake, 흔들다) → 밀치며 빠르게 움직이다 → 분주히 움직이다·사기로 고착 > 군중을 헤치며 바삐 이동하는 장면이 원형'},
{n:1367,w:'banter',m:'n. (악의 없는) 가벼운 농담, 조롱, 놀림 / v. 조롱하다, 놀리다',s:'badinage, chaff, persiflage, raillery, jeer, jest, ridicule, tease',r:'17세기 영어 banter (tease, 놀리다) → 가볍게 주고받는 농담 → 농담·재담으로 고착 > 두 사람이 재치 있게 서로 놀리는 장면이 원형'},
{n:1368,w:'stimulus',m:'n. ① 자극; 격려, 고무 ② 자극물; 흥분제',s:'encouragement, goad, incentive, spur',r:'라틴어 stimulus (goad, 막대기) → 행동을 일으키는 자극 → 자극·기폭제로 고착 > 신호에 반응이 일어나는 장면이 원형'},
{n:1369,w:'prevailing',m:'a. ① 우세한, 주요한 ② 유력한, 효과적인 ③ 널리 보급되어 있는, 유행하고 있는',s:'predominant, ruling, prevalent, widespread',r:'라틴어 praevalere (be stronger, 더 강하다) → 더 강해 퍼진 → 우세한·지배적인으로 고착 > 한쪽 의견이 다른 것을 압도하는 장면이 원형'},
{n:1370,w:'overlook',m:'vt. ① 바라보다, 내려다보다 ② 감독하다, 돌보다 ③ 빠뜨리고 보다 ④ (결점 등을) 눈감아 주다',s:'oversee, supervise, excuse, pardon',r:'over (위에서) + look (보다) → 위에서 내려다보다 → 못 본 척하다·간과하다로 고착 > 잘못을 알면서도 그냥 지나치는 장면이 원형'},
{n:1371,w:'commemoration',m:'n. ① 기념, 축하 ② 기념품[축제], 축전',s:'celebration, observance',r:'라틴어 com (together) + memorare (remember, 기억하다) → 함께 기억하다 → 기념·추모로 고착 > 역사적 사건을 함께 기억하는 행사의 장면이 원형'},
{n:1372,w:'abstemious',m:'a. (음식 등을) 절제[자제]하는, 금욕적인',s:'abstinent, continent, temperate',r:'라틴어 abs (away) + temetum (intoxicating drink, 술) → 술에서 멀리하는 → 절제하는·금욕적인으로 고착 > 음식과 술을 극도로 절제하는 장면이 원형'},
{n:1373,w:'rhetoric',m:'n. ① 수사법; 웅변술 ② 미사여구, 과장된 말',s:'elocution, eloquence, oratory, bombast, euphuism, hyperbole, overstatement',r:'그리스어 rhetor (orator, 연설가) → 연설가의 기술 → 수사학·과장된 말로 고착 > 설득력 있게 연설하는 기술의 장면이 원형'},
{n:1374,w:'dire',m:'a. ① 무서운, 끔찍한, 비참한 ② (필요·위험 따위가) 급박한',s:'appalling, disastrous, dreadful, terrible, desperate, urgent',r:'라틴어 dirus (fearful, 무서운) → 무서울 만큼 심각한 → 극도로 나쁜·긴박한으로 고착 > 상황이 최악으로 치닫는 장면이 원형'},
{n:1375,w:'gait',m:'n. 걷는 모양, 걸음걸이; 진행',s:'step, walk',r:'고대 노르드어 gat (passage, 통로) → 통로를 지나는 방식 → 걸음걸이·보행 방식으로 고착 > 특유한 걸음걸이로 누군지 알아보는 장면이 원형'},
{n:1376,w:'clement',m:'a. ① (성격이) 관대한, 너그러운 ② (기후가) 온화한, 포근한',s:'compassionate, gentle, lenient, genial, mild, serene, temperate',r:'라틴어 clemens (mild, 온화한) → 온화하고 자비로운 → 관대한·온화한으로 고착 > 작은 잘못을 자비롭게 용서하는 장면이 원형'},
{n:1377,w:'transfuse',m:'vt. ① (사상 등을) 불어넣다, 주입하다 ② 수혈하다; 주사하다',s:'infuse, administer, dispense',r:'라틴어 trans (across) + fundere (pour, 붓다) → 가로질러 붓다 → 수혈하다·주입하다로 고착 > 혈액백에서 혈관으로 혈액이 들어가는 장면이 원형'},
{n:1378,w:'unwittingly',m:'ad. 자신도 모르게, 부지불식간에',s:'accidentally, involuntarily, unintentionally',r:'고대 영어 unwittende (without knowing, 모르면서) → 모르는 채로 → 무의식적으로·모르고로 고착 > 의도하지 않게 실수를 하는 장면이 원형'},
{n:1379,w:'conflict',m:'n. ① 투쟁, 전투 ② 충돌, 대립, 불일치 / vi. ① 투쟁하다 ② 충돌하다, 모순되다',s:'battle, fight, strife, struggle, clash, collision, disagreement, discord, combat, contend, dispute, quarrel, collide, differ, disagree',r:'라틴어 con (together) + fligere (strike, 치다) → 서로 부딪히다 → 충돌·갈등으로 고착 > 두 힘이 정면으로 맞부딪히는 장면이 원형'},
{n:1380,w:'shrug',m:'v. (어깨를) 으쓱하다',s:'',r:'중세 영어 schruggen (shrug, 어깨를 으쓱하다) → 어깨를 으쓱 들어올리다 → 어깨를 으쓱하다로 고착 > 모른다는 의미로 어깨를 들어올리는 장면이 원형'},
{n:1381,w:'nostrum',m:'n. ① 엉터리 약, 가짜 약 ② 특효약, 만병통치약, 비책',s:'quack medicine, snake oil, elixir, magic bullet, panacea',r:'라틴어 nostrum (our own, 우리의) → 우리 비방약 → 만병통치약·처방전으로 고착 > 효과 없이 엉터리 약을 파는 장면이 원형'},
{n:1382,w:'exonerate',m:'vt. 결백[무죄]을 증명하다, 혐의를 풀어주다',s:'absolve, acquit, exculpate, vindicate',r:'라틴어 ex (out) + onerare (burden, 짐 지우다) → 짐을 꺼내다 → 무죄 선언하다·면제하다로 고착 > 새로운 증거로 모든 혐의를 벗는 장면이 원형'},
{n:1383,w:'gradual',m:'a. 단계적인, 점진적인, 점차적인',s:'piecemeal, progressive, steady, step-by-step',r:'라틴어 gradus (step, 단계) + -al → 단계의 → 점진적인·서서히로 고착 > 한 계단씩 천천히 오르는 장면이 원형'},
{n:1384,w:'coagulate',m:'v. 응고시키다[하다]',s:'clot, congeal',r:'라틴어 coagulare (curdle, 응고하다) → 함께 굳어지다 → 응고하다·엉기다로 고착 > 피가 상처 위에서 굳어 딱지가 생기는 장면이 원형'},
{n:1385,w:'restitution',m:'n. ① 반환, 상환; 손해 배상 ② 복위, 복직; 복구, 회복',s:'compensation, indemnity, recompense, reparation, restoration',r:'라틴어 restituere (restore, 복원하다) → 원래대로 복원하다 → 반환·배상으로 고착 > 훔친 물건을 주인에게 돌려주는 장면이 원형'},
{n:1386,w:'prudent',m:'a. ① 신중한, 분별 있는 ② 검약하는, 절약하는',s:'careful, cautious, discreet, measured, sensible, economical, frugal, sparing, thrifty',r:'라틴어 prudens (foreseeing, 예견하는) → 미리 보아 신중한 → 신중한·현명한으로 고착 > 결정 전에 모든 가능성을 고려하는 장면이 원형'},
{n:1387,w:'flinch',m:'vi. 주춤[움찔]하다, 겁을 내다, 꽁무니 빼다[from]',s:'recoil, shrink, wince',r:'고대 프랑스어 flenchir (turn aside, 비켜서다) → 고통이나 위협에 움찔하다 → 주춤하다·움츠러들다로 고착 > 갑자기 닥친 것에 반사적으로 움츠러드는 장면이 원형'},
{n:1388,w:'scavenger',m:'n. ① 썩은 고기를 먹는 동물 ② 거리 청소부; 넝마주이',s:'forager',r:'고대 프랑스어 scawager (tax collector, 세금 징수인) → 남겨진 것을 모으는 → 청소부·썩은 고기를 먹는 동물로 고착 > 독수리가 죽은 동물의 사체를 먹는 장면이 원형'},
{n:1389,w:'insipid',m:'a. ① 싱거운; 맛이 없는, 김빠진 ② 재미없는, 무미건조한',s:'tasteless, unsavory, vapid, bland, boring, dull',r:'라틴어 in (not) + sapidus (tasty, 맛있는) → 맛이 없는 → 맛없는·재미없는으로 고착 > 아무 맛도 향도 없는 음식의 장면이 원형'},
{n:1390,w:'byword',m:'n. ① (특정한 자질의) 전형, 대명사 ② 상투적인 어구',s:'archetype, emblem, epitome, paragon, cliché',r:'by (관련된) + word (말) → 어떤 것과 관련된 말 → 대명사·속담으로 고착 > 어떤 특성을 대표하는 대명사가 된 장면이 원형'},
{n:1391,w:'assimilate',m:'v. ① (지식·문화 등을) 자기 것으로 받아들이다, 흡수하다 ② 동화[일치, 적응]시키다',s:'digest, imbibe, adapt',r:'라틴어 as (to) + similis (similar, 비슷한) → 비슷하게 만들다 → 동화시키다·소화 흡수하다로 고착 > 새 지식이 기존 지식 체계에 녹아드는 장면이 원형'},
{n:1392,w:'editorial',m:'n. (신문의) 사설, 논설 / a. 편집의; 사설의',s:'',r:'라틴어 editor (publisher, 출판인) + -ial → 편집인의 → 편집의·사설로 고착 > 신문의 편집부가 공식 의견을 내는 장면이 원형'},
{n:1393,w:'causality',m:'n. 인과관계',s:'causation',r:'라틴어 causa (cause, 원인) + -ality → 원인의 성질 → 인과관계로 고착 > 원인과 결과를 화살표로 연결하는 장면이 원형'},
{n:1394,w:'scam',m:'n. 신용사기, 사기사건 / v. ① 속이다, 사기 치다 ② 키스하다',s:'con, defraud, mulct, swindle',r:'20세기 속어 scam (trick, 속임수) → 교묘한 속임수로 돈을 빼내다 → 사기·속임수로 고착 > 가짜 투자 정보로 돈을 뜯어내는 장면이 원형'},
{n:1395,w:'dictate',m:'v. ① 구술하다, 받아쓰게 하다 ② 명령하다, 지시하다 ③ 좌우하다, 영향을 주다',s:'command, decree, direct, order, affect, govern, influence, sway',r:'라틴어 dictare (say repeatedly, 반복해 말하다) → 반복해 말하며 받아쓰게 하다 → 구술하다·지시하다로 고착 > 상사가 비서에게 문서를 받아쓰게 하는 장면이 원형'},
{n:1396,w:'subversive',m:'a. 체제전복적인, 전복하는, 파괴하는',s:'insurgent, mutinous, rebellious',r:'라틴어 sub (under) + vertere (turn, 돌리다) → 아래에서 뒤집는 → 전복적인·체제 파괴의로 고착 > 내부에서 기존 질서를 무너뜨리는 장면이 원형'},
{n:1397,w:'turnover',m:'n. ① 전복, 전도 ② 방향 전환, 변절 ③ 회전율; 이직률',s:'alteration, change',r:'turn (돌리다) + over (완전히) → 완전히 뒤집다·순환 → 이직률·매출액으로 고착 > 직원이 자주 바뀌는 조직의 장면이 원형'},
{n:1398,w:'acrid',m:'a. ① (냄새·맛 등이) 매운, 쓴; 아리는 ② 가혹한, 신랄한',s:'acid, biting, bitter, caustic, pungent',r:'라틴어 acer (sharp, 날카로운) → 날카롭게 코를 자극하는 → 자극적인·신랄한으로 고착 > 타는 냄새가 코를 찌르는 장면이 원형'},
{n:1399,w:'weather',m:'v. (재난·역경 등을) 뚫고 나가다, 견디다 / n. 날씨, 기후',s:'bear, endure',r:'고대 영어 weder (weather, 날씨) → 날씨·폭풍을 버텨내다 → 날씨·이겨내다로 고착 > 폭풍을 맞으면서도 굳건히 버티는 장면이 원형'},
{n:1400,w:'millennium',m:'n. 1000년, 1000년간; 1000년기; 1000년 기념제',s:'',r:'라틴어 mille (thousand, 천) + annum (year, 해) → 천 년 → 천 년·천년기로 고착 > 두 천 년이 만나는 역사적 순간의 장면이 원형'},
{n:1401,w:'punctual',m:'a. 시간[기한]을 엄수하는',s:'prompt, timely',r:'라틴어 punctum (point, 점) + -al → 정확한 점처럼 → 시간을 지키는·정확한으로 고착 > 약속 시간 정각에 도착하는 장면이 원형'},
{n:1402,w:'importune',m:'v. ~에게 끈덕지게 졸르다, 청하다; 괴롭히다',s:'badger, implore, harass, pester',r:'라틴어 importunus (troublesome, 귀찮은) → 귀찮게 끈질기게 요청하다 → 조르다·끈질기게 부탁하다로 고착 > 거절해도 계속 졸라대는 장면이 원형'},
{n:1403,w:'adage',m:'n. 격언, 속담',s:'aphorism, axiom, maxim, precept, proverb, saying',r:'라틴어 adagium (proverb, 속담) → 오래된 지혜를 담은 말 → 격언·속담으로 고착 > 수백 년 전해 내려온 짧은 지혜의 장면이 원형'},
{n:1404,w:'withstand',m:'v. (유혹·곤란 등에) 저항하다; 견디어내다, 버티다',s:'bear, endure, resist',r:'with (반하여) + stand (서다) → 맞서 서다 → 견디다·저항하다로 고착 > 강한 압력에 굴하지 않고 버티는 장면이 원형'},
{n:1405,w:'traumatic',m:'a. 정신적 외상의, 대단히 충격적인, 잊지 못할',s:'painful, shocking',r:'그리스어 trauma (wound, 상처) + -ic → 상처의 → 심한 정신적 충격을 주는으로 고착 > 사고 후 두고두고 마음에 상처가 남는 장면이 원형'},
{n:1406,w:'schism',m:'n. (단체·교회의) 분리, 분열; 분파; 불화',s:'break, rift, split',r:'그리스어 schisma (split, 분열) → 갈라진 것 → 분열·분파로 고착 > 의견 차이로 하나의 집단이 둘로 나뉘는 장면이 원형'},

{n:1408,w:'drudgery',m:'n. 힘들고 단조로운 일, 고된 일',s:'chore, toil, travail',r:'중세 영어 druggen (toil, 고생) → 힘들고 지루한 노동 → 고역·힘든 단순 노동으로 고착 > 반복적이고 힘든 일을 하루 종일 하는 장면이 원형'},

{n:1410,w:'excavate',m:'vt. ① (구멍·굴 등을) 파다, 굴착하다 ② 발굴하다',s:'burrow, dig, hollow, tunnel, uncover, unearth',r:'라틴어 ex (out) + cavare (hollow, 파다) → 밖으로 파내다 → 발굴하다·굴착하다로 고착 > 땅을 파내어 유물을 꺼내는 장면이 원형'},
{n:1411,w:'pristine',m:'a. 원래 그대로의, 자연 그대로의, 원시시대의',s:'pure',r:'라틴어 pristinus (former, 이전의) → 처음 그대로의 → 원시의·오염되지 않은으로 고착 > 인간의 손이 닿지 않은 자연 그대로의 장면이 원형'},

{n:1413,w:'spiteful',m:'a. 악의적인, 심술궂은',s:'malevolent, malicious, venomous',r:'spite (악의) + -ful → 악의로 가득한 → 악의적인·앙심을 품은으로 고착 > 복수심으로 일부러 상처를 주는 장면이 원형'},

{n:1415,w:'respective',m:'a. 각자의, 각각의',s:'individual, personal',r:'라틴어 respectivus (looking back, 돌아보는) → 각각 돌아보는 → 각각의·각자의로 고착 > 각자 자신의 몫을 챙기는 장면이 원형'},
{n:1416,w:'paramour',m:'n. 정부(情夫), 정부(情婦), 애인',s:'lover, mistress',r:'고대 프랑스어 par amour (with love, 사랑으로) → 사랑으로 맺어진 → 불륜 상대·연인으로 고착 > 결혼 밖의 비밀 연인의 장면이 원형'},
{n:1417,w:'bifurcate',m:'v. 투 갈래로 가르다[갈라지다] / a. 투 갈래로 갈라진',s:'divide into two branches, bifurcated, forked',r:'라틴어 bi (two, 둘) + furca (fork, 갈래) → 두 갈래로 나뉘다 → 두 갈래로 나뉘다로 고착 > 길이 두 방향으로 갈라지는 장면이 원형'},

{n:1419,w:'intermittent',m:'a. 간헐적인, 때때로 중단되는',s:'periodic, sporadic',r:'라틴어 inter (between) + mittere (send, 보내다) → 사이사이에 보내는 → 간헐적인으로 고착 > 비가 내렸다 멈추길 반복하는 장면이 원형'},
{n:1420,w:'epilogue',m:'n. 끝맺는 말, 후기, 에필로그',s:'afterword, coda, postscript',r:'그리스어 epi (upon) + logos (word, 말) → 위에 얹는 말 → 후기·에필로그로 고착 > 이야기 끝에 덧붙이는 마무리 글의 장면이 원형'},
{n:1421,w:'momentary',m:'a. 순간의, 잠깐의; 덧없는',s:'brief, short, temporary, transitory',r:'라틴어 momentum (movement, 움직임) + -ary → 순간의 → 순간적인·잠시의로 고착 > 눈 깜짝할 사이에 지나가는 장면이 원형'},

{n:1423,w:'cavalcade',m:'n. ① 행진, 자동차 행렬 ② (사건·행동 따위의) 극적 전개',s:'parade',r:'이탈리아어 cavalcare (ride on horseback, 말을 타다) → 말을 타고 행진하는 것 → 행렬·퍼레이드로 고착 > 말을 탄 기사들이 줄지어 행진하는 장면이 원형'},

{n:1426,w:'heterogeneous',m:'a. 이종(異種)의, 이질적인',s:'disparate, diverse, miscellaneous',r:'그리스어 heteros (different, 다른) + genos (kind, 종류) → 서로 다른 종류의 → 이질적인·혼합된으로 고착 > 전혀 다른 것들이 한 데 섞인 장면이 원형'},

{n:1428,w:'anatomy',m:'n. ① 해부학; 구조, 조직 ② (상세한) 분석, 조사',s:'build, frame, structure, analysis, examination',r:'그리스어 ana (up) + temnein (cut, 자르다) → 위로 잘라 해부하다 → 해부학으로 고착 > 의학도가 인체를 세밀하게 해부하는 장면이 원형'},
{n:1429,w:'synthetic',m:'a. ① 합성한, 인조의 ② 종합적인 / n. 합성 물질; 모조품',s:'artificial, ersatz, man-made, comprehensive, integrated, overall, counterfeit, dummy, fake, imitation, replica',r:'그리스어 syn (together) + tithenai (put, 놓다) → 함께 놓아 합성한 → 합성의·인조의로 고착 > 실험실에서 천연이 아닌 물질을 합성하는 장면이 원형'},
{n:1430,w:'luster',m:'n. ① 광택, 윤 ② 영광, 명예, 명성',s:'gloss, sheen, shine, fame, glory, honor',r:'라틴어 lustrare (illuminate, 빛나게 하다) → 빛을 내어 광택을 내다 → 광택·영광으로 고착 > 연마된 금속에서 나는 은은한 광택의 장면이 원형'},

{n:1432,w:'bailout',m:'n. ① 긴급 탈출 ② 긴급구제[조치], 구제금융',s:'',r:'bail (구하다) + out (밖으로) → 빠져나갈 수 있도록 구하다 → 구제금융·구출로 고착 > 파산 직전 기업에 긴급 자금을 투입하는 장면이 원형'},
{n:1433,w:'voluble',m:'a. 말이 유창한; 입심 좋은, 달변의',s:'fluent, garrulous, glib',r:'라틴어 volvere (roll, 굴리다) → 말이 물 흐르듯 굴러나오는 → 말이 많은·유창한으로 고착 > 쉬지 않고 말이 쏟아지는 장면이 원형'},
{n:1434,w:'ore',m:'n. 광석',s:'',r:'고대 영어 ora (unworked metal, 원석) → 가공 전의 금속을 품은 돌 → 광석으로 고착 > 광산에서 캐낸 금속 성분이 든 돌의 장면이 원형'},
{n:1435,w:'astute',m:'a. 약삭빠른, 눈치 빠른, 기민한, 빈틈없는',s:'canny, clever, shrewd, smart',r:'라틴어 astutus (crafty, 교활한) → 날카롭게 간파하는 → 빈틈없는·기민한으로 고착 > 상황을 한눈에 파악하는 장면이 원형'},
{n:1436,w:'prowess',m:'n. ① 용기, 용맹; 용감한 행위 ② 뛰어난 솜씨, 기량, 능력',s:'bravery, courage, mettle, valor, ability, adroitness, dexterity, skill, talent',r:'고대 프랑스어 prouesse (valor, 용기) → 뛰어난 능력과 용기 → 뛰어난 능력·무용으로 고착 > 탁월한 기술로 어려운 일을 해내는 장면이 원형'},

{n:1440,w:'expedition',m:'n. ① 탐험, 원정 ② 원정대 ③ 급속, 신속',s:'exploration, journey, voyage, dispatch, haste, hustle, promptness',r:'라틴어 expedire (free from a snare, 발을 빼다) → 발이 묶인 것을 풀고 탐험하다 → 탐험대·신속함으로 고착 > 미지의 영역을 탐험하는 대원들의 장면이 원형'},

{n:1443,w:'blankly',m:'ad. 멍하니, 우두커니',s:'absently, absent-mindedly, vacantly',r:'blank (텅 빈) + -ly → 텅 빈 것처럼 → 멍하니·무표정하게로 고착 > 아무 반응 없이 허공을 응시하는 장면이 원형'},

{n:1447,w:'sparkle',m:'v. ① 반짝이다, 빛나다 ② 생기[활기]가 있다 ③ 거품이 일다 / n. 반짝거림; 생기, 원기',s:'flash, gleam, glitter, shine, twinkle, effervesce, brilliance, glitter, radiance, shine, dash, life, spirit, vivacity',r:'고대 영어 spearca (spark, 불꽃) → 작은 불꽃이 깜박이다 → 반짝이다·활기차다로 고착 > 수면 위에 햇빛이 수천 개의 불꽃처럼 반짝이는 장면이 원형'},
{n:1448,w:'dorsal',m:'a. 등의, 등에 있는',s:'tergal',r:'라틴어 dorsum (back, 등) + -al → 등의 → 등의·배면의로 고착 > 상어의 등지느러미가 수면 위로 솟는 장면이 원형'},

{n:1450,w:'forsake',m:'vt. ① 저버리다[버리다] ② 그만두다[버리다]',s:'desert, abandon, quit',r:'고대 영어 forsacan (renounce, 포기하다) → 완전히 포기하고 떠나다 → 버리다·포기하다로 고착 > 오랜 동반자를 홀로 두고 떠나는 장면이 원형'},

{n:1453,w:'daze',m:'vt. ① 멍하게 하다 ② 눈부시게 하다 / n. 멍한 상태',s:'bemuse, benumb, stun, stupefy, bedaze, blind, dazzle, confusion, stupor',r:'고대 영어 dasian (be dull, 멍하다) → 충격으로 멍해지다 → 어리벙벙하게 하다·현혹으로 고착 > 충격으로 정신이 멍해진 장면이 원형'},

{n:1480,w:'skeleton',m:'n. ① 골격 ② 해골 ③ 잔해 ④ 골자, 윤곽',s:'outline',r:'그리스어 skeletos (dried up, 말라버린) → 살이 말라버린 뼈대 → 해골·골격으로 고착 > 뼈만 남은 인체 구조의 장면이 원형'},

{n:1482,w:'infuriate',m:'vt. 격분시키다, 극도로 화나게 하다',s:'enrage',r:'라틴어 in (into) + furiare (enrage, 격분시키다) → 격분 속으로 밀어 넣다 → 격분시키다·몹시 화나게 하다로 고착 > 참을 수 없이 화가 폭발하는 장면이 원형'},
{n:1483,w:'exile',m:'n. ① 망명, 국외 추방 ② 망명자 / vt. 추방하다, 망명시키다',s:'',r:'라틴어 exilium (banishment, 추방) → 고향에서 추방된 것 → 추방·망명으로 고착 > 고향을 떠나 멀리 쫓겨난 장면이 원형'},
{n:1484,w:'repudiate',m:'vt. ① 거부하다, 부인하다 ② 의절하다, 인연을 끊다',s:'deny, disavow, disclaim, reject, disown, renounce',r:'라틴어 repudiare (reject, 거절하다) → 완전히 거절하다 → 부인하다·거절하다로 고착 > 자신의 과거 발언을 완전히 부인하는 장면이 원형'},

{n:1489,w:'thaw',m:'v. ① 녹다[녹이다] ② 누그러지다 / n. ① 해동 ② 누그러짐 ③ 긴장 완화',s:'defrost, dissolve, melt, unfreeze, calm, soften, warm',r:'고대 영어 thawian (melt, 녹다) → 얼었던 것이 녹다 → 녹다·해빙으로 고착 > 봄이 와서 얼음이 녹기 시작하는 장면이 원형'},
