{n:1716,w:'arbor',m:'n. ① 나무, 수목 ② 나무그늘; 정자',s:'shrub, tree, wood',r:'라틴어 arbor (tree, 나무) → 나무가 우거진 쉼터 → 나무 그늘 쉼터·정자로 고착 > 포도 덩굴이 덮인 나무 정자의 장면이 원형'},
{n:1717,w:'defile',m:'vt. ① (신성하거나 중요한 것을) 더럽히다 ② (여성의 순결을) 빼앗다',s:'besmirch, desecrate, profane, violate',r:'de (completely) + file (행렬) → 좁은 길로 더럽히며 지나가다 → 더럽히다·오염시키다로 고착 > 신성한 곳을 훼손하는 장면이 원형'},
{n:1718,w:'repugnant',m:'a. ① 불쾌한, 혐오스러운; 적대하는, 반감을 품은 ② 대립[모순]되는, 일치하지 않는',s:'abhorrent, disgusting, obnoxious / antagonistic, hostile / conflicting, inconsistent',r:'라틴어 re (back) + pugnare (fight, 싸우다) → 싸워 되받아치는 → 혐오스러운·불쾌한으로 고착 > 보기만 해도 역겨운 장면이 원형'},
{n:1719,w:'purify',m:'v. ① 깨끗이 하다 ② 순화하다, 제련[정제]하다 ③ 정화하다',s:'clarify, clean, clean, filter / refine',r:'라틴어 purus (clean, 깨끗한) + -fy → 깨끗하게 만들다 → 정화하다·순화하다로 고착 > 물을 여과해 깨끗하게 만드는 장면이 원형'},
{n:1720,w:'wig',m:'n. ① 가발 ② 법관, 판사; 고위층인 사람',s:'hairpiece, toupee',r:'짧은 형태 periwig → 머리에 쓰는 가발 → 가발로 고착 > 법정에서 판사가 하얀 가발을 쓴 장면이 원형'},
{n:1721,w:'milk',m:'v. (부정한 방법으로 돈·이득 등을 최대한) 뽑아내다[짜내다]',s:'exploit',r:'고대 영어 meolc (milk, 우유) → 젖소에서 짜내다 → 우유·이용하다로 고착 > 젖소에서 우유를 짜는 장면이 원형'},
{n:1722,w:'coordination',m:'n. ① 통폐, 대통, 통위 ② 조정, 일치',s:'adjustment, regulation',r:'라틴어 co (together) + ordinare (arrange, 정돈하다) → 함께 정돈하다 → 조정·협조·협력으로 고착 > 여러 부서가 협력해 하나의 목표를 달성하는 장면이 원형'},
{n:1723,w:'high-handed',m:'a. 고자세의, 고압적인, 독단적인',s:'autocratic, dictatorial, overbearing',r:'high (높은) + handed (손으로 하는) → 높은 손으로 내리누르는 → 횡포한·고압적인으로 고착 > 권력을 이용해 아랫사람을 억압하는 장면이 원형'},
{n:1724,w:'suffer',m:'v. ① 고통 받다, 괴로워하다 ② 겪다; 악화되다 ③ 참다, 견디다 ④ 처형당하다; 순직하다',s:'undergo; worsen / bear, endure',r:'라틴어 sub (under) + ferre (bear, 견디다) → 아래에서 견디다 → 고통받다·허용하다로 고착 > 고통 속에서 견디는 장면이 원형'},
{n:1725,w:'kudos',m:'n. ① 영광, 명예 ② 칭찬, 찬사',s:'distinction, fame, glory / acclaim, applause, credit, praise',r:'그리스어 kydos (glory, 영광) → 대단한 업적에 주는 영광 → 명예·칭찬으로 고착 > 탁월한 성과에 대한 찬사의 장면이 원형'},
{n:1726,w:'refurbish',m:'vt. ① 다시 닦다 ② 일신[쇄신]하다',s:'remodel, renovate, revamp',r:'re (again) + furbish (닦다) → 다시 닦아 새롭게 하다 → 개장하다·새로 단장하다로 고착 > 낡은 건물을 새것처럼 개장하는 장면이 원형'},
{n:1727,w:'sterile',m:'a. ① 메마른, 불모의 ② 불임의 ③ 살균한, 소독한 ④ 빈약한; 독창성 없는',s:'arid, infertile, unfruitful / infecund, infertile / antiseptic',r:'라틴어 sterilis (barren, 불임의) → 생명을 낳지 못하는 → 불임의·살균된으로 고착 > 세균 하나 없이 완전히 살균된 장면이 원형'},
{n:1728,w:'dusk',m:'n. 땅거미, 황혼, 어스름',s:'sunset, twilight',r:'고대 영어 dox (dark, 어두운) → 하루가 끝나며 어두워지는 시간 → 황혼·어스름으로 고착 > 해가 지고 어둠이 조금씩 내려앉는 장면이 원형'},
{n:1729,w:'futile',m:'a. 헛된, 무익한, 소용없는',s:'fruitless, useless, vain',r:'라틴어 futilis (leaky, 새는) → 물이 새듯 아무 효과 없는 → 헛된·소용없는으로 고착 > 아무리 해도 결과가 없는 장면이 원형'},
{n:1730,w:'conundrum',m:'n. 수수께끼; 어려운 문제',s:'enigma, puzzle, riddle',r:'16세기 영어 conundrum (riddle, 수수께끼) → 답을 알기 어려운 난제 → 수수께끼·어려운 문제로 고착 > 어느 쪽을 선택해도 답이 없는 장면이 원형'},
{n:1731,w:'throttle',m:'vt. ① 목을 조르다, 질식시키다 ② 억압하다 ③ 흐름을 막다; 속도를 떨어뜨리다',s:'asphyxiate, choke / oppress, quash, repress, suppress',r:'고대 영어 throte (throat, 목구멍) → 목구멍을 조르다 → 목 조르다·감속 장치로 고착 > 엔진의 연료 공급을 조절하는 장면이 원형'},
{n:1732,w:'bloated',m:'a. ① 부풀어 오른, 부은 ② 거만한, 오만한',s:'distended, swollen / arrogant, haughty',r:'고대 영어 blot (soft, 부드러운) → 부풀어 오른 → 부어오른·과도하게 큰으로 고착 > 배가 공기로 가득 차 부풀어 오른 장면이 원형'},
{n:1733,w:'mortuary',m:'n. 시체안치소, 영안실; 장례식장',s:'funeral chapel, morgue',r:'라틴어 mortuarius (of the dead, 죽은 자의) → 죽은 자를 위한 곳 → 영안실·장의사로 고착 > 시신을 안치하는 차가운 공간의 장면이 원형'},
{n:1734,w:'gregarious',m:'a. ① 군생하는, 군집성의 ② 사교적인',s:'social / outgoing, sociable',r:'라틴어 grex (flock, 무리) → 무리를 좋아하는 → 사교적인·무리 짓는으로 고착 > 항상 무리 속에서 어울리기 좋아하는 장면이 원형'},
{n:1735,w:'swirl',m:'v. 소용돌이치다 / n. 소용돌이; 소용돌이무늬',s:'circumvolute, gurge, whirl / eddy, gurge, vortex, whirlpool',r:'중세 스코틀랜드어 swirl (whirlpool, 소용돌이) → 소용돌이치다 → 빙빙 돌다·소용돌이로 고착 > 물이 배수구로 빨려들며 소용돌이치는 장면이 원형'},
{n:1736,w:'idiom',m:'n. ① 관용구, 숙어; 어법, 표현 양식 ② 개성적 표현 형식, 작품(作風)',s:'',r:'그리스어 idioma (peculiarity, 특이함) → 그 언어만의 특이한 표현 → 숙어·관용어로 고착 > 글자 그대로 해석하면 의미가 안 통하는 표현의 장면이 원형'},
{n:1737,w:'cloak',m:'n. ① 외투, 망토 ② 은폐물, 가면 / v. 가리다, 숨기다',s:'cape, coat, mantle / guise, mask, pretext / cover, disguise, veil, wrap',r:'고대 북프랑스어 cloque (bell, 종) → 종 모양의 망토 → 망토·위장하다로 고착 > 망토로 몸을 감싸 정체를 숨기는 장면이 원형'},
{n:1738,w:'fortnight',m:'n. 2주일간',s:'two weeks',r:'고대 영어 feowertyne niht (fourteen nights, 열네 밤) → 열네 밤 → 2주·14일로 고착 > 2주 후를 기약하는 장면이 원형'},
{n:1739,w:'ascend',m:'v. ① 올라가다, 기어오르다 ② 높아지다; 승진하다',s:'climb, mount, rise, scale',r:'라틴어 ad (to) + scandere (climb, 오르다) → 오르다 → 오르다·승진하다로 고착 > 계단을 한 칸씩 오르는 장면이 원형'},
{n:1740,w:'entire',m:'a. ① 전체의, 전부의 ② 완전한, 흠이 없는 ③ 거세되지 않은 / n. 거세되지 않은 말',s:'complete, total, whole / complete, intact, perfect / uncastrated',r:'라틴어 integer (whole, 전체) → 완전한 전체 → 전체의·완전한으로 고착 > 하나도 빠짐없이 모두 모인 장면이 원형'},
{n:1741,w:'precocious',m:'a. 조숙한, 어른스러운',s:'mature',r:'라틴어 prae (before) + coquere (cook, 익히다) → 때 이르게 익은 → 조숙한·신동의로 고착 > 나이에 비해 훨씬 어른스러운 아이의 장면이 원형'},
{n:1742,w:'rowdy',m:'n. 난폭한 사람, 무뢰한 / a. 난폭한, 소란스러운',s:'hooligan, scamp / boisterous, unruly',r:'19세기 미국 영어 rowdy (rough person, 거친 사람) → 시끄럽고 거친 → 떠들썩한·난폭한으로 고착 > 크게 소리치며 소동을 일으키는 장면이 원형'},
{n:1743,w:'broach',m:'v. 말을 꺼내다, 끄집어내다',s:'bring up, introduce',r:'고대 프랑스어 broche (spit, 꼬치) → 꼬치로 꽂듯 화제를 꺼내다 → 화제를 꺼내다로 고착 > 조심스럽게 민감한 주제를 꺼내는 장면이 원형'},
{n:1744,w:'sublime',m:'a. ① 숭고한, 장엄한 ② 최고의, 탁월한 / n. 최고, 극치, 정점',s:'imposing, magnificent, majestic / outstanding / acme, peak, primacy, zenith',r:'라틴어 sub (up to) + limen (threshold, 문턱) → 문턱에 이를 만큼 높은 → 숭고한·웅장한으로 고착 > 웅장한 자연에 압도되어 언어를 잃는 장면이 원형'},
{n:1745,w:'reference',m:'n. ① 참조, 참고 ② 문의, 조회 ③ 언급, 논급 ④ 관계, 관련',s:'inquiry / allusion, mention / relation, respect',r:'라틴어 re (back) + ferre (carry, 나르다) → 뒤로 가져오다 → 참고·언급·출처로 고착 > 논문에 참고 문헌을 표시하는 장면이 원형'},
{n:1746,w:'overrun',m:'v. ① 급격히 퍼지다, 들끓다 ② 초과하다, 넘다',s:'infest, spread, swarm / exceed, surpass',r:'over (넘어서) + run (달리다) → 범위를 넘어 달리다 → 점령하다·초과하다로 고착 > 잡초가 정원을 모두 뒤덮어 버리는 장면이 원형'},
{n:1747,w:'vessel',m:'n. ① 선박, 배 ② 그릇, 용기 ③ (맥)관; 혈관; 물관, 도관',s:'boat, craft, ship, tanker / bowl, container / pipe, trachea',r:'라틴어 vascellum (small vase, 작은 그릇) → 담는 그릇·배 → 그릇·선박·혈관으로 고착 > 바다를 항해하는 배의 장면이 원형'},
{n:1748,w:'distill',m:'v. ① 증류하다, 정제하다 ② 추출하다',s:'purify, refine / extract',r:'라틴어 de (down) + stillare (drip, 떨어지다) → 방울방울 떨어뜨려 정수하다 → 증류하다·핵심을 추출하다로 고착 > 알코올 증기를 냉각해 방울방울 받아내는 장면이 원형'},
{n:1749,w:'evade',m:'v. ① 피하다, 회피하다 ② 얼버무리며 넘기다',s:'escape, flee / fudge, parry',r:'라틴어 e (out) + vadere (go, 가다) → 빠져나가다 → 피하다·회피하다로 고착 > 추격자를 교묘히 따돌리는 장면이 원형'},
{n:1750,w:'tribunal',m:'n. ① 재판소, 법정, 법원 ② 조사 위원회, 심사 위원회',s:'bar, court, judicatory',r:'라틴어 tribunal (judge\'s seat, 재판석) → 재판석에서 판결하는 곳 → 재판소·법원으로 고착 > 판사가 높은 자리에서 판결을 내리는 장면이 원형'},
{n:1751,w:'worldly',m:'a. 현세의, 속세의, 세속적인',s:'earthly, mundane, secular',r:'world (세상) + -ly → 세상의 방식 같은 → 세속적인·현실적인으로 고착 > 이상이 아닌 현실 세계의 이익을 좇는 장면이 원형'},
{n:1752,w:'disconcert',m:'vt. 당황하게 하다, 쩔쩔매게 하다',s:'baffle, confuse, disturb, puzzle',r:'dis (not) + concert (조화) → 조화를 없애다 → 당황시키다·혼란스럽게 하다로 고착 > 예상치 못한 질문에 당황하는 장면이 원형'},
{n:1753,w:'constellation',m:'n. ① 별자리, 성좌 ② 기라성 같은 모임',s:'asterism / galaxy',r:'라틴어 con (together) + stella (star, 별) → 함께 모인 별들 → 별자리·성좌로 고착 > 별들을 이어 형상을 만든 별자리의 장면이 원형'},
{n:1754,w:'stifle',m:'v. ① 숨 막히게 하다; 질식시키다 ② 억누르다, 억제하다; 억압하다',s:'asphyxiate, choke, suffocate / curb, restrain, suppress',r:'중세 영어 stiflen (smother, 窒息시키다) → 숨을 막다 → 억누르다·질식시키다로 고착 > 터지는 웃음을 손으로 막는 장면이 원형'},
{n:1755,w:'decorum',m:'n. 단정, 예의 바름, 예절',s:'civility, courtesy, decency, propriety',r:'라틴어 decorum (propriety, 품위) → 품위 있게 행동하는 것 → 예의·품위로 고착 > 격식 있는 자리에서 바르게 행동하는 장면이 원형'},
{n:1756,w:'quarrelsome',m:'a. 화를 잘 내는, 말다툼을 좋아하는',s:'argumentative, disputatious',r:'quarrel (다툼) + -some → 다툼이 넘치는 → 싸우기 좋아하는으로 고착 > 사소한 것도 그냥 넘기지 못하고 싸우는 장면이 원형'},
{n:1757,w:'proscribe',m:'vt. ① 금하다, 금지하다 ② 추방하다',s:'ban, forbid, prohibit / exclude, expel, outlaw',r:'라틴어 pro (before) + scribere (write, 쓰다) → 공개적으로 써서 금지하다 → 금지하다·추방하다로 고착 > 게시판에 금지 목록을 붙이는 장면이 원형'},
{n:1758,w:'spurious',m:'a. 가짜의, 위조의; 그럴듯한',s:'bogus, counterfeit, fake',r:'라틴어 spurius (illegitimate, 사생의) → 진짜가 아닌 → 가짜의·위조된으로 고착 > 진품처럼 보이지만 가짜인 장면이 원형'},
{n:1759,w:'ebb',m:'n. ① 썰물, 간조 ② 쇠퇴, 쇠퇴기 / vi. ① 조수가 빠지다 ② 점점 쇠하다, 약해지다',s:'low tide, reflux / decay, decline, decrease / diminish, flag, lessen, recede',r:'고대 영어 ebba (low water, 썰물) → 바닷물이 빠져나가다 → 썰물·쇠퇴하다로 고착 > 밀물이 빠져나가며 해변이 드러나는 장면이 원형'},
{n:1760,w:'institute',m:'n. 협회, 학회; 연구소 / vt. ① (제도 등을) 만들다, 설치하다 ② 시작하다',s:'constitute; establish; enact',r:'라틴어 instituere (establish, 세우다) → 목적을 위해 세운 것 → 기관·설립하다로 고착 > 연구 목적으로 세워진 기관의 장면이 원형'},
{n:1761,w:'censorious',m:'a. 몹시 비판적인, 트집만 잡으려고 하는',s:'captious, fault-finding',r:'라틴어 censor (critic, 비판자) → 비판하기 좋아하는 → 잘 비난하는으로 고착 > 모든 것에 흠을 잡아 비판하는 장면이 원형'},
{n:1762,w:'preliminary',m:'a. 예비적인, 준비의 / n. 사전준비; 예비시험',s:'pilot; opening',r:'라틴어 prae (before) + limen (threshold, 문턱) → 문턱에 들어서기 전 → 예비의·사전의로 고착 > 본 시험 전에 보는 예선의 장면이 원형'},
{n:1763,w:'adjudicate',m:'v. 판결을 내리다, 재결하다',s:'adjudge, judge, sentence',r:'라틴어 ad (to) + judicare (judge, 판결하다) → 판결을 내리다 → 재판하다·심판하다로 고착 > 심판이 경기 결과를 결정하는 장면이 원형'},
{n:1764,w:'beset',m:'vt. ① 포위하다, 에워싸다 ② 따라다니다, 괴롭히다',s:'besiege',r:'고대 영어 besettan (surround, 에워싸다) → 사방에서 에워싸다 → 에워싸다·괴롭히다로 고착 > 사방에서 문제가 쏟아지는 장면이 원형'},
{n:1765,w:'omen',m:'n. 전조, 징조, 조짐 / vt. 전조가 되다, 예고하다',s:'augury, harbinger, indication / forebode, prognosticate',r:'라틴어 omen (omen, 전조) → 앞으로 일어날 일의 징조 → 징조·예조로 고착 > 검은 까마귀가 불길한 일을 예고하는 장면이 원형'},
{n:1766,w:'transmute',m:'v. 바꾸다, 변화시키다',s:'alter, change, transform',r:'라틴어 trans (across) + mutare (change, 바꾸다) → 완전히 다른 것으로 바꾸다 → 변형하다·변환하다로 고착 > 납을 금으로 바꾸려는 연금술사의 장면이 원형'},
{n:1767,w:'matrix',m:'n. 모체, 기반; 자궁',s:'',r:'라틴어 matrix (womb, 자궁) → 무언가를 만들어내는 기반 → 행렬·기반으로 고착 > 숫자들이 행과 열로 배열된 행렬의 장면이 원형'},
{n:1768,w:'revamp',m:'vt. ① 개조[개정·개혁·쇄신]하다 ② 수선하다',s:'renovate, revise',r:'re (again) + vamp (앞발) → 신발 앞부분을 다시 대다 → 개선하다·개조하다로 고착 > 낡은 제품을 완전히 새롭게 바꾸는 장면이 원형'},
{n:1769,w:'interstice',m:'n. 간격, 틈새, 작은 틈',s:'chink, crack, crevice, fissure',r:'라틴어 inter (between) + sistere (stand, 서다) → 사이에 서있는 것 → 틈·간격으로 고착 > 벽돌과 벽돌 사이의 좁은 틈의 장면이 원형'},
{n:1770,w:'fascinating',m:'a. 황홀하게 하는, 매혹적인',s:'alluring, captivating, charming, enchanting',r:'라틴어 fascinare (bewitch, 마법을 걸다) → 마법에 걸린 듯 끌리는 → 매혹적인·흥미로운으로 고착 > 눈을 뗄 수 없어 빨려드는 장면이 원형'},
{n:1771,w:'garrison',m:'n. ① 수비대, 주둔군 ② 요새, 주둔지 / vt. 수비대를 두다; 주둔시키다',s:'fort, fortress / position, station',r:'고대 프랑스어 garnison (supply, 공급) → 방어를 위해 배치된 군대 → 수비대·군대 주둔으로 고착 > 성에 방어 병력을 배치하는 장면이 원형'},
{n:1772,w:'collogue',m:'vi. 밀담하다; 공모하다',s:'hugger-mugger; conspire, intrigue, plot',r:'라틴어 col (together) + loqui (speak, 말하다) → 함께 말하다 → 은밀히 상의하다로 고착 > 두 사람이 낮은 목소리로 몰래 상의하는 장면이 원형'},
{n:1773,w:'infirm',m:'a. ① 허약한; 노쇠한 ② 의지 등이 약한, 우유부단한',s:'feeble, frail, weak / irresolute, volitionless',r:'라틴어 in (not) + firmus (strong, 강한) → 강하지 않은 → 허약한·노쇠한으로 고착 > 오래된 건강 문제로 몸이 약해진 장면이 원형'},
{n:1774,w:'saga',m:'n. 전설; 무용담, 모험담',s:'epic, legend, story, tale',r:'고대 노르드어 saga (story, 이야기) → 영웅의 긴 이야기 → 영웅담·장편 이야기로 고착 > 수 세대에 걸친 장대한 이야기의 장면이 원형'},
{n:1775,w:'noticeable',m:'a. 눈에 띄는, 현저한, 두드러진',s:'conspicuous, noteworthy',r:'notice (주목하다) + -able → 주목할 수 있는 → 눈에 띄는·현저한으로 고착 > 군중 속에서 홀로 눈에 띄는 장면이 원형'},
{n:1776,w:'corpse',m:'n. 시체, 송장',s:'cadaver, carcass, remains',r:'라틴어 corpus (body, 몸) → 더 이상 생명이 없는 몸 → 시체·유해로 고착 > 모든 생명이 사라진 몸의 장면이 원형'},
{n:1777,w:'deny',m:'vt. ① 사실이 아니라고 말하다; 부인하다 ② 거부하다 ③ 면회를 거절하다',s:'contradict, refute / refuse, reject, veto',r:'라틴어 denegare (say no, 거부하다) → 아니라고 말하다 → 부인하다·거부하다로 고착 > 혐의를 강하게 부인하는 장면이 원형'},
{n:1778,w:'piebald',m:'a. 얼룩무늬가 있는; 잡색의 / n. 얼룩말; 얼룩무늬 동물',s:'',r:'pie (까치) + bald (흰) → 까치처럼 흑백이 섞인 → 얼룩덜룩한으로 고착 > 흑백이 불규칙하게 섞인 말의 장면이 원형'},
{n:1779,w:'horrid',m:'a. ① 무시무시한 ② 매우 불쾌한, 싫은',s:'frightful, horrible / nasty, repulsive',r:'라틴어 horridus (rough, 거친) → 무섭게 거친 → 무시무시한·끔찍한으로 고착 > 너무 끔찍해 소름이 돋는 장면이 원형'},
{n:1780,w:'circuit',m:'n. ① 순회; 순회여행 ② 우회(도로) ③ 회로, 회선',s:'tour / detour',r:'라틴어 circumire (go around, 돌다) → 돌아오는 경로 → 회로·순회·주회로 고착 > 전류가 도는 전자 회로의 장면이 원형'},
{n:1781,w:'nitpick',m:'v. 하찮은 일에 꽁꽁 앓다, 트집[흠]을 잡다',s:'',r:'nit (이의 알) + pick (집다) → 머릿니의 알을 하나씩 집어내다 → 트집 잡다·사소한 것을 꼬집다로 고착 > 사소한 오류를 하나씩 찾아내는 장면이 원형'},
{n:1782,w:'effect',m:'n. ① 결과 ② 효과; 효력 ③ 취지, 의미 ④ 소지품 / vt. ① 초래하다 ② 실행하다, 성취하다',s:'consequence / impact / meaning / bring about / achieve',r:'라틴어 efficere (bring about, 야기하다) → 원인이 만들어낸 결과 → 결과·효과로 고착 > 원인에 의해 나타나는 결과의 장면이 원형'},
{n:1783,w:'vagrant',m:'a. ① 방랑하는 ② 변덕스러운 / n. 방랑자',s:'roving, wandering / desultory, whimsical / hobo, tramp, vagabond',r:'라틴어 vagari (wander, 방랑하다) → 정처 없이 떠도는 → 부랑자·방랑으로 고착 > 일정한 거처 없이 떠도는 장면이 원형'},
{n:1784,w:'resource',m:'n. ① 자원; 물자 ② 수단, 방책',s:'reserve, source, supply / means, resort',r:'라틴어 re (again) + surgere (rise, 솟다) → 다시 솟아나는 것 → 자원·재원으로 고착 > 땅 속에서 솟아나는 풍부한 자원의 장면이 원형'},
{n:1785,w:'butt',m:'n. ① 대상, 표적 ② 꽁초 ③ 통; 엉덩이; 밑동',s:'object, target, victim',r:'고대 프랑스어 but (target, 목표) → 총의 과녁 끝·엉덩이·통 → 과녁·엉덩이·밀치다로 고착 > 사격 연습 과녁의 장면이 원형'},
{n:1786,w:'arcane',m:'a. 비밀의; 신비로운, 불가사의한',s:'mysterious, occult, secret',r:'라틴어 arcanus (secret, 비밀의) → 상자에 감춰진 비밀 → 신비한·비밀의로 고착 > 소수만 아는 신비로운 지식의 장면이 원형'},
{n:1787,w:'phenom',m:'n. 천재, 경이적인 사람',s:'genius, marvel, prodigy, wonder',r:'phenomenon (현상)의 줄임말 → 현상 같은 뛰어난 존재 → 천재·경이로운 인물로 고착 > 나타나자마자 모두를 압도하는 장면이 원형'},
{n:1788,w:'uphold',m:'vt. ① 떠받치다 ② 지지하다, 옹호하다',s:'elevate, hoist, raise / buttress, defend, maintain, support',r:'up (위로) + hold (잡다) → 위로 들어 지지하다 → 지지하다·유지하다로 고착 > 전통적 가치를 높이 들어 지키는 장면이 원형'},
{n:1789,w:'munition',m:'n. ① 군수품, 탄약 ② 필수품, 자금, 자재',s:'ammo, ordnance / commodities, necessaries',r:'라틴어 munitio (fortification, 요새화) → 방어를 위한 군수품 → 군수품·탄약으로 고착 > 전쟁에 필요한 총알과 폭탄의 장면이 원형'},
{n:1790,w:'gorgeous',m:'a. 호화로운, 화려한; 멋진',s:'beautiful, magnificent, splendid',r:'고대 프랑스어 gorgias (elegant, 우아한) → 화려하고 우아한 → 매우 아름다운으로 고착 > 눈이 부시게 아름다운 장면이 원형'},
{n:1791,w:'bay',m:'n. ① 만(灣) ② 궁지; 막다른 곳',s:'cove, gulf / fix, plight, predicament',r:'고대 프랑스어 baie (opening, 열린 곳) → 바다로 열린 곳 → 만·격실·짖다로 고착 > 바다가 육지 안으로 파고들어 형성된 만의 장면이 원형'},
{n:1792,w:'downright',m:'a. ① 철저한, 완전한 ② 솔직한, 노골적인 / ad. 철저히, 완전히; 솔직히',s:'absolute, complete, outright, utter / blunt, frank, honest / completely, perfectly',r:'down (아래로) + right (곧은) → 아래로 곧장 → 완전한·철저한으로 고착 > 전혀 가리지 않고 완전히 노골적인 장면이 원형'},
{n:1793,w:'shroud',m:'n. ① 수의(壽衣) ② 덮개, 가리개, 장막 / vt. ① 수의를 입히다 ② 싸다, 가리다, 감추다',s:'covering, veil / conceal, cover, hide, screen',r:'고대 영어 scrud (covering, 덮개) → 감싸서 덮다 → 수의·덮다·은폐하다로 고착 > 시신을 하얀 천으로 감싸는 장면이 원형'},
{n:1794,w:'tutor',m:'n. 가정교사, 지도 교사[교수] / v. 가르치다, 개인 교습을 하다',s:'coach, educator, instructor, teacher / educate, instruct, teach',r:'라틴어 tutor (guardian, 보호자) → 보호하며 가르치는 사람 → 가정교사·지도하다로 고착 > 일대일로 학생을 가르치는 장면이 원형'},
{n:1795,w:'frenzy',m:'n. 극도의 흥분, 열광, 광분, 광란 / vt. ~를 몹시 흥분[격분]시키다, 미쳐 날뛰게 하다',s:'fever, hysteria, madness, mania, tumult / madden',r:'그리스어 phren (mind, 정신) → 정신이 나간 듯한 상태 → 광란·열광으로 고착 > 이성을 잃고 미친 듯이 행동하는 장면이 원형'},
{n:1796,w:'lullaby',m:'n. 자장가; 졸음이 오게 하는 노래[소리]',s:'berceuse, cradlesong',r:'lull (달래다) + by (옆에서) → 옆에서 달래는 노래 → 자장가로 고착 > 아기를 흔들며 조용히 노래하는 장면이 원형'},
{n:1797,w:'exhume',m:'vt. 파내다, (특히 시체를) 발굴하다; (숨은 인재·명작 등을) 찾아내다, 발굴하다',s:'excavate, unearth',r:'라틴어 ex (out) + humus (earth, 흙) → 흙에서 꺼내다 → 발굴하다·개장하다로 고착 > 오래 묻혀있던 시신을 발굴하는 장면이 원형'},
{n:1798,w:'suite',m:'n. ① 수행원, 종자(從者) ② (특히 호텔의) 스위트룸',s:'attendant, cortege, entourage',r:'고대 프랑스어 suite (following, 뒤따르는) → 뒤따르는 것들의 집합 → 스위트룸·일련으로 고착 > 이어진 여러 방으로 구성된 특실의 장면이 원형'},
{n:1799,w:'rambunctious',m:'a. (사람·행위가) 난폭한, 사나운; 사납게 날뛰는; 제멋대로인',s:'rowdy, unruly',r:'19세기 미국 영어 rambunctious (boisterous, 시끄러운) → 통제 불가능하게 시끄러운 → 난폭한·다루기 어려운으로 고착 > 제멋대로 시끄럽게 날뛰는 장면이 원형'},
{n:1800,w:'agent',m:'n. ① 대리인, 대행자; 주선인, 중개인 ② 첩보원, 간첩 ③ 중요한 작용을 하는 사람[것]; 작인(作因), 동인(動因)',s:'delegate, deputy, proxy, representative',r:'라틴어 agere (do, 행하다) → 행동하는 사람 → 대리인·요인으로 고착 > 회사를 대신해 협상하는 대리인의 장면이 원형'},
{n:1801,w:'novice',m:'n. 초심자, 초보자, 초년생, 풋내기',s:'beginner, greenhorn, newcomer, tyro',r:'라틴어 novicius (newly imported slave, 새로 온 노예) → 새로 들어온 사람 → 초심자·풋내기로 고착 > 처음 시작해 아무것도 모르는 장면이 원형'},
{n:1802,w:'concerted',m:'a. (특히 둘 이상의 사람·국가 등이) 일치단결된, 합심한, 결연한',s:'combined, unanimous, united',r:'라틴어 concertare (contend, 겨루다) → 함께 힘을 모아 → 일치단결된·합심한으로 고착 > 여러 사람이 같은 목표를 향해 한마음으로 나아가는 장면이 원형'},
{n:1803,w:'expunge',m:'vt. (이름·정보·기억 등을) 지우다, 삭제하다',s:'delete, efface, erase, remove',r:'라틴어 ex (out) + pungere (prick, 찌르다) → 찔러 지우다 → 지우다·삭제하다로 고착 > 기록에서 이름을 완전히 지워버리는 장면이 원형'},
{n:1804,w:'profligate',m:'a. ① 낭비가 심한 ② 품행이 나쁜, 방탕한 / n. ① 방탕아, 난봉꾼 ② 낭비가',s:'extravagant, prodigal, spendthrift, wasteful / degenerate, depraved, immoral / libertine / squanderer',r:'라틴어 profligare (overthrow, 쓰러뜨리다) → 도덕을 쓰러뜨린 → 낭비가 심한·방탕한으로 고착 > 돈과 향락에 모든 것을 탕진하는 장면이 원형'},
{n:1805,w:'assail',m:'vt. ① 공격[습격]하다, 비난하다 ② (불안·의심 등이) 괴롭히다',s:'assault, attack',r:'라틴어 ad (to) + salire (leap, 뛰다) → ~를 향해 뛰어들다 → 공격하다·비난하다로 고착 > 사방에서 달려들어 공격하는 장면이 원형'},
{n:1806,w:'livelihood',m:'n. 살림살이, 생계; 생계수단',s:'housekeeping, living',r:'고대 영어 liflad (course of life, 삶의 방식) → 삶을 영위하는 수단 → 생계·생계수단으로 고착 > 가족을 부양하기 위해 일하는 장면이 원형'},
{n:1807,w:'requisite',m:'a. 필요한, 없어서는 안 될, 필수인 / n. 필수품, 필요조건',s:'essential, necessary, required / precondition, requirement',r:'라틴어 requisitus (required, 필요한) → 반드시 필요한 것 → 필요한·필수품으로 고착 > 없으면 목표를 이룰 수 없는 필수 조건의 장면이 원형'},
{n:1808,w:'sidestep',m:'v. 옆으로 비키다; (책임 등을) 회피하다',s:'avoid, evade',r:'side (옆) + step (발걸음) → 옆으로 발걸음을 옮기다 → 옆으로 비키다·회피하다로 고착 > 날아오는 공을 옆으로 비켜 피하는 장면이 원형'},
{n:1809,w:'despondent',m:'a. 낙담한, 실의에 빠진, 풀이 죽은',s:'dejected, depressed, discouraged',r:'라틴어 de (completely) + spondeo (promise, 약속하다) → 희망을 완전히 잃다 → 낙담한·실의에 빠진으로 고착 > 모든 것을 포기한 듯 고개를 떨구는 장면이 원형'},
{n:1810,w:'induct',m:'vt. ① (정식으로 직위·성직·지위에) 임명하다, 취임시키다 ② (비결 등을) 전수하다, 초보를 가르치다',s:'inaugurate, install, instate / initiate, introduce',r:'라틴어 in (into) + ducere (lead, 이끌다) → 안으로 이끌다 → 취임시키다·전수하다로 고착 > 새로운 구성원을 공식적으로 맞이하는 장면이 원형'},
{n:1811,w:'privilege',m:'n. 특권, 특전',s:'prerogative',r:'privi (private, 개인의) + lege (law, 법) → 개인을 위해 따로 정해진 법 → 특권으로 고착 > 왕이 특정 귀족에게만 서명해 주는 칙령의 장면이 원형'},
{n:1812,w:'strident',m:'a. ① 소리가 불쾌한, 날카로운, 귀에 거슬리는 ② 공격적인, 단호한, 집요한',s:'noisy, raucous, vociferous',r:'strid (삐걱거리다, 마찰음) + -ent (형용사형) → 마찰로 생기는 날카로운 소리의 성질 → 귀에 거슬리는·공격적인으로 고착 > 칠판을 손톱으로 긁는 소리가 울리는 장면이 원형'},
{n:1813,w:'denomination',m:'n. ① 명칭, 호칭 ② 종파, 교파 ③ (특히 돈의) 액면가, 액면표시금액',s:'appellation, compellation, designation / religious sect / face value',r:'de (완전히) + nomin (name, 이름) + -ation (명사형) → 완전히 이름 붙이는 행위 → 명칭·종파·액면가로 고착 > 지폐에 금액 숫자를 찍어 구분하는 장면이 원형'},
{n:1814,w:'fester',m:'v. ① (상처가) 곪다; (쓰레기 등이) 부패하다 ② (분통 등으로) 마음이 아프다; 노여움 등이 심해지다 ③ (문제 등이) 악화되다',s:'become infected, decay, putrefy, suppurate / annoy, irk, irritate / intensify',r:'라틴어 fistula (관, 궤양) → 상처가 고름을 내뿜는 관처럼 썩어가는 이미지 → 곪다·악화되다로 고착 > 방치된 상처에 고름이 차오르는 장면이 원형'},
{n:1815,w:'acupuncture',m:'n. 침술(요법)',s:'',r:'acu (needle, 바늘) + punct (pierce, 찌르다) + -ure (명사형) → 바늘로 찌르는 행위 → 침술로 고착 > 가느다란 침이 경혈 자리에 꽂히는 장면이 원형'},
{n:1816,w:'injurious',m:'a. ① 해로운, 유해한 ② 상처를 주는, (말이) 무례한, 모욕적인',s:'damaging, detrimental, harmful / hurtful, insulting',r:'in (not) + jur (right/law, 권리·법) + -ious (형용사형) → 권리를 침해하는 성질 → 해로운·모욕적인으로 고착 > 누군가의 권리를 짓밟는 장면이 원형'},
{n:1817,w:'bonanza',m:'n. ① (찾아낸) 풍부한 광맥, 노다지 ② 뜻밖의 행운, 횡재, 대성공',s:'bunce, jackpot, windfall',r:'스페인어 bonanza (calm sea, 잔잔한 바다) → 항해 순풍처럼 뜻밖에 찾아오는 풍요 → 노다지·횡재로 고착 > 광부가 금맥을 발견해 환호하는 장면이 원형'},
{n:1818,w:'dispose',m:'v. ① 처분하다[of] ② 배치하다, 배열하다 ③ ~의 경향을 갖게 하다',s:'arrange, order, place / incline, predispose, tempt',r:'dis (apart, 따로) + pos (place, 놓다) → 따로따로 배치하다 → 처분하다·배열하다·경향 갖게 하다로 고착 > 물건을 제자리에 하나씩 놓거나 치우는 장면이 원형'},
{n:1819,w:'suggestion',m:'n. ① 제안, 제의, 의견 ② 시사, 암시 ③ 연상, 착상 ④ 기미, 기색',s:'proposal, proposition, recommendation / allusion, implication / idea / hint, note, sign',r:'sub (under, 아래) + gest (carry, 운반하다) + -ion (명사형) → 아래에서 슬며시 운반해 올리는 것 → 제안·암시·기미로 고착 > 귓속말로 아이디어를 살며시 전달하는 장면이 원형'},
{n:1820,w:'timorous',m:'a. 겁 많은, 소심한',s:'chicken-hearted, cowardly, pusillanimous, timid',r:'timor (fear, 두려움) + -ous (형용사형) → 두려움을 가진 성질 → 겁 많은·소심한으로 고착 > 작은 소리에도 움츠러드는 사람의 장면이 원형'},
{n:1821,w:'euphoria',m:'n. (극도의) 행복감, 희열',s:'ecstasy, jubilation, rapture',r:'eu (good, 좋은) + phor (carry, 나르다) + -ia (상태) → 좋은 감정을 가득 실어 나르는 상태 → 극도의 행복감·희열로 고착 > 구름 위를 걷는 듯 몸이 가벼운 장면이 원형'},
{n:1822,w:'compress',m:'v. ① 압축[압착]하다 ② (사상·언어 등을) 요약하다, 집약하다 / n. 압박 붕대; 습포',s:'condense / abridge, abstract, summarize',r:'com (together, 함께) + press (누르다) → 함께 꽉 눌러 좁히다 → 압축하다·요약하다로 고착 > 스프링을 두 손으로 눌러 납작하게 만드는 장면이 원형'},
{n:1823,w:'exigency',m:'n. 위급, 급박, 긴급 사태',s:'crisis, emergency, urgency',r:'ex (out, 밖으로) + ig (drive, 몰다) + -ency (명사형) → 사태가 밖으로 몰아치는 긴박함 → 위급·긴급 사태로 고착 > 경보가 울리며 즉각 대피를 요구하는 장면이 원형'},
{n:1824,w:'subterranean',m:'a. ① 지하의, 지하에 있는 ② 숨은, 비밀의',s:'underground / covert, hidden',r:'sub (under, 아래) + terran (earth, 땅) + -ean (형용사형) → 땅 아래에 있는 성질 → 지하의·숨은으로 고착 > 땅 속 깊이 뻗은 지하 터널의 장면이 원형'},
{n:1825,w:'mercury',m:'n. ① 수은, 수은주 ② <천문학> 수성(水星) ③ 활기',s:'animation, briskness, liveliness, spirit, vigor',r:'라틴어 Mercurius (신들의 전령) → 빠르게 움직이는 전령처럼 유동적인 금속 → 수은·수성·활기로 고착 > 깨진 온도계에서 은빛 구슬이 또르르 굴러가는 장면이 원형'},
{n:1826,w:'glean',m:'v. ① (정보·지식 등을) 조금씩 수집하다, 모으다 ② (이삭을) 줍다',s:'collect, gather',r:'고대 프랑스어 glener (이삭을 줍다) → 수확 후 남은 것을 하나씩 모으는 행위 → 조금씩 수집하다·이삭 줍다로 고착 > 추수 후 밭에서 낱알을 하나하나 줍는 장면이 원형'},
{n:1827,w:'affection',m:'n. ① 애정, 호의; 애착 ② 감정, 감동 ③ 영향 ④ 병',s:'attachment, devotion, love / emotion, feeling / effect, influence / disease, illness',r:'af (to, ~에) + fect (do/make, 작용하다) + -ion (명사형) → 마음에 작용해 생기는 것 → 애정·감동·영향·병으로 고착 > 따뜻한 손길이 마음을 어루만지는 장면이 원형'},
{n:1828,w:'oval',m:'a. 달걀 모양의, 타원형의',s:'egg-shaped, elliptical, ovoid',r:'라틴어 ovum (egg, 달걀) + -al (형용사형) → 달걀처럼 생긴 형태 → 달걀 모양의·타원형으로 고착 > 달걀을 옆에서 바라보는 장면이 원형'},
{n:1829,w:'mote',m:'n. 티끌, 매우 작은 먼지; 작은 결정',s:'bit, grain, particle; speck',r:'고대 영어 mot (먼지 입자) → 빛 속에 떠다니는 아주 작은 먼지 알갱이 → 티끌·작은 먼지로 고착 > 햇살 속에 먼지가 둥둥 떠다니는 장면이 원형'},
{n:1830,w:'wail',m:'v. (고통·슬픔·통증 등으로) 울부짖다, 통각하다 / n. 울부짖음, 통곡',s:'cry, howl, weep / lamentation, moan',r:'고대 노르드어 væla (슬퍼하다) → 고통이 터져 나오는 길고 높은 소리 → 울부짖다·통곡으로 고착 > 상을 당한 사람이 하늘을 향해 울부짖는 장면이 원형'},
{n:1831,w:'tumult',m:'n. 소란, 소동; 폭동, 반란',s:'commotion, riot, to-do, turmoil, uproar',r:'라틴어 tumultus (소란) → tum (swell, 부풀다) → 군중이 부풀어 오르듯 들썩이는 혼란 → 소란·폭동으로 고착 > 광장에서 군중이 뒤엉켜 소리치는 장면이 원형'},
{n:1832,w:'hue',m:'n. ① 색조; 빛깔; 색상 ② (의견·태도 등의) 경향, 특색',s:'color, shade, tone / aspect, light',r:'고대 영어 hiw (색깔·모양) → 물체가 반사하는 고유한 색조 → 색조·색상·경향으로 고착 > 프리즘이 빛을 갈라 여러 색을 펼치는 장면이 원형'},
{n:1833,w:'retribution',m:'n. ① (나쁜 행동에 대한) 보복, 앙갚음 ② 징벌, 천벌',s:'reprisal, retaliation, vengeance',r:'re (back, 되돌아) + tribut (give, 주다) + -ion (명사형) → 되돌려 주는 것 → 보복·징벌·천벌로 고착 > 나쁜 행동이 그대로 돌아오는 부메랑의 장면이 원형'},
{n:1834,w:'leery',m:'a. ① 의심 많은, 조심하는, 경계하는 ② 곁눈질하는',s:'cauthorized, suspicious / casting a side glance',r:'중세 영어 lere (빈·공허한) → 경계심으로 눈을 가늘게 뜨며 곁눈질하는 이미지 → 의심 많은·경계하는으로 고착 > 낯선 사람을 옆으로 훑어보는 눈빛의 장면이 원형'},
{n:1835,w:'crux',m:'n. ① 가장 중요한 부분, 핵심 ② 난문(難問), 난제(難題) ③ 십자가',s:'core, gist, kernel, nitty-gritty, pith',r:'라틴어 crux (cross, 십자가) → 십자가처럼 모든 것이 교차하는 핵심 지점 → 핵심·난제·십자가로 고착 > 여러 길이 교차하는 교차로 중심점의 장면이 원형'},
{n:1836,w:'diverge',m:'v. ① 갈라지다, 분기하다 ② (의견 등이) 갈라지다, 다르다 ③ (진로·이야기 등에서) 빗나가다, 벗어나다',s:'divide, fork, separate, split / conflict, differ, disagree / deviate, digress, stray',r:'di (apart, 따로) + verg (turn, 기울다) → 서로 다른 방향으로 기울어지다 → 갈라지다·분기하다·벗어나다로 고착 > 하나의 길이 두 갈래로 나뉘는 장면이 원형'},
{n:1837,w:'pendulum',m:'n. (시계 등의) 진자, 흔들리는 추; 샹들리에; 마음을 잡지 못하는 사람',s:'',r:'라틴어 pendere (hang, 매달리다) + -ulum (도구 명사형) → 매달려 흔들리는 장치 → 진자·흔들리는 추로 고착 > 시계 속 추가 좌우로 규칙적으로 흔들리는 장면이 원형'},
{n:1838,w:'voluminous',m:'a. ① 부피[용적]가 큰, 방대한, 다량의 ② 권수[책수]가 많은, 여러 권의 ③ 저서가 많은, 다작의',s:'ample, copious, massive / productive, prolific',r:'volum (roll, 두루마리) + -ous (형용사형) → 두루마리가 많이 감긴 듯 부피가 큰 성질 → 방대한·다량의·다작의로 고착 > 서가를 가득 채운 두꺼운 책들의 장면이 원형'},
{n:1839,w:'caption',m:'n. ① (페이지·기사 등의) 표제, 제목; 자막 ② (사진·삽화의) 설명(문)',s:'heading, title; subtitle / legend, underline',r:'라틴어 capere (take, 잡다) → 페이지나 그림을 \'잡아주는\' 제목·설명 → 표제·자막·설명문으로 고착 > 사진 아래에 설명 문구가 달린 장면이 원형'},
{n:1840,w:'ornament',m:'n. 장식품, 장신구; 장식 / vt. 장식하다',s:'adornment, decoration, embellishment / adorn, decorate, embellish',r:'ordin (arrange, 정렬하다) → 아름답게 정돈하여 꾸미는 것 → 장식품·장신구로 고착 > 크리스마스 트리에 반짝이는 구슬을 다는 장면이 원형'},
{n:1841,w:'emend',m:'vt. (문서·잘못 등을) 교정하다, 수정하다',s:'correct, rectify, revise',r:'e (out) + mend (fault, 결점) → 결점을 밖으로 꺼내 없애다 → 교정하다·수정하다로 고착 > 원고의 오류를 빨간 펜으로 지우고 고치는 장면이 원형'},
{n:1842,w:'bedridden',m:'a. 물져 누워 있는, 누워서만 지내는; 노후한, 낡은',s:'laid up, sick[ill] in bed',r:'bed (침대) + ridden (ride의 과거분사, ~에 갇힌) → 침대에 갇혀 버린 상태 → 누워서만 지내는으로 고착 > 병으로 침대를 벗어나지 못하는 환자의 장면이 원형'},
{n:1843,w:'interference',m:'n. 간섭, 참견, 개입, 방해',s:'intervention, intrusion, meddling',r:'inter (between, 사이에) + fer (carry, 운반하다) + -ence (명사형) → 사이에 끼어들어 흐름을 방해하는 것 → 간섭·개입·방해로 고착 > 두 사람의 대화 사이에 끼어드는 장면이 원형'},
{n:1844,w:'amorphous',m:'a. ① 확실한 형태가 없는, 무정형의 ② 특색[개성]이 뚜렷하지 않은, 특징이 없는',s:'formless, shapeless, unshaped / characterless, featureless, gray',r:'a (not) + morph (form, 형태) + -ous (형용사형) → 형태가 없는 성질 → 무정형의·특색이 없는으로 고착 > 그릇 없이 흘러내리는 젤리처럼 윤곽이 없는 장면이 원형'},
{n:1845,w:'rout',m:'n. ① 완패, 패주 ② 혼란한 군중; 소란 / vt. 완패[패주]시키다',s:'beating, debacle / beat, defeat, thrash, vanquish',r:'라틴어 rupta (broken, 부서진) → 대열이 완전히 부서져 도망치는 상태 → 완패·패주·혼란한 군중으로 고착 > 전투에서 완전히 무너져 달아나는 군대의 장면이 원형'},
{n:1846,w:'knead',m:'vt. ① (가루·흙 등을) 반죽하다, 개다 ② (어깨나 근육 등을) 주무르다 ③ (인격을) 닦다, 도야하다',s:'mold, work / massage, rub / cultivate, file, train',r:'고대 영어 cnedan (반죽하다) → 손바닥으로 누르고 접으며 주무르는 동작 → 반죽하다·주무르다로 고착 > 제빵사가 밀가루 반죽을 힘껏 주무르는 장면이 원형'},
{n:1847,w:'comrade',m:'n. 동료, 동지, 전우, 친구, 벗',s:'associate, colleague, companion',r:'스페인어 camarada (같은 방 동료) → 같은 방(camara)을 쓰는 사이 → 동료·동지·전우로 고착 > 전쟁터에서 어깨를 나란히 하는 병사들의 장면이 원형'},
{n:1848,w:'foray',m:'n. ① 습격, 급습 ② 본업 이외의 분야에의 진출 / v. ① 습격[약탈]하다 ② 침입[진출]하다',s:'incursion, inroad, invasion, raid / loot, pillage, plunder',r:'고대 프랑스어 forrer (먹이를 찾아 나서다) → 약탈·목적지로 갑자기 뛰어드는 행위 → 습격·진출로 고착 > 기병대가 적진을 향해 갑자기 돌격하는 장면이 원형'},
{n:1849,w:'barrister',m:'n. 법정 변호사; 변호사, 법률가',s:'attorney, counsel, lawyer, solicitor',r:'bar (법정 내 칸막이) + -ister (사람) → 법정 칸막이(bar) 안쪽에 서는 사람 → 법정 변호사로 고착 > 법정 안에서 변론하는 변호사의 장면이 원형'},
{n:1850,w:'prowl',m:'v. ① 살금살금 돌아다니다 ② 배회하다 ③ 서성거리다[어슬렁거리다]',s:'wander / loaf, rove',r:'중세 영어 prollen (두리번거리다) → 먹이를 찾듯 살금살금 돌아다니는 행위 → 배회하다·서성거리다로 고착 > 어두운 골목을 고양이처럼 조용히 걷는 장면이 원형'},
{n:1851,w:'immortal',m:'a. 죽지 않는, 불사의, 불멸의',s:'eternal, imperishable, indestructible, undying',r:'im (not) + mort (death, 죽음) + -al (형용사형) → 죽음이 없는 성질 → 불사의·불멸의로 고착 > 신화 속 신들이 영원히 살아있는 장면이 원형'},
{n:1852,w:'constrict',m:'vt. 압축하다; 죄다; 수축시키다',s:'compress, contract, squeeze, tighten',r:'con (together, 함께) + strict (bind, 묶다) → 함께 묶어 좁히다 → 압축하다·수축시키다로 고착 > 뱀이 먹이를 몸통으로 감아 조이는 장면이 원형'},
{n:1853,w:'persiflage',m:'n. 야유, 희롱; 농담',s:'banter, raillery',r:'프랑스어 per (through) + siffler (whistle, 휘파람) → 휘파람 불듯 가볍게 빈정거리는 것 → 야유·희롱·농담으로 고착 > 가볍게 비웃으며 놀리는 사람의 장면이 원형'},
{n:1854,w:'subordinate',m:'a. 부차적[부수]적인 / vt. 하위에 두다; 경시하다 / n. 하급[종속]자, 부하',s:'collateral, secondary, subservient / belittle, disvalue, downplay / henchman, junior',r:'sub (under, 아래) + ordin (order, 순서) + -ate (형용사형) → 순서 아래에 놓인 → 부차적인·하급자로 고착 > 조직도에서 아래 칸에 배치된 직원의 장면이 원형'},
{n:1855,w:'accrue',m:'v. (이자·이익 등이) 생기다',s:'accumulate',r:'ac (to) + cru (grow, 자라다) → ~를 향해 자라나 쌓이다 → (이자·이익이) 생기다로 고착 > 은행 통장에 이자가 조금씩 쌓이는 장면이 원형'},
{n:1856,w:'offspring',m:'n. ① 자식, 자녀; 자손, 후예 ② 생겨난 것, 소산, 결과',s:'descendant, progeny / fruit, result',r:'off (from, ~에서) + spring (jump, 튀어나오다) → 부모에게서 튀어나온 것 → 자녀·자손·소산으로 고착 > 어미 품에서 새끼가 뛰쳐나오는 장면이 원형'},
{n:1857,w:'retaliate',m:'v. 보복하다, 앙갚음하다, 응수하다',s:'avenge, requite, revenge',r:'re (back, 되돌아) + tali (same, 같은) + -ate (동사형) → 같은 방식으로 되돌려 주다 → 보복하다·앙갚음하다로 고착 > 맞은 만큼 똑같이 되돌려 치는 장면이 원형'},
{n:1858,w:'primary',m:'a. ① 첫째의, 제1의, 수위의, 주요한 ② 최초의, 처음의; 원시적인; 근본적인',s:'chief, major, principal / basic, essential, fundamental',r:'prim (first, 첫째) + -ary (형용사형) → 첫째인 성질 → 주요한·최초의·원시적인으로 고착 > 출발선에서 맨 앞에 서는 장면이 원형'},
{n:1859,w:'somniloquy',m:'n. 잠꼬대(하는 버릇)',s:'sleep talking',r:'somn (sleep, 잠) + loqu (speak, 말하다) + -y (명사형) → 잠 속에서 말하는 행위 → 잠꼬대로 고착 > 자면서 중얼중얼 말을 내뱉는 장면이 원형'},
{n:1860,w:'ghastly',m:'a. ① 무시무시한, 소름끼치는 ② 파랗게 질린, 송장 같은',s:'grisly, gruesome, hideous, horrible',r:'고대 영어 gæstan (frighten, 놀라게 하다) → 혼을 빼놓을 만큼 소름 끼치는 → 무시무시한·송장 같은으로 고착 > 새하얗게 질린 유령 같은 얼굴의 장면이 원형'},
{n:1861,w:'trammel',m:'n. 방해, 제약, 속박 / vt. 구속하다, 제한하다',s:'bond, chain, fetter, leash / fetter, hopple, restrict, tie',r:'라틴어 tri (three) + macula (mesh, 그물코) → 세 겹 그물로 옭아매다 → 방해·속박·구속하다로 고착 > 그물에 걸려 움직이지 못하는 물고기의 장면이 원형'},
{n:1862,w:'dispatch',m:'v. ① 급파하다; 발송하다 ② 신속히 해치우다 ③ 죽이다 / n. 급파; 급보; 신속한 처리',s:'expedite / destroy, eliminate / expedition; haste',r:'dis (away) + patch (fasten, 고정하다) → 빠르게 보내 처리하다 → 급파하다·발송하다·신속히 해치우다로 고착 > 전령이 말을 달려 급보를 전하는 장면이 원형'},
{n:1863,w:'cant',m:'n. ① 위선적인 말투 ② 은어',s:'hypocritical statement / jargon, lingo',r:'라틴어 cantare (sing, 노래하다) → 노래처럼 반복되는 상투적 말투 → 위선적 말투·은어로 고착 > 성직자가 판에 박힌 경건한 말을 되풀이하는 장면이 원형'},
{n:1864,w:'blemish',m:'n. 흠, 오점, 결점 / vt. 더럽히다, 손상하다',s:'blot, defect, fault, flaw, stain, stigma, sully, taint, tarnish',r:'고대 프랑스어 blemir (make pale, 창백하게 하다) → 표면을 변색시켜 흠집을 남기다 → 흠·오점·결점으로 고착 > 깨끗한 피부에 생긴 점 하나의 장면이 원형'},
{n:1865,w:'ritual',m:'n. ① 의식, 예배식 ② 의식적 행사, 관례 / a. 의식의; 관습의',s:'ceremony, observance, rite, convention, custom, ceremonial, conventional',r:'라틴어 ritus (rite, 의식) + -al (형용사형) → 정해진 순서의 의식 → 예배식·관례로 고착 > 제단 앞에서 순서대로 행하는 의식의 장면이 원형'},
{n:1866,w:'incise',m:'vt. ① 새기다, 조각하다 ② 베다, 째다, 절개하다',s:'carve, engrave, cut, section',r:'in (into) + cis (cut, 자르다) → 안으로 깊이 자르다 → 새기다·절개하다로 고착 > 조각가가 돌에 정으로 선을 새기는 장면이 원형'},
{n:1867,w:'edifice',m:'n. ① 건물, 건축물, 전당 ② 조직, 체계',s:'building, construction, structure, system',r:'edific (build, 짓다) → 지어 올린 구조물 → 건물·전당·체계로 고착 > 돌을 쌓아 웅장한 건물을 세우는 장면이 원형'},
{n:1868,w:'bamboozle',m:'v. ① 교묘한 말로 속이다 ② 당황하게[어리둥절하게] 하다',s:'deceive, trick, confuse, perplex',r:'bamboozle (18세기 속어, 속이다) → 어원 불명, 연기와 혼란으로 상대를 당황하게 하는 이미지 → 교묘히 속이다·어리둥절하게 하다로 고착 > 마술사가 눈속임으로 관객을 혼란에 빠뜨리는 장면이 원형'},
{n:1869,w:'monolithic',m:'a. ① 하나의 암석으로 된 ② 단일체의; 획일적이고 자유가 없는',s:'undiversified',r:'mono (one, 하나) + lith (stone, 돌) + -ic (형용사형) → 하나의 거대한 돌덩어리 → 단일체의·획일적인으로 고착 > 이집트 오벨리스크처럼 통째로 깎은 거대한 돌 기둥의 장면이 원형'},
{n:1870,w:'famine',m:'n. ① 기근; 흉작 ② 굶주림, 배고픔',s:'deprivation, hunger, starvation',r:'라틴어 fames (hunger, 굶주림) + -ine (명사형) → 굶주림이 땅을 뒤덮은 상태 → 기근·흉작으로 고착 > 바싹 마른 땅에서 빈 밥그릇을 든 사람의 장면이 원형'},
{n:1871,w:'display',m:'v. ① 전시하다, 보이다 ② 올리다, 게양하다 / n. 전시, 진열; 드러냄',s:'exhibit, show, fly, hoist, unfurl',r:'dis (apart, 펼쳐) + play (fold, 접다) → 접혔던 것을 펼쳐 보이다 → 전시하다·드러내다로 고착 > 가게 진열창에 상품을 늘어놓는 장면이 원형'},
{n:1872,w:'nosy',m:'a. 참견하기 좋아하는, 꼬치꼬치 캐묻는 / n. 참견하기 좋아하는 사람',s:'intrusive, meddlesome, backseat driver, busybody',r:'nose (코) + -y (형용사형) → 코를 들이밀고 냄새 맡듯 캐묻는 → 참견하기 좋아하는·꼬치꼬치 캐묻는으로 고착 > 이웃집 대화에 코를 들이미는 사람의 장면이 원형'},
{n:1873,w:'efflorescence',m:'n. 개화; 개화기; 절정, 전성기',s:'anthesis, blossoming, flowering',r:'ef (out) + flor (flower, 꽃) + -escence (되어가는 과정) → 꽃이 밖으로 피어나는 과정 → 개화·절정·전성기로 고착 > 꽃봉오리가 환하게 터지는 장면이 원형'},
{n:1874,w:'unleash',m:'vt. 풀어놓다; 해방하다; 폭발시키다',s:'unbind, unchain, release',r:'un (not) + leash (가죽끈) → 가죽끈을 풀어버리다 → 풀어놓다·해방하다·폭발시키다로 고착 > 묶였던 개의 목줄을 풀어 달려가게 하는 장면이 원형'},
{n:1875,w:'trend',m:'n. 경향, 동향, 추세',s:'current, direction, temporary, tendency',r:'고대 영어 trendan (돌다, 방향을 잡다) → 흐름이 한 방향으로 꾸준히 흘러가는 것 → 경향·추세로 고착 > 강물이 일정한 방향으로 흐르는 장면이 원형'},
{n:1876,w:'lascivious',m:'a. 음탕한, 호색의; 선정적인, 도발적인',s:'lecherous, lewd, libidinous, licentious, obscene',r:'라틴어 lascivia (wantonness, 방종) + -ous (형용사형) → 욕망을 자제하지 않는 성질 → 음탕한·선정적인으로 고착 > 욕망을 거리낌 없이 드러내는 장면이 원형'},
{n:1877,w:'exploit',m:'vt. ① 착취하다 ② 활용하다 ③ 개발하다 / n. 위업, 공적',s:'abuse, misuse, capitalize, use, utilize, develop, achievement, feat',r:'ex (out) + ploit (fold, 펼치다) → 숨겨진 것을 펼쳐 최대한 이용하다 → 착취하다·활용하다·위업으로 고착 > 광산에서 자원을 캐내 이용하는 장면이 원형'},
{n:1878,w:'contingent',m:'a. ① ~에 의존적인[on, upon] ② 우발적인, 우연의 / n. 대표단, 파견단',s:'conditional, dependent, accidental, casual, fortuitous',r:'con (together) + ting (touch, 닿다) + -ent (형용사형) → 함께 닿아야만 일어나는 → ~에 의존적인·우발적인·대표단으로 고착 > 도미노가 앞 패에 닿아야 쓰러지는 장면이 원형'},
{n:1879,w:'frontispiece',m:'n. ① 권두 삽화; 속표지 ② 정면',s:'facade, face, front',r:'front (앞면) + i + spic (look, 보다) → 앞면을 바라보는 곳 → 권두 삽화·정면으로 고착 > 책을 펼치자마자 나오는 그림 페이지의 장면이 원형'},
{n:1880,w:'wreak',m:'vt. ① (해별 등을) 가하다, 주다 ② (분노를) 터뜨리다',s:'inflict, unleash, vent',r:'고대 영어 wrecan (drive out, 몰아내다) → 분노나 파괴를 쏟아내다 → (해를) 가하다·(분노를) 터뜨리다로 고착 > 폭풍이 해안을 강타해 파괴를 쏟아내는 장면이 원형'},
{n:1881,w:'defendant',m:'n. 피고, 피고인',s:'respondent',r:'de (from) + fend (strike, 치다) + -ant (사람) → 공격을 막아내는 사람 → 피고·피고인으로 고착 > 법정에서 변호인 옆에 앉아 방어하는 피고의 장면이 원형'},
{n:1882,w:'comport',m:'vt. <재귀용법> 행동[처신]하다',s:'behave, conduct',r:'com (together) + port (carry, 나르다) → 몸가짐을 함께 가져가다 → 행동하다·처신하다로 고착 > 고개를 꼿꼿이 들고 품위 있게 걷는 장면이 원형'},
{n:1883,w:'runaway',m:'a. ① 달아난, 가출한 ② 제어가 안 되는 ③ 일방적인, 낙승한 / n. ① 도망자 ② 일방적인 승리',s:'escaped, fleeing, fugitive, uncontrolled, unmanageable, easy, effortless, absconder, escapee, refugee, blowout, sweep, walkaway, walkover',r:'run (달리다) + away (멀리) → 멀리 달아나 버린 → 가출한·제어 안 되는·도망자로 고착 > 밤에 짐을 싸들고 몰래 집을 빠져나가는 장면이 원형'},
{n:1884,w:'antecedent',m:'n. ① 선례, 전례 ② (pl.) 조상, 선조 ③ 전력, 경력 / a. 선행하는, 우선하는[to]',s:'forerunner, precursor, former, preceding',r:'ante (before, 앞에) + ced (go, 가다) + -ent (형용사형) → 앞에 먼저 간 것 → 선례·조상·선행하는으로 고착 > 역사책에 기록된 과거 사례를 가리키는 장면이 원형'},
{n:1885,w:'vegetarian',m:'n. 채식주의자; 초식 동물 / a. 채식의, 채식주의자의',s:'herbivore',r:'라틴어 vegetare (enliven, 활기차게 하다) + -arian (주의자) → 식물로 생기를 얻는 사람 → 채식주의자로 고착 > 고기 없이 채소 가득한 접시를 먹는 장면이 원형'},
{n:1886,w:'inhale',m:'v. (공기 등을) 빨아들이다, 흡입하다',s:'breathe in, sniff, take a breath',r:'in (into) + hal (breathe, 숨 쉬다) → 안으로 숨을 들이쉬다 → 빨아들이다·흡입하다로 고착 > 깊게 숨을 들이마시는 장면이 원형'},
{n:1887,w:'brick-and-mortar',m:'a. 오프라인 거래의; 소매의',s:'off-line, retail, shoppy',r:'brick (벽돌) + mortar (모르타르) → 벽돌과 시멘트로 지은 실물 건물 → 오프라인 거래의·소매의로 고착 > 실제 건물 안에 있는 오프라인 매장의 장면이 원형'},
{n:1888,w:'smother',m:'v. ① 질식시키다, 숨 막히게 하다 ② (감정 등을) 억누르다, 억제하다',s:'choke, stifle, strangle, suffocate, quash, repress, subdue, suppress',r:'고대 영어 smorian (suffocate, 질식시키다) → 두꺼운 것으로 덮어 숨을 막다 → 질식시키다·억누르다로 고착 > 두꺼운 이불로 불꽃을 덮어 끄는 장면이 원형'},
{n:1889,w:'climax',m:'n. 최고조, 절정; 정점, 극점',s:'acme, culmination, peak, summit, zenith',r:'그리스어 klimax (ladder, 사다리) → 사다리를 올라 맨 꼭대기에 도달하는 것 → 최고조·절정으로 고착 > 계단 꼭대기에 올라 환호하는 장면이 원형'},
{n:1890,w:'gravitate',m:'v. ① 중력[인력]에 끌리다; 가라앉다 ② 자연히 끌리다',s:'drop, fall, settle, sink, be drawn, incline, lean, tend',r:'라틴어 gravis (heavy, 무거운) + -ate (동사형) → 무거운 것이 중심으로 끌리다 → 중력에 끌리다·자연히 끌리다로 고착 > 사과가 나무에서 땅으로 떨어지는 장면이 원형'},
{n:1891,w:'archery',m:'n. 궁술, 양궁(술)',s:'',r:'arch (bow, 활) + -ery (기술·장소) → 활을 다루는 기술 → 궁술·양궁으로 고착 > 활시위를 당겨 과녁을 겨누는 장면이 원형'},
{n:1892,w:'complex',m:'a. ① 복잡한, 뒤얽힌 ② 복합의, 합성의 / n. ① 대형 아파트; 종합 빌딩 ② 콤플렉스',s:'complicated, convoluted, intricate, composite, compound',r:'com (together) + plex (weave, 엮다) → 함께 복잡하게 엮인 → 복잡한·복합의·콤플렉스로 고착 > 여러 실이 뒤엉켜 풀기 어려운 장면이 원형'},
{n:1893,w:'purport',m:'n. ① 요지, 취지 ② 목적 / vt. ① 칭하다, 주장하다 ② 의도하다, 꾀하다',s:'meaning, allege, claim, aim, propose, purpose',r:'pur (forth) + port (carry, 나르다) → 앞으로 내세워 운반하는 주장 → 요지·목적·칭하다로 고착 > 서류 앞에 굵은 글씨로 목적을 명시하는 장면이 원형'},
{n:1894,w:'overrate',m:'vt. 과대평가하다',s:'exaggerate, overestimate, overvalue',r:'over (지나치게) + rate (평가하다) → 지나치게 높이 평가하다 → 과대평가하다로 고착 > 평범한 영화에 별 다섯 개를 주는 장면이 원형'},
{n:1895,w:'husbandry',m:'n. ① 농업, 경작; 축산 ② 검약, 절약',s:'agriculture, cultivation, farming, stockbreeding, economy, frugality, thrift',r:'husband (관리자, 농부) + -ry (기술) → 자원을 아껴 관리하는 기술 → 농업·축산·검약으로 고착 > 씨앗을 아끼며 밭을 정성껏 가꾸는 장면이 원형'},
{n:1896,w:'forfeit',m:'vt. 잃다, 상실하다, 몰수당하다 / n. 벌금; 몰수품; 상실',s:'be_deprived_of, lose, fine, mulct',r:'for (away) + fait (done, 행해진) → 이미 행해진 것을 박탈당하다 → 몰수당하다·벌금·상실로 고착 > 규칙 위반으로 메달을 반납하는 장면이 원형'},
{n:1897,w:'derelict',m:'a. ① 버려진, 유기된 ② 직무에 태만한 / n. ① 낙오자, 부랑자 ② 직무 태만자',s:'abandoned, deserted, forsaken, delinquent, neglectful, negligent, remiss, dropout, hobo, stragger, vagrant',r:'de (completely) + relict (left behind, 버려진) → 완전히 버려진 → 유기된·직무 태만한·낙오자로 고착 > 폐허가 된 버려진 건물의 장면이 원형'},
{n:1898,w:'symbiosis',m:'n. 공생(共生); 상호의존관계',s:'cohabitation, interdependence, mutualism',r:'그리스어 sym (together, 함께) + bio (life, 생명) + -sis (명사형) → 함께 살아가는 상태 → 공생·상호의존관계로 고착 > 말미잘과 흰동가리가 함께 사는 장면이 원형'},
{n:1899,w:'precipitate',m:'v. ① 촉진시키다, 몰아가다 ② 거꾸로 떨어뜨리다 ③ 치닫게 하다 / a. ① 다급한, 경솔한 ② 느닷없는',s:'hasty, rash, abrupt, sudden',r:'pre (before) + cipit (head, 머리) + -ate (동사형) → 머리부터 앞으로 던지다 → 촉진시키다·경솔한으로 고착 > 생각 없이 절벽 앞으로 달려드는 장면이 원형'},
{n:1900,w:'migraine',m:'n. 편두통',s:'hemicrania, megrim',r:'그리스어 hemi (half, 절반) + kranion (skull, 두개골) → 머리 절반만 아픈 것 → 편두통으로 고착 > 머리 한쪽을 움켜쥐고 고통스러워하는 장면이 원형'},
{n:1901,w:'erudite',m:'a. 박식한, 학식 있는',s:'knowledgeable, learned, scholarly',r:'e (out) + rud (rude/rough, 거칢) + -ite (형용사형) → 거침을 벗겨낸 세련된 지식인 → 박식한·학식 있는으로 고착 > 두꺼운 책을 쌓아두고 연구에 몰두하는 학자의 장면이 원형'},
{n:1902,w:'dissolve',m:'v. ① 녹이다, 용해시키다 ② 분해시키다 ③ 해산시키다 ④ 해소하다',s:'liquefy, melt, thaw, decompose, disintegrate, disband, disperse',r:'dis (apart) + solv (loosen, 풀다) → 완전히 풀어 흩어지게 하다 → 녹이다·해산시키다·해소하다로 고착 > 설탕 덩어리가 물속에서 녹아 사라지는 장면이 원형'},
{n:1903,w:'ratio',m:'n. 비율, 비(比)',s:'proportion, rate',r:'라틴어 ratio (reckoning, 계산) → 두 수를 비교 계산하는 것 → 비율·비로 고착 > 저울 양쪽 무게를 눈금으로 비교하는 장면이 원형'},
{n:1904,w:'succulent',m:'a. ① 즙이 많은 ② 다육의, 다육성의 / n. 다즙 식물',s:'juicy, pulpy, succose',r:'라틴어 sucus (juice, 즙) + -ulent (가득한) → 즙이 가득 찬 → 즙이 많은·다육의로 고착 > 선인장을 잘라 즙이 흘러나오는 장면이 원형'},
{n:1905,w:'appeal',m:'v. ① 호소하다, 간청하다[to] ② 상소[항소]하다 ③ 관심[흥미]을 끌다 / n. ① 호소 ② 상소 ③ 매력',s:'beg, entreat, implore, plead, attract, charm, enchant, fascinate',r:'ap (to) + peal (drive, 몰다) → ~를 향해 강하게 호소하다 → 호소하다·상소하다·매력으로 고착 > 판사를 향해 두 손을 모아 간청하는 장면이 원형'},
{n:1906,w:'connivance',m:'n. ① 못 본 체하기, 묵인, 방조 ② 공모(共謀)',s:'tacit approval, collusion, conspiracy, intrigue, plot',r:'con (together) + niv (wink, 눈을 감다) + -ance (명사형) → 함께 눈을 감아주는 것 → 묵인·방조·공모로 고착 > 잘못을 보고도 모른 척 눈을 감는 장면이 원형'},
{n:1907,w:'phlegmatic',m:'a. ① 점액질의 ② 냉담한, 냉정한, 침착한',s:'apathetic, cold, unemotional',r:'그리스어 phlegma (점액, 냉담한 체액) + -tic (형용사형) → 점액질 기질의 냉담한 성격 → 냉담한·침착한으로 고착 > 소동 중에도 표정 하나 변하지 않는 사람의 장면이 원형'},
{n:1908,w:'herald',m:'vt. ① 알리다, 포고하다 ② 안내[선도]하다 / n. ① 선구자 ② 전달자, 전령',s:'announce, declare, usher in, messenger',r:'고대 게르만어 heri (army) + wald (rule) → 군대 앞에서 소식을 선포하는 자 → 알리다·선구자·전령으로 고착 > 나팔을 불며 왕의 칙령을 선포하는 전령의 장면이 원형'},
{n:1909,w:'balmy',m:'a. ① 온화한, 아늑한 ② 향기로운, 방향성(芳香性)의',s:'mild, temperate, aromatic, fragrant, redolent',r:'balm (향유, 치유제) + -y (형용사형) → 향유처럼 부드럽고 향기로운 → 온화한·향기로운으로 고착 > 봄바람이 살며시 볼을 어루만지는 장면이 원형'},
{n:1910,w:'revolt',m:'n. ① 반란, 폭동 ② 혐오감, 반감 / v. ① 반란을 일으키다 ② 비위에 거스르다',s:'insurrection, mutiny, rebellion, uprising, dislike, distaste, repulsion, revulsion, rebel, resist',r:'re (back, 되돌아) + volt (turn, 돌다) → 등을 돌려 반전하다 → 반란·혐오감·비위에 거스르다로 고착 > 억압에 맞서 민중이 등을 돌려 들고 일어나는 장면이 원형'},
{n:1911,w:'inure',m:'v. (어려움 등에) 익숙하게 하다, 단련하다[to]',s:'accustom, habituate',r:'in (into) + ure (use, 사용) → 반복 사용으로 익숙해지다 → 익숙하게 하다·단련하다로 고착 > 매일 찬물로 샤워해 추위에 단련되는 장면이 원형'},
{n:1912,w:'copyright',m:'n. 저작권, 판권 / vt. ~의 판권을 얻다',s:'',r:'copy (복사) + right (권리) → 복사할 권리 → 저작권·판권으로 고착 > 책 앞면에 ©표시와 저자명이 적힌 장면이 원형'},
{n:1913,w:'presentiment',m:'n. 예감, 육감',s:'foreboding, presage',r:'pre (before) + sent (feel, 느끼다) + -ment (명사형) → 미리 느끼는 것 → 예감·육감으로 고착 > 무언가 잘못될 것 같은 불길한 느낌의 장면이 원형'},
{n:1914,w:'fluorescent',m:'a. ① 형광을 발하는, 형광성의 ② 아주 밝은, 선명한',s:'beaming, glowing, luminous',r:'fluor (flow, 흐르다) + -escent (빛나기 시작하는) → 빛이 흘러나오듯 발광하는 → 형광을 발하는·아주 밝은으로 고착 > 어두운 방에서 형광등이 환하게 켜지는 장면이 원형'},
{n:1915,w:'abrasive',m:'n. 연마제 / a. ① 연마제의 ② 신경에 거슬리는',s:'abradant, grating, jarring, nerve-racking, offensive',r:'ab (away) + ras (scrape, 긁다) + -ive (형용사형) → 문질러 벗겨내는 성질 → 연마제·신경에 거슬리는으로 고착 > 사포로 나무 표면을 거칠게 문지르는 장면이 원형'},
{n:1916,w:'lionize',m:'v. 치켜세우다, 떠받들다, 명사 취급하다',s:'celebrate, eulogize, exalt, glorify, idolize',r:'lion (사자) + -ize (동사형) → 사자처럼 대단히 대우하다 → 치켜세우다·명사 취급하다로 고착 > 유명인에게 사람들이 몰려드는 장면이 원형'},
{n:1917,w:'testament',m:'n. ① 유언, 유서 ② 계약, 성약 ③ 입증, 증거',s:'will',r:'e (out) + licit (entice, 유인하다) → 밖으로 유인해 끄집어내다 → 반응·정보를 끌어내다로 고착 > 심문관이 교묘한 질문으로 자백을 이끌어내는 장면이 원형'},
{n:1918,w:'off-the-cuff',m:'a. ad. 즉석의[에서], 준비 없는[없이]',s:'extemporaneous, impromptu',r:'ex (out/up) + alt (high, 높은) → 위로 높이 올리다 → 높이다·찬양하다로 고착 > 왕이 신하를 높은 지위로 올리는 장면이 원형'},
{n:1919,w:'moor',m:'n. 황무지, 황야 / v. 정박시키다, 매어두다',s:'heath, wasteland, wilderness, wildland, anchor, berth, dock, secure',r:'per (through, 내내) + enni (year, 해) + -al (형용사형) → 해를 내내 관통하는 → 일 년 내내의·영구적인·다년생의로 고착 > 매년 봄 같은 자리에 피어나는 꽃의 장면이 원형'},
{n:1920,w:'fiendish',m:'a. ① 악마 같은; 극악무도한 ② 아주 험악한',s:'devilish, diabolical, wicked',r:'salubr (health, 건강) + -ious (형용사형) → 건강을 주는 성질 → 쾌적한·건강에 좋은으로 고착 > 맑은 공기와 푸른 자연 속 쾌적한 마을의 장면이 원형'},
{n:1921,w:'describe',m:'vt. ① 묘사하다, 설명하다 ② 말하다, 평하다 ③ 그리다',s:'',r:'se (apart) + greg (flock, 무리) + -ate (동사형) → 무리에서 따로 나누다 → 분리하다·차별 대우하다로 고착 > 다른 색 구슬을 따로 골라내는 장면이 원형'},
{n:1922,w:'garbage',m:'n. 쓰레기, 음식 찌꺼기, 잔반; 폐기물',s:'junk, rubbish, trash',r:'고대 영어 wanian (decrease, 줄다) → 달이 이지러지듯 차츰 줄어드는 것 → 이지러지다·쇠퇴하다로 고착 > 보름달이 조금씩 이지러지는 장면이 원형'},
{n:1923,w:'scorch',m:'v. ① 그을리다, 눋게 하다 ② 시들게 하다 ③ 호되게 헐뜯다',s:'burn, char, sear, parch, shrivel, wither, berate, revile',r:'de (away) + cept (take, 잡다) + -ive (형용사형) → 진실에서 멀리 잡아채는 → 속이는·기만적인으로 고착 > 껍데기만 그럴듯한 가짜 상자의 장면이 원형'},
{n:1924,w:'emolument',m:'n. 급료, 봉급, 수당; 보수',s:'compensation, payment, returns, salary, profit',r:'con (completely) + don (give, 주다) → 완전히 용서를 주다 → 용서하다·묵인하다로 고착 > 잘못을 보고도 그냥 넘어가는 장면이 원형'},
{n:1925,w:'jocular',m:'a. 익살맞은, 유머러스한, 웃기는',s:'facetious, humorous, joking',r:'라틴어 trepidare (tremble, 떨다) + -tion (명사형) → 두려움에 몸이 떨리는 상태 → 전율·공포로 고착 > 어두운 방 문 앞에서 손이 부들부들 떨리는 장면이 원형'},
{n:1926,w:'confabulate',m:'vi. ① 담소하다, 잡담하다 ② 꾸민 이야기를 하다',s:'chat, chitchat, small-talk',r:'a (on) + foot (발) → 발로 걸어가고 있는 → 진행 중인·도보로로 고착 > 계획이 이미 발걸음을 떼기 시작한 장면이 원형'},
{n:1927,w:'vestige',m:'n. ① 자취, 흔적 ② 아주 조금',s:'sign, trace',r:'re (back) + buke (beat, 치다) → 되받아 치다 → 꾸짖다·견책하다로 고착 > 상사가 실수한 직원을 단호하게 나무라는 장면이 원형'},
{n:1928,w:'noncommittal',m:'a. 언질을 주지 않는; 애매한',s:'ambiguous, equivocal, vague',r:'프랑스어 fournir (furnish, 제공하다) → 얇은 고급 나무판을 겉에 덧대다 → 베니어판·표면적 허식으로 고착 > 싸구려 합판 위에 고급 나무를 얇게 붙이는 장면이 원형'},
{n:1929,w:'dissent',m:'n. 불찬성, 의견 차이, 이의 / vi. 의견을 달리하다, 이의를 말하다',s:'disagreement, objection, protest, demur, disagree',r:'그리스 신화 Tantalus (물과 과일이 닿으면 피하는 형벌을 받은 신) → 눈앞에 보이지만 절대 닿을 수 없게 하다 → 애태우다·감질나게 하다로 고착 > 손에 잡힐 듯한 사탕을 계속 피하게 하는 장면이 원형'},
{n:1930,w:'excruciate',m:'vt. 몹시 고통을 주다, 고문하다; 괴롭히다',s:'agonize, torment, torture, afflict',r:'라틴어 puer (boy, 소년) + -ile (형용사형) → 소년 같은 성질 → 유치한·어린애 같은으로 고착 > 어른이 어린애처럼 떼를 쓰는 장면이 원형'},
{n:1931,w:'indebted',m:'a. ① 신세를 진; 고마워하는 ② 빚이 있는, 부채가 있는',s:'',r:'com (together) + mensur (measure, 측정하다) + -ate (형용사형) → 함께 같은 척도로 측정되는 → 균형 잡힌·비례하는으로 고착 > 저울 양쪽이 딱 균형을 이루는 장면이 원형'},
{n:1932,w:'clamp',m:'n. ① 죔쇠 ② 집게 / vt. ① 고정시키다 ② 강제로 시키다',s:'clasp, fastener, vise, clampers, nippers, tongs, brace, fasten, fix, coerce, compel, force',r:'그리스어 labyrinthos (미궁, 크레타 미노타우로스의 궁전) → 한번 들어가면 빠져나올 수 없는 복잡한 구조 → 미로·복잡한 문제로 고착 > 어느 방향을 가도 막히는 미로 속의 장면이 원형'},
{n:1933,w:'sidereal',m:'a. 별의, 항성(恒星)의, 별자리의',s:'astral, stellar',r:'고대 프랑스어 barater (exchange, 교환하다) → 돈 없이 물건끼리 주고받다 → 물물교환하다로 고착 > 사냥꾼이 고기와 농부의 곡식을 교환하는 장면이 원형'},
{n:1934,w:'folly',m:'n. 어리석음; 어리석은 행동[생각]',s:'absurdity, silliness, stupidity',r:'ad (to) + ulter (beyond, 넘어서) + -ate (동사형) → 원래 범위를 넘어 이물질을 섞다 → 불순물을 섞다·불순하게 하다로 고착 > 우유에 물을 몰래 타는 장면이 원형'},
{n:1935,w:'roundabout',m:'a. 에두르는, 완곡한, 간접적인 / n. 원형 교차로, 로터리',s:'circuitous, indirect, tortuous, rotary, traffic circle',r:'라틴어 omen (조짐) + -ous (형용사형) → 나쁜 조짐의 성질 → 불길한·나쁜 징조의로 고착 > 먹구름이 몰려오며 하늘이 어두워지는 장면이 원형'},
{n:1936,w:'conclave',m:'n. ① 교황 선거 비밀회의(장소); 추기경단 ② 비밀회의',s:'',r:'in (into) + cipi (take, 잡다) + -ent (형용사형) → 막 잡히기 시작하는 → 초기의·시초의로 고착 > 씨앗이 막 흙을 뚫고 싹을 틔우는 장면이 원형'},
{n:1937,w:'whirl',m:'v. ① 빙빙 돌다, 회전하다 ② 혼란스럽다 / n. ① 회전, 선회 ② 혼란',s:'gyrate, revolve, rotate, spin, swirl, reel, gyration, revolution, rotation, twirl, confusion, daze, dither, giddiness',r:'im (in) + plic (fold, 접다) + -ation (명사형) → 안에 접혀 들어간 것 → 함축·내포·연루로 고착 > 편지 안에 숨겨진 의미가 접혀 있는 장면이 원형'},
{n:1938,w:'bluff',m:'n. ① 허세, 엄포 ② 절벽 / v. 허세를 부리다 / a. 절벽의; 무뚝뚝한',s:'bluster, bravado, fanfaronade, lifemanship, pretension, cliff, escarpment, precipice, promontory, flat-hat, four-flush, swashbuckle, vapor, blunt, brusque',r:'re (back) + coup (strike, 치다) → 잃은 것을 되찾아 치다 → 되찾다·벌충하다로 고착 > 도박에서 잃은 돈을 다시 따는 장면이 원형'},
{n:1939,w:'oculist',m:'n. 안과 의사',s:'ophthalmologist',r:'mal (bad, 나쁜) + ign (born, 태어난) → 나쁜 기질로 태어난 → 악의 있는·해로운·헐뜯다로 고착 > 뒤에서 손가락질하며 중상하는 장면이 원형'},
{n:1940,w:'multitude',m:'n. ① 아주 많은 수, 다수 ② 일반 대중, 군중',s:'army, great number, horde, host, legion, assembled, crowd, mass, mob, throng',r:'per (through) + petu (seek, 추구하다) + -ate (동사형) → 끝없이 추구하며 지속시키다 → 영속시키다·영구 보존하다로 고착 > 불꽃이 꺼지지 않도록 계속 기름을 붓는 장면이 원형'},
{n:1941,w:'authoritarian',m:'a. 권위주의적인, 독재적인 / n. 권위[독재]주의자',s:'autocratic, dictatorial, autocrat, dictator',r:'고대 영어 pliht (danger, 위험) → 위험한 처지에 몰린 상태 → 곤경·역경·어려운 처지로 고착 > 사방이 막혀 꼼짝달싹 못하는 장면이 원형'},
{n:1942,w:'enliven',m:'vt. ① 활기 띠게 하다, 생기가 넘치게 하다 ② 유쾌하게 하다',s:'inspirit, stimulate, vivify, cheer, sweeten',r:'라틴어 placere (please, 기쁘게 하다) + -id (형용사형) → 마음을 기쁘게 할 만큼 잔잔한 → 차분한·평온한으로 고착 > 바람 한 점 없이 거울처럼 잔잔한 호수의 장면이 원형'},
{n:1943,w:'linear',m:'a. 선형의, 직선 모양의, 1차원의',s:'',r:'그리스어 para (beside, 옆에) + bol (throw, 던지다) → 진리 옆에 비교로 던져놓은 이야기 → 우화·비유담으로 고착 > 씨 뿌리는 농부를 통해 가르침을 전하는 장면이 원형'},
{n:1944,w:'turnout',m:'n. ① 집합, 참석 수 ② 투표율 ③ 생산액, 산출고',s:'assembly, attendance, output, production, yield',r:'중세 영어 poken (thrust, 찌르다) → 손가락이나 막대로 쿡 찌르는 행위 → 찌르다·밀다·참견하다로 고착 > 손가락으로 꾹 눌러 확인하는 장면이 원형'},
{n:1945,w:'inseparable',m:'a. 분리할 수 없는; 불가분의',s:'indivisible, inseverable',r:'프랑스어 gaffe (boat hook, 갈고리) → 갈고리로 잘못 걸어 실수하는 이미지 → 실수·실언으로 고착 > 공식 석상에서 실언이 터져 나오는 장면이 원형'},
{n:1946,w:'derivative',m:'a. 파생적인 / n. 파생물; 금융 파생 상품',s:'secondary, spin-off, unoriginal',r:'per (through, 완전히) + jur (oath, 맹세) + -y (명사형) → 맹세를 완전히 어기다 → 위증죄·위증으로 고착 > 법정에서 손을 들고 거짓 증언을 하는 장면이 원형'},
{n:1947,w:'protract',m:'vt. 오래 끌게 하다, 연장하다',s:'extend, prolong',r:'solv (loosen, 풀다) + -ent (형용사형) → 다 풀어낼 능력을 가진 → 지불 능력 있는·용해력 있는·용매로 고착 > 묵은 때를 말끔히 녹여내는 세척제의 장면이 원형'},
{n:1948,w:'buxom',m:'a. 포동포동한, 가슴이 풍만한; 쾌활하고 건강한',s:'busty, plump, healthy, cheerful',r:'라틴어 usurpare (seize for use, 사용하기 위해 빼앗다) → 권력을 강제로 빼앗아 쓰다 → 강탈하다·찬탈하다로 고착 > 왕좌를 힘으로 빼앗는 반란자의 장면이 원형'},
{n:1949,w:'stake',m:'n. ① 상금, 내기에 건 돈 ② 이해관계 ③ 말뚝, 막대기',s:'bet, wager, interests, involvement, pole, stick',r:'dis (apart) + sect (cut, 자르다) → 낱낱이 잘라 나누다 → 해부하다·분석하다로 고착 > 개구리를 조각조각 나눠 관찰하는 장면이 원형'},
{n:1950,w:'cumbersome',m:'a. 성가신, 부담이 되는, 방해가 되는, 다루기 힘든',s:'budensome, unwieldy',r:'be (completely) + queath (고대 영어 cwethan, say, 말하다) → 유언으로 완전히 넘겨주다 → 유증하다·후세에 남기다로 고착 > 노인이 유언장에 재산을 자녀에게 넘기는 장면이 원형'},
{n:1951,w:'assiduous',m:'a. 근면 성실한, 지칠 줄 모르는',s:'diligent, hard-working, industrious, sedulous',r:'in (in) + nat (born, 태어난) + -e → 태어나면서부터 안에 있는 → 타고난·선천적인으로 고착 > 갓난아기가 이미 젖 빠는 법을 아는 장면이 원형'},
{n:1952,w:'presume',m:'v. ① 가정[추정]하다 ② 추정하다 ③ 감히 ~하다',s:'guess, suppose, think, dare',r:'고대 노르드어 baðask (bathe oneself, 목욕하다) → 햇볕을 온몸으로 받아들이다 → 햇볕을 쬐다·즐기다로 고착 > 도마뱀이 바위 위에서 햇볕을 만끽하는 장면이 원형'},
{n:1953,w:'behalf',m:'n. ① 측(側), 편 ② 이익, 이로움',s:'side, benefit, interest, sake',r:'라틴어 tacitus (silent, 침묵의) + -urn (형용사형) → 침묵을 지니는 성질 → 말이 없는·과묵한으로 고착 > 질문을 받아도 묵묵히 앉아있는 사람의 장면이 원형'},
{n:1954,w:'imbroglio',m:'n. ① 복잡한 사태, 난국 ② 복잡한 줄거리',s:'complication, entanglement, quandary',r:'중세 영어 moteren (murmur, 중얼거리다) → 입을 반쯤 닫고 낮게 말하다 → 중얼거리다·불평하다로 고착 > 입 속으로 불만을 중얼중얼 내뱉는 장면이 원형'},
{n:1955,w:'credulous',m:'a. 쉽사리 믿는, 잘 속는',s:'gullible, naive',r:'pre (before) + post (after, 뒤) + -erous → 앞뒤가 뒤바뀐 → 터무니없는·불합리한으로 고착 > 신발을 머리에 쓰고 모자를 발에 신은 장면이 원형'},
{n:1956,w:'eschew',m:'vt. 피하다, 삼가다',s:'avoid, forbear, refrain, shun',r:'그리스어 sykon (fig, 무화과) + phant (show, 보이다) → 무화과를 보여주는 자(밀고자) → 아첨꾼·알랑쇠로 고착 > 권력자 주위를 맴돌며 칭찬만 늘어놓는 장면이 원형'},
{n:1957,w:'spouse',m:'n. 배우자',s:'mate, partner, significant other',r:'in (not) + firm (strong, 강한) + -ity (명사형) → 강하지 않은 상태 → 허약함·심신의 결함으로 고착 > 지팡이를 짚고 힘없이 걷는 장면이 원형'},
{n:1958,w:'dissonant',m:'a. 귀에 거슬리는, 불협화음의, 조화되지 않은',s:'cacophonous, discordant, strident',r:'equi (equal, 같은) + voc (voice, 목소리) + -ate (동사형) → 같은 말을 양쪽 방향으로 쓰다 → 모호한 말로 얼버무리다로 고착 > 이쪽도 저쪽도 될 수 있는 애매한 답변을 하는 장면이 원형'},
{n:1959,w:'augment',m:'v. 늘리다, 늘다, 증가시키다',s:'increase',r:'라틴어 callus (hard skin, 굳은살) + -ous (형용사형) → 굳은살처럼 감각이 없어진 → 굳은살이 박힌·무정한으로 고착 > 반복된 고통으로 감각이 마비된 손바닥의 장면이 원형'},
{n:1960,w:'curriculum',m:'n. 커리큘럼, 교과 과정; 이수 과정; 전반적 학교 교육',s:'',r:'라틴어 culmen (top, 꼭대기) + -ate (동사형) → 꼭대기에 이르다 → 최고조에 이르다로 고착 > 오랜 노력 끝에 정상에 도달하는 장면이 원형'},
{n:1961,w:'virulent',m:'a. ① (질병·독극물이) 악성의, 치명적인, 맹독의 ② 악의가 있는; 매서운, 신랄한',s:'deadly, lethal, pernicious, spiteful, bitter',r:'nomin (name, 이름) + -al (형용사형) → 이름뿐인 성질 → 명목상의·아주 적은으로 고착 > 사장 명함을 들고 있지만 실권은 없는 사람의 장면이 원형'},
{n:1962,w:'skid',m:'v. (자동차 가) 미끄러지다; 옆으로 미끄러지다 / n. (자동차 가) 옆으로 미끄러지기; 활주부',s:'glide, slide, slip, slither',r:'ob (completely) + liter (letter, 글자) + -ate (동사형) → 글자를 완전히 지우다 → 지우다·말소하다·소멸시키다로 고착 > 칠판의 글씨를 지우개로 완전히 닦아내는 장면이 원형'},
{n:1963,w:'benediction',m:'n. ① 축복 ② 감사의 기도, (예배 후의) 축복 기도',s:'blessing',r:'그리스어 tauto (same, 같은) + log (word, 말) + -y → 같은 말을 되풀이하는 것 → 동어 반복으로 고착 > 같은 뜻을 다른 말로 두 번 말하는 장면이 원형'},
{n:1964,w:'maroon',m:'v. (섬 같은 곳에) 고립시키다, 가두다 / n. 고홍색, 적갈색, 밤색',s:'abandon, isolate, strand',r:'in (into) + cand (glow, 빛나다) + -escent (되어가는) → 안에서부터 백열하며 빛나는 → 백열하는·밝게 빛나는·격렬한으로 고착 > 전구 필라멘트가 달아올라 환하게 빛나는 장면이 원형'},
{n:1965,w:'proximity',m:'n. (거리·시간상으로) 가까움, 근접',s:'contiguity, nearness',r:'Pandare (트로이 전쟁 시 나쁜 욕망을 충족시켜준 인물) → 상대의 저급한 욕구에 맞춰주다 → 나쁜 욕구에 영합하다로 고착 > 시청률을 위해 자극적 내용을 쏟아내는 장면이 원형'},
{n:1966,w:'cleave',m:'v. ① 쪼개다, 가르다 ② 착 달라붙다; (주의 등을) 고수하다[to]',s:'divide, split, adhere, cling, stick',r:'고대 영어 cringan (fall, 쓰러지다) → 두려움에 몸을 움츠려 작게 만들다 → 움츠러들다·굽실거리다로 고착 > 꾸중을 들으며 어깨를 잔뜩 움츠리는 장면이 원형'},
{n:1967,w:'acronym',m:'n. 두문자어(頭文字語), 머리글자어',s:'',r:'라틴어 fingere (shape, 모양 만들다) → 없는 것을 만들어 꾸미다 → 꾸미다·가장하다·위장하다로 고착 > 아프지 않은데 아픈 척 침대에 누운 장면이 원형'},

let currentSet=[],idx=0,isFlipped=false;
function loadSet(setNum){
  setNum=parseInt(setNum);
  const s=(setNum-1)*20;
  currentSet=WORDS.slice(s,s+20);
  idx=0;isFlipped=false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('setInfo').textContent='세트 '+setNum+' — '+currentSet[0].n+'번~'+currentSet[currentSet.length-1].n+'번';
  render();
}
function shuffle(){currentSet=currentSet.sort(()=>Math.random()-.5);idx=0;isFlipped=false;document.getElementById('card').classList.remove('flipped');render();}
function resetSet(){loadSet(document.getElementById('setSelect').value);}
function render(){
  const w=currentSet[idx];
  document.getElementById('num').textContent='#'+w.n;
  document.getElementById('num2').textContent='#'+w.n;
  document.getElementById('word').textContent=w.w;
  document.getElementById('meaning').textContent=w.m||'(뜻 없음)';
  const synEl=document.getElementById('syn');
  const rootEl=document.getElementById('root');
  if(w.s){synEl.textContent=w.s;synEl.style.display='block';}else{synEl.style.display='none';}
  if(w.r){rootEl.textContent=w.r;rootEl.style.display='block';}else{rootEl.style.display='none';}
  document.getElementById('cnt').textContent=(idx+1)+' / '+currentSet.length;
  document.getElementById('progress').textContent='진행: '+(idx+1)+'/'+currentSet.length+' ('+Math.round((idx+1)/currentSet.length*100)+'%)';
  isFlipped=false;document.getElementById('card').classList.remove('flipped');
}
function flipCard(){isFlipped=!isFlipped;document.getElementById('card').classList.toggle('flipped');}
function next(){if(idx<currentSet.length-1){idx++;render();}}
function prev(){if(idx>0){idx--;render();}}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight')next();
  else if(e.key==='ArrowLeft')prev();
  else if(e.key===' '){e.preventDefault();flipCard();}
});
loadSet(1);
</script>
