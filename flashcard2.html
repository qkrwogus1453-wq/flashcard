<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{color:#e94560;margin-bottom:8px;font-size:1.4em}
.subtitle{color:#aaa;font-size:.85em;margin-bottom:20px}
.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
select,button{padding:8px 14px;border-radius:8px;border:none;font-size:.9em;cursor:pointer}
select{background:#16213e;color:#eee;border:1px solid #e94560}
button{background:#e94560;color:#fff;font-weight:bold}
button:hover{background:#c73652}
.progress{color:#aaa;font-size:.85em;margin-bottom:14px}
.card-wrap{perspective:1000px;width:340px;height:240px;margin-bottom:24px;cursor:pointer}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s}
.card.flipped{transform:rotateY(180deg)}
.front,.back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;text-align:center}
.front{background:linear-gradient(135deg,#16213e,#0f3460);border:2px solid #e94560}
.back{background:linear-gradient(135deg,#0f3460,#16213e);border:2px solid #4ecca3;transform:rotateY(180deg);justify-content:flex-start;padding-top:16px;overflow-y:auto}
.num{position:absolute;top:10px;left:14px;color:#e94560;font-size:.8em;font-weight:bold}
.word{font-size:1.8em;font-weight:bold;color:#fff;margin-bottom:6px}
.hint{font-size:.8em;color:#888}
.meaning{font-size:.88em;color:#eee;line-height:1.5;margin-bottom:8px;text-align:left;width:100%}
.syn{font-size:.75em;color:#4ecca3;margin-bottom:6px;text-align:left;width:100%;line-height:1.4}
.syn::before{content:'동의어: ';font-weight:bold}
.root{font-size:.72em;color:#f0a500;line-height:1.4;text-align:left;width:100%}
.root::before{content:'어원: ';font-weight:bold}
.nav{display:flex;gap:14px;align-items:center}
.nav button{padding:10px 22px;font-size:1em}
.nav .cnt{color:#aaa;font-size:.9em;min-width:80px;text-align:center}
.set-info{color:#4ecca3;font-size:.85em;margin-bottom:6px}
</style>

<script>
const WORDS=[
{n:1001,w:'robust',m:'a. 튼튼한, 원기 왕성한, 팔팔한',s:'vigorous, energetic, hearty, sturdy',r:'robur(oak/참나무) → 참나무처럼 튼튼한 → 튼튼한, 원기 왕성한'},
{n:1002,w:'paralysis',m:'n. 마비, 불수(不隨); 중풍; (교통·거래 등의) 마비 상태, 정체',s:'paralysis, numbness, immobility, inability',r:'para(beside) + lys(loosen/풀리다) → 신경이 풀려 기능을 잃은 → 마비, 중풍'},
{n:1003,w:'stately',m:'a. 당당한, 위엄 있는, 장중한',s:'imposing, majestic, dignified, grand',r:'state(stand/위엄 있는 상태) + -ly → 위엄 있게 → 당당한, 위엄 있는'},
{n:1004,w:'confiscate',m:'vt. 몰수[압수]하다, 징발하다',s:'seize, confiscate, expropriate, impound',r:'con + fisc(treasury/국고) + -ate → 국고로 모으다 → 몰수하다, 압수하다'},
{n:1005,w:'duress',m:'n. 구속, 속박, 감금; 협박',s:'coercion, compulsion, threat, intimidation',r:'dur(hard/단단한) + -ess → 압박으로 자유를 제한하는 것 → 구속, 협박'},
{n:1006,w:'intimidate',m:'vt. 위협하다, 협박하다',s:'frighten, threaten, bully, terrify',r:'in + timid(fearful/겁많은) + -ate → 겁쟁이로 만들다 → 위협하다, 협박하다'},
{n:1007,w:'stratum',m:'n. (암석 등의) 층, 지층, 단층; (사회) 계층',s:'layer, tier, level, stratum',r:'strat(spread/펼치다) + -um → 펼쳐 쌓인 층 → 지층, 사회 계층'},
{n:1008,w:'arduous',m:'a. 몹시 힘든, 고된',s:'difficult, challenging, strenuous, grueling',r:'ardu(steep/가파른) + -ous → 가파른 것처럼 힘든 → 몹시 힘든, 고된'},
{n:1009,w:'exhort',m:'v. 열심히 권하다, 훈계하다',s:'urge, advise, encourage, counsel',r:'ex(out) + hort(encourage/격려하다) → 밖으로 격려하다 → 열심히 권하다, 훈계하다'},
{n:1010,w:'practically',m:'ad. 실제적으로, 실용적으로, 실제로; 사실상, 거의 ~나 다름없이',s:'essentially, effectively, nearly, almost',r:'practic(practical/실제의) + -ally → 실제로 → 사실상, 거의 ~나 다름없이'},
{n:1011,w:'submerge',m:'v. 물속에 가라앉히다[잠그다]; 물속에 잠기다',s:'sink, immerse, plunge, dip',r:'sub(under) + merg(dip/담그다) → 아래로 담그다 → 가라앉히다, 잠기다'},
{n:1012,w:'cortege',m:'n. (집합적) 시종들, 수행원들; 행렬; (특히) 장례 행렬',s:'procession, parade, retinue, train',r:'[프랑스어] cortège(retinue/수행원들) → 뒤따르는 행렬 → 시종들, 장례 행렬'},
{n:1013,w:'synonym',m:'n. 동의어, 유의어',s:'equivalent term, alternate name',r:'syn(together) + onym(name/이름) → 같은 이름처럼 같은 의미 → 동의어'},
{n:1014,w:'prune',m:'v. (가지·뿌리 등을) 잘라내다, 쳐내다; (불필요한 부분을) 제거하다 / n. 말린 자두',s:'trim, cut back, clip, thin',r:'[라틴어] rotundus(round/둥근) → 둥근 가지를 잘라내다 → 잘라내다, 제거하다'},
{n:1015,w:'luxurious',m:'a. 사치스러운, 호사스러운; 사치에 빠진; 쾌락을 즐기는',s:'lavish, extravagant, opulent, sumptuous',r:'luxuri(excess/과잉) + -ous → 넘칠 만큼 풍요로운 → 사치스러운, 호사스러운'},
{n:1016,w:'traverse',m:'v. 가로지르다, 횡단하다',s:'cross, span, go across, navigate',r:'trans(across) + vers(turn/돌다) → 가로질러 가다 → 가로지르다, 횡단하다'},
{n:1017,w:'imply',m:'vt. 뜻하다, 의미하다; 암시하다, 넌지시 비치다',s:'suggest, hint, indicate, signify',r:'im(into) + pli(fold/접다) → 안으로 접어 담다 → 암시하다, 의미하다'},
{n:1018,w:'wordplay',m:'n. 재담, 재치 있는 말장난',s:'pun, play on words, wit, humor',r:'word(word/말) + play(play/놀이) → 말로 하는 놀이 → 재담, 말장난'},
{n:1019,w:'cutting-edge',m:'a. 최첨단의',s:'advanced, pioneering, innovative, state-of-the-art',r:'cut(cut/자르다) + edge(edge/날) → 가장 날카로운 끝 → 최첨단의'},
{n:1020,w:'brace',m:'v. 떠받치다, 강화하다; 대비하다, 마음의 준비를 하게 하다 / n. 버팀대, 지주(支柱)',s:'prepare, reinforce, steady, prop',r:'[고대 프랑스어] bracier(embrace/껴안다) → 버팀목으로 지지하다 → 떠받치다, 버팀대'},
{n:1021,w:'finite',m:'a. 한정[제한]되어 있는, 유한한',s:'limited, bounded, restricted, measurable',r:'fin(end/끝) + -ite → 끝이 정해진 → 한정된, 유한한'},
{n:1022,w:'carriage',m:'n. (기차의) 객차; 마차; 탈것, 차; 유모차; 운반[수송]; 운반비[수송비]; 몸가짐, 자세',s:'vehicle, wagon, coach, car',r:'carr(carry/나르다) + -age → 나르는 것 → 객차, 마차, 몸가짐'},
{n:1023,w:'itinerant',m:'a. 순회하는, 떠돌이다니는',s:'traveling, roving, mobile, wandering',r:'itiner(journey/여정) + -ant → 여정을 다니는 → 순회하는, 떠돌이'},
{n:1024,w:'delve',m:'v. 탐구하다, 철저히 조사하다; (정보를 찾으려고) 철저히 뒤지다',s:'research, examine, probe, explore',r:'[고대 영어] delfan(dig/파다) → 깊이 파내다 → 탐구하다, 철저히 조사하다'},
{n:1025,w:'chemistry',m:'n. 화학; 화학적 성질, 화학 반응[작용]; (남과의) 공감대, 마음이 통함, 공합이 잘 맞음',s:'chemical science, molecular study',r:'[그리스어] khemia(art of alloying metals) → 물질의 변환을 다루는 학문 → 화학'},
{n:1026,w:'vandalize',m:'vt. (예술·문화·공공기물을) 파괴하다, 파손하다',s:'destroy, wreck, damage, deface',r:'Vandals(로마를 파괴한 게르만 부족) + -ize → 반달족처럼 파괴하다 → 파손하다'},
{n:1027,w:'prolific',m:'a. (사람·동물이) 다산(多産)의; (식물이) 열매를 많이 맺는; (작가 따위가) 다작(多作)의; (상상력이) 풍부한; (땅이) 비옥한',s:'fertile, creative, abundant, inventive',r:'prol(offspring/자손) + fic(make/만들다) → 자손을 많이 만드는 → 다산의, 다작의'},
{n:1028,w:'crouch',m:'v. 쭈그리고 앉다, 웅크리다; (비굴하게) 허리를 낮추다, 굽실거리다 / n. 웅크리기, 웅크린 자세',s:'stoop, squat, bend, huddle',r:'[고대 프랑스어] crochier(bend/구부리다) → 몸을 구부려 웅크리다 → 웅크리다'},
{n:1029,w:'gifted',m:'a. 타고난[천부의] 재능이 있는; 유능한; 머리가 매우 좋은',s:'talented, skilled, able, endowed',r:'gift(gift/선물) + -ed → 재능을 선물받은 → 타고난 재능이 있는'},
{n:1030,w:'bystander',m:'n. 방관자, 구경꾼',s:'onlooker, observer, spectator, witness',r:'by(beside/곁에) + stand(stand/서다) + -er → 곁에 서서 보는 사람 → 방관자'},
{n:1031,w:'rescue',m:'vt. 구하다, 구조하다, 구출하다 / n. 구조, 구출, 구제',s:'save, free, liberate, recover',r:'[고대 프랑스어] rescourre(shake out/꺼내다) → 위험에서 꺼내다 → 구하다, 구조하다'},
{n:1032,w:'mendicant',m:'n. 거지, 동냥아치 / a. (수도사 등이) 구걸하는, 빌어먹는, 탁발하는',s:'pauper, homeless person, vagrant, tramp',r:'mendic(beg/구걸하다) + -ant → 구걸하는 → 거지, 탁발하는'},
{n:1033,w:'domain',m:'n. 영토, 영지; 판도; (개인의) 소유지; (지식·활동의) 영역, 분야, 범위',s:'territory, realm, region, field',r:'dom(house/집) + -ain → 소유하는 영역 → 영토, 분야'},
{n:1034,w:'formulate',m:'vt. 명확히[체계적으로] 나타내다[말하다]; 공식화[정식화]하다, 공식으로 나타내다',s:'systematize, codify, organize, structure',r:'form(form/형식) + -ulate → 형식으로 만들다 → 공식화하다, 명확히 나타내다'},
{n:1035,w:'awe',m:'n. 경외(敬畏), 두려움 / vt. 두려움[경외하는 마음]을 느끼게 하다',s:'wonder, reverence, admiration, respect',r:'[고대 노르드어] agi(fear/두려움) → 신 앞에 선 경외감 → 경외, 두려움'},
{n:1036,w:'trunk',m:'n. (나무의) 줄기; (사람·동물의) 몸통, 동체; (곤충의) 가슴부',s:'stump, shaft, body, barrel',r:'[라틴어] truncus(trunk/줄기) → 나무의 줄기 → 줄기, 몸통'},
{n:1037,w:'sluggard',m:'n. 게으름뱅이, 나태한 사람 / a. 게으른, 나태한, 귀찮아하는',s:'lazybones, idler, loafer, sluggard',r:'slug(slow/느린 것) + -ard(person/사람) → 느리고 게으른 사람 → 게으름뱅이'},
{n:1038,w:'orient',m:'v. 방위를 바르게 맞추다, 바른 방향[위치]에 놓다; (새로운 환경 등에) 적응시키다; (신입생 등에) 지도·강습을 하다 / n. 동양',s:'align, position, focus, aim',r:'oriens(rising/태양이 뜨는) → 태양이 뜨는 동쪽 → 동양, 방향을 맞추다'},
{n:1039,w:'backlash',m:'n. 반발, 반동',s:'reaction, recoil, opposition, resentment',r:'back(back/뒤로) + lash(whip/채찍) → 뒤로 튀는 반동 → 반발, 반동'},
{n:1040,w:'attend',m:'v. 출석하다, 참석하다; 시중들다, 간호하다; 주의하다, 경청하다',s:'join, be present at, look after, serve',r:'at + tend(stretch/뻗다) → ~를 향해 뻗어 참석하다 → 출석하다, 시중들다'},
{n:1041,w:'oral',m:'a. 구두(口頭)의, 구전(口傳)의, 구술의; 입의; (약 등이) 경구용의',s:'spoken, verbal, voiced, unwritten',r:'or(mouth/입) + -al → 입의 → 구두의, 경구용의'},

let currentSet=[],idx=0,isFlipped=false;
function loadSet(setNum){
  setNum=parseInt(setNum);
  const s=(setNum-1)*20;
  currentSet=WORDS.slice(s,s+20);
  idx=0;isFlipped=false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('setInfo').textContent='세트 '+setNum+' — '+currentSet[0].n+'번~'+currentSet[currentSet.length-1].n+'번';
  render();
}
function shuffle(){currentSet=currentSet.sort(()=>Math.random()-.5);idx=0;isFlipped=false;document.getElementById('card').classList.remove('flipped');render();}
function resetSet(){loadSet(document.getElementById('setSelect').value);}
function render(){
  const w=currentSet[idx];
  document.getElementById('num').textContent='#'+w.n;
  document.getElementById('num2').textContent='#'+w.n;
  document.getElementById('word').textContent=w.w;
  document.getElementById('meaning').textContent=w.m||'(뜻 없음)';
  const synEl=document.getElementById('syn');
  const rootEl=document.getElementById('root');
  if(w.s){synEl.textContent=w.s;synEl.style.display='block';}else{synEl.style.display='none';}
  if(w.r){rootEl.textContent=w.r;rootEl.style.display='block';}else{rootEl.style.display='none';}
  document.getElementById('cnt').textContent=(idx+1)+' / '+currentSet.length;
  document.getElementById('progress').textContent='진행: '+(idx+1)+'/'+currentSet.length+' ('+Math.round((idx+1)/currentSet.length*100)+'%)';
  isFlipped=false;document.getElementById('card').classList.remove('flipped');
}
function flipCard(){isFlipped=!isFlipped;document.getElementById('card').classList.toggle('flipped');}
function next(){if(idx<currentSet.length-1){idx++;render();}}
function prev(){if(idx>0){idx--;render();}}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight')next();
  else if(e.key==='ArrowLeft')prev();
  else if(e.key===' '){e.preventDefault();flipCard();}
});
loadSet(1);
</script>
