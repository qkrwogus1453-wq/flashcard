{n:1495,w:'envision',m:'vt. ① 마음속에 그리다, 상상하다 ② 고려하다',s:'envisage, imagine, visualize, consider, contemplate',r:'en (in) + vision (시야) → 마음의 시야 안에 그리다 → 상상하다·마음속에 그리다로 고착 > 눈을 감고 미래의 모습을 마음으로 그리는 장면이 원형'},
{n:1496,w:'punitive',m:'a. 형벌의, 징벌적인',s:'castigatory, disciplinary, punishing',r:'라틴어 punire (punish, 벌주다) → 벌을 주는 → 처벌의·징벌적인으로 고착 > 잘못에 대해 엄중한 처벌을 내리는 장면이 원형'},
{n:1497,w:'fault',m:'n. ① 과실, 잘못 ② 결점, 결함 ③ 단층',s:'defect, flaw, shortcoming, error, misdeed, mistake, failing',r:'라틴어 fallere (deceive, 속이다) → 속이듯 어긋난 것 → 결함·잘못·단층으로 고착 > 제품에서 발견된 결함의 장면이 원형'},
{n:1498,w:'rave',m:'v. ① 헛소리를 하다 ② 극찬하다 / n. ① 광란 ② 격찬, 극찬',s:'rant, roar, gush, rhapsodize, acclaim, applause, encomium',r:'고대 프랑스어 raver (dream, 꿈꾸다) → 열을 올려 극찬하다·광란하다 → 열광적으로 칭찬하다·광란으로 고착 > 최고라며 열광적으로 칭찬하는 장면이 원형'},
{n:1499,w:'composure',m:'n. 침착, 냉정, 평정',s:'aplomb, calmness, equanimity, sangfroid',r:'라틴어 com (together) + ponere (place, 놓다) → 함께 잘 놓인 상태 → 침착·평정으로 고착 > 혼란 속에서도 차분하게 대응하는 장면이 원형'},
{n:1500,w:'amalgamate',m:'v. ① 혼합[융합]시키다 ② 합병[합동]하다',s:'blend, compound, mingle, mix, merge',r:'아랍어 al-malgham (amalgam) → 여러 금속을 녹여 합치다 → 합병하다·혼합하다로 고착 > 두 회사가 합쳐 하나가 되는 장면이 원형'},
{n:1501,w:'harvest',m:'n. ① 수확, 추수 수확량 ② 보수, 결과 / v. 수확하다; 채집하다',s:'crop, picking, yield, product, result, collect, gather, pick, reap',r:'고대 영어 hærfest (autumn, 가을) → 가을에 곡식을 거두어들이다 → 수확·거두다로 고착 > 들판에서 황금빛 곡식을 베어 모으는 장면이 원형'},
{n:1502,w:'inscrutable',m:'a. 불가사의한, 수수께끼 같은, 헤아릴 수 없는',s:'enigmatic, incomprehensible, mysterious',r:'라틴어 in (not) + scrutari (examine, 조사하다) → 조사해도 알 수 없는 → 헤아리기 어려운·불가사의한으로 고착 > 표정을 읽을 수 없는 장면이 원형'},
{n:1503,w:'crescendo',m:'n. ① 크레센도, 점강음 ② 점점 커짐; 최고조',s:'climax, intensification',r:'이탈리아어 crescere (grow, 자라다) → 점점 자라나는 소리 → 크레셴도·점점 커지는으로 고착 > 음악이 점점 크고 강하게 고조되는 장면이 원형'},
{n:1504,w:'preeminent',m:'a. 우수한, 탁월한, 현저한',s:'conspicuous, distinguished, notable',r:'라틴어 prae (before) + eminere (stand out, 두드러지다) → 앞에서 두드러지는 → 탁월한·가장 뛰어난으로 고착 > 모든 분야에서 가장 앞서는 장면이 원형'},
{n:1505,w:'encourage',m:'vt. ① 용기를 돋우다, 격려하다 ② 장려하다, 촉진하다',s:'boost, inspire, invigorate, promote, spur',r:'en (make) + courage (용기) → 용기를 만들어 주다 → 격려하다·고무하다로 고착 > 패배한 선수에게 다시 일어서도록 응원하는 장면이 원형'},
{n:1506,w:'axiom',m:'n. ① 자명한 이치, 공리 ② 격언, 금언',s:'adage, aphorism, maxim, precept',r:'그리스어 axioma (self-evident principle, 자명한 원리) → 증명 없이 자명한 것 → 공리·자명한 사실로 고착 > 두 점 사이에는 직선이 하나뿐이라는 수학 공리의 장면이 원형'},
{n:1507,w:'prick',m:'v. ① 찌르다, 쑤시다 ② 아픔을 주다 / n. 찌름; 가책',s:'pierce, puncture, hurt, pang, sting',r:'고대 영어 prician (pierce, 찌르다) → 뾰족하게 찌르다 → 찌르다·가시로 고착 > 장미 가시에 손가락이 찔리는 장면이 원형'},
{n:1508,w:'string',m:'n. ① 조건, 단서 ② 현(絃) ③ 끈, 줄, 실',s:'condition, proviso, cord, strand, twine',r:'고대 영어 streng (cord, 끈) → 가늘게 꼰 끈 → 줄·문자열·부대 조건으로 고착 > 기타 줄을 손가락으로 튕기는 장면이 원형'},
{n:1509,w:'depraved',m:'a. 타락한, 부패한, 사악한',s:'corrupt, degenerate, immoral, vicious, wicked',r:'라틴어 de (completely) + pravus (crooked, 비뚤어진) → 완전히 비뚤어진 → 타락한·부패한으로 고착 > 도덕이 완전히 무너진 장면이 원형'},
{n:1510,w:'treasury',m:'n. ① 국고; 금고 ② 자금 ③ 재무부 ④ 보고(寶庫)',s:'fund',r:'라틴어 thesaurus (treasure, 보물) → 보물을 보관하는 곳 → 국고·재무부로 고착 > 금화가 가득한 국고 창고의 장면이 원형'},
{n:1511,w:'vociferous',m:'a. 큰 소리로 외치는, 시끄러운, 떠들썩한',s:'boisterous, clamorous, noisy, strident',r:'라틴어 vox (voice, 목소리) + ferre (carry, 나르다) → 큰 목소리를 나르다 → 목청껏 외치는·시끄러운으로 고착 > 큰 소리로 의견을 주장하는 장면이 원형'},
{n:1512,w:'ablation',m:'n. ① 제거, 절제 ② 삭마(削磨)',s:'',r:'라틴어 ab (away) + latio (carrying, 나르기) → 밖으로 제거하다 → 절제·삭제로 고착 > 수술로 조직을 제거하는 장면이 원형'},
{n:1513,w:'prod',m:'v. ① 찌르다 ② 불러일으키다; 재촉하다 / n. 찌르기; 자극',s:'dig, push, shove, move, prompt, urge',r:'중세 영어 prod (prick, 찌르다) → 뾰족한 것으로 찌르다 → 자극하다·찌르다로 고착 > 막대기로 소를 쿡 찔러 움직이게 하는 장면이 원형'},
{n:1514,w:'concerned',m:'a. ① 걱정하는, 염려하는 ② 관계하고 있는; 관심이 있는',s:'anxious, uneasy, involved, interested',r:'라틴어 con (together) + cernere (sift, 구별하다) → 함께 구별해 걱정하다 → 걱정하는·관련된으로 고착 > 자녀 걱정으로 잠을 못 이루는 부모의 장면이 원형'},
{n:1515,w:'rubbish',m:'n. ① 쓰레기, 잡동사니 ② 하찮은 것, 어리석은 짓',s:'garbage, junk, trash, waste, nonsense',r:'고대 프랑스어 robeus (rubble, 파편) → 쓸모없는 파편과 쓰레기 → 쓰레기·헛소리로 고착 > 쓸모 없는 것들이 쌓인 장면이 원형'},
{n:1516,w:'diagonal',m:'a. 대각선의; 비스듬한 / n. 대각선; 사선',s:'crosswise, oblique, skew, slanting',r:'그리스어 dia (through) + gonia (angle, 각도) → 각을 가로질러 → 대각선의로 고착 > 정사각형의 모서리를 잇는 대각선의 장면이 원형'},
{n:1517,w:'simulate',m:'v. ① 가장하다, ~한 체 하다 ② 모의실험하다',s:'feign, imitate, pretend',r:'라틴어 simulare (make similar, 비슷하게 만들다) → 실제처럼 모방하다 → 시뮬레이션하다·가장하다로 고착 > 실제 비행을 모방한 훈련 장치의 장면이 원형'},
{n:1518,w:'bureaucracy',m:'n. 관료정치, 관료주의; 번잡한 절차; 관료',s:'',r:'프랑스어 bureau (office, 사무실) + 그리스어 kratos (power, 권력) → 사무실이 권력을 가진 것 → 관료주의로 고착 > 서류와 절차에 묶인 행정의 장면이 원형'},
{n:1519,w:'finicky',m:'a. 지나치게 까다로운',s:'fastidious, finical, fussy, squeamish',r:'16세기 영어 finical (too particular, 지나치게 까다로운) → 지나치게 까다로운 → 지나치게 꼼꼼한으로 고착 > 음식 하나하나를 따지는 장면이 원형'},
{n:1520,w:'coddle',m:'vt. 부드럽게 다루다; 과보호하다, 애지중지하다',s:'cosset, indulge, mollycoddle, pamper',r:'중세 영어 caudle (warm drink, 따뜻한 음료) → 따뜻하게 돌보다 → 응석받이로 키우다·과보호하다로 고착 > 아이를 지나치게 보호하는 장면이 원형'},
{n:1521,w:'intimacy',m:'n. ① 친밀, 친분 ② 자세한 지식 ③ 정을 통함',s:'closeness, familiarity, innerness',r:'라틴어 intimus (innermost, 가장 안의) → 가장 깊은 내면까지 아는 → 친밀·친밀감으로 고착 > 서로의 깊은 속마음을 나누는 장면이 원형'},
{n:1522,w:'sweltering',m:'a. 피는 듯이 더운',s:'burning, scorching, steaming, sultry',r:'고대 영어 sweltan (die, 죽다) → 죽을 것 같이 더운 → 무더운·찌는 더위의로 고착 > 땀을 뻘뻘 흘리며 더위에 지치는 장면이 원형'},
{n:1523,w:'exculpate',m:'vt. 무죄로 하다; 무죄를 증명하다, 면하게 하다',s:'acquit, absolve, exonerate, vindicate',r:'라틴어 ex (out) + culpa (fault, 잘못) + -ate → 잘못에서 빼내다 → 무죄로 하다·면죄하다로 고착 > 새 증거로 혐의를 벗어나는 장면이 원형'},
{n:1524,w:'static',m:'a. 고정된, 정적인; 정지 상태의 / n. 정전기',s:'fixed, motionless, stationary, still',r:'그리스어 statikos (standing, 서있는) → 서서 움직이지 않는 → 정적인·정지된으로 고착 > 변화 없이 그대로 멈춘 장면이 원형'},
{n:1525,w:'patch',m:'n. ① 헝겏조각 ② 작은 조각, 파편 / v. 헝겏조각을 대다; 수습하다',s:'scrap, shred',r:'고대 영어 pæcce (piece, 조각) → 구멍을 막는 천 조각 → 헝겊 조각·수리하다로 고착 > 찢어진 곳에 천을 대어 수리하는 장면이 원형'},
{n:1526,w:'ambidextrous',m:'a. ① 양손을 다 쓰는, 양손잡이의 ② 매우 솜씨 있는',s:'adroit, proficient, skillful',r:'라틴어 ambi (both) + dexter (right, 오른쪽) → 양손이 다 오른손 같은 → 양손잡이의로 고착 > 왼손으로도 오른손으로도 능숙하게 쓰는 장면이 원형'},
{n:1527,w:'mudslinging',m:'n. 중상, 비방, 인신공격',s:'aspersion, calumny, slander, vilification',r:'mud (진흙) + slinging (던지기) → 진흙을 던지다 → 중상·비방으로 고착 > 선거에서 상대방에 대한 근거 없는 비방을 퍼붓는 장면이 원형'},
{n:1528,w:'libido',m:'n. 성욕, 성적 충동; 생명력, 리비도',s:'',r:'라틴어 libido (desire, 욕망) → 성적 욕망의 에너지 → 리비도·성욕으로 고착 > 프로이트가 말하는 무의식적 욕망의 장면이 원형'},
{n:1529,w:'groove',m:'n. ① 홈; 바퀴 자국 ② 관행, 관례 ③ 최고조 / v. 홈을 파다; 즐겁게 하다',s:'channel, indention, custom, dig, gouge, scoop, amuse, delight',r:'중세 네덜란드어 groeve (ditch, 도랑) → 파인 홈 → 홈·리듬·절차로 고착 > 레코드판 위의 가느다란 홈에 바늘이 올라가는 장면이 원형'},
{n:1530,w:'correlation',m:'n. 연관성, 상관관계',s:'association, interrelation, interrelationship',r:'라틴어 con (together) + relatio (relation, 관계) → 함께 관계를 가지는 것 → 상관관계·연관으로 고착 > 두 변수가 함께 움직이는 그래프의 장면이 원형'},
{n:1531,w:'reject',m:'v. ① 거부하다 ② 불합격시키다 / n. ① 퇴짜 맞은 사람 ② 불량품',s:'',r:'라틴어 re (back) + jectum (thrown, 던진) → 되던지다 → 거부하다·거절하다로 고착 > 지원서에 불합격 표시를 하는 장면이 원형'},
{n:1532,w:'foolproof',m:'a. 누구나 다룰 수 있는, 아주 간단한; 절대 확실한',s:'fully reliable, infallible, unfailing',r:'fool (바보) + proof (막는) → 바보도 실수할 수 없는 → 절대 안전한·어리석음도 막는으로 고착 > 누가 써도 실수가 불가능한 설계의 장면이 원형'},
{n:1533,w:'discount',m:'v. ① 할인하다 ② 에누리해서 듣다; 무시하다 / n. 할인; 참작',s:'mark down, reduce, disregard, ignore, rebate, reduction, allowances, consideration',r:'dis (away) + count (세다) → 세어서 빼주다 → 할인하다·할인으로 고착 > 가격표에서 일정 금액을 빼주는 장면이 원형'},
{n:1534,w:'blasphemy',m:'n. ① 신에 대한 불경, 모독 ② 벌 받을 소리; 독설',s:'desecration, impiety, irreverence, profanity, sacrilege, invective, vituperation',r:'그리스어 blaptein (harm, 해치다) + pheme (reputation, 명성) → 신의 명성을 해치다 → 신성모독으로 고착 > 신성한 것을 모욕하는 발언의 장면이 원형'},
{n:1535,w:'outlet',m:'n. ① 출구, 배출구 ② 표현 수단 ③ 판로; 소매점, 아울렛',s:'vent',r:'out (밖으로) + let (내보내다) → 밖으로 내보내는 곳 → 배출구·콘센트·판로로 고착 > 압력을 밖으로 내보내는 구멍의 장면이 원형'},
{n:1536,w:'minimal',m:'a. ① 최소의, 극미한 ② 미니멀 아트의',s:'',r:'라틴어 minimus (smallest, 가장 작은) + -al → 가장 작은 → 최소의·극히 적은으로 고착 > 꼭 필요한 것만 남기고 모두 제거한 장면이 원형'},
{n:1537,w:'dungeon',m:'n. 지하 감옥',s:'underground cell',r:'고대 프랑스어 donjon (castle tower, 성탑) → 성탑 아래 감옥 → 지하 감옥으로 고착 > 성 지하에 갇혀 빛도 없는 감옥의 장면이 원형'},
{n:1538,w:'wrangle',m:'v. 언쟁을 벌이다[다투다] / n. 언쟁[다툼]',s:'altercate, argue, dispute, quarrel, altercation, argument, bickering',r:'중세 영어 wranglen (quarrel, 다투다) → 소리를 높이며 말다툼하다 → 말다툼하다·논쟁하다로 고착 > 두 사람이 목청을 높여 다투는 장면이 원형'},
{n:1539,w:'tumor',m:'n. 종양(腫瘍)',s:'neoplasm',r:'라틴어 tumere (swell, 부풀다) → 부풀어 오른 덩어리 → 종양으로 고착 > 세포가 비정상적으로 증식해 덩어리를 이루는 장면이 원형'},
{n:1540,w:'fraternal',m:'a. 형제의; 형제 같은, 형제다운, 우애의',s:'brotherly',r:'라틴어 frater (brother, 형제) + -al → 형제의 → 형제의·우애의로 고착 > 형제처럼 서로 돕는 장면이 원형'},
{n:1541,w:'elocution',m:'n. 웅변술, 연설법; 연설조; 과장된 말투',s:'diction, eloquence, oratory, rhetoric',r:'라틴어 e (out) + loqui (speak, 말하다) → 밖으로 말하는 것 → 웅변·발성법으로 고착 > 발음과 억양을 훈련하는 장면이 원형'},
{n:1542,w:'vice versa',m:'ad. 반대로, 거꾸로; 역도 또한 같음',s:'',r:'라틴어 vice (in place, 대신) + versa (turned, 돌려진) → 위치가 바뀐 것 → 반대로·역으로도로 고착 > 명제와 그 역을 나란히 놓는 장면이 원형'},
{n:1543,w:'juice',m:'n. ① 주스, 즙 ② 본질 ③ 정력, 활력 ④ 가솔린; 전류 ⑤ 술; 마약 / v. 약물 주사를 놓다',s:'extract, fluid, liquid, nectar, core, essence, kernel, soul, inspiration, sap, vitality, dope, drug, narcotic',r:'고대 프랑스어 jus (broth, 즙) → 과일에서 짜낸 액체 → 주스·즙으로 고착 > 오렌지를 눌러 즙을 짜는 장면이 원형'},

{n:1545,w:'contraption',m:'n. 새로운 고안, 신안; 기묘한 기계[장치]',s:'contrivance, device, gadget, gizmo',r:'con (together) + trap (함정) → 복잡하게 얽혀 만든 장치 → 기묘한 장치·괴상한 기계로 고착 > 복잡하게 뒤얽힌 이상한 기계의 장면이 원형'},
{n:1546,w:'allude',m:'vi. ① 언급하다 ② 넌지시 비추다, 암시하다[to]',s:'insinuate, intimate, suggest',r:'라틴어 al (to) + ludere (play, 놀다) → 빗대어 놀다 → 암시하다·넌지시 언급하다로 고착 > 직접 말하지 않고 에둘러 표현하는 장면이 원형'},
{n:1547,w:'sequela',m:'n. 후유증; 결과',s:'aftereffect',r:'라틴어 sequi (follow, 따르다) → 질병 후에 따라오는 것 → 후유증·속편으로 고착 > 병이 나은 후 남은 후유증의 장면이 원형'},
{n:1548,w:'glamorous',m:'a. 매력이 넘치는, 매혹적인',s:'alluring, attractive, charming, fascinating',r:'스코틀랜드어 glamour (magic, 마법) → 마법처럼 화려한 → 매혹적인·화려한으로 고착 > 눈부시게 화려한 무대 장면이 원형'},
{n:1549,w:'barnstorm',m:'v. ① 지방을 유세하다 ② 지방 순회공연을 하다',s:'canvass, stump, tour, troupe',r:'barn (헛간) + storm (폭풍) → 헛간을 폭풍처럼 돌아다니다 → 유세하다·순회 공연하다로 고착 > 선거 후보자가 시골 마을을 돌아다니는 장면이 원형'},
{n:1550,w:'retroactive',m:'a. 반동하는; 효력이 소급하는',s:'retrospective',r:'라틴어 retro (backward, 뒤로) + active (활성의) → 뒤로 작용하는 → 소급 적용의로 고착 > 새 법률이 과거 사건에도 적용되는 장면이 원형'},
{n:1551,w:'intact',m:'a. 손상되지 않은, 온전한',s:'undamaged, uninjured, untouched, whole',r:'라틴어 in (not) + tactus (touched, 건드려진) → 건드려지지 않은 → 손상되지 않은·온전한으로 고착 > 사고 후에도 완전히 그대로인 장면이 원형'},
{n:1552,w:'squander',m:'v. 낭비하다, 헛되이 쓰다, 탕진하다',s:'dissipate, waste',r:'16세기 영어 squander (scatter, 흩뿌리다) → 돈을 흩뿌리듯 낭비하다 → 낭비하다·탕진하다로 고착 > 유산을 순식간에 다 써버리는 장면이 원형'},
{n:1553,w:'detour',m:'n. 우회; 우회로 / v. 우회하다, 돌아가다',s:'bypass, circuit, diversion',r:'프랑스어 détour (diversion, 우회) → 우회로로 돌아가다 → 우회로·우회하다로 고착 > 공사 중인 도로를 피해 돌아가는 장면이 원형'},

{n:1555,w:'counsel',m:'n. ① 상담, 상의 ② 조언, 충고 / v. 상담하다, 조언하다',s:'consultation, deliberation, advice, recommendation, advise, exhort, recommend',r:'라틴어 consilium (advice, 조언) → 함께 앉아 조언하다 → 조언하다·변호사로 고착 > 어려운 문제를 두고 조언을 구하는 장면이 원형'},

{n:1557,w:'subpoena',m:'n. 소환장, 벌칙부 소환 영장 / vt. 소환하다',s:'decree, summons, writ, summon, swear out',r:'라틴어 sub (under) + poena (penalty, 벌) → 벌 아래 두다 → 소환장·출두 명령으로 고착 > 법원 소환장을 받고 출두하는 장면이 원형'},
{n:1558,w:'repel',m:'v. ① 쫓아버리다, 격퇴하다 ② 거절하다 ③ 불쾌감을 느끼게 하다',s:'chase, dislodge, drive, repulse, decline, deny, refuse, reject, disgust, offend, sicken',r:'라틴어 re (back) + pellere (drive, 몰다) → 뒤로 몰아내다 → 격퇴하다·혐오감을 주다로 고착 > 자석의 같은 극이 서로 밀어내는 장면이 원형'},
{n:1559,w:'viewpoint',m:'n. 견해, 견지, 관점',s:'perspective, standpoint',r:'view (시각) + point (점) → 보는 지점 → 관점·시각으로 고착 > 높은 전망대에서 내려다보는 위치의 장면이 원형'},
{n:1560,w:'inviting',m:'a. 유혹적인, 매력적인, 솔깃한',s:'appealing, arresting, attractive, engaging, tempting',r:'invite (초대하다) + -ing → 초대하는 성질 → 매력적인·호감 가는으로 고착 > 들어가고 싶게 아늑한 입구의 장면이 원형'},
{n:1561,w:'shove',m:'v. 밀다, 밀치다, 밀고 나아가다 / n. 삽; 스푼',s:'elbow, jostle, push, thrust',r:'고대 영어 scufan (push, 밀다) → 세게 밀다 → 밀치다·밀어 넣다로 고착 > 사람들이 몰려 서로를 밀치는 장면이 원형'},
{n:1562,w:'affront',m:'n. 모욕, 무례한 언동 / vt. 모욕하다',s:'dishonor, indignity, insult, offence, slight, snub',r:'고대 프랑스어 affronter (face, 정면으로 대하다) → 정면으로 모욕하다 → 모욕·공개적인 무례로 고착 > 공개적으로 상대를 모욕하는 장면이 원형'},
{n:1563,w:'cerebral',m:'a. ① 뇌의, 대뇌의 ② 지적인, 이지적인',s:'cerebric, brainy, intellectual, intelligent',r:'라틴어 cerebrum (brain, 뇌) + -al → 뇌의 → 지적인·두뇌의로 고착 > 감정보다 이성과 논리로 접근하는 장면이 원형'},
{n:1564,w:'betroth',m:'vt. 약혼시키다[to]',s:'affiance, engage',r:'be (make) + troth (faith, 믿음) → 믿음으로 약속하다 → 약혼시키다로 고착 > 결혼을 약속하며 반지를 교환하는 장면이 원형'},
{n:1565,w:'fraudulent',m:'a. 사기를 치는, 부정직한, 부정한, 속이는',s:'deceitful, dishonest, fraudful',r:'라틴어 fraudulentus (deceitful, 속이는) → 속임수로 이루어진 → 사기의·거짓의로 고착 > 가짜 서류로 계약을 맺는 장면이 원형'},
{n:1566,w:'eradicate',m:'vt. 근절하다, 박멸하다, 뿌리 뽑다',s:'eliminate, exterminate, uproot',r:'라틴어 e (out) + radix (root, 뿌리) + -ate → 뿌리째 뽑아내다 → 근절하다·박멸하다로 고착 > 잡초의 뿌리까지 완전히 제거하는 장면이 원형'},
{n:1567,w:'cemetery',m:'n. 묘지; 공동묘지',s:'necropolis',r:'그리스어 koimeterion (sleeping place, 잠자는 곳) → 영원히 잠드는 곳 → 묘지로 고착 > 비석들이 늘어선 고요한 묘지의 장면이 원형'},
{n:1568,w:'dispassionate',m:'a. ① 감정에 좌우되지 않는, 냉정한 ② 선입관 없는, 공평한',s:'composed, unemotional, unmoved, detached, fair, impartial, unbiased, unprejudiced',r:'dis (not) + passionate (열정적인) → 열정 없이 → 냉정한·감정이 없는으로 고착 > 어떤 감정도 없이 냉정하게 판단하는 장면이 원형'},
{n:1569,w:'pulse',m:'n. 맥박, 고동; 맥동',s:'beat, rhythm',r:'라틴어 pulsare (beat, 치다) → 규칙적으로 치는 것 → 맥박·박동·파동으로 고착 > 손목에서 규칙적으로 뛰는 맥박의 장면이 원형'},
{n:1570,w:'substantive',m:'a. ① 실질적인, 본질적인 ② 상당한, 꽤 많은',s:'essential, important, practical, ample, considerable, sizeable',r:'라틴어 substantia (substance, 실체) + -ive → 실체가 있는 → 실질적인·명사의로 고착 > 겉이 아닌 내용과 실질이 있는 장면이 원형'},
{n:1571,w:'goad',m:'vt. ① 격려[자극, 선동]하다 ② 뾰족한 막대기로 찌르다',s:'drive, provoke, stimulate, urge, prick',r:'고대 영어 gad (spike, 뾰족한 것) → 뾰족한 막대기로 찌르다 → 자극하다·부추기다로 고착 > 채찍질해 행동하게 만드는 장면이 원형'},
{n:1572,w:'conviction',m:'n. ① 유죄 선고 ② 확신, 신념 ③ 납득시키기, 설득',s:'condemnation, assurance, belief, confidence, faith, persuasion, suasion',r:'라틴어 convincere (prove guilty, 유죄 증명하다) → 유죄를 증명하다 → 확신·유죄 판결로 고착 > 법정에서 유죄를 선고받는 장면이 원형'},

{n:1574,w:'ellipsis',m:'n. 생략; 생략부호',s:'',r:'그리스어 elleipsis (deficiency, 부족함) → 생략되어 부족한 것 → 생략·줄임표로 고착 > 말이 채 끝나지 않은 상태로 ···이 이어지는 장면이 원형'},
{n:1575,w:'inundate',m:'vt. ① 범람시키다 ② 넘치게 하다, 쇄도하다',s:'engulf, flood, overflow, overwash, submerge, swamp, overwhelm, swamp',r:'라틴어 in (in) + undare (flow, 흐르다) → 안으로 흘러 채우다 → 넘치게 하다·쇄도하다로 고착 > 강물이 범람해 마을을 뒤덮는 장면이 원형'},
{n:1576,w:'carnal',m:'a. ① 육체의; 육욕적인, 관능적인 ② 세속적인',s:'bodily, corporal, corporeal, fleshly, sensual, earthly, worldly',r:'라틴어 caro (flesh, 살) + -al → 살의 → 육체의·육욕적인으로 고착 > 정신보다 육체적 쾌락에 집중하는 장면이 원형'},
{n:1577,w:'surrender',m:'v. ① 항복하다, 투항하다 ② 포기하다, 넘겨주다',s:'capitulate, submit, succumb, yield, cede, concede, relinquish, waive',r:'고대 프랑스어 sur (over) + rendre (give, 주다) → 위로 건네주다 → 항복하다·포기하다로 고착 > 흰 깃발을 들고 손을 올리는 장면이 원형'},

{n:1579,w:'angular',m:'a. ① 각이 진, 모난 ② 뼈가 앙상한, 몹시 여윈',s:'angled, angulated, squarish',r:'라틴어 angulus (angle, 각도) + -ar → 각도의 → 각진·날카로운으로 고착 > 부드럽지 않고 각진 모서리의 장면이 원형'},
{n:1580,w:'reclaim',m:'vt. ① 개간하다; 재생하여 이용하다 ② 교정하다 ③ 되찾다',s:'',r:'re (back) + claim (요구하다) → 되돌려 요구하다 → 되찾다·개간하다로 고착 > 잃어버린 땅을 되찾는 장면이 원형'},
{n:1581,w:'lash',m:'n. ① 채찍질, 태형 ② 통렬한 비난 / v. ① 매질하다 ② 욕을 퍼붓다, 나무라다',s:'cane, flagellation, censure, criticism, disparagement, fault-finding, birch, bullwhip, cane, knout, rawhide, batter, berate, blast, censure',r:'고대 영어 lash (stroke, 채찍질) → 채찍으로 치다 → 채찍질하다·묶다로 고착 > 채찍이 공기를 가르며 치는 장면이 원형'},
{n:1582,w:'resilient',m:'a. ① 탄력 있는; 곧 원기를 회복하는 ② 발랄한, 쾌활한',s:'bouncy, elastic, supple, buoyant',r:'라틴어 resilire (rebound, 튀어 오르다) → 충격을 받아도 튀어 오르는 → 탄력 있는·회복력 있는으로 고착 > 눌렸다가 원래 모양으로 돌아오는 장면이 원형'},
{n:1583,w:'dampen',m:'v. ① 기세를 꺾다, 약화시키다 ② 축축하게 하다',s:'deject, depress, discourage, humidify, moisten',r:'고대 영어 damp (fog, 안개) → 안개처럼 축축하게 만들다 → 축이다·기를 꺾다로 고착 > 불에 물을 뿌려 불길을 줄이는 장면이 원형'},
{n:1584,w:'gist',m:'n. 요지, 요점, 골자',s:'core, essence, pith',r:'고대 프랑스어 gist (it lies, 놓여 있다) → 핵심이 놓여있는 것 → 요점·핵심으로 고착 > 긴 글의 핵심을 한 줄로 정리한 장면이 원형'},
{n:1585,w:'provincial',m:'a. ① 지방의, 시골의 ② 편협한, 옹졸한',s:'local, regional, rural, insular, narrow-minded, parochial',r:'라틴어 provincia (province, 지방) + -al → 지방의 → 지방의·편협한으로 고착 > 도시 문화와 동떨어진 시골의 장면이 원형'},
{n:1586,w:'cringe',m:'vi. ① 움치리다 ② 굽실거리다, 아첨하다 / n. 굽실거림, 아첨',s:'cower, flinch, fawn, toady',r:'고대 영어 cringan (fall, 쓰러지다) → 두려움이나 수치심에 몸을 움츠리다 → 움츠러들다·비굴하게 굴다로 고착 > 창피한 장면을 보고 몸을 움츠리는 장면이 원형'},
{n:1587,w:'extrovert',m:'n. 외향적인 사람 / a. 외향적인, 외향성의',s:'gregarious, outgoing, sociable',r:'라틴어 extra (outside, 바깥) + vertere (turn, 돌리다) → 바깥으로 돌리는 → 외향적인 사람으로 고착 > 사람들과 어울리며 에너지를 얻는 장면이 원형'},
{n:1588,w:'addle',m:'vt. ① 혼란스럽게 만들다 ② 계란을 썩히다, 썩다',s:'befuddle, bewilder, confuse, muddle, decay, decompose, rot, spoil',r:'고대 영어 adela (filth, 더러움) → 머리가 썩은 달걀처럼 혼란스러운 → 혼란시키다·썩은으로 고착 > 복잡한 정보에 머리가 얼어버리는 장면이 원형'},

{n:1591,w:'almighty',m:'a. 전능한',s:'omnipotent',r:'all (모두) + mighty (강한) → 모든 면에서 강한 → 전능한·막강한으로 고착 > 어떤 것도 막을 수 없는 절대적 힘의 장면이 원형'},
{n:1592,w:'unify',m:'v. 통합[통일]하다, 단일체로 하다',s:'consolidate, integrate, unite',r:'라틴어 uni (one, 하나) + -fy → 하나로 만들다 → 통합하다·통일하다로 고착 > 분열된 여러 세력이 하나로 합쳐지는 장면이 원형'},
{n:1593,w:'tariff',m:'n. ① 관세, 관세율 ② 운임요금표; 요금표',s:'duty, tax, price list',r:'아랍어 ta\'rif (notification, 통보) → 수입품에 부과하는 세금 통보 → 관세·요금표로 고착 > 세관에서 수입품에 세금을 부과하는 장면이 원형'},
{n:1594,w:'devour',m:'vt. ① 게걸스레 먹다 ② 집어삼키다 ③ 집어삼킬 듯이 읽다',s:'consume, gobble, gorge, annihilate, destroy, ravage',r:'라틴어 de (completely) + vorare (swallow, 삼키다) → 완전히 삼키다 → 게걸스럽게 먹다·탐독하다로 고착 > 음식을 통째로 삼키듯 먹는 장면이 원형'},
{n:1595,w:'syndrome',m:'n. ① 증후군 ② 일련의 징후, 일정한 행동 양식',s:'',r:'그리스어 syn (together) + dromos (running, 달림) → 함께 달리는 증상들 → 증후군으로 고착 > 여러 증상이 함께 나타나는 장면이 원형'},
{n:1596,w:'nimble',m:'a. ① 빠른, 날렵한 ② 민첩한; 영리한',s:'agile, quick, soft, dexterous, smart',r:'고대 영어 næmel (quick to seize, 빠르게 잡는) → 빠르고 민첩한 → 날랜·기민한으로 고착 > 손가락이 빠르게 움직이는 장면이 원형'},
{n:1597,w:'pork',m:'n. ① 돼지고기 ② 정부 보조금[관직 등]',s:'',r:'라틴어 porcus (pig, 돼지) → 돼지고기 → 돼지고기·정치적 이권으로 고착 > 불판 위에서 익는 돼지고기의 장면이 원형'},
{n:1598,w:'burrow',m:'n. 굴 / v. ① 굴을 파다 ② 들추다, 뒤적이다',s:'dig, excavate, tunnel, ferret, forage, rummage',r:'중세 영어 borwen (dig, 파다) → 땅을 파고 사는 굴 → 굴·파고들다로 고착 > 토끼가 땅 아래로 굴을 파는 장면이 원형'},
{n:1599,w:'fade',m:'v. ① 흐릿해지다, 희미해지다; 바래다 ② 사라져가다 ③ 시들다; 쇠퇴하다',s:'become pale, dim, fade away, grow dim, decline, dwindle',r:'고대 영어 fadian (become feeble, 약해지다) → 색이 연해지며 사라지다 → 바래다·사라지다로 고착 > 햇빛에 색이 점점 바래는 장면이 원형'},
{n:1600,w:'ordinance',m:'n. 법령, 조례',s:'decree, enactment, regulation',r:'라틴어 ordinare (arrange, 정렬하다) → 정렬해 규정한 것 → 법령·조례로 고착 > 지방 의회가 지역 규칙을 제정하는 장면이 원형'},
{n:1601,w:'gratuitous',m:'a. ① 무료의, 무보수의 ② 이유 없는, 까닭 없는',s:'complimentary, free, gratis, pro bono, causeless, groundless, ungrounded',r:'라틴어 gratuitus (free, 무료의) → 받는 것 없이 주는 → 무료의·불필요한으로 고착 > 아무 이유도 없이 폭력을 행사하는 장면이 원형'},
{n:1602,w:'expatiate',m:'vi. 상세히 설명하다, 부연하다[on, upon]',s:'amplify, descant, elaborate, expound',r:'라틴어 ex (out) + spatiari (walk about, 돌아다니다) → 밖으로 돌아다니며 자세히 → 상세히 설명하다로 고착 > 여기저기 들러가며 길게 이야기를 늘어놓는 장면이 원형'},
{n:1603,w:'archive',m:'n. 기록 보관소, 공문서',s:'',r:'그리스어 archeion (government building, 행정 건물) → 공문서를 보관하는 곳 → 기록 보관소·저장하다로 고착 > 오래된 문서를 서랍에 보관하는 장면이 원형'},
{n:1604,w:'concrete',m:'a. 실제하는; 구체적인, 유형의',s:'actual, factual, substantial, tangible',r:'라틴어 concretus (hardened, 굳어진) → 함께 굳어진 → 콘크리트·구체적인으로 고착 > 여러 재료가 섞여 굳어진 콘크리트의 장면이 원형'},
{n:1605,w:'reprisal',m:'n. 보복, 앙갚음',s:'retaliation, revenge, vengeance',r:'고대 프랑스어 reprise (taking back, 되찾기) → 되갚음으로 하는 행동 → 보복·복수로 고착 > 공격에 대응해 같은 방식으로 되갚는 장면이 원형'},
{n:1606,w:'passe',m:'a. 구식의, 시대에 뒤진; 한창때가 지난',s:'obsolete, old-fashioned, outdated',r:'프랑스어 passé (past, 지난) → 이미 지나간 유행 → 구식의·유행이 지난으로 고착 > 한때 유행했지만 이제 아무도 안 쓰는 장면이 원형'},
{n:1607,w:'instantaneous',m:'a. 즉시의, 즉각적인, 즉시 일어나는',s:'immediate, instant, prompt, quick',r:'라틴어 instantaneus (of a moment) → 순간에 일어나는 → 즉각적인·순간적인으로 고착 > 번개처럼 눈 깜짝할 새에 일어나는 장면이 원형'},
{n:1608,w:'deteriorate',m:'v. ① 떨어지다, 약화하다; 나빠지다 ② 나쁘게 하다, 저하시키다',s:'degenerate, depreciate, retrogress, worsen',r:'라틴어 deterior (worse, 더 나쁜) + -ate → 더 나쁘게 만들다 → 악화되다·저하되다로 고착 > 상태가 점점 나빠져 가는 장면이 원형'},
{n:1609,w:'methodical',m:'a. ① 조직적인, 질서정연한 ② 꼼꼼한',s:'orderly, planned, systematic, careful, exact, meticulous',r:'그리스어 methodos (following a road, 길을 따라가기) → 정해진 길을 따르는 → 체계적인·꼼꼼한으로 고착 > 단계별로 정확하게 진행하는 장면이 원형'},
{n:1610,w:'circumvent',m:'vt. ① 회피하다 ② 선수를 쳐서 망쳐 놓다',s:'avoid, evade, get around, frustrate, outwit',r:'라틴어 circum (around) + venire (come, 오다) → 돌아서 오다 → 우회하다·피하다로 고착 > 규칙을 교묘히 피해 우회하는 장면이 원형'},
{n:1611,w:'bauble',m:'n. 겉만 번지르르한 싸구려 물건; 시시한 것',s:'trinket, trifle',r:'고대 프랑스어 baubel (toy, 장난감) → 값싸고 화려한 장난감 → 싸구려 장식품으로 고착 > 반짝이지만 값어치 없는 장식품의 장면이 원형'},
{n:1612,w:'intramural',m:'a. ① 같은 학교 내의, 교내의 ② 같은 도시의, 시내의',s:'municipal',r:'라틴어 intra (within, 내부) + murus (wall, 벽) → 벽 안의 → 교내의·내부의로 고착 > 학교 울타리 안에서 치르는 스포츠의 장면이 원형'},
{n:1613,w:'directory',m:'n. 인명부, 전화번호부',s:'',r:'라틴어 dirigere (direct, 지도하다) → 안내하는 것 → 안내서·전화번호부·디렉터리로 고착 > 이름과 연락처가 정리된 목록의 장면이 원형'},
{n:1614,w:'thrust',m:'v. 밀다, 밀치다, 밀어내다 / n. 밀기, 찌르기; 요지',s:'push, shove',r:'고대 영어 thyrstian (push, 밀다) → 힘껏 밀어 찌르다 → 찌르다·추진력으로 고착 > 검을 앞으로 힘껏 내찌르는 장면이 원형'},
{n:1615,w:'extraneous',m:'a. ① 외래의; 이질적인 ② 관계없는, 무관한',s:'alien, external, extrinsic, foreign, irrelevant, unrelated',r:'라틴어 extraneus (external, 외부의) → 바깥에서 온 → 관계없는·외부의로 고착 > 주제와 전혀 상관없는 내용이 끼어드는 장면이 원형'},
{n:1616,w:'feces',m:'n. 배설물; 찌끼, 침전물',s:'excrement, stools, deposit, dregs',r:'라틴어 faeces (dregs, 찌꺼기) → 몸에서 배출되는 찌꺼기 → 대변·배설물로 고착 > 소화 후 몸에서 나오는 노폐물의 장면이 원형'},
{n:1617,w:'supercilious',m:'a. 거만한, 남을 깔보는, 오만한',s:'arrogant, assuming, haughty, proud',r:'라틴어 super (above) + cilium (eyebrow, 눈썹) → 눈썹을 치켜올려 내려다보는 → 거만한·오만한으로 고착 > 눈썹을 높이 올리며 내려다보는 장면이 원형'},
{n:1618,w:'legislature',m:'n. 입법부, 입법 기관',s:'assembly, congress, parliament',r:'라틴어 lex (law, 법) + latura (carrying, 나르기) → 법을 만드는 곳 → 입법 기관·의회로 고착 > 의원들이 법안을 심의하는 장면이 원형'},
{n:1619,w:'butcher',m:'n. ① 푸주한, 정육점 주인 ② 도살업자; 학살자 / vt. ① 도살하다 ② 망쳐놓다',s:'slaughterer, slayer, massacre, slaughter, destroy, spoil',r:'고대 프랑스어 bouchier (one who kills goats, 염소를 도살하는 사람) → 고기를 도살하는 사람 → 도살자·학살하다로 고착 > 정육점에서 고기를 다듬는 장면이 원형'},
{n:1620,w:'pole',m:'n. ① 막대기, 장대, 기둥 ② 극(極), 극지',s:'post, rod, support',r:'라틴어 palus (stake, 기둥) → 세워진 막대기 → 기둥·극지·장대로 고착 > 하늘을 향해 세워진 깃대의 장면이 원형'},

{n:1622,w:'wistful',m:'a. 탐내는 듯한; 그리워하는; 생각에 잠긴',s:'',r:'중세 영어 wistly (intently, 간절히) → 간절히 바라보는 → 아쉬운·그리워하는으로 고착 > 지나간 것을 그리워하며 바라보는 장면이 원형'},
{n:1623,w:'examine',m:'v. ① 조사하다; 검진하다; 심문하다 ② 시험을 실시하다',s:'',r:'라틴어 examinare (weigh, 달다) → 저울로 달아 검사하다 → 검사하다·시험하다로 고착 > 의사가 청진기로 환자를 꼼꼼히 진찰하는 장면이 원형'},
{n:1624,w:'stolid',m:'a. 무신경한, 둔감한',s:'dull, impassive, obtuse',r:'라틴어 stolidus (dull, 둔한) → 감정 없이 둔한 → 무감각한·둔한으로 고착 > 어떤 자극에도 표정 변화 없는 장면이 원형'},
{n:1625,w:'proviso',m:'n. 단서, 조건',s:'condition, provision, qualification, terms',r:'라틴어 proviso (it being provided that, 단서로서) → 조건으로 두는 것 → 단서 조항·조건으로 고착 > 계약서에 특정 조건을 붙이는 장면이 원형'},
{n:1626,w:'apposite',m:'a. 적절한, 딱 들어맞는',s:'appropriate, germane, pertinent, proper, relevant',r:'라틴어 appositus (placed near, 곁에 놓인) → 딱 알맞게 곁에 놓인 → 적절한·적합한으로 고착 > 상황에 꼭 맞는 말을 찾아내는 장면이 원형'},
{n:1627,w:'jumble',m:'v. 뒤죽박죽을 만들다; 뒤범벅이 되다 / n. 혼잡, 난잡; 뒤범벅',s:'confuse, disorder, mix, clutter, hodgepodge, mishmash, muddle',r:'중세 영어 jumblen (mix up, 뒤섞다) → 뒤섞어 뒤죽박죽으로 만들다 → 뒤죽박죽·혼합으로 고착 > 서랍 안에 이것저것 뒤섞인 장면이 원형'},
{n:1628,w:'miscegenation',m:'n. 서로 다른 종족의 혼합; 결혼',s:'',r:'라틴어 miscere (mix, 섞다) + genus (race, 인종) → 다른 인종을 섞다 → 혼혈·인종 혼합으로 고착 > 서로 다른 인종 간의 결혼으로 태어난 아이의 장면이 원형'},
{n:1629,w:'term',m:'n. ① 말; 용어 ② 기간; 임기; 학기 ③ 조건, 조항 ④ 사이, 관계',s:'expression, phrase, word, period, session, semester, condition, stipulation, relationship',r:'라틴어 terminus (boundary, 경계) → 경계로 정해진 기간 → 기간·학기·용어로 고착 > 학교 학기가 시작되는 장면이 원형'},
{n:1630,w:'dogged',m:'a. 완강한; 집요한, 끈질긴',s:'obstinate, persistent, stubborn, tenacious',r:'dog (개) + -ed → 개처럼 집요하게 물고 늘어지는 → 집요한·끈질긴으로 고착 > 포기하지 않고 끝까지 매달리는 장면이 원형'},
{n:1631,w:'advance',m:'n. ① 전진; 발전 ② 선금 / v. ① 전진시키다 ② 앞당기다; 선불하다 / a. 미리 하는',s:'prepayment, promote, raise, prepay',r:'라틴어 ab (before) + ante (before, 앞에) → 앞에 앞서가다 → 전진하다·진보로 고착 > 앞으로 한 걸음씩 나아가는 장면이 원형'},
{n:1632,w:'scurry',m:'vi. 급히 가다, 서두르다',s:'hasten, scuttle, skitter',r:'중세 영어 scurren (hurry, 서두르다) → 종종걸음으로 바쁘게 움직이다 → 종종걸음치다·급히 움직이다로 고착 > 쥐가 재빠르게 달려가는 장면이 원형'},
{n:1633,w:'covenant',m:'n. 계약, 서약, 맹약',s:'contract, pact',r:'고대 프랑스어 convenir (agree, 동의하다) → 함께 동의한 약속 → 계약·협약으로 고착 > 두 당사자가 엄숙한 약속을 맺는 장면이 원형'},
{n:1634,w:'nuptial',m:'a. 결혼의, 결혼식의 / n. 결혼식, 혼례',s:'conjugal, marital, matrimonial, marriage, matrimony, wedding',r:'라틴어 nupta (married woman, 기혼 여성) → 결혼하는 것 → 결혼의·혼례의로 고착 > 웨딩드레스를 입고 결혼 서약을 하는 장면이 원형'},
{n:1635,w:'register',m:'v. ① 기록하다; 등록하다 ② 가리키다 ③ 표명하다; 나타내다',s:'enroll, enter, note, show, display, exhibit, express, reveal',r:'라틴어 regestum (list, 목록) → 목록에 기록하다 → 기록하다·등록하다·음역으로 고착 > 이름을 명부에 적어 등록하는 장면이 원형'},
{n:1636,w:'gumption',m:'n. ① 적극성, 진취적인 기상 ② 재치, 지혜, 요령',s:'drive, spirit, sense, shrewdness',r:'스코틀랜드어 gumption (common sense, 상식) → 상식에서 나오는 용기 → 진취성·기개로 고착 > 두려움을 이기고 스스로 나서는 장면이 원형'},
{n:1637,w:'fleeting',m:'a. 순식간의, 잠깐 동안의; 덧없는',s:'ephemeral, momentary, temporary, transitory, evanescent',r:'고대 영어 fleotan (float, 떠다니다) + -ing → 떠다니다가 사라지는 → 순식간의·덧없는으로 고착 > 손에 잡으려는 순간 사라지는 장면이 원형'},
{n:1638,w:'outbreak',m:'n. ① 발발, 돌발, 창궐; 분출 ② 폭동, 반란',s:'burst, eruption, insurgence, revolt, uprising',r:'out (밖으로) + break (터지다) → 밖으로 터져 나오다 → 발발·발생으로 고착 > 전쟁이나 전염병이 갑자기 터지는 장면이 원형'},
{n:1639,w:'bruise',m:'n. 타박상, 멍; 상처 / v. 타박상을 입히다; 감정을 상하게 하다',s:'',r:'고대 영어 brysan (crush, 으깨다) → 눌려 으깨져 생긴 상처 → 타박상·멍으로 고착 > 부딪힌 자리가 파랗게 변하는 장면이 원형'},
{n:1640,w:'sermon',m:'n. ① 설교 ② 잔소리; 장황설',s:'homily, preaching',r:'라틴어 sermo (speech, 말) → 종교적 가르침을 담은 말 → 설교·훈계로 고착 > 목사가 성경을 들고 강단에서 설교하는 장면이 원형'},
{n:1641,w:'catchy',m:'a. ① 재미있어 외우기 쉬운 ② 함정이 있는',s:'memorable, unforgettable, catch, trappy, tricky',r:'catch (잡다) + -y → 주의를 잡아당기는 → 기억하기 쉬운·흥미로운으로 고착 > 한번 듣고 머릿속에 맴도는 노래의 장면이 원형'},
{n:1642,w:'premise',m:'n. ① 전제 ② 토지, 집과 대지',s:'assumption, postulation',r:'라틴어 praemissa (set before, 미리 놓은) → 결론 전에 놓인 것 → 전제·건물의 부지로 고착 > 논증을 위해 처음에 세우는 전제의 장면이 원형'},
{n:1643,w:'interchange',m:'v. 주고받다, 교환하다 / n. ① 교환; 교체 ② 인터체인지, 분기점',s:'barter, exchange, reciprocate, swap, give-and-take, reciprocation, switch, alternation, intersection, junction',r:'inter (between) + change (바꾸다) → 사이에서 바꾸다 → 교환하다·교차로로 고착 > 두 고속도로가 만나는 입체 교차로의 장면이 원형'},
{n:1644,w:'cooperation',m:'n. ① 협력, 협조, 협업 ② 협동조합',s:'coaction, collaboration, cooperative, co-op',r:'라틴어 co (together) + operari (work, 일하다) → 함께 일하다 → 협력·협조로 고착 > 여러 사람이 함께 힘을 모아 일하는 장면이 원형'},
{n:1645,w:'helluva',m:'a. ① 대단한 ② 지독한 ③ 굉장히 좋은 / ad. 대단히; 지나치게',s:'excessively, very',r:'hell of a (대단한) → 지옥 같을 만큼 엄청난 → 대단한·굉장한으로 고착 > 깜짝 놀랄 만큼 대단한 장면이 원형'},
{n:1646,w:'espionage',m:'n. 스파이 행위, 첩보 활동',s:'intelligence, spying',r:'프랑스어 espion (spy, 스파이) → 스파이 활동 → 간첩 활동·스파이 행위로 고착 > 비밀 정보를 빼내는 스파이의 장면이 원형'},
{n:1647,w:'roam',m:'v. 돌아다니다, 배회하다',s:'ramble, saunter, stroll, wander',r:'고대 영어 romian (wander, 방랑하다) → 정처 없이 돌아다니다 → 방랑하다·배회하다로 고착 > 지도도 없이 이리저리 자유롭게 다니는 장면이 원형'},
{n:1648,w:'alloy',m:'n. 합금 / vt. ① 합금하다 ② 품질을 떨어뜨리다',s:'blend, mix, adulterate, debase',r:'라틴어 ad (to) + ligare (bind, 묶다) → 함께 묶어 섞다 → 합금·혼합하다로 고착 > 두 금속을 용광로에서 녹여 섞는 장면이 원형'},
{n:1649,w:'cul-de-sac',m:'n. 막다른 골목; 궁지, 곤경',s:'dead end, impasse',r:'프랑스어 cul (bottom, 바닥) + de (of) + sac (bag, 자루) → 자루 바닥처럼 막힌 길 → 막다른 골목으로 고착 > 끝이 막혀 되돌아나와야 하는 길의 장면이 원형'},
{n:1650,w:'vapid',m:'a. ① 맛없는, 김빠진 ② 지루한, 재미없는',s:'flat, insipid, boring, dull, uninteresting',r:'라틴어 vapidus (flat, 맛 없는) → 맛없이 밍밍한 → 재미없는·활기 없는으로 고착 > 아무 내용도 흥미도 없는 대화의 장면이 원형'},
{n:1651,w:'fortify',m:'v. ① 요새화하다 ② 강화하다, 튼튼히 하다',s:'reinforce, strengthen',r:'라틴어 fortis (strong, 강한) + -fy → 강하게 만들다 → 요새화하다·강화하다로 고착 > 성벽에 방어 시설을 더하는 장면이 원형'},
{n:1652,w:'imbecile',m:'a. 정신박약의, 저능한; 어리석은 / n. 얼간이',s:'feeble-minded, half-witted, silly, stupid, bean-head, cretin, ditz',r:'라틴어 imbecillus (weak, 약한) → 정신이 약한 → 바보·정신 박약자로 고착 > 판단력이 부족해 어리석은 행동을 반복하는 장면이 원형'},
{n:1653,w:'aphasia',m:'n. 실어증(失語症)',s:'',r:'그리스어 a (not) + phasis (speech, 말) → 말을 못 하는 상태 → 실어증으로 고착 > 뇌 손상으로 말을 이해하거나 표현하지 못하는 장면이 원형'},
{n:1654,w:'supersede',m:'vt. 대신하다, 대체하다',s:'displace, replace, substitute, supplant',r:'라틴어 super (above) + sedere (sit, 앉다) → 위에 앉다 → 대체하다·대신하다로 고착 > 새 제품이 기존 것을 완전히 밀어내는 장면이 원형'},
{n:1655,w:'distinct',m:'a. ① 별개의, 다른 ② 뚜렷한, 명료한; 명확한',s:'different, separate, apparent, definite, obvious',r:'라틴어 distinguere (separate, 구별하다) → 구별되는 → 명확한·뚜렷한으로 고착 > 흑과 백처럼 뚜렷이 구분되는 장면이 원형'},
{n:1656,w:'relic',m:'n. ① 유물, 유적; 잔재 ② 유골, 유물, 성물; 유품',s:'artifact, monument, remains, remnant, keepsake, memento, souvenir',r:'라틴어 reliquiae (remains, 유해) → 남겨진 것 → 유물·유품으로 고착 > 박물관에 전시된 오래된 유물의 장면이 원형'},
{n:1657,w:'prevent',m:'v. 막다, 방해하다; 예방하다',s:'',r:'라틴어 prae (before) + venire (come, 오다) → 미리 오다 → 예방하다·막다로 고착 > 나쁜 일이 생기기 전에 먼저 막는 장면이 원형'},
{n:1658,w:'craven',m:'a. 겁 많은, 비겁한 / n. 겁쟁이, 소심한 사람',s:'cowardly, dastardly, pusillanimous, timid, chicken, coward, poltroon',r:'고대 프랑스어 cravanter (crush, 눌리다) → 눌려 굴복한 → 겁쟁이·비겁한으로 고착 > 위험 앞에서 뒤로 물러서는 장면이 원형'},
{n:1659,w:'strife',m:'n. ① 투쟁, 쟁의 ② 갈등, 불화, 반목',s:'battle, clash, combat, struggle, conflict, discord, dissension',r:'고대 프랑스어 estriver (quarrel, 다투다) → 지속적인 다툼 → 분쟁·불화로 고착 > 이해 충돌로 계속 싸우는 장면이 원형'},
{n:1660,w:'accede',m:'vi. ① 동의하다, 응하다[to] ② 오르다, 취임하다[to]',s:'agree, assent, consent, succeed',r:'라틴어 ac (to) + cedere (go, 가다) → ~로 나아가다 → 동의하다·취임하다로 고착 > 요청에 마침내 동의하는 장면이 원형'},
{n:1661,w:'emission',m:'n. ① 방출, 배출 ② 배기가스',s:'discharge, release',r:'라틴어 emittere (send out, 내보내다) → 밖으로 내보내는 것 → 배출·방출로 고착 > 공장 굴뚝에서 가스가 배출되는 장면이 원형'},
{n:1662,w:'disparage',m:'vt. 헐뜯다, 비방하다, 폄하하다',s:'belittle, decry, denigrate, derogate, diminish',r:'고대 프랑스어 desparagier (marry unequally, 낮은 위치와 결혼시키다) → 지위를 낮추다 → 얕잡아보다·비하하다로 고착 > 상대를 하찮게 깎아내리는 장면이 원형'},
{n:1663,w:'chore',m:'n. 지루한 일; 잡일, 허드렛일',s:'housework, routine',r:'고대 영어 cerr (turn, 차례) → 차례로 돌아오는 집안일 → 허드렛일·잡일로 고착 > 매일 반복하는 집안일의 장면이 원형'},
{n:1664,w:'noisome',m:'a. ① 불쾌한, 역겨운, 고약한 ② 건강에 나쁜, 해로운',s:'disgusting, fetid, malodorous, harmful, mischievous, pernicious, unhealthy',r:'고대 영어 noy (harm, 해) → 역겨운 냄새로 해를 끼치는 → 불쾌한·해로운으로 고착 > 코를 막지 않을 수 없는 역한 냄새의 장면이 원형'},
{n:1665,w:'concept',m:'n. 개념, 관념, 사상, 생각',s:'conception, idea, notion, sense, thought',r:'라틴어 concipere (conceive, 잉태하다) → 마음속에 품어 만든 것 → 개념·아이디어로 고착 > 머릿속에서 새로운 생각이 탄생하는 장면이 원형'},
{n:1666,w:'buff',m:'n. ① ~광, 애호가 ② 담황색 / v. 충격을 완화하다, 완충기 역할을 하다',s:'aficionado, devotee, enthusiast, fanatic, cushion',r:'이탈리아어 buflare (polish with buff, 버프로 닦다) → 부드러운 가죽으로 닦다 → 열성팬·닦다로 고착 > 자동차를 열심히 광내며 닦는 장면이 원형'},
{n:1667,w:'develop',m:'v. ① 성장하다, 발달하다; 개발하다 ② 생기다; 변하다 ③ 현상하다',s:'',r:'고대 프랑스어 desveloper (unwrap, 풀다) → 감싸진 것을 펼치다 → 개발하다·발전하다로 고착 > 씨앗이 싹트고 자라나는 장면이 원형'},
{n:1668,w:'prolix',m:'a. 지루한, 장황한',s:'redundant, verbose, wordy',r:'라틴어 prolixus (poured forth, 흘러나온) → 넘쳐 흐르듯 길게 늘어진 → 장황한·말이 많은으로 고착 > 요점 없이 길게 이야기하는 장면이 원형'},
{n:1669,w:'mortician',m:'n. 장의사',s:'undertaker',r:'라틴어 mors (death, 죽음) + -ician → 죽음을 다루는 사람 → 장의사로 고착 > 시신을 정성껏 준비해 장례를 치르는 장면이 원형'},
{n:1670,w:'rescind',m:'vt. (법률·계약 등을) 폐제[폐기, 철회]하다',s:'annul, repeal, revoke',r:'라틴어 re (back) + scindere (cut, 자르다) → 되잘라 취소하다 → 취소하다·철회하다로 고착 > 이미 한 결정을 공식 철회하는 장면이 원형'},
{n:1671,w:'tribe',m:'n. ① 부족, 종족 ② 집단[무리]',s:'clan, race, crowd, group',r:'라틴어 tribus (division of the Roman people, 로마인 구분) → 같은 혈통으로 나뉜 집단 → 부족·씨족으로 고착 > 같은 조상을 둔 사람들이 모여 사는 장면이 원형'},
{n:1672,w:'covert',m:'a. 비밀의, 은밀한, 암암리의',s:'clandestine, undercover',r:'라틴어 cooperire (cover, 덮다) → 덮여 숨겨진 → 은밀한·비밀의로 고착 > 발각되지 않게 숨어서 하는 작전의 장면이 원형'},
{n:1673,w:'gesticulate',m:'v. 몸짓[손짓]으로 이야기하다',s:'gesture, motion, pantomime',r:'라틴어 gesticulari (make gestures, 몸짓하다) → 몸짓으로 표현하다 → 손짓 발짓하다로 고착 > 말 대신 손과 팔을 크게 움직여 표현하는 장면이 원형'},
{n:1674,w:'avaricious',m:'a. 탐욕스러운, 욕심 많은',s:'acquisitive, desirous, grabby, greedy',r:'라틴어 avarus (greedy, 탐욕스러운) + -ious → 탐욕스러운 성질 → 탐욕스러운으로 고착 > 이미 충분한데 더 원하는 장면이 원형'},
{n:1675,w:'mite',m:'n. ① 약간, 조금 ② 진드기',s:'tick',r:'고대 영어 mite (small coin, 작은 동전) → 아주 작은 것 → 진드기·아주 조금으로 고착 > 눈에 보이지 않을 만큼 작은 존재의 장면이 원형'},
{n:1676,w:'shear',m:'v. ① 베다, 잘라내다; 깎다 ② 빼앗다, 박탈하다[of]',s:'clip, fleece, shave, trim, deprive, divest',r:'고대 영어 sceran (cut, 자르다) → 가위로 자르다 → 전단하다·깎다로 고착 > 양의 털을 가위로 잘라내는 장면이 원형'},
{n:1677,w:'infraction',m:'n. 위반, 침해',s:'breach, infringement, violation',r:'라틴어 infringere (break, 깨다) → 규칙을 깨뜨리다 → 위반·침해로 고착 > 규칙을 어겨 위반 딱지를 받는 장면이 원형'},
{n:1678,w:'outgoing',m:'a. ① 사교적인, 외향적인 ② 나가는, 떠나는; 은퇴하는',s:'extrovert, open, sociable, departing, retiring',r:'out (밖으로) + going (가는) → 밖으로 나가는 → 외향적인·사교적인으로 고착 > 처음 만난 사람과도 금방 친해지는 장면이 원형'},
{n:1679,w:'extol',m:'vt. 칭찬하다, 칭송하다, 찬양하다, 격찬하다',s:'admire, exalt, laud, praise',r:'라틴어 ex (out) + tollere (lift, 들어올리다) → 높이 들어올려 칭찬하다 → 극찬하다·찬양하다로 고착 > 최고라며 열렬히 치켜세우는 장면이 원형'},
{n:1680,w:'battalion',m:'n. 대대; 전투 대형을 갖춘 군대',s:'',r:'이탈리아어 battaglione (large battle, 큰 전투) → 전투 단위의 군사 집단 → 대대·군단으로 고착 > 수백 명의 병사가 대열을 이루는 장면이 원형'},

{n:1682,w:'homage',m:'n. 경의, 존경; 충성',s:'deference, respect, reverence',r:'라틴어 homo (man, 사람) → 주군에 대한 신하의 경의 → 경의·존경으로 고착 > 왕 앞에 무릎을 꿇고 경의를 표하는 장면이 원형'},
{n:1683,w:'lurk',m:'vi. ① 숨다, 잠복하다 ② 남몰래 가다 ③ 읽기만 하다',s:'hide, skulk, slink, sneak',r:'고대 영어 lurcan (lurk, 숨다) → 눈에 띄지 않게 숨어있다 → 숨어있다·도사리다로 고착 > 어둠 속에서 기회를 엿보며 숨어있는 장면이 원형'},
{n:1684,w:'enclave',m:'n. ① 고립된 영토 ② 소수 민족 거주지; 고립된 지역',s:'',r:'프랑스어 enclave (enclosed territory, 둘러싸인 영토) → 다른 영토에 둘러싸인 지역 → 고립된 지역·비밀 집단으로 고착 > 타국 영토에 둘러싸인 작은 나라의 장면이 원형'},

{n:1691,w:'utensil',m:'n. 가정용품, 부엌세간, 가구, 도구',s:'implement, tool',r:'라틴어 utensilia (necessary tools, 필요한 도구) → 필요한 도구들 → 기구·도구로 고착 > 부엌에서 요리할 때 쓰는 각종 도구의 장면이 원형'},

{n:1701,w:'vindictive',m:'a. 복수심이 있는, 원한[앙심]을 품은',s:'retaliatory, revengeful',r:'라틴어 vindicta (revenge, 복수) → 복수심으로 가득한 → 앙심을 품은·복수심이 강한으로 고착 > 상처를 잊지 않고 복수를 다짐하는 장면이 원형'},
{n:1702,w:'burlesque',m:'v. 희화화하다; 흉내 내다 / n. 풍자시, 풍자적 희곡',s:'imitate, mimic, mock / farce, lampoon, satire',r:'이탈리아어 burlesco (comic, 익살스러운) → 과장된 익살 → 해학적 풍자·우스꽝스러운으로 고착 > 진지한 것을 과장하여 우스꽝스럽게 만드는 장면이 원형'},

{n:1704,w:'ad hoc',m:'a. 특별한 목적을 위한, 특별한; 임시의; 이 문제에 국한한 / ad. 특별한 목적을 위해, 특별히; 임시로',s:'makeshift, provisional, temporary',r:'라틴어 ad hoc (for this purpose, 이 목적으로) → 특정 목적만을 위한 → 임시의·특별한 목적을 위한으로 고착 > 특정 문제만 해결하려고 즉흥적으로 만든 위원회의 장면이 원형'},

{n:1706,w:'instill',m:'vt. ① (사상 등을) 가르치다, 주입시키다, 심어주다 ② ~을 한 방울씩 떨어뜨리다, 점적하다',s:'imbue, inculcate, infuse / drip, trickle',r:'라틴어 in (into) + stillare (drip, 방울방울 떨어지다) → 방울방울 들이붓다 → 서서히 주입하다로 고착 > 사상이나 가치관을 천천히 심어주는 장면이 원형'},
{n:1707,w:'locomotion',m:'n. ① 이동, 운동 ② 교통기관',s:'movement',r:'라틴어 loco (place, 장소) + motio (movement, 움직임) → 장소를 바꾸는 움직임 → 이동·운동으로 고착 > 기차가 선로 위를 달리는 장면이 원형'},
{n:1708,w:'matter',m:'n. ① 물질; 물체 ② 내용; 제재, 주제 ③ 문제, 일, 사안; 사건 ④ 상황, 사태, 사정 / vi. 중요하다',s:'material, stuff / content / affair, case, concern / circumstances / count',r:'라틴어 materia (material, 재료) → 재료·소재 → 물질·중요하다로 고착 > 우주를 이루는 물질의 장면이 원형'},
{n:1709,w:'palsy',m:'n. 중풍, 마비, 마비상태',s:'paralysis',r:'그리스어 paralysis (paralysis, 마비) → 신경 마비로 떨리는 것 → 중풍·마비로 고착 > 손이 계속 떨리며 통제가 안 되는 장면이 원형'},
{n:1710,w:'cunning',m:'a. ① 교활한, 약삭빠른 ② 정교한 / n. 교활함, 간계',s:'artful, crafty, wily / elaborate, ingenious / craftiness, slyness',r:'고대 영어 cunnian (know, 알다) → 아는 것을 이용하는 → 교활한·영리한으로 고착 > 상대방이 눈치채지 못하게 교묘히 이용하는 장면이 원형'},

{n:1713,w:'squirt',m:'v. ① 분출하다, 뿜어 나오다 ② 쏘다, 뿜어서 적시다 / n. 분출; 분사기, 물총; 애송이, 풋내기',s:'erupt, gush, jet, spurt',r:'중세 영어 squirten (squirt, 뿜다) → 좁은 구멍으로 세게 내뿜다 → 뿜다·물줄기를 쏘다로 고착 > 물총에서 물이 세차게 뿜어지는 장면이 원형'},
{n:1714,w:'inconceivable',m:'a. 상상[생각]도 할 수 없는; 믿을 수 없는',s:'impossible, incredible, unimaginable',r:'in (not) + conceive (생각하다) + -able → 생각할 수 없는 → 상상할 수 없는·믿기 어려운으로 고착 > 상상조차 할 수 없는 일이 벌어진 장면이 원형'},
