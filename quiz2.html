<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVP Vol.2 단어 퀴즈 — 사지선다</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f1a;
    --surface: #161927;
    --surface2: #1e2235;
    --border: #262c45;
    --accent: #7c6af7;
    --accent2: #c084fc;
    --accent-glow: #7c6af733;
    --green: #34d399;
    --green-bg: #34d39918;
    --red: #f87171;
    --red-bg: #f8717118;
    --yellow: #fbbf24;
    --text: #eef0f8;
    --muted: #7b82a8;
    --radius: 14px;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

  /* HEADER */
  .header { width: 100%; background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 17px; font-weight: 800; letter-spacing: -0.4px; }
  .logo span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header-sub { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  /* HOME */
  .page { width: 100%; max-width: 860px; padding: 36px 24px; }
  .page-title { font-size: 26px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
  .page-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

  .set-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .set-btn {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 16px; padding: 22px 16px 18px;
    cursor: pointer; color: var(--text); font-family: 'Inter', sans-serif;
    transition: all 0.15s; text-align: center; position: relative; overflow: hidden;
  }
  .set-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--accent)0a, transparent); opacity: 0; transition: opacity 0.2s; }
  .set-btn:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent-glow); }
  .set-btn:hover::before { opacity: 1; }
  .set-n { font-size: 22px; font-weight: 800; font-family: 'JetBrains Mono', monospace; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; display: block; margin-bottom: 4px; }
  .set-r { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; }
  .set-count { font-size: 11px; color: var(--border); display: block; }
  .set-score { font-size: 12px; font-weight: 700; display: block; margin-top: 6px; }
  .set-btn.done { border-color: var(--green)55; }
  .set-btn.done .set-n { background: linear-gradient(135deg, var(--green), #6ee7b7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

  /* QUIZ */
  .quiz-page { width: 100%; max-width: 700px; padding: 28px 20px; display: none; }
  .top-bar { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
  .back-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 7px 14px; color: var(--muted); font-size: 13px; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s; flex-shrink: 0; }
  .back-btn:hover { color: var(--text); border-color: var(--muted); }
  .prog-wrap { flex: 1; }
  .prog-bar { height: 5px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-bottom: 5px; }
  .prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width 0.4s ease; }
  .prog-text { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  .chips { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 20px; }
  .chip { font-size: 12px; font-family: 'JetBrains Mono', monospace; font-weight: 700; padding: 5px 12px; border-radius: 99px; }
  .chip-o { background: var(--green-bg); color: var(--green); }
  .chip-x { background: var(--red-bg); color: var(--red); }
  .chip-n { background: var(--surface2); color: var(--muted); }

  /* Q CARD */
  .q-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px; padding: 48px 32px 40px; text-align: center; margin-bottom: 20px; position: relative; }
  .q-badge { position: absolute; top: 16px; left: 18px; font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--muted); background: var(--surface2); padding: 3px 9px; border-radius: 6px; }
  .q-num { font-size: 13px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-bottom: 14px; }
  .q-word { font-size: 54px; font-weight: 800; letter-spacing: -2px; background: linear-gradient(135deg, #fff 20%, var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 6px; line-height: 1; }
  .q-label { font-size: 13px; color: var(--muted); }

  /* CHOICES */
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .choice-btn { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px 18px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 14px; color: var(--text); text-align: left; line-height: 1.5; transition: all 0.15s; display: flex; align-items: flex-start; gap: 10px; min-height: 68px; }
  .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--surface2); transform: translateY(-1px); }
  .choice-label { font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--muted); background: var(--surface2); padding: 2px 7px; border-radius: 5px; flex-shrink: 0; margin-top: 1px; }
  .choice-btn.correct { border-color: var(--green); background: var(--green-bg); animation: pulse-g 0.3s ease; }
  .choice-btn.correct .choice-label { background: var(--green); color: #000; }
  .choice-btn.wrong { border-color: var(--red); background: var(--red-bg); animation: shake 0.3s ease; }
  .choice-btn.wrong .choice-label { background: var(--red); color: #fff; }
  .choice-btn:disabled { cursor: default; }

  @keyframes pulse-g { 0%{transform:scale(1)} 50%{transform:scale(1.015)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

  .feedback { min-height: 40px; text-align: center; font-size: 14px; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
  .feedback.show { opacity: 1; }
  .feedback.fb-o { color: var(--green); }
  .feedback.fb-x { color: var(--red); }

  .next-btn { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: var(--radius); padding: 15px; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s; display: none; letter-spacing: -0.2px; }
  .next-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .next-btn.visible { display: block; animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .kbd-hint { text-align: center; font-size: 11px; color: var(--border); margin-top: 10px; font-family: 'JetBrains Mono', monospace; }

  /* COMPLETE */
  .complete-page { display: none; width: 100%; max-width: 600px; padding: 48px 24px; text-align: center; }
  .big-pct { font-size: 88px; font-weight: 800; font-family: 'JetBrains Mono', monospace; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin-bottom: 10px; }
  .complete-title { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
  .complete-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .complete-stats { display: flex; gap: 12px; justify-content: center; margin-bottom: 28px; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 28px; flex: 1; max-width: 140px; }
  .stat-val { font-size: 32px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .s-o .stat-val { color: var(--green); }
  .s-x .stat-val { color: var(--red); }
  .action-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 28px; }
  .btn-act { border: none; border-radius: var(--radius); padding: 13px 28px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .btn-retry { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .btn-retry:hover { filter: brightness(1.1); }
  .btn-home-act { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-home-act:hover { border-color: var(--muted); }

  .wrong-section { text-align: left; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .wrong-section h3 { font-size: 13px; color: var(--red); font-weight: 700; margin-bottom: 14px; }
  .wrong-row { display: flex; gap: 14px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; align-items: flex-start; }
  .wrong-row:last-child { border-bottom: none; }
  .wr-word { font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--text); min-width: 140px; }
  .wr-meaning { color: var(--muted); line-height: 1.55; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">MVP <span>Vol.2</span> 단어 퀴즈</div>
  <div class="header-sub">4지선다 · 400 words · 8세트</div>
</div>

<!-- HOME -->
<div class="page" id="pageHome">
  <div class="page-title">세트 선택</div>
  <div class="page-sub">각 세트 50개 · 총 8세트 (0601~1000번)</div>
  <div class="set-grid" id="setGrid"></div>
</div>

<!-- QUIZ -->
<div class="quiz-page" id="pageQuiz">
  <div class="top-bar">
    <button class="back-btn" onclick="goHome()">← 목록</button>
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      <div class="prog-text" id="progText">0 / 50</div>
    </div>
  </div>
  <div class="chips">
    <div class="chip chip-o" id="cO">O 0</div>
    <div class="chip chip-x" id="cX">X 0</div>
    <div class="chip chip-n" id="cN">남은 50</div>
  </div>
  <div class="q-card">
    <div class="q-badge" id="qBadge">Set 1 · 1/50</div>
    <div class="q-num" id="qNum">#0601</div>
    <div class="q-word" id="qWord">word</div>
    <div class="q-label">이 단어의 뜻은?</div>
  </div>
  <div class="choices" id="choices"></div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQ()">다음 문제 →</button>
  <div class="kbd-hint">키보드: 1 2 3 4 선택 · Enter 다음</div>
</div>

<!-- COMPLETE -->
<div class="complete-page" id="pageComplete">
  <div class="big-pct" id="bigPct">0%</div>
  <div class="complete-title" id="completeTitle">완료!</div>
  <div class="complete-sub" id="completeSub"></div>
  <div class="complete-stats">
    <div class="stat-box s-o"><div class="stat-val" id="statO">0</div><div class="stat-lbl">정답</div></div>
    <div class="stat-box s-x"><div class="stat-val" id="statX">0</div><div class="stat-lbl">오답</div></div>
  </div>
  <div class="action-row">
    <button class="btn-act btn-retry" onclick="retrySet()">다시 풀기</button>
    <button class="btn-act btn-home-act" onclick="goHome()">목록으로</button>
  </div>
  <div class="wrong-section" id="wrongSection" style="display:none">
    <h3>✗ 틀린 단어</h3>
    <div id="wrongItems"></div>
  </div>
</div>

<script>

const SET_SIZE = 50;
const SETS = [];
for (let i = 0; i < WORDS.length; i += SET_SIZE) SETS.push(WORDS.slice(i, i + SET_SIZE));

let curSet = 0, curIdx = 0, cO = 0, cX = 0;
let wrongWords = [], answered = false;
let curChoices = [], curCorrect = 0;
let scores = JSON.parse(localStorage.getItem('mvp_vol2_scores') || '{}');

function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

function pickDistractors(correct, n) {
  const used = new Set([correct.num]);
  const out = [];
  while (out.length < n) {
    const r = WORDS[Math.floor(Math.random() * WORDS.length)];
    if (!used.has(r.num)) { used.add(r.num); out.push(r); }
  }
  return out;
}

function buildGrid() {
  const g = document.getElementById('setGrid');
  g.innerHTML = '';
  SETS.forEach((set, i) => {
    const btn = document.createElement('button');
    btn.className = 'set-btn' + (scores[i] !== undefined ? ' done' : '');
    const s = set[0].num, e = set[set.length-1].num;
    const sc = scores[i] !== undefined
      ? `<span class="set-score" style="color:${scores[i]>=80?'var(--green)':'var(--yellow)'}">${scores[i]}% 정답</span>` : '';
    btn.innerHTML = `<span class="set-n">Set ${i+1}</span><span class="set-r">#${s} ~ #${e}</span><span class="set-count">${set.length}개</span>${sc}`;
    btn.onclick = () => startSet(i);
    g.appendChild(btn);
  });
}

function startSet(idx) {
  curSet = idx; curIdx = 0; cO = 0; cX = 0; wrongWords = []; answered = false;
  show('pageQuiz');
  loadQ();
}

function loadQ() {
  answered = false;
  const set = SETS[curSet];
  const total = set.length;
  const w = set[curIdx];

  document.getElementById('qBadge').textContent = `Set ${curSet+1}  ·  ${curIdx+1}/${total}`;
  document.getElementById('qNum').textContent = `#${String(w.num).padStart(4,'0')}`;
  document.getElementById('qWord').textContent = w.word;
  document.getElementById('progFill').style.width = (curIdx / total * 100) + '%';
  document.getElementById('progText').textContent = `${curIdx} / ${total}`;
  document.getElementById('cO').textContent = `O ${cO}`;
  document.getElementById('cX').textContent = `X ${cX}`;
  document.getElementById('cN').textContent = `남은 ${total - curIdx}`;

  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.textContent = '';
  document.getElementById('nextBtn').classList.remove('visible');

  const distractors = pickDistractors(w, 3);
  const choices = shuffle([w, ...distractors]);
  curChoices = choices;
  curCorrect = choices.findIndex(c => c.num === w.num);

  const container = document.getElementById('choices');
  container.innerHTML = '';
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-label">${i+1}</span><span>${c.short}</span>`;
    btn.onclick = () => select(i);
    container.appendChild(btn);
  });
}

function select(idx) {
  if (answered) return;
  answered = true;
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);
  const ok = idx === curCorrect;
  btns[idx].classList.add(ok ? 'correct' : 'wrong');
  if (!ok) btns[curCorrect].classList.add('correct');
  const fb = document.getElementById('feedback');
  if (ok) { cO++; fb.textContent = '✓ 정답!'; fb.className = 'feedback show fb-o'; }
  else { cX++; wrongWords.push(SETS[curSet][curIdx]); fb.textContent = `✗ 정답: ${curChoices[curCorrect].short}`; fb.className = 'feedback show fb-x'; }
  document.getElementById('cO').textContent = `O ${cO}`;
  document.getElementById('cX').textContent = `X ${cX}`;
  document.getElementById('nextBtn').classList.add('visible');
}

function nextQ() {
  curIdx++;
  if (curIdx >= SETS[curSet].length) showComplete();
  else loadQ();
}

function showComplete() {
  const total = SETS[curSet].length;
  const pct = Math.round(cO / total * 100);
  scores[curSet] = pct;
  localStorage.setItem('mvp_vol2_scores', JSON.stringify(scores));
  document.getElementById('bigPct').textContent = pct + '%';
  document.getElementById('completeTitle').textContent = pct===100?'완벽! 🎉':pct>=80?'잘했어! 👏':'계속 연습하자 💪';
  document.getElementById('completeSub').textContent = `Set ${curSet+1} 완료 · ${total}문제 중 ${cO}개 정답`;
  document.getElementById('statO').textContent = cO;
  document.getElementById('statX').textContent = cX;
  if (wrongWords.length > 0) {
    document.getElementById('wrongSection').style.display = 'block';
    document.getElementById('wrongItems').innerHTML = wrongWords.map(w =>
      `<div class="wrong-row"><span class="wr-word">#${String(w.num).padStart(4,'0')} ${w.word}</span><span class="wr-meaning">${w.short}</span></div>`
    ).join('');
  } else {
    document.getElementById('wrongSection').style.display = 'none';
  }
  show('pageComplete');
}

function retrySet() { startSet(curSet); }
function goHome() { show('pageHome'); buildGrid(); }

function show(id) {
  ['pageHome','pageQuiz','pageComplete'].forEach(p => {
    document.getElementById(p).style.display = p === id ? 'block' : 'none';
  });
}

document.addEventListener('keydown', e => {
  if (document.getElementById('pageQuiz').style.display !== 'block') return;
  if (['1','2','3','4'].includes(e.key)) select(parseInt(e.key) - 1);
  if (e.key === 'Enter' && answered) nextQ();
});

buildGrid();
</script>
</body>
</html>
