<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVP 퀴즈 1001~2000</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{color:#e94560;margin-bottom:8px;font-size:1.4em}
.subtitle{color:#aaa;font-size:.85em;margin-bottom:20px}
.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
select,button{padding:8px 14px;border-radius:8px;border:none;font-size:.9em;cursor:pointer}
select{background:#16213e;color:#eee;border:1px solid #e94560}
button{background:#e94560;color:#fff;font-weight:bold}
button:hover{background:#c73652}
.btn-secondary{background:#0f3460!important}
.btn-secondary:hover{border:1px solid #4ecca3!important}
#scoreBar{background:#16213e;border-radius:12px;padding:10px 20px;margin-bottom:16px;font-size:.9em;color:#4ecca3;width:100%;max-width:480px;text-align:center}
#qBox{background:#16213e;border-radius:16px;padding:24px;width:100%;max-width:480px;margin-bottom:16px}
#qNum{color:#888;font-size:.8em;margin-bottom:6px}
#qWord{font-size:1.6em;font-weight:bold;color:#fff;margin-bottom:6px}
.q-label{color:#aaa;font-size:.82em;margin-bottom:16px}
#choiceBox{display:flex;flex-direction:column;gap:10px}
.choice{background:#0f3460;border:2px solid #0f3460;border-radius:10px;padding:12px 16px;cursor:pointer;font-size:.85em;line-height:1.5;text-align:left;transition:border-color .15s}
.choice:hover{border-color:#e94560}
.choice.correct{background:#1a4731!important;border-color:#4ecca3!important;color:#4ecca3!important;cursor:default}
.choice.wrong{background:#3d1a1a!important;border-color:#e94560!important;color:#e94560!important;cursor:default}
.choice.reveal{background:#1a4731!important;border-color:#4ecca3!important;color:#4ecca3!important;cursor:default}
#feedback{margin-top:12px;font-size:.85em;min-height:20px;color:#f0a500}
#extraInfo{display:none;margin-top:12px;padding:10px 14px;background:#0a2040;border-radius:10px;border-left:3px solid #4ecca3}
.extra-syn{font-size:.78em;color:#4ecca3;margin-bottom:5px;line-height:1.4}
.extra-syn::before{content:'동의어: ';font-weight:bold}
.extra-root{font-size:.78em;color:#f0a500;line-height:1.4}
.extra-root::before{content:'어원: ';font-weight:bold}
#navBox{display:flex;gap:14px;align-items:center;margin-top:10px}
#navBox button{padding:10px 22px;font-size:1em}
#qCnt{color:#aaa;font-size:.9em;min-width:80px;text-align:center}
#resultBox{background:#16213e;border-radius:16px;padding:30px;text-align:center;max-width:480px;width:100%;display:none}
#resultBox h2{color:#4ecca3;font-size:1.4em;margin-bottom:12px}
#resultScore{font-size:2.5em;font-weight:bold;color:#e94560;margin-bottom:8px}
#resultMsg{color:#aaa;margin-bottom:20px}
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
#wrongBox{background:#16213e;border-radius:16px;padding:24px;max-width:480px;width:100%;display:none;margin-top:16px}
#wrongBox h3{color:#e94560;margin-bottom:16px;font-size:1.1em}
.wrong-item{border-bottom:1px solid #0f3460;padding:14px 0}
.wrong-item:last-child{border-bottom:none}
.wrong-num{font-size:.75em;color:#888;margin-bottom:3px}
.wrong-word{font-size:1.1em;font-weight:bold;color:#fff;margin-bottom:5px}
.wrong-syn{font-size:.78em;color:#4ecca3;margin-bottom:3px;line-height:1.4}
.wrong-syn::before{content:'동의어: ';font-weight:bold}
.wrong-root{font-size:.78em;color:#f0a500;margin-bottom:6px;line-height:1.4}
.wrong-root::before{content:'어원: ';font-weight:bold}
.wrong-mine{font-size:.82em;color:#e94560;margin-bottom:3px}
.wrong-mine::before{content:'내 답: ';font-weight:bold}
.wrong-ans{font-size:.82em;color:#4ecca3}
.wrong-ans::before{content:'정답: ';font-weight:bold}
</style>
</head>
<body>
<h1>MVP 단어장 사지선다 퀴즈</h1>
<p class="subtitle">1001~2000번 · 1000단어 · 50문제씩 20세트</p>
<div class="controls">
  <select id="setSelect">
<option value="1">세트 1 (1001~1050번)</option>
<option value="2">세트 2 (1051~1100번)</option>
<option value="3">세트 3 (1101~1150번)</option>
<option value="4">세트 4 (1151~1200번)</option>
<option value="5">세트 5 (1201~1250번)</option>
<option value="6">세트 6 (1251~1300번)</option>
<option value="7">세트 7 (1301~1350번)</option>
<option value="8">세트 8 (1351~1400번)</option>
<option value="9">세트 9 (1401~1450번)</option>
<option value="10">세트 10 (1451~1500번)</option>
<option value="11">세트 11 (1501~1550번)</option>
<option value="12">세트 12 (1551~1600번)</option>
<option value="13">세트 13 (1601~1650번)</option>
<option value="14">세트 14 (1651~1700번)</option>
<option value="15">세트 15 (1701~1750번)</option>
<option value="16">세트 16 (1751~1800번)</option>
<option value="17">세트 17 (1801~1850번)</option>
<option value="18">세트 18 (1851~1900번)</option>
<option value="19">세트 19 (1901~1950번)</option>
<option value="20">세트 20 (1951~2000번)</option>
  </select>
  <button onclick="doShuffle()">🔀 섞기</button>
</div>
<div id="scoreBar">점수: 0 / 0 &nbsp;|&nbsp; 정답률: -</div>
<div id="qBox">
  <div id="qNum"></div>
  <div id="qWord"></div>
  <div class="q-label">이 단어의 뜻은?</div>
  <div id="choiceBox"></div>
  <div id="feedback"></div>
  <div id="extraInfo"></div>
</div>
<div id="navBox">
  <button onclick="goPrev()">◀ 이전</button>
  <span id="qCnt"></span>
  <button onclick="goNext()">다음 ▶</button>
</div>
<div id="resultBox">
  <h2>세트 완료! 🎉</h2>
  <div id="resultScore"></div>
  <p id="resultMsg"></p>
  <div class="result-btns">
    <button onclick="initSet(curSetIdx)">↺ 다시 풀기</button>
    <button id="wrongBtn" class="btn-secondary" onclick="showWrongList()">❌ 오답 보기</button>
  </div>
</div>
<div id="wrongBox">
  <h3>❌ 오답 목록</h3>
  <div id="wrongItems"></div>
</div>
<script>
const WORDS=[
{n:1001,w:'robust',m:'a. 튼튼한, 원기 왕성한, 팔팔한',r:'라틴어 robur (oak, 참나무) → 참나무처럼 튼튼한 → 튼튼한·원기 왕성한으로 고착 > 어떤 것도 꺾을 수 없는 단단한 장면이 원형',s:'vigorous, energetic, hearty, sturdy'},
{n:1002,w:'paralysis',m:'n. 마비, 불수(不隨); 중풍; (교통·거래 등의) 마비 상태, 정체',r:'그리스어 para (beside) + lysis (loosening, 풀림) → 신경이 풀려 기능을 잃은 → 마비·중풍으로 고착 > 신호가 차단되어 움직이지 못하는 장면이 원형',s:'paralysis, numbness, immobility, inability'},
{n:1003,w:'stately',m:'a. 당당한, 위엄 있는, 장중한',r:'state (위엄 있는 상태) + -ly → 위엄 있게 → 당당한·위엄 있는으로 고착 > 왕이 느린 걸음으로 위엄 있게 걷는 장면이 원형',s:'imposing, majestic, dignified, grand'},
{n:1004,w:'confiscate',m:'vt. 몰수[압수]하다, 징발하다',r:'라틴어 con (together) + fiscus (treasury, 국고) + -ate → 국고로 모으다 → 몰수하다·압수하다로 고착 > 세관원이 불법 물품을 압수하는 장면이 원형',s:'seize, confiscate, expropriate, impound'},
{n:1005,w:'duress',m:'n. 구속, 속박, 감금; 협박',r:'라틴어 durus (hard, 단단한) → 압박으로 자유를 제한하는 것 → 구속·협박으로 고착 > 협박으로 억지로 서명하게 만드는 장면이 원형',s:'coercion, compulsion, threat, intimidation'},
{n:1006,w:'intimidate',m:'vt. 위협하다, 협박하다',r:'라틴어 in (into) + timidus (timid, 겁많은) → 겁쟁이로 만들다 → 위협하다·협박하다로 고착 > 위압적인 분위기로 상대를 주눅들게 하는 장면이 원형',s:'frighten, threaten, bully, terrify'},
{n:1007,w:'stratum',m:'n. (암석 등의) 층, 지층, 단층; (사회) 계층',r:'라틴어 sternere (spread, 펼치다) → 펼쳐 쌓인 층 → 지층·사회 계층으로 고착 > 지질 절벽에 나타난 수천 년의 퇴적 지층의 장면이 원형',s:'layer, tier, level, stratum'},
{n:1008,w:'arduous',m:'a. 몹시 힘든, 고된',r:'라틴어 arduus (steep, 가파른) → 가파른 것처럼 힘든 → 몹시 힘든·고된으로 고착 > 무거운 짐을 지고 가파른 산을 오르는 장면이 원형',s:'difficult, challenging, strenuous, grueling'},
{n:1009,w:'exhort',m:'v. 열심히 권하다, 훈계하다',r:'라틴어 ex (out) + hortari (encourage, 격려하다) → 밖으로 격려하다 → 열심히 권하다·훈계하다로 고착 > 연설로 군중을 북돋아 행동하게 하는 장면이 원형',s:'urge, advise, encourage, counsel'},
{n:1010,w:'practically',m:'ad. 실제적으로, 실용적으로, 실제로; 사실상, 거의 ~나 다름없이',r:'라틴어 practicus (practical, 실제의) → 실제로 → 실제로·거의 ~나 다름없이로 고착 > 이론이 아닌 실제 현장에서 적용하는 장면이 원형',s:'essentially, effectively, nearly, almost'},
{n:1011,w:'submerge',m:'v. 물속에 가라앉히다[잠그다]; 물속에 잠기다',r:'라틴어 sub (under) + mergere (dip, 담그다) → 아래로 담그다 → 가라앉히다·잠기다로 고착 > 잠수함이 물속으로 사라지는 장면이 원형',s:'sink, immerse, plunge, dip'},
{n:1012,w:'cortege',m:'n. (집합적) 시종들, 수행원들; 행렬; (특히) 장례 행렬',r:'프랑스어 cortège (retinue, 수행원들) → 뒤따르는 행렬 → 시종들·장례 행렬로 고착 > 관을 뒤따르는 사람들의 엄숙한 행렬의 장면이 원형',s:'procession, parade, retinue, train'},
{n:1013,w:'synonym',m:'n. 동의어, 유의어',r:'그리스어 syn (together) + onoma (name, 이름) → 같은 이름처럼 같은 의미 → 동의어·유의어로 고착 > 같은 뜻을 가진 다른 단어들의 장면이 원형',s:'equivalent term, alternate name'},
{n:1014,w:'prune',m:'v. (가지·뿌리 등을) 잘라내다, 쳐내다; (불필요한 부분을) 제거하다 / n. 말린 자두',r:'라틴어 rotundus (round, 둥근) → 둥근 나뭇가지를 잘라내다 → 잘라내다·제거하다로 고착 > 정원사가 나무 가지를 잘라 정리하는 장면이 원형',s:'trim, cut back, clip, thin'},
{n:1015,w:'luxurious',m:'a. 사치스러운, 호사스러운; 사치에 빠진; 쾌락을 즐기는',r:'라틴어 luxuria (excess, 과잉) → 넘칠 만큼 풍요로운 → 사치스러운·호사스러운으로 고착 > 황금으로 장식된 화려한 방의 장면이 원형',s:'lavish, extravagant, opulent, sumptuous'},
{n:1016,w:'traverse',m:'v. 가로지르다, 횡단하다',r:'라틴어 trans (across) + vertere (turn, 돌다) → 가로질러 돌아가다 → 가로지르다·횡단하다로 고착 > 광야를 가로질러 걷는 장면이 원형',s:'cross, span, go across, navigate'},
{n:1017,w:'imply',m:'vt. 뜻하다, 의미하다; 암시하다, 넌지시 비치다',r:'라틴어 im (into) + plicare (fold, 접다) → 안으로 접어 담다 → 암시하다·의미하다로 고착 > 말 속에 다른 뜻이 숨겨진 장면이 원형',s:'suggest, hint, indicate, signify'},
{n:1018,w:'wordplay',m:'n. 재담, 재치 있는 말장난',r:'word (말) + play (놀이) → 말로 하는 놀이 → 재담·말장난으로 고착 > 같은 발음의 다른 의미를 활용한 재치 있는 장면이 원형',s:'pun, play on words, wit, humor'},
{n:1019,w:'cutting-edge',m:'a. 최첨단의',r:'cutting (자르는) + edge (날) → 가장 날카로운 끝 → 최첨단의로 고착 > 가장 앞선 기술의 최전선에 있는 장면이 원형',s:'advanced, pioneering, innovative, state-of-the-art'},
{n:1020,w:'brace',m:'v. 떠받치다, 강화하다; 대비하다, 마음의 준비를 하게 하다 / n. 버팀대, 지주(支柱)',r:'고대 프랑스어 bracier (embrace, 껴안다) → 버팀목으로 지지하다 → 떠받치다·버팀대로 고착 > 건물을 지지하는 강철 버팀대의 장면이 원형',s:'prepare, reinforce, steady, prop'},
{n:1021,w:'finite',m:'a. 한정[제한]되어 있는, 유한한',r:'라틴어 finitus (limited, 한정된) → 끝이 정해진 → 한정된·유한한으로 고착 > 끝이 정해진 숫자의 장면이 원형',s:'limited, bounded, restricted, measurable'},
{n:1022,w:'carriage',m:'n. (기차의) 객차; 마차; 탈것, 차; 유모차; 운반[수송]; 운반비[수송비]; 몸가짐, 자세',r:'고대 노르드어 kerja (transport, 운반하다) → 운반하는 것 → 마차·운반·몸가짐으로 고착 > 말이 끄는 우아한 마차의 장면이 원형',s:'vehicle, wagon, coach, car'},
{n:1023,w:'itinerant',m:'a. 순회하는, 떠돌이다니는',r:'라틴어 iter (journey, 여정) → 여정을 다니는 → 순회하는·떠돌이 다니는으로 고착 > 마을마다 다니며 공연하는 장면이 원형',s:'traveling, roving, mobile, wandering'},
{n:1024,w:'delve',m:'v. 탐구하다, 철저히 조사하다; (정보를 찾으려고) 철저히 뒤지다',r:'고대 영어 delfan (dig, 파다) → 깊이 파내다 → 탐구하다·철저히 조사하다로 고착 > 진실을 파내려 깊이 조사하는 장면이 원형',s:'research, examine, probe, explore'},
{n:1025,w:'chemistry',m:'n. 화학; 화학적 성질, 화학 반응[작용]; (남과의) 공감대, 마음이 통함, 공합이 잘 맞음',r:'그리스어 khemia (art of alloying metals, 금속 합금술) → 물질의 변환을 다루는 학문 → 화학·공감대로 고착 > 실험실에서 물질이 반응해 변하는 장면이 원형',s:'chemical science, molecular study'},
{n:1026,w:'vandalize',m:'vt. (예술·문화·공공기물을) 파괴하다, 파손하다',r:'Vandals (5세기 로마를 파괴한 게르만 부족) → 반달족처럼 파괴하다 → 파괴하다·파손하다로 고착 > 공공재산에 낙서하거나 부수는 장면이 원형',s:'destroy, wreck, damage, deface'},
{n:1027,w:'prolific',m:'a. (사람·동물이) 다산(多産)의; (식물이) 열매를 많이 맺는; (작가 따위가) 다작(多作)의; (상상력이) 풍부한; (땅이) 비옥한',r:'라틴어 proles (offspring, 자손) + facere (make, 만들다) → 자손을 많이 만드는 → 다산의·다작의로 고착 > 한 작가가 수십 권의 책을 출판하는 장면이 원형',s:'fertile, creative, abundant, inventive'},
{n:1028,w:'crouch',m:'v. 쭈그리고 앉다, 웅크리다; (비굴하게) 허리를 낮추다, 굽실거리다 / n. 웅크리기, 웅크린 자세',r:'고대 프랑스어 crochier (bend, 구부리다) → 몸을 구부려 웅크리다 → 웅크리다·굽실거리다로 고착 > 스타트 라인에서 몸을 웅크린 선수의 장면이 원형',s:'stoop, squat, bend, huddle'},
{n:1029,w:'gifted',m:'a. 타고난[천부의] 재능이 있는; 유능한; 머리가 매우 좋은',r:'gift (선물) + -ed → 재능을 선물받은 → 타고난 재능이 있는으로 고착 > 어릴 때부터 천부적 재능을 보이는 장면이 원형',s:'talented, skilled, able, endowed'},
{n:1030,w:'bystander',m:'n. 방관자, 구경꾼',r:'by (곁에) + stander (서 있는 사람) → 곁에 서서 보는 사람 → 방관자·구경꾼으로 고착 > 사건 현장에서 멀리 서서 바라보는 장면이 원형',s:'onlooker, observer, spectator, witness'},
{n:1031,w:'rescue',m:'vt. 구하다, 구조하다, 구출하다 / n. 구조, 구출, 구제',r:'고대 프랑스어 rescourre (shake out, 흔들어 꺼내다) → 위험에서 꺼내다 → 구하다·구조하다로 고착 > 불 속에서 사람을 끌어내는 장면이 원형',s:'save, free, liberate, recover'},

{n:1199,w:'mischief',m:'n. (악의 없는) 나쁜 짓, 장난; (사람·평판에 대한) 해[피해], 악영향',r:'mis (bad) + chief (끝) → 나쁜 끝을 만드는 것 → 장난·해로움으로 고착 > 숨어서 장난을 치며 킬킬 웃는 장면이 원형',s:'trouble, naughtiness, misbehavior, pranks'},
{n:1200,w:'binocular',m:'a. 두 눈의, 쌍안용(雙眼用)의 / n. (보통 pl.) 쌍안경; 쌍안 망원경[현미경]',r:'라틴어 bi (two, 둘) + ocular (eye, 눈의) → 두 눈으로 보는 → 쌍안경으로 고착 > 두 눈에 대고 멀리 보는 쌍안경의 장면이 원형',s:'field glasses, optical instrument, scope'},
{n:1201,w:'mundane',m:'a. 이승의, 현세의, 세속적인; 평범한, 흔히 있는',r:'라틴어 mundus (world, 세계) → 세상의 평범한 일 → 세속적인·평범한으로 고착 > 영적인 것과 반대로 그냥 일상적인 장면이 원형',s:'worldly, secular, everyday, temporal'},
{n:1202,w:'exasperate',m:'vt. 분개시키다, 화나게 하다; (병고통·감정 따위를) 악화시키다',r:'라틴어 ex (out) + asper (rough, 거친) + -ate → 거칠게 만들다 → 몹시 화나게 하다로 고착 > 반복되는 실수에 참을성이 바닥나는 장면이 원형',s:'irritate, infuriate, provoke, aggravate'},
{n:1203,w:'depot',m:'n. (대규모의) 창고, 저장소; (상업) 상품 유통 거점; (군사) 보급소; 연대 본부; 신병 훈련소, 보충대; (철도) 역; 버스 정류장; (버스 등의) 차고',r:'프랑스어 dépôt (deposit, 맡기다) → 물건을 맡겨두는 곳 → 창고·차량기지로 고착 > 버스들이 주차된 차량 기지의 장면이 원형',s:'storehouse, warehouse, store, repository'},
{n:1204,w:'gaze',m:'vi. (놀라움·흥미를 가지고) 가만히 보다, 응시하다 / n. 응시, 주시, 눈여겨 봄',r:'중세 영어 gasen (stare, 응시하다) → 오랫동안 응시하다 → 응시하다·바라보다로 고착 > 지평선을 넋 놓고 바라보는 장면이 원형',s:'stare, look, peer, observe'},
{n:1205,w:'apogee',m:'n. 정점, 절정; (천문) 원지점(달이나 인공위성이 지구로부터 가장 멀리 떨어진 지점)',r:'그리스어 apo (away) + gaia (earth, 지구) → 지구에서 가장 먼 지점 → 원지점·정점으로 고착 > 달이 지구에서 가장 멀리 떨어진 지점의 장면이 원형',s:'peak, summit, high point, climax'},
{n:1206,w:'resonant',m:'a. (소리·목소리 등이) 울리는, 공명[반향]하는, 낭랑한; 공명[공감]을 불러일으키는',r:'라틴어 resonare (resound, 울리다) + -ant → 울려 퍼지는 → 울려 퍼지는·공명하는으로 고착 > 종소리가 넓게 울려 퍼지는 장면이 원형',s:'echo, ring, vibrate, reverberate'},
{n:1207,w:'psychology',m:'n. 심리학; 심리 (상태)',r:'그리스어 psyche (soul, 영혼) + log (study) → 영혼을 연구하는 것 → 심리학으로 고착 > 인간 마음의 작동 원리를 연구하는 장면이 원형',s:'mental science, behavioral study'},
{n:1208,w:'disfigure',m:'vt. ~의 외관을 손상시키다, 볼꼴 사납게 하다',r:'dis (undo) + figure (모양) → 모양을 망가뜨리다 → 외모를 손상시키다로 고착 > 사고로 얼굴 형태가 변하는 장면이 원형',s:'mar, spoil, blemish, deform'},
{n:1209,w:'sheen',m:'n. 번쩍임, 광휘, 광채; 광택, 윤',r:'고대 영어 sciene (bright, 밝은) → 표면에서 나는 은은한 광택 → 윤기·광택으로 고착 > 비단 천에서 반사되는 은은한 빛의 장면이 원형',s:'brilliance, radiance, brightness, glitter'},
{n:1210,w:'account',m:'n. 계산, 셈; 계산서, 청구서; 기술, 서술; 이유, 근거; 원인, 동기 / v. (이유·원인을) 설명하다; (어떤 부분·비율을) 차지하다',r:'라틴어 ad (to) + computare (count, 세다) → ~를 향해 세다 → 계산하다·설명하다·계정으로 고착 > 장부에 수입과 지출을 기록하는 장면이 원형',s:'description, record, report, narration'},
{n:1211,w:'preposterous',m:'a. 말도 안 되는, 터무니없는, 비상식적인, 불합리한; 파격적인, 엉뚱한; 앞뒤가 뒤바뀐',r:'라틴어 prae (before) + posterus (after, 뒤) → 앞뒤가 뒤바뀐 → 터무니없는으로 고착 > 신발을 머리에 쓰는 것처럼 말도 안 되는 장면이 원형',s:'absurd, ridiculous, irrational, nonsensical'},
{n:1212,w:'stain',m:'v. 얼룩지게 하다, 더럽히다; 얼룩지다, 더러워지다 / n. (지우기 힘든) 얼룩; (평판에 생긴) 오점',r:'고대 노르드어 steina (paint, 칠하다) → 색이 배어들어 얼룩이 되다 → 얼룩·오점·물들이다로 고착 > 흰 셔츠에 커피가 흘러 얼룩이 된 장면이 원형',s:'color, tint, mark, tarnish'},
{n:1213,w:'bulletin',m:'n. (중요한) 고시, 공고, 게시; (라디오·텔레비전의) 속보, 뉴스 속보',r:'프랑스어 bulletin (official report, 공식 보고) → 공식 발표 → 게시·공보로 고착 > 게시판에 붙은 공지문의 장면이 원형',s:'notice, announcement, report, statement'},
{n:1214,w:'initiate',m:'vt. 시작하다, 개시하다, 창시하다; 초보[원리]를 가르치다, 전수하다; 가입[입회]시키다',r:'라틴어 initiare (begin, 시작하다) → 새로 시작하게 하다 → 시작하다·입회시키다로 고착 > 새 구성원에게 입회 의식을 치르는 장면이 원형',s:'begin, start, commence, launch'},
{n:1215,w:'heterodox',m:'a. 이교(異敎)의, 이단의, 비정통적인',r:'그리스어 heteros (other, 다른) + doxa (opinion, 의견) → 다른 의견을 가진 → 이단적인으로 고착 > 기존 정설과 다른 주장을 내세우는 장면이 원형',s:'unorthodox, nonconformist, dissenting'},
{n:1216,w:'surveillance',m:'n. 감시, 감독',r:'프랑스어 sur (over) + veiller (watch, 지키다) → 위에서 지켜보다 → 감시로 고착 > 카메라로 24시간 지켜보는 장면이 원형',s:'monitoring, watch, tracking, observation'},
{n:1217,w:'wallow',m:'vi. (물·진흙 속에서) 뒹굴다; (사치·쾌락 등에) 빠지다, 탐닉하다',r:'고대 영어 wealwian (roll, 구르다) → 진흙 속에서 구르다 → 뒹굴다·탐닉하다로 고착 > 돼지가 진흙탕에서 뒹구는 장면이 원형',s:'roll, wallow, flounder, luxuriate'},
{n:1218,w:'vassal',m:'n. (봉건 시대의) 봉신, 가신; 종속자, 부하; 노예 / a. 봉신의, 신하의; 예속된, 종속된, 노예 같은',r:'중세 라틴어 vassallus (servant, 하인) → 주군에 봉사하는 사람 → 봉신·신하로 고착 > 영주 앞에 무릎 꿇은 봉건 신하의 장면이 원형',s:'serf, servant, subject, subordinate'},

{n:1220,w:'steadfast',m:'a. 확고부동한, 고정된, (신념 등이) 불변의, 부동의',r:'고대 영어 stedefast (fixed in place, 제자리에 고정된) → 흔들리지 않고 고정된 → 확고한·변함없는으로 고착 > 어떤 압력에도 뜻을 굽히지 않는 장면이 원형',s:'firm, resolute, determined, unwavering'},
{n:1221,w:'chauvinist',m:'n. 맹목적[광신적] 애국주의자; (주의나 성 차별 등의) 극단적 우월주의자',r:'Nicolas Chauvin (나폴레옹을 맹목적으로 숭배한 군인) → 맹목적으로 자국을 숭배하는 → 국수주의자·우월주의자로 고착 > 자국이 최고라며 맹목적으로 주장하는 장면이 원형',s:'nationalist, patriot, bigot, jingoist'},
{n:1222,w:'epidemic',m:'n. 유행병, 전염병 / a. 유행성[전염병]의; 유행하고 있는',r:'그리스어 epi (upon) + demos (people, 민중) → 민중 위에 퍼지는 → 유행병·만연으로 고착 > 질병이 순식간에 도시 전체로 퍼지는 장면이 원형',s:'plague, outbreak, pandemic, contagion'},
{n:1223,w:'cataclysm',m:'n. (사회·정치적인) 격변, 대변동; 대홍수, 범람',r:'그리스어 kata (down) + klyzein (wash, 씻다) → 아래로 씻어 내리는 → 대홍수·대격변으로 고착 > 모든 것을 쓸어내리는 대재앙의 장면이 원형',s:'flood, deluge, disaster, upheaval'},
{n:1224,w:'ragamuffin',m:'n. 누더기를 걸친 사람[아이]; 부랑아',r:'중세 영어 ragamoffyn (ragged person, 누더기 입은 사람) → 누더기를 입은 개구쟁이 → 지저분한 아이·누더기 차림으로 고착 > 더러운 옷을 걸치고 장난치는 아이의 장면이 원형',s:'waif, stray, urchin, tramp'},
{n:1225,w:'propel',m:'vt. 나아가게 하다, 몰고 가다, 추진하다',r:'라틴어 pro (forward) + pellere (drive, 몰다) → 앞으로 몰다 → 추진하다·나아가게 하다로 고착 > 로켓 엔진이 우주선을 앞으로 밀어내는 장면이 원형',s:'drive, push, launch, move forward'},
{n:1226,w:'impudent',m:'a. 건방진, 무례한, 버릇없는',r:'라틴어 im (not) + pudens (shame, 수치) → 수치를 모르는 → 뻔뻔스러운·무례한으로 고착 > 잘못을 지적해도 당당하게 맞서는 장면이 원형',s:'insolent, brazen, arrogant, shameless'},
{n:1227,w:'coalesce',m:'vi. (더 큰 덩어리로) 합치다, 연합[합동]하다',r:'라틴어 co (together) + alescere (grow up, 자라다) → 함께 자라 하나가 되다 → 합치다·하나가 되다로 고착 > 작은 물방울들이 합쳐져 큰 방울이 되는 장면이 원형',s:'merge, unite, fuse, combine'},
{n:1228,w:'pugnacious',m:'a. 호전적인, 싸움하기 좋아하는',r:'라틴어 pugnus (fist, 주먹) + -acious → 주먹을 쓰는 성질 → 호전적인·싸우기 좋아하는으로 고착 > 작은 자극에도 주먹을 들어올리는 장면이 원형',s:'aggressive, combative, warlike, hostile'},
{n:1229,w:'voyage',m:'n. 여행, 항해(특히 바다·우주로 하는 긴 여행)',r:'라틴어 viaticum (traveling provision, 여행 준비물) → 준비물을 갖춘 긴 여행 → 항해·여행으로 고착 > 먼 바다를 향해 배가 출항하는 장면이 원형',s:'journey, trip, cruise, expedition'},
{n:1230,w:'zoom',m:'v. (가격·비용 등이) 급등[급증]하다; (인물·장면을) 확대[축소]하다',r:'의성어 zoom (빠른 소리) → 쌩 소리를 내며 빠르게 가다 → 빠르게 움직이다·확대하다로 고착 > 카메라 렌즈가 빠르게 당겨지는 장면이 원형',s:'spike, soar, skyrocket, shoot up'},
{n:1231,w:'trilogy',m:'n. (연극·소설·영화 등의) 3부작',r:'그리스어 tri (three, 셋) + log (story, 이야기) → 세 개의 이야기 → 3부작으로 고착 > 같은 세계관의 세 작품으로 이루어진 장면이 원형',s:'three-part series, triad, triple work'},
{n:1232,w:'dutiful',m:'a. 본분을 지키는[다하는], 충실한; 순종하는',r:'duty (의무) + -ful → 의무로 가득한 → 의무를 다하는·충실한으로 고착 > 어떤 상황에서도 맡은 바를 다하는 장면이 원형',s:'loyal, obedient, faithful, responsible'},
{n:1233,w:'sleight',m:'n. 능숙한 솜씨; 교활; 속임수',r:'고대 노르드어 slœgth (cunning, 교묘함) → 교묘한 솜씨 → 교묘한 솜씨·속임수로 고착 > 마술사가 눈 깜짝할 사이에 물건을 사라지게 하는 장면이 원형',s:'dexterity, deftness, agility, nimbleness'},
{n:1234,w:'crawl',m:'v. 네발로 가다, 포복하다; (식물의 덩굴 등이) 기다; 천천히 가다, 서행(徐行)하다; (시간이) 천천히 흐르다; 비굴하게 굴다, 굽실거리다',r:'고대 노르드어 krafla (claw, 발톱으로 기다) → 네 발로 기다 → 기다·느릿느릿 가다로 고착 > 아기가 배를 깔고 기어가는 장면이 원형',s:'creep, inch, move slowly'},
{n:1235,w:'malaise',m:'n. (질병의 전구(前驅) 증상으로서) 몸이 불편한 상태, 불쾌, 부조; (도덕적·사회적 퇴락에 대한) 막연한 불안, 초조, 불쾌감',r:'프랑스어 mal (bad, 나쁜) + aise (ease, 편안함) → 편안함이 나쁜 상태 → 불쾌감·병세로 고착 > 명확한 이유 없이 몸과 마음이 불편한 장면이 원형',s:'unease, discomfort, sickness, nausea'},
{n:1236,w:'nominate',m:'v. (선거·임명의 후보자로서) 지명하다, 임명하다',r:'라틴어 nominare (name, 이름 붙이다) → 이름을 지정하다 → 지명하다·추천하다로 고착 > 후보자로 이름을 올리는 장면이 원형',s:'appoint, name, designate, propose'},

{n:1283,w:'hubris',m:'n. 지나친 자신, 오만, 자만',r:'그리스어 hubris (insolence, 오만) → 신을 무시할 만큼 과도한 오만 → 오만·자만으로 고착 > 신에게도 도전하는 듯한 오만함의 장면이 원형',s:'arrogance, pride, insolence, conceit'},
{n:1284,w:'rig',m:'v. 의장(艤裝)하다; 장비를 갖추다, 준비하다; (시장·가격을) 부정하게 조작하다, 인위적으로 올리다 / n. 장비, 장치; 용구 한 벌; 기계; (석유 천연가스의) 굴착장치',r:'중세 영어 rigge (ridge, 능선) → 선박의 돛과 장치 → 조작하다·장비로 고착 > 선거 결과를 불법으로 조작하는 장면이 원형',s:'manipulate, fix, rig, equip'},
{n:1285,w:'prerogative',m:'n. (관직이나 지위에 따르는) 특권, 특혜',r:'라틴어 prae (before) + rogare (ask, 청하다) → 먼저 청할 수 있는 권리 → 특권·고유한 권리로 고착 > 왕만이 가진 특별한 권리의 장면이 원형',s:'privilege, right, advantage, entitlement'},

{n:1287,w:'unkempt',m:'a. 흐트러진, 단정치 못한; (말투가) 세련되지 못한, 거친',r:'un (not) + kempt (combed, 빗질된) → 빗질되지 않은 → 단정치 못한·허름한으로 고착 > 머리가 헝클어지고 옷이 구겨진 장면이 원형',s:'messy, disheveled, untidy, scruffy'},
{n:1288,w:'compile',m:'vt. (문서·발표 자료 등을) 한 권의 책으로 엮다, 편찬[편집]하다; (자료를) 모으다, 수집하다',r:'라틴어 com (together) + pilare (press, 누르다) → 함께 눌러 모으다 → 편집하다·모으다로 고착 > 여러 자료를 모아 하나의 목록을 만드는 장면이 원형',s:'collect, assemble, gather, put together'},
{n:1289,w:'succinct',m:'a. 간결한, 간단명료한',r:'라틴어 sub (under) + cinctus (girded, 허리띠 맨) → 허리띠로 조여 간결한 → 간결한·요점만 담은으로 고착 > 핵심만 담아 짧게 표현하는 장면이 원형',s:'brief, concise, compact, condensed'},

{n:1291,w:'wield',m:'vt. (무기·도구 등을) 휘두르다, 사용하다; (권력·권위 등을) 행사하다',r:'고대 영어 wieldan (control, 통제하다) → 힘으로 통제하다 → 휘두르다·행사하다로 고착 > 칼을 자유롭게 휘두르는 장면이 원형',s:'brandish, swing, control, manage'},
{n:1292,w:'leash',m:'n. (개 등을 매는) 가죽 끈, 사슬 / vt. 가죽 끈으로 매다; 속박하다; 억제하다',r:'고대 프랑스어 laisse (cord, 끈) → 개를 묶는 가죽끈 → 가죽끈·억제하다로 고착 > 개의 목에 줄을 달아 제어하는 장면이 원형',s:'restraint, chain, bond, tether'},

{n:1295,w:'delectable',m:'a. 즐거운, 기쁜, 유쾌한; (음식물·음료수가) 아주 맛있는[맛있어 보이는], 좋은 냄새가 나는',r:'라틴어 delectare (delight, 기쁘게 하다) → 기쁘게 하는 → 맛있는·즐거운으로 고착 > 맛있는 음식에 눈을 감으며 감탄하는 장면이 원형',s:'tasty, delicious, flavorful, scrumptious'},
{n:1296,w:'giddy',m:'a. 현기증이 나는, 어지러운; 들뜬',r:'고대 영어 gidig (insane, 미친) → 머리가 빙빙 도는 → 어지러운·들뜬으로 고착 > 빙글빙글 돌고 나서 어지러워하는 장면이 원형',s:'dizzy, excited, lightheaded, flighty'},

{n:1298,w:'captious',m:'a. 흠잡기 잘하는, 말꼬리를 잡고 늘어지는, (공연히) 헐뜯는',r:'라틴어 captiosus (deceptive, 속이는) → 함정을 파는 → 트집 잡기 좋아하는으로 고착 > 사소한 것에서 흠을 찾아 비판하는 장면이 원형',s:'quibble, nitpick, find fault, criticize'},
{n:1299,w:'mechanism',m:'n. 기계 장치, 기구; 심리 과정, (심적) 기제; 무의식적 수단',r:'그리스어 mechane (machine, 기계) + -ism → 기계의 작동 방식 → 기계 장치·작동 원리로 고착 > 시계 내부의 정밀한 톱니바퀴들의 장면이 원형',s:'mechanism, apparatus, device, system'},
{n:1300,w:'replete',m:'a. 가득한, 충만한, 충분한',r:'라틴어 re (again) + plere (fill, 채우다) → 완전히 다시 채운 → 충분히 채운·잔뜩 먹은으로 고착 > 배불리 먹어 더 이상 먹을 수 없는 장면이 원형',s:'full, stuffed, filled, abundant'},

{n:1302,w:'stupefy',m:'vt. ① 마비시키다; 무감각하게 하다 ② (충격·감동 등으로) 멍하게 하다, 깜짝 놀라게 하다',r:'라틴어 stupere (be stunned, 멍하다) + -fy → 멍하게 만들다 → 망연자실하게 하다·마비시키다로 고착 > 충격으로 멍하게 서있는 장면이 원형',s:'amaze, astonish, stun'},

{n:1304,w:'autopsy',m:'n. 시체 해부, 검시, 부검 / vt. 검시하다',r:'그리스어 autos (self, 스스로) + opsis (sight, 봄) → 스스로 보는 것 → 부검·검시로 고착 > 사인을 밝히기 위해 시신을 해부하는 장면이 원형',s:'necropsy, postmortem'},
{n:1305,w:'sightly',m:'a. ① 보기 좋은, 아름다운, 예쁜, 잘생긴 ② 경치가 좋은, 전망이 좋은',r:'sight (시야) + -ly → 시야에 좋은 → 보기 좋은·아름다운으로 고착 > 눈을 사로잡는 아름다운 경치의 장면이 원형',s:'attractive, good-looking, nice-looking'},
{n:1306,w:'destination',m:'n. ① (여행 등의) 목적지, 행선지; 도착지 ② 목적, 의도; 용도',r:'라틴어 destinare (make firm, 굳히다) → 목표를 정해 놓은 곳 → 목적지·행선지로 고착 > 지도에서 최종 목적지를 표시하는 장면이 원형',s:'goal, terminus'},
{n:1307,w:'challenging',m:'a. ① 사람의 능력을 시험하는; 힘든; 흥미를 돋우는, 해볼 만한 ② 도발적인; 매력[매혹]적인',r:'challenge (도전) + -ing → 도전하게 만드는 → 어려운·도전적인으로 고착 > 쉽지 않은 과제에 도전하는 장면이 원형',s:'testing'},
{n:1308,w:'expostulate',m:'vi. 충고하다, 타이르다, 훈계하다',r:'라틴어 ex (out) + postulare (demand, 요구하다) → 밖으로 요구하다 → 항의하다·설득하다로 고착 > 잘못에 강하게 항의하는 장면이 원형',s:'admonish, exhort'},
{n:1309,w:'catastrophe',m:'n. 대참사, 재앙',r:'그리스어 kata (down) + strophe (turning, 전환) → 아래로 전환되는 것 → 대재앙·파국으로 고착 > 모든 것이 무너지는 최악의 사태의 장면이 원형',s:'calamity, disaster, holocaust, scourge'},
{n:1310,w:'grudge',m:'n. 원한, 유감; 악의 / vt. ① (무엇을 하거나 주는 것을) 억울해 하다, 아까워하다 ② 배 아파하다, 샘내다, 시기하다, 질투하다',r:'고대 노르드어 grugga (make dark, 어둡게 하다) → 마음 안에 어두운 원한 → 원한·억울함으로 고착 > 오래된 억울함을 마음 속에 품은 장면이 원형',s:'animosity, malice, rancor, resentment, venom, begrudge, envy'},
{n:1311,w:'overweening',m:'a. ① 자만심이 강한, 우쭐대는 ② (자랑 등이) 과장된, 도가 지나친',r:'고대 영어 oferwenian (be presumptuous, 주제넘다) → 지나치게 자신만만한 → 오만한·우쭐댄으로 고착 > 자신의 능력을 과대평가하며 거들먹거리는 장면이 원형',s:'arrogant, conceited, exaggerated, immoderate, inordinate'},
{n:1312,w:'inoculation',m:'n. ① (예방) 접종 ② 사상의 주입, 불어넣기; 강화; 접붙임, 접목',r:'라틴어 inoculare (graft, 접목하다) → 접목하듯 약한 균을 넣다 → 접종·예방 주사로 고착 > 주사기로 백신을 접종하는 장면이 원형',s:'vaccination'},
{n:1313,w:'testify',m:'v. 증언[증명]하다; 입증하다',r:'라틴어 testis (witness, 증인) + -fy → 증인으로서 말하다 → 증언하다·입증하다로 고착 > 법정에서 손을 들고 증언하는 장면이 원형',s:'attest, certify'},
{n:1314,w:'ethnocentrism',m:'n. (다른 민족을 멸시하는) 자기민족 중심주의',r:'그리스어 ethnos (race, 민족) + center (중심) + -ism → 자기 민족을 중심으로 보는 주의 → 자민족 중심주의로 고착 > 자신의 문화만이 옳다고 판단하는 장면이 원형',s:''},
{n:1315,w:'refractory',m:'a. ① 말을 안 듣는, 다루기 어려운, 고집 센 ② (병이) 난치의, 잘 낫지 않는',r:'라틴어 refractarius (stubborn, 완고한) → 완고하게 저항하는 → 반항적인·다루기 어려운으로 고착 > 어떤 치료도 듣지 않는 장면이 원형',s:'disobedient, stubborn, unmanageable, unruly, incurable, intractable, obstinate'},
{n:1316,w:'predisposition',m:'n. 성향, 경향; 질병에 대한 소인',r:'pre (before) + disposition (성향) → 미리 성향이 정해진 → 성질·소인·경향으로 고착 > 유전적으로 특정 병에 걸리기 쉬운 장면이 원형',s:'disposition, inclination, tendency'},
{n:1317,w:'invade',m:'v. ① 침입하다, 침략하다 ② (권리 등을) 침해하다 ③ (병이) 침범하다, 엄습하다; (소리·냄새 등이) 퍼지다',r:'라틴어 in (into) + vadere (go, 가다) → 안으로 무력으로 들어가다 → 침략하다·침범하다로 고착 > 군대가 국경을 넘어 쳐들어가는 장면이 원형',s:'attack, raid, encroach, intrude, trespass'},
{n:1318,w:'didactic',m:'a. 교훈적인, 설교적인, 가르치기 위한',r:'그리스어 didaskein (teach, 가르치다) + -ic → 가르치는 → 교훈적인·교조적인으로 고착 > 도덕을 직접 설명하는 이야기의 장면이 원형',s:'instructive, preachy'},
{n:1319,w:'surfeit',m:'n. ① 과도, 과다, 지나치게 많은 양 ② 과식, 폭식, 과음 / v. 과식[폭식, 과음]하다',r:'고대 프랑스어 surfaire (overdo, 과하게 하다) → 과하게 하다 → 과식·초과로 고착 > 음식을 너무 많이 먹어 더 이상 못 먹는 장면이 원형',s:'excess, plethora, repletion, gluttony, overeating, pig-out'},
{n:1320,w:'pander',m:'v. ① (저속한 욕망에) 영합하다, (남의 약점을) 이용하다[to] ② 매춘을 알선해 주다; 나쁜 짓을 하도록 도와주다 / n. 약점을 이용하는 자, 나쁜 짓의 중재자; (남자) 매춘 알선인',r:'Pandare (트로이 전쟁의 인물) → 상대의 나쁜 욕구를 채워주다 → 나쁜 욕구에 영합하다로 고착 > 자극적인 내용으로 수익을 올리는 장면이 원형',s:'cater to, pimp'},
{n:1321,w:'misdemeanor',m:'n. ① 경범죄 ② 비행, 행실[품행]이 나쁨',r:'mis (bad) + demeanor (행동) → 나쁜 행동 → 경범죄·위법 행위로 고착 > 법을 가볍게 위반하는 장면이 원형',s:'minor offense, misconduct, misdeed, wrongdoing'},
{n:1322,w:'wishy-washy',m:'a. ① 미온적인, 확고하지 못한, 우유부단한 ② (색깔이) 선명하지 못한',r:'wash + wash → 물처럼 흐릿하고 힘없는 → 우유부단한·흐리멍텅한으로 고착 > 어느 쪽도 결정 못 하고 우물쭈물하는 장면이 원형',s:'indecisive, irresolute'},
{n:1323,w:'currency',m:'n. ① (현금) 통화, 유통 화폐 ② (화폐의) 유통, 통용; (사상·말·소문 등의) 유포, 보급; 유행',r:'라틴어 currere (run, 달리다) → 유통되어 달리는 것 → 통화·유통으로 고착 > 시장에서 돈이 오가는 장면이 원형',s:'cash, coin, coinage, circulation, prevalence, spread'},
{n:1324,w:'abet',m:'vt. 부추기다, 선동하다, 교사하다',r:'고대 프랑스어 abeter (bait, 미끼로 꾀다) → 나쁜 일을 부추기다 → 교사하다·방조하다로 고착 > 뒤에서 범행을 부추기는 장면이 원형',s:'incite, instigate'},
{n:1325,w:'revenue',m:'n. ① 소득, 수익; 정기적 수입; 수입원 ② 수입 항목, 재원; (국가의) 세입',r:'라틴어 revenire (return, 돌아오다) → 돌아오는 수입 → 세입·수입으로 고착 > 정부로 세금이 들어오는 장면이 원형',s:'gain, income, proceeds, profits'},
{n:1326,w:'juxtapose',m:'vt. 나란히 놓다, 병렬[병치]하다',r:'라틴어 juxta (beside, 옆에) + ponere (place, 놓다) → 옆에 나란히 놓다 → 병치하다로 고착 > 두 대조적인 것을 나란히 놓는 장면이 원형',s:'put side by side'},

{n:1329,w:'forgo',m:'vt. ~없이 지내다, (하고·갖고 싶은 것을) 포기하다; 버리다, 그만두다',r:'for (away) + go (가다) → 가지 않고 포기하다 → 포기하다·삼가다로 고착 > 원하지만 참고 포기하는 장면이 원형',s:'abandon, give up, renounce'},
{n:1330,w:'blizzard',m:'n. ① 심한 눈보라, 블리자드 ② (편지 등과 같은 사물의) 쇄도',r:'19세기 미국 영어 blizzard (violent blow, 강한 타격) → 눈이 퍼붓는 강한 폭풍 → 눈보라·폭설로 고착 > 세찬 바람과 함께 눈이 사방으로 몰아치는 장면이 원형',s:'snowstorm, spindrift, flood, rush, stampede'},
{n:1331,w:'potential',m:'a. 잠재적인; 가능한; 장래 ~의 가능성이 있는 / n. 잠재력, 가능성',r:'라틴어 potentia (power, 힘) + -al → 발휘될 수 있는 힘 → 잠재적인·가능성으로 고착 > 아직 발휘되지 않은 내면의 능력의 장면이 원형',s:'latent, possible, prospective'},
{n:1332,w:'dodder',m:'vi. (중풍이나 노령으로) 떨다, 휘청거리다, 비실비실하다',r:'중세 영어 daderen (shake, 흔들리다) → 노쇠해 비틀거리며 걷다 → 비틀거리다·노쇠하다로 고착 > 지팡이를 짚고 힘없이 걷는 장면이 원형',s:'totter, waddle'},
{n:1333,w:'shelf',m:'n. ① 선반, 시령; 선반 모양의 턱진 장소; 단; (벼랑의) 바위 턱 ② 얕은 곳, 여울목; 모래톱, 암초 ③ 대륙붕',r:'고대 영어 scylfe (ledge, 선반) → 벽에 고정된 선반 → 선반으로 고착 > 벽에 붙어있는 선반에 책을 꽂는 장면이 원형',s:'ledge, rack, rock, shoal'},
{n:1334,w:'insane',m:'a. 미친, 정신 이상의; 비상식적인',r:'라틴어 in (not) + sanus (healthy, 건강한) → 건강하지 않은 정신 → 정신이상의·미친으로 고착 > 이성을 잃어 통제할 수 없는 장면이 원형',s:'crazy, demented, deranged, mad'},
{n:1335,w:'swarm',m:'n. ① (한 방향으로 이동하는 곤충의) 떼[무리] ② (같은 방향으로 급히 이동 중인) 군중, 대중 / v. 떼[무리]를 지어 다니다',r:'고대 영어 swearm (swarm, 무리) → 벌처럼 떼 지어 움직이다 → 떼·우글거리다로 고착 > 수천 마리 벌이 한꺼번에 날아오르는 장면이 원형',s:'army, drove, herd, horde, crowd, flock, mass, multitude, throng, troop'},
{n:1336,w:'luxuriant',m:'a. ① 무성한, 울창한; (땅이) 비옥한 ② (장식·문체 등이) 화려한, 현란한',r:'라틴어 luxuria (excess, 과잉) → 과할 만큼 무성한 → 무성한·풍성한으로 고착 > 잎이 울창하게 자라 뒤덮인 장면이 원형',s:'exuberant, flourishing, lush, thriving, brilliant, elaborate, florid, ornate'},
{n:1337,w:'paean',m:'n. 기쁨의 노래, 찬가',r:'그리스어 paian (hymn to Apollo, 아폴론 찬가) → 신에게 바치는 찬가 → 찬사·감사의 노래로 고착 > 승리를 기뻐하며 환호하는 장면이 원형',s:'anthem, hymn'},
{n:1338,w:'amplify',m:'v. ① 확대[확장]하다 ② 상세히 설명하다, 부연하다[on, upon]',r:'라틴어 amplus (large, 큰) + -fy → 크게 만들다 → 증폭하다·자세히 설명하다로 고착 > 마이크가 작은 소리를 크게 만드는 장면이 원형',s:'expand, extend, increase, magnify, elaborate'},

{n:1340,w:'trim',m:'v. ① (불필요한 부분을) 잘라내다, 다듬다, 손질하다 ② (예산 등을) 깎다, 삭감하다 / a. ① 잘 가꾼, 깔끔한 ② (몸매가 건강하고) 늘씬한',r:'고대 영어 trymian (strengthen, 강화하다) → 불필요한 것을 잘라 깔끔하게 → 다듬다·단정한으로 고착 > 가위로 깔끔하게 다듬는 장면이 원형',s:'pare, prune, neat, spruce, tidy, beach-ready, clean-limbed, slender, slim'},
{n:1341,w:'vicarious',m:'a. 대리의, 대신하는',r:'라틴어 vicarius (substitute, 대리인) → 대리인처럼 대신 경험하는 → 대리의·간접 경험의로 고착 > 책이나 영화로 실제 경험을 대신하는 장면이 원형',s:'delegated, substituted, surrogate'},
{n:1342,w:'sleuth',m:'n. 탐정, 형사',r:'고대 노르드어 sloth (trail, 흔적) → 흔적을 쫓는 사람 → 탐정·추적하다로 고착 > 흔적을 따라 사건을 해결하는 장면이 원형',s:'detective, investigator'},

{n:1344,w:'holdup',m:'n. ① (열차·자동차 또는 그 승객에 대한) 불법 억류; 권총 강도, 노상강도 ② 정지, 정체, 지체, 방해',r:'hold (잡다) + up (위로) → 손을 들게 하여 강탈하다 → 강탈·방해로 고착 > 총을 들고 손을 올리라고 하는 강도의 장면이 원형',s:'stickup, delay, stoppage'},
{n:1345,w:'proclaim',m:'v. 선언하다, 공포하다, 포고하다',r:'라틴어 pro (before) + clamare (cry out, 외치다) → 앞에서 크게 외치다 → 선포하다·선언하다로 고착 > 광장에서 공식 선포를 하는 장면이 원형',s:'announce, declare, pronounce'},
{n:1346,w:'multifarious',m:'a. 다양한, 다채로운, 다방면에 걸친',r:'라틴어 multus (many, 많은) + farius (kind, 종류) → 많은 종류의 → 다방면의·다양한으로 고착 > 셀 수 없이 다양한 종류가 가득한 장면이 원형',s:'diverse, miscellaneous, multi-faceted, varied'},
{n:1347,w:'allegory',m:'n. ① 우화, 비유담 ② 풍유, 비유',r:'그리스어 allos (other, 다른) + agoreuein (speak, 말하다) → 다른 것을 빗대어 말하다 → 우화·풍유로 고착 > 동물 이야기를 통해 인간 사회를 비판하는 장면이 원형',s:'apologue, fable, parable'},

{n:1350,w:'conscript',m:'vt. 징집[징용]하다 / n. 징집병',r:'라틴어 con (together) + scribere (write, 쓰다) → 명단에 함께 쓰다 → 징병하다·징집된 병사로 고착 > 군 복무를 위해 이름이 등록되는 장면이 원형',s:'commandeer, draft, levy, draftee, inductee'},
{n:1351,w:'indulge',m:'v. ① (욕망·정열 등을) 만족시키다; 탐닉하다, 마음껏 누리다[in] ② 제멋대로 하게 두다, (응석·변덕 등을) 다 받아 주다',r:'라틴어 indulgere (be lenient, 관대하다) → 스스로에게 관대하게 허용하다 → 마음껏 즐기다·빠지다로 고착 > 달콤한 것을 마음껏 먹는 장면이 원형',s:'gratify, wallow, coddle, mollycoddle, pamper'},
{n:1352,w:'demise',m:'n. ① 사망, 서거, 죽음 ② (제도·존재 등의) 소멸, 종료, 종말',r:'라틴어 demittere (send down, 내려보내다) → 다시는 돌아오지 않는 곳으로 → 죽음·소멸로 고착 > 왕의 서거를 알리는 종소리의 장면이 원형',s:'death, decease, passing, disappearance, end, termination'},
{n:1353,w:'frivolous',m:'a. ① 경박한, 경솔한 ② 시시한, 하찮은',r:'라틴어 frivolus (trifling, 하찮은) → 하찮고 경박한 → 경박한·시시한으로 고착 > 사소한 것에 지나치게 시간을 쓰는 장면이 원형',s:'careless, flippant, rash, skittish, yeasty, fiddling, insignificant, petty, trifling, trivial'},
{n:1354,w:'epitaph',m:'n. 비명, 묘비명',r:'그리스어 epi (upon) + taphos (tomb, 무덤) → 무덤 위에 쓴 글 → 비문·추도사로 고착 > 묘비에 새겨진 짧은 추도 문구의 장면이 원형',s:'epigraph, inscription'},
{n:1355,w:'secure',m:'a. ① 안심하는 ② 안전한, 확실한, 안정적인 / v. ① (특히 힘들게) 얻어 내다, 획득[확보]하다 ② 안전하게 지키다; 확실하게 하다',r:'라틴어 se (without) + cura (care, 걱정) → 걱정 없이 안전한 → 안전한·확보하다로 고착 > 자물쇠로 잠근 안전한 공간의 장면이 원형',s:'reliable, stable'},
{n:1356,w:'predecessor',m:'n. ① 전임자 ② 이전의 것',r:'라틴어 prae (before) + decedere (go away, 떠나다) → 먼저 떠난 사람 → 전임자·선배로 고착 > 은퇴한 전임자로부터 자리를 이어받는 장면이 원형',s:'forerunner, precursor'},
{n:1357,w:'revive',m:'v. ① (생명·의식 등을) 소생[회복]시키다 ② (잊혀진 관습·유행·효력 등을) 되살아나게 하다, 부활시키다 ③ 소생하다; 부활하다',r:'라틴어 re (again) + vivere (live, 살다) → 다시 살리다 → 소생시키다·부활시키다로 고착 > 의식을 잃었다가 다시 깨어나는 장면이 원형',s:'recover, resuscitate, revitalize, rekindle, renew, restore, resurrect'},
{n:1358,w:'pedantic',m:'a. 아는 체하는, 현학적인, 학자라고 뽐내는',r:'그리스어 paideutikos (teaching, 가르치는) → 가르치듯 형식에 집착하는 → 현학적인·형식에 얽매이는으로 고착 > 사소한 형식에 집착하며 따지는 장면이 원형',s:'pompous'},
{n:1359,w:'staple',m:'n. ① 주요 산물, 주요 상품 ② 주요소, 주성분 / a. 주된, 주요한',r:'고대 영어 stapol (post, 기둥) → 핵심 기둥이 되는 → 주요 산물·주식의·스테이플로 고착 > 식탁에 항상 오르는 기본 음식의 장면이 원형',s:'chief, fundamental, principal'},
{n:1360,w:'brainwash',m:'n. 세뇌 / vt. 세뇌하다',r:'brain (뇌) + wash (씻다) → 뇌를 씻어 세뇌하다 → 세뇌하다로 고착 > 반복적인 메시지로 다른 생각을 심는 장면이 원형',s:'indoctrinate'},
{n:1361,w:'void',m:'a. ① 빈, 공허한; 공석인 ② 무효의 / n. 공간, 허공; 공허감',r:'라틴어 vocitus (empty, 빈) → 완전히 비어있는 → 비어있는·무효의·빈 공간으로 고착 > 계약서에 무효 표시를 하는 장면이 원형',s:'empty, vacant, inoperative, invalid, emptiness, vacancy'},
{n:1362,w:'amnesia',m:'n. 기억상실증, 건망증',r:'그리스어 a (not) + mnesia (memory, 기억) → 기억이 없는 → 기억상실증으로 고착 > 과거 기억이 완전히 사라진 장면이 원형',s:'absent-mindedness, forgetfulness'},
{n:1363,w:'mince',m:'v. ① (고기 등을) 잘게 썰다, 다지다 ② 조심스럽게[점잖게, 완곡하게] 말하다',r:'고대 프랑스어 mincer (cut small, 잘게 자르다) → 아주 잘게 자르다 → 잘게 다지다·조심스럽게 말하다로 고착 > 칼로 고기를 잘게 다지는 장면이 원형',s:''},
{n:1364,w:'parody',m:'n. ① (풍자적·해학적인) 모방 시문, 패러디 ② 서투른 모방, 흉내 / vt. ① 서투르게 흉내 내다 ② 풍자적으로 개작하다',r:'그리스어 para (beside) + ode (song, 노래) → 원작 옆에 놓인 우스꽝스러운 것 → 패러디·풍자로 고착 > 유명 작품을 우스꽝스럽게 따라한 장면이 원형',s:'satire, travesty, imitation, imitate, mimic, caricature, lampoon, satirize'},
{n:1365,w:'linguist',m:'n. ① 언어학자 ② 여러 외국어에 능한 사람',r:'라틴어 lingua (tongue, 혀) → 언어를 다루는 사람 → 언어학자·어학에 능통한 사람으로 고착 > 여러 언어를 능숙하게 구사하는 장면이 원형',s:'linguician, philologist, multilingual, polyglot'},
{n:1366,w:'hustle',m:'v. ① (사람을 거칠게) 떠밀다, 밀치다 ② 서두르다',r:'중세 영어 husselen (shake, 흔들다) → 밀치며 빠르게 움직이다 → 분주히 움직이다·사기로 고착 > 군중을 헤치며 바삐 이동하는 장면이 원형',s:'jostle, push, shove, thrust, bustle, hurry, rush'},
{n:1367,w:'banter',m:'n. (악의 없는) 가벼운 농담, 조롱, 놀림 / v. 조롱하다, 놀리다',r:'17세기 영어 banter (tease, 놀리다) → 가볍게 주고받는 농담 → 농담·재담으로 고착 > 두 사람이 재치 있게 서로 놀리는 장면이 원형',s:'badinage, chaff, persiflage, raillery, jeer, jest, ridicule, tease'},
{n:1368,w:'stimulus',m:'n. ① 자극; 격려, 고무 ② 자극물; 흥분제',r:'라틴어 stimulus (goad, 막대기) → 행동을 일으키는 자극 → 자극·기폭제로 고착 > 신호에 반응이 일어나는 장면이 원형',s:'encouragement, goad, incentive, spur'},
{n:1369,w:'prevailing',m:'a. ① 우세한, 주요한 ② 유력한, 효과적인 ③ 널리 보급되어 있는, 유행하고 있는',r:'라틴어 praevalere (be stronger, 더 강하다) → 더 강해 퍼진 → 우세한·지배적인으로 고착 > 한쪽 의견이 다른 것을 압도하는 장면이 원형',s:'predominant, ruling, prevalent, widespread'},
{n:1370,w:'overlook',m:'vt. ① 바라보다, 내려다보다 ② 감독하다, 돌보다 ③ 빠뜨리고 보다 ④ (결점 등을) 눈감아 주다',r:'over (위에서) + look (보다) → 위에서 내려다보다 → 못 본 척하다·간과하다로 고착 > 잘못을 알면서도 그냥 지나치는 장면이 원형',s:'oversee, supervise, excuse, pardon'},
{n:1371,w:'commemoration',m:'n. ① 기념, 축하 ② 기념품[축제], 축전',r:'라틴어 com (together) + memorare (remember, 기억하다) → 함께 기억하다 → 기념·추모로 고착 > 역사적 사건을 함께 기억하는 행사의 장면이 원형',s:'celebration, observance'},
{n:1372,w:'abstemious',m:'a. (음식 등을) 절제[자제]하는, 금욕적인',r:'라틴어 abs (away) + temetum (intoxicating drink, 술) → 술에서 멀리하는 → 절제하는·금욕적인으로 고착 > 음식과 술을 극도로 절제하는 장면이 원형',s:'abstinent, continent, temperate'},

{n:1375,w:'gait',m:'n. 걷는 모양, 걸음걸이; 진행',r:'고대 노르드어 gat (passage, 통로) → 통로를 지나는 방식 → 걸음걸이·보행 방식으로 고착 > 특유한 걸음걸이로 누군지 알아보는 장면이 원형',s:'step, walk'},

{n:1378,w:'unwittingly',m:'ad. 자신도 모르게, 부지불식간에',r:'고대 영어 unwittende (without knowing, 모르면서) → 모르는 채로 → 무의식적으로·모르고로 고착 > 의도하지 않게 실수를 하는 장면이 원형',s:'accidentally, involuntarily, unintentionally'},
{n:1379,w:'conflict',m:'n. ① 투쟁, 전투 ② 충돌, 대립, 불일치 / vi. ① 투쟁하다 ② 충돌하다, 모순되다',r:'라틴어 con (together) + fligere (strike, 치다) → 서로 부딪히다 → 충돌·갈등으로 고착 > 두 힘이 정면으로 맞부딪히는 장면이 원형',s:'battle, fight, strife, struggle, clash, collision, disagreement, discord, combat, contend, dispute, quarrel, collide, differ, disagree'},
{n:1380,w:'shrug',m:'v. (어깨를) 으쓱하다',r:'중세 영어 schruggen (shrug, 어깨를 으쓱하다) → 어깨를 으쓱 들어올리다 → 어깨를 으쓱하다로 고착 > 모른다는 의미로 어깨를 들어올리는 장면이 원형',s:''},

{n:1383,w:'gradual',m:'a. 단계적인, 점진적인, 점차적인',r:'라틴어 gradus (step, 단계) + -al → 단계의 → 점진적인·서서히로 고착 > 한 계단씩 천천히 오르는 장면이 원형',s:'piecemeal, progressive, steady, step-by-step'},

{n:1390,w:'byword',m:'n. ① (특정한 자질의) 전형, 대명사 ② 상투적인 어구',r:'by (관련된) + word (말) → 어떤 것과 관련된 말 → 대명사·속담으로 고착 > 어떤 특성을 대표하는 대명사가 된 장면이 원형',s:'archetype, emblem, epitome, paragon, cliché'},

{n:1394,w:'scam',m:'n. 신용사기, 사기사건 / v. ① 속이다, 사기 치다 ② 키스하다',r:'20세기 속어 scam (trick, 속임수) → 교묘한 속임수로 돈을 빼내다 → 사기·속임수로 고착 > 가짜 투자 정보로 돈을 뜯어내는 장면이 원형',s:'con, defraud, mulct, swindle'},
{n:1395,w:'dictate',m:'v. ① 구술하다, 받아쓰게 하다 ② 명령하다, 지시하다 ③ 좌우하다, 영향을 주다',r:'라틴어 dictare (say repeatedly, 반복해 말하다) → 반복해 말하며 받아쓰게 하다 → 구술하다·지시하다로 고착 > 상사가 비서에게 문서를 받아쓰게 하는 장면이 원형',s:'command, decree, direct, order, affect, govern, influence, sway'},

{n:1398,w:'acrid',m:'a. ① (냄새·맛 등이) 매운, 쓴; 아리는 ② 가혹한, 신랄한',r:'라틴어 acer (sharp, 날카로운) → 날카롭게 코를 자극하는 → 자극적인·신랄한으로 고착 > 타는 냄새가 코를 찌르는 장면이 원형',s:'acid, biting, bitter, caustic, pungent'},
{n:1399,w:'weather',m:'v. (재난·역경 등을) 뚫고 나가다, 견디다 / n. 날씨, 기후',r:'고대 영어 weder (weather, 날씨) → 날씨·폭풍을 버텨내다 → 날씨·이겨내다로 고착 > 폭풍을 맞으면서도 굳건히 버티는 장면이 원형',s:'bear, endure'},
{n:1400,w:'millennium',m:'n. 1000년, 1000년간; 1000년기; 1000년 기념제',r:'라틴어 mille (thousand, 천) + annum (year, 해) → 천 년 → 천 년·천년기로 고착 > 두 천 년이 만나는 역사적 순간의 장면이 원형',s:''},
{n:1401,w:'punctual',m:'a. 시간[기한]을 엄수하는',r:'라틴어 punctum (point, 점) + -al → 정확한 점처럼 → 시간을 지키는·정확한으로 고착 > 약속 시간 정각에 도착하는 장면이 원형',s:'prompt, timely'},
{n:1402,w:'importune',m:'v. ~에게 끈덕지게 졸르다, 청하다; 괴롭히다',r:'라틴어 importunus (troublesome, 귀찮은) → 귀찮게 끈질기게 요청하다 → 조르다·끈질기게 부탁하다로 고착 > 거절해도 계속 졸라대는 장면이 원형',s:'badger, implore, harass, pester'},
{n:1403,w:'adage',m:'n. 격언, 속담',r:'라틴어 adagium (proverb, 속담) → 오래된 지혜를 담은 말 → 격언·속담으로 고착 > 수백 년 전해 내려온 짧은 지혜의 장면이 원형',s:'aphorism, axiom, maxim, precept, proverb, saying'},
{n:1404,w:'withstand',m:'v. (유혹·곤란 등에) 저항하다; 견디어내다, 버티다',r:'with (반하여) + stand (서다) → 맞서 서다 → 견디다·저항하다로 고착 > 강한 압력에 굴하지 않고 버티는 장면이 원형',s:'bear, endure, resist'},
{n:1405,w:'traumatic',m:'a. 정신적 외상의, 대단히 충격적인, 잊지 못할',r:'그리스어 trauma (wound, 상처) + -ic → 상처의 → 심한 정신적 충격을 주는으로 고착 > 사고 후 두고두고 마음에 상처가 남는 장면이 원형',s:'painful, shocking'},

{n:1657,w:'prevent',m:'v. 막다, 방해하다; 예방하다',r:'라틴어 prae (before) + venire (come, 오다) → 미리 오다 → 예방하다·막다로 고착 > 나쁜 일이 생기기 전에 먼저 막는 장면이 원형',s:''},

{n:1668,w:'prolix',m:'a. 지루한, 장황한',r:'라틴어 prolixus (poured forth, 흘러나온) → 넘쳐 흐르듯 길게 늘어진 → 장황한·말이 많은으로 고착 > 요점 없이 길게 이야기하는 장면이 원형',s:'redundant, verbose, wordy'},

{n:1672,w:'covert',m:'a. 비밀의, 은밀한, 암암리의',r:'라틴어 cooperire (cover, 덮다) → 덮여 숨겨진 → 은밀한·비밀의로 고착 > 발각되지 않게 숨어서 하는 작전의 장면이 원형',s:'clandestine, undercover'},

{n:1675,w:'mite',m:'n. ① 약간, 조금 ② 진드기',r:'고대 영어 mite (small coin, 작은 동전) → 아주 작은 것 → 진드기·아주 조금으로 고착 > 눈에 보이지 않을 만큼 작은 존재의 장면이 원형',s:'tick'},

{n:1677,w:'infraction',m:'n. 위반, 침해',r:'라틴어 infringere (break, 깨다) → 규칙을 깨뜨리다 → 위반·침해로 고착 > 규칙을 어겨 위반 딱지를 받는 장면이 원형',s:'breach, infringement, violation'},

{n:1769,w:'interstice',m:'n. 간격, 틈새, 작은 틈',r:'라틴어 inter (between) + sistere (stand, 서다) → 사이에 서있는 것 → 틈·간격으로 고착 > 벽돌과 벽돌 사이의 좁은 틈의 장면이 원형',s:'chink, crack, crevice, fissure'},
{n:1770,w:'fascinating',m:'a. 황홀하게 하는, 매혹적인',r:'라틴어 fascinare (bewitch, 마법을 걸다) → 마법에 걸린 듯 끌리는 → 매혹적인·흥미로운으로 고착 > 눈을 뗄 수 없어 빨려드는 장면이 원형',s:'alluring, captivating, charming, enchanting'},
{n:1771,w:'garrison',m:'n. ① 수비대, 주둔군 ② 요새, 주둔지 / vt. 수비대를 두다; 주둔시키다',r:'고대 프랑스어 garnison (supply, 공급) → 방어를 위해 배치된 군대 → 수비대·군대 주둔으로 고착 > 성에 방어 병력을 배치하는 장면이 원형',s:'fort, fortress / position, station'},
{n:1772,w:'collogue',m:'vi. 밀담하다; 공모하다',r:'라틴어 col (together) + loqui (speak, 말하다) → 함께 말하다 → 은밀히 상의하다로 고착 > 두 사람이 낮은 목소리로 몰래 상의하는 장면이 원형',s:'hugger-mugger; conspire, intrigue, plot'},
{n:1773,w:'infirm',m:'a. ① 허약한; 노쇠한 ② 의지 등이 약한, 우유부단한',r:'라틴어 in (not) + firmus (strong, 강한) → 강하지 않은 → 허약한·노쇠한으로 고착 > 오래된 건강 문제로 몸이 약해진 장면이 원형',s:'feeble, frail, weak / irresolute, volitionless'},
{n:1774,w:'saga',m:'n. 전설; 무용담, 모험담',r:'고대 노르드어 saga (story, 이야기) → 영웅의 긴 이야기 → 영웅담·장편 이야기로 고착 > 수 세대에 걸친 장대한 이야기의 장면이 원형',s:'epic, legend, story, tale'},
{n:1775,w:'noticeable',m:'a. 눈에 띄는, 현저한, 두드러진',r:'notice (주목하다) + -able → 주목할 수 있는 → 눈에 띄는·현저한으로 고착 > 군중 속에서 홀로 눈에 띄는 장면이 원형',s:'conspicuous, noteworthy'},
{n:1776,w:'corpse',m:'n. 시체, 송장',r:'라틴어 corpus (body, 몸) → 더 이상 생명이 없는 몸 → 시체·유해로 고착 > 모든 생명이 사라진 몸의 장면이 원형',s:'cadaver, carcass, remains'},

{n:1778,w:'piebald',m:'a. 얼룩무늬가 있는; 잡색의 / n. 얼룩말; 얼룩무늬 동물',r:'pie (까치) + bald (흰) → 까치처럼 흑백이 섞인 → 얼룩덜룩한으로 고착 > 흑백이 불규칙하게 섞인 말의 장면이 원형',s:''},
{n:1779,w:'horrid',m:'a. ① 무시무시한 ② 매우 불쾌한, 싫은',r:'라틴어 horridus (rough, 거친) → 무섭게 거친 → 무시무시한·끔찍한으로 고착 > 너무 끔찍해 소름이 돋는 장면이 원형',s:'frightful, horrible / nasty, repulsive'},
{n:1780,w:'circuit',m:'n. ① 순회; 순회여행 ② 우회(도로) ③ 회로, 회선',r:'라틴어 circumire (go around, 돌다) → 돌아오는 경로 → 회로·순회·주회로 고착 > 전류가 도는 전자 회로의 장면이 원형',s:'tour / detour'},
{n:1781,w:'nitpick',m:'v. 하찮은 일에 꽁꽁 앓다, 트집[흠]을 잡다',r:'nit (이의 알) + pick (집다) → 머릿니의 알을 하나씩 집어내다 → 트집 잡다·사소한 것을 꼬집다로 고착 > 사소한 오류를 하나씩 찾아내는 장면이 원형',s:''},
{n:1782,w:'effect',m:'n. ① 결과 ② 효과; 효력 ③ 취지, 의미 ④ 소지품 / vt. ① 초래하다 ② 실행하다, 성취하다',r:'라틴어 efficere (bring about, 야기하다) → 원인이 만들어낸 결과 → 결과·효과로 고착 > 원인에 의해 나타나는 결과의 장면이 원형',s:'consequence / impact / meaning / bring about / achieve'},
{n:1783,w:'vagrant',m:'a. ① 방랑하는 ② 변덕스러운 / n. 방랑자',r:'라틴어 vagari (wander, 방랑하다) → 정처 없이 떠도는 → 부랑자·방랑으로 고착 > 일정한 거처 없이 떠도는 장면이 원형',s:'roving, wandering / desultory, whimsical / hobo, tramp, vagabond'},
{n:1784,w:'resource',m:'n. ① 자원; 물자 ② 수단, 방책',r:'라틴어 re (again) + surgere (rise, 솟다) → 다시 솟아나는 것 → 자원·재원으로 고착 > 땅 속에서 솟아나는 풍부한 자원의 장면이 원형',s:'reserve, source, supply / means, resort'},

{n:1786,w:'arcane',m:'a. 비밀의; 신비로운, 불가사의한',r:'라틴어 arcanus (secret, 비밀의) → 상자에 감춰진 비밀 → 신비한·비밀의로 고착 > 소수만 아는 신비로운 지식의 장면이 원형',s:'mysterious, occult, secret'},
{n:1787,w:'phenom',m:'n. 천재, 경이적인 사람',r:'phenomenon (현상)의 줄임말 → 현상 같은 뛰어난 존재 → 천재·경이로운 인물로 고착 > 나타나자마자 모두를 압도하는 장면이 원형',s:'genius, marvel, prodigy, wonder'},
{n:1788,w:'uphold',m:'vt. ① 떠받치다 ② 지지하다, 옹호하다',r:'up (위로) + hold (잡다) → 위로 들어 지지하다 → 지지하다·유지하다로 고착 > 전통적 가치를 높이 들어 지키는 장면이 원형',s:'elevate, hoist, raise / buttress, defend, maintain, support'},
{n:1789,w:'munition',m:'n. ① 군수품, 탄약 ② 필수품, 자금, 자재',r:'라틴어 munitio (fortification, 요새화) → 방어를 위한 군수품 → 군수품·탄약으로 고착 > 전쟁에 필요한 총알과 폭탄의 장면이 원형',s:'ammo, ordnance / commodities, necessaries'},

{n:1791,w:'bay',m:'n. ① 만(灣) ② 궁지; 막다른 곳',r:'고대 프랑스어 baie (opening, 열린 곳) → 바다로 열린 곳 → 만·격실·짖다로 고착 > 바다가 육지 안으로 파고들어 형성된 만의 장면이 원형',s:'cove, gulf / fix, plight, predicament'},
{n:1792,w:'downright',m:'a. ① 철저한, 완전한 ② 솔직한, 노골적인 / ad. 철저히, 완전히; 솔직히',r:'down (아래로) + right (곧은) → 아래로 곧장 → 완전한·철저한으로 고착 > 전혀 가리지 않고 완전히 노골적인 장면이 원형',s:'absolute, complete, outright, utter / blunt, frank, honest / completely, perfectly'},

{n:1795,w:'frenzy',m:'n. 극도의 흥분, 열광, 광분, 광란 / vt. ~를 몹시 흥분[격분]시키다, 미쳐 날뛰게 하다',r:'그리스어 phren (mind, 정신) → 정신이 나간 듯한 상태 → 광란·열광으로 고착 > 이성을 잃고 미친 듯이 행동하는 장면이 원형',s:'fever, hysteria, madness, mania, tumult / madden'},

{n:1797,w:'exhume',m:'vt. 파내다, (특히 시체를) 발굴하다; (숨은 인재·명작 등을) 찾아내다, 발굴하다',r:'라틴어 ex (out) + humus (earth, 흙) → 흙에서 꺼내다 → 발굴하다·개장하다로 고착 > 오래 묻혀있던 시신을 발굴하는 장면이 원형',s:'excavate, unearth'},
{n:1798,w:'suite',m:'n. ① 수행원, 종자(從者) ② (특히 호텔의) 스위트룸',r:'고대 프랑스어 suite (following, 뒤따르는) → 뒤따르는 것들의 집합 → 스위트룸·일련으로 고착 > 이어진 여러 방으로 구성된 특실의 장면이 원형',s:'attendant, cortege, entourage'},
{n:1799,w:'rambunctious',m:'a. (사람·행위가) 난폭한, 사나운; 사납게 날뛰는; 제멋대로인',r:'19세기 미국 영어 rambunctious (boisterous, 시끄러운) → 통제 불가능하게 시끄러운 → 난폭한·다루기 어려운으로 고착 > 제멋대로 시끄럽게 날뛰는 장면이 원형',s:'rowdy, unruly'},
{n:1800,w:'agent',m:'n. ① 대리인, 대행자; 주선인, 중개인 ② 첩보원, 간첩 ③ 중요한 작용을 하는 사람[것]; 작인(作因), 동인(動因)',r:'라틴어 agere (do, 행하다) → 행동하는 사람 → 대리인·요인으로 고착 > 회사를 대신해 협상하는 대리인의 장면이 원형',s:'delegate, deputy, proxy, representative'},
{n:1801,w:'novice',m:'n. 초심자, 초보자, 초년생, 풋내기',r:'라틴어 novicius (newly imported slave, 새로 온 노예) → 새로 들어온 사람 → 초심자·풋내기로 고착 > 처음 시작해 아무것도 모르는 장면이 원형',s:'beginner, greenhorn, newcomer, tyro'},
{n:1802,w:'concerted',m:'a. (특히 둘 이상의 사람·국가 등이) 일치단결된, 합심한, 결연한',r:'라틴어 concertare (contend, 겨루다) → 함께 힘을 모아 → 일치단결된·합심한으로 고착 > 여러 사람이 같은 목표를 향해 한마음으로 나아가는 장면이 원형',s:'combined, unanimous, united'},
{n:1803,w:'expunge',m:'vt. (이름·정보·기억 등을) 지우다, 삭제하다',r:'라틴어 ex (out) + pungere (prick, 찌르다) → 찔러 지우다 → 지우다·삭제하다로 고착 > 기록에서 이름을 완전히 지워버리는 장면이 원형',s:'delete, efface, erase, remove'},
{n:1804,w:'profligate',m:'a. ① 낭비가 심한 ② 품행이 나쁜, 방탕한 / n. ① 방탕아, 난봉꾼 ② 낭비가',r:'라틴어 profligare (overthrow, 쓰러뜨리다) → 도덕을 쓰러뜨린 → 낭비가 심한·방탕한으로 고착 > 돈과 향락에 모든 것을 탕진하는 장면이 원형',s:'extravagant, prodigal, spendthrift, wasteful / degenerate, depraved, immoral / libertine / squanderer'},
{n:1805,w:'assail',m:'vt. ① 공격[습격]하다, 비난하다 ② (불안·의심 등이) 괴롭히다',r:'라틴어 ad (to) + salire (leap, 뛰다) → ~를 향해 뛰어들다 → 공격하다·비난하다로 고착 > 사방에서 달려들어 공격하는 장면이 원형',s:'assault, attack'},
{n:1806,w:'livelihood',m:'n. 살림살이, 생계; 생계수단',r:'고대 영어 liflad (course of life, 삶의 방식) → 삶을 영위하는 수단 → 생계·생계수단으로 고착 > 가족을 부양하기 위해 일하는 장면이 원형',s:'housekeeping, living'},
{n:1807,w:'requisite',m:'a. 필요한, 없어서는 안 될, 필수인 / n. 필수품, 필요조건',r:'라틴어 requisitus (required, 필요한) → 반드시 필요한 것 → 필요한·필수품으로 고착 > 없으면 목표를 이룰 수 없는 필수 조건의 장면이 원형',s:'essential, necessary, required / precondition, requirement'},
{n:1808,w:'sidestep',m:'v. 옆으로 비키다; (책임 등을) 회피하다',r:'side (옆) + step (발걸음) → 옆으로 발걸음을 옮기다 → 옆으로 비키다·회피하다로 고착 > 날아오는 공을 옆으로 비켜 피하는 장면이 원형',s:'avoid, evade'},
{n:1809,w:'despondent',m:'a. 낙담한, 실의에 빠진, 풀이 죽은',r:'라틴어 de (completely) + spondeo (promise, 약속하다) → 희망을 완전히 잃다 → 낙담한·실의에 빠진으로 고착 > 모든 것을 포기한 듯 고개를 떨구는 장면이 원형',s:'dejected, depressed, discouraged'},
{n:1810,w:'induct',m:'vt. ① (정식으로 직위·성직·지위에) 임명하다, 취임시키다 ② (비결 등을) 전수하다, 초보를 가르치다',r:'라틴어 in (into) + ducere (lead, 이끌다) → 안으로 이끌다 → 취임시키다·전수하다로 고착 > 새로운 구성원을 공식적으로 맞이하는 장면이 원형',s:'inaugurate, install, instate / initiate, introduce'},
{n:1811,w:'privilege',m:'n. 특권, 특전',r:'privi (private, 개인의) + lege (law, 법) → 개인을 위해 따로 정해진 법 → 특권으로 고착 > 왕이 특정 귀족에게만 서명해 주는 칙령의 장면이 원형',s:'prerogative'},
{n:1812,w:'strident',m:'a. ① 소리가 불쾌한, 날카로운, 귀에 거슬리는 ② 공격적인, 단호한, 집요한',r:'strid (삐걱거리다, 마찰음) + -ent (형용사형) → 마찰로 생기는 날카로운 소리의 성질 → 귀에 거슬리는·공격적인으로 고착 > 칠판을 손톱으로 긁는 소리가 울리는 장면이 원형',s:'noisy, raucous, vociferous'},
{n:1813,w:'denomination',m:'n. ① 명칭, 호칭 ② 종파, 교파 ③ (특히 돈의) 액면가, 액면표시금액',r:'de (완전히) + nomin (name, 이름) + -ation (명사형) → 완전히 이름 붙이는 행위 → 명칭·종파·액면가로 고착 > 지폐에 금액 숫자를 찍어 구분하는 장면이 원형',s:'appellation, compellation, designation / religious sect / face value'},
{n:1814,w:'fester',m:'v. ① (상처가) 곪다; (쓰레기 등이) 부패하다 ② (분통 등으로) 마음이 아프다; 노여움 등이 심해지다 ③ (문제 등이) 악화되다',r:'라틴어 fistula (관, 궤양) → 상처가 고름을 내뿜는 관처럼 썩어가는 이미지 → 곪다·악화되다로 고착 > 방치된 상처에 고름이 차오르는 장면이 원형',s:'become infected, decay, putrefy, suppurate / annoy, irk, irritate / intensify'},
{n:1815,w:'acupuncture',m:'n. 침술(요법)',r:'acu (needle, 바늘) + punct (pierce, 찌르다) + -ure (명사형) → 바늘로 찌르는 행위 → 침술로 고착 > 가느다란 침이 경혈 자리에 꽂히는 장면이 원형',s:''},
{n:1816,w:'injurious',m:'a. ① 해로운, 유해한 ② 상처를 주는, (말이) 무례한, 모욕적인',r:'in (not) + jur (right/law, 권리·법) + -ious (형용사형) → 권리를 침해하는 성질 → 해로운·모욕적인으로 고착 > 누군가의 권리를 짓밟는 장면이 원형',s:'damaging, detrimental, harmful / hurtful, insulting'},
{n:1817,w:'bonanza',m:'n. ① (찾아낸) 풍부한 광맥, 노다지 ② 뜻밖의 행운, 횡재, 대성공',r:'스페인어 bonanza (calm sea, 잔잔한 바다) → 항해 순풍처럼 뜻밖에 찾아오는 풍요 → 노다지·횡재로 고착 > 광부가 금맥을 발견해 환호하는 장면이 원형',s:'bunce, jackpot, windfall'},
{n:1818,w:'dispose',m:'v. ① 처분하다[of] ② 배치하다, 배열하다 ③ ~의 경향을 갖게 하다',r:'dis (apart, 따로) + pos (place, 놓다) → 따로따로 배치하다 → 처분하다·배열하다·경향 갖게 하다로 고착 > 물건을 제자리에 하나씩 놓거나 치우는 장면이 원형',s:'arrange, order, place / incline, predispose, tempt'},
{n:1819,w:'suggestion',m:'n. ① 제안, 제의, 의견 ② 시사, 암시 ③ 연상, 착상 ④ 기미, 기색',r:'sub (under, 아래) + gest (carry, 운반하다) + -ion (명사형) → 아래에서 슬며시 운반해 올리는 것 → 제안·암시·기미로 고착 > 귓속말로 아이디어를 살며시 전달하는 장면이 원형',s:'proposal, proposition, recommendation / allusion, implication / idea / hint, note, sign'},
{n:1820,w:'timorous',m:'a. 겁 많은, 소심한',r:'timor (fear, 두려움) + -ous (형용사형) → 두려움을 가진 성질 → 겁 많은·소심한으로 고착 > 작은 소리에도 움츠러드는 사람의 장면이 원형',s:'chicken-hearted, cowardly, pusillanimous, timid'},
{n:1821,w:'euphoria',m:'n. (극도의) 행복감, 희열',r:'eu (good, 좋은) + phor (carry, 나르다) + -ia (상태) → 좋은 감정을 가득 실어 나르는 상태 → 극도의 행복감·희열로 고착 > 구름 위를 걷는 듯 몸이 가벼운 장면이 원형',s:'ecstasy, jubilation, rapture'},
{n:1822,w:'compress',m:'v. ① 압축[압착]하다 ② (사상·언어 등을) 요약하다, 집약하다 / n. 압박 붕대; 습포',r:'com (together, 함께) + press (누르다) → 함께 꽉 눌러 좁히다 → 압축하다·요약하다로 고착 > 스프링을 두 손으로 눌러 납작하게 만드는 장면이 원형',s:'condense / abridge, abstract, summarize'},
{n:1823,w:'exigency',m:'n. 위급, 급박, 긴급 사태',r:'ex (out, 밖으로) + ig (drive, 몰다) + -ency (명사형) → 사태가 밖으로 몰아치는 긴박함 → 위급·긴급 사태로 고착 > 경보가 울리며 즉각 대피를 요구하는 장면이 원형',s:'crisis, emergency, urgency'},
{n:1824,w:'subterranean',m:'a. ① 지하의, 지하에 있는 ② 숨은, 비밀의',r:'sub (under, 아래) + terran (earth, 땅) + -ean (형용사형) → 땅 아래에 있는 성질 → 지하의·숨은으로 고착 > 땅 속 깊이 뻗은 지하 터널의 장면이 원형',s:'underground / covert, hidden'},
{n:1825,w:'mercury',m:'n. ① 수은, 수은주 ② <천문학> 수성(水星) ③ 활기',r:'라틴어 Mercurius (신들의 전령) → 빠르게 움직이는 전령처럼 유동적인 금속 → 수은·수성·활기로 고착 > 깨진 온도계에서 은빛 구슬이 또르르 굴러가는 장면이 원형',s:'animation, briskness, liveliness, spirit, vigor'},
{n:1826,w:'glean',m:'v. ① (정보·지식 등을) 조금씩 수집하다, 모으다 ② (이삭을) 줍다',r:'고대 프랑스어 glener (이삭을 줍다) → 수확 후 남은 것을 하나씩 모으는 행위 → 조금씩 수집하다·이삭 줍다로 고착 > 추수 후 밭에서 낱알을 하나하나 줍는 장면이 원형',s:'collect, gather'},
{n:1827,w:'affection',m:'n. ① 애정, 호의; 애착 ② 감정, 감동 ③ 영향 ④ 병',r:'af (to, ~에) + fect (do/make, 작용하다) + -ion (명사형) → 마음에 작용해 생기는 것 → 애정·감동·영향·병으로 고착 > 따뜻한 손길이 마음을 어루만지는 장면이 원형',s:'attachment, devotion, love / emotion, feeling / effect, influence / disease, illness'},
{n:1828,w:'oval',m:'a. 달걀 모양의, 타원형의',r:'라틴어 ovum (egg, 달걀) + -al (형용사형) → 달걀처럼 생긴 형태 → 달걀 모양의·타원형으로 고착 > 달걀을 옆에서 바라보는 장면이 원형',s:'egg-shaped, elliptical, ovoid'},
{n:1829,w:'mote',m:'n. 티끌, 매우 작은 먼지; 작은 결정',r:'고대 영어 mot (먼지 입자) → 빛 속에 떠다니는 아주 작은 먼지 알갱이 → 티끌·작은 먼지로 고착 > 햇살 속에 먼지가 둥둥 떠다니는 장면이 원형',s:'bit, grain, particle; speck'},
{n:1830,w:'wail',m:'v. (고통·슬픔·통증 등으로) 울부짖다, 통각하다 / n. 울부짖음, 통곡',r:'고대 노르드어 væla (슬퍼하다) → 고통이 터져 나오는 길고 높은 소리 → 울부짖다·통곡으로 고착 > 상을 당한 사람이 하늘을 향해 울부짖는 장면이 원형',s:'cry, howl, weep / lamentation, moan'},
{n:1831,w:'tumult',m:'n. 소란, 소동; 폭동, 반란',r:'라틴어 tumultus (소란) → tum (swell, 부풀다) → 군중이 부풀어 오르듯 들썩이는 혼란 → 소란·폭동으로 고착 > 광장에서 군중이 뒤엉켜 소리치는 장면이 원형',s:'commotion, riot, to-do, turmoil, uproar'},
{n:1832,w:'hue',m:'n. ① 색조; 빛깔; 색상 ② (의견·태도 등의) 경향, 특색',r:'고대 영어 hiw (색깔·모양) → 물체가 반사하는 고유한 색조 → 색조·색상·경향으로 고착 > 프리즘이 빛을 갈라 여러 색을 펼치는 장면이 원형',s:'color, shade, tone / aspect, light'},
{n:1833,w:'retribution',m:'n. ① (나쁜 행동에 대한) 보복, 앙갚음 ② 징벌, 천벌',r:'re (back, 되돌아) + tribut (give, 주다) + -ion (명사형) → 되돌려 주는 것 → 보복·징벌·천벌로 고착 > 나쁜 행동이 그대로 돌아오는 부메랑의 장면이 원형',s:'reprisal, retaliation, vengeance'},
{n:1834,w:'leery',m:'a. ① 의심 많은, 조심하는, 경계하는 ② 곁눈질하는',r:'중세 영어 lere (빈·공허한) → 경계심으로 눈을 가늘게 뜨며 곁눈질하는 이미지 → 의심 많은·경계하는으로 고착 > 낯선 사람을 옆으로 훑어보는 눈빛의 장면이 원형',s:'cauthorized, suspicious / casting a side glance'},
{n:1835,w:'crux',m:'n. ① 가장 중요한 부분, 핵심 ② 난문(難問), 난제(難題) ③ 십자가',r:'라틴어 crux (cross, 십자가) → 십자가처럼 모든 것이 교차하는 핵심 지점 → 핵심·난제·십자가로 고착 > 여러 길이 교차하는 교차로 중심점의 장면이 원형',s:'core, gist, kernel, nitty-gritty, pith'},
{n:1836,w:'diverge',m:'v. ① 갈라지다, 분기하다 ② (의견 등이) 갈라지다, 다르다 ③ (진로·이야기 등에서) 빗나가다, 벗어나다',r:'di (apart, 따로) + verg (turn, 기울다) → 서로 다른 방향으로 기울어지다 → 갈라지다·분기하다·벗어나다로 고착 > 하나의 길이 두 갈래로 나뉘는 장면이 원형',s:'divide, fork, separate, split / conflict, differ, disagree / deviate, digress, stray'},
{n:1837,w:'pendulum',m:'n. (시계 등의) 진자, 흔들리는 추; 샹들리에; 마음을 잡지 못하는 사람',r:'라틴어 pendere (hang, 매달리다) + -ulum (도구 명사형) → 매달려 흔들리는 장치 → 진자·흔들리는 추로 고착 > 시계 속 추가 좌우로 규칙적으로 흔들리는 장면이 원형',s:''},
{n:1838,w:'voluminous',m:'a. ① 부피[용적]가 큰, 방대한, 다량의 ② 권수[책수]가 많은, 여러 권의 ③ 저서가 많은, 다작의',r:'volum (roll, 두루마리) + -ous (형용사형) → 두루마리가 많이 감긴 듯 부피가 큰 성질 → 방대한·다량의·다작의로 고착 > 서가를 가득 채운 두꺼운 책들의 장면이 원형',s:'ample, copious, massive / productive, prolific'},
{n:1839,w:'caption',m:'n. ① (페이지·기사 등의) 표제, 제목; 자막 ② (사진·삽화의) 설명(문)',r:'라틴어 capere (take, 잡다) → 페이지나 그림을 \'잡아주는\' 제목·설명 → 표제·자막·설명문으로 고착 > 사진 아래에 설명 문구가 달린 장면이 원형',s:'heading, title; subtitle / legend, underline'},
{n:1840,w:'ornament',m:'n. 장식품, 장신구; 장식 / vt. 장식하다',r:'ordin (arrange, 정렬하다) → 아름답게 정돈하여 꾸미는 것 → 장식품·장신구로 고착 > 크리스마스 트리에 반짝이는 구슬을 다는 장면이 원형',s:'adornment, decoration, embellishment / adorn, decorate, embellish'},
{n:1841,w:'emend',m:'vt. (문서·잘못 등을) 교정하다, 수정하다',r:'e (out) + mend (fault, 결점) → 결점을 밖으로 꺼내 없애다 → 교정하다·수정하다로 고착 > 원고의 오류를 빨간 펜으로 지우고 고치는 장면이 원형',s:'correct, rectify, revise'},
{n:1842,w:'bedridden',m:'a. 물져 누워 있는, 누워서만 지내는; 노후한, 낡은',r:'bed (침대) + ridden (ride의 과거분사, ~에 갇힌) → 침대에 갇혀 버린 상태 → 누워서만 지내는으로 고착 > 병으로 침대를 벗어나지 못하는 환자의 장면이 원형',s:'laid up, sick[ill] in bed'},
{n:1843,w:'interference',m:'n. 간섭, 참견, 개입, 방해',r:'inter (between, 사이에) + fer (carry, 운반하다) + -ence (명사형) → 사이에 끼어들어 흐름을 방해하는 것 → 간섭·개입·방해로 고착 > 두 사람의 대화 사이에 끼어드는 장면이 원형',s:'intervention, intrusion, meddling'},
{n:1844,w:'amorphous',m:'a. ① 확실한 형태가 없는, 무정형의 ② 특색[개성]이 뚜렷하지 않은, 특징이 없는',r:'a (not) + morph (form, 형태) + -ous (형용사형) → 형태가 없는 성질 → 무정형의·특색이 없는으로 고착 > 그릇 없이 흘러내리는 젤리처럼 윤곽이 없는 장면이 원형',s:'formless, shapeless, unshaped / characterless, featureless, gray'},
{n:1845,w:'rout',m:'n. ① 완패, 패주 ② 혼란한 군중; 소란 / vt. 완패[패주]시키다',r:'라틴어 rupta (broken, 부서진) → 대열이 완전히 부서져 도망치는 상태 → 완패·패주·혼란한 군중으로 고착 > 전투에서 완전히 무너져 달아나는 군대의 장면이 원형',s:'beating, debacle / beat, defeat, thrash, vanquish'},
{n:1846,w:'knead',m:'vt. ① (가루·흙 등을) 반죽하다, 개다 ② (어깨나 근육 등을) 주무르다 ③ (인격을) 닦다, 도야하다',r:'고대 영어 cnedan (반죽하다) → 손바닥으로 누르고 접으며 주무르는 동작 → 반죽하다·주무르다로 고착 > 제빵사가 밀가루 반죽을 힘껏 주무르는 장면이 원형',s:'mold, work / massage, rub / cultivate, file, train'},
{n:1847,w:'comrade',m:'n. 동료, 동지, 전우, 친구, 벗',r:'스페인어 camarada (같은 방 동료) → 같은 방(camara)을 쓰는 사이 → 동료·동지·전우로 고착 > 전쟁터에서 어깨를 나란히 하는 병사들의 장면이 원형',s:'associate, colleague, companion'},
{n:1848,w:'foray',m:'n. ① 습격, 급습 ② 본업 이외의 분야에의 진출 / v. ① 습격[약탈]하다 ② 침입[진출]하다',r:'고대 프랑스어 forrer (먹이를 찾아 나서다) → 약탈·목적지로 갑자기 뛰어드는 행위 → 습격·진출로 고착 > 기병대가 적진을 향해 갑자기 돌격하는 장면이 원형',s:'incursion, inroad, invasion, raid / loot, pillage, plunder'},
{n:1849,w:'barrister',m:'n. 법정 변호사; 변호사, 법률가',r:'bar (법정 내 칸막이) + -ister (사람) → 법정 칸막이(bar) 안쪽에 서는 사람 → 법정 변호사로 고착 > 법정 안에서 변론하는 변호사의 장면이 원형',s:'attorney, counsel, lawyer, solicitor'},
{n:1850,w:'prowl',m:'v. ① 살금살금 돌아다니다 ② 배회하다 ③ 서성거리다[어슬렁거리다]',r:'중세 영어 prollen (두리번거리다) → 먹이를 찾듯 살금살금 돌아다니는 행위 → 배회하다·서성거리다로 고착 > 어두운 골목을 고양이처럼 조용히 걷는 장면이 원형',s:'wander / loaf, rove'},
{n:1851,w:'immortal',m:'a. 죽지 않는, 불사의, 불멸의',r:'im (not) + mort (death, 죽음) + -al (형용사형) → 죽음이 없는 성질 → 불사의·불멸의로 고착 > 신화 속 신들이 영원히 살아있는 장면이 원형',s:'eternal, imperishable, indestructible, undying'},
{n:1852,w:'constrict',m:'vt. 압축하다; 죄다; 수축시키다',r:'con (together, 함께) + strict (bind, 묶다) → 함께 묶어 좁히다 → 압축하다·수축시키다로 고착 > 뱀이 먹이를 몸통으로 감아 조이는 장면이 원형',s:'compress, contract, squeeze, tighten'},
{n:1853,w:'persiflage',m:'n. 야유, 희롱; 농담',r:'프랑스어 per (through) + siffler (whistle, 휘파람) → 휘파람 불듯 가볍게 빈정거리는 것 → 야유·희롱·농담으로 고착 > 가볍게 비웃으며 놀리는 사람의 장면이 원형',s:'banter, raillery'},
{n:1854,w:'subordinate',m:'a. 부차적[부수]적인 / vt. 하위에 두다; 경시하다 / n. 하급[종속]자, 부하',r:'sub (under, 아래) + ordin (order, 순서) + -ate (형용사형) → 순서 아래에 놓인 → 부차적인·하급자로 고착 > 조직도에서 아래 칸에 배치된 직원의 장면이 원형',s:'collateral, secondary, subservient / belittle, disvalue, downplay / henchman, junior'},
{n:1855,w:'accrue',m:'v. (이자·이익 등이) 생기다',r:'ac (to) + cru (grow, 자라다) → ~를 향해 자라나 쌓이다 → (이자·이익이) 생기다로 고착 > 은행 통장에 이자가 조금씩 쌓이는 장면이 원형',s:'accumulate'},
{n:1856,w:'offspring',m:'n. ① 자식, 자녀; 자손, 후예 ② 생겨난 것, 소산, 결과',r:'off (from, ~에서) + spring (jump, 튀어나오다) → 부모에게서 튀어나온 것 → 자녀·자손·소산으로 고착 > 어미 품에서 새끼가 뛰쳐나오는 장면이 원형',s:'descendant, progeny / fruit, result'},
{n:1857,w:'retaliate',m:'v. 보복하다, 앙갚음하다, 응수하다',r:'re (back, 되돌아) + tali (same, 같은) + -ate (동사형) → 같은 방식으로 되돌려 주다 → 보복하다·앙갚음하다로 고착 > 맞은 만큼 똑같이 되돌려 치는 장면이 원형',s:'avenge, requite, revenge'},
{n:1858,w:'primary',m:'a. ① 첫째의, 제1의, 수위의, 주요한 ② 최초의, 처음의; 원시적인; 근본적인',r:'prim (first, 첫째) + -ary (형용사형) → 첫째인 성질 → 주요한·최초의·원시적인으로 고착 > 출발선에서 맨 앞에 서는 장면이 원형',s:'chief, major, principal / basic, essential, fundamental'},
{n:1859,w:'somniloquy',m:'n. 잠꼬대(하는 버릇)',r:'somn (sleep, 잠) + loqu (speak, 말하다) + -y (명사형) → 잠 속에서 말하는 행위 → 잠꼬대로 고착 > 자면서 중얼중얼 말을 내뱉는 장면이 원형',s:'sleep talking'},
{n:1860,w:'ghastly',m:'a. ① 무시무시한, 소름끼치는 ② 파랗게 질린, 송장 같은',r:'고대 영어 gæstan (frighten, 놀라게 하다) → 혼을 빼놓을 만큼 소름 끼치는 → 무시무시한·송장 같은으로 고착 > 새하얗게 질린 유령 같은 얼굴의 장면이 원형',s:'grisly, gruesome, hideous, horrible'},
{n:1861,w:'trammel',m:'n. 방해, 제약, 속박 / vt. 구속하다, 제한하다',r:'라틴어 tri (three) + macula (mesh, 그물코) → 세 겹 그물로 옭아매다 → 방해·속박·구속하다로 고착 > 그물에 걸려 움직이지 못하는 물고기의 장면이 원형',s:'bond, chain, fetter, leash / fetter, hopple, restrict, tie'},
{n:1862,w:'dispatch',m:'v. ① 급파하다; 발송하다 ② 신속히 해치우다 ③ 죽이다 / n. 급파; 급보; 신속한 처리',r:'dis (away) + patch (fasten, 고정하다) → 빠르게 보내 처리하다 → 급파하다·발송하다·신속히 해치우다로 고착 > 전령이 말을 달려 급보를 전하는 장면이 원형',s:'expedite / destroy, eliminate / expedition; haste'},
{n:1863,w:'cant',m:'n. ① 위선적인 말투 ② 은어',r:'라틴어 cantare (sing, 노래하다) → 노래처럼 반복되는 상투적 말투 → 위선적 말투·은어로 고착 > 성직자가 판에 박힌 경건한 말을 되풀이하는 장면이 원형',s:'hypocritical statement / jargon, lingo'},
{n:1864,w:'blemish',m:'n. 흠, 오점, 결점 / vt. 더럽히다, 손상하다',r:'고대 프랑스어 blemir (make pale, 창백하게 하다) → 표면을 변색시켜 흠집을 남기다 → 흠·오점·결점으로 고착 > 깨끗한 피부에 생긴 점 하나의 장면이 원형',s:'blot, defect, fault, flaw, stain, stigma, sully, taint, tarnish'},
{n:1865,w:'ritual',m:'n. ① 의식, 예배식 ② 의식적 행사, 관례 / a. 의식의; 관습의',r:'라틴어 ritus (rite, 의식) + -al (형용사형) → 정해진 순서의 의식 → 예배식·관례로 고착 > 제단 앞에서 순서대로 행하는 의식의 장면이 원형',s:'ceremony, observance, rite, convention, custom, ceremonial, conventional'},
{n:1866,w:'incise',m:'vt. ① 새기다, 조각하다 ② 베다, 째다, 절개하다',r:'in (into) + cis (cut, 자르다) → 안으로 깊이 자르다 → 새기다·절개하다로 고착 > 조각가가 돌에 정으로 선을 새기는 장면이 원형',s:'carve, engrave, cut, section'},
{n:1867,w:'edifice',m:'n. ① 건물, 건축물, 전당 ② 조직, 체계',r:'edific (build, 짓다) → 지어 올린 구조물 → 건물·전당·체계로 고착 > 돌을 쌓아 웅장한 건물을 세우는 장면이 원형',s:'building, construction, structure, system'},
{n:1868,w:'bamboozle',m:'v. ① 교묘한 말로 속이다 ② 당황하게[어리둥절하게] 하다',r:'bamboozle (18세기 속어, 속이다) → 어원 불명, 연기와 혼란으로 상대를 당황하게 하는 이미지 → 교묘히 속이다·어리둥절하게 하다로 고착 > 마술사가 눈속임으로 관객을 혼란에 빠뜨리는 장면이 원형',s:'deceive, trick, confuse, perplex'},
{n:1869,w:'monolithic',m:'a. ① 하나의 암석으로 된 ② 단일체의; 획일적이고 자유가 없는',r:'mono (one, 하나) + lith (stone, 돌) + -ic (형용사형) → 하나의 거대한 돌덩어리 → 단일체의·획일적인으로 고착 > 이집트 오벨리스크처럼 통째로 깎은 거대한 돌 기둥의 장면이 원형',s:'undiversified'},
{n:1870,w:'famine',m:'n. ① 기근; 흉작 ② 굶주림, 배고픔',r:'라틴어 fames (hunger, 굶주림) + -ine (명사형) → 굶주림이 땅을 뒤덮은 상태 → 기근·흉작으로 고착 > 바싹 마른 땅에서 빈 밥그릇을 든 사람의 장면이 원형',s:'deprivation, hunger, starvation'},
{n:1871,w:'display',m:'v. ① 전시하다, 보이다 ② 올리다, 게양하다 / n. 전시, 진열; 드러냄',r:'dis (apart, 펼쳐) + play (fold, 접다) → 접혔던 것을 펼쳐 보이다 → 전시하다·드러내다로 고착 > 가게 진열창에 상품을 늘어놓는 장면이 원형',s:'exhibit, show, fly, hoist, unfurl'},
{n:1872,w:'nosy',m:'a. 참견하기 좋아하는, 꼬치꼬치 캐묻는 / n. 참견하기 좋아하는 사람',r:'nose (코) + -y (형용사형) → 코를 들이밀고 냄새 맡듯 캐묻는 → 참견하기 좋아하는·꼬치꼬치 캐묻는으로 고착 > 이웃집 대화에 코를 들이미는 사람의 장면이 원형',s:'intrusive, meddlesome, backseat driver, busybody'},
{n:1873,w:'efflorescence',m:'n. 개화; 개화기; 절정, 전성기',r:'ef (out) + flor (flower, 꽃) + -escence (되어가는 과정) → 꽃이 밖으로 피어나는 과정 → 개화·절정·전성기로 고착 > 꽃봉오리가 환하게 터지는 장면이 원형',s:'anthesis, blossoming, flowering'},
{n:1874,w:'unleash',m:'vt. 풀어놓다; 해방하다; 폭발시키다',r:'un (not) + leash (가죽끈) → 가죽끈을 풀어버리다 → 풀어놓다·해방하다·폭발시키다로 고착 > 묶였던 개의 목줄을 풀어 달려가게 하는 장면이 원형',s:'unbind, unchain, release'},
{n:1875,w:'trend',m:'n. 경향, 동향, 추세',r:'고대 영어 trendan (돌다, 방향을 잡다) → 흐름이 한 방향으로 꾸준히 흘러가는 것 → 경향·추세로 고착 > 강물이 일정한 방향으로 흐르는 장면이 원형',s:'current, direction, temporary, tendency'},
{n:1876,w:'lascivious',m:'a. 음탕한, 호색의; 선정적인, 도발적인',r:'라틴어 lascivia (wantonness, 방종) + -ous (형용사형) → 욕망을 자제하지 않는 성질 → 음탕한·선정적인으로 고착 > 욕망을 거리낌 없이 드러내는 장면이 원형',s:'lecherous, lewd, libidinous, licentious, obscene'},
{n:1877,w:'exploit',m:'vt. ① 착취하다 ② 활용하다 ③ 개발하다 / n. 위업, 공적',r:'ex (out) + ploit (fold, 펼치다) → 숨겨진 것을 펼쳐 최대한 이용하다 → 착취하다·활용하다·위업으로 고착 > 광산에서 자원을 캐내 이용하는 장면이 원형',s:'abuse, misuse, capitalize, use, utilize, develop, achievement, feat'},
{n:1878,w:'contingent',m:'a. ① ~에 의존적인[on, upon] ② 우발적인, 우연의 / n. 대표단, 파견단',r:'con (together) + ting (touch, 닿다) + -ent (형용사형) → 함께 닿아야만 일어나는 → ~에 의존적인·우발적인·대표단으로 고착 > 도미노가 앞 패에 닿아야 쓰러지는 장면이 원형',s:'conditional, dependent, accidental, casual, fortuitous'},
{n:1879,w:'frontispiece',m:'n. ① 권두 삽화; 속표지 ② 정면',r:'front (앞면) + i + spic (look, 보다) → 앞면을 바라보는 곳 → 권두 삽화·정면으로 고착 > 책을 펼치자마자 나오는 그림 페이지의 장면이 원형',s:'facade, face, front'},
{n:1880,w:'wreak',m:'vt. ① (해별 등을) 가하다, 주다 ② (분노를) 터뜨리다',r:'고대 영어 wrecan (drive out, 몰아내다) → 분노나 파괴를 쏟아내다 → (해를) 가하다·(분노를) 터뜨리다로 고착 > 폭풍이 해안을 강타해 파괴를 쏟아내는 장면이 원형',s:'inflict, unleash, vent'},
{n:1881,w:'defendant',m:'n. 피고, 피고인',r:'de (from) + fend (strike, 치다) + -ant (사람) → 공격을 막아내는 사람 → 피고·피고인으로 고착 > 법정에서 변호인 옆에 앉아 방어하는 피고의 장면이 원형',s:'respondent'},
{n:1882,w:'comport',m:'vt. <재귀용법> 행동[처신]하다',r:'com (together) + port (carry, 나르다) → 몸가짐을 함께 가져가다 → 행동하다·처신하다로 고착 > 고개를 꼿꼿이 들고 품위 있게 걷는 장면이 원형',s:'behave, conduct'},
{n:1883,w:'runaway',m:'a. ① 달아난, 가출한 ② 제어가 안 되는 ③ 일방적인, 낙승한 / n. ① 도망자 ② 일방적인 승리',r:'run (달리다) + away (멀리) → 멀리 달아나 버린 → 가출한·제어 안 되는·도망자로 고착 > 밤에 짐을 싸들고 몰래 집을 빠져나가는 장면이 원형',s:'escaped, fleeing, fugitive, uncontrolled, unmanageable, easy, effortless, absconder, escapee, refugee, blowout, sweep, walkaway, walkover'},
{n:1884,w:'antecedent',m:'n. ① 선례, 전례 ② (pl.) 조상, 선조 ③ 전력, 경력 / a. 선행하는, 우선하는[to]',r:'ante (before, 앞에) + ced (go, 가다) + -ent (형용사형) → 앞에 먼저 간 것 → 선례·조상·선행하는으로 고착 > 역사책에 기록된 과거 사례를 가리키는 장면이 원형',s:'forerunner, precursor, former, preceding'},
{n:1885,w:'vegetarian',m:'n. 채식주의자; 초식 동물 / a. 채식의, 채식주의자의',r:'라틴어 vegetare (enliven, 활기차게 하다) + -arian (주의자) → 식물로 생기를 얻는 사람 → 채식주의자로 고착 > 고기 없이 채소 가득한 접시를 먹는 장면이 원형',s:'herbivore'},
{n:1886,w:'inhale',m:'v. (공기 등을) 빨아들이다, 흡입하다',r:'in (into) + hal (breathe, 숨 쉬다) → 안으로 숨을 들이쉬다 → 빨아들이다·흡입하다로 고착 > 깊게 숨을 들이마시는 장면이 원형',s:'breathe in, sniff, take a breath'},
{n:1887,w:'brick-and-mortar',m:'a. 오프라인 거래의; 소매의',r:'brick (벽돌) + mortar (모르타르) → 벽돌과 시멘트로 지은 실물 건물 → 오프라인 거래의·소매의로 고착 > 실제 건물 안에 있는 오프라인 매장의 장면이 원형',s:'off-line, retail, shoppy'},
{n:1888,w:'smother',m:'v. ① 질식시키다, 숨 막히게 하다 ② (감정 등을) 억누르다, 억제하다',r:'고대 영어 smorian (suffocate, 질식시키다) → 두꺼운 것으로 덮어 숨을 막다 → 질식시키다·억누르다로 고착 > 두꺼운 이불로 불꽃을 덮어 끄는 장면이 원형',s:'choke, stifle, strangle, suffocate, quash, repress, subdue, suppress'},
{n:1889,w:'climax',m:'n. 최고조, 절정; 정점, 극점',r:'그리스어 klimax (ladder, 사다리) → 사다리를 올라 맨 꼭대기에 도달하는 것 → 최고조·절정으로 고착 > 계단 꼭대기에 올라 환호하는 장면이 원형',s:'acme, culmination, peak, summit, zenith'},

{n:1968,w:'stark',m:'a. ① (아무 색채나 장식이 없어) 삭막한, 황량한 ② (현실·선택 등이) 엄연한, 가혹한 ③ (차이가) 극명한 ④ 완전한, 순전한',r:'ad (to) + sed (sit, 앉다) + -uity (명사형) → 꾸준히 앉아서 계속하는 것 → 근면함·부지런함으로 고착 > 새벽부터 밤까지 책상에서 일하는 장면이 원형',s:''},
{n:1969,w:'relative',m:'n. 친척, 인척, 일가; 동족, 동류 / a. ① (고려·판단이) 비교상의, 상대적인 ② (~와) 관련된, (~에) 대한[to] ③ (~에) 호응하는, 비례하는[to]',r:'그리스어 katharsis (cleansing, 정화) → 감정의 찌꺼기를 씻어내는 것 → 감정 정화·카타르시스로 고착 > 비극을 보고 실컷 울고 나서 마음이 가벼워지는 장면이 원형',s:''},
{n:1970,w:'desuetude',m:'n. 폐지(상태), 불용(不用), 쓰이지 않음',r:'중세 영어 peefish (irritable, 짜증스러운) → 사소한 것에 신경이 긁히는 → 짜증나게 하다·불만으로 고착 > 반복되는 소음에 짜증이 쌓이는 장면이 원형',s:'disuse, obsoletism'},
{n:1971,w:'flee',m:'v. 달아나다, 도망하다; 피하다',r:'Iris (그리스 무지개 여신) + -escent (빛나는) → 무지개처럼 여러 빛깔로 빛나는 → 무지개빛의·광채가 나는으로 고착 > 비눗방울 표면이 무지개색으로 반짝이는 장면이 원형',s:'escape, fly, run away'},
{n:1972,w:'toilsome',m:'a. (생활·등산·여행 등이) 고생스러운, 힘든',r:'en (in) + cumber (obstruct, 막다) → 안에 걸리게 하여 방해하다 → 방해하다·짐이 되다로 고착 > 무거운 짐을 잔뜩 달고 걷기 힘든 장면이 원형',s:'arduous, burdensome, laborious, strenuous, taxing'},
{n:1973,w:'gentile',m:'n. (유대인의 입장에서) 이방인(특히, 기독교도) / a. 유대인이 아닌, (특히) 기독교도의',r:'magn (great, 큰) + anim (spirit, 정신) + -ous (형용사형) → 정신이 크고 넓은 → 너그러운·관대한·도량이 넓은으로 고착 > 패배한 상대방에게도 손을 내미는 장면이 원형',s:'heathen, infidel'},
{n:1974,w:'provocative',m:'a. ① 성나게 하는; (말·태도 등이) 도발적인, 자극적인 ② (식욕·성욕을) 자극하는; 흥분성의 ③ 물의를 일으키는, 문제가 되는',r:'ob (completely) + liv (leave, 떠나다) + -ion (명사형) → 완전히 떠나버린 상태 → 망각·잊혀짐으로 고착 > 오래된 일이 안개 속으로 사라지는 장면이 원형',s:'offensive, stimulating'},
{n:1975,w:'ruminate',m:'v. ① 심사숙고하다, 곰곰이 생각하다 ② (소 등이) 반추하다, 위에서 되돌려 씹다, 되새김질하다',r:'라틴어 frugalis (economical, 절약하는) → 열매(frux)를 아껴 쓰는 성질 → 절약하는·검소한으로 고착 > 음식을 남기지 않고 그릇을 깨끗이 비우는 장면이 원형',s:'contemplate, meditate, muse, ponder'},
{n:1976,w:'corsair',m:'n. ① 사포선(私捕船) ② 해적; 해적선',r:'ex (out) + oner (burden, 짐) + -ate (동사형) → 짐을 꺼내 없애주다 → 무죄 선언하다·책임 면제하다로 고착 > 판사가 무죄를 선고해 모든 혐의를 내려놓는 장면이 원형',s:'privateer, buccaneer, pirate, picaroon'},
{n:1977,w:'liaison',m:'n. ① (군사) 연락, 통신 ② (두 집단·조직 간의) 연락 담당자, 연락원, 연락책 ③ (배우자가 아닌 사람과의) 정사, 간통, 밀통',r:'sur (over, 위) + mount (climb, 오르다) → 위로 올라 극복하다 → 어려움을 극복하다·산을 오르다로 고착 > 가파른 절벽을 기어올라 정상에 서는 장면이 원형',s:'communication, connection, contact, messenger, adultery, amour, fornication, intrigue'},
{n:1978,w:'hoodwink',m:'vt. 속이다, 속여 ~하게 하다 / n. 눈가림개',r:'inter (between) + locut (speak, 말하다) + -or (사람) → 사이에서 말을 나누는 사람 → 대화 상대자로 고착 > 두 사람이 마주 앉아 대화를 나누는 장면이 원형',s:'cheat, deceive, swindle, trick, blindfold'},
{n:1979,w:'quicksilver',m:'n. ① 수은 ② 활발한 성질, 변하기 쉬운 기질, 변덕; 변덕스러운 사람',r:'프랑스어 non (not) + chaloir (care, 신경 쓰다) → 신경 쓰지 않는 → 냉담한·태연한으로 고착 > 급한 상황에서도 여유롭게 손을 주머니에 넣은 장면이 원형',s:'hydrargyrum, mercury'},
{n:1980,w:'deface',m:'vt. ① ~의 외관[가치]을 손상시키다 ② (비명·증서 등을) 마멸시켜 잘 보이지 않게 하다 ③ 체면을 구기게 하다',r:'라틴어 mendax (liar, 거짓말쟁이) + -ious (형용사형) → 거짓말하는 성질 → 거짓말하는·허위의로 고착 > 손가락이 뒤에서 꼬인 채 맹세하는 장면이 원형',s:'damage, disfigure, disgrace, dishonor'},
{n:1981,w:'moratorium',m:'n. ① 지불 유예[정지], 모라토리엄; 지불 유예 기간 ② (활동의) 일시적 정지[연기][on]',r:'라틴어 supinus (lying back, 등을 대고 누운) → 하늘을 보고 등을 대고 누운 → 반듯이 누운·나태한으로 고착 > 아무것도 하지 않고 천장만 보고 누운 장면이 원형',s:'freeze, suspension'},
{n:1982,w:'postprandial',m:'a. 식후의, 만찬 후의',r:'스페인어 bravada (boast, 허풍) → 실제 용기 없이 겉으로만 부리는 허세 → 허세·객기로 고착 > 무서우면서도 용감한 척 앞으로 나서는 장면이 원형',s:'postcibal'},
{n:1983,w:'commute',m:'v. ① 통근하다 ② (형벌 등을) 감형[경감]하다 ③ 교환[변환]하다, 대체하다',r:'그리스어 ostrakon (도자기 조각, 추방 투표에 사용) → 도편(도자기 조각)으로 투표해 추방하다 → 추방하다·따돌리다로 고착 > 무리에서 한 명을 배제하고 등을 돌리는 장면이 원형',s:'straphang, extenuate, change, substitute'},
{n:1984,w:'excursion',m:'n. ① (보통 단체로 짧게 하는) 여행, 소풍, 유람, 수학여행 ② (이야기·생각 등의) 탈선, 본제를 벗어남',r:'con (together) + fisc (treasury, 국고) + -ate (동사형) → 국고로 함께 거두어들이다 → 몰수하다·압수하다로 고착 > 세관원이 불법 물품을 압수하는 장면이 원형',s:'jaunt, journey, outing, trip, deviation, digression'},
{n:1985,w:'internecine',m:'a. ① 서로 죽이는, 내분의, 동일 조직[국가] 내에서 벌어지는 투쟁의 ② 대량 살육적인, 사상자가 많은',r:'com (completely) + plac (please, 만족하다) + -ent (형용사형) → 완전히 만족해버린 → 자기만족의·현실에 안주하는으로 고착 > 더 나아지려 하지 않고 현실에 안주하는 장면이 원형',s:''},
{n:1986,w:'conduit',m:'n. ① (액체나 기체를 통하게 하는) 도관(導管), 전선관 ② (정보나 물자의) 전달[재전달] 기관, 국가',r:'un (not) + kempt (combed, 빗질된) → 빗질되지 않은 → 단정치 못한·허름한으로 고착 > 헝클어진 머리에 구겨진 옷을 입은 장면이 원형',s:'aqueduct, duct, pipe, bearer, channel, messenger'},
{n:1987,w:'blunt',m:'a. ① 무딘, 날이 없는 ② 둔감한, 우둔한 ③ 무뚝뚝한, 퉁명스러운 ④ 솔직한',r:'라틴어 desultor (circus rider, 말 묘기꾼) → 말에서 말로 이리저리 뛰어다니는 → 두서없는·산만한으로 고착 > 이 주제 저 주제 종잡을 수 없이 옮겨 다니는 장면이 원형',s:'edgeless, pointless, dull, obtuse, brusque, curt, gruff, surly, forthright, frank, outspoken, straightforward'},
{n:1988,w:'overthrow',m:'v. ① 뒤집어엎다, 타도하다, 무너뜨리다 ② (정부 등을) 전복시키다, (제도 등을) 폐지하다 / n. 타도, 전복',r:'hap (luck, 운) + -less (없는) → 운이 없는 → 불운한·불행한으로 고착 > 우산도 없이 갑자기 쏟아지는 비를 맞는 장면이 원형',s:'beat, defeat, destroy, overwhelm, overturn, subvert, subversion, upset'},
{n:1989,w:'fusillade',m:'n. 일제[연속] 사격; (질문 등의) 연발',r:'라틴어 avarus (greedy, 탐욕스러운) → 모든 것을 집어삼키려는 탐욕 → 탐욕·욕심으로 고착 > 금화를 양팔 가득 끌어안고도 더 달라는 장면이 원형',s:'barrage, fire, volley'},
{n:1990,w:'urbane',m:'a. 도시풍의, 세련된, 품위 있는',r:'sub (under) + plant (sole of foot, 발바닥) → 발로 밟아 아래로 내리고 자기가 올라서다 → 대체하다·대신하다로 고착 > 기존 선수를 밀어내고 주전을 차지하는 장면이 원형',s:'elegant, refined, sophisticated'},
{n:1991,w:'trespass',m:'vi. ① (남의 토지·권리·재산 등을) 불법 침입[침해]하다; (남의 생활·시간·영역 등을) 침해하다, 방해하다[on, upon] ② 죄를 범하다; (법을) 어기다 / n. 불법 침입; 침해, 방해',r:'고대 영어 dwinan (waste away, 소모되다) → 점점 녹아 없어지듯 줄어들다 → 줄어들다·쇠퇴하다로 고착 > 타다 남은 양초가 조금씩 줄어드는 장면이 원형',s:'encroach, infringe, intrude, invade, offend, sin, transgress, violate, infringement, intrusion'},
{n:1992,w:'dangle',m:'v. ① 매달리다, 흔들흔들하다 ② 매달다',r:'고대 영어 fagnian (rejoice, 기뻐하다) → 개가 꼬리를 흔들며 환심을 사듯 → 아첨하다·알랑거리다로 고착 > 강아지가 주인 앞에서 배를 뒤집으며 꼬리치는 장면이 원형',s:'sway, swing, hang'},
{n:1993,w:'extrinsic',m:'a. 고유하지 않은, 비본질적인; 외부의; 외부로부터의',r:'라틴어 vacuus (empty, 빈) + -ous (형용사형) → 완전히 비어있는 성질 → 텅 빈·생각이 없는·멍청한으로 고착 > 아무 생각도 없이 멍하니 허공을 응시하는 장면이 원형',s:'exterior, external, extraneous'},

{n:1997,w:'raid',m:'n. 급습, 습격; (경찰의) 불시 단속; 일제 검거 / v. 급습[습격]하다; (경찰이) 들이닥치다, 불시 단속을 벌이다',r:'라틴어 placare (appease, 달래다) → 분노를 눌러 가라앉히다 → 달래다·누그러뜨리다로 고착 > 화난 아이에게 사탕을 건네 달래는 장면이 원형',s:'foray, incursion, invasion, onslaught, assault'},
{n:1998,w:'amputate',m:'v. (손발 등을 수술로) 절단하다; (필요 없는 것을) 잘라내다, 정리하다',r:'re (back) + pudi (shame, 수치) + -ate (동사형) → 수치스럽게 여겨 되돌리다 → 거부하다·부인하다·버리다로 고착 > 내민 손을 거부하며 등을 돌리는 장면이 원형',s:''},
{n:1999,w:'fishy',m:'a. 수상한, 의심스러운, 믿어지지 않는',r:'dis (completely) + gruntled (satisfied, 만족한) → 완전히 불만족스러운 → 불만스러운·기분이 상한으로 고착 > 표정이 굳어 입을 삐죽 내미는 장면이 원형',s:'dubious, odd, suspicious'},
{n:2000,w:'supplicate',m:'v. 간청하다, 애원하다, 탄원하다',r:'프랑스어 fraile (frail, 약한) + -ty (명사형) → 쉽게 부러지는 약함 → 허약함·도덕적 약점으로 고착 > 바람에 금방 꺾일 것 같은 가느다란 줄기의 장면이 원형',s:'beg, beseech, conjure, entreat, solicit'}

'a. 규정수 이상의, 정원 외의; 여분의, 남는'
];

let curSetIdx=0, curSet=[], curQ=0, results=[], wrongList=[], finished=false;

function buildChoices(q, setWords) {
  // 같은 세트에서 1개 + 전체 풀에서 2개
  const sameSet = setWords.filter(w => w.m !== q.m).map(w => w.m);
  const w1 = sameSet[Math.floor(Math.random() * sameSet.length)];
  
  // POOL에서 2개 (같은 세트 뜻 제외)
  const setMeanings = new Set(setWords.map(w => w.m));
  const pool = POOL.filter(m => !setMeanings.has(m));
  const shuffledPool = pool.sort(() => Math.random() - 0.5);
  const w2 = shuffledPool[0];
  const w3 = shuffledPool[1];
  
  const choices = [q.m, w1, w2, w3];
  // 섞기
  for (let i = choices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [choices[i], choices[j]] = [choices[j], choices[i]];
  }
  return { choices: choices, ans: choices.indexOf(q.m) };
}

function initSet(setIdx) {
  curSetIdx = setIdx;
  const s = setIdx * 50;
  curSet = WORDS.slice(s, s + 50).map(w => ({...w}));
  // 매번 새로 보기 생성
  curSet.forEach(q => {
    const built = buildChoices(q, curSet);
    q.choices = built.choices;
    q.ans = built.ans;
  });
  curQ = 0; results = new Array(curSet.length).fill(null);
  wrongList = []; finished = false;
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('wrongBox').style.display = 'none';
  document.getElementById('qBox').style.display = 'block';
  document.getElementById('navBox').style.display = 'flex';
  renderScore(); renderQuestion();
}

function renderQuestion() {
  if (finished) return;
  const q = curSet[curQ];
  document.getElementById('qNum').textContent = '문제 ' + (curQ+1) + ' / ' + curSet.length + '  |  #' + q.n;
  document.getElementById('qWord').textContent = q.w;
  document.getElementById('qCnt').textContent = (curQ+1) + ' / ' + curSet.length;
  document.getElementById('feedback').textContent = '';
  document.getElementById('extraInfo').style.display = 'none';
  document.getElementById('extraInfo').innerHTML = '';
  const box = document.getElementById('choiceBox');
  box.innerHTML = '';
  q.choices.forEach(function(text, i) {
    const btn = document.createElement('button');
    btn.className = 'choice'; btn.textContent = text;
    (function(idx) { btn.onclick = function() { submitAnswer(idx); }; })(i);
    box.appendChild(btn);
  });
  if (results[curQ] !== null) { applyResult(results[curQ].chose, q.ans); showExtraInfo(q); }
}

function submitAnswer(chose) {
  if (finished) return;
  if (results[curQ] !== null) return;
  const q = curSet[curQ];
  const isCorrect = (chose === q.ans);
  results[curQ] = { chose: chose, correct: isCorrect };
  if (!isCorrect) { wrongList.push({ n:q.n, word:q.w, root:q.r, syn:q.s, mine:q.choices[chose], answer:q.choices[q.ans] }); }
  applyResult(chose, q.ans); showExtraInfo(q); renderScore();
  const done = results.filter(r => r !== null).length;
  if (done === curSet.length) { setTimeout(showResult, 600); }
}

function applyResult(chose, correctIdx) {
  const btns = document.getElementById('choiceBox').querySelectorAll('button.choice');
  btns.forEach(function(btn, i) {
    btn.onclick = null;
    if (i === correctIdx) btn.classList.add(chose === correctIdx ? 'correct' : 'reveal');
    else if (i === chose) btn.classList.add('wrong');
  });
  document.getElementById('feedback').textContent = (chose === correctIdx) ? '✅ 정답!' : '❌ 오답';
}

function showExtraInfo(q) {
  const box = document.getElementById('extraInfo');
  let html = '';
  if (q.s) html += '<div class="extra-syn">' + q.s + '</div>';
  if (q.r) html += '<div class="extra-root">' + q.r + '</div>';
  if (html) { box.innerHTML = html; box.style.display = 'block'; }
}

function renderScore() {
  const done = results.filter(r => r !== null).length;
  const ok = results.filter(r => r !== null && r.correct).length;
  const rate = done > 0 ? Math.round(ok / done * 100) : '-';
  document.getElementById('scoreBar').textContent = '점수: ' + ok + ' / ' + done + '  |  정답률: ' + (rate === '-' ? '-' : rate + '%');
}

function goNext() {
  if (finished) return;
  if (curQ < curSet.length - 1) { curQ++; renderQuestion(); }
  else {
    const first = results.findIndex(r => r === null);
    if (first !== -1) { curQ = first; renderQuestion(); } else { showResult(); }
  }
}

function goPrev() { if (finished) return; if (curQ > 0) { curQ--; renderQuestion(); } }

function showResult() {
  if (finished) return; finished = true;
  document.getElementById('qBox').style.display = 'none';
  document.getElementById('navBox').style.display = 'none';
  const ok = results.filter(r => r !== null && r.correct).length;
  const rate = Math.round(ok / curSet.length * 100);
  document.getElementById('resultScore').textContent = ok + ' / ' + curSet.length + ' (' + rate + '%)';
  document.getElementById('resultMsg').textContent = rate >= 80 ? '훌륭해요! 🎊' : rate >= 60 ? '조금만 더 연습하세요 💪' : '플래시카드로 복습해보세요 📖';
  document.getElementById('wrongBtn').style.display = wrongList.length > 0 ? '' : 'none';
  document.getElementById('resultBox').style.display = 'block';
}

function showWrongList() {
  const box = document.getElementById('wrongItems');
  box.innerHTML = '';
  wrongList.forEach(function(w) {
    const div = document.createElement('div'); div.className = 'wrong-item';
    div.innerHTML = '<div class="wrong-num">#' + w.n + '</div>' +
      '<div class="wrong-word">' + w.word + '</div>' +
      (w.syn ? '<div class="wrong-syn">' + w.syn + '</div>' : '') +
      (w.root ? '<div class="wrong-root">' + w.root + '</div>' : '') +
      '<div class="wrong-mine">' + w.mine + '</div>' +
      '<div class="wrong-ans">' + w.answer + '</div>';
    box.appendChild(div);
  });
  document.getElementById('wrongBox').style.display = 'block';
  document.getElementById('wrongBox').scrollIntoView({ behavior: 'smooth' });
}

function doShuffle() {
  // 문제 순서 섞기 + 보기 새로 생성
  const setWords = WORDS.slice(curSetIdx * 50, curSetIdx * 50 + 50);
  curSet = [...setWords].sort(() => Math.random() - 0.5).map(w => ({...w}));
  curSet.forEach(q => {
    const built = buildChoices(q, setWords);
    q.choices = built.choices; q.ans = built.ans;
  });
  curQ = 0; results = new Array(curSet.length).fill(null);
  wrongList = []; finished = false;
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('wrongBox').style.display = 'none';
  document.getElementById('qBox').style.display = 'block';
  document.getElementById('navBox').style.display = 'flex';
  renderScore(); renderQuestion();
}

document.addEventListener('keydown', function(e) {
  if (finished) return;
  if (e.key === 'ArrowRight') { e.preventDefault(); goNext(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
  else if (e.key === '1') submitAnswer(0);
  else if (e.key === '2') submitAnswer(1);
  else if (e.key === '3') submitAnswer(2);
  else if (e.key === '4') submitAnswer(3);
});

document.getElementById('setSelect').addEventListener('change', function() {
  initSet(parseInt(this.value) - 1);
});

initSet(0);

</script>
</body>
</html>
