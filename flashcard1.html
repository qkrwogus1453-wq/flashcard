<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVP 플래시카드 1~1000</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{color:#e94560;margin-bottom:8px;font-size:1.4em}
.subtitle{color:#aaa;font-size:.85em;margin-bottom:20px}
.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
select,button{padding:8px 14px;border-radius:8px;border:none;font-size:.9em;cursor:pointer}
select{background:#16213e;color:#eee;border:1px solid #e94560}
button{background:#e94560;color:#fff;font-weight:bold}
button:hover{background:#c73652}
.progress{color:#aaa;font-size:.85em;margin-bottom:14px}
.card-wrap{perspective:1000px;width:340px;height:220px;margin-bottom:24px;cursor:pointer}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s}
.card.flipped{transform:rotateY(180deg)}
.front,.back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;text-align:center}
.front{background:linear-gradient(135deg,#16213e,#0f3460);border:2px solid #e94560}
.back{background:linear-gradient(135deg,#0f3460,#16213e);border:2px solid #4ecca3;transform:rotateY(180deg)}
.num{position:absolute;top:10px;left:14px;color:#e94560;font-size:.8em;font-weight:bold}
.word{font-size:1.8em;font-weight:bold;color:#fff;margin-bottom:6px}
.hint{font-size:.8em;color:#888}
.meaning{font-size:.88em;color:#eee;line-height:1.5;margin-bottom:6px;overflow-y:auto;max-height:80px}
.syn{font-size:.75em;color:#4ecca3;margin-bottom:4px}
.root{font-size:.72em;color:#f0a500;line-height:1.4}
.nav{display:flex;gap:14px;align-items:center}
.nav button{padding:10px 22px;font-size:1em}
.nav .cnt{color:#aaa;font-size:.9em;min-width:80px;text-align:center}
.set-info{color:#4ecca3;font-size:.85em;margin-bottom:6px}
</style>
</head>

<script>
const WORDS=[
{n:1,w:'innocent',m:'결백한, 무죄인 / 순진한, 순수한',s:'',r:'라틴어 in(not) + nocere(해치다) → 해치지 않는, 무죄의'},
{n:2,w:'hostile',m:'적의 있는, 적대하는 / 불리한',s:'',r:'라틴어 hostis(적) + -ile → 적처럼 대적하는'},
{n:3,w:'glorify',m:'찬미하다, 영광을 찬양하다 / 미화하다',s:'',r:'라틴어 gloria(영광) + facere(만들다) → 영광스럽게 만들다'},
{n:4,w:'deceased',m:'죽은, 사망한 / 고인이 된',s:'',r:'라틴어 de-(아래로) + cedere(가다) → 이 세상에서 떠나간'},
{n:5,w:'antithesis',m:'정반대, 반대되는 것 / 대조, 대립',s:'',r:'그리스어 anti(반대) + thesis(명제) → 반대되는 명제'},
{n:6,w:'multiple',m:'많은, 다수의 / 다양한, 복합적인',s:'',r:'라틴어 multiplex(다중) → 여러 겹으로 이루어진'},
{n:7,w:'refund',m:'환불금 / 환불하다',s:'',r:'라틴어 re-(다시) + fundere(붓다) → 돈을 다시 부어 돌려주다'},
{n:8,w:'dotage',m:'망령, 노망 / 맹목적 애정',s:'',r:'중세 영어 doten(정신이 흐려지다) + -age → 노령으로 정신이 흐려진 상태'},
{n:9,w:'satire',m:'풍자, 풍자 문학 / 비꼼',s:'',r:'라틴어 satura(잡동사니 음식) → 다양한 결점을 엮어 풍자하는 것'},
{n:10,w:'proficient',m:'숙달된, 능숙한',s:'',r:'라틴어 pro-(앞으로) + facere(만들다) → 앞으로 나아가며 능숙해진'},
{n:11,w:'exert',m:'발휘하다, 쓰다 / 열심히 노력하다',s:'',r:'라틴어 ex-(밖으로) + serere(연결하다) → 힘을 밖으로 끌어내어 발휘하다'},
{n:12,w:'artificial',m:'인조의, 인공적인 / 부자연스러운',s:'',r:'라틴어 ars(기술) + facere(만들다) → 기술로 만들어낸, 인공적인'},
{n:13,w:'whim',m:'변덕, 일시적 기분',s:'',r:'17세기 영어 whim-wham(장난감) → 일시적으로 스치는 변덕스러운 생각'},
{n:14,w:'formidable',m:'무서운, 무시무시한 / 방대한',s:'',r:'라틴어 formidare(두려워하다) + -able → 두려움을 느끼게 할 만한'},
{n:15,w:'commerce',m:'상업, 통상, 교역 / 사회적 교류',s:'',r:'라틴어 com-(함께) + merx(상품) → 상품을 함께 사고파는 행위'},
{n:16,w:'drastic',m:'급격한 / 극단적인, 과감한',s:'',r:'그리스어 drastikos(효과적인) → 강하고 급격한 효과를 내는'},
{n:17,w:'usurp',m:'빼앗다, 찬탈하다',s:'',r:'라틴어 usus(사용) + rapere(빼앗다) → 사용권을 강제로 빼앗다'},
{n:18,w:'primitive',m:'원시의, 원시시대의 / 원시적인',s:'',r:'라틴어 primus(첫째) + -ive → 가장 처음의, 원시 상태의'},
{n:19,w:'ramp',m:'경사로, 비탈길',s:'',r:'프랑스어 rampe(오르막) → 경사를 이루어 오르내리는 길'},
{n:20,w:'esteem',m:'존중하다, 높이 평가하다 / 존경',s:'',r:'라틴어 aestimare(가치를 매기다) → 높은 가치를 부여하여 존중하다'},

{n:22,w:'transit',m:'수송, 통과, 환승',s:'',r:'라틴어 trans-(가로질러) + ire(가다) → 한 곳에서 다른 곳으로 가로질러 가다'},
{n:23,w:'acknowledge',m:'인정하다, 승인하다 / 사의를 표명하다',s:'',r:'고대 영어 on(에) + cnawan(알다) → 사실임을 공개적으로 인정하다'},
{n:24,w:'peninsula',m:'반도(半島)',s:'',r:'라틴어 paene(거의) + insula(섬) → 거의 섬과 같은 땅, 반도'},
{n:25,w:'outspoken',m:'솔직한, 거리낌 없는',s:'',r:'영어 out(밖으로) + spoken(말한) → 생각을 거리낌 없이 밖으로 말하는'},

{n:27,w:'laud',m:'찬양하다, 기리다 / 기림, 찬미',s:'',r:'라틴어 laudare(칭찬하다) → 공개적으로 높이 칭찬하다'},
{n:28,w:'tension',m:'긴장, 불안 / 긴박, 팽팽함',s:'',r:'라틴어 tendere(당기다) + -ion → 팽팽하게 당겨진 상태, 긴장'},
{n:29,w:'squalid',m:'더러운, 누추한, 지저분한',s:'',r:'라틴어 squalere(더럽다) + -id → 더럽고 누추하게 방치된'},
{n:30,w:'rigid',m:'엄격한, 융통성 없는 / 단단한',s:'',r:'라틴어 rigere(굳다) + -id → 굳어서 구부러지지 않는, 엄격한'},
{n:31,w:'entrepreneur',m:'실업가, 기업가',s:'',r:'프랑스어 entre-(사이에) + prendre(잡다) → 사업 기회를 잡아 벌이는 사람'},
{n:32,w:'approximately',m:'대략, 대강, 얼추',s:'',r:'라틴어 ad-(~로) + proximus(가장 가까운) → 가장 가까운 수치에 근접하여'},
{n:33,w:'signify',m:'의미하다, 뜻하다 / 알리다',s:'',r:'라틴어 signum(표시) + facere(만들다) → 표시를 만들어 의미를 전달하다'},
{n:34,w:'cohort',m:'집단, 코호트 / 친구, 동료',s:'',r:'라틴어 cohors(울타리 안의 무리) → 같은 울타리 안에 묶인 집단'},
{n:35,w:'illustrate',m:'설명하다, 예증하다 / 도해를 넣다',s:'',r:'라틴어 in-(안으로) + lustrare(밝히다) → 빛을 비추어 명확히 설명하다'},
{n:36,w:'verdant',m:'신록의, 푸릇푸릇한 / 순진한, 미숙한',s:'',r:'라틴어 viridis(녹색) + -ant → 녹색으로 생기 넘치는, 신록의'},

{n:39,w:'mimesis',m:'모사, 모방',s:'',r:'그리스어 mimeisthai(흉내 내다) → 현실을 모방하여 재현하는 행위'},

  const s=(setNum-1)*20;
  currentSet=WORDS.slice(s,s+20);
  idx=0;isFlipped=false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('setInfo').textContent=`세트 ${setNum} — ${currentSet[0].n}번~${currentSet[currentSet.length-1].n}번`;
  render();
}
function shuffle(){currentSet=currentSet.sort(()=>Math.random()-.5);idx=0;isFlipped=false;document.getElementById('card').classList.remove('flipped');render();}
function resetSet(){loadSet(document.getElementById('setSelect').value);}
function render(){
  const w=currentSet[idx];
  document.getElementById('num').textContent=`#${w.n}`;
  document.getElementById('num2').textContent=`#${w.n}`;
  document.getElementById('word').textContent=w.w;
  document.getElementById('meaning').textContent=w.m||'(뜻 없음)';
  document.getElementById('syn').textContent=w.s?'동의어: '+w.s:'';
  document.getElementById('root').textContent=w.r?'어원: '+w.r:'';
  document.getElementById('cnt').textContent=`${idx+1} / ${currentSet.length}`;
  document.getElementById('progress').textContent=`진행: ${idx+1}/${currentSet.length} (${Math.round((idx+1)/currentSet.length*100)}%)`;
  isFlipped=false;document.getElementById('card').classList.remove('flipped');
}
function flipCard(){isFlipped=!isFlipped;document.getElementById('card').classList.toggle('flipped');}
function next(){if(idx<currentSet.length-1){idx++;render();}}
function prev(){if(idx>0){idx--;render();}}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')next();
  else if(e.key==='ArrowLeft')prev();
  else if(e.key===' '){e.preventDefault();flipCard();}
});
loadSet(1);
</script>
</body>
</html>
