<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVP 플래시카드 1~1000</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{color:#e94560;margin-bottom:8px;font-size:1.4em}
.subtitle{color:#aaa;font-size:.85em;margin-bottom:20px}
.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
select,button{padding:8px 14px;border-radius:8px;border:none;font-size:.9em;cursor:pointer}
select{background:#16213e;color:#eee;border:1px solid #e94560}
button{background:#e94560;color:#fff;font-weight:bold}
button:hover{background:#c73652}
.progress{color:#aaa;font-size:.85em;margin-bottom:14px}
.card-wrap{perspective:1000px;width:340px;height:240px;margin-bottom:24px;cursor:pointer}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s}
.card.flipped{transform:rotateY(180deg)}
.front,.back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;text-align:center}
.front{background:linear-gradient(135deg,#16213e,#0f3460);border:2px solid #e94560}
.back{background:linear-gradient(135deg,#0f3460,#16213e);border:2px solid #4ecca3;transform:rotateY(180deg);justify-content:flex-start;padding-top:16px;overflow-y:auto}
.num{position:absolute;top:10px;left:14px;color:#e94560;font-size:.8em;font-weight:bold}
.word{font-size:1.8em;font-weight:bold;color:#fff;margin-bottom:6px}
.hint{font-size:.8em;color:#888}
.meaning{font-size:.88em;color:#eee;line-height:1.5;margin-bottom:8px;text-align:left;width:100%}
.syn{font-size:.75em;color:#4ecca3;margin-bottom:6px;text-align:left;width:100%;line-height:1.4}
.syn::before{content:'동의어: ';font-weight:bold}
.root{font-size:.72em;color:#f0a500;line-height:1.4;text-align:left;width:100%}
.root::before{content:'어원: ';font-weight:bold}
.nav{display:flex;gap:14px;align-items:center}
.nav button{padding:10px 22px;font-size:1em}
.nav .cnt{color:#aaa;font-size:.9em;min-width:80px;text-align:center}
.set-info{color:#4ecca3;font-size:.85em;margin-bottom:6px}
</style>
</head>

<script>
const WORDS=[
{n:1,w:'innocent',m:'결백한, 무죄인 / 순진한, 순수한',s:'guiltless, blameless, pure, naive',r:'in(not) + noc(harm/해치다) → 해치지 않는 → 결백한, 순진한'},
{n:2,w:'hostile',m:'적의 있는, 적대하는 / 불리한',s:'antagonistic, unfriendly, belligerent, aggressive',r:'host(enemy/적) + -ile → 적의 성질 → 적대적인'},
{n:3,w:'glorify',m:'찬미하다, 영광을 찬양하다 / 미화하다',s:'praise, extol, exalt, honor, magnify',r:'glor(glory/영광) + -ify(make) → 영광스럽게 만들다 → 찬미하다'},
{n:4,w:'deceased',m:'죽은, 사망한 / 고인이 된',s:'dead, departed, late, gone',r:'de(completely) + ces(go/가다) → 완전히 떠난 → 사망한'},
{n:5,w:'antithesis',m:'정반대, 반대되는 것 / 대조, 대립',s:'contrast, opposite, contradiction, antonym',r:'anti(against/반대) + the(place/놓다) + -sis → 반대로 놓인 것 → 정반대, 대조'},
{n:6,w:'multiple',m:'많은, 다수의 / 다양한, 복합적인',s:'numerous, various, manifold, diverse',r:'multi(many/많은) + pli(fold/겹) → 여러 겹 → 다수의, 복합적인'},
{n:7,w:'refund',m:'환불금 / 환불하다',s:'reimbursement, repayment, rebate',r:'re(back) + fund(pour/붓다) → 되돌려 붓다 → 환불하다'},
{n:8,w:'dotage',m:'망령, 노망 / 맹목적 애정',s:'senility, infatuation, foolishness',r:'dot(dote/지나치게 좋아하다) + -age → 맹목적 집착 상태 → 망령, 노망'},
{n:9,w:'satire',m:'풍자, 풍자 문학 / 비꼼',s:'parody, mockery, irony, sarcasm',r:'sat(enough/충분) → 여러 것을 섞어 비꼬는 것 → 풍자'},
{n:10,w:'proficient',m:'숙달된, 능숙한',s:'skilled, adept, expert, competent, capable',r:'pro(forward) + fic(make/do) + -ent → 앞으로 해나가는 → 숙달된, 능숙한'},
{n:11,w:'exert',m:'발휘하다, 쓰다 / 열심히 노력하다',s:'apply, exercise, wield, employ',r:'ex(out) + sert(join/연결) → 밖으로 힘을 내다 → 발휘하다'},
{n:12,w:'artificial',m:'인조의, 인공적인 / 부자연스러운',s:'synthetic, fake, man-made, unnatural',r:'arti(skill/기술) + fic(make) + -al → 기술로 만든 → 인공적인'},
{n:13,w:'whim',m:'변덕, 일시적 기분',s:'caprice, impulse, fancy, notion',r:'[어원불명] 갑자기 생긴 일시적 욕구 → 변덕'},
{n:14,w:'formidable',m:'무서운, 무시무시한 / 방대한',s:'daunting, intimidating, redoubtable, fearsome',r:'form(fear/두려움) + -idable → 두려워할 만한 → 무시무시한'},
{n:15,w:'commerce',m:'상업, 통상, 교역 / 사회적 교류',s:'trade, business, industry, exchange',r:'com(together) + merc(trade/거래) → 함께 거래하다 → 상업, 교역'},
{n:16,w:'drastic',m:'급격한 / 극단적인, 과감한',s:'extreme, radical, severe, harsh',r:'dra(do/act) + -stic → 강하게 행동하는 → 급격한, 극단적인'},
{n:17,w:'usurp',m:'빼앗다, 찬탈하다',s:'seize, usurpate, appropriate, take over',r:'us(use/쓰다) + urp(seize/빼앗다) → 빼앗아 쓰다 → 찬탈하다'},
{n:18,w:'primitive',m:'원시의, 원시시대의 / 원시적인',s:'ancient, primal, rudimentary, early',r:'prim(first/첫째) + -itive → 처음의 → 원시의'},
{n:19,w:'ramp',m:'경사로, 비탈길',s:'slope, incline, gradient',r:'ramp(slope/경사) → 경사면 → 경사로'},
{n:20,w:'esteem',m:'존중하다, 높이 평가하다 / 존경',s:'respect, regard, admire, value, revere',r:'e + steem(value/가치) → 가치를 높이 보다 → 존중하다'},
{n:21,w:'beneficial',m:'유익한, 이익을 가져오는',s:'advantageous, helpful, profitable, useful',r:'bene(well/좋게) + fic(make/do) + -al → 좋은 것을 하는 → 유익한'},
{n:22,w:'transit',m:'수송, 통과, 환승',s:'passage, transport, conveyance',r:'trans(across) + it(go/가다) → 가로질러 가다 → 수송, 통과'},
{n:23,w:'acknowledge',m:'인정하다, 승인하다 / 사의를 표명하다',s:'admit, recognize, confess, concede',r:'ac + know(알다) + ledge → 알고 인정하다 → 인정하다'},
{n:24,w:'peninsula',m:'반도(半島)',s:'promontory, cape',r:'pen(almost/거의) + insula(island/섬) → 거의 섬 → 반도'},
{n:25,w:'outspoken',m:'솔직한, 거리낌 없는',s:'candid, frank, blunt, forthright',r:'out(beyond) + spoke(말한) → 속을 밖으로 말한 → 솔직한'},
{n:26,w:'virtuoso',m:'예술의 대가, 명인',s:'master, expert, maestro, prodigy',r:'virt(virtue/덕, 기량) + -oso → 기량이 뛰어난 사람 → 예술 대가'},
{n:27,w:'laud',m:'찬양하다, 기리다 / 기림, 찬미',s:'praise, extol, commend, acclaim',r:'laud(praise/칭찬) → 칭찬하다 → 찬양하다'},
{n:28,w:'tension',m:'긴장, 불안 / 긴박, 팽팽함',s:'stress, strain, anxiety, pressure',r:'ten(hold/stretch) + -sion → 팽팽히 당긴 상태 → 긴장, 팽팽함'},
{n:29,w:'squalid',m:'더러운, 누추한, 지저분한',s:'dirty, filthy, shabby, sordid',r:'squal(filth/더러움) + -id → 더럽고 불결한 → 더러운, 누추한'},
{n:30,w:'rigid',m:'엄격한, 융통성 없는 / 단단한',s:'strict, inflexible, stiff, unyielding',r:'rig(stiff/뻣뻣한) + -id → 뻣뻣하고 굳은 → 엄격한, 단단한'},
{n:31,w:'entrepreneur',m:'실업가, 기업가',s:'businessman, businessperson, capitalist',r:'entre(between) + pren(take/잡다) → 사이에서 맡아 하는 사람 → 기업가'},
{n:32,w:'approximately',m:'대략, 대강, 얼추',s:'roughly, about, around, nearly',r:'ap + proxim(nearest/가장 가까운) + -ately → 가장 가깝게 → 대략'},
{n:33,w:'signify',m:'의미하다, 뜻하다 / 알리다',s:'mean, indicate, denote, represent',r:'sign(mark/표시) + -ify(make) → 표시로 나타내다 → 의미하다'},
{n:34,w:'cohort',m:'집단, 코호트 / 친구, 동료',s:'group, company, band, troop',r:'co(together) + hort(enclosure/울타리) → 같은 울타리의 집단 → 집단, 동료'},
{n:35,w:'illustrate',m:'설명하다, 예증하다 / 도해를 넣다',s:'explain, demonstrate, depict, exemplify',r:'il + lustr(light/빛) + -ate → 빛을 비춰 보이다 → 설명하다'},
{n:36,w:'verdant',m:'신록의, 푸릇푸릇한 / 순진한, 미숙한',s:'green, lush, flourishing',r:'verd(green/초록) + -ant → 초록의 → 신록의, 푸른'},
{n:37,w:'check',m:'저지, 억제 / 대조, 점검 / 저지하다',s:'restrain, curb, hinder, impede',r:'[중세 체스 용어] 왕을 위협하다 → 저지, 점검'},
{n:38,w:'prescribe',m:'규정하다, 명하다 / 처방하다',s:'order, dictate, direct, mandate',r:'pre(before) + scrib(write/쓰다) → 미리 써두다 → 처방하다, 규정하다'},
{n:39,w:'mimesis',m:'모사, 모방',s:'imitation, mimicry, representation',r:'mim(imitate/모방) + -esis → 모방하기 → 모사, 모방'},
{n:40,w:'fix',m:'고정시키다 / 결정하다 / 고치다',s:'fasten, secure, mend, repair',r:'fix(fasten/고정) → 고정시키다 → 고정하다, 고치다'},
{n:41,w:'circuitous',m:'우회로의, 빙 돌아가는 / 에두르는',s:'roundabout, indirect, devious, meandering',r:'circum(around) + it(go) + -ous → 빙 돌아가는 → 우회하는'},
{n:42,w:'guffaw',m:'갑작스런 너털웃음 / 시끄럽게 웃다',s:'laugh, cackle, roar',r:'[의성어] 폭발적인 웃음소리 → 너털웃음'},
{n:43,w:'subdue',m:'진압하다, 정복하다 / 억누르다',s:'suppress, conquer, overcome, quell',r:'sub(under) + du(lead/이끌다) → 아래로 이끌어 제압하다 → 진압하다'},
{n:44,w:'crafty',m:'교활한, 간사한, 교묘한',s:'cunning, sly, wily, artful',r:'craft(skill/기술) + -y → 교묘한 기술 → 교활한'},
{n:45,w:'buttress',m:'지지하다, 보강하다 / 지지대, 버팀목',s:'support, prop, reinforce, strengthen',r:'butt(push/밀다) + -ress → 밀어 받치는 것 → 버팀목, 지지하다'},
{n:46,w:'quirk',m:'별난 점, 기벽 / 기이한 일, 우연',s:'idiosyncrasy, peculiarity, eccentricity',r:'[어원불명] 예측 불가한 특이한 점 → 기벽, 별난 점'},
{n:47,w:'parallel',m:'평행의, 나란한 / 유사한 / 평행시키다',s:'analogous, corresponding, similar, comparable',r:'para(beside/옆에) + allel(other/서로) → 나란히 → 평행의'},
{n:48,w:'irksome',m:'지루한, 귀찮은, 짜증나는',s:'tedious, annoying, tiresome, bothersome',r:'irk(annoy/짜증나게) + -some → 짜증스러운 → 지루한, 귀찮은'},
{n:49,w:'skull',m:'두개골 / 머리, 두뇌',s:'cranium, head',r:'[고대 노르드어] skol(bowl) → 그릇 모양의 뼈 → 두개골'},
{n:50,w:'disprove',m:'반증을 들다, 그릇됨을 증명하다',s:'refute, invalidate, debunk, contradict',r:'dis(not) + prove(test/증명) → 거짓임을 증명하다 → 반증하다'},
{n:51,w:'elementary',m:'초보의, 초급의 / 기본적인',s:'basic, fundamental, primary, rudimentary',r:'element(basic part/요소) + -ary → 기본 요소의 → 초보의, 기본적인'},
{n:52,w:'dogma',m:'교의, 교리 / 독단적인 주장',s:'doctrine, tenet, belief, principle',r:'dog(think/생각) + -ma → 확정된 생각 → 교리, 독단'},
{n:53,w:'modify',m:'수정하다, 변경하다 / 한정하다',s:'alter, adjust, revise, change',r:'mod(measure/기준) + -ify → 기준에 맞게 바꾸다 → 수정하다'},
{n:54,w:'stationary',m:'움직이지 않는, 정지된',s:'fixed, motionless, immobile, static',r:'stat(stand/서다) + -ionary → 서있는 → 정지된'},
{n:55,w:'altruistic',m:'이타주의적인, 이타적인',s:'selfless, unselfish, philanthropic',r:'altr(other/타인) + -istic → 타인을 위한 → 이타적인'},
{n:56,w:'rapture',m:'큰 기쁨, 환희, 황홀, 열중',s:'ecstasy, bliss, joy, elation, delight',r:'rapt(seize/잡다) + -ure → 황홀함에 사로잡힌 → 황홀, 큰 기쁨'},

let currentSet=[],idx=0,isFlipped=false;
function loadSet(setNum){
  setNum=parseInt(setNum);
  const s=(setNum-1)*20;
  currentSet=WORDS.slice(s,s+20);
  idx=0;isFlipped=false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('setInfo').textContent='세트 '+setNum+' — '+currentSet[0].n+'번~'+currentSet[currentSet.length-1].n+'번';
  render();
}
function shuffle(){currentSet=currentSet.sort(()=>Math.random()-.5);idx=0;isFlipped=false;document.getElementById('card').classList.remove('flipped');render();}
function resetSet(){loadSet(document.getElementById('setSelect').value);}
function render(){
  const w=currentSet[idx];
  document.getElementById('num').textContent='#'+w.n;
  document.getElementById('num2').textContent='#'+w.n;
  document.getElementById('word').textContent=w.w;
  document.getElementById('meaning').textContent=w.m||'(뜻 없음)';
  const synEl=document.getElementById('syn');
  const rootEl=document.getElementById('root');
  if(w.s){synEl.textContent=w.s;synEl.style.display='block';}else{synEl.style.display='none';}
  if(w.r){rootEl.textContent=w.r;rootEl.style.display='block';}else{rootEl.style.display='none';}
  document.getElementById('cnt').textContent=(idx+1)+' / '+currentSet.length;
  document.getElementById('progress').textContent='진행: '+(idx+1)+'/'+currentSet.length+' ('+Math.round((idx+1)/currentSet.length*100)+'%)';
  isFlipped=false;document.getElementById('card').classList.remove('flipped');
}
function flipCard(){isFlipped=!isFlipped;document.getElementById('card').classList.toggle('flipped');}
function next(){if(idx<currentSet.length-1){idx++;render();}}
function prev(){if(idx>0){idx--;render();}}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight')next();
  else if(e.key==='ArrowLeft')prev();
  else if(e.key===' '){e.preventDefault();flipCard();}
});
loadSet(1);
</script>
